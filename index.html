  {id:184,q:"Ms. Srour had to reschedule her dentist appointment because of a scheduling ——– with a business trip to Tokyo.",options:["conflict","garment","allowance","chance"],answer:0,type:"語彙問題",explanation:"空所の前が動詞の現在分詞または名詞のscheduling（スケジュール）、後ろが前置詞with。空所に合うのは(A) conflict（衝突）です。",translation:"Srourさんは、東京への出張とスケジュールがかち合ったため、歯医者の予約を変更しなければならなかった。"},
  {id:185,q:"Dr. Cho was ——– that his research team would develop a new synthetic fiber by the end of this year.",options:["capable","confident","accurate","ideal"],answer:1,type:"語彙問題",explanation:"空所の前が主語とbe動詞のDr. Cho was （Cho博士は）、後ろのthat節の意味は「彼の研究チームが今年の末までには新しい合成繊維を開発するだろう」です。したがって、(B) confident（確信している）が適切です。",translation:"Cho博士は、彼の研究チームが今年の末までには新しい合成繊維を開発することを確信していた。"},
  {id:186,q:"Please be advised that any changes to meeting room reservations must be made at least one day ——– the date of use.",options:["so that","beforehand","prior to","whenever"],answer:2,type:"部分読み問題",explanation:"空所の後ろの形を見ます。the date of use （利用日）の名詞句です。that節内の主語はany changes、動詞はmust be made です。上の４のパターンで空所には前置詞が入ることがわかり、唯一の前置詞の選択肢(C) prior to（～の前に）が適切です。",translation:"会議室の予約の変更は、利用日の少なくとも1日前までに行うことをご承知おきください。"},
  {id:187,q:"New measures that will reduce commuting time by car ——–.",options:["are being considered","to be considered","to conder","considering"],answer:0,type:"動詞問題",explanation:"まず動詞を探します。will reduceがありますが、これは関係代名詞thatに続く動詞で文全体の述語動詞ではありません。したがって空所には述語動詞が入ることがわかります。",translation:"車での通勤時間を短縮する新しい対策が検討されている。"},
  {id:188,q:"Local residents object ——– to the relocation of the city hospital from the center of the city to the suburbs.",options:["strength","strengthen","strongly","strong"],answer:2,type:"品詞問題",explanation:"空所の前後を見ます。空所の前が動詞object（反対する）、後ろが前置詞to。動詞objectを修飾する副詞の(C) strongly（強く）が適切です。ここでのobjectは自動詞で、object to（～に反対する）としてよく使われます。",translation:"地元住民は、市民病院を市の中心部から郊外へ移転することに強く反対している。"},
  {id:189,q:"Discounted subway tickets for travelers were introduced last month and are ——– for three days from the first day of use.",options:["correct","valid","favorable","original"],answer:1,type:"語彙問題",explanation:"空所の前がbe動詞のare、後ろが前置詞句のfor three days（３日間）。主語は文頭のDiscounted subway tickets（地下鉄の割引切符）です。",translation:"旅行者向けの地下鉄割引切符は先月導入されたが、利用開始日から3日間有効である。"},
  {id:190,q:"Please be advised that the Delton Art Museum is not ——– for personal belongings lost in the museum.",options:["responsibility","responsible","responsibly","response"],answer:1,type:"品詞問題",explanation:"空所の前後を見ます。空所の前がbe動詞isにnotが続き、後ろが前置詞for。be動詞に続く補語となる形容詞の(B) responsible（責任がある）が適切です。",translation:"Delton Art Museumは個人の持ち物の館内での紛失について責任がないことをご承知おきください。"},
  {id:191,q:"The company’s construction of a factory in Thailand has ——– in the creation of more than 500 new jobs.",options:["generated","resulted","occupied","realized"],answer:1,type:"語彙問題",explanation:"空所の前が現在完了形の助動詞has, 後ろが前置詞in。inを直後に取れるのは、(B) resultedだけです。result inで「〔結果的に〕～をもたらす、～につながる」という意味になります。",translation:"その会社がタイで工場を建設したことによって500人以上の雇用の増加につながった。"},
  {id:192,q:"——– install a bus stop on the sidewalk, an application for a building permit must be submitted to the city.",options:["For","On behalf of","Additionally","In order to"],answer:3,type:"部分読み問題",explanation:"空所の後ろの形を見ます。install a bus stop で動詞の原形+目的語であることがわかります。動詞の原形の前におけるのは(D) In order to （～するために）だけでこれを選びます。",translation:"歩道上にバス停を設置するためには、市へ建築許可の申請をする必要がある。"},
  {id:193,q:"The newly installed labeling machine can apply stickers to products twice as ——– as the previous one.",options:["quick","quicker","quickness","quickly"],answer:3,type:"品詞問題",explanation:"空所の前後を見ます。空所の前がas、後ろがasなので原級比較のas … as構文です。as … asの間に入るのは、形容詞または副詞で、何を修飾するかで決まります。",translation:"新しく導入されたラベル貼り機は、以前のものより2倍のスピードで製品にシールを貼ることができる。"},
  {id:194,q:"Kwon Market Research conducted ——– research to develop new products for clients in the food industry.",options:["durable","generous","dependent","extensive"],answer:3,type:"語彙問題",explanation:"空所の前が動詞のconducted（行った）、後ろがresearch（調査）。research（調査）ともっとも合うのは(D) extensive（広範囲に及ぶ）です。",translation:"Kwon Market Researchは、食品業界の顧客の新商品開発のために広範囲に及ぶ調査を行った。"},
  {id:195,q:"The Mogen Modern Museum requires that the use of cell phones ——– to designated areas within the museum.",options:["is limited","has limited","be limited","limit"],answer:2,type:"能動態・受動態・時制に関する動詞問題",explanation:"requires that節に気づくかどうかがカギになります。",translation:"Mogen Modern Museumでは携帯電話の使用は館内の指定の場所に限定するよう求めている。"},
  {id:196,q:"According to today’s newspaper, ——– 3,000 residents, including adults and children, participated in the sporting event yesterday.",options:["similarly","nearly","anonymously","sufficiently"],answer:1,type:"語彙問題",explanation:"空所の後ろが、数字の3,000。この数字を修飾する(B) nearly（ほぼ、近く）が適切です。数字の前にくる副詞としてnearly以外には、",translation:"今日の新聞によれば、大人や子供を含む約3000人の住民が昨日のスポーツイベントに参加しました。。"},
  {id:197,q:"Our team is ——– surveying visitors to the event that will be held this weekend at Riverside Park.",options:["instead of","along with","in place of","in charge of"],answer:3,type:"語彙問題",explanation:"空所の前が主語とbe動詞のOur team、後ろがsurveying visitors（来場者にアンケートをする）。主語と後ろをつなぐのに適切なのは、(D) in charge of（～を担当して）です。",translation:"私たちのチームは、今週末にRiverside Parkで開催されるイベントの来場者に対してアンケートを取ることを担当している。"},
  {id:198,q:"Employees who have been assigned to work overseas can receive online ——– to learn the local language.",options:["tutorials","exports","permits","measurements"],answer:0,type:"語彙問題",explanation:"空所の前が動詞receiveと形容詞online、後ろがto learn the local language（現地の言語を学ぶために）。したがって空所には(A) tutorials（tutorial「個別指導」の複数形）が適切です。",translation:"海外転勤が決まった社員は、現地の言語を習得するためにオンラインの個別指導を受けることができる。"},
  {id:199,q:"The number of people working for companies ——– to the automotive industry in that district has increased in recent years.",options:["relation","related","relate","relates"],answer:1,type:"品詞または動詞問題",explanation:"空所の前後を見ます。空所の前が名詞companies（会社）、後ろが前置詞句to the automobile industry（自動車産業に）。主語はThe numberで述語動詞がhas increasedです。したがって空所には述語動詞は入らないので(C) relate（「関連付ける」現在形または原形）と(D) relates（relateの三人称単数現在形）は入りません。",translation:"その地区では、自動車産業関連の会社で働いている人が近年増えている。"},
  {id:200,q:"New employees at Wagner Corporation are invited ——– a welcome party held on the second floor of its headquarters.",options:["attend","attending","to attend","attended"],answer:2,type:"動詞問題",explanation:"空所の前がbe動詞+動詞の過去分詞のare invitedです。inviteは、invite + 目的語 + to doの形をとる動詞で、目的語を主語にした受動態の文では、be invited to doの形をとります。したがって、to doの形の(C) to attend（出席する）が適切です。",translation:"Wagner Corporationの新入社員は、本社の2階で開催される歓迎会に参加するように勧められている。"},
  {id:201,q:"Those who do not return their rental cars by the scheduled due date will be charged an ——– fee.",options:["addition","additionally","add","additional"],answer:3,type:"品詞問題",explanation:"空所の前後を見ます。空所の前が冠詞an、後ろが名詞fee（料金）。したがって、空所には名詞feeを修飾する形容詞の(D) additional（追加の）が適切です。",translation:"レンタカーを期限までに返却しない利用者は、追加の料金が請求されます。"},
  {id:202,q:"The marketing director told department staff that more emphasis should be placed ——– advertising through social media.",options:["from","on","into","of"],answer:1,type:"語彙問題",explanation:"空所の前がmore emphasis should be placed （より重点を置くべきである）、advertising（広告）。place emphasis on～（～に重点を置く、～を強調する）のemphasisが主語になって受動態になったと考えられます。",translation:"マーケティング部長は部門のスタッフに対して、ソーシャルメディアを使った広告をより重視するように伝えた。"},
  {id:203,q:"Of the ten accounting assistant candidates, three were invited to interview with the accounting manager ——– the first round of interviews.",options:["now that","even though","so that","after"],answer:3,type:"部分読み問題",explanation:"空所の後ろの形を見ます。the first round of interviewsで動詞がない名詞句です。カンマ以降はthree were invitedで主語+動詞の形です。これは、上の４のパターンで空所には前置詞が入ることがわかります。選択肢の中で前置詞の働きがあるのは、(D) after（～の後で）のみです。したがって、(D) after（～の後で）を選びます。",translation:"10名の経理アシスタントの候補者の中から、一次面接後に3名が経理部長との面接に招待された。"},
  {id:204,q:"Tablet sales are going ——– well this quarter that we have to decide whether to increase the number of workers in our production department.",options:["very","such","so","quite"],answer:2,type:"部分読み問題",explanation:"空所の前が動詞の現在進行形のare going 、後ろにwellがあります。もう少し後方へ行くと、that があり、これが決め手となります。いわゆるso …that構文だと考えられ、(C) soが適切です。",translation:"タブレットの売れ行きが今期順調なので、我々は生産部門の人員を増やすかどうか決めなければならない。"},
  {id:205,q:"Ms. Hollander toured more than 20 properties before making the ——– decision to purchase the house.",options:["final","finally","finalize","finalizes"],answer:0,type:"品詞問題",explanation:"空所の前後を見ます。空所の前が冠詞the、後ろが名詞decision（決定）。したがって、空所には名詞decisionを修飾する形容詞の(A) final（最終の）が適切です。",translation:"Hollanderさんは、家の購入を最終的に決める前に、20軒以上の物件の見学をした。"},
  {id:206,q:"The system is currently undergoing maintenance, so you are ——– unable to log in to the member page.",options:["slightly","commonly","overwhelmingly","temporarily"],answer:3,type:"語彙問題",explanation:"空所の前が主語とbe動詞のyou are、後ろがunable to log in toで「ログインできない」。ここで一番合いそうなのは、(D) temporarily（一時的）です。",translation:"現在システムのメンテナンス中のため、一時的に会員ページへログインできない状態になっています。"},
  {id:207,q:"The CEO explained to the employees that protecting customers’ personal information is a very ——– priority.",options:["height","high","highly","heighten"],answer:1,type:"品詞問題",explanation:"空所の前後を見ます。空所の前が冠詞と副詞のa very、後ろが名詞priority（優先すべきこと、優先［すること］）。したがって、空所には名詞priorityを修飾する形容詞の(B) high（高い）が適切です。",translation:"顧客の個人情報を守ることは非常に優先度が高いとＣＥＯは従業員に向かって説明した。"},
  {id:208,q:"The September concert by a renowned jazz pianist is very popular and should be booked ——– in advance.",options:["much","very","still","well"],answer:3,type:"語彙問題",explanation:"空所の前がshould be booked（予約すべきである）、後ろがin advance （前もって）。空所にはin advance を修飾する(D) well（十分）を入れると前後を自然につなぐことができます。",translation:"9月の名高いジャズピアニストによるコンサートはとても人気があるので、十分前もって予約してください。"},
  {id:209,q:"At James Fitness Gym, free yoga classes every Saturday afternoon are ——– available to members.",options:["exclude","exclusive","exclusively","exclusion"],answer:2,type:"品詞問題",explanation:"空所の前後を見ます。空所の前がbe動詞are、後ろが形容詞available（利用できる）。したがって形容詞availableを修飾する副詞の(C) exclusively（限定で、独占的に）が適切です。",translation:"James Fitness Gymでは、毎週土曜日午後の無料のヨガクラスはメンバーのみ参加できます。"},
  {id:210,q:"The restaurant on the top floor of the Anshelt Hotel offers a spectacular night view and an ——– dining experience.",options:["aspiring","exhausted","exceptional","applicable"],answer:2,type:"語彙問題",explanation:"空所の前が冠詞an、後ろがdining experience （食事体験）。並列で並んでいるandの前がa spectacular night view（壮観な夜景）。２つのすばらしいものが並んで提供されていると考えると、dining experience に合う形容詞は(C) exceptional（並外れた、非常に素晴らしい）が適切です。",translation:"Anshelt Hotelの最上階のレストランでは、壮観な夜景と並外れた食事を体験していただくことができます。"},
  {id:211,q:"If you have any questions about the internal network, please ask ——– Ms. Kawasaki or Mr. Miyamoto in the IT department.",options:["both","either","not only","neither"],answer:1,type:"相関接続詞問題",explanation:"空所の前が動詞ask、後ろがMs. Kawasaki or Mr. Miyamoto と A or Bの形になっています。したがってeither A or Bと考えられ、(B) eitherが適切です。",translation:"社内ネットワークについての不明な点は、IT部門のKawasakiさんかMiyamotoさんに聞いてください。"},
  {id:212,q:"——– of the travel magazines published by Paterson Magazine Corporation are ordered online.",options:["Almost","Each","Much","Most"],answer:3,type:"数量形容詞・代名詞問題",explanation:"空所の後ろのof以下の名詞句が可算名詞で複数のthe travel magazines（旅行雑誌）。動詞がareなので主語は複数になります。したがって(D) Most（ほとんど）が適切です。",translation:"Paterson Magazine Corporationが出版する旅行雑誌のほとんどはオンラインで注文される。"},
  {id:213,q:"Ms. Bai ——– her part-time employment contract with the bookstore where she is currently working for 12 months.",options:["extend","has extended","extending","will be extended"],answer:1,type:"能動態・受動態・時制に関する動詞問題",explanation:"まず、文全体の述語動詞を確認しましょう。be動詞isがありますが、これは関係副詞whereの中の動詞です。したがって他に述語動詞がないので、空所に述語動詞が入ることがわかります。選択肢のうち、述語動詞に慣れるのは、(A) extend（延長する、現在形）、(B) has extended（現在完了形）、(D) will be extended（受動態の未来形）の３つです。",translation:"Baiさんは、現在勤務している書店とのパートタイムの雇用契約を12か月延長した。"},
  {id:214,q:"Construction is scheduled for tomorrow in the Hudson district on Route 103, so ——– are encouraged to bypass that area.",options:["commutes","commuting","commuters","to commute"],answer:2,type:"品詞問題",explanation:"空所の前後を見ます。空所の前が接続詞so、後ろがare encouraged to bypass that areaと続きます。空所は主語でかつ、areの前なので可算名詞の複数となります。候補は(A) commutes（動詞もあるがここでは名詞と考えcommute「通勤」の複数形）、(B) commuting（動詞commuteの-ing形の場合、「通勤すること」、名詞の場合「通勤」）と(C) commuters（commuter「通勤者」の複数形）の３つです。",translation:"Route 103のHudson地区で工事が明日予定されているので、通勤者はその地区を迂回することが推奨されている。"},
  {id:215,q:"We will be meeting tomorrow with the keynote speaker ——– spoke at the renewable energy conference yesterday.",options:["whoever","what","who","whenever"],answer:2,type:"関係代名詞問題",explanation:"空所の前後を見ます。空所の前がthe keynote speaker (基調演説者)、後ろが動詞spoke 。先行詞が人で動詞が続くので、(C) whoが適切です。",translation:"我々は昨日の再生可能エネルギーの会議で講演した基調演説者と明日面談することになっている。"},
  {id:216,q:"The CEO mentioned ——– to build a manufacturing plant in Southeast Asia, but it is expected to take some time.",options:["planner","has been planed","planed","plans"],answer:3,type:"品詞・動詞問題",explanation:"空所の前後を見ます。空所の前が動詞mentioned、後ろがto build a manufacturing plant（製造工場を建設する）で不定詞が続きます。mentionは他動詞なので目的語が必要で空所には目的語になれる名詞が入ると考えられます。名詞は(A) planner（立案者、計画者）と(D) plans（plan「計画」の複数形）の２つになります。",translation:"CEOは、東南アジアに製造工場を建設する計画について言及したが、実現には時間がかかると予想されている。"},
  {id:217,q:"The North Forest Inn offers laptop computers for guests to borrow and also provides free Internet access service in ——– room.",options:["most of","all","each","several"],answer:2,type:"数量形容詞問題",explanation:"空所の前が前置詞in、後ろが可算名詞の単数のroom（部屋）。可算名詞の単数の前における選択肢は、(C) each（それぞれ）のみでこれを選びます。",translation:"North Forest Innではお客様にノートパソコンの貸し出しをしており、また各部屋に無料のインターネット接続サービスを提供しています。"},
  {id:218,q:"All prototypes must undergo ——– tests before proceeding to the next stage of development.",options:["outdated","preliminary","picturesque","congested"],answer:1,type:"語彙問題",explanation:"空所の前が主語All prototypes（すべての試作品）と助動詞・動詞のmust undergo（受けなければならない）、後ろが名詞tests（テスト）。選択肢の中で合うのは、(B) preliminary（予備の）です。",translation:"次の開発段階に進む前に、すべての試作品は予備テストを受けなければならない。"},
  {id:219,q:"After thorough review, the budget for next year’s product development has been divided ——– among the three projects.",options:["even","evened","evenly","evenness"],answer:2,type:"品詞問題",explanation:"空所の前後を見ます。空所の前が動詞で現在完了の受動態has been divided（分けられた）、後ろが前置詞among（～の間で）。したがって、空所にはbeen dividedを修飾する副詞の(C) evenly （均等に）が適切です。",translation:"来年の製品開発予算は、十分に検討された結果、３つのプロジェクトに均等に分配された。"},
  {id:220,q:"Users of the DXL303 monitor can adjust the brightness of the monitor according to ——– preferences.",options:["them","they","themselves","their"],answer:3,type:"代名詞問題",explanation:"空所の前後を見ます。空所の前が前置詞to、後ろが名詞のpreferences （好み）。名詞preferencesの前には所有格の(D) their（彼らの）が適切です。",translation:"DXL303モニターのユーザーは、好みに合わせてモニターの明るさを調整することができます。"},
  {id:221,q:"There are three employees ——– for promotion to accounting manager, and they are scheduled to be interviewed by the accounting director next week.",options:["frequent","eligible","brief","dominant"],answer:1,type:"語彙問題",explanation:"空所の前がthree employees（社員3名）、後ろがfor promotion（昇進のための）。前後をつなぐ適切な選択肢は(B) eligible（資格のある）です。",translation:"経理マネージャーへの昇進の資格のある社員が3人いて、来週経理部長の面接を受ける予定である。"},
  {id:222,q:"Whitfield Legal Office has spent the last two months looking for a place to move its offices, but found ——– properties that met its criteria.",options:["many","other","plenty of","few"],answer:3,type:"数量形容詞問題",explanation:"空所の後がproperties（物件）で可算名詞の複数形です。選択肢はすべて可算名詞の複数形と使えますので全体の意味を考える必要があります。とくに重要なので接続詞のbut（しかし）です。butの前の意味を確認すると「Whitfield Legal Officeはオフィスの移転先をここ2か月間探した」です。そのあとにbut（しかし）があるので、but found few properties that met its criteria（ほとんど条件を満たす物件はなかった）とすると意味が通ります。したがっての(D) few（ほとんどない）が適切です。",translation:"Whitfield Legal Officeはこの2ヶ月間、事務所の移転先を探していたが、条件に合う物件はほとんど見つからなかった。"},
  {id:223,q:"Ms. Barton was asked by her supervisor to submit a ——– of yesterday’s meeting with a business partner.",options:["summarily","summarized","summary","summarize"],answer:2,type:"品詞問題",explanation:"空所の前後を見ます。空所の前が冠詞a、後ろが前置詞of。したがって、空所には名詞が入り、名詞の(C) summary（要約）が適切です。",translation:"Bartonさんは、上司から昨日の取引先との会議の要約を提出するように求められた。"},
  {id:224,q:"If the plan had been thoroughly reviewed with his colleagues, Mr. Batista would not ——– with such difficulties.",options:["having faced","had been faced","have faced","have been faced"],answer:3,type:"能動態・受動態・時制に関する動詞問題",explanation:"If節の時制がhad been thoroughly reviewedで過去完了、主節がwould～となっているので仮定法過去完了と考えられます。",translation:"もし、その計画を同僚と一緒に徹底的に見直していたら、Batistaさんはそのような困難に直面することはなかっただろう。"},
  {id:225,q:"Springford Technologies has developed an ——– method and automated testing system.",options:["efficiencies","efficient","efficiently","efficiency"],answer:1,type:"品詞問題",explanation:"空所の前後を見ます。空所の前が冠詞an、後ろが名詞method（方法）。したがって、空所には名詞methodを修飾する形容詞の(B) efficient（効率的な）が適切です。",translation:"Springford Technologiesは効率的な検査方法と自動化された検査システムを開発した。"},
  {id:226,q:"System problems that have been occurring since last week need to be ——– urgently.",options:["founded","accompanied","addressed","praised"],answer:2,type:"語彙問題",explanation:"主語は、System problemsです。thatは関係代名詞でlast weekまでは主語の説明なります。動詞の部分がneed to beで「～される必要がある」なので、System problems（システムの問題）はneed to be addressed（対処される必要がある）とすると意味が通ります。したがって(C) addressedが適切です。",translation:"先週から発生しているシステムの不具合について緊急に対処しなければならない。"},
  {id:227,q:"At Amador Bicycle Shop, sales of bicycle parts rose ——– compared to the previous quarter.",options:["slighter","slight","slightest","slightly"],answer:3,type:"品詞または比較問題",explanation:"空所の前後を見ます。空所の前が主語sales of bicycle parts（自転車用部品の売上）が rose（増加した）、後ろがcompared to（～と比較して）。",translation:"Amador Bicycle Shopでは、前の四半期と比べて、自転車用部品の売り上げはわずかに増加した。"},
  {id:228,q:"The city plans to host environmental events to ——– awareness of the new resource conservation program.",options:["raise","discard","proofread","reimburse"],answer:0,type:"語彙問題",explanation:"空所の後ろの目的語awareness（認知度）で、これと合うのが(A) raise（上げる）です。",translation:"市は、新しい資源節約プログラムの認知度を上げるために、環境関連のイベントを主催する計画をしている。"},
  {id:229,q:"If you are late returning a rental car for any reason, ——– sure to call the office as soon as possible.",options:["to make","make","making","made"],answer:1,type:"動詞問題",explanation:"If節は、you areが主語と動詞です。主節の述語動詞を探すとcallは不定詞なので述語動詞がありません。したがって空所には述語動詞が入り、動詞の原形で始まる命令文だと考えられます。したがって、動詞の原形の(B) makeが適切です。",translation:"何らかの理由でレンタカーの返却が遅れる場合、できるだけ早めに営業所に電話をしてください。"},
  {id:230,q:"To participate in this weekend’s Adventure Tour, you must be ——– 12 years old.",options:["above all","at least","so far","at the latest"],answer:1,type:"語彙問題",explanation:"空所の前がyou must be （あなたは～なければならない）、12 years old（12歳）です。選択肢の中で合うのは(B) at least（少なくとも）です。",translation:"今週末のAdventure Tourに参加するには、12歳以上でなければならない。"},
  {id:231,q:"Hillside Amusement Park is one of the most popular tourist ——– in the area and many people visit there.",options:["attracts","attractions","attractive","attractively"],answer:1,type:"品詞問題",explanation:"空所の前後を見ます。空所の前がone of the most popular tourist（最も人気のある観光…のひとつ）、後ろが前置詞in。",translation:"Hillside Amusement Parkはその地域で最も人気のある観光名所の一つで、多くの人がそこを訪れます。"},
  {id:232,q:"To ——– to our Budget Travel Magazine, you can sign up either by mail or on our website.",options:["promote","establish","prescribe","subscribe"],answer:3,type:"語彙問題",explanation:"空所の前が不定詞のto, 前置詞toに our Budget Travel Magazine（私たちのBudget Travel Magazine）。前置詞toと雑誌名が続くので、(D) subscribe（定期購読する subscribe toで「～を定期購読する」）が適切です。",translation:"当社のBudget Travel Magazineを定期購読するためには、郵送または当社のウェブサイトで申し込みをすることができます。"},
  {id:233,q:"Lucas Programing school offers a wide ——– of programming courses for beginners, including children.",options:["variety","varieties","vary","various"],answer:0,type:"品詞問題",explanation:"空所の前後を見ます。空所の前が冠詞aと形容詞wide、後ろが前置詞of。したがって、空所には名詞が入ります。名詞は単数形の(A) varietyと複数形の(B) varietiesがありますが、冠詞がaなので単数形の名詞が入ります。したがって(A) variety（種類）が適切です。",translation:"Lucas Programing schoolは子供を含む初級者向けに幅広いプログラミングコースを提供している。"},
  {id:234,q:"Ms. Cheng and Ms. Matsui were asked to ——– the cause of yesterday’s machine malfunction.",options:["accommodate","suspend","examine","decline"],answer:2,type:"語彙問題",explanation:"空所の後ろの目的語の位置にthe cause（その原因）があります。これと合うのは(C) examine（詳しく調べる）です。",translation:"ChengさんとMatsuiさんは、昨日の機械の故障の原因を調べるように依頼された。"},
  {id:235,q:"——– hundreds of medical professionals at a convention in Seoul last week.",options:["A few","Some of the","Having had","There were"],answer:3,type:"語彙問題",explanation:"まず、動詞を確認しましょう。空所以降をみていくと動詞がありません。したがって空所には動詞を含んだものが入ることになり、動詞を含んでいるのは(D) There wereのみでこれを選びます。",translation:"先週、数百人の医学の専門家がソウルの会議にいた。"},
  {id:236,q:"Ms. Lee’s extensive ——– and sufficient work experience make her the perfect candidate for the position.",options:["experts","expert","expertise","expertly"],answer:2,type:"品詞問題",explanation:"空所の前後を見ます。空所の前が所有格のMs. Lee’s と形容詞extensive （広範囲に及ぶ）、後ろがandとsufficient practical experience （十分な実務経験）です。空所には形容詞extensiveが修飾する名詞が入りますが、名詞が選択肢の中に３つあります。",translation:"Leeさんは広範囲に及ぶ専門知識と十分な実務経験があるので、そのポジションに最適な候補者である。"},
  {id:237,q:"Please submit your summer vacation schedule by the end of this week ——– your preferred vacation dates can be approved.",options:["due to","so that","despite","therefore"],answer:1,type:"部分読み問題",explanation:"空所の前は命令文で動詞はsubmit（提出する）。空所の後ろの形を見ると、your preferred vacation dates can be approvedで主語+動詞の形です。これは、上の２のパターンで空所には接続詞が入ることがわかります。選択肢の中で接続詞は、(B) so that（～するように）のみです。したがって、(B) so that（～するように）を選びます。",translation:"希望の休暇日程が承認されるように、今週末までに夏季休暇の予定を提出してください。"},
  {id:238,q:"The latest survey report indicates that demand for existing homes is a bit ——– than expected.",options:["lowest","lowing","low","lower"],answer:3,type:"品詞または比較問題",explanation:"空所の前後を見ます。空所の前がbe動詞isと副詞句a bit（少し）、後ろがthanです。thanがあるので空所は比較級が適切です。選択肢の中で比較級は(D) lowerのみでこれを選びます。(D) lower はbe動詞と副詞句a bitの後にあるので形容詞の比較級です。",translation:"最新の調査報告書によれば、中古住宅の需要は予想より少しばかり低いことが示されている。"},
  {id:239,q:"As an apology for this delivery delay, we would like to ——– shipping charges for your next order.",options:["commend","implement","waive","postpone"],answer:2,type:"語彙問題",explanation:"空所の前がwould like to（～したい）、後ろが空所の動詞の目的語shipping charges（送料）。目的語のshipping charges（送料）と合うのは(C) waive（差し控える、［権利などを］放棄する）です。",translation:"今回の配送遅延のお詫びとして、次の注文の送料を無料とさせていただきます。"},
  {id:240,q:"Mr. Toyota in the public relations department has a wealth of ideas ——– a great ability to put them into action.",options:["in addition to","as long as","furthermore","because"],answer:0,type:"部分読み問題",explanation:"空所の後ろの形を見ます。a great ability to put them into actionで動詞がない名詞句です。空所の前は主語Mr. Toyota 、動詞がhas で主語+動詞の形です。これは、上の４のパターンで空所には前置詞が入ることがわかります。選択肢の中で前置詞は、(A) in addition to（～に加えて）のみです。したがって、(A) in addition to（～に加えて）を選びます。",translation:"広報部のToyotaさんは、アイデアが豊富であることに加えてそれを実行に移す能力が高い。"},
  {id:241,q:"After obtaining estimates from several design firms, it proved too ——– to restore that historic building.",options:["cost","costly","costs","costing"],answer:1,type:"品詞問題",explanation:"空所の前後を中心に見ていきます。空所の前がit proved tooで代名詞+動詞の過去+副詞、後ろがto restore that historic building（その歴史的な建物を修復すること）の不定詞。itは仮主語（形式主語）で、it= to restore that historic buildingと考えられます。ここでのprovedの意味は「～であることがわかる」としてみましょう。",translation:"いくつかの設計事務所から見積もりを入手した後で、その歴史的な建物を修復するには多額の費用がかかることがわかった。"},
  {id:242,q:"Average temperatures in Vancouver in May were ——– low compared to a normal year.",options:["closely","shortly","anonymously","relatively"],answer:3,type:"語彙問題",explanation:"空所は後ろの形容詞low（低い）を修飾します。lowと合うのは(D) relatively（比較的）です。",translation:"5月のバンクーバーの平均気温は、平年に比べて比較的低かった。"},
  {id:243,q:"The CEO ——– employees by providing a detailed explanation of the situation regarding the merger with Zell Printing Company.",options:["itemized","distributed","reassured","launched"],answer:2,type:"語彙問題",explanation:"空所の前は主語のThe CEO、後ろは目的語のemployees（社員）。主語のThe CEOと目的語employeesをつなぐ適切な動詞は、(C) reassured（reassure「安心させる」の過去形）です。reassureは金のフレーズには入っていませんが、ここ最近TOEICで見かける頻度が増えてきている印象です。",translation:"CEOはZell Printing Companyとの合併について状況を詳しく説明することで社員を安心させた。"},
  {id:244,q:"The use of social media advertising has ——– increased the number of inquiries about new products.",options:["significantly","significance","most significant","significant"],answer:0,type:"品詞または比較問題",explanation:"空所の前後を見ます。空所の前が現在完了の助動詞has、後ろが動詞の過去分詞increased。したがって空所には動詞の過去分詞increasedを修飾する副詞の(A) significantly（著しく）が適切です。",translation:"ソーシャルメディアの広告を活用したことで、新商品に対する問い合わせが著しく増えた。"},
  {id:245,q:"Training was provided to customer support staff to ——– replies to inquiries.",options:["host","expedite","found","remodel"],answer:1,type:"語彙問題",explanation:"空所は後ろがreplies to inquiries（問い合わせに対する返信）です。これと合うのは(B) expedite （早める、促進させる）です。",translation:"問い合わせに対する返信を迅速にするために、カスタマーサーポートのスタッフに対して研修が実施された。"},
  {id:246,q:"While Ms. Hernandez’s study was on the consumption habits of the younger generation, ——– was on the behavioral patterns of the elderly.",options:["I","myself","me","mine"],answer:3,type:"代名詞問題",explanation:"空所の後がbe動詞wasなので、空所は主語だと考えられます。主語になれるのは、主格の(A) Iと所有代名詞の(D) mineです。",translation:"Hernandezさんの研究は若い世代の消費性向である一方で、私のものは高齢者の行動パターンであった。"},
  {id:247,q:"——– its unique technology, Lederer Systems has maintained its position as an industry leader for many years.",options:["Nevertheless","Unless","Consequently","Thanks to"],answer:3,type:"部分読み問題",explanation:"空所の後ろの形を見ます。its unique technologyで動詞がない名詞句です。カンマ以降はLederer Systems has maintainedで主語+動詞の形です。これは、上の3のパターンで空所には前置詞が入ることがわかります。選択肢の中で前置詞は、(D) Thanks to（～のおかげで）のみです。したがって、(D) Thanks to（～のおかげで）を選びます。",translation:"独自の技術のおかげで、Lederer Systemsは、長年業界のリーダーとして地位を維持してきた。"},
  {id:248,q:"Margaret Allen received the JDI Award ——– outstanding achievements in new drug development.",options:["into","for","except","at"],answer:1,type:"語彙問題",explanation:"空所の前がreceived the JDI Award（JDI Awardを受賞した）、後ろがoutstanding achievements（ずばぬけた業績）。「賞を受賞した」理由が「ずばぬけた業績」と考えられるので、(B) for（～のため）が適切です。",translation:"Margaret Allenさんは、新薬の開発における優れた業績のためJDI Awardを受賞した。"},
  {id:249,q:"After today’s leadership training, please fill out the ——– located on the desk in the back of the room and submit it next time.",options:["regulation","architect","exhibition","questionnaire"],answer:3,type:"語彙問題",explanation:"空所の前がfill out （記入する）で、これに合うのが(D) questionnaire（アンケート）です。",translation:"本日のリーダーシップ研修の後で、後ろの机の上のあるアンケートに記入して次回、提出してください。"},
  {id:250,q:"The audio equipment in conference room 103 was out of order, so conference room 201 was used ——–.",options:["respectively","beforehand","instead","consistently"],answer:2,type:"語彙問題",explanation:"空所の近くだけでは判断できないので、全体の意味を取ってみます。",translation:"会議室103のオーディオ機器に不具合があったため、代わりに会議室201を使った。"},
  {id:251,q:"Dr. Tsai has been invited as a keynote ——– at the upcoming Mechanical Engineering Conference.",options:["spoken","speakers","speaker","speaking"],answer:2,type:"品詞問題",explanation:"空所の前後を見ます。空所の前がinvited as（～として招待される）に冠詞aと名詞または形容詞のkeynoteが続き、後ろが前置詞at。名詞(C) speakerを選択すると、invited as a keynote speaker（基調講演者として招待される）となり意味が通ります。",translation:"Tsai博士が今度の機械工学学会の基調講演者として招待されている。"},
  {id:252,q:"One of the items you ordered is currently out of ——– and will be shipped as soon as it is received.",options:["order","service","shape","stock"],answer:3,type:"語彙問題",explanation:"空所の前が主語One of the items you ordered is currently （注文した商品のひとつが現在…）にout ofが続きます。空所の次のand以降はwill be shipped as soon as it is received（受け取られたらすぐに出荷される）です。したがって(D) stock（out of stockで「在庫切れ」）が適切です。",translation:"あなたの注文した商品の一つが現在在庫切れのため、入荷次第、発送されます。"},
  {id:253,q:"The extension of the term of the Chairman of the Recycling Promotion Committee was approved ——–.",options:["keenly","unanimously","relatively","considerably"],answer:1,type:"語彙問題",explanation:"空所の前がwas approved （承認された）でこの動詞と合う選択肢は(B) unanimously（満場［全会］一致で）です。",translation:"リサイクル推進委員会の会長の任期延長が満場一致で承認された。"},
  {id:254,q:"Directions for replacing parts of the printer ——– in the attached operation manual.",options:["have included","include","are including","are included"],answer:3,type:"動詞問題",explanation:"主語Directions（使用法、指示）がin the attached operation manual（添付の操作マニュアル）に「含まれている」という受動態が適切です。したがって受動態の(D) are included（含まれている）を選びます。",translation:"プリンターの部品を交換する方法は、添付の操作マニュアルに記載されています。"},
  {id:255,q:"——– the accounting and human resources departments are located on the second floor of the main office.",options:["Both","Neither","Not only","Either"],answer:0,type:"相関接続詞問題",explanation:"空所の後ろがthe accounting and human resources departments と A and Bの形になっています。したがってboth A and Bと考えられ、(A) Bothが適切です。",translation:"経理部と人事部の両部門は本社の2階にあります。"},
  {id:256,q:"The number of visitors to yesterday’s charity concert rose by ——– 20% compared to last year.",options:["vaguely","accordingly","nearly","strongly"],answer:2,type:"語彙問題",explanation:"空所の後ろが20％でこれに合う選択肢は(C) nearly（ほぼ、大体）です。",translation:"昨日のチャリティーコンサートの来場者数は去年と比べてほぼ20%増加した。"},
  {id:257,q:"Considering Ms. Peters’ excellent accomplishments, she is one of the most ——– candidates in next month’s election for mayor.",options:["multiple","evident","accurate","promising"],answer:3,type:"語彙問題",explanation:"空所の前が最上級most、後ろがcandidates （候補者）。「最も有望な候補者」とするのが適切です。したがって(D) promising（有望な）を選びます。",translation:"Petersさんの素晴らしい業績を考慮すると、来月の市長選挙で最も有望な候補者の一人です。"},
  {id:258,q:"The new inexpensive material developed by Copley Tech is highly ——– to stains.",options:["resisted","resistant","resistance","resist"],answer:1,type:"品詞問題",explanation:"空所の前後を見ます。空所の前がbe動詞と副詞highly（非常に）、後ろが前置詞toにstains（染み）。したがって、空所には前後をつなぐ形容詞の(B) resistant（耐久性のある、抵抗力のある）が適切です。",translation:"Copley Techが開発した安価な新素材は、染みに対して非常に耐性がある。"},
  {id:259,q:"The welcome party for Ms. Costa ——– next Friday after work in the conference room on the second floor.",options:["was held","holds","will hold","will be held"],answer:3,type:"能動態・受動態・時制に関する動詞問題",explanation:"空所の後にnext Friday（来週の金曜日）があるので未来形だとわかります。未来形は能動態の(C) will holdと受動態の(D) will be heldの２つです。",translation:"Costaさんの歓迎会は、来週の金曜日の終業後、2階の会議室で開催されます。"},
  {id:260,q:"The latest version of the long-awaited accounting software will ——– be released tomorrow.",options:["finalize","finally","final","finalizing"],answer:1,type:"品詞問題",explanation:"空所の前後を見ます。空所の前が助動詞will、後ろがbe動詞の原形beと過去分詞のreleased（発売された）が続きます。",translation:"ついに待望の最新版の会計ソフトが明日発売されます。"},
  {id:261,q:"The application deadline for the craft class is next Monday, so those interested should submit their paperwork as ——–— as possible.",options:["quick","quicken","quickly","quickness"],answer:2,type:"品詞問題",explanation:"空所の前後を見ます。空所の前がas、後ろがasの原級比較であることがわかります。このas ～asの間には形容詞か副詞が入り、形容詞の(A) quick（すばやい）、または副詞の(C) quickly（すばやく）のどちらかになります。この問題では、動詞submitを修飾するので副詞の(C) quickly（すばやく）が適切です。",translation:"工芸教室の申込期限が来週の月曜なので、希望者はできるだけ早めに書類を提出してください。"},
  {id:262,q:"——– the congested traffic in the center of the city, we managed to make it to our client meeting on time.",options:["Despite","Although","Now that","In order that"],answer:0,type:"部分読み問題",explanation:"空所の後ろの形を見ます。the congested traffic in the center of the cityで動詞がない名詞句です。カンマ以降はwe managedで主語+動詞の形です。これは、上の3のパターンで空所には前置詞が入ることがわかります。選択肢の中で前置詞は、(A) Despite（～にもかかわらず）のみです。したがって、(A) Despite（～にもかかわらず）を選びます。",translation:"市の中心部の渋滞にもかかわらず、わたしたちは顧客との打ち合わせにどうにか間に合うことができた。"},
  {id:263,q:"Upon ——–, materials on redevelopment projects in the Pura area can be made available to the public.",options:["duration","token","request","allowance"],answer:2,type:"語彙問題",explanation:"空所の前がUpon 。これと合うのが(C) request（要求・請求）。Upon requestは「要求・請求に応じて、要求・請求があれば」です。",translation:"要求があれば、Pura地区の再開発プロジェクトの資料を公開することができます。"},
  {id:264,q:"Sapporo is the largest city in Hokkaido, ——– population is about 2 million and steadily increasing.",options:["its","which","their","whose"],answer:3,type:"関係代名詞・代名詞問題",explanation:"文の全体の構造を見ていきます。空所の前がSapporo is で主語と動詞、その後に補語the largest cityが続き、主語+動詞の文構造になっています。空所の後は、population isで主語と動詞があり、その後に補語about 2 millionが続き、同じように主語+動詞の文構造になっています。",translation:"札幌は北海道最大の都市であり、その人口は約２００万人で着実に増加している。"},
  {id:265,q:"Materials ——– for painting classes must be purchased and prepared in advance.",options:["necessitate","necessary","necessity","necessarily"],answer:1,type:"品詞問題",explanation:"空所の前後を見ます。空所の前が名詞Materials（材料）、後ろが前置詞forと名詞句painting classes（絵画クラス）が続きます。",translation:"絵画クラスに必要な材料は、事前に購入して準備する必要がある。"},
  {id:266,q:"Renowned consultant Emilio Gomez ——– will directly instruct participants in the marketing workshop.",options:["he","himself","his","him"],answer:1,type:"代名詞問題",explanation:"空所の前後を見ます。空所の前がRenowned consultant Emilio Gomez（著名なコンサルタントのEmilio Gomezさん）、後ろが助動詞will。",translation:"著名なコンサルタントのEmilio Gomezさん自身が直接、マーケティング研修会の参加者を指導いたします。"},
  {id:267,q:"If it had not rained, the outdoor performances by local artists would not ——–.",options:["postponed","have postponed","have been postponed","had been postponed"],answer:2,type:"能動態・受動態・時制に関する動詞問題",explanation:"If節の時制がhad not rainedで過去完了、主節がwould not ～となっているので仮定法過去完了と考えられます。",translation:"もし雨が降っていなければ、地元のアーティストによる屋外公演は延期されなかっただろう。"},
  {id:268,q:"——– increasing the sales staff, we were able to improve sales by approximately 20% this year.",options:["Contrary to","On behalf of","As a result of","Regardless of"],answer:2,type:"語彙問題",explanation:"空所の後ろがincreasing the sales staff（セールス人員を増加すること）、カンマ以降の主節の意味は「今年度は売り上げを約20％伸ばすことができた」",translation:"セールスの人員を増やした結果、今年度は売り上げを約20％伸ばすことができた。"},
  {id:269,q:"Sratus Technology’s batteries sell well because they have a ——– lifespan than competing products.",options:["long","length","longest","longer"],answer:3,type:"品詞または比較問題",explanation:"空所の前後を見ます。空所の前が冠詞a、後ろが名詞lifespan （寿命）とthanが続きます。thanがあるので空所は形容詞の比較級が適切で、(D) longer（より長い）を選びます。",translation:"Sratus Technologyの電池は競合製品より長持ちするのでよく売れている。"},
  {id:270,q:"Greer Travel Agency specializes in planning trips ——– to each individual’s needs.",options:["tailoring","tailored","tailors","tailor"],answer:1,type:"動詞問題",explanation:"文の動詞はspecializes（専門とする）がすでにあります。したがって、述語動詞の形の(C) tailors（tailor「合わせる」の三人称単数現在形）と動詞の原形の(D) tailor（合わせる）は前後に接続詞などがないので入りません。",translation:"Greer Travel Agencyは、各個人のニーズに合わせた旅行の企画を専門としている。"},
  {id:271,q:"Please submit your survey form as soon as possible ——– your responses can be included in the survey results.",options:["even if","therefore","so that","because of"],answer:2,type:"全文読み問題",explanation:"空所の後ろの形を見ます。your responses can be includedで主語+動詞の形です。空所の前は命令文で動詞はsubmitです。これは、上の2のパターンで空所には接続詞が入ることがわかります。選択肢の中で接続詞は、(A) even if（たとえ～としても）と(C) so that（～するように）です。",translation:"回答が調査結果に含まれるようにできるだけ早くアンケート用紙を提出してください。"},
  {id:272,q:"Mougey Corporation ——– a new personnel system for all employees by the end of this fall.",options:["has introduced","will be introducing","was introducing","will be introduced"],answer:1,type:"能動態・受動態・時制に関する動詞問題",explanation:"by the end of this fall（今年の秋の終わりまでに）とあるので未来時制になります。未来時制は(B) will be introducingと(D) will be introducedがあります。",translation:"Mougey Corporationは、今年の秋が終わるまでにすべての社員に対して新しい人事制度を導入するつもりである。"},
  {id:273,q:"——– the five employees eligible for promotion, Ms. Oswald is seen as the most promising.",options:["With","For","Toward","Of"],answer:3,type:"語彙問題",explanation:"空所の後ろがthe five employees eligible for promotion（昇進の資格のある5人の社員）、カンマ以降はMs. Oswald is seen as the most promising（Oswaldさんは最も有望とみられている）で最上級the most promisingが含まれています。",translation:"5人の昇進の資格のある社員のなかで、Oswaldさんが最も有望とみられている。"},
  {id:274,q:"——– manufacturing processes have resulted in a 30% increase in productivity.",options:["Improving","To improve","Improved","Improve"],answer:2,type:"動詞問題",explanation:"問題文の述語動詞はhave resulted の部分と考えられます。このとき空所からprocessesまでが主語になります。",translation:"製造工程が改善されたことにより、生産性が30％増加する効果が表れた。"},
  {id:275,q:"It is difficult to determine the cost of production because the prices of raw materials are ——– changing.",options:["constantly","formerly","respectively","initially"],answer:0,type:"語彙問題",explanation:"空所の前がbe動詞are、後ろがchanging（変化している）。動詞changingと合うのは(A) constantly（絶えず）で、これを選びます。",translation:"原材料の価格が絶え間なく変化するので、製造原価を決めるのが難しい。"},
  {id:276,q:"This banquet hall can ——– up to 200 people, and reservations can be made six months prior to the event.",options:["generate","accommodate","achieve","enhance"],answer:1,type:"語彙問題",explanation:"空所の前の主語がThis banquet hall（この宴会場）、後ろがup to 200 people（200人まで）とあるので、(B) accommodate（収容する）が適切です。",translation:"この宴会場は最大200名収容でき、予約はイベントの6か月前から受け付けております。"},
  {id:277,q:"——– rooms in our hotel have Wi-Fi access and are equipped with a charger for smartphones.",options:["Every","Each","Almost","All"],answer:3,type:"数量形容詞問題",explanation:"空所の後ろがroomsで可算名詞の複数形です。可算名詞の複数形の前に置けるのは(D) All（すべての）のみで、これを選びます。",translation:"当ホテルでは、すべての客室でWi-Fiが利用でき、かつスマートフォン用の充電器が備えられています。"},
  {id:278,q:"Riverdale Fresh Market sells locally grown produce at ——– prices.",options:["thorough","eligible","reasonable","proficient"],answer:2,type:"語彙問題",explanation:"空所の前が前置詞at、後ろがprices（価格）。「手ごろな価格」が自然な表現なので(C) reasonable（手ごろな）を選びます。",translation:"Riverdale Fresh Marketは地元で採れた農産物をお手頃な価格で販売しています。"},
  {id:279,q:"Advances in communication technology allow workers to work from home ——–.",options:["easier","ease","more easily","easiest"],answer:2,type:"品詞問題",explanation:"空所の前がto work from home（家から働く＝在宅勤務する）で動詞work（働く）を修飾する副詞の(C) more easily（いっそう容易に）が適切です。",translation:"コミュニケーションテクノロジーの進歩によって、在宅勤務がいっそう容易になってきている。"},
  {id:280,q:"——– being lightweight, this laptop has a longer-lasting battery than other models.",options:["In addition","As well","Besides","Now that"],answer:2,type:"部分読み問題",explanation:"空所の後ろの形を見ます。being lightweightで動詞がない名詞句です。カンマ以降の主節はthis laptop hasで主語+動詞の形です。これは、上の3のパターンで空所には前置詞が入ることがわかります。選択肢の中で前置詞は、(C) Besides（～の他に）のみです。したがって(C) Besides（～の他に）を選びます。",translation:"このノートパソコンは軽量であることの他に、他の機種よりもバッテリーが長持ちする。"},
  {id:281,q:"The Premier Membership Plan is our most popular program, but ——– are worth considering.",options:["something","another","each","others"],answer:3,type:"数量・不定代名詞問題",explanation:"空所の後ろがbe動詞areなので主語は名詞の複数形になります。選択肢の中で複数形は(D) others（他のもの）だけなのでこれを選択します。",translation:"Premier Membership Planは最も人気のあるプログラムですが、他のプログラムも検討の価値があります。"},
  {id:282,q:"All the information you need to properly maintain your new machine ——– in the instruction manual.",options:["will provide","is provided","provided","have been provided"],answer:1,type:"能動態・受動態・時制に関する動詞問題",explanation:"主語は、All the information（すべての情報）、空所の後がin the instruction manual（取扱説明書の中で）です。",translation:"新しい機械を適切に保守するためのすべての情報は取扱説明書で提供されています。"},
  {id:283,q:"To ensure high production quality, ——– maintenance of the machines is very important.",options:["periodically","periods","periodic","periodicals"],answer:2,type:"品詞問題",explanation:"空所の後を見ます。空所の後ろが名詞maintenance（メンテナンス。保守）。したがって、空所には名詞maintenanceを修飾する形容詞の(C) periodic（定期的な）が適切です。",translation:"高い製造品質を保つために、機械の定期的なメンテナンスは非常に重要である。"},
  {id:284,q:"The management of Croyell Manufacturing is very pleased with the company’s steady ——– and increasing revenues.",options:["growth","grow","grown","grew"],answer:0,type:"動詞または品詞問題",explanation:"空所の前を見ます。所有格+形容詞でthe company’s steady（会社の着実な）、空所の後ろがandと名詞句increasing revenues（増加している収益）。したがって、空所には形容詞steadyが修飾する名詞の(A) growth（成長）が適切です。andで並列にsteady growth とincreasing revenuesをつないでいます。",translation:"Croyell Manufacturingの経営陣は、会社が着実に成長して収益が増加していることをとても喜んでいる。"},
  {id:285,q:"This year’s annual meeting was ——– well attended that we need to consider changing to a venue with a larger capacity next year.",options:["too","such","very","so"],answer:3,type:"部分読み問題",explanation:"空所の前がbe動詞のwas 、後ろにwell attended（出席が多かった）があります。その後にthat があり、これが決め手となります。いわゆるso …that構文だと考えられ、(D) soが適切です。",translation:"今年の年次総会はあまりにも出席者が多かったので、来年は収容人数の多い会場へ変更する検討をしなければならない。"},
  {id:286,q:"The results of this customer satisfaction survey were almost consistent with past ——–.",options:["found","find","findings","finds"],answer:2,type:"動詞または品詞問題",explanation:"問題文の述語動詞はwereと考えられます。したがって、動詞の現在形の(B) findと三人称単数現在形の(D) findsは間に接続詞がないので除外されます。",translation:"今回の顧客満足度調査の結果は、過去の調査結果とほぼ一致した。"},
  {id:287,q:"The main ——– of this notice is to ensure that all employees make efficient use of resources in the workplace.",options:["experience","objective","confirmation","choice"],answer:1,type:"語彙問題",explanation:"空所の前がThe main （主な）、後ろの動詞部分がis to ensure that（ that以下を確実にすることである）。(B) objective（目的）を選択すると、「主な目的は、～を確実にすることである」となり自然な表現になります。したがって(B) objective（目的）が適切です。",translation:"このお知らせの主な目的は、職場で資源を効率的に活用することをすべての社員に徹底してもらうことです。"},
  {id:288,q:"More ——– ways to acquire new clients will be discussed at tomorrow’s sales meeting.",options:["effectively","effective","effectiveness","effect"],answer:1,type:"品詞問題",explanation:"空所の前後を見ます。空所の前がmore、後ろが名詞ways（方法）。したがって、空所には名詞waysを修飾する形容詞の(B) effective（効果的な）が適切です。more effectiveは比較級で「より効果的な」になります。",translation:"新規顧客を開拓するより効果的な方法について、明日のセールス会議で議論される予定です。"},
  {id:289,q:"Ms. Alonso demonstrated exceptional solution skills when ——– with difficulties.",options:["confronts","confront","confronting","confronted"],answer:3,type:"動詞問題",explanation:"空所の前が、接続詞when、空所の後ろが前置詞withです。whenは接続詞なので通常は主語と動詞がきますが、主節の主語と同じ場合は、主語とbe動詞が省略されることがあります。また、後ろにwithがあるのでbe confronted with（～に直面する）の形が考えられます。",translation:"Alonsoさんは、困難に直面した時、並外れた解決能力を発揮した。"},
  {id:290,q:"You must sign up three days in advance at the ——– to receive individual counseling on dietary issues.",options:["late","later","lately","latest"],answer:3,type:"品詞または比較問題",explanation:"空所の前後を見ます。空所の前が前置詞atと冠詞the、後ろのto以下が不定詞。空所に最上級の(D) latestを入れると、at the latest（遅くとも）になります。したがって(D) latestが適切です。",translation:"食事に関する個別カウンセリングを受けるには遅くとも3日前までに申し込まなければならない。"},
  {id:291,q:"Product brochures and samples will be ——– to visitors at the upcoming new product presentation.",options:["imported","received","obtained","distributed"],answer:3,type:"語彙問題",explanation:"主語がProduct brochures and samples（製品のパンフレットとサンプル）、空所の後ろがto visitors（来場者へ）。",translation:"今度の新製品説明会では、製品のパンフレットとサンプルが来場者に配布されます。"},
  {id:292,q:"At least three years of ——– experience is required to apply for the welder position listed on the job posting site.",options:["professional","profession","professionalism","professionally"],answer:0,type:"品詞問題",explanation:"空所の前後を見ます。空所の前が前置詞of、後ろが名詞experience（経験）。したがって、空所には名詞experienceを修飾する形容詞の(A) professional（職業上の、専門的な）が適切です。",translation:"求人情報サイトに掲載されている溶接工の職に応募するには、少なくとも3年の実務経験が必要である。"},
  {id:293,q:"After a thorough review, ——– minor changes were made to the building purchase agreement.",options:["every","much","a few","each"],answer:2,type:"数量形容詞問題",explanation:"空所の後ろがminor changes（小さな変更）で可算名詞の複数形です。選択肢のうち可算名詞の複数形につくのは(C) a few（少しの）のみでこれを選択します。",translation:"徹底的に見直した後で、数か所の小さな変更が建物売買契約に加えられた。"},
  {id:294,q:"Last year the Hudson Art Museum ——– a quarterly newsletter to its members.",options:["published","corresponded","resided","intended"],answer:0,type:"語彙問題",explanation:"空所の後ろが、動詞の目的語のa quarterly newsletter（季刊［4半期に1回］のニュースレター）。この目的語を合うのは(A) published（発行した）でこれを選びます。",translation:"昨年Hudson Art Museumは季刊のニュースレターを会員向けに発行した。"},
  {id:295,q:"——– the renovation of the second floor has been completed, the Human Resources Department can return to its original workplace.",options:["Now that","Consequently","Due to","Regarding"],answer:0,type:"<strong>接続詞・前置詞・副詞問題</strong>",explanation:"空所の後ろの形を見ます。the renovation of the second floor has been completedで主語+動詞の形です。カンマ以降はthe Human Resources Department can returnで主語+動詞の形です。これは、上の１のパターンで空所には接続詞が入ることがわかります。選択肢の中で接続詞は(A) Now that（今や～だから）のみでこれを選びます。",translation:"２階の改装工事が終わったので、人事部はもとの職場に戻ることができる。"},
  {id:296,q:"New employees in the Quality Control Department will be given their ——– by their immediate supervisors next Monday.",options:["assigned","assign","assignment","assigns"],answer:2,type:"動詞または品詞問題",explanation:"空所の前が代名詞所有格のtheir、後ろが前置詞by。したがって空所には所有格が修飾する名詞が入ることがわかり、名詞の(C) assignment（業務）が適切です。",translation:"品質管理部の新入社員は、来週の月曜日に業務を直属の上司から与えられることになっている。"},
  {id:297,q:"The deadline for submitting proposals for new construction in the Stanley district has been ——– by one week.",options:["expanded","published","relocated","extended"],answer:3,type:"語彙問題",explanation:"問題文の主語はThe deadline（締め切り）です。空所の前がhas beenで受動態であることがわかり、主語と合う受動態の動詞は(D) extended（延長された）でこれを選びます。空所の後ろのby one week（1週間だけ）とも合います。",translation:"Stanley地区の新築物件の提案書の提出期限が1週間延期されることになりました。"},
  {id:298,q:"——– those who pass the first round of selection will receive an email with instructions for the second round.",options:["If","Only","Upon","Before"],answer:1,type:"語彙問題",explanation:"問題文の述語動詞は、will receiveのところです。文頭に接続詞がくる場合は、上のパターン１のようにカンマ区切りでそのあとに（主語S）+（動詞V）がきますが、この問題文ではありません、したがって接続詞は入りません。",translation:"1次審査の選考会を通過した方だけが、2次審査の案内メールを受け取ることになります。"},
  {id:299,q:"If you do not renew your fitness center membership, it will ——– on June 30.",options:["extend","pursue","undergo","expire"],answer:3,type:"語彙問題",explanation:"Ifの節が「フィットネスジムの会員資格を更新しない場合」という意味です。空所の前のit（your fitness center membership）が6月30日に「有効期限が切れる」とすると意味が通ります。したがって(D) expire（有効期限が切れる）を選択します。",translation:"フィットネスジムの会員資格を更新しない場合、６月30日で有効期限が切れます。"},
  {id:300,q:"Only auto parts that have passed ——– tests will be shipped from this factory.",options:["spacious","rigorous","acclaimed","cautious"],answer:1,type:"語彙問題",explanation:"空所の前が現在完了形の動詞have passed（通過した、合格した）、後ろが名詞tests（検査）。(B) rigorous（厳格な）を入れると、「厳格な検査に合格した」という意味になり適切です。したがって(B) rigorous（厳格な）を選びます。",translation:"当工場では厳格な検査に合格した自動車部品だけが出荷されます。"},
  {id:301,q:"Sales representatives at East Greenville Corporation are recommended to ——– utilize their customer database to increase sales.",options:["actively","activity","activate","active"],answer:0,type:"品詞問題",explanation:"空所の前後を見ます。空所の前が不定詞のto、後ろが動詞の原形のutilize（利用する、活用する）。したがって、空所には動詞utilizeを修飾する副詞の(A) actively（積極的に）が適切です。",translation:"East Greenville Corporationの営業担当者は、売り上げを増やすために顧客データベースを積極的に活用することが推奨されている。"},
  {id:302,q:"The conference room fee is included in the standard rate, but an additional fee is charged only ——– you extend the time of use.",options:["during","within","consequently","when"],answer:3,type:"部分読み問題",explanation:"接続詞butから空所のまでが、an additional fee is charged onlyで主語+動詞の形です。空所の後ろはyou extend で同じように主語+動詞の形です。これは、上の2のパターンで空所には接続詞が入ることがわかります。選択肢の中で接続詞は、(D) when（～するとき）のみです。したがって、、(D) when（～するとき）を選びます。",translation:"会議室の利用料は基本料金に含まれますが、利用時間を延長されたときだけ追加料金がかかります。"},
  {id:303,q:"A new tax is being considered for the city’s financial restructuring, but citizens have not responded ——– to the proposal.",options:["commonly","favorably","hardly","securely"],answer:1,type:"語彙問題",explanation:"空所の前がcitizens have not responded（市民は反応しなかった）、空所の後ろがto the proposal（提案に対して）。これに合いそうなのは(B) favorably（好意的に）です。",translation:"市の財政再建のため新しい税金の導入が検討されているが、市民はその議案に好意的に反応していない。"},
  {id:304,q:"Ryu Garcia’s latest novel is his ——– book to date and has been translated into several languages.",options:["popularity","most popularly","more popular","most popular"],answer:3,type:"品詞または比較問題",explanation:"空所の前後を見ます。空所の前が所有格his、後ろが名詞bookとto date（今までのところ、現在まで）。名詞bookを修飾する形容詞が空所に入ると考えられ、比較級の(C) more popular（より人気のある）または最上級の(D) most popular（もっとも人気のある）に絞り込めます。",translation:"Ryu Garciaさんの最新の小説は、彼のこれまでの著作の中で最も人気があり、いくつかの言語に翻訳された。"},
  {id:305,q:"As the ——– of East Tera Systems, Mr. Davidson has contributed to creating jobs in the community.",options:["foundation","founding","found","founder"],answer:3,type:"品詞問題",explanation:"空所の前後を見ます。空所の前が冠詞the、後ろが前置詞ofなので空所には名詞が入ることがわかります。選択肢の中で名詞の意味があるものは４つあります。",translation:"East Tera Systemsの創立者として、Davidsonさんは地域の雇用を生み出すことに貢献してきた。"},
  {id:306,q:"Due to Ms. Jung’s urgent business trip, tomorrow’s meeting ——– for a later date.",options:["reschedules","will be rescheduled","has rescheduled","will reschedule"],answer:1,type:"能動態・受動態・時制に関する動詞問題",explanation:"空所の前が主語のtomorrow’s meeting（明日の会議）です。tomorrow’s meeting（明日の会議）は「日程が変更される」という受動態の関係が適切です。",translation:"Jungさんが急遽出張することになったため、明日の会議は後日に延期されます。"},
  {id:307,q:"After months of ——–, Ernest Manufacturing and Herbert Technologies have reached an agreement to merge.",options:["priorities","responsibilities","negotiations","facilities"],answer:2,type:"語彙問題",explanation:"空所の前がAfter months of（数か月にわたる～の後で）という意味です。これと合うのは、(C) negotiations（交渉）でこれを選びます。",translation:"数か月にわたる交渉の末、Ernest ManufacturingとHerbert Technologiesは合併することに合意した。"},
  {id:308,q:"Tickets for the Seaside Botanical Garden can be purchased ——– at the box office and online.",options:["not only","neither","either","both"],answer:3,type:"相関接続詞問題",explanation:"空所の後ろがat the box office and onlineと A and Bの形になっています。both A and Bと考えられ、(D) bothが適切です。",translation:"Seaside Botanical Gardenの入場券は、チケット売り場とオンラインのどちらでも購入することができます。"},
  {id:309,q:"If you would like to see a ——– of our new products, just ask one of our staff members at the booth.",options:["grant","mayor","profession","demonstration"],answer:3,type:"語彙問題",explanation:"空所の前が動詞+冠詞でsee a（～を見る）、of our new products（新製品の）と続きます。選択肢の中で急所に合うのは、(D) demonstration（実演）でこれを選びます。",translation:"もし、新製品の実演を見たいなら、ブースにいる弊社のスタッフに声をかけてください。"},
  {id:310,q:"The streets ——– North Wood College will be closed from 8 p.m. today until 6 a.m. tomorrow due to construction.",options:["surround","surrounds","surrounded","surrounding"],answer:3,type:"動詞問題",explanation:"問題文の動詞はwill be closed（閉鎖される）がすでにあります。したがって、述語動詞の形の(A) surround（取り囲む）と(B) surrounds（surround「取り囲む」の三人称単数現在形）は前後に接続詞などがないので入りません。",translation:"North Wood Collegeを取り囲む通りは工事のため、本日の20時から明日の6時まで利用することができない。"},
  {id:311,q:"According to the tourist guide, the historical landmarks in the city of Nanpao are ——– accessible from the city center.",options:["slightly","significantly","easily","approximately"],answer:2,type:"語彙問題",explanation:"空所の前後を見ます。空所の前がbe動詞are、後ろが形容詞accessible（〈場所・人など〉行きやすい）。形容詞accessibleと合う副詞は(C) easily（容易に）でこれを選びます。",translation:"観光案内によれば、Nanpao市の歴史的建造物は市の中心部から容易に行くことができる。"},
  {id:312,q:"All of the ——– with customers regarding the new service must be entered into the customer relationship management system.",options:["correspond","correspondingly","corresponds","correspondence"],answer:3,type:"品詞問題",explanation:"空所の前後を見ます。空所の前が冠詞the、後ろが前置詞with。したがって空所には名詞の (D) correspondence（手紙やメールでのやり取り ）が適切です。",translation:"新サービスに関する顧客とのやり取りはすべて顧客管理システムに入力しなければならない。"},
  {id:313,q:"The initial legal ——– were thoroughly discussed and substantially changed at the board meeting.",options:["exhibitions","requirements","regions","decades"],answer:1,type:"語彙問題",explanation:"空所の前がlegal （法律の、法的）で、動詞がwere … discussed（議論された）。「法的必要条件」が「議論された」とすると意味が適切です。したがって(B) requirements（名詞requirement【必要条件】の複数形）を選びます。",translation:"役員会議で当初の法的必要条件は徹底的に議論され大幅に変更された。"},
  {id:314,q:"Ms. Conti is scheduled to attend the advanced technology conference with ——– product development team.",options:["she","hers","herself","her"],answer:3,type:"代名詞問題",explanation:"空所の前後を見ます。空所の前が前置詞with、後ろが名詞句product development team（製品開発チーム）になります。with以降全体が名詞句と考えられ、空所には後ろの名詞句を修飾する所有格の(D) her（彼女の）が適切です。",translation:"Contiさんは、彼女の製品開発チームとともに先端技術会議に出席する予定である。"},
  {id:315,q:"Mr. Schneider contacted the computer manufacturer’s customer support to see if repairs ——–.",options:["needed","to be needed","needing","were needed"],answer:3,type:"動詞問題",explanation:"後半のif節に着目します。節なのでif以降は通常主語+動詞の形になります。repairs（修理）は名詞で主語と考えられるので、空所には動詞が必要です。主語と動詞の関係を考えると、「修理（repairs）」が「必要とされた(were needed)」とするのが適切なので、受動態の(D) were neededを選びます。(B) to be neededのbe neededの箇所は受動態ですが、toで始まる不定詞で述語動詞になりませんので除外します。",translation:"シュナイダーさんは修理が必要かどうか確認するために、パソコンメーカーのカスタマーサーポートに問い合わせをした。"},
  {id:316,q:"Pura Corporation needs to ——– a replacement as soon as possible, as Mr. Fujisawa, marketing director, will be retiring at the end of March.",options:["hire","compete","translate","resume"],answer:0,type:"語彙問題",explanation:"空所の後ろが目的語a replacement （後任、交換品）です。選択肢をざっと見て「後任」を(A) hire（雇う）が適切そうですが、念のため他の選択肢を確認していきます。",translation:"Pura Corporationはマーケティング部長のFujisawaさんが3月末で退職するため、できるだけ早く後任を採用する必要があります。"},
  {id:317,q:"The new labeling machine at the York plant works more ——– than the previous model.",options:["quick","quickness","quicken","quickly"],answer:3,type:"品詞問題",explanation:"空所の前後を見ます。空所の前がmore、後ろがthanなので比較級であることがわかります。moreとthanの間に入るのは形容詞(A) quick（迅速な、速い）または副詞(D) quickly（速く、早く）ですが、動詞works（稼働する、動作する）を修飾すると考えられるので副詞(D) quickly（速く、早く）が適切です。",translation:"York工場の新しいラベル貼り機は、以前のモデルより速く作業をします。"},
  {id:318,q:"The driver made three ——– to deliver the package over the past two days, but was unable to deliver it.",options:["procedures","attempts","objects","experiences"],answer:1,type:"語彙問題",explanation:"空所の前の主語と動詞がThe driver made（ドライバーは～をした）、空所の後ろがto deliver the package（荷物を配達すること【ため】）から、(B) attempts（試み）が入りそうです。",translation:"ドライバーはこの2日間で3回配達を試みましたが、荷物を届けることができなかった。"},
  {id:319,q:"If you want to know how to write an effective letter of ——–, please refer to the samples on our website.",options:["recommending","recommend","recommended","recommendation"],answer:3,type:"品詞問題",explanation:"空所の前後を見ます。空所の前が前置詞of、後ろがカンマです。したがって空所には名詞が入り、(D) recommendation（推薦）が適切です。",translation:"効果的な推薦状の書き方を知りたいなら、当社のウェブサイトにあるサンプルを参照してください。"},
  {id:320,q:"The keynote speaker’s speech at the East Japan Mechanical Engineering Conference will begin ——–.",options:["shortly","nearly","recently","lately"],answer:0,type:"語彙問題",explanation:"主語はThe keynote speaker’s speech（基調講演者の演説）、空所の前は動詞の未来形will begin（始まるでしょう）。これと合うのは、(A) shortly（まもなく）です。",translation:"東日本機械工学学会での基調講演者の演説がまもなく始まるでしょう。"},
  {id:321,q:"Last week Ms. Nguyen visited a travel agency ——– office is located on the fifth floor of the Cherry Park building.",options:["where","what","that","whose"],answer:3,type:"関係詞問題",explanation:"文全体の主語、動詞はMs. Nguyen visitedで目的語がa travel agency（旅行代理店）と考えられます。それから空所の前後を見ます。空所の前がa travel agency (旅行代理店)、後ろが名詞officeとその後に動詞is located ～（～に位置している）が続きます 。先行詞をa travel agency (旅行代理店)とし、「旅行代理店のオフィス」が「～に位置している」とするとうまくつながるので関係代名詞の所有格(D) whoseが適切です。",translation:"先週NguyenさんはCherry Parkビルの5階にオフィスがある旅行代理店を訪問した。"},
  {id:322,q:"Applications for Spanish cooking classes will be accepted ——– January 15 to February 10.",options:["between","during","among","from"],answer:3,type:"語彙問題",explanation:"空所の後ろがJanuary 15 to February 10です。 from A to B（AからBまで）の形と考えられ、(D) fromが適切です。",translation:"1月15日から2月10日までスペイン料理のクラスの申し込みを受け付けます。"},
  {id:323,q:"Osteria Foresta is a well-known Italian restaurant ——– to Serra Art Gallery.",options:["closing","closely","close","closes"],answer:2,type:"品詞問題",explanation:"主語がOsteria Foresta、動詞がbe動詞のis、これに続く名詞句のa well-known Italian restaurant（有名なイタリア料理店）は補語と考えられます。",translation:"Osteria ForestaはSerra Art Galleryに近い有名なイタリア料理店です。"},
  {id:324,q:"For more detailed information regarding nutritionist positions, please ——– our recruitment page.",options:["look","visit","refer","go"],answer:1,type:"語彙問題",explanation:"空所の後ろのour recruitment page（私たちの採用ページ）で、これと合うのが(B) visit（訪れる）です。",translation:"栄養士の求人に関する詳しい情報は、当社の採用のページをご覧ください。"},
  {id:325,q:"In the last quarter, Copley Corporation manufactured and sold ——– 1,200 bicycles.",options:["approximate","approximated","approximation","approximately"],answer:3,type:"品詞問題",explanation:"空所の前後を見ます。空所の前が動詞sold、空所の後が数字1,200と名詞のbicyclesが続きます。数字の前にくるのは副詞の(D) approximately（おおよそ）です。approximatelyと似た意味でnearly（ほぼ）も数字の前に置かれます。",translation:"前四半期にCopley Corporationは約1200台の自転車を製造・販売した。"},
  {id:326,q:"Information ——– the paintings in the special exhibition is available at the reception desk.",options:["across","between","throughout","about"],answer:3,type:"語彙問題",explanation:"空所の前が名詞information、後ろがthe paintings （絵画）で前後をつなぐ適切な前置詞は(D) about（～に関して）です。",translation:"特別展示会の絵画に関する情報は受付にあります。"},
  {id:327,q:"——– authorized employees are allowed to enter the product inspection area.",options:["Although","As long as","Now that","Only"],answer:3,type:"全文読み問題",explanation:"空所の後ろの形を見ます。空所以降は、主語authorized employees と動詞are allowed で文が完結しています。authorized（権限を与えられた）は過去形ではなくemployees を修飾する形容詞（または過去分詞）です。したがって、唯一の副詞である(D) Only（ただ～だけ）が適切です。",translation:"製品検査のエリアに入ることができるのは権限を与えられた社員だけである。"},
  {id:328,q:"Traffic congestion has become more ——– due to the introduction of systems that utilize artificial intelligence.",options:["predictable","predictably","predict","prediction"],answer:0,type:"品詞問題",explanation:"空所の前がmoreでその前が主語Traffic congestion（交通渋滞）と動詞has become（～になった）が続きます。後ろがdue toの前置詞なので、この前でいったん切れるので前半のみを確認していきます。",translation:"人工知能を活用したシステムの導入により、交通渋滞が予測しやすくなった。"},
  {id:329,q:"The ——– materials to be distributed tomorrow will include the latest customer satisfaction survey results.",options:["persistent","unwavering","vigorous","supplementary"],answer:3,type:"語彙問題",explanation:"空所の前が冠詞The、後ろがmaterials（資料）。materials（資料）と合う形容詞は(D) supplementary（補う、補足する）でこれを選びます。",translation:"明日配布される補足資料には最新の顧客満足度に関する調査結果が含まれています。"},
  {id:330,q:"Leaders of various volunteer organizations were invited to the ——– ceremony of the new mayor.",options:["ingredient","inauguration","jeopardy","inventory"],answer:1,type:"語彙問題",explanation:"空所の後ろがceremony （式、セレモニー）で、これに合うのが(B) inauguration（就任、正式開始）です。今回は、TOEIC的には難易度の高い語彙問題でした。",translation:"新しい市長の就任式にさまざまなボランティア団体のリーダーが招待された。"},
  {id:331,q:"Green Fiddle Gifts was able to increase sales last year by systematically ——– customer purchase histories.",options:["analysis","analyst","analyze","analyzing"],answer:3,type:"品詞または動詞問題",explanation:"by以下を見ていきます。byは前置詞なので、byの後ろは名詞句（名詞のカタマリ）になります。空所の前が副詞のsystematically（体系的に）、後ろが名詞句のcustomer purchase histories（顧客の購入履歴）です。したがって、空所には副詞のsystematicallyが修飾でき、名詞句のcustomer purchase historiesを目的語にとれる動名詞の(D) analyzing（分析すること）が適切です。",translation:"Green Fiddle Giftsは顧客の購入履歴を体系的に分析することによって昨年の売上を伸ばすことができた。"},
  {id:332,q:"Sandoval Hotel, highly rated by reviews, was built about 10 years ——– by a local wealthy family.",options:["old","away","ago","quite"],answer:2,type:"語彙問題",explanation:"空所の前が、was built about 10 years、後ろが前置詞by 。「約10年前に建てられた」と考えるのが自然なので副詞の(C) ago（…前に）が適切です。",translation:"口コミで高評価のSandoval Hotelは地元の資産家によって約10年前に建設された。"},
  {id:333,q:"I would like to ——– with the review of the Japanese translation of the newly created user manual.",options:["describe","proceed","accept","edit"],answer:1,type:"語彙問題",explanation:"空所の後が前置詞with なので空所に入る動詞は自動詞（後ろに目的語を取らない動詞）になります。選択肢の中で自動詞は(B) proceed（進める、始める）のみです。他の選択肢は他動詞で、直後に目的語の名詞句がきます。",translation:"新たに作成いただいたユーザーマニュアルの日本語訳のレビューを進めたいと思います。"},
  {id:334,q:"User manuals for newly installed printers in the accounting department ——– on the manufacturer’s Web site.",options:["can be found","find","have found","will be finding"],answer:0,type:"動詞問題",explanation:"問題文の動詞を探すと、動詞がありません。したがって、空所には動詞が入ることがわかります。主語は空所の前になると考えられ、その中で重要なのはUser manuals（ユーザーマニュアル）です。",translation:"経理部に新しく設置されたプリンターのユーザーマニュアルは、メーカーのウェブサイトで見ることができます。"},
  {id:335,q:"Do you have ——– information about the training for new employees that will be held at our headquarters next month?",options:["many","several","each","any"],answer:3,type:"数量形容詞問題",explanation:"空所の後ろが不可算名詞のinformation（情報）。選択肢の中で不可算名詞の前にくるのは、(D) any（いくらかの）のみです。したがって(D) anyを選びます。",translation:"来月、本社で実施される新人研修について何か情報はありますか？"},
  {id:336,q:"——– she joined our company two years ago, Ms. Chapman has made significant contributions in attracting new customers.",options:["When","Since","Before","Whether"],answer:1,type:"全文読み問題",explanation:"空所の後ろからカンマまでに、主語sheと動詞joinedがあります。カンマ以降は主語Ms. Chapmanと動詞has madeが続くので、空所には接続詞が入ることがわかります。選択肢すべてに接続詞になれますので、文全体の意味を考える必要があります。",translation:"2年前に当社に入社して以来、Chapmanさんは新規顧客獲得に大きな貢献をしてきた。"},
  {id:337,q:"All work process details must be determined before a written ——– can be provided to any customer.",options:["estimation","estimate","estimated","estimates"],answer:1,type:"品詞問題",explanation:"空所の前後を中心に見ていきます。空所の前が冠詞aと形容詞writtenで助動詞canが続きます。したがって空所には名詞が入ることがわかります。名詞は(A) estimation（判断、評価）、(B) estimate（見積もり）、(D) estimates（名詞estimateの複数形）がありますが、前に冠詞aがあるので可算名詞の単数でなければなりません。",translation:"どんな顧客に対しても書面で見積もりを提示する前にすべての作業工程の詳細について決めなければならない。"},
  {id:338,q:"Grunder Investment Group ——– 10 graduate finance students as summer interns each year for the past five years.",options:["hires","will be hired","has hired","will have hired"],answer:2,type:"能動態・受動態・時制に関する動詞問題",explanation:"文の最後に、for the past five years（過去5年間）があります。for the past(last) …は通常現在完了形で使われます。選択肢の中で現在完了形は(C) has hiredのみでこれを選びます。Grunder Investment Groupが10 graduate finance studentsをhas hired（採用した）なので能動態で意味的にも問題ありません。",translation:"Grunder Investment Groupは過去5年間、毎年10名のファイナンス専攻の大学院生をサマーインターンとして採用してきた。"},
  {id:339,q:"Hunter Outdoor Sports will be having a sale on this season’s inventory in order to ——– room for the new season’s product arrivals.",options:["making","made","makes","make"],answer:3,type:"動詞問題",explanation:"空所の前がin order to （～するために）なので、空所には動詞の原形が入ります。したがって(D) makeを選びます。",translation:"Hunter Outdoor Sportsは、新シーズンの製品入荷のための場所を作るために、今シーズンの在庫品のセールを行う予定です。"},
  {id:340,q:"Ms. Stewart will have to decide soon ——– she will accept the offer of the graphic designer job.",options:["whether","regarding","despite","due to"],answer:0,type:"部分読み問題",explanation:"空所の後ろの形を見ます。she will accept …で主語+動詞の形です。空所の前はMs. Stewart will have …で主語+動詞の形です。これは、上の2のパターンで空所には接続詞が入ることがわかります。選択肢の中で接続詞は(A) whether（～かどうか）のみでこれを選びます。",translation:"Stewartさんは、グラフィックデザイナーの仕事のオファーを受けるかどうか近日中に決めなければならない。"},
  {id:342,q:"Minerva Manufacturing offers a variety of ——– to its employees, including health insurance and retirement plans.",options:["estimates","regulations","reasons","benefits"],answer:3,type:"語彙問題",explanation:"空所の前がoffers a variety of（さまざまな～を提供する）、空所のincluding以下がincluding health insurance and retirement plans（健康保険、退職金制度を含む）で、空所の名詞の具体例が書かれています。",translation:"Minerva Manufacturingは、健康保険や退職金制度など、さまざまな福利厚生を従業員に提供しています。"},
  {id:343,q:"Ms. Romero asked the new employee to ——– the company’s safety regulations before starting work.",options:["proceed","follow","supply","appoint"],answer:1,type:"語彙問題",explanation:"空所の後ろが目的語the company’s safety regulations（会社の安全規則）です。これに合うのが、(B) follow （～に従う）です。",translation:"Romeroさんは、新入社員に対し、仕事を始める前に会社の安全規則に従うよう求めた。"},
  {id:344,q:"The CEO emphasized the company’s commitment to ——– practices during her speech at the shareholders’ meeting.",options:["sustainable","sustainability","sustain","sustainably"],answer:0,type:"品詞問題",explanation:"空所の前後を見ます。空所の前が前置詞to、後ろが名詞のpractices （活動、実践）。空所には名詞を修飾する形容詞の(A) sustainable（持続可能な）が適切です。",translation:"CEOは、株主総会でのスピーチで、持続可能な活動へ深く関与することを強調しました。"},
  {id:345,q:"The construction of the Jorge Park Tower, scheduled for April, was postponed ——– lack of funds and construction materials.",options:["because","due to","therefore","now that"],answer:1,type:"部分読み問題",explanation:"空所の後ろがlack of funds and construction materials（資金と建設資材の不足）という名詞句なので空所には前置詞が入ることがわかります。したがって、選択肢の中で唯一の前置詞である(B) due to（～の理由で、～のため）を選びます。",translation:"4月に予定されていたJorge Park Towerの建設は、資金と建設資材が不足したため延期された。"},
  {id:346,q:"——– your email password carefully, with a minimum length of 8 characters to ensure its security.",options:["Chosen","Choice","Choose","Choosing"],answer:2,type:"動詞または品詞問題",explanation:"動詞の位置を確認するために、空所から後ろの方を見ていきます。空所の後ろに動詞がないことがわかるので、空所には動詞が入り、命令文になります。したがって動詞の原形の(C) Choose（選ぶ）が適切です。",translation:"電子メールのパスワードは、安全性を確保するため、8文字以上で注意深く選んでください。"},
  {id:347,q:"The new project organized by Mr. Montaine is expected to make a significant ——– on the market.",options:["figure","impact","honor","refreshment"],answer:1,type:"語彙問題",explanation:"空所の前の動詞がmake、後ろon the market「市場に」です。make an impact on the marketで「市場に影響を与える」なので空所には(B) impact（影響、衝撃）が適切です。",translation:"Montaineさんが企画した新プロジェクトは、市場に大きな影響を与えることが期待されます。"},
  {id:348,q:"The sales team ——– with the CEO at the headquarters next Monday.",options:["met","had met","will be meeting","was met"],answer:2,type:"能動態・受動態・時制に関する動詞問題",explanation:"問題文の最後にnext Monday（来週の月曜日）があるので未来形だとわかります。選択肢の中で未来形は(C) will be meetingだけで、これを選びます。",translation:"来週の月曜日には、営業チームが本社でCEOと面談する予定だ。"},
  {id:349,q:"Internet service will be suspended ——– you make payment for your account by the end of this week.",options:["within","unless","despite","regardless of"],answer:1,type:"部分読み問題",explanation:"空所の前はInternet service will be suspendedで主語+動詞、空所の後ろは、you makeで主語+動詞の形です。これは、上の２のパターンで空所には接続詞が入ることがわかります。選択肢の中で接続詞は、(B) unless（もし～でなければ）のみです。したがって、(B) unless（もし～でなければ）を選びます。",translation:"今週末までにアカウントのお支払いがない場合は、インターネットサービスが一時停止されます。"},
  {id:350,q:"Mr. Lee was given a ——– to the position of marketing director for his hard work and dedication.",options:["promotional","promote","promotion","promoted"],answer:2,type:"品詞問題",explanation:"空所の前後を見ます。空所の前が冠詞a、後ろが前置詞to。したがって、空所には名詞の(C) promotion（昇進）が適切です。",translation:"Leeさんは、その努力と献身が認められ、マーケティング部長に昇進を果たした。"},
  {id:351,q:"Raymond Express Corporation is known for its ——– customer service and fast shipping times.",options:["exception","except","exceptional","exceptionally"],answer:2,type:"品詞問題",explanation:"空所の前後を見ます。空所の前が代名詞所有格のits、後ろが名詞句のcustomer service（顧客サービス）。したがって空所には名詞句customer serviceを修飾する形容詞の(C) exceptional（非常に優れた）が適切です。",translation:"Raymond Express Corporationは、非常に優れた顧客サービスと迅速な出荷で知られています。"},
  {id:352,q:"Gregory Technologies claims that its newest software version is the ——– in the market.",options:["innovative","more innovatively","most innovative","most innovatively"],answer:2,type:"品詞または比較問題",explanation:"空所の前後を見ます。空所の前がbe動詞isと冠詞the、後ろが前置詞句in the market（市場で）。前にtheがあるので最上級、be動詞の後ろなので形容詞の形容詞の最上級(C) most innovativeを選びます。意味的にも「市場で最も革新的な」で問題ありません。",translation:"Gregory Technologiesは、その最新版のソフトウェアが市場で最も革新的であると主張しています。"},
  {id:353,q:"After a period of sustained growth, Wagner Publishing is now facing a ——– decline in revenue.",options:["sharpen","sharp","sharply","sharpness"],answer:1,type:"品詞問題",explanation:"空所の前後を見ます。空所の前が冠詞a、後ろが名詞のdecline（下落、減少）。したがって空所には名詞 declineを修飾する形容詞の(B) sharp（急な）が適切です・",translation:"持続的な成長を続けてきた後で、Wagner Publishingは、今、急激な減収に直面しています。"},
  {id:354,q:"We need to carefully review ——– contract before we can move forward with the project.",options:["many","each","several","a few"],answer:1,type:"数量形容詞問題",explanation:"空所の後ろの名詞contract（契約、契約書）をみます。contractは可算名詞（契約書）と不可算名詞（契約、約定）がありますが、複数形のsがついていないので可算名詞の複数形ではないことがわかります。",translation:"プロジェクトを進めるにあたっては、それぞれの契約書を注意深く確認する必要があります。"},
  {id:355,q:"To apply for the scholarship, applicants must ——–— a completed application form and two letters of recommendation.",options:["submit","assume","launch","implement"],answer:0,type:"語彙問題",explanation:"空所の後の目的語a completed application form and two letters of recommendation（必要事項を記入した申請書と推薦状2通）なので、(A) submit（提出する）が適切です。",translation:"奨学金の申請には、志願者は必要事項を記入した出願書類と推薦状2通の提出が必要です。"},
  {id:356,q:"The new company policy requires ——– employees to attend a mandatory training session next week.",options:["every","each of","all","another"],answer:2,type:"数量形容詞問題",explanation:"空所の後ろの名詞が可算名詞で複数のemployees（従業員）。可算名詞の複数形の前におけるのは、(C) all （すべての）のみでこれを選びます。",translation:"新会社の方針により、全従業員は来週、義務的な講習会に参加することになりました。"},
  {id:357,q:"The research team has conducted a ——– study on the effectiveness of the new medication.",options:["experienced","dominant","comprehensive","accessible"],answer:2,type:"語彙問題",explanation:"空所の前は動詞conducted（行った）と冠詞a、後が名詞study（研究）です。空所に適切なのは(C) comprehensive（包括的な）です。後半を含めた意味は「新しい薬の効果について包括的な研究を行った」となって意味的にも問題ありません。",translation:"研究チームは、新しい薬の効果について包括的な研究を行いました。"},
  {id:358,q:"——– the increase in demand, the production team will be working overtime to meet the target production rate.",options:["Moreover","Due to","Despite","Now that"],answer:1,type:"全文読み問題",explanation:"空所の後ろの形を見ます。the increase in demand（需要の増加）で名詞句です。カンマ以降はthe production team will be workingで主語+動詞の形になっています。この形は上の３に該当し、空所には前置詞が入ることがわかります。",translation:"需要増のために、生産チームは生産目標を達成するために残業をすることになります。"},
  {id:359,q:"Lundy Research Institute is equipped with state-of-the-art equipment and the ——– analytical technology.",options:["deepest","shortest","lightest","latest"],answer:3,type:"語彙問題",explanation:"空所の後がanalytical technology （分析技術）です。これと合うのは(D) latest（最新の）です。",translation:"Lundy Research Instituteは、最新鋭の機器と最新の分析技術を備えています。"},
  {id:360,q:"The sports equipment store is offering a ——– discount on all football gear this month.",options:["substantiality","substantiate","substantially","substantial"],answer:3,type:"品詞問題",explanation:"空所の前後を見ます。空所の前が冠詞a、後ろが名詞のdiscount（割引）。したがって空所には名詞discountを修飾する形容詞の(D) substantial（かなりの、相当な）が適切です。",translation:"スポーツ用品店は今月、すべてのサッカー用品を大幅に割引しています。"},
  {id:361,q:"The employees at the construction site were required to wear ——– helmets for safety.",options:["they","their","them","theirs"],answer:1,type:"代名詞問題",explanation:"空所の前後を見ます。空所の前が動詞wear（身につける）、後ろが複数形の名詞helmets（ヘルメット）。したがって空所には名詞helmetsを修飾する所有格の(B) their（彼らの=The employees）が適切です。",translation:"工事現場の従業員は、安全のためにヘルメットの着用を義務づけられていました。"},
  {id:362,q:"Our customer support team is always available to provide ——– assistance with any inquiries or issues you may have.",options:["helps","helped","helpful","helpfully"],answer:2,type:"品詞問題",explanation:"空所の前後を見ます。空所の前が動詞provide、後ろが名詞のassistance（支援）。したがって空所には名詞assistanceを修飾する形容詞の(C) helpful（役立つ）が適切です。",translation:"当社のカスタマーサポートは、お客様のお問い合わせや問題に対して、いつでも役立つ支援を提供します。"},
  {id:363,q:"Mr. Choi had a ——– meeting with the sales team yesterday to discuss the new sales strategy.",options:["affordable","lengthy","defective","proficient"],answer:1,type:"語彙問題",explanation:"空所の後がmeeting（ミーティング、会議）です。これと合うのは(B) lengthy（長い）です。",translation:"Choiさんは、昨日、営業チームと新しい販売戦略について長いミーティングを行った。"},
  {id:364,q:"The ——– effects of the new policy change are yet to be fully understood.",options:["consequential","consequence","consequences","consequently"],answer:0,type:"品詞問題",explanation:"空所の前後を見ます。空所の前が冠詞The、後ろが名詞のeffects（影響、効果）。したがって空所には名詞effectsを修飾する形容詞の(A) consequential（結果として生じる）が適切です。",translation:"この新しい方針転換の結果として生じる影響については、まだ十分に理解されていません。"},
  {id:365,q:"Our customer service team has identified several areas ——– require improvement in order to enhance the overall customer experience.",options:["what","which","to whom","whose"],answer:1,type:"関係代名詞問題",explanation:"空所の前後を見ます。空所の前がseveral areas （いくつかの領域）、後ろが動詞の原形または現在形のrequire（必要とする）。文全体の主語はOur customer service team（当社のカスタマーサービスチーム）、動詞がhas identified（～を特定した）です。したがって、空所には先行詞several areasと後ろの動詞requireをつなぐ主格の関係代名詞(B) whichが適切です。",translation:"当社のカスタマーサービスチームは、全体的な顧客体験を向上させるために、改善が必要ないくつかの領域を特定しました。"},
  {id:366,q:"In order to meet customers’ ——–, the Balestri Corporation is offering more eco-friendly options.",options:["prefer","preferences","preferential","preferring"],answer:1,type:"品詞問題",explanation:"空所の前を見ます。空所の前が所有格のcustomers’（顧客の）で、後ろがカンマ。したがって空所には名詞が入り、(B) preferences（好み）が適切です。",translation:"Balestri Corporationでは、お客様の好みに応えるため、より環境に配慮した選択肢を提供しています。"},
  {id:367,q:"The accounting department has already hired two new employees, and ——– candidate is being considered for the job opening.",options:["a few","another","other","most"],answer:1,type:"数量形容詞問題",explanation:"空所の後ろの名詞が可算名詞で単数のcandidate（候補者）。可算名詞の単数形の前におけるのは、(B) another（もう一つ、もう一人）のみでこれを選びます。",translation:"経理部門はすでに2名の新入社員を採用し、さらにもう1名の候補者を検討中です。"},
  {id:368,q:"Our team will assess your specific requirements and recommend the most ——– plan for your business.",options:["suit","suits","suitably","suitable"],answer:3,type:"品詞問題",explanation:"空所の前後を見ます。空所の前が最上級the most、後ろが名詞のplan（計画）。したがって空所には名詞planを修飾する形容詞の(D) suitable（ふさわしい、適切な）が適切です。",translation:"私たちのチームは、お客様の特定の必要条件を評価し、お客様のビジネスに最も適したプランを推薦します。"},
  {id:369,q:"——– we make some significant changes to our pricing strategy, we might lose our market share to our competitors.",options:["Consequently","Without","Despite","Unless"],answer:3,type:"部分読み問題",explanation:"空所の後ろの形を見ます。we makeで主語+動詞の形、カンマ以降はwe might loseで同じく主語+動詞の形です。したがって空所には接続詞が入ることがわかります。選択肢の中で接続詞は(D) Unless（もし～ないなら）のみでこれを選びます。",translation:"我々が価格戦略に大きな変更を加えない限り、競合他社に市場シェアを奪われる可能性があります。"},
  {id:370,q:"The new software development has ——– improved the performance of the application over the past three months.",options:["progressed","progressively","progress","progressive"],answer:1,type:"品詞問題",explanation:"空所の前後を見ます。空所の前が現在完了のhas、後ろが動詞の過去分詞improved。したがって、空所には動詞の過去分詞improvedを修飾する副詞の(B) progressively（徐々に）が適切です。",translation:"新しいソフトウェア開発により、過去3カ月間にわたってアプリケーションのパフォーマンスが徐々に向上しています。"},
  {id:371,q:"Renee’s Catering will ——– a variety of vegetarian options at the upcoming conference.",options:["have been served","be serving","serving","be served"],answer:1,type:"動詞問題",explanation:"主語はRenee’s Catering というケータリング会社（顧客の指定する元に出向いて食事を配膳、提供する）です。動詞serve（［食事・飲み物を］出す）との関係は、Renee’s Catering がa variety of vegetarian options（様々なベジタリアン向けオプション）を「出す」が適切なので動詞は能動態になります。",translation:"Renee’s Cateringでは、今度の会議で様々なベジタリアン向けのメニューを提供する予定です。"},
  {id:372,q:"Riverdale Consulting is dedicated to promoting the ——– and success of our clients through innovative solutions and excellent service.",options:["grow","grown","growth","growing"],answer:2,type:"品詞問題",explanation:"空所の前後を見ます。空所の前が冠詞the、後ろがandと名詞success（成功）、前置詞ofが続きます。andは空所と名詞successを並列につなぐと考えられます。 したがって空所には名詞が入り、(C) growth（成長）が適切です。",translation:"Riverdale Consultingは、革新的なソリューションと優れたサービスを通じて、お客様の成長と成功を促進することに専念しています。"},
  {id:373,q:"The company has implemented a new policy that prohibits employees from using company resources for ——–— purposes.",options:["fragile","personal","relative","dependable"],answer:1,type:"語彙問題",explanation:"選択肢がすべて形容詞なので「語彙問題」であることがわかります。空所に入る形容詞が修飾する名詞との相性・コロケーションがヒントになります。",translation:""},
  {id:374,q:"We are looking to hire a new marketing manager ——– experience and creativity will help us grow our brand and increase sales.",options:["who","that","whatever","whose"],answer:3,type:"関係詞問題",explanation:"文全体の主語はWe、動詞はare looking と考えられます。それから空所の前後を見ます。空所の前がa new marketing manager (新しいマーケティングマネージャー)、後ろが名詞句experience and creativity（経験と創造性） 。その後に動詞will help us ～（私たちが～するのを助ける・支援する）が続きます 。",translation:"私たちは、ブランド育成と売上拡大に貢献する、経験と創造力に富んだマーケティングマネージャーを新たに募集しています。"},
  {id:375,q:"Due to the long recession, many companies are seeking more ——– solutions.",options:["economist","economically","economics","economical"],answer:3,type:"品詞問題",explanation:"空所の前後を見ます。空所の前が比較級more、後ろが名詞solutions（解決法）。したがって、空所には名詞solutionsを修飾する形容詞の(D) economical（経済的な）が適切です。",translation:"長い不況のため、多くの企業がより経済的な解決策を求めています。"},
  {id:376,q:"The sales team’s ——–— is to increase sales by 10% by the end of the quarter.",options:["objective","representative","premises","garment"],answer:0,type:"語彙問題",explanation:"主語が「セールスチームの…（The sales team’s ——–—）」が「売上を増加させること（to increase sales）」なので、空所には(A) objective（目標）が適切です。",translation:"営業チームの目標は、四半期末までに売上を10％増加させることです。"},
  {id:377,q:"The new product’s unique features are ——– to the company’s target market.",options:["appeals","appealingly","appeal","appealing"],answer:3,type:"品詞問題",explanation:"空所の前後を見ます。空所の前がbe動詞are、後ろが前置詞to。be動詞に続く補語となる形容詞の(D) appealing（魅力的な）が適切です。",translation:"新製品のユニークな特徴は、会社のターゲット市場にとって魅力的なものです。"},
  {id:378,q:"Dr. Gomez has been ——– as the keynote speaker at the upcoming medical conference.",options:["appointed","achieved","concluded","interpreted"],answer:0,type:"語彙問題",explanation:"主語のDr. Gomezが、「基調講演者として（as the keynote speaker）」「任命された」が適切です。したがって(A) appointed（appoint「任命する」の過去または過去分詞形）を選びます。",translation:"Gomez博士は、今後開催される医学会議の基調講演者に任命されました。"},
  {id:379,q:"By sourcing materials ——– from suppliers, we can ensure the highest quality and reduce costs.",options:["direction","directions","directed","directly"],answer:3,type:"品詞問題",explanation:"空所の前後を見ます。空所の前がBy sourcing materials （材料を調達することによって）、from suppliers（供給業者から）。「直接供給業者から」と考えると意味がつながるので、空所には、後ろのfrom suppliers を修飾する副詞の(D) directly （直接）が適切です。",translation:"供給業者から直接材料を調達することで、最高品質の確保とコスト削減を実現しています。"},
  {id:380,q:"——– the holiday season, our sales have been steady throughout the year.",options:["While","Due to","In addition to","Except for"],answer:3,type:"全文読み問題",explanation:"選択肢を見ると、接続詞、前置詞、前置詞、前置詞の【接続詞・前置詞問題】であることがわかります。",translation:""},
  {id:381,q:"The sales forecast for next quarter is ——– as the demand for the product has been declining.",options:["doubt","doubts","doubtful","doubtfully"],answer:2,type:"品詞問題",explanation:"空所の前後を見ます。空所の前がbe動詞is、後ろが接続詞as。be動詞に続く補語となる形容詞の(C) doubtful（疑わしい）が適切です。",translation:"来期の売上見通しについては、需要が減少しているため、疑問視されています。"},
  {id:382,q:"The company’s new CEO has ——–— plans to expand its operations in global markets.",options:["fluent","adjacent","reluctant","ambitious"],answer:3,type:"語彙問題",explanation:"空所の後がplan（計画）です。これと合うのは(D) ambitious（意欲的な、野心的な）です。",translation:"その会社の新CEOは、グローバル市場において同社の事業を拡大する野心的な計画を持っています。"},
  {id:383,q:"The report created by Ms. Sandler provided ——– insights into market trends in the industry.",options:["information","informative","inform","informatively"],answer:1,type:"品詞問題",explanation:"空所の前後を見ます。空所の前が動詞provided、後ろが名詞insights（洞察）。したがって、空所には名詞insightsを修飾する形容詞の(B) informative（有益な）が適切です。",translation:"Sandlerさんの作成したレポートは、業界の市場動向について有益な洞察を与えてくれました。"},
  {id:384,q:"Nowadays, ——– can respond quickly to change and innovate will have a clear advantage over their competitors.",options:["anyone","whoever","those","people"],answer:1,type:"関係詞・代名詞問題",explanation:"文全体の構造を確認するために、動詞をチェックします。動詞はcan respondとandでrespondと並ぶinnovate、そのあとにwill haveと続きます。",translation:"今日、変化に素早く対応し、イノベーションを起こすことができる者が、競合他社に対して明らかに優位に立つことができるのです。"},
  {id:385,q:"Edtech Solutions’ management team will be ——– by a group of investors to determine if it is worth investing in.",options:["assessment","assess","assessing","assessed"],answer:3,type:"品詞・動詞問題",explanation:"空所の前後を中心に見ていきます。主語はEdtech Solutions’ management team（Edtech Solutionsの経営チーム）で、その後にwill beと続きます。空所の後は、by a group of investors（投資家グループによって）です。",translation:"Edtech Solutionsの経営陣は、投資に値するかどうか、投資家グループによって評価されることになります。"},
  {id:386,q:"Herbert Gardening’s ——– for customer service has helped it maintain a loyal customer base.",options:["subscription","circulation","reputation","itinerary"],answer:2,type:"語彙問題",explanation:"空所の前がHerbert Gardening’s（Herbert Gardeningの）、空所の後ろがfor customer service（顧客サービスに対する）なので(C) reputation（評判）が適切です。",translation:"Herbert Gardeningは、その顧客サービスが評判となり、忠実な顧客基盤を維持しています。"},
  {id:387,q:"The quality control department requires that all products ——– thoroughly before they are released for sale.",options:["are tested","were testing","be tested","test"],answer:2,type:"能動態・受動態・時制に関する動詞問題",explanation:"requires that節に気づくかどうかがカギになります。",translation:"品質管理部は、すべての製品を販売開始前に徹底的にテストすることを要求しています。"},
  {id:388,q:"The new management system is designed to increase productivity and ——–— workflow efficiency.",options:["maximize","motivate","encounter","compromise"],answer:0,type:"語彙問題",explanation:"選択肢がすべて動詞なので「語彙問題」であることがわかります。空所の後の目的語との関係がヒントです。",translation:""},
  {id:389,q:"The conference was attended by various professionals, and ——– of them were impressed with the keynote speaker’s presentation.",options:["few","every","each","most"],answer:3,type:"数量代名詞問題",explanation:"空所の後ろのof以下の名詞句が可算名詞で複数のthem。動詞がwereなので主語は複数になります。したがって(A) few（ほとんどない）または(D) most（ほとんど）に絞り込めます。",translation:"この会議にはさまざまな専門家が参加したが、そのほとんどが基調講演のプレゼンテーションに感銘を受けた。"},
  {id:390,q:"Businesses should ——– review and update their employee policies and procedures to ensure compliance and fairness.",options:["overwhelmingly","regularly","considerably","affordably"],answer:1,type:"語彙問題",explanation:"空所は後ろの動詞review and update（見直し、更新する）を修飾します。この動詞を合うのは、lowと合うのは(B) regularly（定期的に）です。",translation:"企業は、コンプライアンスと公平性を確保するために、従業員方針と手順を定期的に見直し、更新することが求められます。"},
  {id:391,q:"The executives announced ——– plans to merge with another company next year.",options:["they","themselves","them","their"],answer:3,type:"代名詞問題",explanation:"空所の前後を見ます。空所の前が動詞announced。後ろが名詞plans。したがって空所には名詞plansを修飾する所有格の(D) their（彼ら/彼女らの）が適切です。",translation:"重役は、来年に他社と合併する計画を発表した。"},
  {id:392,q:"Financial reports ——– a decline in profits due to increased competition in the industry.",options:["are shown","showing","shows","have shown"],answer:3,type:"動詞問題",explanation:"文全体の動詞を確認すると、空所以外に動詞がないので、空所には述語動詞が入ることがわかります。述語動詞になれる選択肢は、受動態の(A) are shown、三人称単数現在形で能動態の(C) shows、完了形で能動態の(D) have shownの３つになります。",translation:"財務報告では、業界内の競争激化による利益の減少が示されています。"},
  {id:393,q:"NexaGen Solutions hired a skilled ——– to oversee the maintenance of their equipment.",options:["component","device","technician","manual"],answer:2,type:"語彙問題",explanation:"空所の前が形容詞skilled（ 熟練した）なのでこれと合うのは(C) technician（技術者）です。",translation:"NexaGen Solutionsは、機器のメンテナンスを監督する熟練技術者を採用しました。"},
  {id:394,q:"We will begin production ——– the raw materials arrive at our facility.",options:["in addition to","as soon as","as a result","in fact"],answer:1,type:"部分読み問題",explanation:"空所の前がWe will begin～で主語+動詞の形、空所の後ろもthe raw materials arrive で主語+動詞の形になっています。この形は上の2に該当し、空所には接続詞が入ることがわかります。選択肢の中で接続詞は(B) as soon as （～するとすぐに）だけなので(B)を選びます。",translation:"原材料が当社施設に入荷次第、生産を開始する予定です。"},
  {id:395,q:"After a lengthy discussion, the board reached a ——– decision to approve the budget proposal.",options:["unanimous","simultaneous","grateful","redeemable"],answer:0,type:"語彙問題",explanation:"空所の前が動詞reachedに続いて冠詞a、後がdecision（決定）です。これと合うのは(A) unanimous（［全会・満場］一致の）です。",translation:"長い議論の末、理事会は全会一致で予算案を承認することを決定した。"},
