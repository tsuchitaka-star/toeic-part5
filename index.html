  {id:611,q:"——– admitted into the facility is expected to follow the established guidelines.",options:["Everyone","Whoever","These","Those"],answer:0,type:"代名詞・関係詞問題",explanation:"問題文の動詞はis expected（期待されている）でその前が主語でかつ単数と考えられます。したがって(A) Everyone（だれもが）、または(B) Whoever（だれでも）が候補になります。",translation:"当施設に入所されるすべての方は、定められたガイドラインに従うことが求められます。"},
  {id:612,q:"The organization ——– of multiple teams working together to achieve common objectives.",options:["consisting","consist","to consist","consists"],answer:3,type:"動詞問題",explanation:"問題文を見ると、動詞がないので空所には動詞が入ることがわかります。空所の前の\"The organization\"は単数の名詞、空所の後には\"of\"が続いています。したがって空所には問題文の述語動詞になれる三人称単数形の(D) consists（consist ofで「構成する」）が適切です。",translation:"組織は共通の目的を達成するために協力して働く複数のチームで構成されています。"},
  {id:613,q:"The traffic congestion on Monday was ——– by several roadworks happening simultaneously.",options:["cause","causes","caused","causing"],answer:2,type:"動詞問題",explanation:"主語はThe traffic congestion on Monday（月曜日の交通渋滞） 、後ろがby several roadworks（いくつかの道路工事によって）です。",translation:"月曜日の交通渋滞は、同時に発生しているいくつかの道路工事によって引き起こされた。"},
  {id:614,q:"The course is designed to appeal to ——– amateurs and professionals.",options:["where","both","which","either"],answer:1,type:"混合問題",explanation:"空所の後ろが、amateurs and professionalsでA and Bの形で、(B) both（両方の）が適切です。",translation:"このコースは、アマチュアとプロの両方に魅力的にするように設計されています。"},
  {id:615,q:"Fort South Airline sent us a notification ——– the departure and arrival of our rescheduled flight.",options:["detail","details","detailed","detailing"],answer:3,type:"品詞または動詞問題",explanation:"空所の前にある \"a notification\"（通知）は名詞です。この名詞を修飾して、どのような通知なのかを具体的に示す言葉が必要です。そして、後ろに続く \"the departure and arrival of our rescheduled flight\"（我々の予定が変更されたフライトの出発と到着）はその内容を示しています。",translation:"Fort South Airlineは、我々の予定が変更されたフライトの出発と到着を詳しく説明する通知を送ってきた。"},
  {id:616,q:"Many job seekers attend workshops to ——– their interview skills and increase their chances.",options:["proceed","comment","develop","release"],answer:2,type:"語彙問題",explanation:"空所の後に動詞の目的語のtheir interview skills（彼らの面接スキル）があります。これと合うのは(C) develop（開発する、向上させる）です。",translation:"多くの求職者は、面接スキルを向上させ、自分たちのチャンスを増やすためにワークショップに参加します。"},
  {id:617,q:"Studies reveal that domestic industries ——– government subsidies are often more resilient during economic downturns.",options:["were given","given","give","have given"],answer:1,type:"動詞問題",explanation:"reveal以下のthat節の中の主語はdomestic industries（国内産業）で、この産業がgovernment subsidies（政府の補助金）を「与えられる」という関係から、動詞は受動態になります。",translation:"研究によれば、政府の補助金が支給される国内産業は、経済の低迷期においてしばしばより回復力があることが示されています。"},
  {id:618,q:"The project’s success was ——– on securing funding from our investors.",options:["dependent","dependable","depend","depends"],answer:0,type:"品詞問題",explanation:"空所の前にはbe動詞 was があり、後ろには前置詞 on があります。be動詞 wasの後ろなので動詞の原形(C) depend（依存する）や三人称単数形の(D) dependsは除外されます。",translation:"プロジェクトの成功は、投資家からの資金調達に依存していました。"},
  {id:619,q:"Digital communication is ——– traditional letters, reshaping the way we connect with others.",options:["replacing","accounting","interfering","reviewing"],answer:0,type:"語彙問題",explanation:"空所の後ろが目的語 \"traditional letters\" （伝統的な手紙）で、文の後半にある \"reshaping the way we connect with others\" から、デジタルコミュニケーションが伝統的な手紙の位置を変え、私たちの他者とのつながり方を再形成していることがわかります。",translation:"デジタルコミュニケーションは伝統的な手紙の位置を取って代わっており、私たちが他者とつながる方法を再形成しています。"},
  {id:620,q:"To apologize for the inconvenience, we are giving a discount to ——– up for the product’s defect.",options:["making","make","makes","made"],answer:1,type:"動詞問題",explanation:"空所の前がto （…するために）なので、空所には動詞の原形が入ります。したがって(B) makeを選びます。",translation:"不便をおかけしたことをお詫びするために、製品の欠陥を補うための割引を提供しています。"},
  {id:621,q:"Ms. Portman started ——– business, focusing on sustainable fashion trends.",options:["she","herself","hers","her own"],answer:3,type:"代名詞問題",explanation:"空所の前後を見ます。空所の前が動詞started（始めた）、後ろが名詞business（ビジネス）。したがって空所には名詞businessを修飾する所有格+ownの(D) her own（彼女自身の）が適切です。",translation:"Portmanさんは彼女自身のビジネスを始め、持続可能なファッショントレンドに焦点を当てました。"},
  {id:622,q:"Please find the guest registration forms ——– the main entrance.",options:["beside","into","between","during"],answer:0,type:"語彙問題",explanation:"空所の前がthe guest registration forms（ゲストの登録フォーム）、後ろがthe main entrance（メインエントランス）です。この２つをつなぐ適切な前置詞は、(A) beside （～のそばに）です。",translation:"メインエントランスのそばにゲスト登録用紙があります。"},
  {id:623,q:"A special tour is available for ——– interested in understanding the manufacturing process.",options:["none","anyone","whoever","they"],answer:1,type:"代名詞・関係詞問題",explanation:"空所の前が前置詞for、形容詞句interested in（～に興味がある）なので空所には名詞または代名詞が入ることがわかります。",translation:"製造プロセスを理解することに興味がある人なら誰でも、特別なツアーが利用できる。"},
  {id:624,q:"Children under the age of five receive free ——– to the local zoo on weekends.",options:["admission","gift","exhibition","addition"],answer:0,type:"語彙問題",explanation:"「５歳未満の子供たちは週末に地元の動物園への無料の……を受け取る」という文から、子供たちが動物園に入るためのものであるべきです。",translation:"５歳未満の子供たちは、週末に地元の動物園への入場料が無料です。"},
  {id:625,q:"Our main office, located downtown, is easily ——– by all major subway lines.",options:["attainable","presentable","accessible","remarkable"],answer:2,type:"語彙問題",explanation:"空所の前にはeasily（容易に）という副詞があり、後ろにはby all major subway lines（すべての主要な地下鉄路線で）という前置詞句が続いています。「オフィスが地下鉄の路線で簡単に行くことができる」と考えるのが適切なので、(C) accessible（アクセス可能な、到達しやすい）を選びます。",translation:"ダウンタウンに位置する私たちの本社は、すべての主要な地下鉄路線で簡単にアクセスできます。"},
  {id:626,q:"Using outdated software for financial transactions is never ——– due to security risks.",options:["subjected","recommended","contented","improved"],answer:1,type:"語彙問題",explanation:"文は「古いソフトウェアを金融取引に使用することは、セキュリティのリスクのために絶対に——–されない」と言っています。この文脈では、適切な選択肢は(B) recommended（推奨される）です。なぜなら、セキュリティのリスクがあるため、古いソフトウェアの使用は推奨されないというのが自然だからです。",translation:"古いソフトウェアを金融取引に使用することは、セキュリティのリスクのために決して推奨されません。"},
  {id:627,q:"Some companies ——– sustainable growth are focusing on environmentally friendly business practices.",options:["seek","seeks","will seek","seeking"],answer:3,type:"動詞問題",explanation:"空所の前に「Some companies」という主語があり、空所の後に「sustainable growth」という目的語が続いています。",translation:"持続可能な成長を目指す企業の中には、環境に優しい事業慣行に重点を置くところもある。"},
  {id:628,q:"——– Chen Management Consulting introduced the new workflow, our efficiency has greatly improved.",options:["Despite","Since","Regardless of","Due to"],answer:1,type:"部分読み問題",explanation:"カンマ以降がour efficiency has greatly improvedで主語+動詞です。空所の後ろに「Chen Management Consulting introduced」という主語+動詞の形があるので、上の１のパターンに該当し、接続詞が正解となることがわかります。選択肢の中で接続詞は、(B) Since（～して以来、～なので）のみです。したがって、(B) Sinceを選びます。",translation:"Chen Management Consultingが新しいワークフローを導入して以来、私たちの効率は大幅に向上しました。"},
  {id:629,q:"The annual tech conference ——– with a keynote address from a renowned industry expert.",options:["conclusion","concluding","to conclude","concluded"],answer:3,type:"品詞または動詞問題",explanation:"問題文を見ると、動詞（述語動詞）がないことがわかります。したがって空所には述語動詞が必要です。選択肢の中で述語動詞になれるのは、過去形の(D) concluded（終了した）だけでこれを選びます。",translation:"年次技術会議は、著名な業界専門家による基調講演で終了した。"},
  {id:630,q:"Our campaign was ——– successful in capturing the attention of our target audience.",options:["moderate","moderator","moderating","moderately"],answer:3,type:"品詞問題",explanation:"空所の前後を見ます。空所の前がbe動詞was、後ろが形容詞successful（成功した）。したがって、空所には形容詞successfulを修飾する副詞の (D) moderately（副詞：適度に、ある程度）が適切です。",translation:"私たちのキャンペーンは、ターゲットオーディエンスの注目を集めることにある程度成功しました。"},
  {id:631,q:"The new marketing strategy was based on a plan ——– by our senior consultants.",options:["suggest","suggests","suggested","suggesting"],answer:2,type:"動詞問題",explanation:"問題文の動詞は、was based on（～に基づいていた）です。空所の前がa plan（計画）、後ろがby our senior consultants（私たちのシニアコンサルタントによって）で、「私たちのシニアコンサルタントによって提案された計画」と考えるのが適切なので、a planを後ろから修飾する動詞の過去分詞形(C) suggested（提案された）を選びます。",translation:"新しいマーケティング戦略は、私たちのシニアコンサルタントによって提案された計画に基づいていました。"},
  {id:632,q:"For transparent business operations, it is crucial to maintain fair and ——– financial records.",options:["considerable","accurate","affordable","sudden"],answer:1,type:"語彙問題",explanation:"空所の後ろが名詞のfinancial records（財務記録）です。これと合うのは、(B) accurate（正確な）です。念のため、maintain以下の意味は「公正で正確な財務記録を維持する」となり、意味的に適切であることがわかります。",translation:"透明性のあるビジネス運営のためには、公正で正確な財務記録を維持することが極めて重要です。"},
  {id:633,q:"If you have additional suggestions, please email them at a ——– time.",options:["later","previous","further","forward"],answer:0,type:"語彙問題",explanation:"空所の前にある前置詞は \"at\" で、後ろに続く \"time\" と組み合わせて考えると、「特定の未来の時点」を指す言葉が適切であることがわかります。",translation:"追加のご提案がありましたら、後ほどメールでお知らせください。"},
  {id:634,q:"Ms. Peterson ——– to discuss the recent changes in the company policy with everyone.",options:["like","had been liked","would like","is liked"],answer:2,type:"動詞問題",explanation:"空所の前が主語のMs. Peterson、後ろがto discuss。would like to do の形と考えられ、(C) would like（〜したい）を選びます。",translation:"Petersonさんは、会社の方針の最近の変更について皆と話し合いたい。"},
  {id:635,q:"Andre Hunter expressed that the latest symphony he composed is ——– favorite work to date.",options:["he","his","himself","him"],answer:1,type:"代名詞問題",explanation:"空所の前後を確認します。空所の後ろに名詞句favorite work（お気に入りの作品）があり、この名詞句を修飾するのに所有格が必要です。したがって所有格(B) his（彼の）が適切です。",translation:"Andre Hunterは、彼が作曲した最新の交響曲が、これまでの彼のお気に入りの作品であると述べた。"},
  {id:636,q:"The new director is so ——– that she can handle marketing, finance, and operations without difficulty.",options:["conservative","complex","versatile","assorted"],answer:2,type:"語彙問題",explanation:"この文はso … that構文です。",translation:"新しいディレクターは非常に多才で、マーケティング、財務、および運用を難なく取り扱うことができます。"},
  {id:637,q:"The restaurant doesn’t serve any seafood dishes, ——– does it offer vegetarian options on the menu.",options:["or","and","nor","but"],answer:2,type:"語彙問題",explanation:"前文が否定形（doesn’t serve）であり、後文も倒置の否定形（does it offer）であることを考えると、二つの否定文をつなぐときに使用する接続詞は(C) nor （～もまた…ない）です。",translation:"そのレストランはシーフード料理を提供していないし、またベジタリアンオプションもメニューに提供していません。"},
  {id:638,q:"After tasting the new menu, Ms. Sanders ——– a more diverse range of vegetarian options.",options:["recommend","recommended","recommendation","recommending"],answer:1,type:"品詞または動詞問題",explanation:"問題文の中に動詞がないので、空所には動詞（述語動詞）が入ることがわかります。述語動詞になれるのは、現在形の(A) recommend（推薦する）または過去形の(B) recommended（推薦した）です。",translation:"新メニューを試食した後、Sandersさんはベジタリアンの選択肢をもっと豊富にすることを勧めた。"},
  {id:639,q:"The alarm ——– in the logistics department if there’s a delay in any scheduled deliveries.",options:["ring","be rung","rings","ringing"],answer:2,type:"動詞問題",explanation:"文の後半は「if there’s a delay in any scheduled deliveries」であり、これは一般的な仮定の条件を示します。一般的な仮定や習慣的な事実を表現する時、現在の単純な形を使用するのが自然です。",translation:"もし予定された配達に遅延がある場合、物流部門のアラームが鳴ります。"},
  {id:640,q:"It is ——– to review your insurance policies annually to ensure adequate coverage.",options:["advisable","advisory","advise","advisedly"],answer:0,type:"品詞問題",explanation:"空所の前には「It is」という形があり、空所の後ろには不定詞「to review」が続いています。「毎年保険契約を見直すことをお勧めします」とすると意味が通るので、形容詞の(A) advisable（勧められる、適切な）が適しています。",translation:"十分な補償を確保するため、毎年保険契約を見直すことをお勧めします。"},
  {id:641,q:"Please keep our development team ——– of any changes to the project scope or specifications.",options:["information","informed","inform","informative"],answer:1,type:"品詞問題",explanation:"空所の前後を見ると、前に「keep our development team」というフレーズがあり、後に「of any changes」というフレーズが続いています。この文脈では「開発チームに変更を知らせる」という意味が適切です。したがって、空所には動詞の過去分詞や形容詞が入る形が考えられます。",translation:"プロジェクトの範囲や仕様に関する変更があれば、開発チームにその情報を伝えてください。"},
  {id:642,q:"If you order before noon, Rosewood Office Supplies guarantees ——– within the next working day.",options:["deliverable","delivery","deliver","delivered"],answer:1,type:"品詞問題",explanation:"空所の前にguarantees（保証する）という他動詞、後ろに前置詞withinがあることを確認します。この他動詞の後に続く目的語には名詞が適切なので、(B) delivery（名詞：配送、配達）を選びます。",translation:"正午前に注文すると、Rosewood Office Suppliesは翌営業日中の配送を保証します。"},
  {id:643,q:"Mr. Kobayashi is considering either going on a vacation ——– attending a short course this summer.",options:["or","while","but","and"],answer:0,type:"語彙問題",explanation:"問題文の前半にeitherが登場しています。これはeither &#8230; or &#8230;の相関接続詞の形になることを示しています。したがって、空所には(A) orが適切です。",translation:"Kobayashiさんは、この夏に休暇に行くか、または短期講座に参加するかを検討しています。"},
  {id:644,q:"The local theater group has ——– produced entertaining plays that attract large audiences.",options:["affordably","shortly","consistently","enormously"],answer:2,type:"語彙問題",explanation:"空所の後の動詞は\"produced\"（生み出した）で、その目的語は\"entertaining plays\"（楽しい演劇）です。この文脈から、地元の劇団が大勢の観客を引きつける楽しい演劇を「どのように」生み出してきたのかを示す副詞が求められます。「一貫して楽しい演劇を生み出してきた」とするのが適切なので、(C) consistently（一貫して、定期的に）を選びます。",translation:"地元の劇団は、大勢の観客を引きつける楽しい演劇を一貫して生み出してきました。"},
  {id:645,q:"Unfortunately, the highway will be closed for maintenance ——– the next three hours.",options:["since","greatly","for","while"],answer:2,type:"語彙問題",explanation:"空所の前にthe highway will be closedで主語＋動詞、空所の後に\"the next three hours\"という時間を表す名詞句です。これは４のパターンに該当し、空所には前置詞が入ります。前置詞の働きがある選択肢は(A) since（～以来）と(C) for（～の間）があります。the next three hours（次の3時間）という時間の長さを示すときに適切な前置詞は(C) for（～の間）です。",translation:"残念ながら、高速道路は次の3時間、メンテナンスのために閉鎖される予定です。"},
  {id:647,q:"Ms. Zhong presented the ——– financial statements to the board during the quarterly review.",options:["revising","revision","revise","revised"],answer:3,type:"動詞または品詞問題",explanation:"空所の前が冠詞the、後ろが名詞句のfinancial statements（財務諸表）で、この名詞句を修飾する形容詞が空所に入ると考えられます。",translation:"Zhongさんは四半期のレビュー中に、修正された財務諸表を取締役会に提示しました。"},
  {id:648,q:"Ms. Anderson ——– offered to donate a portion of her book sales to our school library.",options:["financially","permanently","generously","comparatively"],answer:2,type:"語彙問題",explanation:"空所の後ろはoffered to donate（寄付することを申し出た）です。これに合うのは、 (C) generously（気前よく、寛大に）です。",translation:"Andersonさんは気前よく彼女の本の売上の一部を私たちの学校の図書館に寄付することを申し出た。"},
  {id:649,q:"The manual included a ——– description of the machine’s safety procedures and maintenance guidelines.",options:["length","lengthy","lengthily","lengthen"],answer:1,type:"品詞問題",explanation:"空所の前には冠詞 \"a\" があり、後ろには名詞 \"description\" が続いています。この文構造から、形容詞が空所に適切です。よって、形容詞の(B) lengthy（長い）が正解となります。",translation:"マニュアルには、機械の安全手順と保守ガイドラインの長い説明が含まれていました。"},
  {id:650,q:"Dynamic Logi Solutions has successfully ——– a new strategy to enhance its global presence.",options:["convinced","regarded","implemented","functioned"],answer:2,type:"語彙問題",explanation:"空所の後ろには \"a new strategy（新しい戦略）\" という名詞句が続いています。この名詞句との組み合わせで意味が通る動詞を探します。",translation:"Dynamic Logi Solutionsは、その国際的な存在感を高めるための新しい戦略を成功裏に実施しました。"},
  {id:651,q:"Implementing flexible hours has significantly increased employee ——– across departments.",options:["produced","productivity","productive","productively"],answer:1,type:"品詞問題",explanation:"空所の前は、動詞increased（向上させた）に名詞employee（従業員）が続きます。空所の後は前置詞across（～中に、～のいたる所に）です。動詞increasedの目的語として、複合名詞のemployee productivity（従業員の生産性）とすると意味が通るので、(B) productivity（生産性）を選びます。",translation:"フレックスタイム制の導入により、部門を問わず従業員の生産性が大幅に向上した。"},
  {id:652,q:"The building will open to the public ——– the new renovations are complete.",options:["as a result of","rather","instead of","as soon as"],answer:3,type:"部分読み問題",explanation:"空所の前は \"The building will open\" という主語+動詞の形です。空所の後ろも \"the new renovations are\" という主語+動詞の形です。この構文は先に示した２のパターンに該当し、空所には接続詞が入ることがわかります。選択肢の中で接続詞は、(D) as soon as（～するとすぐに）のみです。したがって、(D) as soon as（～するとすぐに）を選びます。",translation:"新しい改修が完了するとすぐに、その建物は一般公開されるだろう。"},
  {id:653,q:"Government grants are crucial to ——– the ongoing maintenance of public infrastructure.",options:["install","substitute","support","please"],answer:2,type:"動詞の語彙問題",explanation:"文脈から、政府の助成金が公共インフラの継続的な維持に「何」であるかを示しています。適切な動詞は「公共インフラの継続的な維持を助ける・支える」意味が必要です。この文脈で意味が合うのは(C) support（支援する、支える）です。",translation:"政府の助成金は、公共インフラの継続的な維持を支えるために非常に重要です。"},
  {id:654,q:"We interviewed Sasha Allen and Sarah Lopez to understand what motivates ——–.",options:["their","them","theirs","they"],answer:1,type:"代名詞問題",explanation:"空所に入る代名詞は、Sasha AllenとSarah Lopezの二人を動詞motivates（動機づける）の目的語として受けるものである必要があります。したがって目的格の(B) them（彼女たちを）が適切です。",translation:"私たちはSasha AllenとSarah Lopezにインタビューし、彼女たちを動機づけているものを理解した。"},
  {id:655,q:"Each department head has the ——– to manage their team’s tasks.",options:["claim","conclusion","authority","registration"],answer:2,type:"語彙問題",explanation:"空所の後にto manage their team’s tasks（チームのタスクを管理するための）という不定詞が続きます。この文脈に合わせて、部署の責任者がチームのタスクを管理する「権限」や「権力」を持っていることを示す単語が適切です。そのため、(C) authority（権限）が適切です。",translation:"各部署の責任者は、チームのタスクを管理する権限を持っています。"},
  {id:656,q:"Our commitment to sustainability benefits ——– the environment and our reputation.",options:["neither","both","either","among"],answer:1,type:"部分読み問題",explanation:"空所の後ろが、the environment and our reputation（環境と我々の評判）でA and Bの形です。したがって空所には(B) bothが適切です。",translation:"私たちの持続可能性への取り組みは、環境と私たちの評判の両方に利益をもたらします。"},
  {id:657,q:"——– we been aware of the road closures, we would have chosen a different route.",options:["If","Because","Although","Had"],answer:3,type:"語彙問題",explanation:"空所の後に主語\"we\"と過去分詞\"been\"が続いています。カンマ以降はwe would have chosenで仮定法過去完了の形になっています。したがって、ifを省略して、hadを前に出した仮定法過去完了の倒置形と考え、(D) Hadが適切です。",translation:"我々が道路の閉鎖を知っていたならば、別のルートを選んでいたでしょう。"},
  {id:658,q:"Once the delegates arrive in the morning, we intend to give them a tour ——– our factory.",options:["down","as","into","of"],answer:3,type:"語彙問題",explanation:"この文のキーワードは \"a tour\" で、それに続く正しい前置詞を選ぶ必要があります。この文脈で正しい前置詞は \"of\" で、\"a tour of [場所]\" という形になります。この構造は、ある場所や施設を案内する場合の一般的な表現方法です。",translation:"代表団が朝に到着すると、私たちは彼らに当社の工場見学を行うつもりです。"},
  {id:659,q:"The advantages and challenges of ——– the headquarters will be discussed in tomorrow’s board meeting.",options:["relocate","relocation","relocating","to relocate"],answer:2,type:"品詞または動詞問題",explanation:"空所の前が \"The advantages and challenges of（～の利点と課題）\" で、この後に続く形を確認する必要があります。前置詞\"of\" の後には、動名詞（-ing形）や名詞が適切です。候補は名詞の(B) relocation（移転）と動名詞の(C) relocating（移転すること）です。この２つの中で後ろのthe headquarters（本社）をつなぐことができる動名詞形の(C) relocatingが適切です。",translation:"本社を移転することの利点と課題について、明日の役員会議で議論される予定です。"},
  {id:660,q:"Due to increasing complaints, a more ——– inspection program was introduced.",options:["simultaneous","negligent","stringent","complimentary"],answer:2,type:"語彙問題",explanation:"この文は「増加するクレームのため、もっと○○な検査プログラムが導入された」という内容です。ここで空所に入る形容詞は、検査プログラムがより厳格であることや効果的であることを示すものが考えられます。",translation:"増加するクレームのため、より厳格な検査プログラムが導入されました。"},
  {id:661,q:"At the annual general meeting, the board ——– the proposed budget for the next fiscal year.",options:["introduce","would have been introduced","had been introduced","will be introducing"],answer:3,type:"能動態・受動態・時制に関する動詞問題",explanation:"空所の前はthe board（取締役会）、後ろがthe proposed budget（提案された予算）です。空所の動詞は、「the board（取締役会）がthe proposed budget（提案された予算）」を「紹介する」という能動態が適切です。能動他の選択肢は、現在形の(A) introduceと未来進行形の(D) will be introducingの２つです。このうち(A) introduceは、主語the boardは三人称単数なので、動詞にsをつけてintroducesでなければなりません。したがって、未来進行形の(D) will be introducingを選びます。",translation:"毎年の総会で、取締役会は次の会計年度の提案された予算を紹介する予定です。"},
  {id:662,q:"Team meetings are ——– every Monday morning to discuss the week’s goals and priorities.",options:["occurred","preserved","scheduled","acquired"],answer:2,type:"語彙問題",explanation:"空所の前の主語がTeam meetings（チームミーティング）、後ろがevery Monday morning（毎週月曜日の朝に）です。「チームミーティングは毎週月曜日の朝に予定されている」と考えるのが適切なので、(C) scheduled（予定された）を選びます。",translation:"チームミーティングは、週の目標と優先事項を議論するために、毎週月曜日の朝に予定されています。"},
  {id:663,q:"The emergency exits must be readily ——– for all employees in case of any unforeseen events.",options:["access","accesses","accessible","accessibly"],answer:2,type:"品詞問題",explanation:"空所の前はbe動詞beと副詞readily（容易に）、後ろには前置詞forがあります。したがって空所には形容詞が入り、形容詞の(C) accessible（アクセス可能な、利用可能な）が適切です。",translation:"緊急出口は、予期しない事態の場合、すべての従業員が簡単に利用できる必要があります。"},
  {id:665,q:"Documents containing personal information must ——– be stored securely to protect privacy.",options:["always","roughly","slightly","shortly"],answer:0,type:"語彙問題",explanation:"主語はDocuments containing personal information（個人情報を含む書類）、空所の前は助動詞mustがあります。そして空所の後には動詞be stored securely（安全に保管される）が続きます。",translation:"個人情報を含む書類は、プライバシーを守るために常に安全に保管されなければならない。"},
  {id:666,q:"The technician ——– deleted some important files during the system update.",options:["mistakes","mistook","mistake","mistakenly"],answer:3,type:"品詞または動詞問題",explanation:"主語はThe technician（技術者）、空所の後に動詞の過去形deleted（削除した）があります。空所には副詞が入ります。したがって、副詞の(D) mistakenlyを選びます。",translation:"技術者はシステムの更新中に誤っていくつかの重要なファイルを削除した。"},
  {id:667,q:"Miyama Kitchen ——– outstanding feedback on service quality since Ms. Tanaka became the manager.",options:["receiving","has received","is received","will have been received"],answer:1,type:"能動態・受動態・時制に関する動詞問題",explanation:"問題文の中に、動詞（述語動詞）がないので空所には述語動詞になれる動詞が入ります。空所の前は主語Miyama Kitchen、空所の後ろはoutstanding feedback（素晴らしいフィードバック）なので、「Miyama Kitchen」は「outstanding feedback（素晴らしいフィードバック）」を「受ける」という能動態の関係が適切です。",translation:"Miyama Kitchenは、Tanakaさんがマネージャーになって以来、サービスの質に関して素晴らしいフィードバックを受けています。"},
  {id:668,q:"All employees who attended the workshop will be ——– reimbursed for their travel expenses.",options:["promptly","prompt","promptness","prompts"],answer:0,type:"品詞問題",explanation:"空所の前後を確認します。空所の前がbe動詞のbe、後ろが動詞の過去分詞形reimbursed（払い戻された）です。この場合、空所には動詞の過去分詞形reimbursedを修飾する副詞が適切です。選択肢の中で副詞は(A) promptly（迅速に）でこれを選びます。",translation:"研修会に参加した全ての従業員は、旅費が迅速に払い戻される。"},
  {id:669,q:"Financial analysts are ——– predicting a modest increase in the stock market next week.",options:["cautiously","accidently","considerably","respectively"],answer:0,type:"語彙問題",explanation:"空所の後を見ます。空所の後ろが predicting a modest increase in the stock market next week （来週の株式市場は小幅な上昇になると予測している）です。この部分を修飾する適切な副詞は(A) cautiously（慎重に）です。",translation:"金融アナリストたちは、来週の株式市場は小幅な上昇になると慎重に予測している。"},
  {id:670,q:"The customer will receive a notification when the package ——– to the specified address.",options:["will be delivering","had been delivered","is delivered","delivers"],answer:2,type:"能動態・受動態・時制に関する動詞問題",explanation:"この文では、未来の出来事を述べる \"will receive\" が主節で使用されています。その後、時制を示す接続詞 \"when\" に続いて動詞の適切な形が必要となります。when以下は時を表す副詞節なので、時制は現在または現在完了になります。選択肢の中で現在または現在完了時制は、受動態の(C) is delivered（配達される）、能動態の(D) delivers（配達する）の２つです。",translation:"指定された住所に荷物が配達されると、お客様に通知が届きます。"},
  {id:671,q:"This area has a high ——– of tech startups, fostering innovation.",options:["concentration","prediction","transaction","consumption"],answer:0,type:"語彙問題",explanation:"この問題では、ひとつひとつ選択肢を当てはめていきましょう。",translation:"この地域にはハイテク新興企業が集中しており、イノベーションを促進している。"},
  {id:672,q:"——– leadership skills, consider enrolling in a management training program.",options:["Improve","To improve","Improved","Having been improved"],answer:1,type:"動詞問題",explanation:"カンマ以降は動詞の原形 \"consider（検討する）\"から始まる命令文 で、 \"enrolling in a management training program（マネジメントトレーニングプログラムに参加すること）\" がconsiderの目的語です。",translation:"リーダーシップスキルを向上させるために、マネジメントトレーニングプログラムに参加することを検討してください。"},
  {id:673,q:"Our fitness tracker, ——– rival models, is waterproof and also monitors sleep patterns accurately.",options:["unlike","within","besides","during"],answer:0,type:"語彙問題",explanation:"前半は「当社のfitness tracker（フィットネストラッカー）は、waterproof（防水）である」という意味なので、「rival models（競合モデル）と異なって」とすると意味が通るので、(A) unlike（～とは異なって）が適切です。",translation:"当社のフィットネストラッカーは、競合モデルとは異なり、防水であり、また睡眠パターンも正確に監視します。"},
  {id:674,q:"It is crucial for anyone ——– in a research project to maintain the confidentiality of their findings.",options:["is involved","involves","involving","involved"],answer:2,type:"動詞問題",explanation:"問題文の動詞（述語動詞）はisです。したがって、選択肢の中の述語動詞の形のbe動詞+過去分詞の(A) is involvedと三人称単数現在形の(B) involvesは除外します。",translation:"研究プロジェクトに関わるすべての人にとって、彼らの発見の機密性を維持することが極めて重要です。"},
  {id:676,q:"No matter ——– proficient we become, there is always room for improvement.",options:["though","what","how","such"],answer:2,type:"接続詞や副詞問題",explanation:"空所の前がNo matterなので、これに続くのは(B) whatのno matter what（たとえ何～でも）と(C) howのno matter how（どんなに～であろうとも）の２つが考えられます。",translation:"私たちがどんなに熟達しても、常に改善の余地があります。"},
  {id:678,q:"Julia is planning a vacation to Europe to celebrate ——– 10 years of service in our department.",options:["within","until","after","by"],answer:2,type:"語彙問題",explanation:"空所の前が動詞celebrate（祝う）、空所の後が10 years of service（10年間の勤務）です。10 years of service（10年間の勤務）に合う前置詞は(C) after（～の後に）です。前置詞の「after」は、ある出来事の後で別の出来事が発生することを示します。",translation:"Juliaは、我々の部門での10年間の勤務の後、お祝いにヨーロッパへの休暇を計画している。"},
  {id:679,q:"The software application quit ——– during the data analysis process.",options:["attentively","unexpectedly","hopefully","absolutely"],answer:1,type:"語彙問題",explanation:"空所の前が動詞のquit（終了する、終わる）、後ろがduring the data analysis process（データ分析の過程中に）。この文脈を考慮すると、ソフトウェアアプリケーションがデータ解析の途中で「予期せず終了した」とすると意味が通ります。したがって、(B) unexpectedly（予期せずに）が適しています。",translation:"ソフトウェアアプリケーションはデータ分析の過程中に予期せずに終了しました。"},
  {id:680,q:"With a tight budget, it is crucial to decide ——– options will yield the best return on investment.",options:["which","that","how","whoever"],answer:0,type:"関係詞・接続詞問題",explanation:"空所の前後を見ます。空所の前が動詞decide（決定する）、後ろがoptions（オプション、選択肢）と助動詞+動詞のwill yield（もたらす）が続きます。この文脈を考慮すると、「どのオプションが～もたらすかを決定する」と考えるのが適切です。したがって、(A) which（どの）を選びます。",translation:"予算が限られている中、どのオプションが最も良い投資利益率をもたらすかを決定することが重要です。"},
  {id:681,q:"We have a dedicated hotline to ——– to customer feedback and complaints.",options:["responding","responded","response","respond"],answer:3,type:"動詞または品詞問題",explanation:"問題文の動詞はhaveと考えられます。空所の前がtoなので、動詞の原形の(D) respond（応答する）を入れた不定詞について検討します。不定詞とすると問題文は、",translation:"私たちは、顧客のフィードバックや苦情に対応するための専用のホットラインを持っています。"},
  {id:682,q:"We need to prepare the presentation slides for the ——– meeting next week.",options:["scheduling","scheduler","scheduled","schedule"],answer:2,type:"品詞問題",explanation:"空所の前が冠詞the、後ろが名詞のmeeting。空所には、meetingを修飾する形容詞が必要です。形容詞的な働きのある(A) schedulingと(C) scheduledが候補になりますが、scheduled meeting（予定された会議）というフレーズがあり、(C) scheduledが適切です。",translation:"来週の予定された会議のために、プレゼンテーションのスライドを準備する必要があります。"},
  {id:683,q:"The conference rooms for client meetings are conveniently situated ——– the third floor.",options:["for","on","under","between"],answer:1,type:"語彙問題",explanation:"空所の前がsituated（位置している）、空所の後ろが\"the third floor\"です。建物の階数を示す場合には、前置詞(B) on（～に）が適切です。",translation:"クライアントとのミーティング用の会議室は便利な3階にある。"},
  {id:684,q:"To ensure transparency, we strive to keep our shareholders ——– about financial decisions.",options:["information","informing","informed","inform"],answer:2,type:"品詞問題",explanation:"空所の前後を見ると、前に「keep our shareholders」というフレーズがあり、後に「about financial decisions」というフレーズが続いています。our shareholders（株主）はabout以下についてinformed（知らされる）という受動態の関係が適切です。したがって、形容詞・過去分詞形の(C) informed（形容詞・過去分詞：知らされた、情報を持っている）が適切です。",translation:"透明性を確保するため、私たちは株主に財務上の決定に関して知らせる努力をしています。"},
  {id:685,q:"Whenever there is a software update, our technician can ——– solve any compatibility issues.",options:["ease","easily","eased","easy"],answer:1,type:"品詞問題",explanation:"空所の前後を中心に見ていきます。空所の前が助動詞can、後に動詞solve がありますので、この動詞を修飾する副詞が求められます。副詞は(B) easily（容易に）でこれを選びます。",translation:"ソフトウェアのアップデートがあるたびに、私たちの技術者は互換性の問題を容易に解決することができます。"},
  {id:686,q:"——– our supervisor’s achievements is the expansion of our company into three new international markets.",options:["Beyond","Except","As","Among"],answer:3,type:"語彙問題",explanation:"空所の後ろが \"our supervisor’s achievements\" と続きます。これは、上司の功績の中の一つとして、会社の3つの新しい国際市場への拡張が挙げられることを示しています。そのため、この文脈で「～の中の一つ」を意味する前置詞(D) Amongが適切です。",translation:"上司の功績の中の一つに、当社が新たに3つの国際市場に進出したことが挙げられる。"},
  {id:687,q:"If you encounter technical problems, email the support team for ——– with troubleshooting.",options:["assistant","assisted","assistance","to assist"],answer:2,type:"品詞問題",explanation:"空所の前にあるのは前置詞のfor、そして後ろに続くのはwith troubleshooting（トラブルシューティングについて）というフレーズです。前置詞の後には名詞または名詞句がきます。名詞は(A) assistant（助手、アシスタント）と名詞の(C) assistance（支援、援助）がありますが、「トラブルシューティングについての支援/援助」と考えるのが適切なので、(C) assistance（支援、援助）を選びます。",translation:"技術的な問題に遭遇した場合、トラブルシューティングの支援のためにサポートチームにメールしてください。"},
  {id:688,q:"The construction of the new wing of the library ——– next Thursday after the council’s approval.",options:["beginning","begins","will begin","began"],answer:2,type:"動詞問題",explanation:"問題文を読むと、「next Thursday」（来週の木曜日）という未来の時点で何かが起こると示唆されています。問題文中に動詞（述語動詞）がないので、空所には未来形の動詞が入ることはわかります。したがって、未来形の(C) will beginを選びます。",translation:"議会の承認の後、図書館の新しい棟の建設は来週の木曜日に始まる予定です。"},
  {id:689,q:"The new policy limits customers to three discounted items per ——– during the sale.",options:["purchase","purchases","purchasing","purchased"],answer:0,type:"品詞問題",explanation:"空所の前には前置詞perがあり、後ろにはduring the sale（セール期間中）というフレーズが続いています。ここでは、セール中に顧客がする一つの「購入」ごとの割引商品の制限を示していると考えられます。したがって、名詞の単数形の(A) purchase（購入、購入品）が適切です。",translation:"新しいポリシーでは、セール期間中に顧客は一回の購入ごとに3つの割引商品に制限されます。"},
  {id:690,q:"Our team places a high value on confidentiality when handling ——– business information from clients.",options:["experienced","delicate","relative","acquainted"],answer:1,type:"語彙問題",explanation:"空所の前がhandling（取り扱う）、後ろがbusiness information（ビジネス情報）。この文脈では、取り扱うべきビジネス情報が機密性を要するものであると考えるのが適切です。したがって、(B) delicate（細心の注意を要する、デリケートな）が適切です。",translation:"私たちのチームは、クライアントからの細心の注意を要するビジネス情報を取り扱う際に機密性を非常に重視しています。"},
  {id:691,q:"We continue to choose Forest View Inn for our company retreats ——– higher costs than other options.",options:["consequently","in contrast","in spite of","even when"],answer:2,type:"<strong>部分読み問題</strong>",explanation:"文頭から見ていくとWe continue to chooseは主語+動詞です。空所の後ろのhigher costs than other options（他の選択肢よりも高い費用）は名詞句で、この形は上の４のパターンで前置詞が入ります。したがって、唯一の前置詞(C) in spite of（～にも関わらず）が適切です。",translation:"他の選択肢よりも高い費用にも関わらず、私たちはForest View Innを研修旅行のために選び続けています。"},
  {id:692,q:"Every organization needs a ——– engineer like Mia Kitagawa to drive technical innovations.",options:["valuably","valuable","value","values"],answer:1,type:"品詞問題",explanation:"空所の前後を見ると、前には冠詞 \"a\"、後には名詞 \"engineer\" があります。これにより空所には形容詞が必要です。したがって、形容詞の (B) valuable（貴重な、有価値な）が適切です。",translation:"すべての組織は、技術革新を推進するために、Mia Kitagawaのような貴重なエンジニアを必要としています。"},
  {id:693,q:"When choosing a software vendor, consider ——– of the advantages and disadvantages of each candidate.",options:["all","anyone","every","entire"],answer:0,type:"数量形容詞・代名詞問題",explanation:"空所の後ろがofという前置詞で、それに続く名詞句が「the advantages and disadvantages」です。この名詞句は可算名詞の複数形を含むため、それらの全体を指す語が必要です。この文脈に合った選択肢は (A) all（すべての、すべて）のみでこれを選びます。",translation:"ソフトウェアの販売業者を選ぶ際、各候補の利点と欠点のすべてを考慮してください。"},
  {id:694,q:"Titan Steel Enterprises sent a letter ——– its plan to expand operations in Europe next year.",options:["confirms","confirming","confirmed","confirmation"],answer:1,type:"動詞または品詞問題",explanation:"空所の前には「letter」という名詞があり、後ろには「its plan」という名詞句が続いています。ここでは、「letter」が「何の内容についての手紙か」という情報を説明する形の動詞が必要です。問題文の動詞（述語動詞）として、すでに「sent」があるので、「letter」を後ろから修飾する現在分詞形の(B) confirming（確認する）です。",translation:"Titan Steel Enterprisesは、来年ヨーロッパでの事業拡大の計画を確認する手紙を送った。"},
  {id:695,q:"The company’s policy on dress code contributes to maintaining a professional work ——–.",options:["environment","expression","strategy","background"],answer:0,type:"語彙問題",explanation:"空所の前の動名詞maintaining（維持する）があり、その目的語がa professional work …（専門的な職場の）になります。空所に入る単語は「専門的な職場の〇〇」を「維持する」に合う名詞が必要です。この文脈で適切なのは(A) environment（環境）です。",translation:"会社のドレスコードの方針は、専門的な職場環境を維持するのに貢献しています。"},
  {id:696,q:"Please fill out your full name and address in the space ——– on the application form.",options:["provide","providing","provides","provided"],answer:3,type:"動詞問題",explanation:"問題文の動詞（述語動詞）はfillなので、空所には述語動詞の形の(A) provide（提供する）と(C) providesは入りません。残りの現在分詞形の(B) providingまたは過去分詞形の(D) providedのどちらかになります。",translation:"申請書に提供されている空白に、あなたの氏名と住所を記入してください。"},
  {id:697,q:"Mr. Kang himself had ——– about the tight deadlines and requested an extension.",options:["exceptions","reservations","indications","promotions"],answer:1,type:"語彙問題",explanation:"文の意味は「Kangさんは、厳しい締め切りについて…しており、延長を要求しました」です。(B) reservations（懸念 ※「予約」の意味がありますがここでは「懸念」）を選ぶと「have reservations about（～に関して懸念を感じている）」になり、全体の意味として適切です。したがって、(B) reservations（懸念）を選びます。",translation:"Kangさん自身が締め切りに関して懸念を抱いており、延長を要求しました。"},
  {id:698,q:"All project reports need to be submitted to the department head ——– Monday.",options:["at","with","in","by"],answer:3,type:"語彙問題",explanation:"空所の後ろがMonday（月曜日）で、空所の前にある文脈から、プロジェクトのレポートは「月曜日まで」に提出する必要があると考えられます。したがって、空所には期限を示す前置詞の(D) by（～までに）を選びます。",translation:"すべてのプロジェクトレポートは、月曜日までに部門の責任者に提出する必要があります。"},
  {id:699,q:"During our ——– to the special exhibition, we witnessed some of the rarest artifacts on display.",options:["visitor","visited","visiting","visit"],answer:3,type:"品詞問題",explanation:"空所の前後を見ます。前には所有格our（私たちの）、後ろには前置詞toと名詞句the special exhibition（特別展示）が続くので空所には名詞が入ります。",translation:"私たちが特別展示を訪れている間に、展示されている中でも最も珍しい工芸品を目撃しました。"},
  {id:700,q:"To reduce plastic waste, our products are ——– wrapped in recyclable paper.",options:["confidentially","individually","remarkably","significantly"],answer:1,type:"語彙問題",explanation:"空所の後を見ます。空所の後ろがwrapped in recyclable paper（リサイクル可能な紙で包まれている）です。この文脈から、商品がどのように包装されているのかを示す副詞が求められています。",translation:"プラスチック廃棄物を減らすために、当社の製品はリサイクル可能な紙にひとつずつ包まれています。"},
  {id:701,q:"With his expertise, Jose Martinez is ——–—- maintaining advancements in our technological innovations.",options:["consistent","consistency","consisted","consistently"],answer:3,type:"品詞問題",explanation:"空所の前にはbe動詞isがあり、空所の後に動詞の現在分詞形maintaining（維持している）が続いていることから、空所には動詞maintainingを修飾する副詞が適切です。選択肢の中で副詞は(D) consistently（一貫して）で、これを選びます。",translation:"Jose Martinezはその専門知識で、私たちの技術革新の進歩を一貫して維持しています。"},
  {id:702,q:"Vortex Digital Solutions rewarded employees for ——– innovation and creativity in developing the new product line.",options:["they","their","them","themselves"],answer:1,type:"代名詞問題",explanation:"空所の前が前置詞 for、その後に名詞innovation and creativityが続いています。したがって後ろの名詞を修飾する所有格の(B) their（彼らの）が適切です。",translation:"Vortex Digital Solutionsは、新製品ラインの開発における革新性と創造性に対して従業員に報いた。"},
  {id:703,q:"The instructions were made clear ——– every team member knew their role and responsibilities.",options:["in fact","in order to","so that","in case of"],answer:2,type:"接続詞・前置詞・副詞問題",explanation:"空所の前は、The instructions were madeで主語+動詞の形、空所の後ろは、every team member knewで同じように主語+動詞の形になっています。これは上の２のパターンで、空所には接続詞が入ります。選択肢の中で接続詞は、(C) so that （～できるように）のみでこれを選びます。",translation:"チームメンバー全員が自分の役割と責任を理解できるよう、指示は明確にされた。"},
  {id:704,q:"Customers can return items with ——– they are not satisfied within 30 days of purchase.",options:["whose","what","which","who"],answer:2,type:"関係詞問題",explanation:"空所の前に \"items with\" というフレーズがあり、これがヒントです。 \"items（商品）\" は先行詞と考えられ、人以外を先行詞とする関係代名詞 (C) whichを選びます。",translation:"お客様は、ご購入後30日以内であれば、ご満足いただけない商品を返品することができます。"},
  {id:705,q:"Nebula Networks can ——– to expand its operations after securing a significant investment recently.",options:["address","afford","suppose","depend"],answer:1,type:"語彙問題",explanation:"文脈から、Nebula Networksが最近大きな投資を確保した後に、オペレーションを拡大する能力があることを示しています。選択肢の中で、「負担することができる」「余裕がある」という意味の動詞は(B) afford（～する余裕がある）です。",translation:"Nebula Networksは、最近多額の投資を確保した後、事業を拡大する余裕があります。"},
  {id:706,q:"The construction project was ——– to progress than initially planned due to unforeseen challenges.",options:["slow","slowing","slowed","slower"],answer:3,type:"品詞または比較問題",explanation:"thanが空所の後方にあるため、比較級が必要です。また、空所の前にwasがあることから形容詞が適しています。これにより、(D) slower（より遅い）が適切です。",translation:"建設プロジェクトは、予期せぬ課題のために当初の計画よりも進捗が遅れた。"},
  {id:707,q:"A degree in business administration opens up a variety of career ——– in multiple sectors.",options:["attractions","answers","options","tasks"],answer:2,type:"語彙問題",explanation:"空所の前にある\"career（キャリア）\"との組み合わせ、および空所の後ろに続く\"in multiple sectors（複数の分野で）\"という文脈から、経営学の学位が多様な分野で様々なキャリアの選択肢を開くことがわかります。これを考慮に入れて、(C) options（選択肢）が適切です。",translation:"経営学の学位を取得すれば、複数の分野でさまざまなキャリアの選択肢が広がります。"},
  {id:708,q:"Apply the adhesive evenly ——– both surfaces to ensure a strong bond when joined.",options:["in","to","out","off"],answer:1,type:"語彙問題",explanation:"この文の空所の前には \"evenly\"（均一に）という副詞があり、後には \"both surfaces\"（両面）という名詞があります。これにより、「接着剤を均一に両面に塗布する」と考えられます。したがって、前置詞 (B) to（～に）が適切です。",translation:"接着剤を両面に均一に塗布し、接合時に強固に接着するようにします。"},
  {id:709,q:"Those who exceed their allocated data limit ——– extra fees by their service providers.",options:["will be charged","charge","have charged","are charging"],answer:0,type:"動詞問題",explanation:"主語は \"Those who exceed their allocated data limit\"（割り当てられたデータ制限を超える人々）で、動詞が空所になっています。「割り当てられたデータ制限を超える人々（Those who exceed their allocated data limit）」が「追加料金（extra fees）」を「請求される」という受動態が適切です。",translation:"割り当てられたデータ制限を超える人々は、サービス提供者によって追加料金が請求されます。"},
  {id:711,q:"Entrepreneurs often learn about the market and business strategies ——– the experience of trial and error.",options:["unless","through","consequently","although"],answer:1,type:"部分読み問題",explanation:"空所の前は、Entrepreneurs often learnで主語+動詞、空所の後ろはthe experience of trial and errorという名詞句です。これは上の４のパターンになり、空所には前置詞が適切です。選択肢の中で前置詞は (B) through（～を通じて）のみでこれを選びます。",translation:"起業家たちは、試行錯誤の経験を通じて、市場やビジネス戦略について学ぶことがよくあります。"},
  {id:712,q:"Customers should read privacy policies to understand how to secure ——– personal data.",options:["them","their","they","themselves"],answer:1,type:"代名詞問題",explanation:"空所の後に \"personal data\" という名詞があり、空所の前に \"secure（保護する）\" という動詞があるので、空所には所有格の代名詞が必要です。このため、(B) their（彼らの）が適切な選択肢となります。",translation:"顧客は自分の個人データを保護する方法を理解するためにプライバシーポリシーを読むべきである。"},
  {id:713,q:"The subscription base for our online magazine continues to ——– grow thanks to quality content and marketing.",options:["steadying","steadily","steadiest","steady"],answer:1,type:"品詞または比較問題",explanation:"空所の前には動詞continues to（～を続ける）とあり、後ろには動詞grow（成長する）とあります。このパターンから空所には動詞growを修飾する副詞が入ります。したがって、選択肢から副詞の(B) steadily（着実に）を選びます。",translation:"質の高いコンテンツとマーケティングのおかげで、私たちのオンラインマガジンの購読者基盤は着実に成長し続けています。"},
  {id:714,q:"Azure Retreat is located directly ——– the beach, providing guests with stunning sea views from their rooms.",options:["opposite","among","within","nearby"],answer:0,type:"複合語彙問題",explanation:"Azure Retreatが直接ビーチの何処かに位置していて、客室から素晴らしい海の景色が楽しめるという文脈です。空所に入る語がビーチに対するAzure Retreatの位置を示しています。",translation:"Azure Retreatはビーチの真向かいに位置しており、客室から素晴らしい海の景色を楽しむことができます。"},
  {id:715,q:"All equipment will be provided for ——– participants who registered for the hands-on training session.",options:["Another","Every","Those","Each"],answer:2,type:"数量形容詞問題",explanation:"空所の後ろはparticipants（参加者）で可算名詞の複数形です。可算名詞の複数の前にくる選択肢は、(C) Those のみで、これを選びます。",translation:"実地研修に登録した参加者には、すべての機材が提供される。"},
  {id:716,q:"The new material is ——– to heat, making it ideal for use in high-temperature environments.",options:["resistance","resisted","resists","resistant"],answer:3,type:"品詞問題",explanation:"空所の直前がbe動詞isで、その後にto heat（熱に～）という形が続いています。この文脈から、空所には形容詞が適していることがわかります。したがって、(D) resistant（耐性のある、抵抗する）を選びます。",translation:"新しい素材は熱に耐性があり、高温の環境で使用するのに理想的です。"},
  {id:717,q:"By the time the award ceremony takes place, the committee ——– the nomination list.",options:["revises","had been revising","revised","will have revised"],answer:3,type:"時制・動詞の形問題",explanation:"まずBy the timeから見ていきましょう。By the timeからカンマまでは時を表す副詞節です。この中の動詞がtakesで現在形です。時を表す副詞節の中は未来であっても現在形にするというルールがあり、takesと現在形になっています。",translation:"授賞式が行われる時までに、委員会はノミネーションリストを修正しているであろう。"},
  {id:718,q:"The print ——– for our business cards is ready, and we can collect them tomorrow.",options:["condition","order","profit","lesson"],answer:1,type:"語彙問題",explanation:"文脈から、空所に入る語は名刺（business cards）に関連していて、「print（印刷、プリント）」という単語の後に来ることから判断します。選択肢の中で名刺の印刷に関連するものは(B) order（注文、発注）で、これを選びます。",translation:"私たちの名刺の印刷の注文は準備できており、明日それらを受け取ることができます。"},
  {id:719,q:"Alexis Grey ——– gained popularity due to his unique style and impactful social media presence.",options:["extremely","quickly","approximately","significantly"],answer:1,type:"語彙問題",explanation:"空所の後に動詞の\"gained\"（獲得した）があり、その対象が\"popularity\"（人気）であることから、人気をどのように獲得したかを示す副詞が求められています。選択肢から、(B) quickly（すぐに）が適しています。",translation:"Alexis Greyは彼のユニークなスタイルと影響力のあるソーシャルメディアでの存在感のおかげで、すぐに人気を獲得しました。"},
  {id:720,q:"We will ——– several market trends to identify new opportunities for our product development.",options:["fulfill","examine","submit","permit"],answer:1,type:"語彙問題",explanation:"空所の前後を見て、「市場のトレンドを～することで、新しい機会を特定する」という文脈がわかります。そのアクションとして適しているのが、(B) examine（調べる、検討する）です。",translation:"私たちは、いくつかの市場のトレンドを検討して、製品開発の新しい機会を特定します。"},
  {id:721,q:"Luminar Data Solutions placed significant emphasis ——– the development of innovative products to enhance market competitiveness.",options:["among","against","for","on"],answer:3,type:"語彙問題",explanation:"空所の前に「placed significant emphasis」、その後ろに「the development」という表現があります。「place emphasis on(～に重点を置く)」という定型表現から、(D) onが適切です。",translation:"Luminar Data Solutionsは、市場競争力を強化するために、革新的な製品の開発に重点を置きました。"},
  {id:722,q:"Ms. Verma confirmed that ——– had booked the conference hall for the upcoming seminar.",options:["her","hers","she","herself"],answer:2,type:"代名詞問題",explanation:"空所の前がthat節の\"that\"、空所の後には動詞と目的語の\"had booked the conference hall（会議ホールを予約した）\"があります。これにより、主語としての代名詞が必要であることがわかります。主語になれるのは、主格の代名詞(C) sheと所有代名詞の(B) hersですが、「会議ホールを予約した」のは Vermaさん＝sheなので(C) sheを選びます。",translation:"Vermaさんは、今度のセミナーのために会議ホールを予約したことを確認した。"},
  {id:723,q:"By investing in cutting-edge technologies, our organization ——– young skilled workers eager to innovate.",options:["attracting","has been attracted","was attracted","attracts"],answer:3,type:"能動態・受動態・時制に関する動詞問題",explanation:"主節のour organization（私たちの組織）以下に動詞がありません。したがって空所には動詞（述語動詞）が入り、our organization（私たちの組織）が主語と考えられます。次に空所の後のyoung skilled workers（若くて技能のある労働者）は動詞の目的語と考えられます。",translation:"最先端技術に投資することで、私たちの組織は革新することに熱心な若い熟練労働者を引き付けている。"},
  {id:724,q:"RFIJ project is operated ——– specialists who ensure timely delivery and optimal quality standards.",options:["of","throughout","by","along"],answer:2,type:"語彙問題",explanation:"空所の前がRFIJ project is operated（RFIJプロジェクトは運営されている）という受動態表現があるので、by specialists（専門家によって）が適切です。したがって、(C) by（～によって）を選びます。",translation:"RFIJプロジェクトは、タイムリーな納品と最適な品質基準を保証する専門家によって運営されています。"},
  {id:725,q:"In Elemental Tech Group, customer satisfaction is considered a high ——–, and it drives all our service improvements.",options:["personality","flexibility","priority","seniority"],answer:2,type:"語彙問題",explanation:"空所のある文の意味は「customer satisfaction（顧客満足）はhigh（高い）～と考えられている」です。これに合うのは(C) priority（優先事項）です。",translation:"Elemental Tech Groupでは、顧客満足は高い優先事項であると考えられており、これがすべての顧客サービス向上の推進力となっています。"},
  {id:726,q:"The numbers on the list ——– only to the initial applicants who passed the preliminary screening.",options:["tend","prefer","subscribe","correspond"],answer:3,type:"語彙問題",explanation:"空所の前は、The numbers on the list（リスト上の数字）、空所の後ろがonly to the initial applicants（初期の応募者だけに）です。前後をつなぐ適切な動詞は(D) correspond（対応する、一致する）です。",translation:"リスト上の番号は、予備審査に通過した初期の応募者にだけ対応します。"},
  {id:727,q:"Each chapter of the report begins with an ——– to depict the key concepts visually.",options:["illustration","illustrator","illustrated","illustrate"],answer:0,type:"品詞問題",explanation:"空所の前に冠詞an、後ろが不定詞のtoなので、名詞が空所に入ることがわかります。選択肢の中で名詞は(A) illustration（図解、イラスト）と(B) illustrator（イラストレーター[イラストや図を描く人]）の2つです。空所の前の文脈から、「報告書の各章は——–で始まる」いう意味になるため、(A) illustration（図解、イラスト）が適切です。",translation:"報告書の各章は、主要なコンセプトを視覚的に描写するための図解で始まります。"},
  {id:728,q:"The new office layout was reviewed and ——– by the majority of the staff members.",options:["agreement","agreeing upon","agree","agreed to"],answer:3,type:"品詞または動詞問題",explanation:"空所の前後を見ます。空所の前にand、その前に受動態のwas proposed（提案された）があります。空所の後ろにはbyで始まるby the majority（大多数によって）があります。したがって、空所には受動態の動詞が適切で(D) agreed to（同意された）を選びます。",translation:"新しいオフィスのレイアウトは、スタッフの大多数によって検討され、同意されました。"},
  {id:729,q:"Customer complaints are taken seriously and are reported ——– to the management for resolution.",options:["prompts","promptness","prompt","promptly"],answer:3,type:"品詞問題",explanation:"空所の前後を確認します。空所の前にはbe動詞areに動詞の過去分詞 reported（報告される）、後ろには前置詞toがあります。したがって空所にはreportedを修飾する副詞が入ります。選択肢の中で副詞は(C) prompt（動詞、名詞、形容詞がありますが、副詞で「〔時間について〕ちょうど、正確に」という意味もがある）と(D) promptly（迅速に）です。「経営陣に迅速に報告される」とするのが意味的に適切なので、(D) promptly（迅速に）を選びます。",translation:"顧客からの苦情は真摯に受け止められ、解決のために経営陣に迅速に報告される。"},
  {id:730,q:"Clients will receive their orders ——– the manufacturing process is finished and inspected.",options:["moreover","despite","besides","once"],answer:3,type:"部分読み問題",explanation:"空所の前は、Clients will receiveで主語+動詞、後ろはthe manufacturing process is finishedで主語+動詞の構造になっています。これは上の２のパターンに該当し、空所には接続詞が入ることがわかります。",translation:"顧客は、製造工程が終了し、検査された後に注文品を受け取る。"},
  {id:731,q:"Apartments ——– Blossom Avenue are in high demand due to their proximity to public transportation.",options:["for","on","until","among"],answer:1,type:"前置詞問題",explanation:"空所の前が Apartments（ アパート、マンション）という名詞、空所の後ろが Blossom Avenue という名詞で、特定の場所を指しています。ここで、ある場所（特に通りや道路）に位置している建物を表現する際には、前置詞 on を用いるのが一般的です。したがって、(B) on が適切です。",translation:"Blossom Avenueにあるアパートは、公共交通機関への近さから非常に需要が高い。"},
  {id:732,q:"Isabel is excited about her ——– internship in Paris, where she will be working with a fashion brand.",options:["clear","present","paid","experienced"],answer:2,type:"語彙問題",explanation:"internship（インターンシップ）という名詞と最も自然に共起する形容詞を選択肢から見つける必要があります。Isabelがexcited（ワクワクしている）なので、この文脈に合ったインターンシップです。",translation:"Isabelは、パリでファッションブランドと働く有給のインターンシップにワクワクしています。"},
  {id:733,q:"To update your profile, log into the website and ——– click on the edit button.",options:["simplest","simpler","simple","simply"],answer:3,type:"比較または品詞問題",explanation:"空所の前後を見ます。空所の後ろに動詞 click（クリックする） で命令文です。これに基づき、空所には動詞を修飾する副詞が必要です。選択肢の中の副詞は、(D) simply （単に～だけ）でこれを選びます。",translation:"プロフィールを更新するには、ウェブサイトにログインして、編集ボタンをクリックするだけです。"},
  {id:734,q:"——– person per team is selected to represent the group in the final presentation round.",options:["once","one","first","alone"],answer:1,type:"複合語彙問題",explanation:"空所の後には person per team というフレーズがあります。このフレーズと意味的に適合する単語を選ぶ必要があります。各選択肢を空所に当てはめてみて、文の意味が成立するかを確認します。その結果、(B) oneが適切です。これにより、selectedまでの意味が「それぞれのチームから一人が選ばれる」となります。",translation:"最終プレゼンテーションのラウンドでは、1チームにつき1人がグループの代表に選ばれる。"},
  {id:735,q:"The designers integrated eco-friendly materials and energy-saving technologies in ——– latest model of homes.",options:["their","they","theirs","them"],answer:0,type:"代名詞問題",explanation:"空所の前後を確認すると、空所の前には前置詞in、後には形容詞 latest（最新の） と名詞 model（モデル） が続いています。このlatest model（最新のモデル）という名詞句を修飾する所有格の(A) their （彼らの・彼女らの）が適切です。",translation:"設計者たちは、環境に優しい素材と省エネ技術を最新モデルの住宅に取り入れた。"},
  {id:736,q:"At the conference, Mr. Wang’s ——– is to represent our corporation and foster partnerships.",options:["implication","function","classification","location"],answer:1,type:"語彙問題",explanation:"空所の前は所有格「Mr. Wang’s（Wangさんの）」、後ろがbe動詞に不定詞で「to represent our corporation（私たちの会社を代表すること）」です。",translation:"会議において、Wangさんの役割は、私たちの会社を代表し、パートナーシップを育てることです。"},
  {id:737,q:"Our kitchen utensils are ——– made of stainless steel for durability and ease of cleaning.",options:["overwhelmingly","reluctantly","primarily","generously"],answer:2,type:"語彙問題",explanation:"この文の意味は、「キッチン用具が耐久性と掃除の容易さのためにステンレス鋼で作られている」です。空所には、それがどの程度かなどを示す副詞が必要です。ここで、(C) primarily（主に）が適切な選択肢です。",translation:"私たちのキッチン用具は、耐久性と掃除の容易さのために主にステンレス鋼で作られています。"},
  {id:738,q:"We were fortunate to ——– a book signing event featuring the renowned author at our bookstore.",options:["hosting","be hosted","have been hosted","have hosted"],answer:3,type:"<strong>能動態・受動態・時制に関する動詞問題</strong>",explanation:"空所の前後を確認します。We were fortunate toは「私たちは幸運であった」という意味です。選択肢の中で、この部分に適切に続くものを探します。空所の動詞に続く目的語がa book signing eventであることから、能動態を使用するのが適切だと分かります。したがって、受動態の選択肢 (B) と (C) を除外します。",translation:"私たちは幸運にも、有名な著者の本のサイン会を当書店で開催することができた。"},
  {id:739,q:"The two systems can operate ——–, ensuring that a failure in one does not affect the other.",options:["independently","independent","independency","independence"],answer:0,type:"品詞問題",explanation:"動詞operateの後に空所があります。operateは他動詞としても自動詞としても使用可能であるため、他動詞の場合、空所には名詞が入り、自動詞の場合、副詞が入ります。しかし、文脈全体やそれに続く部分「ensuring that a failure in one does not affect the other」から、二つのシステムがどのように操作されるのか、その方法を説明する単語が求められていると考えられます。",translation:"2つのシステムは独立して動作することができ、一方が故障してももう一方に影響を与えないことを保証します。"},
  {id:740,q:"Investing in research and development is critical ——– you hope to see innovative breakthroughs.",options:["and","or","if","until"],answer:2,type:"接続詞問題",explanation:"空所の前がInvesting in research and development is critical（研究開発への投資は極めて重要です）という節があり、後ろはyou hope to see innovative breakthroughs（革新的なブレークスルーを望む）という別の節があります。これらの2つの節を繋ぐには条件を示す接続詞が必要です。",translation:"革新的なブレークスルーを望むのであれば、研究開発への投資は極めて重要である。"},
  {id:741,q:"Lexi Finance Group specializes in providing both accounting and legal ——– to small and medium-sized enterprises.",options:["service","to service","serviced","services"],answer:3,type:"品詞または動詞問題",explanation:"空所の前には動名詞providing（提供すること）とboth accounting and legal（会計と法律の両方の）が続きます。空所を含めてprovidingの目的語になるためには、空所には名詞が必要です。選択肢の中で名詞は(A) serviceと(D) servicesです。both accounting and legalが複数のサービスを示しているため、複数形の(D) services（サービス）が適切です。",translation:"Lexi Finance Groupは、中小企業に会計および法律のサービスを提供することを専門としています。"},
  {id:742,q:"At the rental car agency, customers need to ——– proof of a valid driver’s license.",options:["meet","work","follow","show"],answer:3,type:"語彙問題",explanation:"空所の後にはproof of a valid driver’s license（有効な運転免許証の証明）という目的語が続いています。これに適している動詞は(D) show（見せる、示す）です。「顧客がレンタカー代理店で運転免許証を見せる必要がある」という文脈になります。",translation:"レンタカー代理店では、顧客は有効な運転免許証を見せる必要があります。"},
  {id:743,q:"Customers can return ——– item within 30 days if they are unsatisfied with the purchase.",options:["a few","all","most","any"],answer:3,type:"数量形容詞問題",explanation:"空所の後ろが可算名詞の単数形のitem（商品）です。選択肢の中で可算名詞の単数の前にくるのは(D) any（どんな）のみで、これを選びます。",translation:"お客様は、購入した商品に不満がある場合、30日以内であればどんな商品でも返品できます。"},
  {id:744,q:"Corporate social responsibility has been integral to Pulse Dynamics Technologies ——– it was founded.",options:["since","afterwards","however","because of"],answer:0,type:"接続詞・前置詞・副詞問題",explanation:"空所の前は、Corporate social responsibility has beenで主語+動詞、空所の後ろはit was foundedで主語＋動詞の形になっています。この形は上の２のパターンで、空所には接続詞が入ります。したがって、選択肢の中で唯一の接続詞(A) since（～以来）が適切です。",translation:"企業の社会的責任は、Pulse Dynamics Technologiesにとって創業以来不可欠なものである。"},
  {id:745,q:"During the inspection, it was confirmed that all the laboratory equipment was in working ——–.",options:["conditioned","conditional","conditionally","condition"],answer:3,type:"品詞問題",explanation:"空所の前に 前置詞inとworking（形容詞：動作している 名詞：働くこと、運転、操作）があります。定型表現in working condition（作動している、動いている）から空所には名詞の(D) condition（状態）が適切です。",translation:"検査中に、すべての実験室の機器が作動状態であることが確認されました。"},
  {id:746,q:"The dataset is a ——– source of information for researchers studying climate change impacts globally.",options:["frequent","various","rich","long"],answer:2,type:"語彙問題",explanation:"空所の前後の意味が、「The dataset（データセット）は、………な「source of information（情報源）である」なので、(C) rich（豊富な）が適切です。",translation:"このデータセットは、地球規模で気候変動の影響を研究している研究者にとって、豊富な情報源となっている。"},
  {id:747,q:"The budget was ——– allocated to prioritize essential expenditures and optimize resource utilization.",options:["suitably","suitable","suitability","suitableness"],answer:0,type:"品詞問題",explanation:"選択肢を見ると、似たようなスペルなので「品詞問題」と判断できます。空所の前後を見て判断できるものが多いので前後を確認しましょう。",translation:""},
  {id:748,q:"Patients are advised to arrive ten minutes early for their scheduled ——– to fill out paperwork.",options:["appointment","development","requirement","placement"],answer:0,type:"語彙問題",explanation:"空所の前の文脈から、「予定された——–に10分早く到着する」という内容がわかります。したがって「予定された予約・約束」が適切なので、(A) appointment（予約、約束）を選びます。",translation:"患者さんには、予約時間より10分早く到着し、書類に記入することをお勧めします。"},
  {id:749,q:"There has been a significant rise in e-commerce sales ——– the last two years.",options:["as soon as","while","subsequently","during"],answer:3,type:"接続詞・前置詞・副詞問題",explanation:"空所の前は、 There has been a significant riseで動詞+主語（倒置）、後ろは the last two years という名詞句です。これは上の４のパターンで、空所には前置詞が必要です。選択肢の中で前置詞は、(D) during（～の間に）です。したがって、(D) duringを選びます。",translation:"過去2年間でEコマースの売上が顕著に増加しています。"},
  {id:750,q:"Local farmers have faced a ——– rise in demand for organic produce in recent years.",options:["drama","dramatize","dramatic","dramatically"],answer:2,type:"品詞問題",explanation:"空所の前後を見ます。空所の前には冠詞aがあり、後ろに名詞rise（増加、上昇）が続いています。したがって、空所には名詞riseを修飾する形容詞が適切です。選択肢の中で形容詞は、(C) dramatic（劇的な）でこれを選びます。",translation:"地元の農家は、近年、有機農産物の需要の劇的な増加に直面しています。"},
  {id:751,q:"The team faced challenges due to a strategy that was ——– made without comprehensive analysis.",options:["readily","hastily","easily","repeatedly"],answer:1,type:"語彙問題",explanation:"文を読むと、チームが「comprehensive analysis（包括的な分析）」なしに「——– made（急いで作られた）」戦略のために困難に直面したことがわかります。そのため、空所には戦略がどのように作られたかを説明する副詞が必要です。(B) hastily（急いで、あわてて）は、「包括的な分析なしに」戦略が作られたという文脈に適しています。",translation:"チームは、包括的な分析なしに急いで作られた戦略のために、困難に直面しました。"},
  {id:752,q:"To ensure data accuracy, researchers should use ——– methods of data collection and analysis.",options:["multiplying","multiplied","multiple","multiples"],answer:2,type:"品詞または動詞問題",explanation:"空所の前は動詞use（使用する）、後には名詞のmethods（方法）があります。これは空所で形容詞が求められていることを示しています。形容詞が求められ、そして文の意味にも適合する選択肢は(C) multiple（複数の、多様な）です。",translation:"データの正確性を確保するために、研究者はデータ収集と分析の複数の方法を使用すべきです。"},
  {id:753,q:"The real estate market is becoming ——– competitive, with property values soaring in desirable locations.",options:["accordingly","increasingly","accidentally","promptly"],answer:1,type:"語彙問題",explanation:"空所には、形容詞competitive（競争が激しい）を修飾する副詞が必要です。選択肢の中で、competitive（競争が激しい）と合う副詞は (B) increasingly（ますます）です。",translation:"望ましい場所での不動産価格が急騰していることから、不動産市場はますます競争が激しくなっています。"},
  {id:754,q:"Volunteers ——– to assist in organizing the charity event aimed at supporting children’s education.",options:["invite","to invite","inviting","are invited"],answer:3,type:"能動態・受動態に関する動詞問題",explanation:"空所の前には主語Volunteers（ボランティア）があり、その後に動詞がないため、空所には動詞が必要です。動詞（述語動詞）になれるのは、能動態の(A) invite（招待する、勧誘する）、または受動態の(D) are invited（招待される、勧誘する）の2つです。",translation:"ボランティアは、子どもの教育を支援することを目的としたチャリティイベントの企画を手伝うために勧誘されています。"},
  {id:755,q:"——– intended as an event for local artists, Art Fusion Expo has attracted international talent over the years.",options:["Origin","Originate","Originated","Originally"],answer:3,type:"品詞問題",explanation:"主節がArt Fusion Expo has attracted以下で、空所の後が過去分詞intended（意図された）なので分詞構文と考えられます。",translation:"もともと地元のアーティスト向けのイベントとして意図されていたが、Art Fusion Expoは、長年にわたり国際的な才能を引き寄せています。"},
  {id:756,q:"Innovative digital strategies were employed ——– the campaign to effectively reach a wider audience.",options:["among","besides","despite","throughout"],answer:3,type:"語彙問題",explanation:"この文は、革新的なデジタル戦略が利用されたことを述べています。空所の後に「the campaign」という単語があり、これがヒントとなります。",translation:"広範な視聴者に効果的に届けるため、革新的なデジタル戦略はキャンペーン全体で採用されました。"},
  {id:757,q:"The hypertext markup language, ——– known as HTML, is essential for creating web pages.",options:["shortly","relatively","abruptly","commonly"],answer:3,type:"語彙問題",explanation:"空所の後ろがknown as HTML（HTMLとして知られている）です。これに合うのは(D) commonly（一般的に、通常）です。",translation:"一般にHTMLとして知られるハイパーテキストマークアップ言語は、ウェブページの作成に必要不可欠である。"},
  {id:758,q:"Ms. Williams designed a training program ——– the athletes can enhance their performance levels.",options:["but","while","than","so that"],answer:3,type:"語彙問題",explanation:"文の内容から、「Williamsさんがアスリートのパフォーマンスを向上させるためのトレーニングプログラムを設計した」という意味が読み取れます。この文脈に合うのは、(D) so that（～できるように）です。",translation:"Williamsさんは、アスリートがパフォーマンスレベルを向上させることができるように、トレーニングプログラムを設計しました。"},
  {id:759,q:"The innovation of ——– artificial intelligence with healthcare has improved diagnostic accuracy and patient care.",options:["combined","combinations","combining","combine"],answer:2,type:"品詞または動詞問題",explanation:"空所の前がThe innovation of（～の革新）、後ろがartificial intelligence （人工知能）、with healthcare（医療と）があり、その後に動詞has improvedが続きます。ここで、The innovationとofからhealthcareまでを適切につなげるのは、動名詞の(C) combining（組み合わせること）で、これを選びます。",translation:"人工知能を医療と組み合わせる革新が診断の正確性と患者ケアを改善しました。"},
  {id:760,q:"The new dietary guidelines ——– last month to promote balanced eating and overall health.",options:["have released","are being released","were released","had been releasing"],answer:2,type:"能動態・受動態・時制に関する動詞問題",explanation:"last month（先月）という時制を示す語句が含まれているため、過去の形になる動詞を選ぶ必要があります。さらに、ガイドライン（The new dietary guidelines）は人によって発表されるため、この文脈では受動態が適切です。したがって過去時制で受動態の(C) were released（発表された）を選びます。",translation:"新しい食事のガイドラインは先月、バランスの取れた食事と全体的な健康を促進するために発表されました。"},
  {id:761,q:"The Starlight Festival was so popular that gaining entry ——– prior reservation proved to be impossible.",options:["without","regarding","unless","appropriately"],answer:0,type:"語彙問題",explanation:"空所が含まれるthat節の中を確認していきましょう。空所の前がgaining entry（入場）、後ろがprior reservation（事前予約）。その後に動詞が続き、proved to be impossible（不可能であることがわかった）になります。",translation:"Starlight Festivalは非常に人気で、事前予約なしでの入場が不可能であることがわかった。"},
  {id:762,q:"A ——– towel was handed to each guest to freshen up before the meal was served.",options:["moisten","moistens","moistly","moist"],answer:3,type:"品詞問題",explanation:"空所の前後を確認します。空所の前には冠詞aがあり、後に名詞towel（タオル）があるため、空所には形容詞が入ることがわかります。したがって、形容詞(D) moist（湿った）が適切です。",translation:"食事が出される前にさっぱりとするために、それぞれのゲストに湿ったタオルが手渡されました。"},
  {id:763,q:"Mr. Paredes proposed ——– to the building plan, including a garden space and a terrace.",options:["manners","additions","materials","concerns"],answer:1,type:"語彙問題",explanation:"空所の前には動詞proposed（提案した）があり、空所の後にはto the building plan（建築計画に）というフレーズがあります。これを基に、空所には建築計画に提案される何か、つまり建築計画に関連するアイデムやアイデアを示す名詞が入ると考えられます。",translation:"Paredesさんは建築計画にガーデンスペースとテラスを含める追加を提案した。"},
  {id:764,q:"The latest software update ——– all functions run smoother, enhancing user experience significantly.",options:["to make","having made","making","will make"],answer:3,type:"動詞問題",explanation:"問題文に動詞がないので、空所には動詞（述語動詞）が入ることがわかります。選択肢の中で述語動詞になれるのは未来時制の(D) will makeのみで、これを選びます。",translation:"最新のソフトウェアアップデートにより、すべての機能がよりスムーズに動作するようになり、ユーザーエクスペリエンスが大幅に向上します。"},
  {id:765,q:"The marketing team ——– added testimonials to the advertisement to build trust and credibility among consumers.",options:["economically","exactly","deliberately","patiently"],answer:2,type:"語彙問題",explanation:"空所の後ろにある動詞 added （追加した）とその目的語testimonials to the advertisement（広告に証言） を注目しましょう。「マーケティングチームが広告に証言を追加した」ことに合う副詞は (C) deliberately（意図的に）でこれを選びます。",translation:"マーケティングチームは、消費者の間に信用と信頼を築くために、意図的にお客様の声を広告に追加しました。"},
  {id:766,q:"Under new leadership, employee morale and workplace culture have been improving ——– over the past year.",options:["steady","steadying","steadily","steadied"],answer:2,type:"品詞問題",explanation:"空所の前が、「従業員の士気と職場の文化が向上している」という意味です。improveは自動詞、他動詞がありますがここでは自動詞として使われています。したがって、空所にはimprovingを修飾する副詞が入ります。",translation:"新しいリーダーシップのもとで、従業員の士気と職場の文化は過去一年間で着実に向上しています。"},
  {id:767,q:"Ms. Ortiz, the CEO ——– the chairman of the board, is leading the digital transformation initiative.",options:["as well as","in addition","likely","such as"],answer:0,type:"複合語彙問題",explanation:"主語がMs. Ortizで、the CEO ——– the chairman of the boardが主語の説明となっています。the CEO（最高経営責任者） とthe chairman of the boardが並列になっている（最高経営責任者であり、取締役会議長でもある）と考えられるので、(A) as well as（～および～）が適切です。",translation:"最高経営責任者（CEO）であり、取締役会議長でもあるOrtizさんは、デジタルトランスフォーメーションの新たな取り組みを主導している。"},
  {id:768,q:"As a token of our appreciation, every attendee at the seminar will receive a ——– lunch.",options:["secured","accountable","complimentary","comprehensive"],answer:2,type:"語彙問題",explanation:"選択肢がすべて形容詞なので、「語彙問題」と判別できます。空所の前後の文脈を中心に確認していきます。",translation:"セミナーの出席者全員には、我々の感謝のしるしとして、無料のランチが提供されます。"},
  {id:769,q:"——– the theory is widely recognized, there are still debates regarding some of its aspects.",options:["Now that","Unless","While","Whether"],answer:2,type:"語彙問題",explanation:"空所には、前半の文と後半の文を結びつける接続詞が必要です。前半の文は「その理論は広く認知されている」という事実を示しており、後半の文は「それについてのいくつかの側面についてはまだ議論がある」という対立する事実を示しています。",translation:"その理論は広く認知されている一方で、そのいくつかの側面についてはまだ議論が存在します。"},
  {id:770,q:"Now that we have received all applications, we will ——– the hiring process.",options:["make room for","take part in","move forward with","sign up for"],answer:2,type:"語彙問題",explanation:"空所以前は「すべての応募を受け取った今」という状況を示しています。この文脈に基づき、次に進むアクションは「採用プロセスを進める」となるでしょう。この文脈に合う選択肢は(C) move forward with（～を進める）です。",translation:"すべての応募を受け取ったので、採用プロセスを進めます。"},
  {id:771,q:"These first edition books are remarkably ——–, and their value has appreciated over the years.",options:["rarest","rarely","rarity","rare"],answer:3,type:"品詞または比較問題",explanation:"空所の前後に注目します。空所の前にはbe動詞areに副詞 remarkably、後にはカンマが続きます。したがって、空所には形容詞が入り、形容詞の(D) rare（珍しい）を選びます。",translation:"これらの初版の本は著しく希少で、年々その価値が増しています。"},
  {id:772,q:"In their engineering careers, Antonio Perez and Roberto Silva helped ——– master innovative designs.",options:["one another","each other","yourself","everything"],answer:1,type:"代名詞問題",explanation:"Antonio Perez以下はAntonio PerezさんとRoberto Silvaさんが、どのようにして革新的なデザインを習得したのかが問われています。空所に「互いに」を入れると「Antonio PerezさんとRoberto Silvaさんは互いに革新的なデザインを習得するのを助けました」となって意味的に通じるようになります。",translation:"技術者としてのキャリアにおいて、Antonio PerezさんとRoberto Silvaさんは互いに革新的なデザインを習得するのを助けました。"},
  {id:773,q:"Organizing storytelling sessions is a wonderful way ——– children interested in reading and literature.",options:["to keep","keep","would keep","kept"],answer:0,type:"動詞問題",explanation:"問題文の中の動詞はbe動詞isです。したがって、述語動詞の形の(B) keep（原形）と(C) would keep（助動詞+原形）は除外されます。",translation:"読み聞かせ会を開催することは、子どもたちが読書や文学に興味を持ち続けるための素晴らしい方法である。"},
  {id:774,q:"In real estate, professionals evaluate market trends using five ——– like price movements and inventory levels.",options:["indicator","indication","indicators","indicating"],answer:2,type:"品詞問題",explanation:"空所の前が形容詞five（５つの）、後ろが前置詞like（～のような）です。したがって空所には可算名詞の複数形が入ることがわかり、この条件に該当するのは(C) indicators （指標）のみでこれを選びます。",translation:"不動産業界では、専門家が価格の動きや在庫水準など5つの指標を使って市場動向を評価する。"},
  {id:775,q:"The workshop provided hands-on training on ——– to use the new software for project management.",options:["that","how","what","those"],answer:1,type:"複合問題",explanation:"空所の前は「ワークショップは～について実践的なトレーニングを提供した」、空所の後ろが「新しいプロジェクト管理ソフトウェアの使用する」です。空所に(B) how （どのように〜するか）を入れると、「新しいプロジェクト管理ソフトウェアの使用する方法」となり、前後を意味的にうまくつなぐことができます。",translation:"ワークショップでは、プロジェクト管理のための新しいソフトウェアの使用方法について実践的なトレーニングが行われた。"},
  {id:776,q:"Being ——– to unfamiliar cultural norms is essential for businesses expanding into international markets.",options:["opposed","versatile","certified","adaptable"],answer:3,type:"語彙問題",explanation:"空所に入る形容詞は、「馴染みのない文化規範に～」という文脈に合わせる必要があります。この文は、「国際市場に進出するビジネスにとって、馴染みのない文化規範に適応できることが不可欠である」とすると全体として意味が通ります。したがって、(D) adaptable（適応可能な、順応する）を選びます。",translation:"国際市場に拡大しているビジネスにとって、馴染みのない文化規範に順応することが不可欠です。"},
  {id:777,q:"The awareness campaign spread ——– and reached urban areas faster than remote rural communities.",options:["unevenly","unintentionally","unwillingly","unfortunately"],answer:0,type:"語彙問題",explanation:"空所の後ろが「都市部には遠隔の農村地域より早く到達した」で空所の前が「キャンペーンが…に広がった」から、この文脈に合うのは (A) unevenly（均等でなく）です。",translation:"意識向上キャンペーンの広がりにはばらつきがあり、都市部のほうが遠隔地の農村部よりも早く到達した。"},
  {id:778,q:"——– Mr. Patel is a seasoned professional, he constantly seeks learning opportunities to enhance his skills.",options:["Despite","Although","Instead","Accordingly"],answer:1,type:"部分読み問題",explanation:"空所の後ろにMr. Patel is で主語+動詞、カンマ以降もhe constantly seeksで主語+動詞の形です。この構造から、空所には接続詞が適していることが分かり、選択肢の中で接続詞は(B) Although （～だけれども）のみでこれが適切です。",translation:"Patelさんは熟練の専門家であるけれども、常に自分のスキルを向上させる学習の機会を求めている。"},
  {id:779,q:"The ——– version of the software manual offers quick steps for the installation process.",options:["relocated","replaced","abridged","acquainted"],answer:2,type:"語彙問題",explanation:"この文はソフトウェアマニュアルのあるバージョンがインストールプロセスの迅速な手順を提供している、と述べています。空所に入る形容詞は、マニュアルのバージョンを説明するものでなければなりません。",translation:"ソフトウェアマニュアルの要約版は、インストールプロセスの迅速な手順を提供します。"},
  {id:780,q:"The Orion Art Museum’s unique exhibits attract ——– visits from art enthusiasts around the world.",options:["frequently","frequent","frequency","frequents"],answer:1,type:"品詞問題",explanation:"空所の前が動詞attract（引き寄せる）、後ろが名詞visits（訪問）です。したがって空所には名詞visitsを修飾する形容詞の(B) frequent（頻繁な）が適切です。",translation:"Orion Art Museumのユニークな展示は、世界中のアート愛好家を次々と引き寄せています。"},
  {id:781,q:"Nova Tech Corporation ——– in developing cutting-edge software solutions tailored to specific industry needs and challenges.",options:["participates","interests","consists","specializes"],answer:3,type:"語彙問題",explanation:"空所にはNova Tech Corporationが「何をする」かを示す動詞が入ります。後続のin developing cutting-edge software solutions（最先端のソフトウェアソリューションを開発することに）から、「Nova Tech Corporationは最先端のソフトウェアソリューションを開発することに専門にしている」とすると意味が通るので、(D) specializes（専門にする）が適切です。",translation:"Nova Tech Corporationは、特定の業界のニーズと課題に合わせてカスタマイズされた最先端のソフトウェアソリューションの開発を専門としている。"},
  {id:782,q:"A ——– sized air conditioner enhances energy efficiency and ensures optimal cooling performance in your room.",options:["mutually","properly","surprisingly","internally"],answer:1,type:"語彙問題",explanation:"空所の前が冠詞A、後ろがsized（～の大きさの、～サイズの）に名詞句air conditioner（エアコン）が続きます。後ろのsized air conditioner（～サイズのエアコン）と合うのは、(B) properly（適切に）です。",translation:"適切なサイズのエアコンは、エネルギー効率を向上させ、部屋の冷却性能を最適にします。"},
  {id:783,q:"Automobile ——– has been impacted by global supply chain disruptions, delaying production schedules.",options:["manufacturer","manufactures","manufactured","manufacture"],answer:3,type:"品詞問題",explanation:"空所の後がhas been impactedなので、主語が単数形である必要があります。そのため、空所には不可算名詞または単数形の名詞が適切です。",translation:"自動車製造業はグローバルなサプライチェーンの混乱により影響を受けており、生産スケジュールが遅延しています。"},
  {id:784,q:"The winner of the contest will be announced on our website ——– notified personally via email.",options:["or","so","now that","while"],answer:0,type:"語彙問題",explanation:"空所の前後を見てみると、空所の前にはwill be announced on our website(ウェブサイトで発表される)という表現があり、空所の後にはnotified personally via email（メールで個人的に通知される）という表現があります。この２つの表現は並列的な構造をしているので、(A) or（または）はこの文脈で適切です。",translation:"コンテストの勝者は、私たちのウェブサイトで発表されるか、またはメールで個人的に通知されます。"},
  {id:785,q:"Mr. Thompson ——– a factory tour to showcase the newly installed equipment enhancing production efficiency.",options:["distributed","attributed","coordinated","intended"],answer:2,type:"語彙問題",explanation:"空所の前が主語Mr. Thompson、空所の後ろが目的語のa factory tour（工場見学）です。「Thompsonは工場見学を調整した」とするのが適切なので、(C) coordinated（調整した）を選びます。",translation:"Thompsonさんは、生産効率を高める新しく導入された設備を紹介する工場見学を調整した。"},
  {id:786,q:"A ——– opinion from an expert can provide valuable insights for project enhancement.",options:["critic","critical","criticize","critically"],answer:1,type:"品詞問題",explanation:"空所の前が冠詞A、空所の後ろが名詞opinion（意見）であることから空所には形容詞が適切です。選択肢の中で形容詞は(B) critical（重要な、批判的な）でこれを選びます。",translation:"専門家からの批判的な意見は、プロジェクト強化のために貴重な洞察を与えてくれる。"},
  {id:787,q:"——– of the digital transformation initiative include automation, data security, and employee training.",options:["Priority","Prioritized","Priorities","Prioritizing"],answer:2,type:"品詞問題",explanation:"空所の後にof the digital transformation initiativeが続いています。ここでo」が前置詞として使われているため、空所には主語になる名詞が必要です。また、その後に続く動詞がinclude（含む）なので、主語は複数になります。選択肢の中で複数の名詞は(C) Priorities（優先事項）でこれを選びます。",translation:"デジタルトランスフォーメーションイニシアティブの優先事項には、自動化、データセキュリティ、および従業員のトレーニングが含まれています。"},
  {id:788,q:"——– years of dedicated service, Mr. Johnson retired and devoted his time to volunteer work.",options:["After","Already","Consequently","Always"],answer:0,type:"複合語彙問題または前置詞・副詞問題",explanation:"空所の後にyears of dedicated serviceという名詞句があり、その後にMr. Johnsonから文が始まります。この構造から、空所には前置詞が適していると判断できます。選択肢の中で前置詞は(A) After （～の後）のみで、これを選びます。念のため意味を確認すると、「After years of dedicated service（長年にわたる献身的な勤務の後）」で適切です。",translation:"長年にわたる献身的な勤務の後、Johnsonさんは引退し、ボランティア活動に時間を捧げた。"},
  {id:789,q:"The survey showed residents were ——– in favor of stricter regulations on air pollution.",options:["overwhelm","overwhelmingly","overwhelming","overwhelms"],answer:1,type:"品詞問題",explanation:"空所の前がbe動詞were、空所の後にin favor of stricter regulations（より厳格な規制に賛成している）いう前置詞句が続いていることから、空所にはその前置詞句を修飾する副詞が適しています。副詞の(B) overwhelmingly（圧倒的に）を選びます。",translation:"調査の結果、住民は大気汚染に対するより厳格な規制に圧倒的に賛成していることが示されました。"},
  {id:790,q:"Implementing cost-saving measures helped ——– a decrease in revenue during the economic downturn.",options:["offset","perform","input","replace"],answer:0,type:"語彙問題",explanation:"空所の前にはhelped（助けた） という動詞があり、空所の後には a decrease in revenue during the economic downturn（ 景気低迷期における収益の減少）という名詞句が続いています。この文の文脈から、「コスト削減策が経済の低迷期における収益の減少を何かしらの方法で相殺する・埋め合わせる手助けをした」とすると全体の意味がつながります。そのため、(A) offset（相殺する、埋め合わせる）が適切な選択肢です。",translation:"コスト削減策を実施することが、景気低迷期における収益の減少を埋め合わせるのに役立ちました。"},
  {id:791,q:"In the aviation industry, maintaining safety ——– at all times is crucial to prevent accidents.",options:["compliance","compliant","compliantly","comply"],answer:0,type:"品詞問題",explanation:"空所の前が動名詞maintaining（維持すること）にsafety（安全）が続き、後ろにat all timesと文の動詞のisがあります。",translation:"航空業界で、常に安全規則順守を維持することは、事故を防ぐために極めて重要です。"},
  {id:792,q:"We anticipate that our new marketing campaign will offer extensive ——– in the Asian markets.",options:["expose","exposed","exposing","exposure"],answer:3,type:"品詞または動詞問題",explanation:"空所の前は動詞offerに続いて形容詞extensive（広範な）、後ろが前置詞inです。したがって空所には名詞が入り、(D) exposure（露出、公開）が適切です。extensive exposureはofferの目的語になります。",translation:"私たちは、新しいマーケティングキャンペーンがアジア市場で広範囲に公開されると予測しています。"},
  {id:793,q:"The announcement of the new tech product has ——– much excitement among consumers and industry experts.",options:["evaluated","accommodated","generated","received"],answer:2,type:"語彙問題",explanation:"空所の後ろのmuch excitement among consumers and industry experts（消費者と業界の専門家の間で大きな興奮）と合う動詞の選択肢は(C) generated（生み出した）です。文全体の意味が「新しい技術製品の発表が、消費者と業界の専門家の間で大きな興奮を生み出した」となり、(C) generated（生み出した）が適切であるこがわかります。",translation:"新しい技術製品の発表が、消費者と業界の専門家の間で大きな興奮を生み出した。"},
  {id:794,q:"Having a ——– battery in your smartphone allows for extended usage during long journeys.",options:["removability","removably","removable","remove"],answer:2,type:"品詞問題",explanation:"空所の前は冠詞a、空所の後にbattery（バッテリー、電池）という名詞が続いていることから、空所には形容詞が適切であると判断できます。(C) removable は形容詞で、「取り外し可能な」という意味でこれを選びます。",translation:"スマートフォンに取り外し可能なバッテリーがあると、長時間の移動でも長く使用できる。"},
  {id:795,q:"Business Revival Initiative is ——– to support small businesses in their recovery from the economic downturn.",options:["intended","extended","regarded","impressed"],answer:0,type:"語彙問題",explanation:"主語がBusiness Revival Initiative、空所の後ろがto support small businesses（小規模ビジネスを支援すること）です。(A) intended （《be intended to …》…することを目的としている）を入れると「Business Revival Initiativeは、小規模企業を支援すること目的としている」となり適切な意味になります。したがって(A) intendedを選びます。",translation:"Business Revival Initiativeは、景気低迷からの回復にある小規模企業を支援することを目的としている。"},
  {id:796,q:"All employees are required to adhere strictly to the ——– safety guidelines to ensure a safe workplace.",options:["established","establishing","establishes","establishment"],answer:0,type:"品詞または動詞問題",explanation:"空所の前が冠詞the、後ろがsafety guidelines（安全指針）という名詞句です。後ろのsafety guidelinesと合うのは形容詞の(A) established（制定された、確立された）でこれを選びます。",translation:"全ての従業員は、安全な職場を確保するために制定された安全指針を厳格に順守する必要があります。"},
  {id:797,q:"Companies are focusing on balancing the gender ——– to improve workplace diversity and innovation.",options:["preference","tendency","division","ratio"],answer:3,type:"語彙問題",explanation:"全体の意味は、職場の多様性とイノベーションを向上させるために、企業が性別のバランスをとることに焦点をあてていると考えられます。gender ～（性別の～）というフレーズを見て、性別のバランスや比率を示す言葉が適切であると分かります。そのため、(D) ratio（比率）が適切です。",translation:"企業は、職場の多様性とイノベーションを向上させるために、性別の比率をバランスさせることに焦点を当てています。"},
  {id:798,q:"The Maplewood city council was ——– to allocate funds for the renovation of historical sites.",options:["persuading","persuasively","persuaded","persuasion"],answer:2,type:"品詞または動詞問題",explanation:"空所の前がThe Maplewood city council（Maplewood市議会）とbe動詞 was、後ろがto allocate funds（資金を割り当てる）です。前後をつなぐ適切な選択肢は(C) persuaded（説得された）でこれを選びます。",translation:"Maplewood市議会は、歴史的史跡の修復のための資金を割り当てるよう説得されました。"},
  {id:799,q:"Since Sofia Gomez has met all performance criteria, she is ——– for a promotion.",options:["ample","eligible","superior","defective"],answer:1,type:"語彙問題",explanation:"空所の前が、主語+be動詞のshe is、後ろが前置詞forにa promotion（昇進の）が続きます。選択肢の中で空所の前後をつなぐことができるのは、(B) eligible（資格がある、適格である）です。",translation:"Sofia Gomezさんはすべての業績基準を満たしているので、昇進の資格があります。"},
  {id:800,q:"Our booking system has been ——– and improved to boost customer experience and satisfaction.",options:["forecasted","removed","recognized","simplified"],answer:3,type:"語彙問題",explanation:"問題文から、予約システムが改善され、顧客の体験と満足度を高めるために何らかのアクションが行われたことがわかります。空所には、予約システムをどのように改善したかを示す動詞が必要です。",translation:"私たちの予約システムは、顧客の体験と満足度を高めるために簡略化され、改善されました。"},
  {id:801,q:"Despite challenges, Stratosphere Airlines continues to innovate and elevate our services to ——– global standards.",options:["transmit","contact","meet","visit"],answer:2,type:"語彙問題",explanation:"この文のキーポイントは、空所の後のglobal standards（グルーバルな基準） です。これと合う動詞は、(C) meet（満たす、達成する）です。",translation:"困難にもかかわらず、Stratosphere Airlinesは、グローバルな標準を満たすためにサービスを革新し、向上させ続けている。"},
  {id:802,q:"John Smith handled client inquiries ——– the technical team resolved the ongoing software issues.",options:["altogether","while","beside","initially"],answer:1,type:"部分読み問題",explanation:"空所の後はthe technical team resolvedで主語+動詞、空所の前は John Smith handledで主語+動詞です。これは上の２のパターンで空所には接続詞が適当であることがわかります。選択肢の中で接続詞は(B) while（接続詞：～している間に）のみで、これを選びます。",translation:"John Smithさんは、技術チームが進行中のソフトウェアの問題を解決している間、顧客からの問い合わせを処理しました。"},
  {id:803,q:"Health Tech Innovator Certificate is globally recognized and is ——– to a professional degree.",options:["equivalences","equivalent","equivalently","equivalence"],answer:1,type:"品詞問題",explanation:"空所の前後を見ます。空所の前にはbe動詞isがあり、後ろには前置詞toとa professional degree（全問職の学位）があります。また主語はHealth Tech Innovator Certificateです。",translation:"Health Tech Innovator Certificateは世界中で認知されており、専門職の学位と同等です。"},
  {id:804,q:"Implementing automation resulted in a ——– reduction in production time and increased output.",options:["different","polite","confident","dramatic"],answer:3,type:"語彙問題",explanation:"空所の後ろにはreduction（削減）という名詞が続いています。空所にはreduction（削減）と合う(D) dramatic（劇的な）が適切です。",translation:"自動化を導入した結果、生産時間が劇的に削減され、生産量が増加した。"},
  {id:805,q:"——– in the organization consider Sarah Johnson’s strategies to be groundbreaking and highly effective.",options:["Anything","Much","That","Many"],answer:3,type:"数量代名詞・代名詞問題",explanation:"この問題文の動詞は現在形のconsiderで、三人称単数現在の”s”がありません。したがって、主語は可算名詞の複数形になります。選択肢の中で、可算名詞の複数扱いのものは、(D) Many（多くのもの[人]）だけでこれを選びます。",translation:"組織内の多くの人々は、Sarah Johnsonさんの戦略を画期的で非常に効果的だと考えています。"},
  {id:806,q:"Our analysis shows that problems during ——– have resulted in increased production costs this quarter.",options:["assembles","assembly","assembled","assemble"],answer:1,type:"品詞または動詞問題",explanation:"空所の前には前置詞 during、後ろが完了形の助動詞have があることから、空所には名詞が入ることがわかります。選択肢の中で、名詞は (B) assembly（組み立て）だけでこれを選びます。",translation:"私たちの分析によると、組立中の問題が今四半期の生産コスト増につながった。"},
  {id:807,q:"Mei Huang is ——– for analyzing market trends and adjusting our strategy accordingly.",options:["fortunate","possible","numerous","responsible"],answer:3,type:"語彙問題",explanation:"文の空所の後には \"for analyzing market trends\"（市場のトレンドを分析するために）という前置詞句が続いています。主語のMei Huangさんが「市場のトレンドを分析の責任を負う」と考えるのが適切なので、(D) responsible（責任がある）を選びます。",translation:"Mei Huangさんは、市場のトレンドを分析し、それに応じて私たちの戦略を調整する責任を負っています。"},
  {id:808,q:"We made revisions to the plan after considering opinions from ——– during the public hearing.",options:["resident","residents","residences","residential"],answer:1,type:"品詞問題",explanation:"この空所の前は名詞opinions（意見）に前置詞from（から）、後ろには前置詞during（～の間）があり、空所には名詞が入ることがわかります。名詞は(A) resident（住民、居住者 単数形）、(B) residents（residentの複数形）、(C) residences（住居、住宅 複数形）の３つありますが、opinions from residents（住民からの意見）が適切なので、(B) residents（住民[複数形]）を選びます。",translation:"公聴会で住民たちからの意見を考慮した後、私たちは計画を修正しました。"},
  {id:809,q:"During the press release, Pure Wave Clean Energy will ——– on its plans for international expansion.",options:["advance","equip","comment","predict"],answer:2,type:"語彙問題",explanation:"「報道発表の中で、Pure Wave Clean Energyは国際的な事業拡大計画について——–する」という文脈です。企業が報道発表で自社の計画について公言する際には、「コメントする」や「発言する」という表現が適しています。",translation:"報道発表の中で、Pure Wave Clean Energyは国際的な事業拡大計画についてコメントします。"},
  {id:810,q:"In the last quarter, Li Wei broke the record ——– the highest individual sales figures achieved.",options:["under","for","within","above"],answer:1,type:"前置詞問題",explanation:"空所の前がbroke the record（記録を更新する）で、後ろがthe highest individual sales figures achieved（これまでに達成された最高の個人売上高）なので、前置詞(B) forが適切です。",translation:"昨四半期、Li Weiさんはこれまでに達成された個人売上高の最高記録を更新しました。"},
  {id:811,q:"We agreed to pay a ——– to Xiao Investment Group for their expert financial guidance.",options:["commission","permission","donation","promotion"],answer:0,type:"語彙問題",explanation:"Xiao Investment Groupへの支払いが言及されており、その理由としてtheir expert financial guidance（彼らの専門的な金融の助言）が挙げられています。この文脈を考慮すると、Xiao Investment Groupが提供した金融の専門的な助言に対しての報酬や手数料が考えられます。この意味で適切なのは、(A) commission（手数料）です。",translation:"私たちは、Xiao Investment Groupに専門的な金融の助言の対価として手数料を支払うことに同意しました。"},
  {id:812,q:"To cater to small businesses, our professional training programs are ——– priced and comprehensive.",options:["competitive","competing","competition","competitively"],answer:3,type:"品詞問題",explanation:"空所の前後を確認すると、空所の前にareというbe動詞があり、後にpriced（価格の付けられた）という過去分詞または形容詞があることから、空所には副詞が適切です。選択肢の中で副詞は(D) competitively（競争力を持って）のみでこれを選びます。",translation:"小規模企業に対応するため、当社のプロフェッショナルトレーニングプログラムは価格競争力があり、包括的な内容となっています。"},
  {id:813,q:"Lucia Alvarez confirms that the proposed budget is ——– for the project’s scope and scale.",options:["suitable","similar","diligent","enthusiastic"],answer:0,type:"語彙問題",explanation:"選択肢は全て形容詞で、「語彙問題」として扱うことができます。適切な形容詞を文脈に基づいて選びます。",translation:"Lucia Alvarez confirms that the proposed budget is ——– for the project’s scope and scale."},
  {id:814,q:"Elizabeth Turner’s publication in the renowned journal ——– by years of groundbreaking research in her field.",options:["was preceded","will be preceding","would precede","were to precede"],answer:0,type:"能動態・受動態・時制に関する動詞問題",explanation:"空所の前が主語Elizabeth Turner’s publication in the renowned journal（Elizabeth Turnerさんの著名な専門誌での出版）、後ろにbyで始まるby years of groundbreaking research（数年間の画期的な研究に）があります。",translation:"Elizabeth Turnerさんの著名な専門誌での出版は彼女の分野で数年間の画期的な研究に続いて行われた"},
  {id:815,q:"The Polaris Platform Project succeeded ——– Mr. Martin initially had reservations about its viability.",options:["although","if","beside","whenever"],answer:0,type:"語彙問題",explanation:"空所の前が、The Polaris Platform Project succeededで主語+動詞、空所の後がMr. Martin initially had …という主語+動詞の形が続いています。したがって、接続詞が必要です。接続詞は(A) although（～だけれども）、(B) if（もし～ならば）、(D) whenever（～するときはいつでも）の３つありますので、文全体の意味を考える必要があります。",translation:"Martinさんは、最初はその実現可能性に懐疑的であったけれども、Polaris Platform Projectは成功しました。"},
  {id:816,q:"Installation of the new manufacturing equipment is scheduled to ——– next Monday.",options:["expire","arrange","commence","construct"],answer:2,type:"語彙問題",explanation:"主語はInstallation of the new manufacturing equipment（新しい製造設備の設置）です。この主語と合う動詞は(C) commence（始まる、開始する）でこれを選びます。",translation:"新しい製造設備の設置が来週の月曜日に始まる予定です。"},
  {id:817,q:"The local government ——– the bridge had the engineering report not confirmed its stability.",options:["is being demolished","would have demolished","has been demolishing","will be demolished"],answer:1,type:"能動態・受動態・時制に関する動詞問題",explanation:"後半部分のhad the engineering report not confirmed its stabilityはif the engineering report had not confirmed its stability が倒置した形で仮定法過去完了であることがわかります。",translation:"もし技術報告書がその安定性を確認していなかったら、地方自治体地方政府は橋を解体していただろう。"},
  {id:818,q:"Orange Valley Bistro will present an exclusive gift card to ——– responding to our annual feedback survey.",options:["whoever","who","whose","everyone"],answer:3,type:"語彙問題",explanation:"空所の前が前置詞to、空所の後ろが現在分詞（動名詞）のresponding（応答する）です。選択肢をひとつひとつ確認していきましょう。",translation:"Orange Valley Bistroでは、毎年恒例のフィードバック調査にご回答いただいた方全員に、限定ギフトカードをプレゼントいたします。"},
  {id:819,q:"Ms. Thompson asked the staff to view a ——– of the feedback collected from customers.",options:["voucher","coupon","summary","payment"],answer:2,type:"語彙問題",explanation:"空所の前が、動詞view（見る）に冠詞a、空所の後ろはof the feedback collected from customers（顧客から集められたフィードバックの）です。空所に(C) summary（要約、サマリー）を入れると、意味が「顧客から集められたフィードバックの要約を見る」となって自然なフレーズになります。よって、(C) summary（要約、サマリー）を選びます。",translation:"Thompsonさんは、顧客から集められたフィードバックの要約を見るようにスタッフに求めた。"},
  {id:820,q:"We are preparing to meet the demand generated by the public ——– for our services.",options:["anticipate","anticipatory","anticipated","anticipation"],answer:3,type:"品詞または動詞問題",explanation:"空所の前が、冠詞theに形容詞public（一般の人の、大衆の）、後ろが前置詞forです。したがって空所には名詞が入り、(D) anticipation （期待）が適切です。",translation:"私たちは、自分たちのサービスに対する一般の人の期待から生み出される需要に応える準備をしている。"},
  {id:821,q:"Mr. Burstein cannot make investment decisions ——– prior consent from the finance committee.",options:["except","inside","about","without"],answer:3,type:"語彙問題",explanation:"空所の前がMr. Burstein cannot make investment decisions（Bursteinさんは投資決定を下せない）、空所の後ろがprior consent（事前承諾）です。この前後をつなぐ適切な前置詞は(D) without（なしに）です。",translation:"Bursteinさんは、財務委員会からの事前承諾がないと投資決定を行うことができません。"},
