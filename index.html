  {id:1414,q:"The supervisor will assign the new project to ——– has the most relevant technical experience.",options:["whose","anyone","whoever","nobody"],answer:2,type:"<strong>代名詞・関係代名詞問題</strong>",explanation:"空所の前に前置詞to があり、後ろはhas the most relevant technical experience（最も関連する技術的経験を持っている）という動詞+目的語の構造です。前置詞toの後に動詞+目的語が来る場合、主格になれる複合関係代名詞が必要になります。「最も関連する技術的経験を持っている人は誰でも」という意味から、(C) whoever（～する人は誰でも）を選びます。",translation:"監督者は、最も関連する技術的経験を持っている人に新しいプロジェクトを割り当てます。"},
  {id:1415,q:"The report will not be approved ——– Mr. Lee provides his signature before tomorrow afternoon.",options:["regardless","while","unless","rather"],answer:2,type:"接続詞・副詞問題",explanation:"空所の前はThe report will not be approvedで主語+動詞、後ろはMr. Lee providesで主語+動詞です。これは上の２の接続詞が入るパターンです。選択肢の中で接続詞は(B) while（～する間、～の一方で）と(C) unless（～でない限り）があります。文脈から「Leeさんが明日の午後までに署名を提供しない限り、報告書は承認されない」とすると意味が通るので、(C) unless（～でない限り）を選びます。",translation:"Leeさんが明日の午後までに署名を提供しない限り、報告書は承認されません。"},
  {id:1416,q:"Our distribution center located on Maple Avenue is undergoing ——– due to recent storm damage.",options:["support","traffic","vehicles","repairs"],answer:3,type:"<strong>語彙問題</strong>",explanation:"空所の前は動詞undergo（受ける、経験する）、後ろはdue to recent storm damage（最近の嵐の被害による）という理由を表す句が続きます。「配送センターが最近の嵐の被害のため～を受けている」という文脈で適切な名詞は(D) repairs（修理）です。undergo repairs（修理を受ける）は一般的な表現です。",translation:"Maple Avenueにある私たちの配送センターは、最近の嵐の被害のため修理中です。"},
  {id:1417,q:"Our manager noted that Ms. Naomi Chen was ——– in negotiating better shipping rates.",options:["help","helper","helpful","helpfully"],answer:2,type:"<strong>品詞問題</strong>",explanation:"空所の前はbe動詞was、後ろは前置詞in（～において）が続きます。be動詞の後には形容詞が来るのが一般的で、選択肢の中で形容詞は(C) helpful（役に立つ）です。「be helpful in～」は「～において役に立つ」という意味の一般的な表現です。",translation:"私たちのマネージャーは、Naomi Chenさんがより良い配送料金の交渉において役に立ったと述べました。"},
  {id:1418,q:"Human resources will ——– a certificate to Mr. Robert Miller after he completes the safety program.",options:["reach","present","involve","achieve"],answer:1,type:"<strong>語彙問題</strong>",explanation:"空所の後ろはa certificate to Mr. Robert Miller（Robert Millerさんに証明書を～する）です。この文脈で適切な動詞は(B) present（贈呈する、授与する）です。present a certificate to someone（誰かに証明書を贈呈する）は一般的な表現です。",translation:"人事部は、Robert Millerさんが安全プログラムを完了した後、彼に証明書を贈呈します。"},
  {id:1419,q:"All participants must arrive at the training room ten minutes ——– the scheduled starting time.",options:["within","before","beside","into"],answer:1,type:"<strong>語彙問題</strong>",explanation:"空所の前はten minutes（10分間）、後ろはthe scheduled starting time（予定された開始時刻）です。「すべての参加者は予定された開始時刻の10分～に研修室に到着しなければならない」という文脈で適切な前置詞は(B) before（～前に）です。",translation:"すべての参加者は、予定された開始時刻の10分前に研修室に到着しなければなりません。"},
  {id:1420,q:"The warehouse guarantees same-day shipping for all ——– received by 3 p.m. each weekday.",options:["order","ordering","ordered","orders"],answer:3,type:"<strong>品詞問題</strong>",explanation:"空所の前は形容詞all（すべての）、後ろは過去分詞received（受け取られた）が続きます。形容詞allの後には名詞が入ると考えられ、選択肢の中で名詞は(A) order（単数形）と(D) orders（複数形）があります。Allの後ろが可算名詞の場合は複数形が入るので、複数名詞の(D) orders（注文）が適切です。",translation:"倉庫は、平日の午後3時までに受け取ったすべての注文について当日配送を保証しています。"},
  {id:1421,q:"Because regional offices often lack sufficient resources, Dennis Carter can deliver training materials upon ——–.",options:["requested","to request","request","requester"],answer:2,type:"<strong>品詞問題</strong>",explanation:"空所の前は前置詞upon（～に応じて）です。前置詞の後には名詞が必要で、選択肢の中で名詞は(C) request（要請）と(D) requester（要請者）があります。「upon request」は「要請に応じて」という意味の慣用表現で「要請に応じて研修資料を配送する」とすると意味が通じるので、(C) request（要請）を選びます。",translation:"地域オフィスはしばしば十分なリソースが不足しているため、Dennis Carterは要請に応じて研修資料を配送することができます。"},
  {id:1422,q:"Ms. Okada sends ——– progress updates to the board of directors on major company initiatives.",options:["eligible","accomplished","frequent","evident"],answer:2,type:"<strong>語彙問題</strong>",explanation:"空所の後ろはprogress updates（進捗報告）という名詞です。「Okadaさんが取締役会に主要な会社の取り組みについて～進捗報告を送る」という文脈で適切な形容詞は(C) frequent（頻繁な）です。",translation:"Okadaさんは、主要な会社の取り組みについて頻繁な進捗報告を取締役会に送ります。"},
  {id:1423,q:"——– Dr. Dervishi concludes the annual meeting, he will answer questions from shareholders and employees.",options:["Before","Instead","Likewise","Consequently"],answer:0,type:"<strong>接続詞・前置詞・副詞問題</strong>",explanation:"空所の後ろはDr. Dervishi concludes the annual meeting（Dervishi博士が年次会議を終える）という主語+動詞の構造で、その後にカンマがあり、さらにhe will answer questions（彼が質問に答える）という主節が続きます。この構造から上の１のパターンに該当し、空所には接続詞が入ることがわかります。選択肢の中で接続詞は(A) Before（～する前に）のみなので、これを選びます。（※beforeは接続詞の他に前置詞、副詞もあり）",translation:"Dervishi博士が年次会議を終える前に、彼は株主と従業員からの質問に答えます。"},
  {id:1424,q:"——– earlier forecasts, TKLN Manufacturing reported higher profits during the second quarter this year.",options:["Contrary to","Even though","Due to","In place of"],answer:0,type:"<strong>接続詞・前置詞問題</strong>",explanation:"空所の後ろはearlier forecasts（以前の予測）という名詞句で、カンマ以降がTKLN Manufacturing reported（TKLN Manufacturingは報告しました）の主語+動詞構造です。これは上の３のパターンに該当し、空所には前置詞が入ることがわかります。選択肢の中で前置詞は(A) Contrary to（～とは反対に）、(C) Due to（～のため）、(D) In place of（～の代わりに）の3つがあります。文脈から「以前の予測とは反対に、TKLN Manufacturingはより高い利益を報告した」という対比の意味が適切なので、(A) Contrary to（～とは反対に）を選びます。",translation:"以前の予測とは反対に、TKLN Manufacturingは今年の第2四半期により高い利益を報告しました。"},
  {id:1425,q:"The new shopping complex is expected to be a ——– destination for both locals and tourists.",options:["popularity","popularize","popularly","popular"],answer:3,type:"<strong>品詞問題</strong>",explanation:"空所の前は不定冠詞a、後ろは名詞destination（目的地）が続きます。したがって、空所には名詞destinationを修飾する形容詞が入ります。選択肢の中で形容詞は(D) popular（人気の）でこれを選びます。",translation:"新しい複合商業施設は、地元の人々と観光客の両方にとって人気の目的地になることが期待されています。"},
  {id:1426,q:"The chairman mentioned that Mr. Loewenstein handled ——– about late shipments to several key clients.",options:["referrals","repairs","compensations","complaints"],answer:3,type:"<strong>語彙問題</strong>",explanation:"空所の後ろはabout late shipments to several key clients（いくつかの重要な顧客への遅延配送について）です。「Loewensteinさんが重要な顧客への遅延配送について～を処理した」という文脈で適切な名詞は(D) complaints（苦情）です。",translation:"会長は、Loewensteinさんがいくつかの重要な顧客への配送遅延についての苦情を処理したと述べました。"},
  {id:1427,q:"The revised schedule required ——– more working hours from employees to meet project deadlines.",options:["significant","signified","signify","significantly"],answer:3,type:"<strong>品詞問題</strong>",explanation:"空所の前は動詞required、後ろは比較級more working hours（より多くの労働時間）が続きます。比較級のmoreを修飾するのは副詞なので、選択肢の中で副詞の(D) significantly（大幅に）を選びます。",translation:"修正されたスケジュールは、プロジェクトの締切を守るため従業員から大幅により多くの労働時間を必要としました。"},
  {id:1428,q:"The marketing department launched an online campaign to ——– public awareness about data security issues.",options:["raise","reply","inquire","react"],answer:0,type:"<strong>語彙問題</strong>",explanation:"空所の後ろはpublic awareness about data security issues（データセキュリティ問題についての公衆の意識）です。「マーケティング部門がデータセキュリティ問題についての公衆の意識を～するためにオンラインキャンペーンを開始した」という文脈で適切な動詞は(A) raise（高める）です。raise awareness（意識を高める）は一般的な表現です。",translation:"マーケティング部門は、データセキュリティ問題についての公衆の意識を高めるためにオンラインキャンペーンを開始しました。"},
  {id:1429,q:"The shipment is expected to arrive ——– three business days after the payment is confirmed.",options:["on","along","until","within"],answer:3,type:"語彙問題",explanation:"空所の前は動詞arrive（到着する）、後ろはthree business days（3営業日）です。「荷物が支払い確認後3営業日～に到着することが予想される」という文脈で適切な前置詞は(D) within（～以内に）です。",translation:"荷物は、支払いが確認された後3営業日以内に到着することが予想されます。"},
  {id:1430,q:"Students from nearby universities ——– Brandt Library services to complete group projects on global trade.",options:["are used","are using","had been used","to use"],answer:1,type:"<strong>動詞問題</strong>",explanation:"問題文の中で空所以外に動詞（述語動詞）がありません。したがって、空所には述語動詞が入ることがわかります。主語Students（複数）が「図書館サービスを利用する」という能動的な関係が適切なので、(B) are using（現在進行形）を選びます。(A) are usedは受動態で意味が合わず、(C) had been usedは過去完了の受動態で時制が不適切です。",translation:"近くの大学の学生たちは、グローバル貿易に関するグループプロジェクトを完成させるためにBrandt図書館のサービスを利用しています。"},
  {id:1431,q:"The warehouse manager noticed packaging problems and told employees to fix ——– without any delay.",options:["they","their","them","themselves"],answer:2,type:"<strong>代名詞問題</strong>",explanation:"空所の前は動詞fix（解決する、修理する）、後ろは前置詞without（～なしに）です。動詞fixの目的語が必要で、文脈から「梱包の問題を解決する」ことを指しているため、packaging problemsを受ける目的格の代名詞(C) them（それらを）を選びます。",translation:"倉庫管理者は梱包の問題に気づき、従業員に遅れることなくそれらを解決するよう指示しました。"},
  {id:1432,q:"All purchase orders should be processed in a ——– manner to avoid delays in product delivery.",options:["time","timed","timely","timing"],answer:2,type:"<strong>品詞問題</strong>",explanation:"空所の前は不定冠詞a、後ろは名詞manner（方法）が続きます。したがって、空所には名詞mannerを修飾する形容詞が入ります。選択肢の中で形容詞は(C) timely（適時の、タイムリーな）でこれを選びます。「in a timely manner」は「適時に、タイムリーに」という意味の慣用表現です。",translation:"すべての発注書は、製品配送の遅延を避けるために適時に処理されるべきです。"},
  {id:1433,q:"According to her colleagues, Sue Kang is known to be ——– skilled in handling complex negotiations.",options:["carefully","rapidly","indirectly","exceptionally"],answer:3,type:"<strong>語彙問題</strong>",explanation:"空所の後ろは形容詞skilled（熟練した）です。「Sue Kangさんは複雑な交渉を処理することに～熟練していることで知られている」という文脈で適切な副詞は(D) exceptionally（非常に、格別に）です。",translation:"同僚によると、Sue Kangさんは複雑な交渉を処理することに非常に熟練していることで知られています。"},
  {id:1434,q:"Inclement weather and a shortage of drivers ——– serious challenges for our delivery operations.",options:["have posed","is posing","does pose","will have been posed"],answer:0,type:"<strong>動詞問題</strong>",explanation:"問題文の中で空所以外に動詞（述語動詞）がありません。したがって、空所には述語動詞が入ることがわかります。主語は「Inclement weather and a shortage of drivers」という複数の要素をandで結んだ複合主語なので複数扱いになります。したがって、複数主語に対応する(A) have posed（現在完了形）を選びます。(B) is posingの主語は単数、(C) does poseの主語は単数、(D) will have been posedは受動態で意味が合いません。",translation:"悪天候と運転手不足が私たちの配送業務に深刻な課題をもたらしています。"},
  {id:1435,q:"The economic outlook is ——– in employment growth and investment opportunities than economists previously predicted.",options:["weak","weaker","weakly","more weakly"],answer:1,type:"<strong>品詞・比較問題</strong>",explanation:"空所の前はbe動詞is、後半にthan（～より）という比較を表す語が続きます。be動詞の後で比較のthanがある場合、形容詞の比較級が必要です。選択肢の中で形容詞の比較級は(B) weaker（より弱い）でこれを選びます。",translation:"経済見通しは、雇用成長と投資機会において経済学者が以前に予測していたよりも弱いです。"},
  {id:1436,q:"Our legal team ——– reviews contracts carefully to ensure compliance with international business regulations.",options:["almost","ahead","somewhat","always"],answer:3,type:"<strong>語彙問題</strong>",explanation:"空所の前後は「法務チームが～契約を注意深く検討して国際的なビジネス規制への遵守を確保する」という文脈です。法務チームの仕事として契約検討は継続的に行われる業務なので、(D) always（いつも）が適切です。",translation:"私たちの法務チームは、国際的なビジネス規制への遵守を確保するために、いつも契約を注意深く検討します。"},
  {id:1437,q:"For urgent matters, please contact the regional sales director ——– instead of sending an email inquiry.",options:["directly","direction","directs","directed"],answer:0,type:"<strong>品詞問題</strong>",explanation:"空所の前は動詞contact（連絡する）、後ろはinstead of（～の代わりに）です。動詞contactを修飾する語が必要で、選択肢の中で副詞は(A) directly（直接に）でこれを選びます。",translation:"緊急事項については、メールでの問い合わせを送る代わりに、地域営業ディレクターに直接連絡してください。"},
  {id:1438,q:"The trainer spoke very ——– so that every participant could understand the new software procedures.",options:["clears","clearest","clearer","clearly"],answer:3,type:"<strong>品詞問題</strong>",explanation:"空所の前は副詞very（とても）と動詞spoke（話した）、後ろはso that（～するように）です。動詞spokeを修飾し、副詞veryによって修飾される語が必要なので、副詞の(D) clearly（明確に）を選びます。",translation:"トレーナーは、すべての参加者が新しいソフトウェア手順を理解できるように、とても明確に話しました。"},
  {id:1439,q:"Our new branch on Harmon Avenue, ——– opened last year, has already exceeded its revenue targets.",options:["and","which","though","when"],answer:1,type:"<strong>接続詞・関係代名詞問題</strong>",explanation:"空所の前後はカンマで区切られており、空所の後ろはopened last year（昨年開店した）という動詞+副詞の構造です。カンマに囲まれた部分は「Our new branch on Harmon Avenue」を修飾する非制限用法の関係詞節で、関係代名詞(B) which（それは）を選びます。whichがopened last yearの主語になります。",translation:"昨年開店したHarmon Avenueの私たちの新支店は、すでに収益目標を上回っています。"},
  {id:1440,q:"The project delays were further ——– by changes in government regulations affecting the industry.",options:["complicating","complicated","complication","complicate"],answer:1,type:"<strong>品詞問題</strong>",explanation:"空所の前は副詞further（さらに）とbe動詞were、後ろは前置詞by（～によって）です。be動詞wereと前置詞byがあることから受動態の構造で、空所には過去分詞が入ります。選択肢の中で過去分詞は(B) complicated（複雑にされた）でこれを選びます。",translation:"プロジェクトの遅延は、業界に影響を与える政府規制の変更によってさらに複雑になりました。"},
  {id:1441,q:"The sudden increase in shipping costs affected the quarterly budget, ——– it difficult to control expenses.",options:["made","make","makes","making"],answer:3,type:"<strong>動詞問題</strong>",explanation:"この文では既にaffected（影響を与えた）が述語動詞として存在します。カンマの後は結果を表す分詞構文で、現在分詞(D) making（～させて）を選びます。「配送コストの急激な増加が四半期予算に影響を与え、その結果として費用管理を困難にさせた」という因果関係を表します。",translation:"配送コストの急激な増加が四半期予算に影響を与え、費用管理を困難にしました。"},
  {id:1442,q:"The Vickwell Historical Museum expressed gratitude for the ——– of local business sponsors this year.",options:["account","privilege","competition","generosity"],answer:3,type:"<strong>語彙問題</strong>",explanation:"空所の前後は「博物館が地元企業スポンサーの～に対して感謝を表明した」という文脈です。スポンサーに対して感謝を示すのは、その寛大な支援や援助に対してなので、(D) generosity（寛大さ、気前の良さ）が適切です。",translation:"Vickwell歴史博物館は、今年の地元企業スポンサーの寛大さに対して感謝を表明しました。"},
  {id:1443,q:"The contract negotiations can begin immediately with the supplier ——– Cha Joon agrees with the proposal.",options:["and","or","if","so"],answer:2,type:"<strong>語彙問題</strong>",explanation:"空所の前は「供給業者との契約交渉がすぐに始められる」、後ろは「Cha Joonさんが提案に同意する」という内容です。交渉開始は同意が条件と考えられるので、条件を表す接続詞(C) if（もし～なら）を選びます。",translation:"もしCha Joonさんが提案に同意すれば、供給業者との契約交渉をすぐに開始することができます。"},
  {id:1444,q:"Ms. Baker introduced the ——– new project to investors during last week’s corporate strategy meeting.",options:["excited","exciting","excitedly","excitement"],answer:1,type:"<strong>品詞問題</strong>",explanation:"空所の前は定冠詞the、後ろは形容詞new（新しい）と名詞project（プロジェクト）が続きます。したがって、空所には名詞句new projectを修飾する形容詞が入ります。選択肢の中で形容詞は(A) excited（興奮した）と(B) exciting（興奮させる、刺激的な）があります。プロジェクト自体の性質を表すので、(B) exciting（刺激的な）を選びます。",translation:"Bakerさんは、先週の企業戦略会議で投資家に刺激的な新プロジェクトを紹介しました。"},
  {id:1445,q:"The board emphasized that meeting the project deadline is a ——– factor for maintaining investor confidence.",options:["critic","critical","criticize","critically"],answer:1,type:"<strong>品詞問題</strong>",explanation:"空所の前は不定冠詞a、後ろは名詞factor（要因）が続きます。したがって、空所には名詞factorを修飾する形容詞が入ります。選択肢の中で形容詞は(B) critical（重要な、決定的な）でこれを選びます。",translation:"取締役会は、プロジェクトの締切を守ることは投資家の信頼を維持するための重要な要因であると強調しました。"},
  {id:1446,q:"The training program lasts from the start of June ——– the end of August each year.",options:["around","until","during","throughout"],answer:1,type:"<strong>語彙問題</strong>",explanation:"空所の前はfrom the start of June（6月の始めから）、後ろはthe end of August（8月の終わりまで）です。「from A ～ B」の構文で期間の終点を表す前置詞は(B) until（～まで）です。「from ～ until」は「～から～まで」という期間を表す一般的な表現です。",translation:"研修プログラムは毎年6月の始めから8月の終わりまで続きます。"},
  {id:1447,q:"The training program requires every new participant to pay an ——– fee before beginning classes.",options:["enrollment","enroll","enrolled","enrolls"],answer:0,type:"<strong>品詞問題</strong>",explanation:"空所の前は不定冠詞an、後ろは名詞fee（料金）が続きます。したがって、空所には名詞feeを修飾する形容詞が通常は入りますが、この問題では「enrollment fee（入学金、登録料）」という意味の一般的な表現が適切で名詞の (A) enrollment（入学、登録）を選びます。",translation:"研修プログラムでは、すべての新しい参加者がクラスを開始する前に入学金を支払う必要があります。"},
  {id:1448,q:"Mr. Tanaka answered many questions from employees after ——– recent trip to the manufacturing facility abroad.",options:["he","his","him","himself"],answer:1,type:"<strong>代名詞問題</strong>",explanation:"空所の前は前置詞after（～の後）、後ろは形容詞recent（最近の）と名詞trip（出張）です。したがって、空所には名詞句recent tripを修飾する所有格の代名詞が入ります。選択肢の中で所有格の代名詞は(B) his（彼の）でこれを選びます。",translation:"田中さんは、海外の製造施設への最近の出張の後、従業員からの多くの質問に答えました。"},
  {id:1449,q:"——– of the two job applicants has shown sufficient qualifications to meet the company’s requirements.",options:["most","several","neither","both"],answer:2,type:"<strong>数量代名詞問題</strong>",explanation:"空所の後ろは「of the two job applicants」（2人の求職者のうち）で、動詞はhas shown（単数形）です。2つのもののうちどちらも～ではないという否定の意味で単数動詞を取るのは(C) neither（どちらも～ない）です。",translation:"2人の求職者のうちどちらも、会社の要件を満たすのに十分な資格を示していません。"},
  {id:1450,q:"Only proposals submitted before the deadline will be ——– for evaluation by the finance committee.",options:["considered","applied","worked","found"],answer:0,type:"<strong>語彙問題</strong>",explanation:"空所の前はwill be（未来の受動態）、後ろはfor evaluation by the finance committee（財務委員会による評価のために）です。「締切前に提出された提案のみが財務委員会による評価のために～される」という文脈で適切な動詞は(A) considered（検討される）です。「be considered for」は「～について検討される」という意味の一般的な表現です。",translation:"締切前に提出された提案のみが、財務委員会による評価のために検討されます。"},
  {id:1451,q:"By attending international trade conferences, Ms. Patel has become very well informed ——– export regulations.",options:["for","to","about","behind"],answer:2,type:"<strong>語彙問題</strong>",explanation:"空所の前は形容詞informed（情報に通じた）、後ろはexport regulations（輸出規制）です。「be informed about」は「～について詳しい、～について情報に通じている」という意味の一般的な表現なので、(C) about（～について）を選びます。",translation:"国際貿易会議に参加することで、Patelさんは輸出規制について非常に詳しくなりました。"},
  {id:1452,q:"The finance department confirmed that Dempsey Hall generated a ——– of revenue during the last quarter.",options:["rate","surplus","factor","profit"],answer:1,type:"<strong>語彙問題</strong>",explanation:"空所の後ろはof revenue（収益の）です。「Dempsey Hallが前四半期に収益の～を生み出した」という文脈で適切な名詞は(B) surplus（余剰、黒字）です。「surplus of revenue」は「収益の余剰、収益黒字」という意味になります。",translation:"財務部門は、Dempsey Hallが前四半期に収益の黒字を生み出したことを確認しました。"},
  {id:1453,q:"Because the conference venue will close earlier than usual, participants must arrive early and plan ——–.",options:["accordingly","subsequently","conversely","assuredly"],answer:0,type:"<strong>語彙問題</strong>",explanation:"空所の前は動詞plan（計画する）です。「会議会場がいつもより早く閉まるので、参加者は早く到着し、それに応じて計画しなければならない」という文脈が適切なので副詞(A) accordingly（それに応じて、従って）を選びます。",translation:"会議会場がいつもより早く閉まるので、参加者は早く到着し、それに応じて計画しなければなりません。"},
  {id:1454,q:"——– within the construction and real estate sectors is rising because of government infrastructure projects.",options:["Employee","Employment","Employable","Employed"],answer:1,type:"<strong>品詞問題</strong>",explanation:"空所は文の主語の位置にあり、後ろは動詞is rising（上昇している）です。文の主語になれるのは名詞で、選択肢の中で名詞は(A) Employee（従業員）と(B) Employment（雇用）があります。「建設業界と不動産業界での雇用が政府のインフラプロジェクトのために上昇している」という文脈では、(B) Employment（雇用）が適切です。",translation:"建設業界と不動産業界での雇用は、政府のインフラプロジェクトのため上昇しています。"},
  {id:1455,q:"The project leader will ——– essential training sessions together with Ms. Nishad.",options:["act","meet","carry out","turn in"],answer:2,type:"<strong>語彙問題</strong>",explanation:"空所の後ろはessential training sessions（重要な研修セッション）です。「プロジェクトリーダーがNishadさんと一緒に重要な研修セッションを～する」という文脈で適切な動詞は(C) carry out（実行する、行う）です。",translation:"プロジェクトリーダーは、Nishadさんと一緒に重要な研修セッションを実行します。"},
  {id:1456,q:"Ms. Carter’s detailed presentation on the new safety regulations was quite ——– to the employees.",options:["attractive","comfortable","informative","wealthy"],answer:2,type:"<strong>語彙問題</strong>",explanation:"空所の前後は「新しい安全規制についての詳細なプレゼンテーションが従業員にとって非常に～だった」という文脈です。安全規制についてのプレゼンテーションなので、従業員にとって情報提供的であることが自然で、(C) informative（有益な、情報に富んだ）が適切です。",translation:"Carterさんの新しい安全規制についての詳細なプレゼンテーションは、従業員にとって非常に有益でした。"},
  {id:1457,q:"Due to the advanced technology, our company can complete large-scale data analysis more ——– than before.",options:["quick","quicker","quickest","quickly"],answer:3,type:"<strong>品詞問題</strong>",explanation:"空所の前は副詞more（より）、後ろは比較のthan（～より）です。動詞complete（完了する）を修飾し、比較級のmoreと組み合わせるのは副詞なので、(D) quickly（速く）を選びます。「more quickly」で「より速く」という副詞の比較級表現になります。",translation:"高度な技術により、私たちの会社は大規模なデータ分析を以前よりも速く完了することができます。"},
  {id:1458,q:"The executives from Singapore will attend a briefing after the factory ——– concludes.",options:["toured","tourism","tourist","tour"],answer:3,type:"<strong>品詞問題</strong>",explanation:"空所の前は名詞factory（工場）、後ろは動詞concludes（終わる）です。「工場～が終わった後」という文脈で、主語になる名詞が必要です。選択肢の中で名詞は(B) tourism（観光業）と(D) tour（見学、ツアー）がありますが、「factory tour」（工場見学）は一般的な表現で、「factory tour concludes」（工場見学が終わる）という意味が通るので、(D) tour（見学）を選びます。",translation:"シンガポールからの幹部たちは、工場見学が終わった後で説明会に参加します。"},
  {id:1459,q:"Ms. Rodriguez announced ——– to expand the research division next fiscal year.",options:["planned","plans","planner","was planning"],answer:1,type:"<strong>品詞または動詞問題</strong>",explanation:"空所の前は動詞announced（発表した）、後ろはto不定詞to expand（拡大する）です。動詞announceの目的語が必要で、選択肢の中で名詞は(B) plans（計画）と(C) planner（計画者）があります。「来年度に研究部門を拡大する計画を発表した」という文脈では、(B) plans（計画）が適切です。",translation:"Rodriguezさんは、来年度に研究部門を拡大する計画を発表しました。"},
  {id:1460,q:"Orion Electronics has not yet determined ——– products to display at the Tokyo Trade Fair.",options:["which","that","this","how"],answer:0,type:"<strong>疑問詞・代名詞問題</strong>",explanation:"空所の前は動詞determined（決定した）、後ろはproducts to display（展示する製品）です。「どの製品を展示するかまだ決めていない」という間接疑問文の構造で、疑問形容詞(A) which（どの）を選びます。",translation:"Orion Electronicsは、東京貿易見本市でどの製品を展示するかまだ決めていません。"},
  {id:1471,q:"Conference organizers at GlobalTech Forum find it ——– when attendees leave the hall during keynote speeches.",options:["distraction","distract","distractible","distracting"],answer:3,type:"<strong>品詞問題</strong>",explanation:"空所の前は「find it」、後ろはwhen節です。findはTOEICパート5の代表的な第5文型の動詞（SVOC：主語+動詞+目的語+補語）です。ここでは、「find it + 形容詞 + when～」で「～する時、それを…だと思う」という意味になります。この構文では、itは仮目的語でwhen節が真の目的語、空所の語が目的格補語となります。「主催者は参加者が基調講演中にホールを出る時、それを気が散ると思う」という文脈で、(D) distracting（気を散らす、邪魔な）が適切です。",translation:"GlobalTech Forumの会議主催者は、参加者が基調講演中にホールを出ることを気が散ると感じています。"},
  {id:1472,q:"All employees at Harrison Bank are required to wear their ID badges ——– entering the building.",options:["across","before","between","toward"],answer:1,type:"<strong>語彙問題</strong>",explanation:"空所の前は「IDバッジを着用することが求められている」、後ろは「建物に入る」です。「建物に入る前にIDバッジを着用する」という時間的順序を表すので、(B) before（～する前に）を選びます。",translation:"Harrison Bankのすべての従業員は、建物に入る前にIDバッジを着用することが求められています。"},
  {id:1473,q:"Ekari Industries is proud to announce its ——– merger with Bogin Enterprises.",options:["whole","external","upcoming","generous"],answer:2,type:"<strong>語彙問題</strong>",explanation:"空所の後ろはmerger（合併）です。「～合併を発表することを誇りに思う」という文脈で、「announce（発表する）」という動詞から、まだ実現していない将来の合併について述べていると判断できます。(C) upcoming（今度の、近づいている）が適切です。",translation:"Ekari Industriesは、Bogin Enterprisesとの今度の合併を発表することを誇りに思っています。"},
  {id:1475,q:"Ms. Ito was asked to ——– the latest data on population growth in Dauphin County.",options:["examine","look","stare","glance"],answer:0,type:"<strong>語彙問題</strong>",explanation:"空所の後ろはthe latest data（最新のデータ）です。「人口増加に関する最新データを～するよう求められた」という文脈で、データを詳しく調べるという意味の(A) examine（調査する、検討する）が適切です。",translation:"Itoさんは、Dauphin郡の人口増加に関する最新データを調査するよう求められました。"},
  {id:1476,q:"The express shuttle bus ——– every thirty minutes from the Atrium Hotel lobby.",options:["departs","are departing","was departed","depart"],answer:0,type:"<strong>動詞問題</strong>",explanation:"主語はThe express shuttle bus（単数）で、「30分ごとに出発する」という定期的な動作を表しています。現在の習慣的行為を表す現在時制で、単数主語なので三人称単数形の(A) departs（出発する）を選びます。",translation:"急行シャトルバスはAtrium Hotelのロビーから30分ごとに出発します。"},
  {id:1477,q:"Refunds for items purchased at Greenleaf Furniture are ——– processed if customers bring a valid receipt.",options:["general","generally","generalize","generalized"],answer:1,type:"<strong>品詞問題</strong>",explanation:"空所の前は助動詞are、後ろは過去分詞processed（処理される）です。受動態の動詞「are processed」を修飾するのは副詞なので、(B) generally（一般的に）を選びます。",translation:"Greenleaf Furnitureで購入された商品の返金は、お客様が有効なレシートを持参すれば一般的に処理されます。"},
  {id:1478,q:"Mr. Hamada will attend the trade fair in Osaka ——– his assistant manages the office operations.",options:["during","while","throughout","by"],answer:1,type:"<strong>接続詞・前置詞問題</strong>",explanation:"空所の前は、「Mr. Hamada will attend」で主語+動詞、後ろは「his assistant manages」で主語+動詞です。これは上の２のパターンで接続詞が入ることがわかります。選択肢の中で接続詞は (B) while（～している間に）のみでこれを選びます。",translation:"Hamadaさんは、アシスタントがオフィス業務を管理している間、大阪の貿易見本市に参加します。"},
  {id:1479,q:"The updated software from TechnoSoft Solutions will be available ——– all registered users starting next month.",options:["to","for","of","with"],answer:0,type:"<strong>語彙問題</strong>",explanation:"空所の前は形容詞available（利用可能な）、後ろはall registered users（すべての登録ユーザー）です。「be available to ~」は「～が利用できる」という意味の一般的な表現なので、(A) to（～に）を選びます。",translation:"TechnoSoft Solutionsのアップデートされたソフトウェアは、来月からすべての登録ユーザーが利用できるようになります。"},
  {id:1480,q:"Clearing old documents from office desks will ——– improve the efficiency of next week’s inspection at Inami Bank.",options:["greatness","greats","great","greatly"],answer:3,type:"<strong>品詞問題</strong>",explanation:"空所の前は助動詞will、後ろは動詞improve（向上させる）です。動詞を修飾するのは副詞なので、(D) greatly（大いに）を選びます。「greatly improve」で「大いに向上させる」という意味になります。",translation:"オフィスの机から古い書類を片付けることは、Inami Bankでの来週の検査の効率を大いに向上させるでしょう。"},
  {id:1481,q:"Chemical companies in Brookhaven have spent considerable sums of ——– on agricultural development.",options:["laboratory","investigation","money","land"],answer:2,type:"<strong>語彙問題</strong>",explanation:"空所の前は「considerable sums of」（相当な額の）です。「sums of」は「～の額」という意味で、通常「sums of money」（金額）として使われる慣用表現です。「農業開発に相当な額のお金を費やした」という文脈で、(C) money（お金）が適切です。",translation:"Brookhavenの化学会社は、農業開発に相当な額のお金を費やしています。"},
  {id:1482,q:"The directors of Shanghai Electronics Group ——– last Friday to discuss the expansion into Southeast Asia.",options:["met","meet","meeting","meets"],answer:0,type:"<strong>動詞問題</strong>",explanation:"空所の後ろに「last Friday」（先週の金曜日）という過去を表す時間表現があります。過去の特定の時点での動作を表すので、過去時制の(A) met（会った）を選びます。",translation:"Shanghai Electronics Groupの取締役たちは、東南アジアへの拡張について話し合うため、先週の金曜日に会いました。"},
  {id:1483,q:"Because the assistants were busy preparing documents, ——– could not join the meeting with Mr. Lopez.",options:["they","them","their","theirs"],answer:0,type:"<strong>代名詞問題</strong>",explanation:"空所の後ろは助動詞could（～できた）なので、主語が必要です。前文の「the assistants」を受けて、主格の代名詞(A) they（彼らは）を選びます。",translation:"アシスタントたちは書類の準備で忙しかったため、彼らはLopezさんとの会議に参加できませんでした。"},
  {id:1484,q:"In the interest of ——–, Dr. Ahn will remain as chairperson of the medical research committee.",options:["continue","continuity","continuous","continuously"],answer:1,type:"<strong>品詞問題</strong>",explanation:"空所の前は前置詞of、「In the interest of ~」は「～の利益のために」という意味の慣用表現です。前置詞の後には名詞が必要で、選択肢の中で名詞は(B) continuity（継続性）のみです。",translation:"継続性のために、Ahn博士は医学研究委員会の委員長として続投します。"},
  {id:1485,q:"Members of Riverside Community Library who keep books past the deadline ——– a late fee automatically.",options:["will be charged","have charged","are charging","charge"],answer:0,type:"<strong>動詞問題</strong>",explanation:"主語はMembers（会員）です。「会員が延滞料金（a late fee）を課せられる」という意味で、会員は料金を「課せられる」側なので受動態が必要です。また、「期限を過ぎて本を保管している会員は延滞料金を課せられることになる」という未来の規則を表すので、(A) will be charged（課せられるだろう）を選びます。",translation:"期限を過ぎて本を保管しているRiverside Community Libraryの会員は、自動的に延滞料金を課せられます。"},
  {id:1486,q:"The new employee orientation at TVC Financial Group will continue ——– next Friday.",options:["across","until","throughout","beyond"],answer:1,type:"<strong>語彙問題</strong>",explanation:"空所の前は動詞continue（続く）、後ろはnext Friday（来週の金曜日）です。「新入社員オリエンテーションが来週の金曜日まで続く」という期間の終点を表すので、(B) until（～まで）を選びます。",translation:"TVC Financial Groupの新入社員オリエンテーションは来週の金曜日まで続きます。"},
  {id:1487,q:"To ensure reliable ——–, Hirose Logistics requires all delivery drivers to use GPS tracking devices.",options:["deliver","delivers","delivered","delivery"],answer:3,type:"<strong>品詞問題</strong>",explanation:"空所の前は形容詞reliable（信頼できる）です。形容詞の後には名詞が必要で、選択肢の中で名詞は(D) delivery（配送）のみです。「信頼できる配送を確実にするために」という意味になります。",translation:"信頼できる配送を確実にするために、Hirose Logisticsはすべての配送ドライバーにGPS追跡装置の使用を義務付けています。"},
  {id:1488,q:"Although the instructions were clear, only ——– participants were able to complete the survey correctly.",options:["some","every","all","another"],answer:0,type:"<strong>数量形容詞問題</strong>",explanation:"空所の前は副詞only（わずか）、文全体は「指示は明確だったにもかかわらず、わずか～の参加者しか正しく調査を完了できなかった」という逆接の文脈です。「only」と組み合わせて「一部の」という意味を表すのは(A) some（いくらかの）です。",translation:"指示は明確でしたが、わずか一部の参加者しか調査を正しく完了することができませんでした。"},
  {id:1489,q:"Technicians at NeoTech Solutions can easily ——– the server racks by following the company’s online manual.",options:["assemble","assembled","assembling","assembles"],answer:0,type:"<strong>動詞問題</strong>",explanation:"空所の前は助動詞can（～できる）と副詞easily（簡単に）です。助動詞と副詞の後には動詞の原形が必要なので、(A) assemble（組み立てる）を選びます。",translation:"NeoTech Solutionsの技術者は、会社のオンラインマニュアルに従うことで、簡単にサーバーラックを組み立てることができます。"},
  {id:1490,q:"The new employees introduced ——– to senior staff members at the reception in the Riverside Plaza Hotel.",options:["them","themselves","their","theirs"],answer:1,type:"<strong>代名詞問題</strong>",explanation:"主語はThe new employees（新入社員たち）、動詞はintroduced（紹介した）です。「新入社員たちが先輩スタッフに自分たちを紹介した」という意味で、主語と目的語が同じ人物を指す場合は再帰代名詞を使います。複数形の主語なので(B) themselves（彼ら自身を）を選びます。",translation:"新入社員たちは、Riverside Plaza Hotelでの歓迎会で先輩スタッフに自分たちを紹介しました。"},
  {id:1491,q:"——– is selected to represent Greenfield Corporation at the Tokyo Tech Expo must prepare a full presentation.",options:["Whoever","Whom","Whose","When"],answer:0,type:"<strong>関係詞問題</strong>",explanation:"空所から「must」までが主語で、その中で空所は主語の役割を果たしています。「選ばれる人は誰でも」という意味で、関係代名詞の主格(A) Whoever（～する人は誰でも）を選びます。",translation:"Tokyo Tech ExpoでGreenfield Corporationを代表するために選ばれる人は誰でも、完全なプレゼンテーションを準備しなければなりません。"},
  {id:1492,q:"By the time Kawasaki Robotics introduces its new automation platform, the engineers ——– all technical issues.",options:["will have corrected","will correct","are correcting","had been correcting"],answer:0,type:"<strong>時制問題</strong>",explanation:"「By the time …」は時を表す副詞節で「～する時までには」という意味で、未来のある時点までに完了していることを表します。現在形の「introduces」が未来を表しているので、未来完了形(A) will have corrected（修正してしまっているだろう）を選びます。",translation:"Kawasaki Roboticsが新しい自動化プラットフォームを導入する時までには、エンジニアたちはすべての技術的問題を修正してしまっているでしょう。"},
  {id:1493,q:"While some staff members preferred the new software, ——– suggested returning to the old system.",options:["each","others","every","little"],answer:1,type:"数量代名詞・形容詞問題",explanation:"「While」は対比を表す接続詞で、「some staff members」（一部のスタッフメンバー）と対比される語が必要です。「some&#8230;others」は「一部は…、他の人たちは」という対比を表す慣用表現なので、(B) others（他の人たち）を選びます。",translation:"一部のスタッフメンバーは新しいソフトウェアを好みましたが、他の人たちは古いシステムに戻ることを提案しました。"},
  {id:1494,q:"The ——– entrance of Lakeside Garden Hotel is being redesigned to accommodate guests with limited mobility.",options:["renovate","renovates","renovated","renovation"],answer:2,type:"<strong>品詞問題</strong>",explanation:"空所の前は定冠詞The、後ろは名詞entrance（入り口）です。名詞を修飾するのは形容詞で、「改装された入り口」という意味から(C) renovated（改装された）を選びます。過去分詞が形容詞として名詞を修飾しています。",translation:"Lakeside Garden Hotelの改装された入り口は、身体の不自由なお客様に対応するため再設計されています。"},
  {id:1495,q:"——– restaurant in Riverton opens on Sundays, but they accept special reservations for large groups.",options:["Neither","Any","Most","Every"],answer:0,type:"<strong>数量形容詞問題</strong>",explanation:"後ろに「but」があることから、前半は否定的な内容であることが分かります。「日曜日に営業するレストランはない」という否定の意味を表すのは(A) Neither（どちらの～も～ない）です。二つのレストランについて「どちらも営業しない」という意味になります。",translation:"Rivertonのどちらのレストランも日曜日は営業していませんが、大きなグループについては特別予約を受け付けています。"},
  {id:1496,q:"Several companies submitted bids for the construction project, but the city awarded the contract to Orion Ltd. because its proposal was better than ——–.",options:["they","them","their","theirs"],answer:3,type:"<strong>代名詞問題</strong>",explanation:"「its proposal was better than ——– 」は比較構文で、「Orion社の提案が～よりも良かった」という意味です。比較対象は「他の会社の提案」なので、「their proposals」の省略形である所有代名詞(D) theirs（彼らのもの）を選びます。",translation:"複数の会社が建設プロジェクトの入札を提出しましたが、市はOrion社の提案が他社のものより良かったため、同社に契約を与えました。"},
  {id:1497,q:"At the Singapore Technology Expo, the company revealed an innovative ——– that attracted international investors.",options:["develop","developer","development","developing"],answer:2,type:"<strong>品詞問題</strong>",explanation:"空所の前は不定冠詞anと形容詞innovative（革新的な）、後ろは関係代名詞that（～するもの）です。不定冠詞の後には単数可算名詞が必要で、選択肢の中で単数可算名詞は(C) development（開発、開発品）のみです。",translation:"Singapore Technology Expoで、その会社は国際投資家を魅了する革新的な開発品を発表しました。"},
  {id:1498,q:"During the ——– phase of construction, several safety inspections were carried out.",options:["initial","initially","initiate","initiates"],answer:0,type:"品詞問題",explanation:"空所の前は定冠詞the、後ろは名詞phase（段階）です。定冠詞と名詞の間には形容詞が必要で、選択肢の中で形容詞は(A) initial（初期の）です。",translation:"建設の初期段階で、いくつかの安全検査が実施されました。"},
  {id:1499,q:"Executives at Merriton Foods responded ——– to customer feedback by improving product packaging.",options:["positive","positively","positiveness","positivity"],answer:1,type:"<strong>品詞問題</strong>",explanation:"空所の前は動詞responded、後ろは前置詞toです。respond to（～に対応する）は句動詞として機能し、動詞を修飾するのは副詞なので、(B) positively（積極的に）を選びます。「respond positively to」で「～に積極的に対応する」という意味になります。",translation:"Merriton Foodsの幹部たちは、製品パッケージを改善することで顧客のフィードバックに積極的に対応しました。"},
  {id:1500,q:"The revised contract outlines all the policies ——– by Nippon Motors and its overseas distributors.",options:["agreed to","agreement","agree","agreeing upon"],answer:0,type:"<strong>品詞または動詞問題</strong>",explanation:"空所の前は名詞policies（方針）、後ろは前置詞by（～によって）です。「Nippon Motorsと海外販売店によって合意された方針」という受動の意味で、過去分詞(A) agreed to（合意された）を選びます。「agree to」は「～に合意する」という熟語表現です。",translation:"改訂された契約書は、Nippon Motorsとその海外販売店によって合意されたすべての方針を概説しています。"},
  {id:1501,q:"Productivity has improved significantly ——– employees began using the new scheduling system developed by Hikari Solutions.",options:["upon","despite","since","until"],answer:2,type:"<strong>接続詞・前置詞問題</strong>",explanation:"空所の前はProductivity has improved（生産性が改善した）で主語+動詞、後ろはemployees began using&#8230;（従業員が使い始めた&#8230;）で主語+動詞です。したがって、上の２のパターンで空所には接続詞が入ります。選択肢の中で接続詞は(C) since（～以来、～してから）と(D) until（～まで）がありますが、「生産性が大幅に改善した」という結果と「従業員が新しいスケジューリングシステムを使い始めた」という原因の時系列を考えると、(C) since（～以来）が適切です。",translation:"従業員がHikari Solutionsによって開発された新しいスケジューリングシステムを使い始めてから、生産性が大幅に改善しました。"},
  {id:1502,q:"The main ——– of the tracking system developed by Summit Cargo Logistics is to reduce delivery errors.",options:["functional","functions","function","functioned"],answer:2,type:"<strong>品詞問題</strong>",explanation:"空所の前は冠詞Theと形容詞main（主要な）、後ろは前置詞of（～の）が続きます。したがって、空所には形容詞mainが修飾する名詞が入ります。選択肢の中で名詞は(B) functions（複数形）と(C) function（単数形）がありますが、主語として動詞is（単数形）を受けているため、単数名詞の(C) function（機能）が適切です。",translation:"Summit Cargo Logisticsによって開発された追跡システムの主要な機能は、配送エラーを減らすことです。"},
  {id:1503,q:"Employee retention rates rose ——– after Greenwood Bank introduced flexible scheduling and telework options.",options:["significantly","utterly","extremely","countlessly"],answer:0,type:"<strong>語彙問題</strong>",explanation:"空所は動詞rose（上昇した）を修飾する副詞の位置にあります。「従業員定着率が上昇した」という文脈において、(A) significantly（大幅に、著しく）が最も自然で適切です。",translation:"Greenwood Bankが柔軟なスケジュールとテレワークの選択肢を導入した後、従業員定着率が大幅に上昇しました。"},
  {id:1504,q:"Employees are encouraged to share ——– ideas for improving workplace safety at Northfield Chemicals.",options:["them","themselves","their","theirs"],answer:2,type:"<strong>代名詞問題</strong>",explanation:"空所の後ろはideas（複数名詞）が続きます。したがって、空所には名詞ideasを修飾する所有格の代名詞が入ります。主語のEmployees（従業員たち）を受ける所有格は(C) their（彼らの）です。",translation:"従業員たちは、Northfield Chemicalsで職場の安全性を向上させるための彼らのアイデアを共有するよう奨励されています。"},
  {id:1505,q:"The conference center at Hamilton Plaza has a seating ——– of nearly 1,200 guests.",options:["compliance","aptitude","capacity","demonstration"],answer:2,type:"<strong>語彙問題</strong>",explanation:"空所の前はseating（座席の）という形容詞、後ろはof nearly 1,200 guests（約1,200人の客の）が続きます。「座席○○が約1,200人」という文脈で最も適切なのは(C) capacity（収容能力、定員）です。seating capacityは「座席数、収容人数」という意味の慣用表現です。",translation:"Hamilton Plazaの会議センターは約1,200人の客の座席収容能力があります。"},
  {id:1506,q:"If you are not fully ——– with the quality of service, please notify Bluewave Networks immediately.",options:["satisfied","satisfaction","satisfactory","satisfy"],answer:0,type:"<strong>品詞問題</strong>",explanation:"空所の前はbe動詞are、副詞fully（完全に）があり、後ろは前置詞with（～に対して）が続きます。この構造から、空所には形容詞が入ることがわかります。選択肢の中で形容詞は(A) satisfied（満足した）と(C) satisfactory（満足のいく）がありますが、「be satisfied with～（～に満足している）」という慣用表現がここでは適切なので、(A) satisfiedを選びます。",translation:"もしサービスの質に完全に満足していない場合は、すぐにBluewave Networksにお知らせください。"},
  {id:1507,q:"A successful ——– of marketing strategy and customer loyalty programs drove Henderson Travel’s profits upward.",options:["combination","understanding","resistance","maintenance"],answer:0,type:"<strong>語彙問題</strong>",explanation:"空所の後ろはof marketing strategy and customer loyalty programs（マーケティング戦略と顧客ロイヤルティプログラムの）が続きます。二つの異なる要素（マーケティング戦略と顧客ロイヤルティプログラム）を結び付けて利益向上につながったという文脈から、(A) combination（組み合わせ）が適切です。",translation:"マーケティング戦略と顧客ロイヤルティプログラムの成功した組み合わせが、Henderson Travelの利益を押し上げました。"},
  {id:1508,q:"Last year, Nordic Light Publishers ——– a new location in Chicago for its headquarters.",options:["to choose","chosen","chose","choice"],answer:2,type:"<strong>動詞問題</strong>",explanation:"問題文の中で空所以外に動詞（述語動詞）がありません。したがって、空所には述語動詞が入ることがわかります。文頭にLast year（昨年）という過去を表す副詞句があるため、過去形が必要です。選択肢の中で過去形は(C) chose（chooseの過去形）です。",translation:"昨年、Nordic Light Publishersは本社のためにシカゴの新しい場所を選びました。"},
  {id:1509,q:"The new advertising campaign received ——– support from both community leaders and local government officials.",options:["broadness","broaden","broad","broadly"],answer:2,type:"<strong>品詞問題</strong>",explanation:"空所の後ろは名詞support（支援）が続きます。したがって、空所には名詞supportを修飾する形容詞が入ります。選択肢の中で形容詞は(C) broad（幅広い）のみです。",translation:"新しい広告キャンペーンは、地域のリーダーと地方政府関係者の両方から幅広い支援を受けました。"},
  {id:1510,q:"The festival at Brighton Park runs daily ——– morning until late evening.",options:["from","during","of","by"],answer:0,type:"<strong>語彙問題</strong>",explanation:"空所の前はruns daily（毎日開催される）、空所の後ろはmorning until late evening（朝から夜遅くまで）が続きます。「from ～ until &#8230;」（～から&#8230;まで）の熟語表現から、(A) from（～から）を選びます。",translation:"Brighton Parkのフェスティバルは、毎日朝から夜遅くまで開催されます。"},
  {id:1511,q:"To expand its product line, Brightvale Foods ——– additional packaging machines next quarter.",options:["will be ordering","had been ordered","ordering","to order"],answer:0,type:"<strong>動詞問題</strong>",explanation:"問題文の中で空所以外に動詞（述語動詞）がありません。したがって、空所には述語動詞が入ることがわかります。文末にnext quarter（来四半期）という未来を表す副詞句があるため、未来時制が必要です。選択肢の中で未来時制は(A) will be ordering（未来進行形）のみです。また、主語のBrightvale Foods（三人称単数）が「包装機械を注文する」という能動的な行為を表すため、(A) will be ordering が適切です。",translation:"製品ラインを拡大するため、Brightvale Foodsは来四半期に追加の包装機械を注文する予定です。"},
  {id:1512,q:"Invoices should be processed ——– upon arrival at the accounting office to maintain accurate company records.",options:["promptly","promptness","prompt","more prompt"],answer:0,type:"<strong>品詞問題</strong>",explanation:"空所は動詞be processed（処理される）を修飾する位置にあります。動詞を修飾するのは副詞なので、選択肢の中で副詞は(A) promptly（迅速に）のみです。",translation:"請求書は、正確な会社記録を維持するため、経理部門到着時に迅速に処理されるべきです。"},
  {id:1513,q:"The marketing campaign prepared by Ms. Chen will be launched ——– the budget allocation is finalized.",options:["besides","moreover","once","even"],answer:2,type:"<strong>接続詞・前置詞・副詞問題</strong>",explanation:"空所の前はThe marketing campaign prepared by Ms. Chen will be launched（Chenさんによって準備されたマーケティングキャンペーンは開始されます）で主語+動詞、後ろはthe budget allocation is finalized（予算配分が確定される）で主語+動詞です。したがって、上の２のパターンで空所には接続詞が入ります。選択肢の中で接続詞は(C) once（～すると、～したら）のみで、「予算配分が確定されたらキャンペーンを開始する」という時系列が自然です。",translation:"Chenさんによって準備されたマーケティングキャンペーンは、予算配分が確定されたら開始されます。"},
  {id:1514,q:"Ms. Carter and Mr. Lewis were impressed with the detailed proposal, and ——– agreed to expand into South America.",options:["one","many","few","both"],answer:3,type:"<strong>代名詞・数量代名詞問題</strong>",explanation:"主語がMs. Carter and Mr. Lewis（2人）で、andで結ばれた文の後半で「～が合意した」という内容です。2人が合意したという文脈から、(D) both（両方とも）が適切です。",translation:"Ms. CarterとMr. Lewisは詳細な提案に感銘を受け、両方とも南米への拡大に合意しました。"},
  {id:1515,q:"The HR department at Oakridge National Bank will update the ——– of each application within two weeks.",options:["status","agenda","reason","intent"],answer:0,type:"<strong>語彙問題</strong>",explanation:"空所の前はupdate the（～を更新する）、後ろはof each application（各申請の～）が続きます。「人事部が各申請の状況を更新する」とすると意味が通るので、(A) status（状況、地位）を選びます。",translation:"Oakridge National Bankの人事部は、2週間以内に各申請の状況を更新します。"},
  {id:1516,q:"The management team at Stonehill Palace Hotel decided to place brochures ——– in lobby areas with heavy guest traffic.",options:["strategically","strategic","strategize","strategy"],answer:0,type:"<strong>品詞問題</strong>",explanation:"空所は動詞place（配置する）と目的語brochures（パンフレット）の後にあり、場所を表すin lobby areas（ロビーエリアに）の前に位置しています。「パンフレットを戦略的にロビーエリアに配置する」という文脈で、空所には動詞placeを修飾する副詞が入ると考えられます。選択肢の中で副詞は(A) strategically（戦略的に）です。",translation:"Stonehill Palace Hotelの経営チームは、客の往来が多いロビーエリアにパンフレットを戦略的に配置することを決めました。"},
  {id:1517,q:"AIZ Equipment Services supplied all the equipment necessary ——– the annual trade exhibition downtown.",options:["into","for","against","near"],answer:1,type:"<strong>語彙問題</strong>",explanation:"AIZ Equipment Services社が「すべての機器」（all the equipment）を供給したという文脈で、空所の前はnecessary（必要な）という形容詞、後ろはthe annual trade exhibition（年次貿易展示会）が続きます。「年次貿易展示会のために必要なすべての機器」という意味になるため、目的を表す前置詞(B) for（～のために）が適切です。",translation:"AIZ Equipment Servicesは、市街地中心部の年次貿易展示会のために必要なすべての機器を供給しました。"},
  {id:1518,q:"Attendees can choose to join the conference in Tokyo ——– participate via live stream provided by Nova Events.",options:["but","so","or","except"],answer:2,type:"語彙問題",explanation:"空所の前はjoin the conference in Tokyo（東京で会議に参加する）、後ろはparticipate via live stream（ライブストリーム経由で参加する）という2つの選択肢が示されています。「選択できる」という文脈から、選択を表す接続詞(C) or（または）が適切です。",translation:"参加者は、東京で会議に参加するか、Nova Eventsが提供するライブストリーム経由で参加するかを選択できます。"},
  {id:1519,q:"The CEO of Marston Foods decided ——– to postpone the product launch until safety tests were completed.",options:["wisely","widely","entirely","considerably"],answer:0,type:"<strong>語彙問題</strong>",explanation:"空所は動詞decided（決定した）を修飾する副詞の位置にあります。「安全テストが完了するまで製品発売を延期する」という決定について、その決定の仕方を表現する副詞として(A) wisely（賢明に）が適切です。",translation:"Marston FoodsのCEOは、安全テストが完了するまで製品発売を延期することを賢明に決定しました。"},
  {id:1520,q:"——– motivated the employees was the promise of performance bonuses at Yadav Technologies.",options:["That","This","Who","What"],answer:3,type:"関係代名詞・代名詞問題",explanation:"この文は「○○ was the promise&#8230;」という構造でwasが動詞（述語動詞）と考えられ、空所から「motivated the employees」までが主語部分になります。「従業員をやる気にさせたもの」という意味で、関係代名詞what（～するもの）が適切です。Whatは「the thing which(that)」の意味で主語として機能します。",translation:"従業員をやる気にさせたものは、Yadav Technologiesでの業績ボーナスの約束でした。"},
  {id:1521,q:"Kato Financial Group is fully ——– to offering innovative solutions that meet client needs.",options:["accepted","reminded","required","committed"],answer:3,type:"<strong>語彙問題</strong>",explanation:"空所の後ろはto offering&#8230;（革新的なソリューションを提供することに）が続きます。「be committed to ～ing」は「～することに専念している」という慣用表現で、ビジネス文脈で企業の姿勢を表すのに適切です。したがって(D) committed が正解です。",translation:"Kato Financial Groupは、クライアントのニーズに応える革新的なソリューションの提供に完全に専念しています。"},
  {id:1522,q:"Please ensure that the quarterly report reaches Harrison Textiles ——– noon tomorrow.",options:["by","in","of","as"],answer:0,type:"<strong>語彙問題</strong>",explanation:"空所の後ろはnoon tomorrow（明日の正午）という時刻が続きます。「四半期報告書が明日の正午までに届く」という期限を表す文脈から、期限を示す前置詞(A) by（～までに）が適切です。",translation:"四半期報告書が明日の正午までにHarrison Textilesに届くことを確実にしてください。"},
  {id:1523,q:"Despite ——– unexpected cost increases, Henderson Hotels plans to open two new properties this year.",options:["have been experiencing","having experienced","will experience","has experienced"],answer:1,type:"<strong>動詞問題</strong>",explanation:"空所の前は前置詞Despite（～にもかかわらず）があります。前置詞の後には名詞または動名詞が必要です。選択肢の中で動名詞の形は(B) having experienced（経験したこと）のみです。また、「予期しないコスト増加を経験したにもかかわらず」という意味で文脈にも合います。",translation:"予期しないコスト増加を経験したにもかかわらず、Henderson Hotelsは今年2つの新しい物件をオープンする予定です。"},
  {id:1524,q:"The director of Murai Arts Center was deeply ——– by the positive feedback from visitors.",options:["impressive","impressed","impressing","impress"],answer:1,type:"<strong>品詞問題</strong>",explanation:"空所の前はbe動詞wasと副詞deeply（深く）、後ろは前置詞by（～によって）が続きます。この構造から、be動詞+副詞+過去分詞（または形容詞）+by～という受動態の形になります。「館長が来館者からの好意的なフィードバックによって深く感銘を受けた」という意味で、(B) impressed（感銘を受けた）が適切です。",translation:"Murai Arts Centerの館長は、来館者からの好意的なフィードバックに深く感銘を受けました。"},
  {id:1525,q:"——– Mr. Owens focuses on overseas sales, Ms. Patel is responsible for domestic clients at Nexon Trading.",options:["While","Despite","Initially","Altogether"],answer:0,type:"<strong>接続詞・前置詞・副詞問題</strong>",explanation:"空所の後ろはMr. Owens focuses on（Owensさんは～に専念している）という主語+動詞の形です。カンマ以降はMs. Patel is responsible for（Patelさんは～に責任がある）で主語+動詞の形です。これは、上の１のパターンに該当し、空所には接続詞が入ることがわかります。選択肢の中で接続詞は(A) While（～する一方で）のみでこれを選びます。",translation:"Owensさんが海外営業に専念する一方で、PatelさんはNexon Tradingで国内クライアントを担当しています。"},
  {id:1526,q:"The redesigned warehouse layout at Shizuoka Freight Services allows workers to move goods more ——–.",options:["efficiently","recently","totally","shortly"],answer:0,type:"<strong>語彙問題</strong>",explanation:"空所は動詞move（移動する）を修飾する副詞の位置にあり、比較級のmore（より）が前に付いています。「再設計された倉庫レイアウトによって労働者が商品をより○○に移動できる」という文脈で、倉庫レイアウトの改善効果として最も適切なのは(A) efficiently（効率的に）です。",translation:"Shizuoka Freight Servicesの再設計された倉庫レイアウトにより、労働者は商品をより効率的に移動させることができます。"},
  {id:1527,q:"The city of Takamori announced that the ——– of the central library will require additional funding.",options:["renovate","renovates","renovated","renovation"],answer:3,type:"<strong>品詞問題</strong>",explanation:"空所の前は定冠詞the、後ろは前置詞of（～の）です。「the ～ of the central library」の構造で、「中央図書館の～」という意味になります。定冠詞theの後ろで前置詞ofの前には名詞が必要で、選択肢の中で名詞は(D) renovation（改装）です。",translation:"Takamori市は、中央図書館の改装には追加の資金が必要になると発表しました。"},
  {id:1528,q:"The cost of living in Sapporo increased ——– compared with the previous year.",options:["slighter","slight","slightly","slightest"],answer:2,type:"<strong>品詞問題</strong>",explanation:"空所は動詞increased（増加した：自動詞）を修飾する副詞の位置にあります。動詞を修飾するのは副詞なので、選択肢の中で副詞は(C) slightly（わずかに）です。",translation:"札幌の生活費は前年と比較してわずかに増加しました。"},
  {id:1529,q:"Please ——– the accounting department at Riverbank Corporation of any changes to billing addresses.",options:["speak","inform","inquire","respond"],answer:1,type:"<strong>語彙問題</strong>",explanation:"空所の後ろは「the accounting department &#8230; of any changes」という構造です。「○○ A of B」の形で「AにBについて知らせる」という意味になるのは(B) inform（知らせる）です。「inform A of B」は「AにBについて知らせる」という慣用表現です。",translation:"請求先住所の変更についてはRiverbank Corporationの経理部門にお知らせください。"},
  {id:1530,q:"To avoid losing investors, Rowes Investment Group must issue a statement ——–.",options:["urgencies","urgent","urgently","urgency"],answer:2,type:"<strong>品詞問題</strong>",explanation:"空所の前は、動詞issue（発表する：他動詞）と目的語a statement（声明）が続きます。空所には動詞issue（発表する）を修飾する副詞が適切です。選択肢の中で副詞は(C) urgently（緊急に）です。",translation:"投資家を失うことを避けるため、Rowes Investment Groupは緊急に声明を発表しなければなりません。"},
  {id:1531,q:"You must keep the order ——– to track your purchase and verify details with customer support if necessary.",options:["confirm","confirmation","confirmed","confirming"],answer:1,type:"<strong>品詞問題</strong>",explanation:"空所の前は the order（注文）、後ろは to track（追跡するために）が続きます。まず、空所の後ろから名詞 order を修飾する可能性を考えてみましょう。(C) confirmed（確認された）や (D) confirming（確認している）は過去分詞や現在分詞として order を後ろから修飾することができます。",translation:"購入を追跡し、必要に応じてカスタマーサポートで詳細を確認するために、注文確認書を保管しておく必要があります。"},
  {id:1532,q:"After giving ——– presentations abroad, Ms. Rivera became a respected speaker for Atlantic Business Forum.",options:["sizable","countless","durable","much"],answer:1,type:"<strong>語彙問題</strong>",explanation:"空所の後ろはpresentations（複数の発表）が続きます。「海外で○○の発表をした後、尊敬される講演者になった」という文脈で、多数の発表を経て評判を築いたという意味から、(B) countless（数え切れないほどの）が最も適切です。",translation:"海外で数え切れないほどの発表を行った後、RiveraさんはAtlantic Business Forumの尊敬される講演者になりました。"},
  {id:1533,q:"By expanding operations into Southeast Asia, Takemoto Logistics aims to strengthen both its supply chain network ——– its customer service capabilities.",options:["but","nor","or","and"],answer:3,type:"語彙問題",explanation:"空所の前はboth its supply chain network（サプライチェーンネットワークの両方）、後ろはits customer service capabilities（カスタマーサービス能力）が続きます。「both A &#8230; B」の構造で2つの要素を並列に示すため、(D) and が必要です。「both A and B」は「AとBの両方」という意味の慣用表現です。",translation:"東南アジアへの事業拡大により、Takemoto Logisticsはサプライチェーンネットワークとカスタマーサービス能力の両方を強化することを目指しています。"},
  {id:1534,q:"The engineers at Podell Solutions ——– several challenges during the testing phase of the new system.",options:["concluded","accomplished","encountered","earned"],answer:2,type:"<strong>語彙問題</strong>",explanation:"空所の後ろはseveral challenges（いくつかの課題）が続きます。「新システムのテスト段階でエンジニアがいくつかの課題を○○した」という文脈で、テスト段階で困難に直面するという意味から、(C) encountered（遭遇した、直面した）が最も適切です。",translation:"Podell Solutionsのエンジニアたちは、新システムのテスト段階でいくつかの課題に直面しました。"},
  {id:1535,q:"The staff at Tabor Cultural Foundation worked ——– to organize the annual international arts festival.",options:["severely","hardly","tirelessly","densely"],answer:2,type:"語彙問題",explanation:"空所は動詞worked（働いた）を修飾する副詞の位置にあります。「年次国際芸術祭を企画するためにスタッフが○○働いた」という文脈で、大きなイベントの企画という困難な仕事に対する献身的な働きを表すため、(C) tirelessly（疲れを知らずに、たゆまず）が最も適切です。",translation:"Tabor Cultural Foundationのスタッフは、年次国際芸術祭を企画するためにたゆまず働きました。"},
  {id:1536,q:"——– Sawayama Foods is a small company, it exports its products to more than ten countries.",options:["Although","During","Unless","Before"],answer:0,type:"<strong>接続詞・前置詞問題</strong>",explanation:"空所の後ろは Sawayama Foods is a small company（澤山フーズは小さな会社である）という主語+動詞の文で、カンマ以降はit exports（それは輸出する）で同じよう主語+動詞の文です。これは、上の１のパターンにに該当し、空所には接続詞が入ります。選択肢の中で接続詞は (A) Although（～だけれども）、(C) Unless（～でなければ）、(D) Before（～する前に）の3つがあります。",translation:"Sawayama Foodsは小さな会社ですが、10か国以上に製品を輸出しています。"},
  {id:1537,q:"International partnerships ——– more than half to the expansion of market share in Southeast Asia.",options:["contributed","gave","sent","applied"],answer:0,type:"<strong>語彙問題</strong>",explanation:"空所の後ろは more than half to the expansion（拡大に半分以上を）が続きます。「国際的なパートナーシップが東南アジアでの市場シェア拡大に半分以上○○した」という文脈で、貢献や寄与を表す (A) contributed（貢献した、寄与した）が最も適切です。",translation:"国際的なパートナーシップは、東南アジアでの市場シェア拡大に半分以上貢献しました。"},
  {id:1538,q:"Harrison Technologies is working to ——– innovative methods of reducing production costs.",options:["subtract","count","participate","devise"],answer:3,type:"<strong>語彙問題</strong>",explanation:"空所の後ろは innovative methods（革新的な方法）で、その後に of reducing production costs（生産コストを削減する）があります。「革新的な方法を考案する、開発する」という文脈で (D) devise（考案する、工夫する）が適切です。",translation:"Harrison Technologiesは、生産コストを削減する革新的な方法を考案するために取り組んでいます。"},
  {id:1539,q:"The auditorium at Harborstone University has the ——– to hold both students and faculty comfortably.",options:["demonstration","compliance","aptitude","capacity"],answer:3,type:"<strong>語彙問題</strong>",explanation:"空所の後ろはto hold both students and faculty comfortably（学生と教職員の両方を快適に収容する）という不定詞が続きます。「講堂が学生と教職員を収容する○○を持っている」という文脈から、(D) capacity（収容能力、能力）が最も適切です。",translation:"Harborstone大学の講堂は、学生と教職員の両方を快適に収容する能力があります。"},
  {id:1540,q:"The city of Shirahamano has agreed ——– with foreign organizations on cultural exchange programs.",options:["will partner","to partner","be partnering","is partnered"],answer:1,type:"<strong>動詞問題</strong>",explanation:"空所の前にはhas agreed（同意した）があります。動詞agree（同意する）の後ろにはto不定詞が続く「agree to do」（～することに同意する）の形を取るので、(B) to partner（提携すること）を選びます。",translation:"Shirahamano市は、文化交流プログラムについて外国の組織と提携することに同意しました。"},
  {id:1541,q:"The occupancy ——– at Greenwood Hotel reached 95 percent during the holiday season.",options:["page","rate","distance","period"],answer:1,type:"<strong>語彙問題</strong>",explanation:"空所の前は occupancy（占有率、稼働率）、後ろには reached 95 percent（95パーセントに達した）があります。ホテルの文脈で「occupancy rate」（客室稼働率）は一般的な表現です。したがって (B) rate（率、割合）が適切です。",translation:"Greenwood Hotelの客室稼働率は、ホリデーシーズン中に95パーセントに達しました。"},
  {id:1542,q:"The employees continued working ——– the IT team fixed the server at Brightvale Technologies.",options:["while","whether","if","but"],answer:0,type:"<strong>語彙問題</strong>",explanation:"空所の前は The employees continued working（従業員は働き続けた）、後ろは the IT team fixed the server（ITチームがサーバーを修理した）という完全な文が続きます。「従業員はITチームがサーバーを修理している間、働き続けた」とすると意味が通るので、(A) while（～している間に）を選びます。",translation:"Brightvale TechnologiesのITチームがサーバーを修理している間、従業員は働き続けました。"},
  {id:1543,q:"——– of the board members at Harrison Chemicals disagreed with the proposed merger.",options:["Several","Whom","Someone","Everybody"],answer:0,type:"<strong>代名詞・関係詞問題</strong>",explanation:"空所の後ろは「of the board members」（理事会メンバーの）で、動詞は「disagreed」（反対した）です。「of + 複数名詞」の構文で使えるものを選ぶ必要があります。",translation:"Harrison Chemicalsの取締役会メンバーの何人かは、提案された合併に反対しました。"},
  {id:1544,q:"The IT system at Nagayama Port Authority has been upgraded ——– to ensure minimal disruption.",options:["incremental","increments","increment","incrementally"],answer:3,type:"<strong>品詞問題</strong>",explanation:"空所の前は動詞の受動態 has been upgraded（アップグレードされた）、後ろは to ensure（確実にするために）が続きます。動詞を修飾するのは副詞なので、(D) incrementally（段階的に）が適切です。",translation:"Nagayama港湾局のITシステムは、混乱を最小限に抑えるために段階的にアップグレードされました。"},
  {id:1545,q:"——– is given to customers who have purchased premium support packages from Orangedale Software.",options:["Rank","Duty","Priority","Relevance"],answer:2,type:"<strong>語彙問題</strong>",explanation:"空所の後ろは is given to customers（顧客に与えられる）で、その後に who have purchased premium support packages（プレミアムサポートパッケージを購入した）があります。プレミアムサポートを購入した顧客に「優先権」が与えられると考えるのが適切なので、(C) Priority（優先権、優先順位）を選びます。",translation:"Orangedale Softwareからプレミアムサポートパッケージを購入した顧客には優先権が与えられます。"},
  {id:1546,q:"Economist Amir Khan wrote a highly ——– article concerning new international tax regulations last month.",options:["controversy","controversial","controversially","controversies"],answer:1,type:"<strong>品詞問題</strong>",explanation:"空所の前は冠詞theと副詞 highly（非常に）、後ろは名詞 article（記事）です。したがって、空所には名詞 article を修飾する形容詞が入ります。選択肢の中で形容詞は (B) controversial（物議を醸す、論争の的となる）でこれを選びます。",translation:"経済学者のAmir Khanさんは、先月、新しい国際税制に関する非常に物議を醸す記事を書きました。"},
  {id:1547,q:"Newly manufactured products were ——– to Mr. Yamamoto in Tokyo earlier than expected.",options:["prevented","trusted","delivered","responded"],answer:2,type:"<strong>語彙問題</strong>",explanation:"空所の前は products were（製品が）で受動態、後ろは to Mr. Yamamoto（Yamamotoさんに）があります。「製品がYamamotoさんに配達された」という文脈で (C) delivered（配達された）が適切です。",translation:"新しく製造された製品は、予想より早く東京のYamamotoさんに配達されました。"},
  {id:1548,q:"Six months have passed ——– Mr. Johnson relocated to Yokohama to lead the branch office.",options:["since","between","afterward","from"],answer:0,type:"<strong>接続詞・前置詞・副詞問題</strong>",explanation:"空所の前はSix months have passedで主語＋動詞の形、後ろは Mr. Johnson relocated で主語+動詞の形です。",translation:"Johnsonさんが支社を率いるために京都に移転してから、6か月が経過しました。"},
  {id:1549,q:"Dr. Singh noted a ——– improvement in patient satisfaction after the new system launch.",options:["dramatic","dramatically","drama","dramatize"],answer:0,type:"<strong>品詞問題</strong>",explanation:"空所の前は冠詞 a、後ろは名詞 improvement（改善）です。したがって、空所には名詞 improvement を修飾する形容詞が入ります。選択肢の中で形容詞は (A) dramatic（劇的な、著しい）でこれを選びます。",translation:"Singh博士は、新システムの導入後、患者満足度に劇的な改善があったと述べました。"},
  {id:1550,q:"The new printer installed at Ms. Lee’s office is supplied ——– advanced security features.",options:["with","to","of","at"],answer:0,type:"<strong>語彙問題</strong>",explanation:"動詞 supply（供給する、装備する）は supply A with B（AにBを装備する、供給する）の形をとります。したがって、(A) with が適切です。",translation:"リーさんのオフィスに設置された新しいプリンターには、高度なセキュリティ機能が装備されています。"},
  {id:1551,q:"Pianist Ms. Nakamura ——– her new composition at the Sasayama Cultural Hall last weekend.",options:["performed","performing","will perform","performs"],answer:0,type:"<strong>動詞問題</strong>",explanation:"文末に last weekend（先週末）という過去を表す時間表現があります。したがって、空所には過去時制の (A) performed（演奏した）が適切です。",translation:"ピアニストのNakamuraさんは、先週末にSasayama Cultural Hallで新作曲を演奏しました。"},
  {id:1552,q:"The proposal to ——– Mr. Suzuki objected was approved by the Tokyo board.",options:["what","which","who","whose"],answer:1,type:"<strong>関係代名詞問題</strong>",explanation:"先行詞は The proposal（提案）で物を表します。動詞 object は object to ～（～に反対する）の形で前置詞 to を伴うため、空所には前置詞の目的語となる関係代名詞が必要です。物が先行詞で前置詞の目的語になる関係代名詞は (B) which です。",translation:"Suzukiさんが反対した提案は、東京の理事会によって承認されました。"},
  {id:1553,q:"The marketing campaign for Silverline Airlines has ——– boosted ticket sales in several major cities.",options:["utterly","significantly","countlessly","extremely"],answer:1,type:"<strong>語彙問題</strong>",explanation:"空所の前後は has boosted ticket sales（チケット販売を押し上げた）です。マーケティングキャンペーンの効果を表現する文脈で、「大幅に、著しく」を意味する (B) significantly が最も適切です。",translation:"Silverline Airlinesのマーケティングキャンペーンは、いくつかの主要都市でチケット販売を大幅に押し上げました。"},
  {id:1554,q:"Mr. Khan advised the interns at Riverfield Library to be ——– when reviewing confidential documents.",options:["cautious","cautions","cautiously","caution"],answer:0,type:"<strong>品詞問題</strong>",explanation:"空所の前は be動詞で、後ろには when reviewing（レビューする時）があります。be動詞の後には通常形容詞が来るので、(A) cautious（注意深い、慎重な）が適切です。",translation:"Khanさんは、Riverfield Libraryのインターンに、機密文書をレビューする際は慎重になるよう助言しました。"},
  {id:1555,q:"Engineers at Brenton Metal Industries reported that their research ——– will be upgraded next year.",options:["selections","facilities","performances","revisions"],answer:1,type:"<strong>語彙問題</strong>",explanation:"空所の前は research（研究）、後ろは will be upgraded（アップグレードされる予定）です。研究に関連してアップグレードされるものとして「研究設備」が最も適切なので、(B) facilities（設備、施設）を選びます。",translation:"Brenton Metal Industriesの技術者は、彼らの研究設備が来年アップグレードされる予定だと報告しました。"},
  {id:1556,q:"Ms. Alvarez is currently ——– with Oliver Healthcare Systems, where she supervises the research team.",options:["given","affiliated","crafted","shown"],answer:1,type:"<strong>語彙問題</strong>",explanation:"空所の前は is currently（現在）、後ろは with Oliver Healthcare Systems（Oliver Healthcare Systemsと）です。「～と提携している、関係している」という意味で (B) affiliated（提携している、関係している）が適切です。",translation:"Alvarezさんは現在Oliver Healthcare Systemsと関係しており、そこで研究チームを監督しています。"},
  {id:1557,q:"Mr. Rahman believes the original signed contract is still stored ——– in the archives downstairs.",options:["removed","especially","locating","somewhere"],answer:3,type:"<strong>語彙問題</strong>",explanation:"空所の前は is still stored（まだ保存されている）、後ろは in the archives downstairs（地下のアーカイブに）です。「どこかに保存されている」という文脈で副詞の (D) somewhere（どこかに）が適切です。",translation:"Rahmanさんは、原本の署名済み契約書が地下のアーカイブのどこかにまだ保存されていると信じています。"},
  {id:1558,q:"The marketing team at Rahman Fashion Group conducted an ——– of recent consumer surveys.",options:["analysis","analytical","analyze","analytically"],answer:0,type:"<strong>品詞問題</strong>",explanation:"空所の前は冠詞 an、後ろは前置詞 of があります。したがって、空所には名詞が入ります。選択肢の中で名詞は (A) analysis（分析）でこれを選びます。",translation:"Rahman Fashion Group pのマーケティングチームは、最近の消費者調査の分析を行いました。"},
  {id:1559,q:"Conference participants should check ——– registration badges at the entrance desk upon arrival today.",options:["they","their","them","themselves"],answer:1,type:"<strong>代名詞問題</strong>",explanation:"空所の前が動詞「check」（確認する）、後ろは名詞「registration badges」（登録バッジ）です。したがって空所には名詞「registration badges」を修飾する所有格が必要です。選択肢の中で所有格は(B) their が適切です。",translation:"会議参加者は、本日到着時に入口デスクで自分の登録バッジを確認する必要があります。"},
  {id:1560,q:"Mr. Kim asked all employees to ——– their company ID cards at the reception desk daily.",options:["consider","leave","make","write"],answer:1,type:"<strong>語彙問題</strong>",explanation:"空所の後ろは their company ID cards at the reception desk daily（会社のIDカードを受付デスクで毎日）です。「IDカードを受付デスクに置く、預ける」という文脈で (B) leave（置く、預ける）が適切です。",translation:"Kimさんは、全従業員に会社のIDカードを毎日受付デスクに預けるよう依頼しました。"},
  {id:1561,q:"The conference organizer requested that all presentation slides be submitted forty-eight hours ——– the opening session.",options:["between","before","up","for"],answer:1,type:"<strong>語彙問題</strong>",explanation:"空所の前は forty-eight hours（48時間）、後ろは the opening session（開会セッション）です。「開会セッションの48時間前に提出される」という意味が適切なので、(B) before（～の前に）を選びます。",translation:"会議主催者は、すべてのプレゼンテーションスライドを開会セッションの48時間前に提出するよう要求しました。"},
  {id:1562,q:"The committee members ——– admitted that the delay was caused by internal miscommunication, not outside factors.",options:["ourselves","itself","themselves","yourself"],answer:2,type:"<strong>代名詞問題</strong>",explanation:"主語はThe committee members（委員会メンバーたち）で複数形です。この文では再帰代名詞が強調用法として使われており、「委員会メンバーたち自身が認めた」という意味を強調しています。再帰代名詞は主語と同じ人称・数にする必要があります。複数形の主語に対応する再帰代名詞は(C) themselves（彼ら自身）です。",translation:"委員会メンバーたちは、遅れが外部要因ではなく内部のコミュニケーション不足によって引き起こされたことを自ら認めました。"},
  {id:1563,q:"During the quarterly review, Ms. Helena Torres emphasized the importance of ——– action on safety concerns.",options:["prompt","promptness","prompts","promptly"],answer:0,type:"<strong>品詞問題</strong>",explanation:"空所の後ろは名詞 action（行動）です。したがって、空所には名詞 action を修飾する形容詞が入ります。選択肢の中で形容詞は (A) prompt（迅速な、素早い）でこれを選びます。",translation:"四半期レビューの間、Helena Torres さんは安全上の懸念に対する迅速な行動の重要性を強調しました。"},
  {id:1564,q:"The marketing team used detailed infographics to help executives ——– potential customer growth trends.",options:["appear","resemble","visualize","express"],answer:2,type:"<strong>語彙問題</strong>",explanation:"空所の前は help executives（役員を助ける）、後ろは potential customer growth trends（潜在的な顧客成長トレンド）です。「詳細なインフォグラフィックを使って役員が顧客成長トレンドを視覚化することを助ける」という文脈で、(C) visualize（視覚化する、イメージする）が適切です。",translation:"マーケティングチームは、役員が潜在的な顧客成長トレンドを視覚化できるよう、詳細なインフォグラフィックを使用しました。"},
  {id:1565,q:"To apply for relocation benefits, employees must submit a ——– application through Human Resources.",options:["formalize","formally","formality","formal"],answer:3,type:"<strong>品詞問題</strong>",explanation:"空所の前は冠詞 a、後ろは名詞 application（申請書）です。したがって、空所には名詞 application を修飾する形容詞が入ります。選択肢の中で形容詞は (D) formal（正式な）でこれを選びます。",translation:"転勤手当を申請するために、従業員は人事部を通じて正式な申請書を提出する必要があります。"},
  {id:1566,q:"The consulting firm led by Marcus Klein specializes in finding ——– investment opportunities in emerging Asian markets.",options:["arbitrary","spacious","absent","lucrative"],answer:3,type:"<strong>語彙問題</strong>",explanation:"空所の前はfinding（見つけること）、後ろはinvestment opportunities（投資機会）で、文脈は「新興アジア市場での投資機会を見つけることを専門とする」です。コンサルティング会社が投資機会を探すのは、利益を生む機会を見つけると考えるのが適切なので、(D) lucrative（利益を生む、儲かる）が適切です。",translation:"Marcus Kleinさんが率いるコンサルティング会社は、新興アジア市場で利益を生む投資機会を見つけることを専門としています。"},
  {id:1567,q:"When Ms. Delgado entered the showroom, she ——– the promotional posters had already been removed.",options:["notices","noticed","noticing","noticeable"],answer:1,type:"<strong>品詞または動詞問題</strong>",explanation:"この文は「When + 過去形, 主語 + 動詞」の構造で、When節のenteredが過去形なので、主節の動詞も過去形にする必要があります。また、空所の後ろにはthe promotional posters had already been removedという名詞節（that節の省略）が続くので、空所には動詞が必要です。したがって(B) noticed（気づいた）が正解です。",translation:"Delgadoさんがショールームに入ったとき、彼女は宣伝ポスターがすでに撤去されていることに気づきました。"},
  {id:1568,q:"Mr. Rivera will ——– serve as acting director until a permanent replacement is appointed by the committee.",options:["temporarily","comparatively","nearly","highly"],answer:0,type:"<strong>語彙問題</strong>",explanation:"空所の前後を見ると、will serve（務める）という動詞とuntil a permanent replacement is appointed（恒久的な後任が任命されるまで）という文脈があります。「acting director（代理取締役）」として務めることと「恒久的な後任が任命されるまで」という期間限定の状況から、(A) temporarily（一時的に）が適切です。",translation:"Riveraさんは、委員会によって恒久的な後任が任命されるまで、一時的に代理取締役を務める予定です。"},
  {id:1569,q:"Professor Ahmed’s research report ——– extensive data on consumer behavior across multiple global retail markets.",options:["contain","containing","is contained","contains"],answer:3,type:"<strong>動詞問題</strong>",explanation:"主語はProfessor Ahmed’s research report（Ahmed教授の研究報告書）で単数形です。この文には動詞がないので、空所には動詞が入ると考えられます。空所の後ろにあるextensive data（広範囲なデータ）が目的語を考えられます。「研究報告書がデータを含む」という能動的な意味なので、主語が単数形に対応する(D) contains（含む）が正解です。",translation:"Ahmed教授の研究報告書は、複数の世界的小売市場における消費者行動に関する広範囲なデータを含んでいます。"},
  {id:1570,q:"The CEO announced that the company would invest heavily in renewable energy projects over the next ——– years.",options:["some","little","few","much"],answer:2,type:"<strong>数量形容詞問題</strong>",explanation:"空所の後ろはyears（年）という可算名詞の複数形です。可算名詞の複数形と組み合わせることができるのは(A) some（いくつかの）と(C) few（数個の）です。ここでは「over the next few years（今後数年間にわたって）」という慣用表現として使われており、(C) few（数個の）が正解です。この場合のfewは否定的な意味ではなく、「数個の、いくつかの」という意味で使われています。",translation:"CEOは、会社が今後数年間にわたって再生可能エネルギープロジェクトに大きく投資すると発表しました。"},
  {id:1571,q:"The annual budget proposal will not be approved ——– the finance committee conducts a complete cost analysis.",options:["although","until","now that","since"],answer:1,type:"<strong>語彙問題</strong>",explanation:"文脈を見ると、空所の前は「年次予算案は承認されない」、空所の後ろが「財務委員会が完全なコスト分析を実施する」という意味になります。「～するまでは承認されない」という意味で(B) until（～まで）が適切です。",translation:"年次予算案は、財務委員会が完全なコスト分析を実施するまでは承認されません。"},
  {id:1572,q:"The new HR system allows staff to request vacation days more ——– than the previous manual process permitted.",options:["efficiency","efficient","efficiently","efficiencies"],answer:2,type:"<strong>品詞問題</strong>",explanation:"空所の前はmore、後ろはthan で比較級の構造になっています。また、動詞request（要求する）を修飾する語が必要です。動詞を修飾するのは副詞なので、(C) efficiently（効率的に）が正解です。",translation:"新しいHRシステムにより、スタッフは以前の手動プロセスよりも効率的に有給休暇を申請できます。"},
  {id:1573,q:"The government signed an agreement with the university ——– laboratories specialize in renewable energy development.",options:["whose","how","wherever","what"],answer:0,type:"<strong>関係詞問題</strong>",explanation:"空所の前はthe university（大学）、空所の後ろは名詞と動詞のlaboratories specialize（研究所が専門とする）と続きます。「大学の研究所」という所有関係を表すため、関係代名詞の所有格である(A) whose が適切です。",translation:"政府は、研究所が再生可能エネルギー開発を専門とする大学と協定を結びました。"},
  {id:1574,q:"The renovated hotel lobby was designed to create a welcoming atmosphere ——– both tourists and business travelers.",options:["about","along","for","regarding"],answer:2,type:"<strong>語彙問題</strong>",explanation:"空所の前はa welcoming atmosphere（歓迎する雰囲気）、後ろはboth tourists and business travelers（観光客とビジネス旅行者の両方）です。「～のために雰囲気を作る」という意味で(C) for（～のために）が適切です。",translation:"改装されたホテルのロビーは、観光客とビジネス旅行者の両方に歓迎する雰囲気を作るように設計されました。"},
  {id:1575,q:"Although sales declined slightly in Europe, the company ——– a significant increase in its Asian markets.",options:["reported","reports","reporting","report"],answer:0,type:"<strong>動詞問題</strong>",explanation:"この文はAlthough節の動詞declined（減少した）が過去形なので、主節の動詞も時制を合わせて過去形にする必要があります。また、主語the companyは単数形で、空所の後ろにa significant increase（大幅な増加）という目的語があるので、(A) reported（報告した）が正解です。",translation:"ヨーロッパでの売上は若干減少したが、その会社はアジア市場で大幅な増加を報告しました。"},
  {id:1576,q:"The IT department will perform routine maintenance on all servers late Friday night to ——– downtime on Monday.",options:["minimize","minimized","minimizing","minimizes"],answer:0,type:"<strong>動詞問題</strong>",explanation:"空所の前にto があり、これは目的を表すto不定詞の to です。to不定詞では動詞の原形を使うので、(A) minimize（最小化する）が正解です。",translation:"IT部門は、月曜日のダウンタイムを最小化するために、金曜日の夜遅くにすべてのサーバーの定期メンテナンスを実行します。"},
  {id:1577,q:"When the CEO visited the Tokyo branch, everyone welcomed ——– with great enthusiasm and respect.",options:["he","him","his","himself"],answer:1,type:"<strong>代名詞問題</strong>",explanation:"空所の前は動詞welcomed（歓迎した）、後ろはwith great enthusiasm（大きな熱意で）と続きます。動詞の直後にあるので空所には目的語が入り、目的格の代名詞が必要です。したがって(B) him（彼を）が正解です。",translation:"CEOが東京支店を訪問したとき、みんなは大きな熱意と敬意をもって彼を歓迎しました。"},
  {id:1578,q:"The software upgrade requires minimal ——– from users and can be installed automatically.",options:["effort","energy","attempt","trial"],answer:0,type:"<strong>語彙問題</strong>",explanation:"空所の前はrequires minimal（最小限の～を必要とする）、後ろはfrom users（ユーザーから）で、文の後半にcan be installed automatically（自動的にインストールできる）とあります。ソフトウェアのアップグレードがユーザーから必要とする最小限のものは、(A) effort（努力、手間）が最も適切です。",translation:"このソフトウェアアップグレードは、ユーザーからの最小限の手間を必要とし、自動的にインストールできます。"},
  {id:1579,q:"All employees are required to follow the new safety ——– when entering the laboratory.",options:["regulations","exhibitions","qualifications","invitations"],answer:0,type:"<strong>語彙問題</strong>",explanation:"空所の前はfollow the new safety（新しい安全～に従う）、後ろはwhen entering the laboratory（実験室に入るとき）です。実験室という危険な場所に入る際に従うべき「新しい安全」に関するものは、(A) regulations（規則、規制）が最も適切です。",translation:"すべての従業員は、実験室に入る際に新しい安全規則に従うことが求められています。"},
  {id:1580,q:"The international conference ——– in Geneva next year, attracting participants from more than 40 countries.",options:["holding","will be held","was holding","hold"],answer:1,type:"<strong>動詞問題</strong>",explanation:"主語はThe international conference（国際会議）で、文中にnext year（来年）という未来を表す語があります。また、「会議が開催される」という受動的な意味なので、未来の受動態(B) will be held（開催される予定です）が正解です。",translation:"国際会議は来年ジュネーブで開催される予定で、40カ国以上からの参加者を集めます。"},
  {id:1581,q:"The cafeteria at Brinley Medical Center will remain closed ——– the kitchen equipment is completely repaired.",options:["during","until","since","whenever"],answer:1,type:"<strong>接続詞・前置詞問題</strong>",explanation:"空所の前は will remain closed（閉鎖されたままである）で主語+動詞、空所の後ろは the kitchen equipment is completely repaired で主語+動詞の形になっています。これは上の２のパターンで接続詞が入ることがわかります。",translation:"Brinley Medical Centerのカフェテリアは、キッチン設備が完全に修理されるまで閉鎖されたままです。"},
  {id:1582,q:"The sales manager offered a generous ——– to clients who placed bulk orders.",options:["donation","salary","payment","discount"],answer:3,type:"<strong>語彙問題</strong>",explanation:"空所の前はoffered a generous（寛大な～を提供した）、後ろはto clients who placed bulk orders（大口注文をしたクライアントに）です。営業マネージャーが大口注文をしたクライアントに提供するものは、(D) discount（割引）が適切です。",translation:"営業マネージャーは、大口注文をしたクライアントに寛大な割引を提供しました。"},
  {id:1583,q:"The conference was highly ——–, attracting professionals from various industries and academic backgrounds.",options:["attending","attended","attendance","attendee"],answer:1,type:"<strong>品詞または動詞問題</strong>",explanation:"空所の前はwas highly（非常に～だった）で、この後には形容詞、過去分詞、現在分詞が続きます。「会議が非常に～だった」という受動的な意味から、過去分詞の(B) attended（参加された、出席者の多い）が適切です。highly attendedは「参加者が多い、盛況な」という意味の慣用表現です。",translation:"この会議は非常に盛況で、様々な業界や学歴を持つ専門家を集めました。"},
  {id:1584,q:"Employees must keep their ID badges visible at all times for security ——–.",options:["purposes","purposeful","purposing","purposefully"],answer:0,type:"<strong>品詞問題</strong>",explanation:"空所の前はfor security（セキュリティのため）で、前置詞forの後には名詞が続きます。for security purposes（セキュリティ目的で）は定型表現で、(A) purposes（目的）が正解です。",translation:"従業員は、セキュリティ目的でIDバッジを常に見えるところに保持しなければなりません。"},
  {id:1585,q:"The documents ——– by the accounting department before being forwarded to the external auditor yesterday.",options:["review","reviewing","were reviewed","was reviewing"],answer:2,type:"<strong>動詞問題</strong>",explanation:"主語はThe documents（文書）で動詞がないので空所には動詞（述語動詞）が入ります。文末にyesterday（昨日）があるので過去時制です。また、by the accounting department（会計部門によって）があることから受動態が必要です。したがって、過去の受動態(C) were reviewed（レビューされた）が適切です。",translation:"文書は昨日、外部監査人に転送される前に会計部門によってレビューされました。"},
  {id:1587,q:"The marketing team launched a global ——– to promote the company’s newest smartphone model.",options:["scale","campaign","schedule","retreat"],answer:1,type:"<strong>語彙問題</strong>",explanation:"空所の前はlaunched a global（世界的な～を開始した）、後ろはto promote the company’s newest smartphone model（会社の最新スマートフォンモデルを宣伝するために）です。マーケティングチームが製品を宣伝するために開始するものは、(B) campaign（キャンペーン）が適切です。",translation:"マーケティングチームは、会社の最新スマートフォンモデルを宣伝するために世界的なキャンペーンを開始しました。"},
  {id:1588,q:"The hotel lobby was decorated with ——– artwork created by several well-known local painters.",options:["originality","original","origin","originate"],answer:1,type:"<strong>品詞問題</strong>",explanation:"空所の後ろは名詞artwork（芸術作品）です。名詞を修飾するのは形容詞なので、形容詞の(B) original（オリジナルの、独創的な）が適切です。",translation:"ホテルのロビーは、数人の有名な地元画家によって作られたオリジナルの芸術作品で装飾されていました。"},
  {id:1589,q:"The city government announced a new ——– to improve public transportation services.",options:["initiative","occupation","instrument","reference"],answer:0,type:"<strong>語彙問題</strong>",explanation:"空所の前はannounced a new（新しい～を発表した）、後ろはto improve public transportation services（公共交通サービスを改善するために）です。政府が公共サービス改善のために発表するものは、(A) initiative（取り組み、施策）が最も適切です。",translation:"市役所は、公共交通サービスを改善するための新しい施策を発表しました。"},
  {id:1590,q:"Ms. Laurent’s lecture provided a ——– overview of current trends in international marketing strategies.",options:["broad","broadly","broaden","broadness"],answer:0,type:"<strong>品詞問題</strong>",explanation:"空所の前は冠詞a、後ろは名詞overview（概要）です。したがって、空所には名詞overviewを修飾する形容詞が入ります。選択肢の中で形容詞は(A) broad（幅広い）でこれを選びます。",translation:"Laurentさんの講義は、国際マーケティング戦略の現在の傾向について幅広い概要を提供しました。"},
  {id:1591,q:"The new production line ——– operating efficiently since it was installed three months ago.",options:["has been","have been","having been","will be"],answer:0,type:"<strong>動詞問題</strong>",explanation:"主語はThe new production line（新しい生産ライン）で単数形、空所の後ろにはoperating（稼働している）があり、文中にsince it was installed three months ago（3ヶ月前に設置されて以来）という現在完了の時間表現があります。「過去から現在まで継続している状態」を表す現在完了形が必要で、三人称単数の主語に対応する現在完了進行形の(A) has been が適切です。",translation:"新しい生産ラインは、3ヶ月前に設置されて以来、効率的に稼働し続けています。"},
  {id:1592,q:"After the merger, the company invested heavily in ——– its global distribution network.",options:["expand","expansion","expansive","expanding"],answer:3,type:"<strong>品詞問題</strong>",explanation:"空所の前は前置詞in、後ろは目的語its global distribution network（世界的な流通ネットワーク）があります。前置詞inの後で目的語を取る形は動名詞なので、(D) expanding（拡大すること）が正解です。",translation:"合併後、その会社は世界的な流通ネットワークの拡大に大きく投資しました。"},
  {id:1593,q:"The hotel has earned an excellent ——– for providing outstanding service to international guests.",options:["generation","occupation","reputation","calculation"],answer:2,type:"<strong>語彙問題</strong>",explanation:"空所の前はhas earned an excellent（優れた～を得た）、後ろはfor providing outstanding service（優れたサービスを提供することで）です。ホテルが優れたサービスで得るものは、(C) reputation（評判）が適切です。",translation:"そのホテルは、国際的なゲストに優れたサービスを提供することで素晴らしい評判を得ています。"},
  {id:1594,q:"The proposal received ——– feedback from the board members and is likely to be approved.",options:["favor","favorable","favored","favorably"],answer:1,type:"<strong>品詞問題</strong>",explanation:"空所の後ろは名詞feedback（フィードバック）です。名詞を修飾するのは形容詞なので、(B) favorable（好意的な）が適切です。",translation:"その提案は取締役会メンバーから好意的なフィードバックを受け、承認される可能性が高いです。"},
  {id:1595,q:"The online retailer experienced a sudden ——– in sales after offering free shipping promotions.",options:["increase","release","expense","delay"],answer:0,type:"<strong>語彙問題</strong>",explanation:"空所の前はa sudden（急激な～）、後ろはin sales（売上の）で、文脈として「無料配送プロモーションを提供した後」とあります。プロモーション後に売上に起こる急激な変化は、(A) increase（増加）が適切です。",translation:"そのオンライン小売業者は、無料配送プロモーションを提供した後、売上の急激な増加を経験しました。"},
  {id:1596,q:"The airport authority is considering a major runway ——– to accommodate larger aircraft.",options:["election","reaction","extension","attention"],answer:2,type:"<strong>語彙問題</strong>",explanation:"空所の前はa major runway（大規模な滑走路～）、後ろはto accommodate larger aircraft（より大きな航空機に対応するために）です。より大きな航空機に対応するために滑走路に行うものは、(C) extension（拡張）が最も適切です。",translation:"空港当局は、より大きな航空機に対応するために、大規模な滑走路拡張を検討しています。"},
  {id:1597,q:"By the time the seminar begins, the participants ——– the required pre-reading materials.",options:["completed","will have completed","completing","completes"],answer:1,type:"動詞・時制問題",explanation:"文頭にBy the time（～する時までに）があり動詞beginsは現在形です。この場合、主節の時制は未来、または未来完了になります。「セミナーが始まる時までに、参加者は事前読書資料を完了している（だろう）」という未来の時点での完了を表すと考えるのが適切なので、未来完了の(B) will have completed（完了しているだろう）を選びます。",translation:"セミナーが始まる時までに、参加者は必要な事前読書資料を完了しているでしょう。"},
  {id:1598,q:"Several of the applicants ——– submitted their résumés were called for interviews yesterday.",options:["those","some","who","whose"],answer:2,type:"<strong>代名詞または関係代名詞問題</strong>",explanation:"空所の前はthe applicants（応募者たち）、空所の後ろはsubmitted their résumés（履歴書を提出した）と続き、主文の動詞はwere called（呼ばれた）です。「履歴書を提出した応募者たち」という意味にするため、関係代名詞の主格である(C) who が適切です。",translation:"履歴書を提出した応募者のうち数人が、昨日面接に呼ばれました。"},
  {id:1599,q:"Ms. Lopez received a positive performance ——– during her annual employee evaluation last month.",options:["review","revision","survey","record"],answer:0,type:"<strong>語彙問題</strong>",explanation:"空所の前はa positive performance（肯定的な勤務評価）、後ろはduring her annual employee evaluation（年次従業員評価の間に）です。従業員評価の際に受け取る「業績」に関するものは、(A) review（評価、査定）が最も適切です。performance reviewは「業績評価、勤務評価」の意味です。",translation:"Lopezさんは先月の年次従業員評価で、肯定的な勤務評価を受けました。"},
  {id:1600,q:"The advertising campaign was so ——– that sales increased by 30 percent in two weeks.",options:["effected","effect","effectively","effective"],answer:3,type:"<strong>品詞問題</strong>",explanation:"空所の前はwas so（とても～だった）で、この後には形容詞が続きます。また、so ～ that構文で「とても～なので」という結果を表しています。「広告キャンペーンがとても効果的だったので売上が増加した」という意味で、(D) effective（効果的な）が適切です。",translation:"その広告キャンペーンはとても効果的だったので、2週間で売上が30パーセント増加しました。"},
  {id:1601,q:"For promotion, management considers a master’s degree ——– to five years of experience.",options:["appropriate","reasonable","equivalent","significant"],answer:2,type:"<strong>語彙問題</strong>",explanation:"空所の前は a master’s degree（修士号）、空所の後ろは to five years of experience（5年の経験に）です。この文脈で適切な形容詞は (C) equivalent（等価の、同等の）です。",translation:"昇進において、経営陣は修士号を5年の経験と同等だと考えています。"},
  {id:1602,q:"Sunbright Appliances released a more ——– vacuum cleaner compared to earlier designs.",options:["powerful","power","powerfully","powers"],answer:0,type:"<strong>品詞問題</strong>",explanation:"空所の前は冠詞aに more（より）が続き、後ろは名詞 vacuum cleaner（掃除機）です。したがって、空所には名詞 vacuum cleaner を修飾する形容詞が入ります。選択肢の中で形容詞は (A) powerful（強力な）でこれを選びます。",translation:"Sunbright Appliancesは、以前のデザインと比較して、より強力な掃除機を発売しました。"},
  {id:1603,q:"To date, Mr. Singh’s department ——– more units than any other sales team.",options:["has sold","are selling","will sell","was sold"],answer:0,type:"<strong>動詞問題</strong>",explanation:"文頭の To date（今日まで）は現在完了形と組み合わせて使われることが多い表現です。主語は Mr. Singh’s department（Singhさんの部門）で三人称単数なので、(A) has sold（現在完了形）が適切です。",translation:"今日まで、Singhさんの部門は他のどの営業チームよりも多くの製品を販売しています。"},
  {id:1604,q:"Mr. Tanaka’s keynote speech was considered the most ——– moment of the conference.",options:["impressive","impression","impressed","impresses"],answer:0,type:"<strong>品詞問題</strong>",explanation:"空所の前は the most（最も）、後ろは名詞 moment（瞬間）です。したがって、空所には名詞 moment を修飾する形容詞が入ります。選択肢の中で形容詞は (A) impressive（印象的な）でこれを選びます。",translation:"Tanakaさんの基調講演は、会議で最も印象的な瞬間だったと考えられました。"},
  {id:1605,q:"——– the lack of funding, the research team managed to finish on time.",options:["Except for","Prior to","Despite","Throughout"],answer:2,type:"<strong>語彙問題</strong>",explanation:"空所の後ろは the lack of funding（資金不足）、カンマ以降は the research team managed to finish on time（研究チームは時間通りに終了することができた）です。「資金不足にもかかわらず、研究チームは時間通りに終了することができた」とすると意味が通るので (C) Despite（～にもかかわらず）を選びます。",translation:"資金不足にもかかわらず、研究チームは時間通りに終了することができました。"},
  {id:1606,q:"The project continued ——– after the government announced significant budget reductions.",options:["some","else","even","such"],answer:2,type:"<strong>複合語彙問題</strong>",explanation:"空所の前は The project continued（プロジェクトは継続した）、空所の後ろは after the government announced significant budget reductions（政府が大幅な予算削減を発表した後）です。「政府が大幅な予算削減を発表した後でも、プロジェクトは継続した」とすると意味が通るので (C) even（さえ、でも）を選びます。",translation:"政府が大幅な予算削減を発表した後でも、プロジェクトは継続しました。"},
  {id:1607,q:"Employees from Tokyo and Seoul offices collaborated ——– on the international campaign.",options:["between","because","together","either"],answer:2,type:"<strong>接続詞・前置詞・副詞問題または複合語彙問題</strong>",explanation:"空所の前は Employees from Tokyo and Seoul offices collaborated（東京とソウルのオフィスの従業員が協力した）、空所の後ろは on the international campaign（国際キャンペーンで）です。「東京とソウルのオフィスの従業員が国際キャンペーンで一緒に協力した」とすると意味が通るので (C) together（一緒に）を選びます。",translation:"東京とソウルのオフィスの従業員が、国際キャンペーンで一緒に協力しました。"},
  {id:1608,q:"The board of StellarSoft ——– Ms. Chen as the new chief operating officer.",options:["named","granted","founded","proved"],answer:0,type:"<strong>語彙問題</strong>",explanation:"空所の前は The board of StellarSoft（StellarSoftの取締役会）、空所の後ろは Ms. Chen as the new chief operating officer（Chenさんを新しい最高執行責任者として）です。この文脈で適切な動詞は (A) named（指名した、任命した）です。",translation:"StellarSoftの取締役会は、Chenさんを新しい最高執行責任者として指名しました。"},
  {id:1609,q:"——– Ms. Dubois receives the shipment, she will notify all branch managers.",options:["As soon as","Still","For example","In the meantime"],answer:0,type:"接続詞・副詞問題",explanation:"空所の後ろは Ms. Dubois receives で主語+動詞、カンマ以降は she will notify で主語+動詞です。これは上の１のパターンで接続詞が入ります。",translation:"Duboisさんが出荷を受け取るとすぐに、彼女は全支店長に通知します。"},
  {id:1610,q:"The manager reviewed the most ——– sales data to prepare tomorrow’s meeting.",options:["consecutive","actual","central","recent"],answer:3,type:"<strong>語彙問題</strong>",explanation:"空所の前は the most（最も）、空所の後ろは sales data（売上データ）で、文末に to prepare tomorrow’s meeting（明日の会議を準備するために）があります。「明日の会議を準備するために、マネージャーは最新の売上データを確認した」とすると意味が通るので (D) recent（最新の）を選びます。",translation:"マネージャーは明日の会議を準備するために、最新の売上データを確認しました。"},
  {id:1611,q:"Please remember to lock ——– office doors when leaving the building each evening.",options:["our","we","us","ours"],answer:0,type:"<strong>代名詞問題</strong>",explanation:"空所の前が動詞lock（鍵をかける）、後ろは名詞 office doors（オフィスのドア）です。したがって空所には名詞 office doors を修飾する所有格の(A) our が適切です。",translation:"毎晩建物を出る際は、私たちのオフィスのドアに鍵をかけることを忘れないでください。"},
  {id:1612,q:"The company will hire applicants ——– demonstrate strong leadership and problem-solving skills.",options:["what","where","who","when"],answer:2,type:"<strong>関係詞問題</strong>",explanation:"空所の前は applicants（応募者）で人を表す名詞、空所の後ろは demonstrate（示す）で動詞です。人を先行詞として、関係詞節の中で主語の役割を果たす主格の関係代名詞 (C) who を選びます。",translation:"会社は、強力なリーダーシップと問題解決スキルを示す応募者を雇用します。"},
  {id:1613,q:"The design proposal was not ——– finalized until Mr. Yamada signed the approval form.",options:["relatively","occasionally","completely","enormously"],answer:2,type:"<strong>語彙問題</strong>",explanation:"空所の前は was not（～でなかった）、空所の後ろは finalized until（～まで完成されなかった）です。「山田さんが承認書に署名するまで、設計提案は完全に完成されなかった」とすると意味が通るので (C) completely（完全に）を選びます。",translation:"山田さんが承認書に署名するまで、設計提案は完全に完成されませんでした。"},
  {id:1614,q:"The Murphy Foods manager ——– with an inspector yesterday about safety compliance.",options:["consults","consulted","is consulting","to consult"],answer:1,type:"<strong>動詞問題</strong>",explanation:"文中に yesterday（昨日）という過去を表す時間表現があります。したがって空所には過去形の (B) consulted（相談した）が適切です。",translation:"Murphy Foodsのマネージャーは昨日、安全性コンプライアンスについて検査官と相談しました。"},
