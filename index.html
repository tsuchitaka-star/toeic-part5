  {id:1224,q:"For its anniversary, Iwamoto Art Museum is preparing a special ——– that highlights significant local historical events.",options:["outlook","function","exhibit","objective"],answer:2,type:"<strong>語彙問題</strong>",explanation:"空所の後ろは関係代名詞 that があり、that 節の内容は「重要な地元の歴史的出来事を強調する」です。このことから、空所には「展示、展覧会」などを表す名詞が適切なので (C) exhibit（展示、展覧会）を選びます。",translation:"Iwamoto Art Museumは、記念祭に向けて、重要な地元の歴史的出来事を強調する特別な展覧会を準備しています。"},
  {id:1225,q:"The job posting provided a ——– description of the required skills and expected responsibilities for applicants.",options:["detailed","timed","regulated","sized"],answer:0,type:"<strong>語彙問題</strong>",explanation:"空所の後ろに名詞句 description of the required skills and expected responsibilities（必要なスキルと期待される責任の説明）があるので、説明内容に関する形容詞を選ぶ必要があります。選択肢の中で記述内容に関連するのは (A) detailed（詳細な）でこれを選びます。",translation:"求人票には、応募者に必要なスキルと期待される責任の詳細な説明が記載されていました。"},
  {id:1226,q:"Tourists can find Olive Grove Eatery ——– view of the central monument, making it a perfect lunch spot.",options:["amid","toward","within","along"],answer:2,type:"<strong>語彙問題</strong>",explanation:"空所の後ろは view of the central monument（中央モニュメントの眺め）なので、空所には位置関係を表す前置詞が入ります。選択肢の中で適切なのは (C) within（～以内に、〜の範囲内に）です。",translation:"観光客は、中央モニュメントが見える場所にあるOlive Grove Eateryを見つけることができ、そこは完璧なランチスポットとなっています。"},
  {id:1227,q:"Feedback from our guests often highlights the ——– service provided by our front desk staff.",options:["attentive","attention","attentively","attentiveness"],answer:0,type:"<strong>品詞問題</strong>",explanation:"空所の前後を中心に見ていきます。空所の前が定冠詞 the、後ろが名詞 service（サービス）なので、空所には形容詞が入ることがわかります。したがって、形容詞の(A) attentive（親切な、注意深い）が適切です。",translation:"お客様からのフィードバックでは、フロントデスクのスタッフが提供する丁寧なサービスがしばしば強調されています。"},
  {id:1228,q:"Sycamore Heights College is offering scholarships to students ——– applications are received by the early decision deadline.",options:["whom","whichever","whose","whatever"],answer:2,type:"<strong>関係代名詞問題</strong>",explanation:"空所の前が先行詞の名詞students、後ろは名詞 applications があり、その後に動詞 are received が続いています。この構造から、空所には所有格の関係代名詞が必要です。選択肢の中で所有格の関係代名詞は (C) whose でこれを選びます。",translation:"Sycamore Heights Collegeは、早期決定の締め切りまでに願書が受理された学生に奨学金を提供しています。"},
  {id:1229,q:"Employees are required to become ——– with the database system as part of their training.",options:["compatible","fortunate","proficient","possible"],answer:2,type:"<strong>語彙問題</strong>",explanation:"空所の前が、Employees are required to become（従業員は～になることが求められている）、後ろは前置詞 with と名詞句 the database system（データベースシステム）なので、空所には「～に熟達している」という意味を持つ形容詞が適切です。したがって、 (C) proficient（熟達した）を選びます。",translation:"従業員は、研修の一環として、データベースシステムに習熟することが求められています。"},
  {id:1230,q:"Sue Kang ——– an original song at the local talent show last week, winning first place.",options:["performed","performs","performing","will perform"],answer:0,type:"動詞問題",explanation:"空所の後方に、last week（先週）があります。このことから、空所には過去時制の動詞が必要です。",translation:"Sue Kangさんは先週、地元のタレントショーでオリジナル曲を演奏し、1位を獲得しました。"},
  {id:1231,q:"——– three thousand visitors attended the Vickwell Modern Art Museum’s latest exhibition opening.",options:["Similarly","Strongly","Nearly","Tightly"],answer:2,type:"<strong>語彙問題</strong>",explanation:"空所の後ろは数字の three thousand（3000）なので、空所には数量を修飾する副詞が入ります。選択肢の中で適切なのは (C) Nearly（ほぼ、約）です。",translation:"約3000人の訪問者が、Vickwell Modern Art Museumの最新の展覧会のオープニングに出席しました。"},
  {id:1232,q:"As an ——– architect, Ms. Wentworth has designed some of the most innovative buildings in the city.",options:["accomplished","accomplish","accomplishment","accomplishes"],answer:0,type:"<strong>品詞問題</strong>",explanation:"空所の前後を見ていきます。空所の前が冠詞 an、後ろが名詞 architect（建築家）なので、空所には形容詞が入ることがわかります。したがって、形容詞(A) accomplished（熟練した、実績のある）が適切です。",translation:"熟練した建築家であるWentworthさんは、市内で最も革新的な建物のいくつかを設計してきました。"},
  {id:1233,q:"The introduction of a streamlined patient record system at Casey Medical Care System has greatly improved worker ——–.",options:["advance","frequency","analysis","productivity"],answer:3,type:"<strong>語彙問題</strong>",explanation:"空所の前に動詞 improved（改善した）があり、「患者の記録システムを合理化したことで、従業員の～が大幅に向上した」という文脈がわかります。空所には、業務効率や成果に関連する名詞が入ると考えられます。選択肢の中で適切なのは (D) productivity（生産性）でこれを選びます。",translation:"Casey Medical Care Systemで合理化された患者記録システムが導入されたことで、従業員の生産性が大幅に向上しました。"},
  {id:1234,q:"By the time the new policy is implemented, Amar Hadi ——– all staff on compliance requirements.",options:["trained","will have trained","trains","has been training"],answer:1,type:"<strong>動詞問題</strong>",explanation:"まずBy the timeから見ていきましょう。By the timeからカンマまでは時を表す副詞節です。この中の動詞がis implementedで現在形です。時を表す副詞節の中は未来であっても現在形にするというルールがあり、is implementedと現在形になっています。",translation:"新しい方針が実施されるまでに、Amar Hadiさんはコンプライアンス要件についてすべてのスタッフにトレーニングを実施する予定です。"},
  {id:1235,q:"Receptionists at the Grand Harper Hotel are trained ——– handling reservations and guest inquiries efficiently and professionally.",options:["up","out","by","on"],answer:3,type:"<strong>語彙問題</strong>",explanation:"空所の前がare trained（訓練されている）、後ろは名詞句 handling reservations and guest inquiries（予約と顧客からの問い合わせを処理すること）です。「予約と顧客からの問い合わせを処理することについて訓練されている」とすると意味が通るので、(D) on（～について）を選びます。",translation:"Grand Harper Hotelの受付係は、予約と顧客からの問い合わせを効率的かつ専門的に処理することに関して訓練を受けています。"},
  {id:1236,q:"Mr. Bryant ——– his staff to dinner at an upscale restaurant to celebrate the company’s 20th anniversary.",options:["was treated","treated","treating","to treat"],answer:1,type:"<strong>動詞問題</strong>",explanation:"問題文の中に動詞がないので、空所には動詞（述語動詞）が入ります。述語動詞になれるのは、受動態の(A) was treated と能動態の(B) treated の２つです。",translation:"Bryantさんは、会社の20周年を祝うために、スタッフを高級レストランでの夕食にもてなしました。"},
  {id:1237,q:"The recent donation from Mr. Martinez is ——– a part of his ongoing support for our charity.",options:["only","less","very","enough"],answer:0,type:"<strong>語彙問題</strong>",explanation:"空所の後ろは名詞句 a part of his ongoing support（彼の継続的な支援の一部）なので、空所には程度や限定を表す副詞が適切です。したがって (A) only（ほんの～にすぎない）を選びます。",translation:"Martinezさんからの最近の寄付は、私たちの慈善団体への彼の継続的な支援の一部にすぎません。"},
  {id:1238,q:"——– Mr. Huang meets the sales targets for the quarter, he will be eligible for the bonus scheme.",options:["Regardless of","Provided that","Moreover","In addition to"],answer:1,type:"<strong>接続詞・前置詞・副詞問題</strong>",explanation:"空所の後ろは Mr. Huang meets the sales targets for the quarter で主語+動詞、カンマ以降は he will beで主語+動詞の形です。これは、上の１のパターンに該当し、空所には接続詞が入ることがわかります。",translation:"もしHuangさんが四半期の売上目標を達成すれば、ボーナス制度の対象となります。"},
  {id:1239,q:"Dr. Reynolds received a standing ovation after her ——– on the impacts of poverty on education.",options:["lecturer","lecture","lecturing","lectured"],answer:1,type:"<strong>品詞問題</strong>",explanation:"空所の前後を中心に見ていきます。空所の前が所有格 her、後ろが前置詞 on なので、空所には名詞が入ることがわかります。選択肢の中で名詞は (A) lecturer（講師） と (B) lecture（講義） がありますが、after以降が意味的に「貧困が教育に与える影響についての彼女の講義の後」とするのが適切なので、(B) lecture（講義） を選びます。",translation:"Reynolds博士は、貧困が教育に与える影響についての彼女の講義の後、スタンディングオベーションを受けました。"},
  {id:1240,q:"Candidates with ——– experience in software development will be given preference during the hiring process.",options:["constant","prompt","equal","prior"],answer:3,type:"<strong>語彙問題</strong>",explanation:"空所の後ろに名詞 句experience in software development（ソフトウェア開発の経験）があるので、経験に関する形容詞が適切です。選択肢の中で経験に関連するのは (D) prior（事前の、以前の）でこれを選びます。",translation:"ソフトウェア開発の事前経験を持つ候補者は、採用プロセスにおいて優先されます。"},
  {id:1241,q:"——– on the outcome of the meeting, we may either accelerate or postpone our expansion plans.",options:["Depending","Focused","Relying","Centered"],answer:0,type:"<strong>語彙問題</strong>",explanation:"問題文の意味が「会議の結果に——–して、私たちは拡大計画を加速するか延期するかもしれません」なので、適切な選択肢は (A) Depending（依存して、～次第で）です。",translation:"会議の結果次第で、私たちは拡張計画を加速するか延期するかもしれません。"},
  {id:1242,q:"Employees at Stacatti Bank are trained to be ——– when accessing sensitive account information.",options:["caution","cautious","cautiously","cautions"],answer:1,type:"<strong>品詞問題</strong>",explanation:"空所の前後を中心に見ていきます。空所の前はare trained to be（～になる訓練されている）、後ろは接続詞when です。したがって、空所には形容詞の(B) cautious（慎重な）が適切です。",translation:"Stacatti銀行の従業員は、機密の口座情報にアクセスする際に慎重になるように訓練されています。"},
  {id:1243,q:"The workshop had so ——– people because it coincided with the major city marathon, reducing available attendance.",options:["few","barely","less","hardly"],answer:0,type:"<strong>複合語彙問題</strong>",explanation:"空所の後ろは可算名詞の複数形 people（人々）なので、空所には可算名詞の複数形を修飾できる数量形容詞が入ります。選択肢の中で可算名詞の複数形を修飾できる数量形容詞は(A) few（少数の）のみです。",translation:"ワークショップの参加者が少なかったのは、主要な都市マラソンと重なり、参加できる人が減ったためです。"},
  {id:1244,q:"Our audience reacted ——– to the interactive presentation than to the traditional lecture.",options:["favorably","most favorable","more favorably","favorable"],answer:2,type:"<strong>品詞または比較問題</strong>",explanation:"空所の後方にthanがないか確認します。to the interactive presentationを挟んでthanが見つかりますので。空所には副詞の比較級の(C) more favorably （副詞favorably「好意的に」の比較級）が適切です。副詞の比較修(C) more favorablyは動詞reacted（反応した）を修飾します。",translation:"私たちの聴衆は、従来の講義よりもインタラクティブなプレゼンテーションに好意的に反応しました。"},
  {id:1245,q:"Axion Engineering Japan achieved a significant increase in annual profits ——– challenging market conditions.",options:["until","even though","in case","despite"],answer:3,type:"<strong>接続詞・前置詞問題</strong>",explanation:"空所の前はAxion Engineering Japan achievedで主語+動詞、空所の後ろは名詞句 challenging market conditions（厳しい市場環境）です。これは上の４のパターンに該当するので、空所には前置詞が入ることがわかります。",translation:"Axion Engineering Japanは、厳しい市場環境にもかかわらず、年間利益の大幅な増加を達成しました。"},
  {id:1246,q:"We saw a significant increase in web traffic after launching our marketing campaign ——– month.",options:["lastly","lasting","last","lasted"],answer:2,type:"<strong>品詞または動詞問題</strong>",explanation:"空所の前後を中心に見ていきます。空所の前が名詞句our marketing campaign（私たちのマーケティングキャンペーン）、空所の後ろが名詞 month（月）です。空所には名詞 month（月）を修飾する形容詞が入ることがわかります。last month（先月）と考えるのが適切なので、形容詞 (C) last（この前の、前回の）を選びます。",translation:"先月、マーケティングキャンペーンを開始した後、Webトラフィックが大幅に増加しました。"},
  {id:1247,q:"As ——– else volunteered, Jenna took the lead on the project to ensure its completion.",options:["another","nobody","anything","several"],answer:1,type:"<strong>代名詞問題</strong>",explanation:"カンマ以降の意味は、「Jennaさんはプロジェクトが確実に完了するように率先して取り組みました」なので、As以降が「他に誰も志願しなかったので」とすると意味が通ります。したがって、 (B) nobody（誰も～ない）を選びます。",translation:"他に誰も志願しなかったので、Jennaさんはプロジェクトが確実に完了するように率先して取り組みました。"},
  {id:1248,q:"The project timeline must be ——– to accommodate the unexpected delay in material delivery.",options:["disposed","advised","counted","modified"],answer:3,type:"<strong>語彙問題</strong>",explanation:"空所の前に be動詞 be があり、「プロジェクトのスケジュールは、資材納入の予期せぬ遅延に対応するために～されなければならない」という文脈がわかります。空所には、スケジュールや計画に変更を加えることを意味する動詞の過去分詞が適切です。したがって、 (D) modified（修正された）を選びます。",translation:"プロジェクトのスケジュールは、資材納入の予期せぬ遅延に対応するために修正されなければなりません。"},
  {id:1249,q:"Make sure to submit your application ——– the deadline to be considered for the program.",options:["below","between","beside","before"],answer:3,type:"<strong>語彙問題</strong>",explanation:"空所の後ろは the deadline（締め切り）なので、空所には時間的な関係を表す前置詞が入ります。選択肢の中で適切なのは (D) before（～の前に）です。",translation:"プログラムの選考対象となるためには、必ず締め切り前に応募書類を提出してください。"},
  {id:1250,q:"The creation of the new park was only possible with the ——– of the town council.",options:["support","supportive","supportable","supported"],answer:0,type:"<strong>品詞問題</strong>",explanation:"空所の前後を見ていきます。空所の前が定冠詞 the、後ろが前置詞 of なので、空所には名詞が入ることがわかります。選択肢の中で名詞は、(A) support（支援）で、これを選びます。",translation:"新しい公園の建設は、町議会の支援があってこそ可能になりました。"},
  {id:1251,q:"The new flextime policy is ——– employees have been requesting to improve work-life balance.",options:["close to","other than","the one","one time"],answer:2,type:"<strong>複合語彙問題</strong>",explanation:"空所の前が主語The new flextime policy isでisの後ろに補語的な働きのある語句が必要です。また、空所の後ろはemployees have been requesting to improve work-life balanceでrequestingの目的語が足りません。",translation:"新しいフレックスタイム制は、従業員がワークライフバランスを改善するために要求してきたものです。"},
  {id:1252,q:"Gift cards purchased at Veracore Plant Nursery are ——– for two years from the date of issue.",options:["valid","accurate","original","actual"],answer:0,type:"<strong>語彙問題</strong>",explanation:"主語はGift cards（ギフトカード）、空所の後ろは前置詞句 for two years from the date of issue（発行日から2年間）なので、空所には有効期限を表す形容詞が適切です。したがって、 (A) valid（有効な）を選びます。",translation:"Veracore Plant Nurseryで購入したギフトカードは、発行日から2年間有効です。"},
  {id:1253,q:"Following thorough discussions, the management team’s ——– of the restructuring plan marked a significant step towards streamlining operations.",options:["accepted","accepts","accept","acceptance"],answer:3,type:"<strong>品詞または動詞問題</strong>",explanation:"空所の前に所有格 the management team’s（経営陣の）があり、後ろは前置詞 of が続いています。この構造から、空所には名詞が必要です。選択肢の中で名詞は (D) acceptance（受け入れ）でこれを選びます。",translation:"徹底的な議論を経て、経営陣が再建計画を受け入れたことは、業務の合理化に向けた重要な一歩となりました。"},
  {id:1254,q:"——– his culinary arts degree, Cha Joon opened a restaurant that quickly became a local favorite.",options:["Having earned","Earned","Being earned","Earn"],answer:0,type:"<strong>動詞問題</strong>",explanation:"空所の後ろは Cha Joon opened a restaurant that quickly became a local favorite.（Cha Joonさんはすぐに地元で人気となったレストランを開いた）という節です。カンマの前を「（Cha Joonさんが）料理芸術の学位を取得した後に」とすると意味が通るので、分詞構文の(A) Having earned（取得して） を選びます。",translation:"料理の学位を取得したので、チャ・ジュンはすぐに地元で人気となったレストランを開きました。"},
  {id:1255,q:"The upcoming software upgrades are ——– for early next month to minimize disruption to our services.",options:["allowed","scheduled","advanced","caused"],answer:1,type:"<strong>語彙問題</strong>",explanation:"next monthまでの意味は「空所の前に be動詞 are があり、「今度のソフトウェアのアップグレードは、来月上旬に～されています」です。空所には、計画や予定を表す動詞の過去分詞が入るのが適切です。したがって、 (B) scheduled（予定されている）を選びます。",translation:"今度のソフトウェアのアップグレードは、サービスの中断を最小限に抑えるために、来月上旬に予定されています。"},
  {id:1256,q:"Regular team-building activities have been key to maintaining ——– interaction among remote employees.",options:["productivity","production","productive","product"],answer:2,type:"<strong>品詞問題</strong>",explanation:"空所の前後を中心に見ていきます。空所の前が動名詞 maintaining（維持すること）、後ろが名詞 interaction（交流）なので、空所には名詞を修飾する形容詞が入ることがわかります。したがって、形容詞(C) productive（生産的な）が適切です。",translation:"定期的なチームビルディング活動は、離れた場所にいる従業員同士の生産的な交流を維持するための鍵となっています。"},
  {id:1257,q:"——– Ishani Sen handles online sales and marketing, Fang Li is responsible for on-site operations.",options:["In case","As if","While","Whether"],answer:2,type:"<strong>語彙問題</strong>",explanation:"カンマまでの意味が、「Ishani Senさんがオンライン販売とマーケティングを担当する」、カンマ以降が「Fang Liさんは現場での業務を担当している」です。",translation:"Ishani Senさんがオンライン販売とマーケティングを担当する一方で、Fang Liさんは現場での業務を担当しています。"},
  {id:1258,q:"The city decided to ——– more recycling bins throughout the park to encourage environmental responsibility.",options:["reach","refer","manage","place"],answer:3,type:"<strong>語彙問題</strong>",explanation:"空所の後ろは名詞句 more recycling bins（より多くのリサイクル用ゴミ箱）と前置詞句 throughout the park（公園全体に）があるので、空所には「設置する」という意味を持つ動詞が適切です。したがって、(D) place（置く、設置する）を選びます。",translation:"市は、環境への責任を促すために、公園全体により多くのリサイクル用ゴミ箱を設置することを決定しました。"},
  {id:1259,q:"The contest is open to ——– who wants to showcase their talent in digital art.",options:["another","anyone","those","anything"],answer:1,type:"<strong>代名詞問題</strong>",explanation:"空所の後ろに関係代名詞whoがきています。whoは「人」を先行詞とするので、空所には「人」を表す代名詞が入ります。また、whoの後の動詞がwantsなので先行詞は三人称単数です。選択肢の中で「人」を表しかつ単数の代名詞は (B) anyone（誰でも）のみです。",translation:"コンテストは、デジタルアートの才能を披露したい人なら誰でも参加できます。"},
  {id:1260,q:"Mr. Smith’s analysis of the data has been ——– accurate in predicting the sales trends.",options:["largely","closely","faintly","finally"],answer:0,type:"<strong>語彙問題</strong>",explanation:"空所の後ろは形容詞 accurate（正確な）です。accurate と合う副詞は (A) largely（大部分は、概して）です。",translation:"Smithさんのデータ分析は、売上トレンドの予測において概ね正確でした。"},
  {id:1261,q:"We are delighted to ——– that Bright Sky Café will be hosting a charity dinner next month.",options:["issue","attract","invite","announce"],answer:3,type:"<strong>語彙問題</strong>",explanation:"空所の後ろは that節 that Bright Sky Café will be hosting a charity dinner next month（Bright Sky Caféが来月チャリティーディナーを開催する）です。選択肢の動詞の中で直後にthat節を取ることができるのは(D) announce（発表する）のみでこれを選びます。",translation:"Bright Sky Caféが来月チャリティーディナーを開催することを発表できて嬉しく思います。"},
  {id:1262,q:"Client satisfaction has greatly increased ——– the faster response times enabled by the Toucan Network System.",options:["while","because of","in fact","as soon as"],answer:1,type:"<strong>接続詞・前置詞・副詞問題</strong>",explanation:"空所の前は、Client satisfaction has greatly increasedで主語+動詞、空所の後ろは名詞句 the faster response times enabled by the Toucan Network System（Toucan Network Systemによって実現された迅速な応答時間）です。",translation:"Toucan Network Systemによって実現された迅速な応答時間のおかげで、顧客満足度が大幅に向上しました。"},
  {id:1263,q:"Mr. Yamaki recommended that more ——– be placed on staff training to improve service delivery.",options:["appeal","analysis","distinction","emphasis"],answer:3,type:"<strong>語彙問題</strong>",explanation:"空所の前がmore、後ろはbe placed onです。place more emphasis on（より重点を置く）でmore emphasisを主語にして受動態になった形と考えられます。したがって、(D) emphasis（重点、強調）が適切です。",translation:"Yamakiさんは、サービス提供を改善するために、スタッフ研修をより重視することを推奨しました。"},
  {id:1264,q:"Falcon Star Systems has scheduled a meeting to ——– concerns about the environmental impact of their operations.",options:["supervise","address","inform","promise"],answer:1,type:"<strong>語彙問題</strong>",explanation:"空所の後ろは名詞句 concerns about the environmental impact（環境への影響に関する懸念）なので、空所には「対処する」という意味を持つ動詞が適切です。したがって、 (B) address（対処する）を選びます。",translation:"Falcon Star Systemsは、事業の環境への影響に関する懸念に対処するための会議を予定しています。"},
  {id:1265,q:"The new software has proven to function ——– under various stressful conditions in our tests.",options:["dependable","depend","dependability","dependably"],answer:3,type:"<strong>品詞問題</strong>",explanation:"空所の前後を中心に見ていきます。空所の前は動詞 function（機能する[自動詞]）、後ろは前置詞 underなので、空所には動詞を修飾する副詞が入ることがわかります。選択肢の中で副詞は、(D) dependably（高い信頼性をもって、確実に）です。",translation:"新しいソフトウェアは、私たちのテストにおいて、さまざまなストレスの多い条件下で確実に機能することが証明されています。"},
  {id:1266,q:"All shipments from Dynamo Fabricators Inc. must be inspected ——– international shipping regulations.",options:["in the event that","in accordance with","in order that","in front of"],answer:1,type:"<strong>接続詞・前置詞問題</strong>",explanation:"空所の前は、All shipments from Dynamo Fabricators Inc. must be inspectedで主語+動詞、空所の後ろは名詞句 international shipping regulations（国際的な輸送規制）です。",translation:"Dynamo Fabricators Inc.からのすべての貨物は、国際的な輸送規制に従って検査されなければなりません。"},
  {id:1267,q:"The easiest ——– to resolve this issue is by restarting your device and checking the connection settings.",options:["style","control","direction","way"],answer:3,type:"<strong>語彙問題</strong>",explanation:"空所の前に形容詞 easiest（最も簡単な）があり、後ろは to不定詞句 to resolve this issue（この問題を解決する）なので、空所には「方法」という意味を持つ名詞が適切です。したがって、 (D) way（方法）を選びます。",translation:"この問題を解決する最も簡単な方法は、デバイスを再起動して接続設定を確認することです。"},
  {id:1268,q:"Although the Endeavor Program started slowly, it ——– gained momentum and was completed on time.",options:["already","eventually","correctly","further"],answer:1,type:"<strong>語彙問題</strong>",explanation:"カンマまでの意味が、「Endeavor Programはゆっくりと始まりましたが（Although the Endeavor Program started slowly）」、カンマ以降が「それは～に勢いを増し、予定通りに完了しました（it ——– gained momentum and was completed on time）」です。「ゆっくり始まったけれど、最終的に勢いを増して予定通りに完了した」とすると意味が通るので、(B) eventually（最終的には）を選びます。",translation:"Endeavor Programはゆっくりと始まりましたが、最終的には勢いを増し、予定通りに完了しました。"},
  {id:1269,q:"Lunere County residents have shown their ——– to the closure of historic downtown streets.",options:["oppose","opposing","opposes","opposition"],answer:3,type:"<strong>品詞または動詞問題</strong>",explanation:"空所の前後を中心に見ていきます。空所の前が所有格 their（彼らの）、後ろが前置詞 to なので、空所には名詞が入ることがわかります。したがって名詞(D) opposition（反対）が適切です。",translation:"Lunere郡の住民は、歴史的な繁華街の通りを閉鎖することに反対を示しました。"},
  {id:1270,q:"Katie Cornyn has proposed a new initiative to ——– outdated regulations that hinder small business growth.",options:["empty","exhaust","distribute","remove"],answer:3,type:"<strong>語彙問題</strong>",explanation:"空所の後ろは名詞句 outdated regulations that hinder small business growth（中小企業の成長を阻害する時代遅れの規制）なので、空所には「撤廃する、取り除く」という意味を持つ動詞が適切です。したがって、(D) remove（取り除く）を選びます。",translation:"Katie Cornynさんは、中小企業の成長を阻害する時代遅れの規制を撤廃する新しい構想を提案しました。"},
  {id:1271,q:"In response to the digital security incident, Nolan Credit Union is urgently reviewing ——– remains of their data security measures.",options:["it","that","what","which"],answer:2,type:"<strong>代名詞または関係代名詞問題</strong>",explanation:"空所の前に動詞 reviewing があり、空所の後ろは三人称単数現在形の動詞 remains（残っている） 、of their data security measures（データセキュリティ対策の中で）が続いています。空所以降を動詞reviewingの目的語になるようにするために、関係代名詞(C) what（～すること、～するもの）を選びます。",translation:"デジタルセキュリティ事件を受けて、Nolan Credit Unionはデータセキュリティ対策中で残っているものを緊急に再検討しています。"},
  {id:1272,q:"Upon ——– at the workshop, please locate your name badge and workshop materials on the registration desk.",options:["arrive","arrives","arrival","arrived"],answer:2,type:"<strong>品詞または動詞問題</strong>",explanation:"空所の前後を中心に見ていきます。空所の前が前置詞 Upon、後ろが前置詞 at なので、空所には名詞が入ることがわかります。選択肢の中で名詞は、(C) arrival（到着）でこれを選びます。",translation:"ワークショップに到着したら、受付で自分の名札とワークショップの資料を見つけてください。"},
  {id:1273,q:"——–—- to the internet service in the office led to decreased productivity among the staff.",options:["Records","Standards","Selections","Disruptions"],answer:3,type:"<strong>語彙問題</strong>",explanation:"空所の後ろは前置詞句 to the internet service（インターネットサービスへの）と in the office（オフィス内での）があり、文末に led to decreased productivity among the staff（スタッフの間で生産性の低下につながった）とあります。",translation:"オフィスでのインターネットサービスの中断は、スタッフの間で生産性の低下につながりました。"},
  {id:1274,q:"Our customer service team strives to meet customers’ ——– by providing timely and effective solutions.",options:["expecting","expectations","expectant","expects"],answer:1,type:"<strong>品詞問題</strong>",explanation:"空所の前後を中心に見ていきます。空所の前が動詞meetに所有格 customers’（顧客の）が続き、後ろが前置詞 by なので、空所には名詞が入ることがわかります。選択肢の中で名詞は、(B) expectations（期待）と(C) expectant （期待する人）があります。",translation:"私たちの顧客サービスチームは、タイムリーで効果的な解決策を提供することで、顧客の期待に応えるよう努めています。"},
  {id:1275,q:"Mr. Martinez ——– his research findings at the international conference next month.",options:["to present","presented","has been presenting","will be presenting"],answer:3,type:"<strong>時制に関する動詞問題</strong>",explanation:"問題文中に動詞がなく、文末に next month（来月）があるので、未来時制の動詞が空所に入ることがわかります。選択肢の中で未来を表す動詞は、(D) will be presenting（発表する予定である）のみでこれを選びます。",translation:"Martinezさんは来月、国際会議で彼の研究成果を発表する予定です。"},
  {id:1276,q:"Keiko Suzuki is ——– those volunteering at the community center to teach children about robotics and technology.",options:["around","despite","inside","among"],answer:3,type:"<strong>語彙問題</strong>",explanation:"空所の後ろは those volunteering at the community center（コミュニティセンターでボランティアをしている人たち）なので、空所には複数の人々の間を表す前置詞が入ります。選択肢の中で適切なのは (D) among（～の間で、～の中で）です。",translation:"Keiko Suzukiさんは、コミュニティセンターで子供たちにロボット工学とテクノロジーについて教えるボランティアをしている人たちの1人です。"},
  {id:1277,q:"ResearchMatrix was developed ——– for managing large datasets in scientific research.",options:["specifies","specified","specifics","specifically"],answer:3,type:"品詞または動詞問題",explanation:"空所の前はbe動詞wasに動詞の過去分詞 developed（開発された）、後ろは前置詞 for なので、空所には動詞を修飾する副詞が入ることがわかります。したがって副詞の(D) specifically（特に）を選びます。",translation:"ResearchMatrixは、特に科学研究における大規模なデータセットを管理するために開発されました。"},
  {id:1278,q:"——– its architectural beauty, the Hadler Building also offers state-of-the-art conference facilities.",options:["Besides","Except","However","Unless"],answer:0,type:"<strong>接続詞・前置詞・副詞問題</strong>",explanation:"空所の後ろは名詞句 its architectural beauty があり、カンマ以降は、the Hadler Building が主語、offers が動詞で主語+動詞の形です。これは上の３のパターンに該当し、空所には前置詞が入ることがわかります。選択肢の中で前置詞は (A) Besides（～に加えて） と (B) Except（～を除いて）があります。",translation:"建築美に加えて、Hadler Buildingは最新鋭の会議施設も提供しています。"},
  {id:1279,q:"The necessary measures to upgrade our IT systems ——– in March during the scheduled maintenance period.",options:["take","to take","be taken","will be taken"],answer:3,type:"能動態・受動態・時制に関する動詞問題",explanation:"問題文中に動詞（述語動詞）がないので、空所には述語動詞が入ることがわかります。選択肢の中で述語動詞になれるのは、能動態現在時制の(A) take と受動態未来時制の(D) will be taken です。",translation:"ITシステムをアップグレードするために必要な措置は、3月の定期メンテナンス期間中に取られます。"},
  {id:1280,q:"Ms. Anderson, an experienced photographer, will ——– to the magazine’s special edition on wildlife.",options:["explain","accompany","gather","contribute"],answer:3,type:"<strong>語彙問題</strong>",explanation:"空所の後ろは前置詞句 to the magazine’s special edition on wildlife（野生動物に関する雑誌の特別版に）なので、空所には「寄稿する」という意味を持つ動詞が適切です。したがって、 (D) contribute（寄稿する、貢献する）を選びます。",translation:"経験豊富な写真家であるAndersonさんは、野生動物に関する雑誌の特別版に寄稿する予定です。"},
  {id:1281,q:"Acorn Mutual Insurance Company will expand its operations to Europe ——– the current market trends remain favorable.",options:["but","if","also","and"],answer:1,type:"接続詞・副詞問題",explanation:"空所の前は、Acorn Mutual Insurance Company will expandで主語+動詞、空所の後ろは the current market trends remain favorable で主語+動詞の形です。これは上の２のパターンに該当し、空所には接続詞が入ることがわかります。選択肢の中で接続詞は (A) but、(B) if、(D) and の3つあります。",translation:"Acorn Mutual Insurance Companyは、現在の市場トレンドが好ましい状態を維持すれば、ヨーロッパに事業を拡大する予定です。"},
  {id:1282,q:"The results from our quarterly reports show that sales are ——– exceeding the targets set by management.",options:["consistent","consist","consisting","consistently"],answer:3,type:"<strong>品詞問題</strong>",explanation:"空所の前はbe動詞 are、後ろは動詞 exceeding（超えている）なので、空所には動詞を修飾する副詞が入ることがわかります。したがって副詞の(D) consistently（常に、一貫して）が適切です。",translation:"四半期報告書の結果は、売上は経営陣が設定した目標を一貫して超えていることを示しています。"},
  {id:1283,q:"Barner Corporation is implementing training programs to help employees ——– to the new software systems being introduced.",options:["arrange","remain","adapt","behave"],answer:2,type:"語彙問題",explanation:"問題文は、「Barner Corporationは従業員が導入されている新しいソフトウェアシステムに～するのを支援するためのトレーニングプログラムを実施している」という文脈がわかります。そのアクションとして適しているのが、(C) adapt（適応する）です。",translation:"Barner Corporationは、従業員が導入されている新しいソフトウェアシステムに適応できるように、トレーニングプログラムを実施しています。"},
  {id:1284,q:"——– industry regulations, Central Craft Office Furnishings ensures that all their products are tested for durability and safety.",options:["Provided that","Now that","In keeping with","By means of"],answer:2,type:"<strong>接続詞・前置詞問題</strong>",explanation:"空所の後ろは industry regulations で名詞句、カンマ以降は Central Craft Office Furnishings が主語、ensures が動詞で主語+動詞の形です。これは上の３のパターンで、空所には前置詞が入ることがわかります。",translation:"Central Craft Office Furnishingsは、業界の規制に従い、すべての製品の耐久性と安全性をテストしています。"},
  {id:1285,q:"By integrating the latest screening tools, Ilyana Cooper transformed our hiring ——– into a more efficient system.",options:["experienced","to experience","experience","experiencing"],answer:2,type:"品詞または動詞問題",explanation:"空所の前後を中心に見ていきます。空所の前は 所有格ourに名詞 hiring（採用）が続き、後ろは 前置詞intoです。空所に名詞(C) experience（経験、体験）を入れて、複合名詞のhiring experience（採用体験）とすると「当社の採用体験をより効率的なシステムへと変革しました」になって意味が通るので、(C) experience（経験、体験）を選びます。",translation:"Ilyana Cooperさんは、最新のスクリーニングツールを統合することで、当社の採用体験をより効率的なシステムへと変革しました。"},
  {id:1286,q:"Due to unexpected roadwork, all bus services along Lakeside Pines Avenue ——– until further notice.",options:["to cancel","were canceling","will be canceled","cancels"],answer:2,type:"能動態・受動態・時制に関する動詞問題",explanation:"空所の前に名詞句 all bus services があり、後ろは前置詞句 until further notice（追って通知があるまで）が続いています。この構造から、空所には主語all bus services の動作や状態を表す動詞（述語動詞）が必要です。",translation:"予期せぬ道路工事のため、追って通知があるまで、Lakeside Pines Avenue沿いのすべてのバスサービスはキャンセルされます。"},
  {id:1287,q:"Ms. Rodriguez and Mr. Gupta ——– traveled to the site to assess the project’s progress.",options:["they","them","theirs","themselves"],answer:3,type:"<strong>代名詞問題</strong>",explanation:"空所の前に主語 Ms. Rodriguez and Mr. Gupta があり、後ろに動詞 traveled が続いていて文として完成しています。この構造から、空所には主語を強調する再帰代名詞が適切です。選択肢の中で再帰代名詞は (D) themselves でこれを選びます。",translation:"RodriguezさんとGuptaさんは、プロジェクトの進捗状況を評価するために、彼ら自身で現場に行きました。"},
  {id:1288,q:"The new smartphones are designed to be ——– to dust and water, enhancing their durability.",options:["resisted","resistant","resist","resistance"],answer:1,type:"<strong>品詞問題</strong>",explanation:"空所の前に be動詞 to be があり、後ろは前置詞 to にdust and water（ほこりと水）が続いています。空所に形容詞(B) resistant（耐性のある）を入れると、be resistant to dust and water（ほこりと水に耐性のある）で意味が通ります。したがって、 (B) resistant（耐性のある）を選びます。",translation:"新しいスマートフォンは、耐久性を高めるため、埃や水に強いように設計されています。"},
  {id:1289,q:"We expect the software update to enhance system performance dramatically ——– weeks of its rollout.",options:["during","several","just","within"],answer:3,type:"<strong>複合型語彙問題</strong>",explanation:"空所の前はenhance system performance dramatically（システムのパフォーマンスが劇的に向上する）、空所の後ろは weeks of its rollout で名詞句なので、空所には前置詞が適切です。選択肢の中で前置詞は (A) during （～の間）と (D) within（～以内） の2つあります。",translation:"ソフトウェアのアップデートにより、市場への投入から数週間以内にシステムのパフォーマンスが劇的に向上すると予想されます。"},
  {id:1290,q:"Karina Bhat’s involvement in the ——– legal case has attracted significant media attention.",options:["controversially","controversial","controversies","controversy"],answer:1,type:"<strong>品詞問題</strong>",explanation:"空所の前後を中心に見ていきます。空所の前が the、後ろが名詞句 legal case（訴訟）、その後に動詞has attractedが続きます。したがって、空所には名詞句 legal case（訴訟）を修飾する形容詞が入ることがわかります。選択肢の中で形容詞は、(B) controversial（物議を醸す）でこれを選びます。",translation:"物議を醸す訴訟へのKarina Bhatさんの関与は、メディアの大きな注目を集めました。"},
  {id:1291,q:"The decision to delay the product launch ——– costly as competitors introduced similar products first.",options:["deemed","assessed","proved","established"],answer:2,type:"<strong>語彙問題</strong>",explanation:"空所の後ろは形容詞 costly（費用がかかる）なので、空所には主語を補語につなぐ動詞（第2文型を取る一般動詞）が入ることがわかります。選択肢の中で第2文型を取る一般動詞は(C) proved（判明する、わかる）のみです。",translation:"競合他社が先に同様の製品を導入したため、製品発売を遅らせた決定は、コストがかさむことが判明しました。"},
  {id:1292,q:"Air quality in the factory is monitored ——– to protect workers from hazardous conditions.",options:["continue","continuous","continuously","continuity"],answer:2,type:"<strong>品詞問題</strong>",explanation:"空所の前はbe動詞isに動詞の過去分詞 monitored（監視された）が続き、後ろは to不定詞 to protectです 。したがって、空所には動詞を動詞の過去分詞 monitored（監視された）を修飾する副詞が入ることがわかります。選択肢の中で副詞は、(C) continuously（継続的に）でこれを選びます。",translation:"工場内の空気の質は、労働者を危険な状態から保護するために継続的に監視されています。"},
  {id:1293,q:"——– Trattoria Toscana is a favorite for family dinners, Corporate Plaza is preferred for corporate events.",options:["In case","Only if","When","While"],answer:3,type:"<strong>語彙問題</strong>",explanation:"カンマまでの意味が「Trattoria Toscanaは家族での夕食に人気があります（Trattoria Toscana is a favorite for family dinners）」、カンマ以降の意味が「Corporate Plazaは企業イベントに好まれます（Corporate Plaza is preferred for corporate events）」です。",translation:"Trattoria Toscanaは家族での夕食に人気がありますが、企業イベントにはCorporate Plazaが好まれます。"},
  {id:1294,q:"Victoria Turner could not ——– her excitement when she received the acceptance letter from her first-choice university.",options:["concealing","conceal","be concealed","to conceal"],answer:1,type:"<strong>動詞問題</strong>",explanation:"空所の前に助動詞 could not があるので、空所には動詞の原形が入ることがわかります。選択肢の中で動詞の原形は 能動態の(B) conceal（隠す）と受動態の(C) be concealed（隠された）です。",translation:"Victoria Turnerさんは、第一志望の大学から合格通知を受け取ったとき、興奮を隠すことができませんでした。"},
  {id:1295,q:"The selection of organic products at Fresh Feast Deli is ——– extensive, catering to a niche market.",options:["soon","fast","quite","well"],answer:2,type:"<strong>語彙問題</strong>",explanation:"空所の後ろは形容詞 extensive（幅広い）なので、空所には形容詞extensive（幅広い）を修飾する副詞が入ります。選択肢の中で適切なのは (C) quite（かなり）です。",translation:"Fresh Feast Deliのオーガニック製品の品揃えは非常に幅広く、ニッチな市場に対応しています。"},
  {id:1296,q:"We needed ——–— action on the proposal because the opportunity would not be available for long.",options:["extended","essential","affordable","immediate"],answer:3,type:"<strong>語彙問題</strong>",explanation:"空所に入る形容詞は空所の後の名詞action（行動）を修飾します。because以下の意味は「機会が長くは続かないため」ということから、「即時の行動」をとる必要があると考えるのが自然です。したがって、(D) immediate（即時の）を選びます。",translation:"機会が長くは続かないため、私たちは提案に対して即時の行動をとる必要がありました。"},
  {id:1297,q:"According to recent polls, Ms. Johnson is ——– to win the election by a significant margin.",options:["over","likely","ahead","finely"],answer:1,type:"<strong>複合型語彙問題</strong>",explanation:"空所の前に be動詞 is、後ろは to不定詞 to win the election があります。空所に(B) likely（～しそうである、～する可能性が高い）を入れると、「選挙に勝利する可能性が高い」となって意味が通ります。したがって、(B) likely（～する可能性が高い）を選びます。",translation:"最近の世論調査によると、Johnsonさんはかなりの差をつけて選挙に勝利する可能性が高いです。"},
  {id:1298,q:"Fen Jiang called for an urgent meeting ——– poor responses to the marketing campaign.",options:["excluding","failing","concerning","following"],answer:3,type:"複合型語彙問題",explanation:"空所の前が「Fen Jiangさんは、緊急会議を招集した（Fen Jiang called for an urgent meeting）」、空所の後ろは「マーケティングキャンペーンへの芳しくない反応（poor responses to the marketing campaign）」という意味です。",translation:"Fen Jiangは、マーケティングキャンペーンへの反応が芳しくなかったことを受けて、緊急会議を招集しました。"},
  {id:1299,q:"Even after decades, the techniques developed by Dr. Braun are ——– very relevant to modern surgery.",options:["early","quite","still","more"],answer:2,type:"<strong>語彙問題</strong>",explanation:"空所の後ろは副詞 very と形容詞 relevant（関連性のある）です。空所に(C) still ill（今でも、以前として）を入れて「依然として非常に関連性がある」とすると意味が通ります。したがって、 (C) still（今でも、以前として）を選びます。",translation:"数十年の時を経ても、Braun博士によって開発された技術は、現代の外科手術において依然として非常に関連性があります。"},
  {id:1300,q:"Comprehensive manuals for ——– in operating LPLN Solutions equipment are now available online.",options:["user","useful","used","use"],answer:3,type:"<strong>品詞問題</strong>",explanation:"空所の前後を中心に見ていきます。空所の前がComprehensive manuals（包括的なマニュアル）に前置詞 forが続き、後ろが前置詞 inなので、空所には名詞が入ることがわかります。選択肢の中で名詞は、(A) user（使用者）と (D) use（使用）があります。",translation:"LPLN Solutionsの機器を操作する際に使用のための包括的なマニュアルをオンラインで入手できるようになりました。"},
  {id:1301,q:"Modifications to the ——– model significantly improved its performance.",options:["originally","origins","original","origin"],answer:2,type:"<strong>品詞問題</strong>",explanation:"空所の前は冠the、後ろは名詞 model （モデル）に副詞significantly（大幅に、著しく）が続きます。したがって、空所には名詞 model を修飾する形容詞が入ります。選択肢の中で形容詞は (C) original（元の）でこれを選びます。",translation:"元のモデルへの修正は、そのパフォーマンスを大幅に向上させました。"},
  {id:1302,q:"Residents should ——– the maintenance team about any issues with facilities without delay.",options:["speak","inform","respond","inquire"],answer:1,type:"<strong>語彙問題</strong>",explanation:"空所の後ろは the maintenance team（メンテナンスチーム）で、その後に about any issues（問題について）と続きます。この文脈で適切な動詞は (B) inform（知らせる、通知する）です。",translation:"住民は、施設に関する問題があれば、遅滞なくメンテナンスチームに通知する必要があります。"},
  {id:1303,q:"The Humson Company has launched a loyalty program to encourage customers ——– their new product lines.",options:["to patronize","patronized","patronize","be patronizing"],answer:0,type:"<strong>動詞問題</strong>",explanation:"空所の前の動詞 encourage（促す、奨励する）はencourage + 目的語 + to不定詞の形をとります。したがって空所にはto不定詞が入ると考えられます。選択肢の中でto不定詞は、(A) to patronize（ひいきにする、利用する）です。",translation:"Humson Companyは、顧客に新しい製品ラインを利用してもらうよう奨励するために、ロイヤルティプログラムを開始しました。"},
  {id:1304,q:"Ms. Okimoto shared ——– insights on global market trends at the international business conference.",options:["she","her","hers","herself"],answer:1,type:"<strong>代名詞問題</strong>",explanation:"空所の前が動詞shared（共有した）、後ろは名詞 insights（洞察） です。したがって空所には名詞 insights（洞察）を修飾する所有格の(B) her が適切です。",translation:"Okimotoさんは、国際ビジネス会議で世界の市場トレンドに関する彼女の洞察を共有しました。"},
  {id:1305,q:"The International Association of Industrial Chemists aims to make research publications ——– to all members.",options:["cutting","permitted","affordable","necessary"],answer:2,type:"<strong>語彙問題</strong>",explanation:"空所の前はmake researchpublications（研究出版物を…にする）であり、空所の後ろには to all members（すべての会員に）があります。「すべての会員に対して研究出版物を手頃な価格にする」とすると意味が通るので (C) affordable（手頃な価格の）を選びます。",translation:"International Association of Industrial Chemistsは、すべての会員が手頃な価格で研究出版物を入手できることを目指しています。"},
  {id:1306,q:"——– you need a floral arrangement quickly, Fulsome Flowers offers same-day delivery services.",options:["When","Now","As if","After all"],answer:0,type:"<strong>接続詞・副詞問題</strong>",explanation:"空所の後ろは you need で主語+動詞、カンマ以降はFulsome Flowers offers で主語+動詞です。これは上の１のパターンで空所には接続詞が入ることがわかります。",translation:"すぐにフラワーアレンジメントを必要とする場合、Fulsome Flowers は当日配達サービスを提供しています。"},
  {id:1307,q:"Echegaray Consulting Inc. ——– Jeffrey Pak as the leader of their new technology integration team.",options:["granted","named","founded","permitted"],answer:1,type:"<strong>語彙問題</strong>",explanation:"空所の後ろは Jeffrey Pak as the leader of their new technology integration team（ジェフリー・パク氏を新しいテクノロジー統合チームのリーダーとして）です。この文脈で適切な動詞は (B) named（任命した）です。",translation:"Echegaray Consulting Inc.は、Jeffrey Pakさんを新しいテクノロジー統合チームのリーダーに任命しました。"},
  {id:1308,q:"To attract more tenants, the Tabor Building’s management improved the lobby by ——– the overall decor and furniture.",options:["light","lightly","lighten","lightening"],answer:3,type:"<strong>品詞または動詞問題</strong>",explanation:"空所の前に前置詞 by があり、後ろに名詞句 the overall decor and furniture が続いています。この構造から、空所には名詞句 the overall decor and furnitureを目的語とする動名詞が適切です。選択肢の中で動名詞は (D) lightening （明るくすること）です。",translation:"より多くのテナントを誘致するために、Tabor Buildingの経営陣は、全体の装飾と家具を明るくすることでロビーを改善しました。"},
  {id:1309,q:"Visitors are very ——– by the museum’s extensive collection and informative displays.",options:["impressive","impressing","impressed","impress"],answer:2,type:"品詞または動詞問題",explanation:"空所の前がbe動詞areに副詞のveryです。候補として、(A) impressive （形容詞：印象的な）、(B) impressing（形容詞：印象付ける 動詞impress「印象付ける」の現在分詞形）、(C) impressed（形容詞：印象付けられて 動詞impress「印象付ける」の過去または過去分詞形）があります。",translation:"訪問者は、博物館の広範なコレクションと有益な展示に非常に感銘を受けています。"},
  {id:1310,q:"As a volunteer coordinator, Jin-Sook Kim ——– organizes weekend events to benefit local charities.",options:["hardly","severely","tirelessly","densely"],answer:2,type:"<strong>語彙問題</strong>",explanation:"空所の後の動詞と目的語を見ます。organizes weekend events to benefit local charities（地元の慈善団体に利益をもたらす週末のイベントを企画する）と合うのは(C) tirelessly（精力的に、疲れを知らずに）です。",translation:"ボランティアコーディネーターとして、Jin-Sook Kimさんは、地元の慈善団体に利益をもたらす週末のイベントを精力的に企画しています。"},
  {id:1311,q:"Youssouf Electronics offers training programs to ensure their staff maintains extensive ——– of their products.",options:["know","known","knowledgeable","knowledge"],answer:3,type:"品詞または動詞問題",explanation:"空所の前に形容詞 extensive（広範な） があり、後ろに前置詞 of が続いています。この構造から、空所には形容詞 extensive （広範な）が修飾する名詞が適切です。したがって、 (D) knowledge（知識）を選びます。",translation:"Youssouf Electronicsは、スタッフが製品に関する広範な知識を維持できるように、研修プログラムを提供しています。"},
  {id:1312,q:"Adjustments to the budget ——– may be necessary due to unexpected project costs.",options:["requirements","deliveries","developers","qualities"],answer:0,type:"<strong>語彙問題</strong>",explanation:"空所の前にAdjustments to the budget（予算の調整）というフレーズがあり、「予算に関連するもの」が空欄に入ります。選択肢の中で予算と最も関連が深いのは「要件」を意味する(A) requirements（要件、必要条件）でこれを選びます。",translation:"予期せぬプロジェクト費用のため、予算要件の調整が必要になる可能性があります。"},
  {id:1313,q:"We strive to keep ——– inventory levels optimized to meet customer demand efficiently.",options:["we","our","us","ours"],answer:1,type:"<strong>代名詞問題</strong>",explanation:"空所の後ろは名詞句 inventory levels（在庫レベル）で、空所の前には動詞 keep があります。この構造から、空所には詞句 inventory levels（在庫レベル）を修飾する所有格の代名詞が入ることがわかります。選択肢の中で所有格の代名詞は (B) our （私たちの）です。",translation:"私たちは、顧客の需要に効率的に対応するために、在庫レベルを常に最適化しようと努めています。"},
  {id:1314,q:"Mr. Belmore will review the report ——– there are any errors before the final submission.",options:["rather than","in case","such as","unless"],answer:1,type:"<strong>接続詞・前置詞問題</strong>",explanation:"空所の前は、Mr. Belmore will reviewで主語+動詞、後ろは there are any errors で主語+動詞です。これは上の２のパターンに該当し、空所には接続詞が入ることがわかります。選択肢の中で接続詞は (A) rather than（～ではなく）、(B) in case（ 万が一～に備えて）、(D) unless（～でない限り）があります。",translation:"Belmoreさんは、最終提出前にエラーがある場合に備えて、報告書を見直すでしょう。"},
  {id:1315,q:"The profits from the joint venture were equally ——– among all participating companies to ensure fairness.",options:["divide","dividing","divisions","divided"],answer:3,type:"<strong>品詞または動詞問題</strong>",explanation:"空所の前にbe動詞wereと副詞 equally （等しく）があり、後ろに前置詞 among （～の間で）が続いています。「～の間で等しく分けられた」とすると意味が通るので過去分詞の(D) divided（分配された）を選びます。",translation:"合弁事業からの利益は、公平性を確保するためすべての参加企業間で等しく分けられました。"},
  {id:1316,q:"To ensure consistent service, Ashley’s Beauty Salon applies rigorous training ——– to all new employees.",options:["institutions","features","risks","standards"],answer:3,type:"<strong>語彙問題</strong>",explanation:"空所の前は動詞applies（適用する）にrigorous training（厳格な研修）が続き、空所の後ろは to all new employees（すべての新しい従業員に対して）です。空所には、従業員研修の内容に関する名詞が入ります。選択肢の中で適切なのは (D) standards（基準）でこれを選びます。",translation:"Ashley’s Beauty Salonは、一貫したサービスを確保するために、すべての新しい従業員に対して厳格な研修基準を適用しています。"},
  {id:1317,q:"Each participant will be provided ——– a feedback form at the end of the workshop.",options:["for","with","to","of"],answer:1,type:"<strong>語彙問題</strong>",explanation:"空所の前がbe provided（提供された）、後ろは名詞句 a feedback form（フィードバックフォーム）です。",translation:"各参加者には、ワークショップの終了時にフィードバックフォームが配布されます。"},
  {id:1318,q:"During the workshop, Ms. Kimura will ——– a certificate to participants who successfully complete the course.",options:["achieve","present","involve","reach"],answer:1,type:"<strong>語彙問題</strong>",explanation:"空所の後ろは a certificate to participants（参加者に証明書を～する）という意味になります。この文脈で適切な動詞は (B) present（贈呈する、渡す）です。",translation:"ワークショップの間、Kimuraさんは、コースを無事修了した参加者に証明書を贈呈します。"},
  {id:1319,q:"Dr. Giordano emphasized that the recent policy changes had ——– to do with his research.",options:["everything","nothing","those","themselves"],answer:0,type:"<strong>代名詞問題</strong>",explanation:"空所の前に had があり、後ろは to do with his research が続いています。この構造から、空所には had と to do with を繋ぐ代名詞が必要となります。have nothing to do with ～（～と全く関係がない）の形から、(B) nothing（何も～ない）が適切です。",translation:"Giordano博士は、最近の政策変更は自身の研究に全く関係ないことを強調しました。"},
  {id:1320,q:"Employees at Corman Corporation participate in a team-building activity ——– a month.",options:["immediately","once","directly","yet"],answer:1,type:"<strong>語彙問題</strong>",explanation:"空所の後ろは a month（1か月）で、空所の前に動詞 participate in（～に参加する） があります。この文脈で適切な副詞は (B) once（一度）です。「月に一度、～に参加する」という意味になります。",translation:"Corman Corporationの従業員は、月に一度チームビルディング活動に参加します。"},
  {id:1321,q:"While Mr. Chapworth ——– the leadership role, the company saw unprecedented growth.",options:["occupying","occupational","occupation","occupied"],answer:3,type:"<strong>品詞または動詞問題</strong>",explanation:"While は接続詞で、主語Mr. Chapworthからカンマまでに動詞（述語動詞）が必要ですが、動詞がありません。選択肢のなかで述語動詞になれるのは、過去形の(D) occupied（～の〕地位を占めた）のみです。主節の時制（sawで過去時制）とも一致します。",translation:"Chapworthさんがリーダーシップの役割を担っている間、会社は前例のない成長を遂げました。"},
  {id:1322,q:"——– the redevelopment project, Pineville City has attracted more small business investors.",options:["On behalf of","Moreover","Whether","As a result of"],answer:3,type:"<strong>接続詞・前置詞・副詞問題</strong>",explanation:"空所の後ろは the redevelopment project（再開発プロジェクト）という名詞句で、カンマ以降は Pineville City has attracted で主語+動詞です。これは、上の３のパターンに該当し、空所には前置詞が入ることがわかります。(D) As a result of のみです。",translation:"再開発プロジェクトの結果として、Pineville Cityはより多くの小規模事業投資家を引き付けてきました。"},
  {id:1323,q:"The old equipment is outdated, prompting the need for a ——– to maintain efficiency.",options:["replace","replacing","replacement","replaces"],answer:2,type:"品詞問題",explanation:"空所の前に冠詞 a があり、後ろに to不定詞 to maintain efficiency が続いています。この構造から、空所には名詞が入り、(C) replacement（交換、代替品）を選びます。",translation:"古い機器は時代遅れで、効率を維持するために交換する必要があります。"},
  {id:1324,q:"Ms. Karl will review your proposal ——– she finishes her meeting with the executive board later today.",options:["then","once","as well","that"],answer:1,type:"<strong>接続詞・副詞問題</strong>",explanation:"空所の前はMs. Karl will reviewで主語+動詞、後ろは she finishesで主語+動詞です。これは上の２のパターンで空所には接続詞が入ることがわかります。",translation:"Karlさんは、今日中に取締役会との会議を終えたら、あなたの提案を確認します。"},
  {id:1325,q:"Gabriella’s on Second handled the situation ——– when a customer complained about their meal.",options:["respect","respects","respectfully","respected"],answer:2,type:"<strong>品詞または動詞問題</strong>",explanation:"空所の前が動詞handled（対応した）に目的語the situation（状況）が続き、後ろが接続詞whenです。したがって空所には動詞 handled（対応した） を修飾する副詞が適切です。選択肢の中で副詞は (C) respectfully （丁重に）でこれを選びます。",translation:"Gabriella’s on Secondは、顧客が食事について苦情を申し立てた際に、丁重に対応しました。"},
  {id:1326,q:"As a renowned researcher, Ms. Bilecki will be ——– the team to lead our science division.",options:["recruiting","performing","joining","working"],answer:2,type:"<strong>語彙問題</strong>",explanation:"空所の後ろは the team to lead our science divisionです。「科学部門を率いるためにチームに加わる」とすると意味が通るので、(C) joining（加わる）が適切です。",translation:"著名な研究者であるBileckiさんは、私たちの科学部門を率いるためにチームに加わる予定です。"},
  {id:1327,q:"Visitors must be ——– that parking in reserved spaces can result in fines.",options:["awake","aligned","aware","adverse"],answer:2,type:"<strong>語彙問題</strong>",explanation:"空所の後ろは that parking in reserved spaces can result in fines（予約された場所に駐車すると罰金が科される可能性がある）という文です。空所には、この文の内容について認識していることを表す形容詞が適切です。したがって、 (C) aware（気づいて、認識して）を選びます。",translation:"訪問者は、予約された場所に駐車すると罰金が科される可能性があることに注意してください。"},
  {id:1328,q:"The building manager ensured the elevator had been ——– following the residents’ complaints.",options:["subscribed","prescribed","serviced","progressed"],answer:2,type:"<strong>語彙問題</strong>",explanation:"空所の前に the elevator had been（エレベーターが～された） があります。主語the elevatorに合うのが(C) serviced（点検された、整備された）です。 service（保守点検する、整備する）を覚えておきましょう。",translation:"ビルの管理人は、住民からの苦情を受けて、エレベーターが整備されたことを確認しました。"},
  {id:1329,q:"Our company’s strategy for entering Asian markets ——– by the executive team.",options:["to be developed","developing","is being developed","to develop"],answer:2,type:"<strong>動詞問題</strong>",explanation:"問題文の中で空所以外に動詞（述語動詞）がありません。したがって、空所には述語動詞が入ることがわかります。選択肢の中で、述語動詞になれるのは受動態の現在進行形(C) is being developed（開発されている）のみでこれを選びます。受動態なので、by以下の by the executive team（経営チームによって）とも合います。",translation:"私たちの会社のアジア市場参入戦略は、経営チームによって開発されています。"},
  {id:1330,q:"To succeed, small businesses should adopt ——– marketing strategies that reflect current trends.",options:["dismissive","innovative","demonstrative","restrictive"],answer:1,type:"<strong>語彙問題</strong>",explanation:"空所の後ろは名詞 marketing strategies（マーケティング戦略）で、空所の前には adopt（採用する）という動詞があります。この文脈で適切な形容詞は (B) innovative（革新的な）です。",translation:"成功するためには、小規模企業は現在のトレンドを反映した革新的なマーケティング戦略を採用すべきです。"},
  {id:1331,q:"We have had to postpone the dinner reservation at Sapphire Bistro ——– flight 302 was delayed.",options:["concerning","since","against","therefore"],answer:1,type:"<strong>接続詞・前置詞・副詞問題</strong>",explanation:"空所の前がWe have had to postponeで主語+動詞、空所の後ろは flight 302 was delayed （フライト302便が遅延した）で主語+動詞です。これは上の２のパターンに該当し、空所には接続詞が入ることがわかります。選択肢の中で接続詞は (B) since（～なので） のみでこれを選びます。",translation:"フライト302便が遅延したため、Sapphire Bistroでのディナーの予約を延期せざるを得なかった。"},
  {id:1332,q:"Our newsletter includes useful information ——– upcoming community events and initiatives.",options:["upon","about","across","except"],answer:1,type:"<strong>語彙問題</strong>",explanation:"空所の前がuseful information（役立つ情報）、後ろは upcoming community events and initiatives（今後の地域イベントと取り組み）です。「今後の地域イベントと取り組みに関する役立つ情報」と考えるのが適切なので(B) about （～について）を選びます。",translation:"私たちのニュースレターには、今後の地域イベントと取り組みに関する役立つ情報が掲載されています。"},
  {id:1333,q:"With improved forecasting models, Ms. Ortiz noted that financial risks have become ——–.",options:["predict","prediction","predictable","predictably"],answer:2,type:"<strong>品詞問題</strong>",explanation:"空所の前に主語financial risks（財務リスク）に動詞 have become（～になった）が続いています。空所にはbecomeの補語になる形容詞(C) predictable（予測可能な）が適切です。",translation:"改善された予測モデルにより、財務リスクが予測可能になったとOrtizさんは述べました。"},
  {id:1334,q:"Mr. Chen ——– a detailed analysis of the market trends for the upcoming board meeting.",options:["informed","deserved","advised","requested"],answer:3,type:"<strong>語彙問題</strong>",explanation:"空所の後ろは a detailed analysis of the market trends（市場トレンドの詳細な分析を～する）という名詞句です。空所には、分析を要求することを表す動詞が適切なので、 (D) requested（要求した）を選びます。",translation:"Chenさんは、今後の取締役会のために、市場トレンドの詳細な分析を要求しました。"},
  {id:1335,q:"Henford Trust’s efforts in sustainability have paid off, enhancing its reputation ——–.",options:["generally","overall","consecutively","together"],answer:1,type:"<strong>語彙問題</strong>",explanation:"空所の前には enhancing（高める）という動詞があり、その後に目的語のits reputation（その評判）があります。この文脈で適切な副詞は (B) overall（全体として）です。",translation:"Henford Trustの持続可能性への取り組みは実を結び、全体的な評判を高めました。"},
  {id:1336,q:"Based on past data, Ms. Agbayani offered a ——– estimate for future growth potential.",options:["conserve","conserves","conservative","conservatively"],answer:2,type:"<strong>品詞または動詞問題</strong>",explanation:"空所の前は冠詞a、後ろは名詞 estimate（見積もり） があり、空所には名詞 estimate を修飾する形容詞が入ります。選択肢の中で形容詞は (C) conservative （控えめの、保守的な）でこれを選びます。",translation:"過去のデータに基づいて、Agbayaniさんは将来の成長の可能性について控えめな見積もりを提示しました。"},
  {id:1337,q:"Although Marson and Co. and Busan Cosmetics differ in size, ——– achieved significant growth last quarter.",options:["everybody","several","some","both"],answer:3,type:"<strong>代名詞問題</strong>",explanation:"空所の前はAlthough Marson and Co. and Busan Cosmetics differ in size（Marson and Co. と Busan Cosmetics は規模が異なりますが）という意味で、空所の後ろは achieved significant growth last quarter（昨年四半期に大幅な成長を遂げました）という文です。",translation:"Marson and Co. と Busan Cosmetics は規模が異なりますが、どちらも直前の四半期に大幅な成長を遂げました。"},
  {id:1338,q:"In terms of processing speed, this new computer is ——– to the top models currently on the market.",options:["appropriate","reasonable","equivalent","significant"],answer:2,type:"<strong>語彙問題</strong>",explanation:"空所の前は、this new computer（この新しいコンピューター）にbe動詞isが続き、空所の後ろは to the top models currently on the market （現在市場に出回っている最上位モデルに）です。",translation:"処理速度に関して、この新しいコンピューターは現在市場に出回っている最上位モデルと同等です。"},
  {id:1339,q:"——– his expertise in finance, Conner Goodman is an accomplished classical guitarist.",options:["According to","In addition to","Inside","Within"],answer:1,type:"<strong>語彙問題",explanation:"空所の後ろは his expertise in finance（彼の金融に関する専門知識）という名詞句で、カンマ以降は Conner Goodman is an accomplished classical guitarist（Conner Goodmanさんは腕の立つクラシックギター奏者です）という文です。",translation:"金融に関する専門知識に加えて、Conner Goodmanさんは腕の立つクラシックギター奏者です。"},
  {id:1340,q:"Enhancements to our customer service processes will likely ——– increased client satisfaction.",options:["return from","restore to","research into","result in"],answer:3,type:"<strong>語彙問題</strong>",explanation:"空所の後ろは increased client satisfaction（顧客満足度の向上）という名詞句です。空所には、顧客満足度の向上という結果を表す句動詞が適切です。したがって、 (D) result in（～をもたらす）を選びます。",translation:"カスタマーサービスプロセスの強化は、おそらく顧客満足度の向上をもたらすでしょう。"},
  {id:1341,q:"——– it operates in a highly competitive market, Groundwater System Corporation has gained substantial market share by focusing on customer satisfaction.",options:["Before","Unless","Although","During"],answer:2,type:"<strong>接続詞・前置詞問題</strong>",explanation:"空所の後ろは it operates in で主語+動詞、カンマ以降はGroundwater System Corporation has gainedで主語+動詞です。これは上の１のパターンに該当し、空所には接続詞が入ることがわかります。",translation:"Groundwater System Corporationは、競争の非常に激しい市場で事業を行っていますが、顧客満足度を重視することで、大幅な市場シェアを獲得してきました。"},
  {id:1342,q:"It is our ——– to ensure that all employees understand the new safety guidelines.",options:["labor","responsibility","demand","observation"],answer:1,type:"<strong>語彙問題</strong>",explanation:"空所の後ろは to ensure that all employees understand the new safety guidelines（すべての従業員が新しい安全ガイドラインを理解することを確実にすること）という不定詞句です。Itは形式主語（仮主語）でto以下の不定詞とイコールの関係にあります。「すべての従業員が新しい安全ガイドラインを理解することを確実にするのは私たちの責任です」とすると意味が通ります。したがって、選択肢の中で適切なのは (B) responsibility（責任）です。",translation:"すべての従業員が新しい安全ガイドラインを理解することを確実にするのは私たちの責任です。"},
  {id:1343,q:"Candidates must showcase ——– skills through a series of practical tasks during the final interview.",options:["they","them","theirs","their"],answer:3,type:"<strong>代名詞問題</strong>",explanation:"空所の前には動詞 showcase （披露する）があり、後ろは名詞 skills（スキル）です。この構造から、空所には skills を修飾する所有格の代名詞が入ることがわかります。選択肢の中で所有格の代名詞は (D) their（彼・彼女らの）です。",translation:"候補者は、最終面接の際に、一連の実務的なタスクを通じて自身のスキルを披露する必要があります。"},
  {id:1344,q:"Logistos Advisors Inc. published a report detailing the relationship ——– supply chain efficiency and customer satisfaction.",options:["within","inside","around","between"],answer:3,type:"<strong>語彙問題</strong>",explanation:"空所の前がthe relationship（その関係）、空所の後ろは supply chain efficiency and customer satisfaction（サプライチェーン効率と顧客満足度）です。「サプライチェーン効率と顧客満足度との間の関係」とすると意味が通るので、(D) between（～の間の）を選びます。",translation:"Logistos Advisors Inc.は、サプライチェーン効率と顧客満足度の間の関係を詳しく説明したレポートを発行しました。"},
  {id:1345,q:"Explore HFI’s website to find a range of ——– promotional goods suited for your business needs.",options:["personally","personalized","personality","personalizes"],answer:1,type:"品詞または動詞問題",explanation:"空所の後ろは名詞句 promotional goods （販促商品）があり、空所には名詞句 promotional goods を修飾する形容詞が適切です。したがって形容詞 (B) personalized（ パーソナライズされた、特定の個人に合わせてカスタマイズされた）を選びます。",translation:"HFIのウェブサイトを探索して、ビジネスのニーズに合ったさまざまなパーソナライズされた販促商品を見つけてください。"},
  {id:1346,q:"Mr. Tran encouraged his team to participate in ——– workshops to enhance their skills.",options:["several","each","another","every"],answer:0,type:"<strong>数量形容詞問題</strong>",explanation:"空所の後ろが可算名詞の複数形workshops（ワークショップ）です。選択肢の中で可算名詞の複数形の前で使うことができるのは(A) several（いくつかの）のみです。",translation:"Tranさんは、チームのスキルアップのために、いくつかのワークショップに参加するよう促しました。"},
  {id:1347,q:"The ——– phase of the construction project is scheduled to begin in early spring to avoid weather delays.",options:["soon","always","next","like"],answer:2,type:"<strong>複合型語彙問題</strong>",explanation:"空所の前が冠詞The、後ろが名詞 phase（段階）です。したがって、空所には形容詞が入ることがわかります。形容詞は(C) next（次の）、(D) like（同様な，類似の.）です。「建設プロジェクトの次の段階は、天候による遅延を避けるために、早春に開始される予定です」とすると意味が通るので、(C) next（次の）を選びます。",translation:"建設プロジェクトの次の段階は、天候による遅延を避けるために、早春に開始される予定です。"},
  {id:1348,q:"Ms. Finch was delighted by the ——– that her grant application had been approved.",options:["notifying","notification","notify","notifies"],answer:1,type:"品詞または動詞問題",explanation:"空所の前に冠詞 the があり、後ろに that節 が続いています。この構造から、空所には冠詞 the と that の間に置かれる名詞が必要です。選択肢の中で名詞は (B) notification（通知）でこれを選びます。",translation:"Finchさんは、彼女の助成金申請が承認されたという通知に喜んだ。"},
  {id:1349,q:"Answers to frequently asked questions about our service ——– on our website’s support page.",options:["have found","can be found","may find","have to find"],answer:1,type:"<strong>動詞問題</strong>",explanation:"主語は空所の前のAnswers to frequently asked questions about our service（当社のサービスに関するよくある質問への回答）です。この中でキーワードはAnswers（回答）で、「回答は見つけられる」という受動態の関係が適切です。選択肢の中で受動態は (B) can be found のみでこれを選びます。",translation:"当社のサービスに関するよくある質問への回答は、ウェブサイトのサポートページで見つけることができます。"},
  {id:1350,q:"Our company’s excellent ——– contribute to high employee satisfaction rates.",options:["benefit","benefits","benefitted","beneficial"],answer:1,type:"品詞または動詞問題",explanation:"空所の前には所有格のOur company’sに形容詞excellent（優れた）、後ろには動詞contribute（貢献する）があります。したがって空所には名詞が適切で、動詞contributeが三人称単数形でないことから複数形の名詞が入ると判断できます。選択肢の中で複数形の名詞は(B) benefits（福利厚生）だけなので、これを選びます。",translation:"我が社の充実した福利厚生は、従業員満足度の高さに貢献しています。"},
  {id:1351,q:"Official ——– is necessary to verify your identity and address.",options:["freight","administration","documentation","authorization"],answer:2,type:"<strong>語彙問題</strong>",explanation:"空所の後ろは to verify your identity and address（あなたの身元と住所を確認するために）という不定詞句です。空所には、身元と住所を確認するために必要なものを表す名詞が入ります。選択肢の中で適切なのは (C) documentation（書類）です。",translation:"身元と住所を確認するために、正式な書類が必要です。"},
  {id:1352,q:"Our technical support team is trained to resolve ——– issue efficiently and courteously.",options:["most of","all","a few","each"],answer:3,type:"<strong>数量形容詞問題</strong>",explanation:"選択肢を見ると、most of、all、a few、eachが入っているので「数量形容詞問題」と考えられます。数量形容詞が修飾する名詞が可算、不可算であるか、可算の場合、単数か複数かについて確認します。",translation:"当社のテクニカルサポートチームは、それぞれの問題を効率的かつ丁寧に解決するよう訓練されています。"},
  {id:1353,q:"Our team plans to launch ——– 12 new products by the end of the year.",options:["at once","at least","for now","for good"],answer:1,type:"<strong>語彙問題</strong>",explanation:"空所の後ろは 12 new products （12の新製品）であり、空所の前には動詞 launch（発売する） があります。この文脈で適切なのは (B) at least（少なくとも）です。「少なくとも12の新製品を発売する」という意味になります。",translation:"私たちのチームは、年末までに少なくとも12の新製品を発売する予定です。"},
  {id:1354,q:"The latest statistics are showing ——– signs of growth in the tech sector.",options:["encouraging","encouraged","encourage","encouragement"],answer:0,type:"品詞または動詞問題",explanation:"空所の前が現在進行形のare showing（示している）、後ろは名詞 signs です。したがって、空所には名詞 signs （兆候）を修飾する形容詞（形容詞的な働きのある動詞の現在分詞と過去分詞を含む）が入ります。候補として(A) encouraging （励みになる）と(B) encouraged（励まされた）があります。",translation:"最新の統計によると、テクノロジー分野は心強い成長の兆しを見せています。"},
  {id:1355,q:"Abigail Brown wrote a detailed report ——– market trends that will affect our strategy.",options:["when","despite","concerning","because"],answer:2,type:"<strong>接続詞・前置詞問題</strong>",explanation:"空所の前が、Abigail Brown wroteで主語+動詞、空所の後ろはmarket trends that will affect our strategy（私たちの戦略に影響を与える市場のトレンド）で名詞句です。これは、上の４のパターンに該当し、空所には前置詞が入ることがわかります。",translation:"Abigail Brownさんは、私たちの戦略に影響を与える市場のトレンドに関する詳細なレポートを書きました。"},
  {id:1356,q:"Employee salaries are set to increase ——– 5 percent as part of the annual review process.",options:["across","after","from","by"],answer:3,type:"<strong>語彙問題</strong>",explanation:"空所の後ろは 5 percent（5パーセント）で、空所の前には increase（増加する）という動詞があります。空所には、増加の度合いを表す前置詞が入ります。選択肢の中で適切なのは (D) by （だけ）です。",translation:"従業員の給与は、年間評価プロセスの一環として、5パーセント増加する予定です。"},
  {id:1357,q:"Please ensure that your attire is ——– for the formal dinner event this evening.",options:["deliverable","appropriate","subsequent","urgent"],answer:1,type:"<strong>語彙問題</strong>",explanation:"空所の後ろは for the formal dinner event this evening（今夜の公式晩餐会のために）で、空所の前には名詞 attire（服装）があります。この文脈で適切な形容詞は (B) appropriate（適切な）です。",translation:"今夜の公式晩餐会にふさわしい服装でお越しください。"},
  {id:1358,q:"Akuna Allied Bank, ——– assets have tripled over the past decade, is now a top player in the market.",options:["how","what","whose","which"],answer:2,type:"<strong>関係詞問題</strong>",explanation:"空所の前に名詞 Akuna Allied Bank があり、後ろに名詞assets（資産）と動詞 have tripled が続いています。この構造から、空所には名詞 Akuna Allied Bank を先行詞とし、名詞assets（資産）を修飾する所有格の関係代名詞が必要です。選択肢の中で所有格の関係代名詞は (C) whose です。",translation:"過去10年間で資産が3倍になったAkuna Allied Bankは、現在市場のトッププレイヤーとなっています。"},
  {id:1359,q:"Visitors approached Broad Street Pier ——– due to the ongoing construction and safety warnings.",options:["cautious","cautiously","caution","cautiousness"],answer:1,type:"品詞問題",explanation:"空所の前は、主語Visitors（訪問者）に動詞approached（近づいた）と目的語Broad Street Pierがあります。",translation:"訪問者は、進行中の建設と安全上の警告のため、Broad Street Pierに慎重に近づきました。"},
  {id:1360,q:"We expect all team members to reply ——– when receiving internal communications.",options:["promptly","closely","likely","expressly"],answer:0,type:"<strong>語彙問題</strong>",explanation:"空所の後ろは when receiving internal communications（社内連絡を受け取ったとき）で、空所の前に動詞 reply があります。この文脈で適切な副詞は (A) promptly（迅速に）です。",translation:"私たちは、すべてのチームメンバーが社内連絡を受け取った際に迅速に返信することを期待しています。"},
  {id:1361,q:"Ms. Wilson ——– the committee to approve the budget increase, although she knew it would be a tough sell.",options:["was urged","had urged","will have urged","to have urged"],answer:1,type:"<strong>動詞問題</strong>",explanation:"空所の後ろは the committee to approve the budget increase（委員会に予算の増額を承認するように促す）という名詞句です。空所には、この名詞句を目的語として取る能動態の述語動詞が必要です。この条件に該当するのは、過去完了形の(B) had urgedと未来完了形の(C) will have urgedです。",translation:"ウィルソン氏は、予算増額が難しいことはわかっていましたが、委員会に承認するように促していました。"},
  {id:1362,q:"——– the storm last night, the Palace Theater’s performance went ahead without any interruptions.",options:["Because of","Except for","Prior to","Despite"],answer:3,type:"<strong>語彙問題</strong>",explanation:"空所の後ろは the storm last night （昨夜の嵐）という名詞句で、カンマ以降は the Palace Theater’s performance went ahead without any interruptions（Palace Theaterの公演は中断なく行われました）です。「昨夜の嵐にもかかわらず、Palace Theaterの公演は中断なく行われました」とすると意味が通るので、(D) Despite（～にもかかわらず）を選びます。",translation:"昨夜の嵐にもかかわらず、Palace Theaterの公演は中断なく行われました。"},
  {id:1363,q:"You can ——– install the Wayfarer 200 with just a few simple steps and basic tools.",options:["ease","easy","easily","easier"],answer:2,type:"<strong>品詞問題</strong>",explanation:"空所の前には助動詞 can があり、後ろには動詞 install があります。このことから空所には動詞 install を修飾する副詞が入ることがわかります。選択肢の中で副詞は (C) easily です。",translation:"簡単なわずか数ステップと基本的な工具だけで、Wayfarer 200 を簡単にインストールできます。"},
  {id:1364,q:"The project proposal includes the ——– of the cycling lane to promote greener transportation.",options:["thickness","widening","inflation","gain"],answer:1,type:"<strong>語彙問題</strong>",explanation:"空所の後ろは of the cycling lane（自転車レーンの～）で、空所には、自転車レーンに関する名詞が入ります。選択肢の中で適切なのは (B) widening（拡張）です。",translation:"プロジェクトの提案には、より環境に優しい交通手段を促進するために、自転車レーンの拡張が含まれています。"},
  {id:1365,q:"——– chief editor, Ms. Kimura regularly conducts workshops to improve the writing skills of her staff.",options:["Throughout","Aside","Plus","As"],answer:3,type:"<strong>接続詞・前置詞・副詞問題</strong>",explanation:"カンマ以降がMs. Kimura regularly conductsで主語+動詞、空所の後ろはchief editor（編集長）で名詞句です。これは上の３のパターンに該当し、空所には前置詞が入ることがわかります。",translation:"編集長として、Kimuraさんはスタッフのライティングスキルを向上させるために定期的にワークショップを開催しています。"},
  {id:1366,q:"Despite the team’s offer to assist, Dr. Wilson chose to complete the report by ——–.",options:["his","him","his own","himself"],answer:3,type:"<strong>代名詞問題</strong>",explanation:"空所の前に前置詞byがあり、その前のDr. Wilson chose to complete the report（Wilson博士は報告書を完成させることを選びました）は文として完結しています。",translation:"チームが支援を申し出たにもかかわらず、Wilson博士は一人で報告書を完成させることを選びました。"},
  {id:1367,q:"During the ceremony at Bentonside Bistro, Mr. Pak ——– an award for culinary excellence.",options:["congratulated","accepted","nominated","hoped"],answer:1,type:"<strong>語彙問題</strong>",explanation:"空所の後ろは an award for culinary excellence（優れた料理に対する賞）という名詞句です。空所には、賞を受け取ると考えるのが適切です。したがって、 (B) accepted（受賞した）を選びます。",translation:"Bentonside Bistroでの式典で、Pakさんは優れた料理に対する賞を受賞しました。"},
  {id:1368,q:"Professor Chu explained ——– how the chemical reactions occur during the experiment in today’s lecture.",options:["widely","precisely","relatively","dominantly"],answer:1,type:"<strong>語彙問題</strong>",explanation:"空所の後ろは how the chemical reactions occur（化学反応がどのように起こるか）という句で、空所の前には動詞 explained（説明した） があります。「化学反応がどのように起こるか正確に説明した」とすると意味が通るので、(B) precisely （正確に）が適切です。",translation:"Chu教授は今日の講義で、実験中に化学反応がどのように起こるかを正確に説明しました。"},
  {id:1369,q:"Energy efficiency assessments ——– at Ellicott Office Supplies as part of their sustainability program.",options:["will perform","would have performed","to be performed","are being performed"],answer:3,type:"動詞問題",explanation:"問題文の中に動詞（述語動詞）がないので、空所には述語動詞が必要です。主語がEnergy efficiency assessments（エネルギー効率評価）で、「エネルギー効率評価が行われる」という受動態の動詞が適切です。選択肢の中で、述語動詞になれて、かつ受動態は(D) are being performed（行われている）のみでこれを選びます。",translation:"Ellicott Office Suppliesでは、持続可能性プログラムの一環として、エネルギー効率評価が行われています。"},
  {id:1370,q:"Members of the loyalty program are eligible ——– exclusive deals and early access to new products.",options:["down","over","for","out"],answer:2,type:"<strong>語彙問題</strong>",explanation:"空所の前は、are eligible（資格のある）、後ろは exclusive deals and early access to new products（限定商品や新商品の早期入手）です。be eligible for ～（～に対して資格がある、～にふさわしい）の形から、(C) forが適切です。",translation:"ロイヤルティプログラムのメンバーは、限定商品や新商品の早期入手ができます。"},
  {id:1371,q:"The ——– of responsibilities among team members is crucial for the successful completion of the project.",options:["reputation","foundation","delegation","permission"],answer:2,type:"<strong>語彙問題</strong>",explanation:"空所の後ろは of responsibilities among team members（チームメンバー間の責任の～）という句で、空所の前には 冠詞the があります。空所には、チームメンバー間の責任に関する名詞が入ります。選択肢の中で適切なのは (C) delegation（委任）です。",translation:"チームメンバー間の責任の委任は、プロジェクトが成功裏に完了するために不可欠です。"},
  {id:1372,q:"——– introducing flexible working hours could boost morale and productivity among our staff.",options:["While","Outside","Every","Perhaps"],answer:3,type:"<strong>複合型語彙問題</strong>",explanation:"空所の後ろは introducing flexible working hours（フレックスタイム制を導入すること）が主語で could boost morale and productivity among our staff（スタッフ間の士気と生産性を高めることができるでしょう）が動詞+目的語で文として完結しています。したがって、空所には副詞が入ることが考えられ、(B) Outside（外に）と(D) Perhaps（もしかすると、たぶん）が候補になります。",translation:"フレックスタイム制を導入することで、もしかするとスタッフ間の士気と生産性を高めることができるかもしれません。"},
  {id:1373,q:"Mr. Pak has not ——– signed the necessary documents for the project’s commencement.",options:["already","yet","soon","still"],answer:1,type:"<strong>語彙問題</strong>",explanation:"空所の前に has not があり、空所の後ろは 動詞の過去分詞signed（署名した）があります。have/has not yet + 動詞の過去分詞の形から(B) yet（まだ）を選びます。",translation:"Pakさんは、プロジェクト開始に必要な書類にまだ署名していません。"},
  {id:1374,q:"Temperatures have been unusually high ——– the past few months, according to the data.",options:["while","over","onto","then"],answer:1,type:"接続詞・前置詞・副詞問題",explanation:"空所の前はTemperatures have been で主語+動詞、空所の後ろは the past few months（過去数か月）という名詞句です。これは上の４のパターンに該当し、空所には前置詞が入ることがわかります。",translation:"データによると、過去数か月にわたって気温が異常に高かった。"},
  {id:1375,q:"Any complaints regarding customer service should be addressed ——– to maintain our reputation.",options:["urgency","urgencies","urgently","urgent"],answer:2,type:"<strong>品詞問題</strong>",explanation:"空所の前はbe addressed（対処された）が続き、空所の後ろに to maintain our reputation（評判を維持するために）という不定詞があります。空所には動詞 の過去分詞addressed を修飾する副詞が入ることがわかります。選択肢の中で副詞は (C) urgently（緊急に） です。",translation:"顧客サービスに関する苦情はすべて、評判を維持するために、緊急に対処する必要があります。"},
  {id:1376,q:"Collaborating with the engineering team was helpful ——– the design flaw quickly.",options:["will solve","be solved","must solve","in solving"],answer:3,type:"<strong>動詞問題</strong>",explanation:"問題文の中にwasという動詞（述語動詞）がすでにあります。空所とwasの間にandなどの接続詞がないので、動詞（述語動詞）の形の(A) will solve、(B) be solved、(C) must solveは文法的に空所に置くことはできません。",translation:""},
  {id:1377,q:"Due to extensive feedback from early readers, several ——– to the book were necessary to clarify key concepts.",options:["ideas","essays","revisions","transitions"],answer:2,type:"<strong>語彙問題</strong>",explanation:"カンマの前が、Due to extensive feedback from early readers（初期の読者からの幅広いフィードバックにより）です。空所の後ろは to the book were necessary to clarify key concepts（本にいくつかの～を加える必要がありました）で、空所の前には several があります。空所には、本に対する変更点に関する名詞が適切です。したがって (C) revisions（修正）を選びます。",translation:"初期の読者からの幅広いフィードバックにより、重要な概念を明確にするために、本にいくつかの修正を加える必要がありました。"},
  {id:1378,q:"Our customer service team will respond to any ——– within 48 hours of receipt.",options:["corresponds","corresponding","correspondingly","correspondence"],answer:3,type:"<strong>品詞問題</strong>",explanation:"空所の前に 形容詞any があり、後ろは前置詞 within が続いています。この構造から、空所には名詞が入ることがわかります。選択肢の中で名詞は (D) correspondence（通信） のみです。",translation:"カスタマーサービスチームは、受領から48時間以内に、あらゆる通信に対応します。"},
  {id:1379,q:"The budget has been revised to include a reserve fund for ——– events that may arise this fiscal year.",options:["marginal","moderate","adjacent","unforeseen"],answer:3,type:"<strong>語彙問題</strong>",explanation:"空所の前は、The budget has been revised to include a reserve fund for（予算は、～のための予備資金を含むように修正されました）、後ろは events that may arise this fiscal year（この会計年度に発生する可能性のあるイベント）です。",translation:"予算は、この会計年度に発生する可能性のある予期せぬイベントのための予備資金を含むように修正されました。"},
  {id:1380,q:"Feedback from the public will be considered before finalizing the ——– initiative for urban development.",options:["proposed","proposing","proposal","propose"],answer:0,type:"品詞または動詞問題",explanation:"空所の前は冠詞the、空所の後には名詞 initiative（新たな取り組み） があり、これは空所に入る単語が initiative を修飾する語が形容詞（または形容詞的役割を持つ語）であることがわかります。選択肢の中で initiative を修飾できるのは形容詞的役割を持つ過去分詞 (A) proposed と現在分詞 (B) proposing です。意味的に「提案された新たな取り組み」とするのが自然なので (A) proposed が適切です。",translation:"都市開発のための提案された新たな取り組みを最終決定する前に、一般からの意見が考慮されます。"},
  {id:1381,q:"During the meeting, Mr. Ralston explained the ——– of the new marketing strategy to all department heads.",options:["turn","scope","grip","drive"],answer:1,type:"<strong>語彙問題</strong>",explanation:"空所の後ろは of the new marketing strategy（新しいマーケティング戦略の～）です。空所には、新しいマーケティング戦略の内容に関する名詞が入ります。選択肢の中で適切なのは (B) scope（範囲、規模）です。",translation:"ミーティングで、Ralstonさんは、新しいマーケティング戦略の範囲をすべての部長に説明しました。"},
  {id:1382,q:"Ms. Porter cannot initiate the project until she receives ——– from the compliance officer.",options:["authorize","authorized","to authorize","authorization"],answer:3,type:"品詞または動詞問題",explanation:"空所の前に 動詞receives（受け取る） があり、後ろに前置詞 from が続いています。この構造から、空所には動詞receives（受け取る）の目的語である名詞が適切です。選択肢の中で名詞は (D) authorization （承認）です。",translation:"Porterさんは、法令遵守担当責任者からの承認を受けるまで、プロジェクトを開始することはできません。"},
  {id:1383,q:"The new software package is now available at an affordable ——– for educational institutions.",options:["income","satisfaction","worth","rate"],answer:3,type:"<strong>語彙問題</strong>",explanation:"空所の後ろは for educational institutions（教育機関のために）で、空所の前には at an affordable （手頃な～で）があります。空所には、教育機関向けの価格に関する名詞が適切です。したがって、 (D) rate（料金）を選びます。",translation:"新しいソフトウェアパッケージは、現在、教育機関向けに手頃な価格で利用可能です。"},
  {id:1384,q:"Sales for the quarter fell ——– below expectations due to unforeseen market conditions.",options:["slighter","slight","slightly","slightest"],answer:2,type:"<strong>品詞問題</strong>",explanation:"空所の前は動詞 fell（下がった）、空所の後ろは前置詞句 below expectations（予想を下回って）なので、空所には動詞 fell を修飾する副詞が入ることがわかります。選択肢の中で副詞は (C) slightly（わずかに）です。",translation:"予期せぬ市場の状況のため、四半期の売上高は予想をわずかに下回りました。"},
  {id:1385,q:"——– ticket holders were allowed to participate in the raffle at the Great Angle Tennis Shop Fair.",options:["Only","Until","Unless","Quite"],answer:0,type:"<strong>接続詞・前置詞・副詞問題</strong>",explanation:"空所の後ろは ticket holders were allowedで主語+動詞のペアがひとつだけです。この形は上の4つのパターンのいずれにも該当せず、空所には接続詞や前置詞は入りません。",translation:"チケットを持っている人だけが、グレート・アングル・テニスショップフェアの抽選に参加することが許可されました。"},
  {id:1386,q:"In case of an emergency, residents ——– the hotline number provided in their welcome packet.",options:["are calling","may call","have been called","must be calling"],answer:1,type:"動詞問題",explanation:"カンマの前がIn case of an emergency（もし緊急の場合）です。この状況でthe hotline number provided in their welcome packet（歓迎用パッケージに記載されているホットライン番号）に「電話をしてもよい」とすると意味が通ります。したがって、(B) may call（電話してもよい）が適切です。",translation:"もし緊急の場合は、住民は歓迎用パッケージに記載されているホットライン番号に電話しても構いません。"},
  {id:1387,q:"Thanks to innovative ——–, seasonal fruits are available year-round at Riester’s Food Markets.",options:["preserve","preserved","preserves","preservation"],answer:3,type:"品詞または動詞問題",explanation:"空所の前に形容詞 innovative （革新的な）があり、後ろはカンマです。この構造から、空所には名詞が入ることがわかります。選択肢の中で名詞は (D) preservation （保存）です。",translation:"革新的な保存方法のおかげで、Riester’s Food Marketsでは、季節のフルーツを一年中手に入れることができます。"},
  {id:1388,q:"In her presentation, Gabriella Pierangeli included a ——– of her research findings.",options:["summarizer","summarily","summarized","summary"],answer:3,type:"<strong>品詞問題</strong>",explanation:"空所の前に a があり、後ろは名詞句 of her research findings （彼女の調査結果の）が続いています。この構造から、空所には名詞が入ることがわかります。選択肢の中で名詞は(A) summarizer （要約する人、要約を行うツール）と (D) summary（概要、要約）があります。「彼女の調査結果の概要」と考えるのが適切なので、(D) summary（概要、要約）を選びます。",translation:"Gabriella Pierangeliさんは、プレゼンテーションの中で、自身の調査結果の概要を盛り込みました。"},
  {id:1389,q:"The online booking system will be ——– unavailable due to scheduled maintenance this weekend.",options:["anytime","annually","considerably","temporarily"],answer:3,type:"<strong>語彙問題</strong>",explanation:"空所を除いた問題文の意味は「今週の週末は、定期メンテナンスのため、オンライン予約システムは利用できません」です。「一時的に利用できない」とすると意味が通るので、(D) temporarily（一時的に）を選びます。",translation:"今週の週末は、定期メンテナンスのため、オンライン予約システムは一時的に利用できません。"},
  {id:1390,q:"The new car model is not only stylish but also ——–, making it ideal for budget-conscious consumers.",options:["economy","economics","economically","economical"],answer:3,type:"<strong>品詞問題</strong>",explanation:"空所の前にbe動詞isにnot only stylish but also が続き、後ろがカンマです。空所には形容詞stylish（洗練された）と並ぶ形容詞が適切です。したがって、形容詞の(D) economical（経済的な）を選びます。",translation:"新しい車のモデルは洗練されているだけでなく、経済的でもあるため、予算を意識した消費者にとって理想的です。"},
  {id:1391,q:"All participants must ——– their applications by the end of the week to qualify.",options:["submitted","submitting","submit","be submitted"],answer:2,type:"<strong>動詞問題</strong>",explanation:"空所の前に助動詞 must があり、後ろは名詞句 their applications が続いています。この構造から、空所には名詞句を目的語として取る動詞の原形が入ることがわかります。選択肢の中で動詞の原形は (C) submit です。",translation:"すべての参加者は、資格を得るために今週の終わりまでに申請書を提出する必要があります。"},
  {id:1392,q:"The committee members met ——– to discuss the new strategic plan for growth.",options:["because","either","between","together"],answer:3,type:"<strong>接続詞・前置詞・副詞問題</strong>",explanation:"空所の前はThe committee members metで主語+動詞、空所の後ろは to discuss the new strategic plan for growth（成長のための新しい戦略計画を議論するために）という目的の不定詞です。これは、上の４つのパターンに該当せず、接続詞、前置詞ではなく副詞が候補になります。副詞は、(B) either（[either…or… で相関接続詞的に] …かまたは…か）、または(D) together（一緒に、共に）です。「一緒に会った」とすると意味が通るので、(D) together（一緒に、共に）を選びます。",translation:"委員会のメンバーは、成長のための新しい戦略計画を議論するために一堂に会した。"},
  {id:1393,q:"——– willingness to learn new languages has helped Ji-Min Choi effectively manage our international clients.",options:["Those","His","Whose","Which"],answer:1,type:"<strong>関係代名詞・代名詞問題</strong>",explanation:"空所の後ろは willingness to learn new languages（新しい言語を学ぶ意欲）で、その後に動詞を含むhas helped Ji-Min Choi effectively manage our international clients（Ji-Min Choiさんが私たちの国際的な顧客を効果的に管理するのに役立ってきました）があります。",translation:"新しい言語を学ぶ意欲は、Ji-Min Choiさんが私たちの国際的な顧客を効果的に管理するのに役立ってきました。"},
  {id:1394,q:"Production halted temporarily ——– damage to machinery while it was undergoing maintenance.",options:["according to","because of","by means of","in spite of"],answer:1,type:"<strong>語彙問題</strong>",explanation:"空所の前は Production halted temporarily（生産は一時的に停止した）で、空所の後ろは damage to machinery（機械の損傷）という名詞句です。",translation:"メンテナンス中に機械が損傷したため、生産は一時的に停止しました。"},
  {id:1395,q:"Please review and ——– the terms of the agreement before proceeding further.",options:["collaborate","converse","commune","confirm"],answer:3,type:"<strong>語彙問題</strong>",explanation:"空所の後ろは the terms of the agreement（契約の条項）という名詞句で、空所の前には review（見直す）という動詞があります。空所には、契約の条項について確認することを表す動詞が適切です。したがって、(D) confirm（確認する）を選びます。",translation:"先に進む前に、契約の条項を見直して確認してください。"},
  {id:1396,q:"Our campaign aims to increase awareness ——– environmental issues among local communities.",options:["to","of","from","with"],answer:1,type:"<strong>語彙問題</strong>",explanation:"空所の前の increase awareness は「認知度を高める」という意味で、空所の後には名詞句 environmental issues （環境問題）が続いています。",translation:"私たちのキャンペーンは、地域社会の間で環境問題に対する認識を高めることを目的としています。"},
  {id:1397,q:"The success of the Taste of Italy event was ——– the result of extensive marketing.",options:["parting","parted","partly","parts"],answer:2,type:"<strong>品詞問題</strong>",explanation:"通常、品詞問題では空所の前後を確認すれば絞り込めますが、この問題は前後だけ見て判断すると間違えます。空所の前がbe動詞was、空所の後がthe resultであることから、過去進行形と考えて(A) parting（動詞part「分割する」の現在分詞形）を選ぶかもしれません。",translation:"Taste of Italyイベントの成功は部分的には大規模なマーケティングの結果でした。"},
  {id:1398,q:"New regulations require that systems ——– better data protection and privacy controls.",options:["use up","believe in","make into","allow for"],answer:3,type:"<strong>語彙問題</strong>",explanation:"空所の後ろは better data protection and privacy controls（より良いデータ保護とプライバシー管理）という名詞句で、空所の前には主語systems（システム）です。空所には、システムが備えるべき機能を表す句動詞が適切です。したがって、 (D) allow for （～を可能にさせる、～という効果がある）を選びます。",translation:"新たな規制では、より優れたデータ保護とプライバシー管理を可能にするシステムが求められている。"},
  {id:1399,q:"The financial report from Rowes Atlantic Airways provided a ——– forecast for the next fiscal year.",options:["wealthy","compact","faithful","realistic"],answer:3,type:"<strong>語彙問題</strong>",explanation:"空所の後ろは 名詞forecast（予測）です。空所には、The financial report（財務報告書）に示された予測の内容を表す形容詞が入ります。選択肢の中で適切なのは (D) realistic （現実的な）です。",translation:"Rowes Atlantic Airwaysからの財務報告書は、次の会計年度の現実的な予測を示しました。"},
  {id:1400,q:"Ubero Hotels will accommodate any special requests ——– they are made in advance.",options:["as long as","along with","otherwise","not only"],answer:0,type:"<strong>接続詞・前置詞・副詞問題</strong>",explanation:"選択肢を見ると、接続詞、前置詞、副詞が入っているので「接続詞・前置詞・副詞問題」と考えられます。空所の後ろの形が主語+動詞であれば接続詞、空所の後ろの形が名詞句であれば前置詞が正解になります。",translation:"Ubero Hotelsは、事前に伝えられれば、どんな特別なリクエストにも対応します。"},
  {id:1401,q:"Customers complained that the packages arrived in poor ——– after the long shipment.",options:["conditioner","conditioned","condition","conditional"],answer:2,type:"<strong>品詞問題</strong>",explanation:"空所の前は形容詞poor（悪い）、後ろは前置詞after（～の後）が続きます。したがって、空所には形容詞poorが修飾する名詞が入ります。選択肢の中で名詞は(A) conditioner（名詞：コンディショナー、調整剤）と(C) condition（状態）がありますが、意味的に「荷物が悪い状態で届いた」とするのが自然なので(C) condition（状態）が適切です。",translation:"顧客は、長時間の輸送の後、荷物が悪い状態で届いたと苦情を言いました。"},
  {id:1402,q:"To address quality concerns, Falcon Crest Systems ——– the warranty for its professional camera line.",options:["extend","was extended","extending","has extended"],answer:3,type:"<strong>動詞問題</strong>",explanation:"問題文の中で空所以外に動詞（述語動詞）がありません。したがって、空所には述語動詞が入ることがわかります。選択肢の中で、述語動詞になれるのは(A) extend（現在形）、(B) was extended（受動態の過去形）、(D) has extended（現在完了形）があります。主語のFalcon Crest Systems（三人称単数）が「保証期間を延長する」という能動的な行為を表すため、(A) extend は三単現のsがないため不適切、(B) was extended は受動態で意味が合いません。したがって、現在完了形の(D) has extended（延長した）を選びます。",translation:"品質への懸念に対処するため、Falcon Crest Systemsは、プロ向けカメララインの保証期間を延長しました。"},
  {id:1403,q:"The board appointed Saul Ortega to ——– all marketing activities for the upcoming fiscal year.",options:["reduce","involve","disturb","oversee"],answer:3,type:"<strong>語彙問題</strong>",explanation:"空所の前にto不定詞があり、後ろはall marketing activities（すべてのマーケティング活動）が続きます。「取締役会がSaul Ortegaを任命して、来年度のすべてのマーケティング活動を監督する」とすると意味が通るので、(D) oversee（監督する、統括する）を選びます。",translation:"取締役会は、来年度のすべてのマーケティング活動を監督するためにSaul Ortegaを任命しました。"},
  {id:1404,q:"The management kept hiring new staff ——– the growing pressure to reduce operational expenses.",options:["because","even though","in case","despite"],answer:3,type:"<strong>接続詞・前置詞問題</strong>",explanation:"空所の後ろはthe growing pressure to reduce operational expenses（運営費を削減するという高まる圧力）という名詞句です。この構造から、上の４のパターンで空所には前置詞が入ることがわかります。選択肢の中で前置詞は(D) despite（～にもかかわらず）のみでこれを選びます。",translation:"経営陣は、運営費を削減する圧力が高まっていたにもかかわらず、新しいスタッフを雇い続けました。"},
  {id:1405,q:"Our contract states that Fulsome Flowers must ——– every order to our hotel within forty-eight hours.",options:["spend","prepare","report","deliver"],answer:3,type:"語彙問題",explanation:"空所の後ろはevery order to our hotel within forty-eight hours（48時間以内にすべての注文を私たちのホテルに～する）です。この文脈で適切な動詞は(D) deliver（配達する）です。",translation:"私たちの契約では、Fulsome Flowersは48時間以内にすべての注文を私たちのホテルに配達しなければならないと定められています。"},
  {id:1406,q:"Starr Transportation agreed to rent shipping ——– to small exporters at a discounted monthly rate.",options:["contained","contains","containing","containers"],answer:3,type:"<strong>品詞問題</strong>",explanation:"空所の前は形容詞shipping（輸送用の）、後ろは前置詞to（～に）が続きます。したがって、空所には形容詞shippingが修飾する名詞が入ります。選択肢の中で名詞は(D) containers（コンテナ）でこれを選びます。",translation:"Starr Transportationは、小規模輸出業者に割引された月額料金で輸送用コンテナを貸し出すことに同意しました。"},
  {id:1407,q:"Mr. Jack Vogel will meet several clients during ——– stay for the regional business conference.",options:["he","his","him","himself"],answer:1,type:"<strong>代名詞問題</strong>",explanation:"空所の前は前置詞during（～の間）、後ろは名詞stay（滞在）です。したがって、空所には名詞stayを修飾する所有格の代名詞が入ります。選択肢の中で所有格の代名詞は(B) his（彼の）でこれを選びます。",translation:"Jack Vogelさんは、地域ビジネス会議での滞在中に数名のクライアントと会う予定です。"},
  {id:1408,q:"The project manager will review ——– issue and assign tasks to the appropriate team members.",options:["most of","all","a few","each"],answer:3,type:"<strong>数量詞問題</strong>",explanation:"空所の後ろは可算名詞の単数issue（問題）です。選択肢の中で可算名詞の単数の前に置けるのは(D) each（それぞれの、各々の）のみです。(A) most of、(B) all、(C) a fewは複数名詞の前に置かれます。",translation:"プロジェクトマネージャーは、それぞれの問題を検討し、適切なチームメンバーにタスクを割り当てます。"},
  {id:1409,q:"Fen Jiang completed the financial report ——– and submitted it two days ahead of the deadline.",options:["hardly","effortlessly","increasingly","especially"],answer:1,type:"<strong>語彙問題</strong>",explanation:"空所の前の動詞completed（完了した）と後ろの文脈「締切の2日前に提出した」から、スムーズに作業を完了したことがわかります。この文脈で適切な副詞は(B) effortlessly（楽々と、労せずして）です。",translation:"Fen Jiangは財務報告書を楽々と完成させ、締切の2日前に提出しました。"},
  {id:1410,q:"According to the schedule, Barner Corporation ——– magazines to bookstores in three major metropolitan areas.",options:["orders","distributes","produces","notes"],answer:1,type:"語彙問題",explanation:"空所の後ろはmagazines to bookstores in three major metropolitan areas（3つの主要都市圏の書店に雑誌を～する）です。この文脈で適切な動詞は(B) distributes（配布する、流通させる）です。",translation:"スケジュールによると、Barner Corporationは3つの主要都市圏の書店に雑誌を配布します。"},
  {id:1411,q:"Karen Morris has ——– increased her team’s productivity through better training and clear communication.",options:["progressed","progress","progressive","progressively"],answer:3,type:"<strong>品詞問題</strong>",explanation:"空所の前に助動詞has があり、後ろは動詞increased（向上させた）が続きます。したがって、空所には動詞increasedを修飾する副詞が適切です。選択肢の中で副詞は(D) progressively（段階的に、着実に）でこれを選びます。",translation:"Karen Morrisは、より良い研修と明確なコミュニケーションを通じて、チームの生産性を段階的に向上させました。"},
  {id:1412,q:"Director Takashi Ota will make the ——– decision after carefully reviewing the project proposal.",options:["final","finals","finally","finalize"],answer:0,type:"<strong>品詞問題</strong>",explanation:"空所の前に冠詞the があり、後ろは名詞decision（決定）が続きます。したがって、空所には名詞decisionを修飾する形容詞が入ります。選択肢の中で形容詞は(A) final（最終の）でこれを選びます。",translation:"Takashi Ota部長は、プロジェクト提案を慎重に検討した後、最終決定を下します。"},
  {id:1413,q:"The brochure ——– new product features will be distributed to all participants at the trade show.",options:["may display","to be displayed","displaying","being displayed"],answer:2,type:"<strong>動詞問題</strong>",explanation:"空所の前は主語The brochure（パンフレット）、後ろはnew product features（新製品の特徴）、その後にwill be distributedという述語動詞が続きます。したがって、空所には名詞The brochureを修飾する分詞が入ります。「新製品の特徴を表示しているパンフレット」という能動的な意味から、現在分詞の(C) displaying（表示している）を選びます。",translation:"新製品の特徴を表示しているパンフレットは、展示会のすべての参加者に配布されます。"},
