  {id:1615,q:"Mr. Ahmed was pleased to receive official ——– about his promotion to senior analyst.",options:["notify","notification","notifying","notifies"],answer:1,type:"<strong>品詞問題</strong>",explanation:"空所の前は形容詞 official（公式の）、空所の後ろは前置詞 about（～について）です。したがって空所には名詞が入ります。選択肢の中で名詞は (B) notification（通知）でこれを選びます。",translation:"Ahmedさんは、シニアアナリストへの昇進についての公式通知を受け取って喜びました。"},
  {id:1616,q:"The report will be submitted ——– the finance department confirms the final figures.",options:["then","that","once","as well"],answer:2,type:"<strong>接続詞・副詞問題</strong>",explanation:"空所の前は、The report will be submittedで主語+動詞、後ろは the finance department confirms で主語+動詞です。これは上の２のパターンで接続詞が入ります。",translation:"財務部が最終数値を確認すると、報告書が提出されます。"},
  {id:1617,q:"The conference hall is now ——– booked through the end of December.",options:["fully","fullest","fullness","full"],answer:0,type:"<strong>品詞問題</strong>",explanation:"空所の前は be動詞isにnow（今）が続き、空所の後ろは動詞booked（予約された）です。したがって空所には動詞 booked を修飾する副詞が入ります。選択肢の中で副詞は (A) fully（完全に）でこれを選びます。",translation:"会議ホールは現在、12月末まで完全に予約されています。"},
  {id:1618,q:"The survey indicated customers were more satisfied ——– in previous fiscal years.",options:["with","past","than","by"],answer:2,type:"語彙問題",explanation:"空所の前は more satisfied（より満足した）で比較級の表現です。比較級と組み合わせて使う語は (C) than（～よりも）です。",translation:"調査によると、顧客は以前の会計年度よりも満足していました。"},
  {id:1619,q:"The new barcode scanner reads product labels ——– under poor lighting conditions.",options:["reliant","reliably","reliable","rely"],answer:1,type:"<strong>品詞問題</strong>",explanation:"空所の前は動詞reads（読み取る）と目的語product labels（製品ラベル）、空所の後ろは前置詞句 under poor lighting conditions（照明条件が悪い中で）です。したがって空所には動詞 reads を修飾する副詞が入ります。選択肢の中で副詞は (B) reliably（確実に）でこれを選びます。",translation:"新しいバーコードスキャナーは、照明条件が悪い中でも製品ラベルを確実に読み取ります。"},
  {id:1620,q:"The new accounting software works ——– with the company’s existing payroll system.",options:["perfectly","occasionally","recently","routinely"],answer:0,type:"<strong>語彙問題</strong>",explanation:"空所の前は works（機能する）、空所の後ろは with the company’s existing payroll system（会社の既存の給与システムと）です。「新しい会計ソフトウェアは会社の既存の給与システムと完璧に機能する」とすると意味が通るので (A) perfectly（完璧に）を選びます。",translation:"新しい会計ソフトウェアは、会社の既存の給与システムと完璧に機能します。"},
  {id:1621,q:"The directors ——– admitted that the financial forecasts were too optimistic last year.",options:["themselves","them","they","theirs"],answer:0,type:"<strong>代名詞問題</strong>",explanation:"空所の前は The directors（取締役たち）、空所の後ろは動詞 admitted（認めた）で次にthat節が続きます。文として完結しているので、この位置には強調を表す再帰代名詞 (A) themselves（彼ら自身）が適切です。",translation:"取締役たち自身が、昨年の財務予測があまりにも楽観的すぎたことを認めました。"},
  {id:1622,q:"——– traffic conditions, the airport shuttle may take up to one hour to arrive.",options:["Because","Depending on","Whereas","In order for"],answer:1,type:"<strong>接続詞・前置詞または語彙問題</strong>",explanation:"空所の後ろは traffic conditions（交通状況）で名詞句です。この前に来るのは前置詞の(B) Depending on（～次第で、～によって）または(D) In order for（～のために）です。「交通状況次第で」とすると意味が通るので (B) Depending on（～次第で、～によって）を選びます。",translation:"交通状況次第で、空港シャトルは到着まで最大1時間かかる場合があります。"},
  {id:1623,q:"The committee’s tasks were ——– according to members’ expertise and experience.",options:["divide","divisions","dividing","divided"],answer:3,type:"<strong>品詞または動詞問題</strong>",explanation:"空所の前は 主語The committee’s tasks （委員会の仕事）にbe動詞wereが続きます。「委員会の仕事はメンバーの専門知識と経験に従って分割された」とすると意味が通るので、受動態を表す過去分詞 (D) divided（分割された）を選びます。",translation:"委員会の仕事は、メンバーの専門知識と経験に従って分割されました。"},
  {id:1624,q:"Students under 18 are eligible ——– free entry to the City Museum.",options:["over","for","out","down"],answer:1,type:"<strong>語彙問題</strong>",explanation:"空所の前は eligible（資格がある）、空所の後ろは free entry（無料入場）です。eligible for は「～の資格がある」という意味で「無料入場の資格がある」とするのが適切です。したがって (B) for を選びます。",translation:"18歳未満の学生は、市立博物館への無料入場の資格があります。"},
  {id:1625,q:"To print a receipt, ——– click the confirmation button at the bottom of the page.",options:["enough","mostly","simply","quite"],answer:2,type:"<strong>語彙問題</strong>",explanation:"空所の前は To print a receipt（領収書を印刷するために）、空所の後ろは click the confirmation button（確認ボタンをクリックする）です。「領収書を印刷するために、ただページ下部の確認ボタンをクリックするだけです」とすると意味が通るので (C) simply（ただ、単に）を選びます。",translation:"領収書を印刷するには、ページ下部の確認ボタンを単にクリックするだけです。"},
  {id:1626,q:"GreenJet Logistics lowered costs by ——– unnecessary items from freight containers.",options:["lighten","lightening","light","lightly"],answer:1,type:"<strong>品詞または動詞問題</strong>",explanation:"空所の前は前置詞 by（～することによって）です。前置詞の後ろには動名詞を含む名詞句が来ます。空所の後ろは、unnecessary items（不必要な品目）で、動名詞(B) lightening（軽くすること）の目的語とするとうまくつながります。したがって (B) lightening（軽くすること）を選びます。",translation:"GreenJet Logisticsは、貨物コンテナから不要な品目を取り除いて軽くすることによってコストを削減しました。"},
  {id:1627,q:"After numerous delays, the bridge construction was ——– completed in September.",options:["generally","eventually","thoroughly","distinctly"],answer:1,type:"<strong>語彙問題</strong>",explanation:"空所の前は After numerous delays（数々の遅延の後）、空所の後ろは completed in September（9月に完成した）です。「数々の遅延の後、橋の建設は最終的に9月に完成した」とすると意味が通るので (B) eventually（最終的に）を選びます。",translation:"数々の遅延の後、橋の建設は最終的に9月に完成しました。"},
  {id:1628,q:"The sales representative offered a ——– reason to choose Harrod Tech’s new product.",options:["convincing","convince","convincingly","convinced"],answer:0,type:"<strong>品詞問題</strong>",explanation:"空所の前は冠詞 a、後ろは名詞 reason（理由）です。したがって、空所には名詞 reason を修飾する形容詞が入ります。選択肢の中で形容詞は (A) convincing（説得力のある）と (D) convinced（確信した、納得した）ですが、「理由が説得力がある」という意味で (A) convincing を選びます。",translation:"営業担当者は、Harrod Techの新製品を選ぶ説得力のある理由を提示しました。"},
  {id:1629,q:"The list of conference participants ——– in the registration office near the lobby.",options:["have to find","have found","may find","can be found"],answer:3,type:"<strong>動詞問題</strong>",explanation:"主語は The list（リスト）で単数、空所の後ろは in the registration office（登録事務所で）という場所を表す前置詞句です。「会議参加者のリストはロビー近くの登録事務所で見つけることができる」という受動態が適切です。したがって、受動態の(D) can be found（見つけることができる）を選びます。",translation:"会議参加者のリストは、ロビー近くの登録事務所で見つけることができます。"},
  {id:1630,q:"The mayor set up a ——– to gather feedback from local business owners.",options:["committee","frontier","building","member"],answer:0,type:"<strong>語彙問題</strong>",explanation:"空所の前は set up a（～を設立した）、空所の後ろは to gather feedback（フィードバックを集めるために）です。「市長は地元の事業主からフィードバックを集めるために委員会を設立した」とすると意味が通るので (A) committee（委員会）を選びます。",translation:"市長は、地元の事業主からフィードバックを集めるために委員会を設立しました。"},
  {id:1631,q:"The marketing team’s innovative ideas were very ——– received by the executive committee members.",options:["favorably","favored","favor","favorable"],answer:0,type:"<strong>品詞問題</strong>",explanation:"空所の前は副詞very、後ろは動詞receivedです。veryの後には形容詞または副詞が入りますが、後ろの動詞の過去分詞receivedを修飾するのは副詞です。したがって、空所には副詞(A) favorably（好意的に）が入ります。",translation:"マーケティングチームの革新的なアイデアは、役員委員会のメンバーに非常に好意的に受け取られました。"},
  {id:1632,q:"All of the conference tables were manufactured ——– Germany and delivered within three business days.",options:["about","before","against","in"],answer:3,type:"<strong>語彙問題</strong>",explanation:"空所の前は受動態の動詞manufactured（製造された）、後ろは国名のGermanyです。「ドイツで製造された」という意味になるので、前置詞(D) in（～で）が適切です。manufactured inは「～で製造された」という意味で、場所を表す前置詞として使われます。",translation:"すべての会議テーブルはドイツで製造され、3営業日以内に配送されました。"},
  {id:1633,q:"Please review the attached draft contract carefully, and the terms will be updated ——– if necessary.",options:["namely","supposedly","accordingly","frequently"],answer:2,type:"<strong>語彙問題</strong>",explanation:"前半で「添付の契約書案を注意深く確認してください」とあり、andで続く後半では「必要であれば条項が更新される」とあります。つまり、確認した結果に基づいて、必要であれば条項が更新されるという流れなので、(C) accordingly（それに応じて、従って）が適切です。",translation:"添付の契約書案を注意深く確認してください。必要に応じて、それに従って条項が更新されます。"},
  {id:1634,q:"Although the first quarter was not ——–, Yakubu Logistics plans to expand into Asian markets.",options:["profiting","profitably","profitable","profitability"],answer:2,type:"<strong>品詞問題</strong>",explanation:"空所の前はwas not で、これはbe動詞の否定形です。be動詞の後には通常、形容詞が入ります。したがって、空所には形容詞(C) profitable（利益の出る、収益性の高い）が適切です。",translation:"第1四半期は収益性が高くなかったものの、Yakubu Logisticsはアジア市場への拡大を計画しています。"},
  {id:1635,q:"The Techport Realty website allows users to view houses in ——– district of the city.",options:["several","any","all","other"],answer:1,type:"<strong>数量形容詞問題</strong>",explanation:"空所の後ろの可算名詞districtが単数形になっています。(A) severalは複数形の名詞と組み合わせるので不適切です。(C) allも通常は複数形または不可算名詞と使います。(D) otherの後が可算名詞の場合複数形になります。可算名詞の単数形の前に置くことができるのは(B) any（どの～でも）で、「市内のどの地区の家でも見ることができる」という意味になります。ちなみに(B) anyは可算名詞の複数形、不可算名詞とともに使うことができます。",translation:"Techport Realtyのウェブサイトでは、ユーザーは市内のどの地区の家でも見ることができます。"},
  {id:1636,q:"Local citizens attended the Fairview Council meeting to discuss ——– the project would affect traffic patterns.",options:["although","whether","since","both"],answer:1,type:"<strong>語彙問題</strong>",explanation:"空所の前は動詞discuss（議論する）、後ろはthe project would affect で主語+動詞の形です。discussの後ろには名詞句または名詞節が続きます。この場合、「そのプロジェクトが交通パターンに影響を与えるかどうか」という内容を議論するので、(B) whether（～かどうか）が適切です。whetherは名詞節を導く接続詞として機能します。",translation:"地域住民は、そのプロジェクトが交通パターンに影響を与えるかどうかを議論するために、Fairview評議会の会議に出席しました。"},
  {id:1637,q:"Meridian Electronics works ——– with overseas suppliers to maintain stable inventory levels throughout the year.",options:["nearly","newly","closely","recently"],answer:2,type:"<strong>語彙問題</strong>",explanation:"「海外サプライヤーと協力して安定した在庫レベルを維持する」という文脈で、work with（～と協力する）を修飾する副詞が必要です。(C) closely（密接に）が最も適切で、「密接に協力する」という意味になります。",translation:"Meridian Electronicsは、年間を通じて安定した在庫レベルを維持するため、海外サプライヤーと密接に協力しています。"},
  {id:1638,q:"Ms. Donovan will be introducing ——– team members during the annual conference in Singapore next week.",options:["her","she","herself","hers"],answer:0,type:"<strong>代名詞問題</strong>",explanation:"空所の前が動詞introducing（紹介している）、後ろは名詞team members（チームメンバー）です。したがって空所には名詞句team membersを修飾する所有格の(A) her が適切です。",translation:"Donovanさんは、来週シンガポールで開催される年次会議で、彼女のチームメンバーを紹介する予定です。"},
  {id:1639,q:"Invoices submitted ——– the fifteenth of each month will be processed without a late penalty.",options:["quite","almost","after","behind"],answer:2,type:"<strong>複合語彙問題</strong>",explanation:"空所の後ろはthe fifteenth of each month（毎月15日）という時を表す名詞句です。この前には前置詞が必要で、「毎月15日より後に」という意味で(C) after（～の後に）が適切です。「15日より後に提出された請求書は遅延ペナルティなしで処理される」という意味になります。",translation:"毎月15日より後に提出された請求書は、遅延ペナルティなしで処理されます。"},
  {id:1640,q:"The executive team decided to set a ——– target for next year’s expansion into South American markets.",options:["conservatism","conservatively","conservation","conservative"],answer:3,type:"<strong>品詞問題</strong>",explanation:"空所の前は冠詞a、後ろは名詞target（目標）です。したがって、空所には名詞targetを修飾する形容詞が入ります。選択肢の中で形容詞は(D) conservative（保守的な、控えめな）でこれを選びます。",translation:"役員チームは、来年の南米市場への拡大について保守的な目標を設定することを決定しました。"},
  {id:1641,q:"The city museum received more than 200,000 visitors ——– the summer exhibition on modern art.",options:["against","as","below","during"],answer:3,type:"<strong>語彙問題</strong>",explanation:"空所の前は「市立博物館が20万人以上の来館者を受け入れた」、後ろは「現代美術の夏季展覧会」です。展覧会の期間中に来館者があったという意味なので、(D) during（～の間に）が適切です。",translation:"市立博物館は、現代美術の夏季展覧会期間中に20万人以上の来館者を受け入れました。"},
  {id:1642,q:"The cost of renting apartments in Bayview has increased ——– over the last two years.",options:["greatly","greatest","greater","great"],answer:0,type:"<strong>品詞問題</strong>",explanation:"空所の前は動詞increased（増加した）、後ろはover the last two years（過去2年間で）という副詞句です。動詞increasedを修飾するには副詞が必要なので、(A) greatly（大幅に）が適切です。",translation:"Bayviewでアパートを借りる費用は、過去2年間で大幅に増加しました。"},
  {id:1643,q:"——– last month, the hidden archive of documents revealed important details about the city’s history.",options:["Discovered","Discovering","Discovery","Discover"],answer:0,type:"<strong>動詞問題</strong>",explanation:"空所の後ろはlast month で時を表し、カンマ以降はthe hidden archive of documents revealed で完全な文になっています。これは分詞構文の形と考えられ、「先月発見されて、隠された文書のアーカイブが重要な詳細を明らかにした」という意味になります。文書が「発見される」のは受動的な動作なので、過去分詞の(A) Discovered が適切です。",translation:"先月発見された隠された文書のアーカイブは、市の歴史について重要な詳細を明らかにしました。"},
  {id:1644,q:"The ——– of the annual Westfield Workshop is to strengthen leadership skills among middle managers.",options:["guide","aim","solution","experience"],answer:1,type:"<strong>語彙問題</strong>",explanation:"空所は「年次Westfieldワークショップの～」という位置にあり、後ろには「中間管理職のリーダーシップスキルを強化することです」という内容が続きます。ワークショップという教育・研修活動において、「～を強化することです」という内容が続く場合、それはワークショップの目的を表していると考えられます。したがって、(B) aim（目的、目標）が最も適切です。",translation:"年次Westfieldワークショップの目的は、中間管理職のリーダーシップスキルを強化することです。"},
  {id:1645,q:"A new café near Bayport Station will ——– be opening with discounts for the first 100 customers.",options:["such","ever","soon","like"],answer:2,type:"<strong>複合語彙問題</strong>",explanation:"空所の前後はwill be opening（開店する予定です）という未来の予定を表す表現です。「新しいカフェが開店する予定」という文脈で、時期を表す(C) soon（まもなく）が適切です。",translation:"Bayport駅近くの新しいカフェがまもなくオープンし、先着100名のお客様には割引が提供されます。"},
  {id:1646,q:"Starlight Tours specializes in arranging trips to ——– temples located across Southeast Asia.",options:["historic","histories","historian","historically"],answer:0,type:"<strong>品詞問題</strong>",explanation:"空所の前は前置詞to、後ろは名詞temples（寺院）です。名詞templesを修飾するには形容詞が必要なので、(A) historic（歴史的な）が適切です。",translation:"Starlight Toursは、東南アジア全域にある歴史的な寺院への旅行の手配を専門としています。"},
  {id:1648,q:"Ms. Perez is skilled at ——– authentic artwork from imitations in the museum collection.",options:["persuading","distinguishing","altering","assisting"],answer:1,type:"<strong>語彙問題</strong>",explanation:"空所の前はbe skilled at（～が得意である）で、atの後には動名詞が続きます。空所の後ろはauthentic artwork from imitations（本物の芸術作品と模造品を）です。「本物と模造品を～する」という文脈で、from（～から）という前置詞と組み合わせて使える動詞は(B) distinguishing（区別すること）が適切です。distinguish A from Bは「AとBを区別する」という意味です。",translation:"Perezさんは、博物館のコレクションで本物の芸術作品と模造品を区別することに長けています。"},
  {id:1649,q:"Employees at Greenhill Manufacturing often handle minor technical issues ——– without contacting IT support.",options:["themselves","them","their","they"],answer:0,type:"<strong>代名詞問題</strong>",explanation:"「Employees … handle minor technical issues」で文として完結しています。「ITサポートに連絡せずに」とあることから、従業員が「自分たちで」問題を処理することを強調すると考えるのが自然です。主語Employeesを強調する再帰代名詞(A) themselves（彼ら自身で）が適切です。",translation:"Greenhill Manufacturingの従業員は、ITサポートに連絡せずに軽微な技術的問題を自分たちでよく処理します。"},
  {id:1650,q:"At the annual conference, the CEO put ——– on collaboration between departments and international branches.",options:["emphasize","emphatic","emphasis","emphasized"],answer:2,type:"<strong>品詞問題</strong>",explanation:"選択肢を見ると、似たようなスペルとさまざまな品詞の形なので「品詞問題」と判断できます。空所の前後を確認していきましょう。",translation:"年次会議で、CEOは部門間と海外支社間の協力に重点を置きました。"},
  {id:1651,q:"Several urgent ——– of medical supplies were delivered to Starlight Hospital this morning.",options:["shipment","shipped","shipments","shipping"],answer:2,type:"<strong>品詞問題</strong>",explanation:"空所の前は形容詞Several urgent（いくつかの緊急の）、後ろは前置詞of以下が続きます。Severalは「いくつかの」という意味で複数の名詞を修飾するので、複数形の名詞(C) shipments（輸送、出荷）が適切です。",translation:"今朝、医療用品のいくつかの緊急輸送がStarlight病院に配達されました。"},
  {id:1652,q:"Employees must attend the safety training session ——– comply with new government regulations.",options:["considerably","in order to","as a result of","nevertheless"],answer:1,type:"<strong>複合語彙問題</strong>",explanation:"空所の後ろはcomply（遵守する）という動詞の原形です。動詞の原形がくるのは (B) in order to（～するために）のみでこれを選びます。",translation:"従業員は、新しい政府規制を遵守するために安全トレーニングセッションに参加しなければなりません。"},
  {id:1653,q:"The museum director announced Dr. Kim as the ——– of the Starlight Research Prize in history.",options:["winner","winning","wins","won"],answer:0,type:"<strong>品詞または動詞問題</strong>",explanation:"空所の前は冠詞the、後ろはof the Starlight Research Prize（Starlight研究賞の）で、空所には名詞が入ります。名詞は(A) winner（受賞者）と(B) winning（勝つこと、勝利）がありますが、「キム博士を～として発表した」という文脈で、「賞の受賞者」という意味の名詞(A) winner（受賞者）が適切です。",translation:"博物館館長は、Kim博士を歴史部門のStarlight研究賞の受賞者として発表しました。"},
  {id:1654,q:"The Westlake Art Museum will be transferring several exhibits ——– a more modern downtown facility.",options:["out","at","over","to"],answer:3,type:"<strong>複合語彙問題</strong>",explanation:"空所の前は動詞transferring（移転している）、後ろはa more modern downtown facility（より現代的な都心部の施設）です。transfer A to Bは「AをBに移転する」という意味の熟語なので、前置詞(D) to（～へ）が適切です。",translation:"Westlake美術館は、いくつかの展示品をより現代的な都心部の施設に移転する予定です。"},
  {id:1655,q:"The decision to expand Podell Electronics’ product line was strongly ——– by market research results.",options:["trained","acted","influenced","reminded"],answer:2,type:"<strong>語彙問題</strong>",explanation:"空所の前はwas strongly（強く～された）という受動態、後ろはby market research results（市場調査結果によって）です。「製品ラインを拡張するという決定が市場調査結果によって強く～された」という文脈で、(C) influenced（影響を受けた）が適切です。be influenced by は「～に影響を受ける」という意味です。",translation:"Podell Electronicsの製品ラインを拡張するという決定は、市場調査結果に強く影響を受けました。"},
  {id:1656,q:"Ms. Carter ——– on the supplier contract once the legal department has reviewed the final draft.",options:["has decided","deciding","will decide","to decide"],answer:2,type:"<strong>動詞問題</strong>",explanation:"空所の後ろにonceがあり、これは「～したら」という未来の条件を表す時間の副詞節を導きます。once節の中はhas reviewedという現在完了形です。主節では未来のことを表すので、未来形(C) will decide（決定するでしょう）が適切です。",translation:"法務部が最終稿を検討したら、Carterさんはサプライヤー契約について決定するでしょう。"},
  {id:1657,q:"Please review the ——– for tomorrow’s conference to prepare your comments on each topic.",options:["record","agenda","catalog","inventory"],answer:1,type:"<strong>語彙問題</strong>",explanation:"「明日の会議のための～を確認して、各トピックについてコメントを準備してください」という文脈で、「各トピックについて」とあることから、会議で話し合うトピックが記載されているものが必要です。したがって、(B) agenda（議題）が最も適切です。",translation:"各トピックについてコメントを準備するために、明日の会議の議題を確認してください。"},
  {id:1658,q:"The Westhill Art Museum was ——– designed as a library before being converted into a public gallery.",options:["original","originally","originality","originals"],answer:1,type:"<strong>品詞問題</strong>",explanation:"空所の前は受動態was、後ろは動詞の過去分詞designed（設計された）です。動詞の過去分詞designedを修飾するには副詞が必要なので、(B) originally（もともと、当初は）が適切です。",translation:"Westhill美術館は、公共ギャラリーに改装される前は、もともと図書館として設計されていました。"},
  {id:1659,q:"Professor Tanaka asked that ——– be allowed to lead the research project on renewable energy.",options:["he","his","himself","him"],answer:0,type:"<strong>代名詞問題</strong>",explanation:"空所の後ろはbe allowed（許可される）という受動態の原形なので、空所には主語が必要です。したがって主格の(A) he が適切です。ちなみにこの文はask that ～ という要求・提案を表す構文で、that節の中では仮定法現在（動詞の原形）が使われます。",translation:"Tanaka教授は、再生可能エネルギーの研究プロジェクトを率いることを許可してもらいたいと要請しました。"},
  {id:1660,q:"The training program at Ellicott Academy was ——– successful in improving employee communication skills.",options:["much","correctly","far","highly"],answer:3,type:"<strong>語彙問題</strong>",explanation:"空所の前はwas、後ろは形容詞successful（成功した）です。形容詞successfulを修飾して「非常に成功した」という意味を表すには、(D) highly（非常に、高度に）が最も適切です。highly successfulは一般的な表現です。",translation:"Ellicott Academyのトレーニングプログラムは、従業員のコミュニケーションスキル向上において非常に成功しました。"}
];

// ===== STATE =====
let mode = 'all';
let rangeCount = 0; // 0 = 全問
let activeQuestions = [];
let currentIdx = 0;
let answers = {};  // questionId -> { chosen, correct }
let timerInterval = null;
let startTime = null;
let wrongIds = [];

// Load from localStorage
function loadState() {
  const saved = localStorage.getItem('toeic_wrong_ids');
  if (saved) wrongIds = JSON.parse(saved);
  const prev = localStorage.getItem('toeic_last_result');
  if (prev) {
    const r = JSON.parse(prev);
    document.getElementById('prev-result').style.display = 'block';
    document.getElementById('prev-result-text').textContent = `${r.correct}/${r.total}問正解 (${r.pct}%)`;
  }
}

function saveWrongIds() {
  localStorage.setItem('toeic_wrong_ids', JSON.stringify(wrongIds));
}

// ===== HOME LOGIC =====
function selectMode(el, m) {
  document.querySelectorAll('.mode-card').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  mode = m;
}

function setCount(el, n) {
  document.querySelectorAll('.count-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  rangeCount = n;
  const startInput = document.getElementById('q-start');
  if (startInput) startInput.disabled = (n === 0);
}

function getActiveQuestions() {
  if (rangeCount === 0) return [...QUESTIONS];
  const startVal = parseInt(document.getElementById('q-start').value) || 1;
  const idx = QUESTIONS.findIndex(q => q.id >= startVal);
  const from = (idx < 0) ? Math.max(0, QUESTIONS.length - rangeCount) : idx;
  return QUESTIONS.slice(from, from + rangeCount);
}

function startQuiz() {
  let qs = getActiveQuestions();
  if (mode === 'shuffle') {
    qs = [...qs].sort(() => Math.random() - 0.5);
  } else if (mode === 'review') {
    if (wrongIds.length === 0) {
      alert('間違えた問題がありません。まず通常モードで問題を解いてください。');
      return;
    }
    qs = QUESTIONS.filter(q => wrongIds.includes(q.id));
    qs = qs.sort(() => Math.random() - 0.5);
  }
  activeQuestions = qs;
  currentIdx = 0;
  answers = {};
  document.getElementById('home-screen').style.display = 'none';
  document.getElementById('question-screen').style.display = 'block';
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('header-score').style.display = 'flex';
  document.getElementById('timer').style.display = 'flex';
  startTime = Date.now();
  startTimer();
  renderQuestion();
}

// ===== TIMER =====
function startTimer() {
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    const elapsed = Math.floor((Date.now() - startTime) / 1000);
    const m = String(Math.floor(elapsed / 60)).padStart(2, '0');
    const s = String(elapsed % 60).padStart(2, '0');
    document.getElementById('timer').textContent = `${m}:${s}`;
  }, 1000);
}

function stopTimer() {
  clearInterval(timerInterval);
}

// ===== QUESTION RENDERING =====
function renderQuestion() {
  const q = activeQuestions[currentIdx];
  const total = activeQuestions.length;

  // progress bar
  document.getElementById('progress-bar').style.width = `${(currentIdx / total) * 100}%`;

  // header score
  const correct = Object.values(answers).filter(a => a.correct).length;
  const answered = Object.values(answers).length;
  document.getElementById('header-score').textContent = `✓ ${correct} / ${answered}`;

  // q-nav dots
  const nav = document.getElementById('q-nav');
  nav.innerHTML = '';
  activeQuestions.forEach((qq, i) => {
    const dot = document.createElement('div');
    dot.className = 'q-dot';
    dot.textContent = qq.id;
    dot.onclick = () => jumpTo(i);
    if (i === currentIdx) dot.classList.add('current');
    else if (answers[qq.id]) {
      dot.classList.add(answers[qq.id].correct ? 'answered-correct' : 'answered-wrong');
    }
    nav.appendChild(dot);
  });

  // meta
  document.getElementById('q-num').textContent = `問題 ${currentIdx + 1} / ${total}`;
  document.getElementById('q-type').textContent = q.type;

  // question text
  const qtext = q.q.replace(/——–/g, '<em>　　　　</em>');
  document.getElementById('question-text').innerHTML = qtext;

  // choices
  const letters = ['A','B','C','D'];
  const choicesEl = document.getElementById('choices');
  choicesEl.innerHTML = '';
  q.options.forEach((opt, i) => {
    const div = document.createElement('div');
    div.className = 'choice';
    div.id = `choice-${i}`;
    div.innerHTML = `<span class="choice-letter">${letters[i]}</span><span>${opt}</span>`;
    div.onclick = () => selectAnswer(i);
    choicesEl.appendChild(div);
  });

  // explanation
  const expEl = document.getElementById('explanation');
  expEl.classList.remove('show');
  document.getElementById('btn-next').style.display = 'none';
  document.getElementById('btn-prev').style.display = currentIdx > 0 ? 'inline-block' : 'none';

  // if already answered
  if (answers[q.id]) {
    showAnswerState(q, answers[q.id].chosen);
  }
}

function selectAnswer(chosenIdx) {
  const q = activeQuestions[currentIdx];
  if (answers[q.id]) return; // already answered

  const isCorrect = chosenIdx === q.answer;
  answers[q.id] = { chosen: chosenIdx, correct: isCorrect };

  // track wrong
  if (!isCorrect) {
    if (!wrongIds.includes(q.id)) wrongIds.push(q.id);
  } else {
    wrongIds = wrongIds.filter(id => id !== q.id);
  }
  saveWrongIds();

  showAnswerState(q, chosenIdx);
}

function showAnswerState(q, chosenIdx) {
  const letters = ['A','B','C','D'];
  const isCorrect = chosenIdx === q.answer;

  // style choices
  document.querySelectorAll('.choice').forEach((el, i) => {
    el.classList.add('disabled');
    el.onclick = null;
    if (i === q.answer) el.classList.add('correct');
    else if (i === chosenIdx && !isCorrect) el.classList.add('wrong');
  });

  // explanation
  const expEl = document.getElementById('explanation');
  const badge = document.getElementById('result-badge');
  badge.innerHTML = isCorrect
    ? '<span class="result-badge correct">✓ 正解！</span>'
    : `<span class="result-badge wrong">✗ 不正解 — 正解は (${letters[q.answer]}) ${q.options[q.answer]}</span>`;
  document.getElementById('exp-body').textContent = q.explanation;
  document.getElementById('exp-translation').textContent = q.translation;
  expEl.classList.add('show');

  document.getElementById('btn-next').style.display = 'inline-block';
  document.getElementById('btn-next').textContent =
    currentIdx < activeQuestions.length - 1 ? '次へ →' : '結果を見る';

  // update header score
  const correct = Object.values(answers).filter(a => a.correct).length;
  const answered = Object.values(answers).length;
  document.getElementById('header-score').textContent = `✓ ${correct} / ${answered}`;
}

function nextQuestion() {
  if (currentIdx < activeQuestions.length - 1) {
    currentIdx++;
    renderQuestion();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  } else {
    showResult();
  }
}

function prevQuestion() {
  if (currentIdx > 0) {
    currentIdx--;
    renderQuestion();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}

function jumpTo(idx) {
  currentIdx = idx;
  renderQuestion();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function endQuiz() {
  if (Object.keys(answers).length === 0 || confirm('途中終了しますか？')) {
    showResult();
  }
}

// ===== RESULT =====
function showResult() {
  stopTimer();
  const total = activeQuestions.length;
  const correct = Object.values(answers).filter(a => a.correct).length;
  const wrong = Object.values(answers).filter(a => !a.correct).length;
  const skip = total - Object.keys(answers).length;
  const pct = Math.round((correct / total) * 100);
  const elapsed = Math.floor((Date.now() - startTime) / 1000);
  const em = String(Math.floor(elapsed / 60)).padStart(2, '0');
  const es = String(elapsed % 60).padStart(2, '0');

  localStorage.setItem('toeic_last_result', JSON.stringify({ correct, total, pct }));

  document.getElementById('question-screen').style.display = 'none';
  document.getElementById('result-screen').style.display = 'block';
  document.getElementById('progress-bar').style.width = '100%';

  // circle
  const circle = document.getElementById('score-circle');
  circle.style.setProperty('--pct', `${pct}%`);
  document.getElementById('score-pct').textContent = `${pct}%`;

  // msg
  let msg = '';
  if (pct >= 90) msg = '素晴らしい！完璧に近い！';
  else if (pct >= 70) msg = 'よくできました！';
  else if (pct >= 50) msg = 'もう少し！復習で伸びます。';
  else msg = 'ここから！間違えた問題を復習しよう。';
  document.getElementById('score-msg').textContent = msg;
  document.getElementById('time-elapsed').textContent = `所要時間：${em}:${es}`;

  document.getElementById('stat-correct').textContent = correct;
  document.getElementById('stat-wrong').textContent = wrong;
  document.getElementById('stat-skip').textContent = skip;

  // review list
  const reviewList = document.getElementById('review-list');
  const wrongAnswers = activeQuestions.filter(q => answers[q.id] && !answers[q.id].correct);
  if (wrongAnswers.length > 0) {
    reviewList.innerHTML = `<h3>間違えた問題 (${wrongAnswers.length}問)</h3>`;
    wrongAnswers.forEach(q => {
      const div = document.createElement('div');
      div.className = 'review-item';
      const chosenIdx = answers[q.id].chosen;
      const letters = ['A','B','C','D'];
      div.innerHTML = `
        <span class="q-label">Q${q.id}</span>
        <span class="q-preview">
          ${q.q.substring(0, 60)}...<br>
          <strong>あなたの答え：(${letters[chosenIdx]}) ${q.options[chosenIdx]}</strong>　→
          <strong style="color:var(--green)">正解：(${letters[q.answer]}) ${q.options[q.answer]}</strong>
        </span>`;
      div.onclick = () => jumpToReview(q.id);
      reviewList.appendChild(div);
    });
    document.getElementById('btn-review-wrong').style.display = 'inline-block';
  } else {
    reviewList.innerHTML = '';
    document.getElementById('btn-review-wrong').style.display = 'none';
  }
}

function jumpToReview(qid) {
  const idx = activeQuestions.findIndex(q => q.id === qid);
  if (idx >= 0) {
    currentIdx = idx;
    document.getElementById('result-screen').style.display = 'none';
    document.getElementById('question-screen').style.display = 'block';
    renderQuestion();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}

function reviewWrong() {
  mode = 'review';
  goHome();
  setTimeout(() => {
    document.querySelector('[data-mode="review"]').click();
    startQuiz();
  }, 100);
}

function goHome() {
  stopTimer();
  document.getElementById('question-screen').style.display = 'none';
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('home-screen').style.display = 'block';
  document.getElementById('header-score').style.display = 'none';
  document.getElementById('timer').style.display = 'none';
  document.getElementById('progress-bar').style.width = '0%';
  loadState();
}

// ===== KEYBOARD SHORTCUTS =====
document.addEventListener('keydown', e => {
  if (document.getElementById('question-screen').style.display === 'none') return;
  const q = activeQuestions[currentIdx];
  if (!q) return;
  if (['a','b','c','d','1','2','3','4'].includes(e.key.toLowerCase())) {
    const map = { a:0, b:1, c:2, d:3, '1':0, '2':1, '3':2, '4':3 };
    const idx = map[e.key.toLowerCase()];
    if (!answers[q.id]) selectAnswer(idx);
  }
  if (e.key === 'ArrowRight' || e.key === 'Enter') {
    if (answers[q.id]) nextQuestion();
  }
  if (e.key === 'ArrowLeft') prevQuestion();
});

// ===== INIT =====
loadState();
</script>
</body>
</html>
