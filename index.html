<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TOEIC Part 5 練習問題</title>
<style>
  :root {
    --blue: #2563eb;
    --blue-light: #eff6ff;
    --green: #16a34a;
    --green-light: #f0fdf4;
    --red: #dc2626;
    --red-light: #fef2f2;
    --gray: #6b7280;
    --gray-light: #f9fafb;
    --border: #e5e7eb;
    --text: #111827;
    --text-muted: #6b7280;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', sans-serif;
    background: #f3f4f6;
    color: var(--text);
    min-height: 100vh;
  }

  /* ===== HEADER ===== */
  header {
    background: var(--blue);
    color: white;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    position: sticky;
    top: 0;
    z-index: 10;
  }
  header h1 { font-size: 1.1rem; font-weight: 700; letter-spacing: 0.5px; }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .score-badge {
    background: rgba(255,255,255,0.2);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 0.85rem;
    font-weight: 600;
  }
  .timer {
    background: rgba(255,255,255,0.15);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 0.85rem;
    font-family: monospace;
    font-weight: 600;
  }

  /* ===== PROGRESS BAR ===== */
  .progress-wrap {
    background: #dbeafe;
    height: 6px;
  }
  .progress-bar {
    height: 100%;
    background: var(--blue);
    transition: width 0.3s ease;
  }

  /* ===== MAIN ===== */
  main {
    max-width: 760px;
    margin: 0 auto;
    padding: 24px 16px 80px;
  }

  /* ===== HOME SCREEN ===== */
  #home-screen {
    text-align: center;
    padding: 40px 20px;
  }
  #home-screen h2 { font-size: 1.8rem; margin-bottom: 8px; color: var(--blue); }
  #home-screen p { color: var(--text-muted); margin-bottom: 32px; }

  .mode-cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px;
    margin-bottom: 32px;
  }
  .mode-card {
    background: white;
    border: 2px solid var(--border);
    border-radius: 12px;
    padding: 24px 16px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }
  .mode-card:hover { border-color: var(--blue); box-shadow: 0 4px 12px rgba(37,99,235,0.15); }
  .mode-card.selected { border-color: var(--blue); background: var(--blue-light); }
  .mode-card .icon { font-size: 2rem; margin-bottom: 8px; }
  .mode-card h3 { font-size: 1rem; margin-bottom: 4px; }
  .mode-card p { font-size: 0.8rem; color: var(--text-muted); }

  .range-select {
    background: white;
    border-radius: 12px;
    padding: 20px;
    border: 1px solid var(--border);
    margin-bottom: 24px;
    text-align: left;
  }
  .range-select h3 { font-size: 0.9rem; font-weight: 600; margin-bottom: 14px; color: var(--text-muted); }
  .range-config { display: flex; flex-direction: column; gap: 14px; }
  .range-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .range-label {
    font-size: 0.82rem;
    color: var(--text-muted);
    white-space: nowrap;
    min-width: 50px;
    font-weight: 600;
  }
  .range-sep { font-size: 0.85rem; color: var(--text-muted); white-space: nowrap; }
  #q-start {
    width: 80px;
    padding: 8px 10px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-size: 1rem;
    text-align: center;
    font-family: inherit;
    color: var(--text);
    transition: border-color 0.15s;
  }
  #q-start:focus { outline: none; border-color: var(--blue); }
  #q-start:disabled { opacity: 0.35; cursor: not-allowed; background: var(--gray-light); }
  .count-btns { display: flex; flex-wrap: wrap; gap: 8px; }
  .count-btn {
    padding: 7px 16px;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    background: white;
    cursor: pointer;
    font-size: 0.85rem;
    font-weight: 500;
    font-family: inherit;
    transition: all 0.15s;
  }
  .count-btn:hover { border-color: var(--blue); color: var(--blue); }
  .count-btn.active { background: var(--blue); color: white; border-color: var(--blue); }

  .btn-start {
    background: var(--blue);
    color: white;
    border: none;
    border-radius: 10px;
    padding: 14px 48px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
    letter-spacing: 0.5px;
  }
  .btn-start:hover { background: #1d4ed8; }

  /* ===== QUESTION SCREEN ===== */
  #question-screen { display: none; }

  .q-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .q-num {
    font-size: 0.85rem;
    color: var(--text-muted);
    font-weight: 600;
  }
  .q-type {
    background: #dbeafe;
    color: var(--blue);
    border-radius: 20px;
    padding: 3px 10px;
    font-size: 0.78rem;
    font-weight: 600;
  }

  .question-card {
    background: white;
    border-radius: 14px;
    padding: 28px 24px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    margin-bottom: 20px;
  }
  .question-text {
    font-size: 1.05rem;
    line-height: 1.8;
    margin-bottom: 24px;
    word-break: break-word;
  }
  .question-text em {
    background: #fef9c3;
    font-style: normal;
    padding: 0 4px;
    border-radius: 4px;
    font-weight: 600;
  }

  .choices { display: flex; flex-direction: column; gap: 10px; }
  .choice {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 13px 16px;
    border: 2px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.15s;
    font-size: 0.95rem;
  }
  .choice:hover:not(.disabled) { border-color: var(--blue); background: var(--blue-light); }
  .choice-letter {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: var(--gray-light);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 0.85rem;
    flex-shrink: 0;
  }
  .choice.correct { border-color: var(--green); background: var(--green-light); }
  .choice.correct .choice-letter { background: var(--green); color: white; }
  .choice.wrong { border-color: var(--red); background: var(--red-light); }
  .choice.wrong .choice-letter { background: var(--red); color: white; }
  .choice.disabled { cursor: default; }
  .choice.highlight { border-color: var(--green); }

  /* ===== EXPLANATION ===== */
  .explanation {
    background: white;
    border-radius: 14px;
    padding: 20px 24px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    display: none;
    animation: fadeIn 0.25s ease;
  }
  .explanation.show { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

  .result-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 5px 14px;
    border-radius: 20px;
    font-size: 0.9rem;
    font-weight: 700;
    margin-bottom: 14px;
  }
  .result-badge.correct { background: var(--green-light); color: var(--green); }
  .result-badge.wrong { background: var(--red-light); color: var(--red); }

  .exp-section { margin-bottom: 12px; }
  .exp-label {
    font-size: 0.75rem;
    font-weight: 700;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
  }
  .exp-body {
    font-size: 0.9rem;
    line-height: 1.7;
    color: var(--text);
  }
  .translation-box {
    background: var(--gray-light);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 0.88rem;
    color: #374151;
    line-height: 1.6;
  }

  /* ===== NAV BUTTONS ===== */
  .nav-buttons {
    display: flex;
    gap: 10px;
    margin-top: 20px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .btn {
    padding: 10px 24px;
    border-radius: 8px;
    border: none;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-primary { background: var(--blue); color: white; }
  .btn-primary:hover { background: #1d4ed8; }
  .btn-secondary { background: white; color: var(--text); border: 1.5px solid var(--border); }
  .btn-secondary:hover { background: var(--gray-light); }
  .btn-danger { background: #fee2e2; color: var(--red); }
  .btn-danger:hover { background: #fecaca; }

  /* ===== RESULT SCREEN ===== */
  #result-screen { display: none; text-align: center; padding: 20px 0; }
  .result-card {
    background: white;
    border-radius: 16px;
    padding: 32px 24px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    margin-bottom: 24px;
  }
  .score-circle {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    background: conic-gradient(var(--blue) var(--pct, 0%), #e5e7eb 0%);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 20px;
    position: relative;
  }
  .score-circle::before {
    content: '';
    width: 90px;
    height: 90px;
    border-radius: 50%;
    background: white;
    position: absolute;
  }
  .score-number {
    position: relative;
    z-index: 1;
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--blue);
  }
  .result-stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-top: 20px;
  }
  .stat-box {
    background: var(--gray-light);
    border-radius: 10px;
    padding: 12px 8px;
  }
  .stat-box .stat-val { font-size: 1.4rem; font-weight: 700; }
  .stat-box .stat-label { font-size: 0.75rem; color: var(--text-muted); margin-top: 2px; }
  .stat-box.correct .stat-val { color: var(--green); }
  .stat-box.wrong .stat-val { color: var(--red); }

  .review-list { text-align: left; margin-top: 24px; }
  .review-list h3 { font-size: 0.95rem; font-weight: 700; margin-bottom: 12px; }
  .review-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 10px 14px;
    border-radius: 8px;
    background: var(--red-light);
    border-left: 3px solid var(--red);
    margin-bottom: 8px;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .review-item:hover { opacity: 0.8; }
  .review-item .q-label { font-size: 0.8rem; font-weight: 700; color: var(--red); flex-shrink: 0; }
  .review-item .q-preview { font-size: 0.82rem; color: #374151; line-height: 1.5; }

  /* ===== QUESTION NAV DOT ===== */
  .q-nav {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 20px;
    background: white;
    padding: 12px 16px;
    border-radius: 12px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }
  .q-dot {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: white;
    font-size: 0.7rem;
    font-weight: 600;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.15s;
    color: var(--text-muted);
  }
  .q-dot:hover { border-color: var(--blue); color: var(--blue); }
  .q-dot.current { border-color: var(--blue); background: var(--blue); color: white; }
  .q-dot.answered-correct { background: var(--green); border-color: var(--green); color: white; }
  .q-dot.answered-wrong { background: var(--red); border-color: var(--red); color: white; }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 500px) {
    .question-text { font-size: 0.95rem; }
    header h1 { font-size: 0.95rem; }
    .question-card { padding: 20px 16px; }
  }
</style>
</head>
<body>

<header>
  <h1>TOEIC Part 5 練習問題</h1>
  <div class="header-right">
    <span class="score-badge" id="header-score" style="display:none">✓ 0 / 0</span>
    <span class="timer" id="timer" style="display:none">00:00</span>
  </div>
</header>
<div class="progress-wrap"><div class="progress-bar" id="progress-bar" style="width:0%"></div></div>

<main>

<!-- ===== HOME ===== -->
<div id="home-screen">
  <h2>TOEIC Part 5</h2>
  <p>品詞・語彙・文法を集中トレーニング</p>

  <div class="mode-cards">
    <div class="mode-card selected" data-mode="all" onclick="selectMode(this,'all')">
      <div class="icon">📝</div>
      <h3>通常モード</h3>
      <p>選択した問題範囲を順番に解く</p>
    </div>
    <div class="mode-card" data-mode="shuffle" onclick="selectMode(this,'shuffle')">
      <div class="icon">🔀</div>
      <h3>シャッフルモード</h3>
      <p>問題をランダムに出題</p>
    </div>
    <div class="mode-card" data-mode="review" onclick="selectMode(this,'review')">
      <div class="icon">🔁</div>
      <h3>復習モード</h3>
      <p>間違えた問題だけ再挑戦</p>
    </div>
  </div>

  <div class="range-select">
    <h3>問題範囲を設定</h3>
    <div class="range-config">
      <div class="range-row">
        <span class="range-label">開始問題</span>
        <input type="number" id="q-start" min="1" max="1660" value="1" disabled>
        <span class="range-sep">番から</span>
      </div>
      <div class="range-row">
        <span class="range-label">出題数</span>
        <div class="count-btns">
          <button class="count-btn" onclick="setCount(this,10)">10問</button>
          <button class="count-btn" onclick="setCount(this,20)">20問</button>
          <button class="count-btn" onclick="setCount(this,30)">30問</button>
          <button class="count-btn" onclick="setCount(this,50)">50問</button>
          <button class="count-btn" onclick="setCount(this,100)">100問</button>
          <button class="count-btn active" onclick="setCount(this,0)">全問</button>
        </div>
      </div>
    </div>
  </div>

  <button class="btn-start" onclick="startQuiz()">スタート</button>

  <div id="prev-result" style="margin-top:24px; display:none;">
    <p style="color:var(--text-muted); font-size:0.85rem;">前回の結果：<span id="prev-result-text"></span></p>
  </div>
</div>

<!-- ===== QUESTION ===== -->
<div id="question-screen">
  <div class="q-nav" id="q-nav"></div>

  <div class="q-meta">
    <span class="q-num" id="q-num">問題 1 / 10</span>
    <span class="q-type" id="q-type"></span>
  </div>

  <div class="question-card">
    <div class="question-text" id="question-text"></div>
    <div class="choices" id="choices"></div>
  </div>

  <div class="explanation" id="explanation">
    <div id="result-badge"></div>
    <div class="exp-section">
      <div class="exp-label">解説</div>
      <div class="exp-body" id="exp-body"></div>
    </div>
    <div class="exp-section">
      <div class="exp-label">和訳</div>
      <div class="translation-box" id="exp-translation"></div>
    </div>
  </div>

  <div class="nav-buttons">
    <button class="btn btn-secondary" id="btn-prev" onclick="prevQuestion()">← 前へ</button>
    <button class="btn btn-primary" id="btn-next" onclick="nextQuestion()" style="display:none">次へ →</button>
    <button class="btn btn-danger" onclick="endQuiz()">終了</button>
  </div>
</div>

<!-- ===== RESULT ===== -->
<div id="result-screen">
  <div class="result-card">
    <h2 style="margin-bottom:20px; font-size:1.3rem;">結果</h2>
    <div class="score-circle" id="score-circle">
      <span class="score-number" id="score-pct">0%</span>
    </div>
    <p id="score-msg" style="margin-bottom:4px; font-size:1rem; font-weight:600;"></p>
    <p style="color:var(--text-muted); font-size:0.85rem;" id="time-elapsed"></p>
    <div class="result-stats">
      <div class="stat-box correct">
        <div class="stat-val" id="stat-correct">0</div>
        <div class="stat-label">正解</div>
      </div>
      <div class="stat-box wrong">
        <div class="stat-val" id="stat-wrong">0</div>
        <div class="stat-label">不正解</div>
      </div>
      <div class="stat-box">
        <div class="stat-val" id="stat-skip">0</div>
        <div class="stat-label">未回答</div>
      </div>
    </div>
  </div>

  <div class="review-list" id="review-list"></div>

  <div class="nav-buttons" style="justify-content:center; margin-top:16px;">
    <button class="btn btn-primary" onclick="reviewWrong()" id="btn-review-wrong">間違えた問題を復習</button>
    <button class="btn btn-secondary" onclick="goHome()">ホームへ戻る</button>
  </div>
</div>

</main>

<script>
const QUESTIONS = [
  {id:1,q:"Ms. Ortega's development team contributed ——– to the successful launch of the newest mobile application.",options:["automatically","substantially","sharply","accordingly"],answer:1,type:"語彙問題",explanation:"空所の副詞は動詞contributedを修飾。contributed substantially（かなり貢献した）が自然なコロケーション。",translation:"Ortegaさんの開発チームは、最新のモバイルアプリケーションの発売にかなり貢献しました。"},
  {id:2,q:"In order to meet production targets, inspection equipment that breaks down easily should be checked on a ——– basis.",options:["regular","regularly","regularize","regularity"],answer:0,type:"品詞問題",explanation:"冠詞aの後に名詞basisが続くため、形容詞regularが必要。【冠詞+形容詞+名詞】の公式に従う。",translation:"生産目標を達成するために、故障しやすい検査装置は定期的に点検してもらったほうがいい。"},
  {id:3,q:"——– you experience any problems with the building's equipment, you should contact the property manager.",options:["Because of","In case of","Immediately","If"],answer:3,type:"接続詞・前置詞問題",explanation:"空所後の『you experience』は主語+動詞の形式。接続詞が必要であり、『If』が適切。",translation:"建物の設備に何らかの不具合があった場合、不動産管理人に連絡してください。"},
  {id:4,q:"Employees must park in the ——– parking lot until the renovation of the company building is completed.",options:["frequent","generous","complicated","temporary"],answer:3,type:"語彙問題",explanation:"形容詞とparking lot（駐車場）のコロケーション。temporary parking lot（臨時駐車場）が自然。",translation:"社屋の改装工事が完了するまで、社員は臨時駐車場に停めなければならない。"},
  {id:5,q:"Although the assembly machine has been used for more than 20 years, it is still ——–.",options:["annual","experienced","operational","previous"],answer:2,type:"語彙問題",explanation:"第2文型（S+V+C）において、主語『the assembly machine』の状態を表す補語が必要。『operational』が適切。",translation:"その組立機械は20年以上使われているけれども、いまだに使用できる。"},
  {id:6,q:"Medical ——– are supposed to investigate the characteristics and effects of newly developed materials.",options:["expert","expertise","experts","expertly"],answer:2,type:"品詞問題",explanation:"形容詞Medicalの後に主語が必要。後続の『are』から複数形『experts』が適切。",translation:"医学の専門家は、新しく開発された材料の特徴と効果について調べることになっている。"},
  {id:7,q:"Darwin Construction, renowned for its ——– designs, has won the bid for the Dalton City Library.",options:["innovation","innovate","innovatively","innovative"],answer:3,type:"品詞問題",explanation:"所有格『its』と名詞『designs』の間に形容詞『innovative』が必要。【所有格+形容詞+名詞】の構造。",translation:"Darwin建設は革新的な設計で有名であるが、ダルトン市の図書館プロジェクトの入札を獲得した。"},
  {id:8,q:"Please make sure that ——– address is correct in the designated section of the order form.",options:["yours","yourself","your","you"],answer:2,type:"代名詞問題",explanation:"名詞『address』を修飾する所有格『your』が必要。【所有格+名詞】の構造。",translation:"注文用紙の指定の箇所に住所を正しく記入してください。"},
  {id:9,q:"Mr. Thompson was ——– as the marketing director after a successful market development in Asia.",options:["appointing","appointed","appoint","appoints"],answer:1,type:"動詞問題",explanation:"主語『Mr. Thompson』が『marketing director』に任命される関係。受動態『was appointed』が適切。",translation:"Thompsonさんは、アジアでの市場開拓に成功した後、マーケティング部長に任命されました。"},
  {id:10,q:"The Irwin City Tourist Information Office is ——– located in the center of the city.",options:["particularly","unfortunately","absolutely","conveniently"],answer:3,type:"語彙問題",explanation:"副詞『conveniently』は『located』を修飾。『conveniently located』（便利なところに位置して）が自然なコロケーション。",translation:"Irwin市の観光案内所は市の中心部に便利な場所にあります。"},
  {id:11,q:"Professional and amateur photographers ——– can participate in the annual photography contest, which takes place in October.",options:["alike","even","quite","enough"],answer:0,type:"語彙問題",explanation:"「photographers alike」でプロもアマチュアも同様にという意味になる。alikeは名詞の後ろに置いて「同様に」を表す。",translation:"プロとアマチュアのカメラマンのどちらも、10月に開催される年次写真コンテストに参加できます。"},
  {id:12,q:"——– a recent government survey, annual income per household last year was about the same as it was five years ago.",options:["Additionally","Although","According to","As soon as"],answer:2,type:"語彙問題",explanation:"「According to a recent government survey」で「最近の政府調査によると」の意味。後続に名詞句が来る前置詞表現。",translation:"最近の政府の調査によると、昨年の世帯あたりの年間収入は5年前とほぼ同じでした。"},
  {id:13,q:"Clarel Bookstore, located in the northern part of Wallaby City, will ——– host book signings for its members.",options:["occasions","occasion","occasionally","occasional"],answer:2,type:"品詞問題",explanation:"助動詞willと動詞hostの間には副詞が必要。occasionally（時々）が適切。",translation:"Wallaby市の北部に位置するClarel Bookstoreは、会員のためのサイン会を時折開催する予定です。"},
  {id:14,q:"A list of full-time job ——– at Canterbury Technology will be posted on the website tomorrow afternoon.",options:["open","openings","openly","opened"],answer:1,type:"品詞問題",explanation:"job ——–の複合名詞。job openings（求人）が自然。複数形で正解。",translation:"Canterbury Technologyのフルタイムの求人リストは、明日の午後にウェブサイトに掲載される予定です。"},
  {id:15,q:"The product developed by Orange Solutions was ——– in terms of design than that of Roseville System, but the price was about the same.",options:["sophisticated","most sophisticated","more sophisticated","sophisticate"],answer:2,type:"比較問題",explanation:"thanがあるので比較級が必要。more sophisticatedが正解。",translation:"Orange Solutions社が開発した製品は、デザインの点でRoseville System社の製品よりも洗練されていたが、価格はほぼ同じでした。"},
  {id:16,q:"——– the tourist season begins, Trattoria Porte will extend its hours of operation until 23:00.",options:["Afterward","Prior to","Once","During"],answer:2,type:"接続詞問題",explanation:"空所後にthe tourist season beginsという主語+動詞があるので接続詞が必要。Once（いったん〜すると）が適切。",translation:"観光シーズンが始まると、Trattoria Porteは営業時間を23時まで延長する予定です。"},
  {id:17,q:"——– the inclement weather, many residents came to the concert venue to listen to the performance by the renowned pianist.",options:["Despite","Although","Nevertheless","Whenever"],answer:0,type:"接続詞・前置詞問題",explanation:"空所後にthe inclement weatherという名詞句があるので前置詞が必要。Despite（〜にもかかわらず）が適切。",translation:"悪天候にもかかわらず、多くの住民が有名なピアニストの演奏を聴きにコンサート会場に来ました。"},
  {id:18,q:"Graden Consulting attempted to recruit a senior data analyst internally, but ——– employees met the job requirements.",options:["both","few","most","a lot of"],answer:1,type:"語彙問題",explanation:"「but」の後ろでほとんどの社員が条件を満たさなかったという意味になるfew（ほとんど〜ない）が適切。",translation:"Graden Consultingは社内でシニアデータアナリストを採用しようとしたが、職務要件を満たす社員はほとんどいなかった。"},
  {id:19,q:"Due to poor sales, plans to close several branches in the Kansai region ——–.",options:["considers","have been considering","was considered","are being considered"],answer:3,type:"動詞問題",explanation:"主語がplansで複数。受動態の現在進行形are being consideredが適切。",translation:"売上不振のため、関西地域のいくつかの支店を閉鎖する計画が検討されています。"},
  {id:20,q:"With the implementation of a state-of-the-art customer management system, Taylor Bay Hotel has ——–improved customer satisfaction.",options:["substantial","substantiate","substantiating","substantially"],answer:3,type:"品詞問題",explanation:"has ——– improvedの構造で、過去分詞improvedを修飾する副詞が必要。substantially（大幅に）が適切。",translation:"最新の顧客管理システムを導入することで、Taylor Bay Hotelは顧客満足度を大幅に向上させました。"},
  {id:21,q:"Streamlining the textile production process has resulted in an ——– 20 percent increase in productivity.",options:["apparently","approximately","affordably","efficiently"],answer:1,type:"語彙問題",explanation:"数字の前を修飾する副詞。approximately（約）が数値を修飾する自然な表現。",translation:"繊維製品の生産工程の合理化によって、生産性を約２０％向上させることに成功した。"},
  {id:22,q:"Mr. Hunter, who joined the company only three months ago, was able to find the cause of the machine's breakdown ——–.",options:["his own","him","he","himself"],answer:3,type:"代名詞問題",explanation:"文が完結した後に空所がある。強調の再帰代名詞himself（彼自身で）が文末に置かれる。",translation:"ハンターさんは、入社してわずか3か月であるが、彼自身でその機械の故障の原因を見つけることができた。"},
  {id:23,q:"Garbage collection in the Carson area is twice a week, on Mondays and Thursdays, unless there is a ——– reason.",options:["specialize","specialist","specially","special"],answer:3,type:"品詞問題",explanation:"a ——– reasonの構造で、名詞reasonを修飾する形容詞special（特別な）が必要。",translation:"Carson地区のゴミ回収は、特別な理由がない限り週に2回の月曜日と木曜日である。"},
  {id:24,q:"Those who book a room through the San Remo Inn website will receive ——– breakfast.",options:["complimentary","reluctant","prominent","renewable"],answer:0,type:"語彙問題",explanation:"complimentary breakfast（無料の朝食）はTOEICでよく出る表現。ホテルサービスの文脈に合う。",translation:"San Remo Innのウェブサイトから宿泊を予約した方は無料の朝食が提供されます。"},
  {id:25,q:"Visitors must carry their entry passes at all times when ——– the factory's facilities.",options:["tour","toured","will tour","touring"],answer:3,type:"動詞問題",explanation:"when ——– の後ろに目的語がある。when touring（見学している間）の分詞構文。",translation:"工場内の施設を見学する際、訪問者は入館証を常に携帯しなければならない。"},
  {id:26,q:"Delmar Auto Industries has signed a contract to purchase electronic components from Stellar Corporation ——– after lengthy negotiations.",options:["periodical","periodically","period","periodic"],answer:1,type:"品詞問題",explanation:"動詞purchaseを修飾する副詞periodically（定期的に）が必要。",translation:"Delmar Auto Industries社は長期にわたる交渉の末にStellar Corporation社から電子部品を定期的に購入する契約を結んだ。"},
  {id:27,q:"To enter Lipton National Park on weekends, tickets must be reserved online in ——–.",options:["short","person","progress","advance"],answer:3,type:"語彙問題",explanation:"in advance（事前に）は予約の文脈で頻出表現。in person（直接）、in progress（進行中）と区別する。",translation:"週末にLipton National Parkへ入場するためには、事前にチケットをオンラインで予約しておかなければならない。"},
  {id:28,q:"Thompson Manufacturing is known in the agricultural machinery industry as a ——– manufacturer of machine parts.",options:["reliability","reliable","rely","reliably"],answer:1,type:"品詞問題",explanation:"a ——– manufacturerの構造で名詞manufacturerを修飾する形容詞reliable（信頼できる）が必要。",translation:"Thompson Manufacturing社は信頼できる機械部品の製造業者として農業機械業界で知られている。"},
  {id:29,q:"Since the main roads in the center of the city are congested during the summer festival, people ——– to use public transportation.",options:["encouraged","are encouraged","encourage","have encouraged"],answer:1,type:"動詞問題",explanation:"主語peopleが公共交通機関の利用を勧められる側なので受動態are encouragedが必要。",translation:"サマーフェスティバルの期間中、市の中心部の幹線道路は混雑するので公共交通機関の利用が推奨されている。"},
  {id:30,q:"Heavy snowfall since last night has ——– significant delays in the arrival of flights from Sapporo.",options:["led","resulted","included","caused"],answer:3,type:"語彙問題",explanation:"snowfallがdelaysを引き起こすという因果関係。cause delays（遅延を引き起こす）が自然なコロケーション。",translation:"昨晩からの大雪のため、札幌からの飛行機の到着が大幅に遅れている。"},
  {id:31,q:"Guests at Hayworth Hotel can ——– access most of the city's tourist attractions.",options:["easy","ease","easier","actively"],answer:3,type:"品詞問題",explanation:"助動詞can + 副詞 + 動詞accessの構造。副詞activelyが動詞を修飾する。",translation:"ハイワース・ホテルの宿泊客は市内のほとんどの観光地に簡単にアクセスできます。"},
  {id:32,q:"TAT Studio required that new employees ——– a training report within a week.",options:["submit","submitted","had submitted","were submitted"],answer:0,type:"動詞問題",explanation:"required that節の中では動詞は原形になる（仮定法現在）。submitが正解。",translation:"TAT Studio社は新入社員が1週間以内に研修報告書を提出することを要求した。"},
  {id:33,q:"Please note that parking outside of designated areas in national parks is subject to a ——–.",options:["prediction","fine","warranty","committee"],answer:1,type:"語彙問題",explanation:"is subject to a ——–で「〜の対象になる」。fine（罰金）が文脈に合う。",translation:"国立公園内の指定区域外への駐車は罰金の対象となることにご注意ください。"},
  {id:34,q:"The ——– for the public library submitted by Astra Design Corporation exceeded the budget of the City of Riverdale.",options:["estimating","estimator","estimated","estimate"],answer:3,type:"品詞問題",explanation:"冠詞the + 名詞 + for + 名詞の構造。estimate（見積もり）が名詞として機能する。",translation:"Astra Design Corporation社が提出した公立図書館の見積もりはリバーデール市の予算を超過した。"},
  {id:35,q:"——– the building application has been approved, construction can begin on the KEP Building.",options:["Upon","Now that","Afterward","Although"],answer:1,type:"接続詞問題",explanation:"接続詞 + 主語 + 動詞の形式。Now that（〜したので）が理由・前提を表す接続詞として適切。",translation:"建築申請が承認されたので、KEPビルの建設を開始することができます。"},
  {id:36,q:"Star Light Airlines has been looking for a senior accountant for the past six months, but the position ——– open.",options:["contains","hires","holds","remains"],answer:3,type:"語彙問題",explanation:"第2文型：主語 + 動詞 + 補語（形容詞open）。remains open（空いたままである）が自然。",translation:"Star Light Airlines社はここ6ヶ月間シニアアカウンタントを探しているが、その職はいまだ空いたままである。"},
  {id:37,q:"Beginners in programming can learn the basics in the ——– course offered by TEC School.",options:["introductory","introduced","introducing","introduce"],answer:0,type:"品詞問題",explanation:"冠詞the + 形容詞 + 名詞courseの構造。introductory（入門の）が形容詞として適切。",translation:"プログラミング初心者はTEC Schoolが提供する入門コースで基礎を学ぶことができます。"},
  {id:38,q:"——– attending the craft workshop next weekend will receive free materials.",options:["Whoever","Anything","Who","Anyone"],answer:3,type:"代名詞問題",explanation:"Anyone + 現在分詞attendingで修飾可能。Anyone who〜と同じ意味になる。",translation:"来週末の工芸ワークショップに参加する人は誰でも無料の材料を受け取ります。"},
  {id:39,q:"As a result of long-term requests from local residents, construction of the sports center will ——– in June.",options:["commence","modify","predict","establish"],answer:0,type:"語彙問題",explanation:"commence（開始する）は自動詞で目的語不要。will + 自動詞 + in Juneの構造に合う。",translation:"地域住民からの長年の要望を受けて、スポーツセンターの工事が6月に開始されます。"},
  {id:40,q:"Extensive ——– is needed to find the causes related to recent climate change.",options:["analyst","analyze","analysis","analytic"],answer:2,type:"品詞問題",explanation:"形容詞Extensive + 名詞 + is neededの構造。analysis（分析）が名詞として必要。",translation:"近年の気候変動に関連する原因を特定するには、広範な分析が必要です。"},
  {id:41,q:"To go to work, Ms. Khan needed to rent a car while ——– was being repaired.",options:["she","herself","her","hers"],answer:3,type:"代名詞問題",explanation:"was being repaired（修理されていた）の主語には所有代名詞hers（彼女の車）が適切。",translation:"仕事に行くためにKhanさんは彼女の車が修理中の間レンタカーを借りる必要があった。"},
  {id:42,q:"Most customers ——– have purchased the tablets developed by Protech are very satisfied with the long-lasting batteries.",options:["which","whose","who","what"],answer:2,type:"関係代名詞問題",explanation:"先行詞がcustomers（人）で主格の位置ではwhoが適切。whichは物に使う。",translation:"Protech社が開発したタブレットを購入したほとんどの顧客は、長持ちするバッテリーにとても満足している。"},
  {id:43,q:"Visitors to Haswell Systems must ——– identification at the security desk and receive a visitor badge.",options:["oversee","present","approve","expect"],answer:1,type:"語彙問題",explanation:"主語Visitorsと目的語identificationに合う動詞はpresent（提示する）。",translation:"Haswell Systems社への訪問者は警備デスクで身分証明書を提示して訪問者バッジを受け取らなければならない。"},
  {id:44,q:"In ——– to requests from local residents, bike lanes have been built on Cooper Street.",options:["responsive","respond","responsively","response"],answer:3,type:"品詞問題",explanation:"前置詞in + 名詞responseの組み合わせ。in response to（〜に応えて）の慣用表現。",translation:"地元の住民の要望に応えて、Cooper通りに自転車専用道路が整備されました。"},
  {id:45,q:"By expanding into the Southeast Asian market, Telco Creative has been able to more than double its sales ——– the past five years.",options:["among","over","before","onto"],answer:1,type:"語彙問題",explanation:"over the past …で「過去…にわたって」の意味。現在完了と共に使われる。",translation:"東南アジアの市場に進出したことで、Telco Creative社は過去５年間で売り上げを２倍以上にすることができた。"},
  {id:46,q:"To be ——– to apply for that laboratory technician position, you must have at least three years of work experience.",options:["frequent","eligible","accurate","responsible"],answer:1,type:"語彙問題",explanation:"be eligible to do（〜する資格がある）の表現。TOEICで頻出の語彙。",translation:"その検査技師の求人に応募するためには最低３年の実務経験が必要です。"},
  {id:47,q:"Digital images such as photos and illustrations in this website may not be used ——– permission.",options:["regarding","unlike","without","following"],answer:2,type:"語彙問題",explanation:"may not be usedとpermissionの関係からwithout（〜がなければ）が適切。without permission（許可なく）。",translation:"当ウェブサイト内の写真やイラストなどのデジタル画像は許可なく使用することができない。"},
  {id:48,q:"——– who pass the first round of online interviews will be invited for an interview at the company's headquarters.",options:["Application","Applicant","Apply","Applicants"],answer:3,type:"品詞問題",explanation:"関係代名詞who passの前には複数名詞Applicantsが必要。動詞haveが複数を示す。",translation:"オンラインでの１次面接を通過した応募者は、本社での面接に招待されることになっている。"},
  {id:49,q:"Questions regarding the new reimbursement system should be ——– to Mr. Luis in the accounting department.",options:["asked","coordinated","covered","directed"],answer:3,type:"語彙問題",explanation:"Questions（質問）をto Mr. Luisに向けるという意味でdirected（向ける）が適切。",translation:"新しい経費精算システムに関する質問は経理部のLuisさんに向けてください。"},
  {id:50,q:"Tickets for Carlin Theater are ——– online three months prior to the performance.",options:["availabilities","available","availability","availably"],answer:1,type:"品詞問題",explanation:"be動詞areの後には形容詞availableが続く。第2文型（S+V+C）の構造。",translation:"Carlin Theaterのチケットは公演の３か月前からオンラインで入手可能です。"},
  {id:51,q:"Dela Device emphasized the ease of use ——– the durability of its products at the New Tech Convention.",options:["in addition","equally","even though","as well as"],answer:3,type:"接続詞・前置詞問題",explanation:"空所後ろは名詞句で動詞がないため前置詞が必要。as well as（〜だけでなく）が並列構造を作る。",translation:"Dela Device社は、New Tech Conventionでその製品の耐久性だけでなく使いやすさを強調した。"},
  {id:52,q:"Mr. Ajay's extensive expertise in legal matters makes him the ——– person to lead the legal department.",options:["idealist","ideal","idealism","ideally"],answer:1,type:"品詞問題",explanation:"冠詞the + 形容詞 + 名詞personの構造。形容詞ideal（理想的な）が適切。",translation:"Ajayさんは法律に関して幅広い専門知識を持っているので、法務部門を率いる理想的な人物である。"},
  {id:53,q:"Mountain View Inn operates a ——– shuttle to the airport as one of its services for guests.",options:["transparent","complimentary","fierce","protective"],answer:1,type:"語彙問題",explanation:"complimentary（無料の）がfreeの言い換え。complimentary shuttle（無料シャトル）が自然なコロケーション。",translation:"Mountain View Innでは、宿泊者向けサービスのひとつとして空港への無料のシャトルバスを運行しています。"},
  {id:54,q:"Ms. Watanabe ——– a promotion given her sales performance over the past two years.",options:["preserves","reduces","withstands","deserves"],answer:3,type:"語彙問題",explanation:"主語Ms. Watanabeと目的語a promotionの関係から、deserves（〜に値する）が適切。",translation:"過去2年の売上実績を考慮すればワタナベさんは昇進に値します。"},
  {id:55,q:"Allen & Wolff LLP provides a ——– range of legal services to multinational companies.",options:["width","wide","widen","widely"],answer:1,type:"品詞問題",explanation:"冠詞a + 形容詞 + 名詞rangeの構造。形容詞wide（幅広い）が必要。",translation:"Allen & Wolff LLPは多国籍企業に対して幅広い範囲の法律業務を提供している。"},
  {id:56,q:"——– to the Baron Art Museum is free for children under 6 years old and seniors over 70 years old.",options:["Request","Compliance","Donation","Admission"],answer:3,type:"語彙問題",explanation:"Baron Art Museumへの〜が無料という文脈。Admission（入場料）が適切。",translation:"6歳未満の子供および70歳を超える高齢者はBaron Art Museumへの入場料は無料である。"},
  {id:57,q:"Office cleaning services by Kambil Corporation in Detroit are ——– priced, so many local businesses are using them.",options:["reasonable","reasonably","reason","reasoning"],answer:1,type:"品詞問題",explanation:"be動詞are + 副詞 + 過去分詞pricedの構造。副詞reasonably（手頃に）が必要。",translation:"デトロイトにあるKambil Corporationによるオフィス向けの清掃サービスは手ごろな価格であるので、多くの地元企業が利用している。"},
  {id:58,q:"Since its foundation, Works Uniforms has ——– in the sale of work clothing, footwear, and protective equipment for construction sites.",options:["promoted","assured","affected","specialized"],answer:3,type:"語彙問題",explanation:"直後に前置詞inがある。specialize in（〜を専門とする）の形で適切。",translation:"Works Uniformsは設立以来、建設現場用の作業服や靴、防護用具の販売を専門としている。"},
  {id:59,q:"The sales meeting at the Hong Kong branch will be held tomorrow ——– at 10:00 a.m.",options:["reliably","potentially","relatively","promptly"],answer:3,type:"語彙問題",explanation:"空所後に時間at 10:00 a.m.がある。promptly（きっかり）が時間を修飾する自然な表現。",translation:"香港支店でのセールス会議は明日のきっかり午前10時から開催されます。"},
  {id:60,q:"Green Forest Outdoors offers refunds on unused items ——– 7 days of purchase.",options:["before","from","within","until"],answer:2,type:"語彙問題",explanation:"within ——– of...（...から〜以内に）の表現。within 7 days of purchaseで「購入から7日以内」。",translation:"Green Forest Outdoorsでは購入から７日以内の未使用の商品に限り、返金の対象となります。"},
  {id:61,q:"Ms. Ramos asked her former supervisor, Mr. Taylor, for a ——– letter in order to change jobs.",options:["recommended","recommend","recommendation","recommending"],answer:2,type:"品詞問題",explanation:"複合名詞recommendation letter（推薦状）が正しい形。冠詞+名詞+名詞の構造。",translation:"Ramosさんは転職するためにかつての上司のTaylorさんに推薦状の依頼をした。"},
  {id:62,q:"Refreshments, including sweets and beverages, ——– at Hansen's retirement party next Friday.",options:["have served","served","will be serving","will be served"],answer:3,type:"動詞問題",explanation:"未来の受動態。Refreshmentsは提供される側なのでwill be served（提供される予定）が適切。",translation:"来週の金曜日に開催されるHansenさんの退職パーティーではお菓子や飲み物といった軽食が出されます。"},
  {id:63,q:"Thanks to Ms. Johnson's ——– donation, the City of Monterey was able to renovate the civic center last year.",options:["durable","adjacent","fragile","generous"],answer:3,type:"語彙問題",explanation:"generous donation（寛大な寄付）は自然なコロケーション。TOEICで頻出の表現。",translation:"Johnsonさんの寛大な寄付のおかげで、Monterey市は市民会館を昨年改装することができた。"},
  {id:64,q:"——– some people focus on career advancement, others place more emphasis on enjoying their leisure time.",options:["Since","While","Moreover","Despite"],answer:1,type:"接続詞問題",explanation:"接続詞Whileが対比を表す。「〜である一方で」という意味でothersとの対比に使われる。",translation:"出世を重視する人がいる一方で、余暇の時間を楽しむことを重視する人もいる。"},
  {id:65,q:"A proposal to relocate the civic library to the city center was ——– approved by the city council.",options:["unanimously","relatively","considerably","affordably"],answer:0,type:"語彙問題",explanation:"unanimously approved（満場一致で可決）が自然なコロケーション。TOEICで頻出。",translation:"市民図書館を市の中心部へ移転する議案は市議会で満場一致で可決された。"},
  {id:66,q:"Sophia Art Gallery, located in the Queens district, is easily ——– by public transportation.",options:["accessibility","access","accessibly","accessible"],answer:3,type:"品詞問題",explanation:"be動詞 + 副詞easily + 形容詞の構造。accessible（アクセスしやすい）が補語として適切。",translation:"Queens地区にあるSophia Art Galleryは公共交通機関で容易に行くことができます。"},
  {id:67,q:"Heavy rains last night hit the northwestern part of that town, ——– the river to flood.",options:["were causing","had caused","causing","are caused"],answer:2,type:"動詞問題",explanation:"現在分詞causingが結果を表す分詞構文を作る。「〜して、結果として川が氾濫した」。",translation:"昨晩の激しい雨がその町の北西部を襲い、川が氾濫した。"},
  {id:68,q:"Any questions regarding ——– leave should be directed to Mr. Dembo in the human resources department.",options:["defective","spacious","paid","prominent"],answer:2,type:"語彙問題",explanation:"paid leave（有給休暇）はTOEICで頻出の表現。",translation:"有給休暇に関する全ての質問は、人事部のDemboさんにご連絡ください。"},
  {id:69,q:"——– part-time employee is required to enter working hours into the attendance system every day.",options:["All","A lot of","Most","Each"],answer:3,type:"数量詞問題",explanation:"Eachは単数の可算名詞の前に使う。part-time employee（単数）にはEachが適切。",translation:"それぞれのパートタイム社員は、毎日、勤怠管理システムに勤務時間を入力しなければならない。"},
  {id:70,q:"As a result of streamlining its distribution channels, Amanda International Foods has ——– the big players in the food industry.",options:["signed up for","carried out","filled out","caught up with"],answer:3,type:"語彙問題",explanation:"caught up with（〜に追いついた）が文脈に合う。競合他社に追いつくという意味。",translation:"流通経路を合理化した結果、Amanda International Foodsは食品業界の大手企業に追いついた。"},
  {id:71,q:"——– you find any mistakes in the brochure, please contact the museum office as soon as possible.",options:["Should","Because","So that","In case of"],answer:0,type:"接続詞問題",explanation:"倒置による条件文。Should you find = If you should find（万が一〜したら）の意味。",translation:"万が一、パンフレットの中に間違いを発見したら、速やかに美術館の事務局に連絡ください。"},
  {id:72,q:"Three letters of ——– are required to apply for the position of accounting manager at Drexel Pharmaceutical.",options:["referred","refer","referring","reference"],answer:3,type:"品詞問題",explanation:"前置詞ofの後に名詞が必要。letter of reference（照会状・推薦状）が複合名詞として正しい。",translation:"Drexel Pharmaceutical社の経理課長職に応募するためには、3つの照会状が必要です。"},
  {id:73,q:"——– who have registered for a subscription to the magazine will receive the latest issue of the magazine within a week.",options:["Anyone","Whoever","Each","Those"],answer:3,type:"代名詞問題",explanation:"複数動詞haveが必要なので複数先行詞が必要。Those who（〜した人々）が適切。",translation:"その雑誌の定期購読に登録した人は、1週間以内に最新号の雑誌が届きます。"},
  {id:74,q:"The development team for the EX01 model has found it ——– to complete that model by September.",options:["difficultly","difficulty","difficulties","difficult"],answer:3,type:"品詞問題",explanation:"第5文型：find + it + 形容詞 + to不定詞の構造。形容詞difficultが補語として必要。",translation:"EX01モデルの開発チームは、そのモデルを9月までに完成させることが難しいと分かった。"},
  {id:75,q:"Sandeep Technologies is ——– to recycling programs as one of its environmental initiatives.",options:["dedication","dedicated","dedicating","dedicatedly"],answer:1,type:"品詞問題",explanation:"be動詞isの後に形容詞が必要。be dedicated to（〜に専念している）の慣用表現。",translation:"Sandeep Technologiesは環境保護活動の取り組みの一つとしてリサイクリングプログラムに打ち込んでいます。"},
  {id:76,q:"It is advisable to prepare answers to ——– possible questions at the upcoming workshop.",options:["every","all","another","much"],answer:1,type:"数量詞問題",explanation:"複数可算名詞questionsにはallが使える。everyは単数名詞、muchは不可算名詞に使う。",translation:"今度の研修会で想定されるすべての質問に対して答えを用意しておくことが望ましい。"},
  {id:77,q:"The City of Orange Bay was able to successfully complete a musical event featuring local artists ——– a lack of funding.",options:["although","nevertheless","unless","despite"],answer:3,type:"接続詞・前置詞問題",explanation:"名詞句a lack of fundingが続くので前置詞が必要。despite（〜にもかかわらず）が適切。",translation:"Orange Bay 市は資金不足にもかかわらず、地元のアーティストによる音楽イベントを無事に終えることができた。"},
  {id:78,q:"Climbing & Gear's camping tents are lighter and more durable than ——– of its competitors.",options:["them","that","these","those"],answer:3,type:"代名詞問題",explanation:"複数名詞tentsを受けるのでthose（それらのもの）が適切。those of competitors（競合他社のそれ）。",translation:"Climbing & Gearのキャンプ用テントは競合他社のそれよりも軽量で耐久性がある。"},
  {id:79,q:"By implementing the marketing strategy ——– by Mr. Adams, the theme park has seen a significant increase in the number of visitors.",options:["devising","devised","devise","devises"],answer:1,type:"動詞問題",explanation:"過去分詞devisedが名詞strategyを後置修飾。受動的な意味でAdamsさんに考案された戦略。",translation:"Adamsさんの考案したマーケティング戦略を実行したことによって、そのテーマパークは来場者数を大幅に増やすことに成功した。"},
  {id:80,q:"Ms. Whitfield ——– several errors in the inventory control manual and reported them to her supervisor.",options:["persuaded","detected","reminded","replaced"],answer:1,type:"語彙問題",explanation:"errorsを見つけるという文脈。detected（発見した）が自然。detect errors（誤りを発見する）。",translation:"Whitfieldさんは在庫管理マニュアルの中にいくつかの間違いを見つけ、上司に報告した。"},
  {id:81,q:"——– tickets for concerts by new artists are still available at the box office.",options:["Add","Additional","Addition","Additionally"],answer:1,type:"品詞問題",explanation:"空所の後ろに名詞tickets。形容詞Additional（追加の）が名詞を修飾する。",translation:"新人アーティストによるコンサートの追加のチケットはチケット売り場でまだ入手可能です。"},
  {id:82,q:"By the time Mr. Chang retires next year, he ——– for Delvan Corporation as a mechanical engineer for 15 years.",options:["has worked","had been working","will have worked","worked"],answer:2,type:"時制問題",explanation:"By the timeは時を表す副詞節。主節は未来完了形will have workedが適切。",translation:"Changさんは来年退職する時までに、Delvan Corporationで15年、メカニカルエンジニアとして働いたことになる。"},
  {id:83,q:"——– the human resources director, it seems to take more than three days to look over all the applications.",options:["Instead of","According to","In addition to","Prior to"],answer:1,type:"語彙問題",explanation:"「人事部長によれば」の意味でAccording to（〜によれば）が適切。",translation:"人事部長によれば、すべての応募書類に目を通すのに3日以上かかるようだ。"},
  {id:84,q:"The mayor thanked his supporters for their ——– comments at yesterday's press conference.",options:["encourage","encouraged","encourages","encouraging"],answer:3,type:"品詞問題",explanation:"所有格 + 形容詞 + 名詞の構造。commentsは人を励ます性質があるのでencouraging（励ます）が形容詞として適切。",translation:"市長は、昨日の記者会見で支持者たちの励ましのコメントに対してお礼を言った。"},
  {id:85,q:"——– an annual event, the Fuji Live Aid Festival is now held every two years.",options:["Originating","Originated","Original","Originally"],answer:3,type:"品詞問題",explanation:"「当初は年1回のイベントだったが」という意味で副詞Originally（当初は）が文修飾する。",translation:"当初年1回の開催でしたが、Fuji Live Aid Festivalは現在2年に1回開催されています。"},
  {id:86,q:"Ms. Bhat joined Campion Consulting after earning a master's ——– in business administration in the UK.",options:["degree","pension","commission","subject"],answer:0,type:"語彙問題",explanation:"master's degree（修士号）が自然な複合名詞。in business administration（経営学の）が後続。",translation:"Bhatさんは、英国で経営学の修士号を取得したあとに、Campion Consultingに入社した。"},
  {id:87,q:"If you have forgotten your password, enter ——– email address here to send it to us.",options:["you","yourself","yours","your"],answer:3,type:"代名詞問題",explanation:"所有格 + 名詞の構造。email addressを修飾する所有格yourが適切。",translation:"パスワードを忘れた場合は、あなたのメールアドレスをここに入力して送信してください。"},
  {id:88,q:"The factory's labor management manual clearly states that minimum safety standards must be met, ——– much it costs.",options:["very","however","moreover","even"],answer:1,type:"語彙問題",explanation:"however much it costsで「どんなにコストがかかろうと」という譲歩表現。",translation:"工場の労務管理マニュアルにはどんなにコストがかかろうと、最低限の安全基準は満たさなければならないと明記されている。"},
  {id:89,q:"——– Ms. Darville nor Mr. Nichols has the registered dietitian license required for the position.",options:["Either","Both","Neither","Not only"],answer:2,type:"相関接続詞問題",explanation:"norとペアになる相関接続詞はNeither。Neither A nor Bで「AもBもどちらも〜ない」の意味。",translation:"DarvilleさんもNicholsさんもその職が求める管理栄養士の資格を持っていません。"},
  {id:90,q:"Mr. Davies has already worked at our plant for 15 years and is ——– the most skilled welders.",options:["within","during","among","from"],answer:2,type:"語彙問題",explanation:"among the most skilled weldersで「最も熟練した溶接工の一人」。be among（〜の一人である）の表現。",translation:"Daviesさんは、当工場ですでに15年働いていて、最も熟練した溶接工の一人です。"},
  {id:91,q:"Altona Grocery Store has a good reputation because it carries ——– grown vegetables.",options:["locality","localize","local","locally"],answer:3,type:"品詞問題",explanation:"過去分詞grownを修飾する副詞が必要。locally（地元で）grown vegetablesで「地元産の野菜」。",translation:"Altona Grocery Storeは地元で栽培された野菜を販売しているため、評判が良い。"},
  {id:92,q:"The flooring materials developed by Bellevue Manufacturing are ——– to moisture.",options:["considerable","loyal","resistant","capable"],answer:2,type:"語彙問題",explanation:"be resistant to（〜に耐性がある）が自然なコロケーション。moisture（湿気）への耐性。",translation:"Bellevue Manufacturing社が開発した床材は湿気に強い。"},
  {id:93,q:"A ——– market study is required by Hillside Ad Company's board of directors before its ambitious business plan is implemented.",options:["comprehensive","comprehend","comprehension","comprehensively"],answer:0,type:"品詞問題",explanation:"冠詞A + 形容詞 + 名詞market studyの構造。形容詞comprehensive（包括的な）が必要。",translation:"Hillside Ad Company社の取締役会は、野心的な事業計画を実施する前に包括的な市場調査を求めている。"},
  {id:94,q:"Due to the successful launch of new products last quarter, ——– employee will receive a special bonus at the end of this month.",options:["most of","most","all","every"],answer:3,type:"数量詞問題",explanation:"単数可算名詞employeeの前にはeveryが使える。every employee（すべての従業員それぞれ）。",translation:"先四半期の新製品の発売が成功したため、すべての従業員が今月末に特別ボーナスを受け取ることになる。"},
  {id:95,q:"During ——–, the plant manager noticed something wrong with the conveyor belt on the north side.",options:["assemble","assembled","assembles","assembly"],answer:3,type:"品詞問題",explanation:"前置詞duringの後には名詞が必要。assembly（組み立て作業）が名詞として適切。",translation:"組み立て作業中、工場長は北側のコンベヤーベルトに異常を発見した。"},
  {id:96,q:"It is widely believed that the quality of sleep, ——– eating habits, has a significant impact on health.",options:["on behalf of","along with","in charge of","by means of"],answer:1,type:"語彙問題",explanation:"along with（〜とともに）が並列を表す。sleep qualityとeating habitsを健康への影響として並列する。",translation:"睡眠の質は、食習慣とともに、健康に大きな影響を与えると広く信じられている。"},
  {id:97,q:"Mr. Daoud is very satisfied with the ——– living room in the Japanese style.",options:["renovating","renovation","renovated","renovate"],answer:2,type:"品詞問題",explanation:"過去分詞renovatedが名詞living roomを修飾。改装された（受け身の意味）リビングルーム。",translation:"ダウドさんは和風にリノベーションされたリビングルームにとても満足している。"},
  {id:98,q:"The classical concert next week is expected to draw a ——– number of patrons than last year.",options:["large","largest","more largely","larger"],answer:3,type:"比較問題",explanation:"thanがあるので比較級が必要。larger number of（より多くの）が正しい比較表現。",translation:"来週のクラシックコンサートは昨年よりも多くの客が来ると予想されている。"},
  {id:99,q:"Mr. Peppin will report to his supervisor about the finance workshop he ——– in Seoul last week.",options:["will be attend","attends","is attending","attended"],answer:3,type:"時制問題",explanation:"last week（先週）という過去を示す副詞句があるので過去形attendedが適切。",translation:"ペパンさんは先週ソウルで参加した財務ワークショップについて上司に報告する予定です。"},
  {id:100,q:"Since its establishment, Stellen Group has ——– emphasized customer satisfaction.",options:["consistency","consistently","consistent","consistence"],answer:1,type:"品詞問題",explanation:"現在完了has + 副詞 + 過去分詞の構造。副詞consistently（一貫して）がemphasizedを修飾する。",translation:"設立以来、Stellen Groupは一貫して顧客満足を重視してきた。"},
  {id:101,q:"Mr. Schaeffer managed to finish his new novel even though ——– had only a few days until the deadline.",options:["his","him","himself","he"],answer:3,type:"代名詞問題",explanation:"空所の前後を見ます。空所の前がeven though で接続詞。後ろが動詞hadと目的語just a few days。したがって空所には動詞hadの主語が入ることがわかります。主語になれるのは、所有代名詞の(A) his（所有格［彼の］もありますが、ここでは所有代名詞で「彼のもの」として検討します）と主格の(D) he（彼は）です。目的語の「わずか数日間」と合うのは、主格の(D) he（彼は）です。",translation:"Schaefferさんは、締め切りまでわずか数日だったけれども、どうにか新作の小説を書き終えることができた。"},
  {id:102,q:"First West Bank offers low-interest mortgages online to customers ——– the country.",options:["throughout","among","during","onto"],answer:0,type:"語彙問題",explanation:"空所の後ろにthe country （国）があり、これと合うのは(A) throughout（～の至る所で）です。",translation:"First West Bankは全国で低金利の住宅ローンを顧客に対してオンラインで提供している。"},
  {id:103,q:"Toyo Media Group has 15 branches in Asia, three of ——– are in Japan.",options:["those","these","them","which"],answer:3,type:"関係詞・代名詞問題",explanation:"文全体の構造を確認するために、動詞をチェックします。動詞はhasとareです。間にandなどの接続詞がないので、代名詞の(A) those、(B) these、(C) themは入りません。関係代名詞の(D) which（この問題では非制限用法）だけが、カンマの前の文と後ろをつなぐことができます。",translation:"Toyo Media Groupはアジアに15の支店があり、そのうちの３つは日本にある。"},
  {id:104,q:"——– your purchase has not arrived on the scheduled delivery date, please contact us using the form on our website.",options:["In case of","Unless","In the event that","As"],answer:2,type:"購入した商品が配送予定日に届いていない場合は、当社ウェブサイトのフォームからお問い合わせください。",explanation:"空所の後ろの形を見ます。your purchase has not arrivedで主語+動詞の形、カンマ以降は命令文で動詞がcontact です。したがって空所には接続詞が入ることがわかります。選択肢の中で接続詞は(B) Unless（もし～ないなら）、(C) In the event that（〈万一〉～の場合には）、(D) As（～なので、～につれて）の３つになります。",translation:"購入した商品が配送予定日に届いていない場合は、当社ウェブサイトのフォームからお問い合わせください。"},
  {id:105,q:"If you receive a refund, you must show ——– of purchase, such as a receipt.",options:["proof","preference","profile","revenue"],answer:0,type:"語彙問題",explanation:"空所以下が、——– of purchase（購入の何か）で具体例としてsuch as a receipt（レシートのような）があるので(A) proof（証明、証拠）が適切です。",translation:"返金を受ける場合、レシートなどの購入証明を提示しなければならない。"},
  {id:106,q:"Siesna Construction worked ——– with Gessen Design Office on a project to install solar panels on the roof of City Hall.",options:["hardly","prominently","approximately","closely"],answer:3,type:"語彙問題",explanation:"空所の前後を見ます。空所の前が動詞worked、後ろが前置詞with。この2語の間に入るのは(D) closely（密接に）です。",translation:"Siesna Construction は、市庁舎の屋上に太陽光パネルを設置するプロジェクトでGessen Design Officeと密接に連絡を取って仕事をしていた。"},
  {id:107,q:"Machines purchased from us come with a free one-year repair ——– from the date of purchase.",options:["excerpt","warranty","invitation","connection"],answer:1,type:"語彙問題",explanation:"空所の前がa free one-year repair（無料の1年の修理）で後ろがfrom the date of purchase（購入日から）とあるので、(B) warranty（保証）が適切です。",translation:"当店で購入された機械は購入から1年間の無料の修理保証がついています。"},
  {id:108,q:"Trattoria Gennaro has expanded its lunch menu and started a delivery service ——– increase sales.",options:["now that","in order to","purposely","rather"],answer:1,type:"部分読み問題",explanation:"空所の後ろの形を見ます。increase sales で動詞の原形+目的語であることがわかります。動詞の原形の前におけるのは(B) in order to （～するために）だけでこれを選びます。",translation:"Trattoria Gennaroは、売り上げ拡大のためランチメニューの拡充とデリバリーサービスを始めた。"},
  {id:109,q:"——– the road repair work is completed, the traffic restrictions on Maple Street will be removed.",options:["Consequently","Once","Beforehand","Among"],answer:1,type:"部分読み問題",explanation:"空所の後ろの形を見ます。the road repair work is completedで主語+動詞の形で、カンマ以降もthe traffic restrictions on Maple Street will be removedで主語+動詞の形になっています。この形は上の１に該当し、空所には接続詞が入ることがわかります。選択肢の中で接続詞は(B) Once（いったん～したら）だけなので(B)を選びます。",translation:"道路修復工事が完了すれば、Maple通りの交通規制は解除されます。"},
  {id:110,q:"Mr. Nigel’s proposed promotional plan seemed quite difficult, but he was able to accomplish it ——–.",options:["his","him","himself","he"],answer:2,type:"代名詞問題",explanation:"空所は文末なので空所の前を見ます。空所が含まれるbut以降はhe was able to accomplish itで特に足りないものがなく文として完結しています。",translation:"Nigelさんの提案した販促プランはかなり難しそうに思われたが、彼自身で成し遂げることができた。"},
  {id:111,q:"Given the recent rise in problems with social networking services, it has become ——– important to properly disclose information.",options:["increasing","increase","increasingly","increased"],answer:2,type:"品詞問題",explanation:"空所の前後を見ます。空所の前が過去分詞の動詞become、後ろが形容詞important。形容詞importantを修飾する副詞の(C) increasingly（ますます）が適切です。",translation:"近年、ソーシャルネットワークサービスでトラブルが増えていることを考慮すると、適切に情報を公開することがますます重要になってきている。"},
  {id:112,q:"Ms. Choi ——– the quality improvement team at the plant for the past two years.",options:["will oversee","has been overseen","oversees","has overseen"],answer:3,type:"能動態・受動態・時制に関する動詞問題",explanation:"主語はMs. Choi、目的語がthe quality improvement team（品質改善チーム）です。Ms. Choi（Choiさん）が、the quality improvement team（品質改善チーム）を「oversee（監督する）」ので能動態の動詞になります。したがって受動態の(B) has been overseenが外れます。",translation:"Choiさんは、過去2年間、工場内の品質改善チームを監督してきた。"},
  {id:113,q:"——– approval from the immediate supervisor is required for any business travel involving an overnight stay.",options:["Renowned","Prior","Confident","Valuable"],answer:1,type:"語彙問題",explanation:"空所の後がapproval（承認）です。これと合うのは(B) Prior（事前の）です。",translation:"宿泊を伴う出張は、直属の上司の事前承認が必要である。"},
  {id:114,q:"You can view your credit card statement and points earned by logging into ——– account.",options:["your","yours","yourself","you"],answer:0,type:"代名詞問題",explanation:"空所の後が名詞account（アカウント）なので所有格の(A) your （あなたの）が適切です。",translation:"アカウントにログインすることでクレジットカードの利用明細と獲得ポイントを見ることができます。"},
  {id:115,q:"The upcoming walking tour is open to everyone, ——– age, and those who wish to participate should register on the tour website.",options:["subsequent to","in keeping with","in place of","regardless of"],answer:3,type:"語彙問題",explanation:"空所までの意味は「今度のウォーキングツアーは、誰でも参加できます」となります。この内容に合うのは、",translation:"今度のウォーキングツアーは、年齢に関係なく誰でも参加できますので希望者はツアーのウェブサイトからお申込みください。"},
  {id:116,q:"Reymond Elevator Group asks that elevators ——– at least once every two months.",options:["inspect","are inspected","will inspect","be inspected"],answer:3,type:"能動態・受動態・時制に関する動詞問題",explanation:"asks that節に気づくかどうかがカギになります。",translation:"Reymond Elevator Groupは、エレベーターを少なくとも2か月に一回点検するように求めている。"},
  {id:117,q:"Before ——– for a mortgage, you should consider the loan terms of several banks.",options:["have applied","apply","will be applied","applying"],answer:3,type:"能動態・受動態・時制に関する動詞問題",explanation:"まず、文頭のBefore以下の確認です。beforeは接続詞、前置詞の機能があります。接続詞の場合は、通常は主語と動詞が続きます。ところが、Beforeの後に主語に当たるものがありません。したがって、主語を必要とする動詞の形の(A) have applied（現在完了形）、(B) apply（現在形または原形）、(C) will be applied（未来形）は除外されます。残ったing形の(D) applyingが適切です。今回は能動態、受動態について検討する必要はありませんでした。",translation:"住宅ローンを申し込む前に、複数の銀行の融資条件を検討すべきである。"},
  {id:118,q:"——– change your booked bus, please contact the reservation center phone number listed on the back of your ticket.",options:["For","Concerning","To","Despite"],answer:2,type:"語彙問題",explanation:"空所の後ろに動詞の原形change （変更する）と目的語your booked bus （あなたの予約したバス）が続きます。動詞の原形の前にくるのは不定詞の(C) Toになります。他の選択肢は動詞の原形の前におくことができません。",translation:"予約したバスを変更するためには、チケットの裏に記載の予約センターの電話番号に連絡してください。"},
  {id:119,q:"The introduction of practical robots is ——– anticipated to make up for labor shortages in the nursing care industry.",options:["highest","high","highly","higher"],answer:2,type:"品詞または比較問題",explanation:"空所の前後を見ます。空所の前がbe動詞is、後ろが形容詞または過去分詞のanticipated（待ち望まれた）。形容詞anticipatedを修飾する副詞の(C) highly（非常に）が適切です。",translation:"介護業界における労働力不足を補うために、実用的なロボットの導入が非常に待ち望まれている。"},
  {id:120,q:"Some economic experts are ——– that wheat prices will rise next year, affecting household budgets.",options:["proceeding","predicting","approaching","focusing"],answer:1,type:"語彙問題",explanation:"空所の直後のthatからthat節が始まります。選択肢の中でthat節が取れるのは、(B) predicting（予測している）のみです。",translation:"来年、小麦価格が上昇して家計に影響を与えると予測している経済の専門家がいる。"},
  {id:121,q:"Various driving tests are ——– in several countries for the practical implementation of automated driving.",options:["conducting","being conducted","conduct","conducts"],answer:1,type:"動詞問題",explanation:"主語はVarious driving tests（さまざまな走行テスト）です。動詞conduct（行う）との関係は、Various driving tests（さまざまな走行テスト）が「行われる」なので動詞は受動態が適切です。したがって唯一の受動態の選択肢(B) being conducted（受け身の進行形で「行われている」）を選びます。",translation:"自動運転の実用化のために、いくつかの国でさまざまな走行実験が行われている。"},
  {id:122,q:"Greenleaf Gardening sells a ——– range of flower seeds in its store as well as online.",options:["broad","broaden","broadness","broadly"],answer:0,type:"品詞問題",explanation:"空所の前後を見ます。空所の前が冠詞a、後ろが名詞のrange（範囲）。したがって空所には名詞rangeを修飾する形容詞の(A) broad（広い）が適切です。",translation:"Greenleaf Gardeningは幅広い種類の花の種を店舗だけでなくオンラインでも販売している。"},
  {id:123,q:"After working for three years at a financial institution in Hong Kong, Ms. Fujita ——– to Tokyo and established a financial consulting firm.",options:["arrived","visited","returned","reached"],answer:2,type:"語彙問題",explanation:"空所の後がto Tokyo（東京へ）なので、(C) returned（戻る）が適切です。",translation:"Fujitaさんは香港の金融機関で3年間働いた後、東京に戻って財務コンサルティングの会社を設立した。"},
  {id:124,q:"Due to a significant increase in employees this year, Peach Design Systems will need to move to a ——– larger office.",options:["very","quite","so","much"],answer:3,type:"語彙問題",explanation:"選択肢がすべて副詞なので「語彙問題」であることがわかります。空所に入る副詞が修飾する語がヒントになります。",translation:"今年に入って社員が著しく増えているので、Peach Design Systems社はもっと広いオフィスに移転する必要があるだろう。"},
  {id:125,q:"Given that we were able to develop a competitive application, hiring several talented programmers was ——– a success.",options:["clear","clearly","clearing","clearness"],answer:1,type:"品詞問題",explanation:"空所の前後を見ます。空所の前がbe動詞was、後ろが冠詞a。これだけの情報では絞り込めないので",translation:"競争力のあるアプリケーションを開発できたことを考慮すると、優秀なプログラマーを数名採用したことは明らかに成功であった。"},
  {id:126,q:"The Koizumi Municipal Library will be closed for renovations ——– on Wednesday, June 1.",options:["begin","will begin","beginning","have begun"],answer:2,type:"動詞問題",explanation:"問題文の動詞はwill be closed の箇所です。この動詞を空所の間にはandなどの接続詞がないので、述語動詞の形の(A) begin（現在形または原形）、(B) will begin（未来形）、(D) have begun（現在完了形）を入れることはできません。したがって前後をrenovations（改装）とon Wednesday, June 1（６月１日水曜日）をつなぐ(C) beginning（beginの現在分詞-ing形で「～始まる」）が適切です。現在分詞ing形で前の名詞を修飾する形です。",translation:"Koizumi 市営図書館は、6月1日水曜日から始まる改装工事のため、休業になります。"},
  {id:127,q:"Entering the order number of an item into the tracking system will ——– users to track their packages.",options:["prevent","undergo","allow","approve"],answer:2,type:"語彙問題",explanation:"空所の後ろが目的語users（利用者）で不定詞のto track（追跡する）です。目的語+ to doの不定詞がとれる動詞は(C) allow（〈人が〉〈…するのを〉可能にする）のみです。",translation:"商品の注文番号を追跡システムに入力することで利用者は荷物の追跡をすることできます。"},
  {id:128,q:"Ms. Tanaka was able to get a position as an accounting assistant that became available last week in a ——– manner.",options:["congested","periodical","timely","numerous"],answer:2,type:"語彙問題",explanation:"空所の前が前置詞inと冠詞 a、後がmanner（やり方、方法）です。これと合うのは(C) timely（タイムリーな）です。timelyは語尾がlyで終わりますが、副詞だけでなく形容詞もあることに注意してください。",translation:"Tanakaさんは先週空いた経理アシスタントの職にタイミングよく就くことができた。"},
  {id:129,q:"The social media product promotion organized by Mr. Stone has been one of the most successful advertising campaigns ——–.",options:["soon","ago","still","ever"],answer:3,type:"語彙問題",explanation:"空所の前がthe most successful advertising campaignsと最上級になっています。最上級と合う副詞は(D) ever（これまでで）です。",translation:"Stoneさんが企画したソーシャルメディアによる製品プロモーションはこれまでで最も成功した広告キャンペーンの一つである。"},
  {id:130,q:"MT Rental Company hired an ——– programmer to add new features to its meeting room reservation management system.",options:["experiencing","experience","experiences","experienced"],answer:3,type:"品詞・動詞問題",explanation:"空所の前後を見ます。空所の前が冠詞an、後ろが名詞programmer（プログラマー）。一般的に【冠詞】+【形容詞】+【名詞】なので形容詞が候補になります。形容詞的な働きがあるのが(A) experiencing（動詞experienceのing形）とexperience の過去分詞形で形容詞でもある(D) experienced（形容詞：経験豊富な）です。修飾するprogrammerと合うのは(D) experienced（形容詞：経験豊富な）です。",translation:"MT Rental Companyは会議室の予約管理システムへ新しい機能を追加するために経験豊富なプログラマーを採用した。"},
  {id:131,q:"Reza West Consulting has been actively recruiting employees with ——– backgrounds.",options:["diversely","diversify","diversity","diverse"],answer:3,type:"品詞問題",explanation:"空所の前後を見ます。空所の前が前置詞with、後ろが複数名詞のbackgrounds（経歴）。したがって空所には名詞 backgrounds を修飾する形容詞の(D) diverse（多様な）が適切です。",translation:"Reza West Consultingはこれまで積極的に多様な経歴をもった社員を採用してきた。"},
  {id:132,q:"Please be very careful when disclosing our ——– information to outside parties.",options:["moderate","confidential","prosperous","confident"],answer:1,type:"語彙問題",explanation:"空所の後がinformation（情報）です。これと一番合いそうなのは合うのは(B) confidential（機密の）です。念のためもう少し確認する箇所を広げていきましょう。",translation:"当社の機密情報を外部に公開する際は十分に注意してください。"},
  {id:133,q:"For a ——– time only, Abilos Fitness Gym is offering a free one-month trial for new members.",options:["limitedly","limited","limitation","limiting"],answer:1,type:"品詞問題",explanation:"空所の前後を見ます。空所の前が冠詞a、後ろが名詞のtime（時間、期間）。したがって空所には形容詞の名詞 (B) limited（限られた、限定された）、または(D) limiting（限定する、制限する）が候補になります。",translation:"期間限定で、Abilos Fitness Gymは新規会員向けに１か月の無料トライアルを提供している。"},
  {id:134,q:"Monday is the most convenient day for ——– to hold our department meetings.",options:["our","us","ours","we"],answer:1,type:"代名詞問題",explanation:"空所の前後を見ます。空所の前が前置詞for、後ろがto不定詞になります。前置詞の後に1語の場合は、通需は目的格の(B) usがきますが、可能性として所有代名詞の(C) ours（私たちのもの）もあります。",translation:"私たちにとって部門会議を開催するのにもっとも都合がいい日が月曜日です。"},
  {id:135,q:"Please be sure to follow the attached ——– when assembling our furniture.",options:["instructions","destinations","connections","appointments"],answer:0,type:"語彙問題",explanation:"空所の前がfollow the attached …（添付の…に従う）なので、(A) instructions（取扱説明書、指示）が合いそうです。",translation:"当社の家具を組み立てる際には、必ず添付の説明書に従ってください。"},
  {id:136,q:"At Rosen Technologies, rigorous testing was repeatedly conducted to improve the ——– of the products.",options:["reliable","relies","reliably","reliability"],answer:3,type:"品詞問題",explanation:"空所の前後を見ます。空所の前が冠詞the、後ろが前置詞のof。したがって空所には名詞が入り、(D) reliability（信頼性）が適切です。",translation:"Rosen Technologiesでは、製品の信頼性を向上させるために、厳格なテストが繰り返し行われた。"},
  {id:137,q:"The North Hilltop Hotel where we are staying this weekend is located on a hill ——– the lake.",options:["overseeing","overlooking","transferring","undergoing"],answer:1,type:"語彙問題",explanation:"空所の前はhill（丘）、後ろはthe lake（湖）。前後をつなぐ選択肢は(B) overlooking（見渡せる）です。",translation:"私たちが今週末に宿泊するNorth Hilltop Hotelは湖を見渡せる丘の上に位置している。"},
  {id:138,q:"Many real estate companies are ——– using Internet advertisements to obtain rental contracts for apartments.",options:["acting","active","actively","action"],answer:2,type:"品詞問題",explanation:"空所の前後を見ます。空所の前がbe動詞are、後ろがusingで動詞のing形、その後に目的語のInternet advertisements（インターネット広告）が続くので現在進行形の文であることがわかります。したがって現在進行形の動詞を修飾する副詞の(C) actively（積極的に）が適切です。",translation:"多くの不動産会社はマンションの賃貸契約を獲得するためにインターネット広告を積極的に活用している。"},
  {id:139,q:"If a new bridge ——– in the northwest part of the city, it would have reduced traffic congestion during the commute.",options:["was built","built","had been building","had been built"],answer:3,type:"能動態・受動態・時制に関する動詞問題",explanation:"まず、動詞の主語を特定します。主語はa new bridge（新しい橋）です。「新しい橋」は「建設される」なので動詞は受動態になります。したがって、過去時制の受動態(A) was builtと過去完了の受動態(D) had been builtの２つが候補になります。",translation:"もし新しい橋が市の北西部に建設されていれば、通勤時の渋滞は緩和されていただろう。"},
  {id:140,q:"In recent years, interest in ——– energy sources such as solar and wind power has increased.",options:["renew","renewable","renewal","renewably"],answer:1,type:"品詞問題",explanation:"空所の前後を見ます。空所の前が前置詞in、後ろが名詞句のenergy sources （エネルギー源）。したがって空所には名詞句 energy sourcesを修飾する形容詞の(B) renewable（再生可能な）が適切です。",translation:"近年、太陽光や風力などの再生可能エネルギーに対する関心が高まっている。"},
  {id:141,q:"It is said that older people tend ——– more TV than younger people.",options:["watching","watch","to be watched","to watch"],answer:3,type:"動詞問題",explanation:"tend（〈する〉傾向がある）の後ろはto doになります。したがって、to doの形の(C) to be watchedと(D) to watchが候補になります。",translation:"若い世代よりも高齢者のほうがテレビを多くみる傾向があると言われている。"},
  {id:142,q:"Ms. Okada had to ——– the job offer from KAOA Motors because she had already decided to work for another company.",options:["decline","resume","preserve","misplace"],answer:0,type:"語彙問題",explanation:"空所の後の目的語the job offer （仕事のオファー）なので、これと合う選択肢は(A) decline（断る）と考えられます。",translation:"Okadaさんはすでに別の会社で働くことを決めたので、KAOA Motorsからの仕事のオファーを断らなければならなかった。"},
  {id:143,q:"——– the books Ｍr. Kamau ordered arrive at the store, please give him a call.",options:["Following","Immediately","Regarding","As soon as"],answer:3,type:"部分読み問題",explanation:"空所の後ろの形を見ます。the books Ｍr. Kamau ordered arriveはbooks とＭr. Kamauの間に関係代名詞whichまたはthatが省略されていて、the books which Ｍr. Kamau ordered arriveなのでthe books（主語）とarrive（動詞）の形です。カンマ以降は命令文で動詞giveです。したがって空所には接続詞が入ることがわかります。選択肢の中で接続詞は(D) As soon as（～するとすぐに）のみで、これを選びます。",translation:"Kamauさんが注文した書籍が店舗に届いたらすぐに彼に電話で連絡をしてください。"},
  {id:144,q:"If you are looking for ——– information on bicycle repair, please check out the videos on the repair related pages of our website.",options:["helpfulness","helps","helpful","helpfully"],answer:2,type:"品詞問題",explanation:"空所の前後を見ます。空所の前が前置詞for、後ろが名詞のinformation（情報）。したがって空所には名詞informationを修飾する形容詞の(C) helpful（役立つ）が適切です。",translation:"自転車の修理に役に立つ情報をお探しならば、当ウェブサイトの修理関連ページのビデオをご覧ください。"},
  {id:145,q:"The Asian Furniture Expo will be held ——– the Tokyo Bay Convention Center from June 11 to 15.",options:["from","at","over","of"],answer:1,type:"語彙問題",explanation:"空所の前がbe held（開催される）、後ろがthe Tokyo Bay Convention Centerという場所。したがって、the Tokyo Bay Convention Centerという場所で開催されると考えるのが適切です。したがって(B) at（～で）を選択します。",translation:"Asian Furniture Expoは、6月11日から15日までTokyo Bay Convention Centerで開催されます。"},
  {id:146,q:"Mr. Valdez created the new product concept after a thorough ——– of market research data.",options:["analyst","analysis","analyzed","analyze"],answer:1,type:"品詞問題",explanation:"空所の前後を見ます。空所の前が冠詞と形容詞のa thorough、後ろが前置詞のof。したがって空所には名詞が入ることがわかります。名詞は(A) analyst（分析者、アナリスト）と(B) analysis（分析）あります。",translation:"Valdezさんはマーケット調査のデータを徹底的に分析した後で新しい製品のコンセプトを作り出した。"},
  {id:147,q:"Podell Electronics is trying to gather as ——– customer comments as possible for new product development.",options:["another","many","each of","much"],answer:1,type:"数量形容詞問題",explanation:"空所の後ろの名詞句が可算名詞で複数のcustomer comments（お客様のコメント）。可算名詞の複数形の前におけるのは、(B) many（多くの）のみでこれを選びます。",translation:"Podell Electronicsは新製品開発に向けてできるだけ多くのお客様のコメントを集めるようとしている。"},
  {id:148,q:"Our pharmacy will be closed tomorrow, so please bring the ——– from your doctor after the day after tomorrow.",options:["subscription","participation","comparison","prescription"],answer:3,type:"語彙問題",explanation:"空所の前の動詞bring（持ってくる）、 後ろがfrom your doctor （医師からの）とあります。したがって(D) prescription（処方箋）を選びます。",translation:"明日は当薬局が休業となるため、明後日以降に担当医師の処方箋を持ってきてください。"},
  {id:149,q:"Please make sure that the audio equipment in Conference Room 203 is working ——– for tomorrow’s presentation.",options:["more proper","properly","proper","properness"],answer:1,type:"品詞問題",explanation:"空所の前後を見ます。空所の前がis working（動作している）、後ろが前置詞for。is workingの主語はthe audio equipment（オーディオ機器）。「オーディオ機器」は「動作している」に合うのは現在進行形の動詞is working「動作している」を修飾する副詞の(B) properly（適切に、きちんと）です。",translation:"明日のプレゼンテーションに向けて、会議室203のオーディオ機器がきちんと動作することを確認しておいてください。"},
  {id:150,q:"The results will be compiled ——– as one month has already passed since the survey was mailed.",options:["previously","shortly","proudly","nearly"],answer:1,type:"語彙問題",explanation:"空所の前を見ます。The results will be compiledは「結果はまとめられるでしょう」の意味です。これと合うのは、(B) shortly（まもなく）です。",translation:"すでにアンケートの郵送から1か月経過したのでまもなく結果がまとめられるでしょう。"},
  {id:151,q:"——– the necessary parts arrive today, the production of Model 501 will have to be postponed.",options:["Whenever","Without","Unless","In case"],answer:2,type:"全文読み問題",explanation:"空所の後ろの形を見ます。the necessary parts arriveで主語+動詞の形、カンマ以降のthe production of Model 501 will have to be postponedも主語+動詞の形です。したがって空所には接続詞が入ることがわかります。選択肢の中で接続詞は(A) Whenever（～するときはいつでも）、(C) Unless（もし、～ないなら）、(D) In case（万一～の場合には）の３つになります。",translation:"本日必要な部品が届かなければ、Model 501の製造を延期しなければならないだろう。"},
  {id:152,q:"The preservation of the ——– building is being actively discussed at a Keegan City Commission meeting set up last month.",options:["historic","historically","history","historian"],answer:0,type:"品詞問題",explanation:"空所の前後を見ます。空所の前が冠詞the、後ろが名詞のbuilding（建物）。したがって空所には名詞buildingを修飾する形容詞の(A) historic（歴史上重要［有名］な）が適切です。",translation:"先月設置されたKeegan市の委員会で、歴史的な建物を保存することについて活発に議論されている。"},
  {id:153,q:"By the end of next month, Taiyo Financial Group must decide ——– it will open a branch in Hong Kong.",options:["but","because","although","whether"],answer:3,type:"全文読み問題",explanation:"空所の前の意味は、「来月末までにTaiyo Financial Groupは決めなければならない」。後ろの意味は「香港に支店を開設する」です。このふたつをつなぐのに適切なのは(D) whether（～かどうか）です。",translation:"来月末までに、Taiyo Financial Groupは香港に支店を開設するかどうかを決定しなければなりません。"},
  {id:154,q:"Ms. Singh left the office ——– after the monthly meeting to go on a business trip to Chicago.",options:["heavily","steadily","immediately","commonly"],answer:2,type:"語彙問題",explanation:"空所の前後を見ます。空所の前がMs. Singh left the office（Singhさんは会社を出た）。後ろが前置詞after。「Singhさんは～のすぐ後で会社を出た」とするのが自然な表現なので、(C) immediately（すぐに）を選びます。",translation:"Singhさんは月例会議のすぐ後に、シカゴへ出張するために会社を出た。"},
  {id:155,q:"As a ——– of our appreciation, we will be giving away free towels at this weekend’s sale.",options:["flyer","prescription","nomination","token"],answer:3,type:"語彙問題",explanation:"空所の前がAs a （～として）、後ろがof our appreciation（私たちの感謝の）なので、 (D) token（しるし）が適切です。",translation:"日頃の感謝の印として、今週末のセールでは無料のタオルを贈呈いたします。"},
  {id:156,q:"Arika Kitchen has earned a reputation for ——– and creative cuisine using ingredients from around the world.",options:["innovation","innovate","innovatively","innovative"],answer:3,type:"品詞問題",explanation:"空所の前後を見ます。空所の前が前置詞for、後ろがandとcreative cuisine（創造的な料理）が続きます。andは空所とcreativeをつなぐと考えられるので、名詞を修飾するcreativeと同じ形容詞が入り、(D) innovative（革新的な、斬新な）が適切です。",translation:"Arika Kitchenは、世界各国の食材を用いた斬新で独創的な料理で高い評価を受けている。"},
  {id:157,q:"Kevin Miyata ——– director of marketing because of his past performance recognized by the board of directors.",options:["appointing","was appointed","to be appointed","appoint"],answer:1,type:"能動態・受動態・時制に関する動詞問題",explanation:"because of以下は名詞句なので動詞はなく、空所に述語動詞が入ることがわかります。したがって単体で述語動詞になれない(A) appointingと不定詞の(C) to be appointedは除外されます。",translation:"Kevin Miyataさんは、過去の実績が取締役会によって評価されマーケティング部長に任命された。"},
  {id:158,q:"Merrywood Supermarket introduced a loyalty points system last year to ——– customer satisfaction.",options:["enhance","attach","prescribe","expire"],answer:0,type:"語彙問題",explanation:"空所の後を見ます。空所の後ろがcustomer satisfaction （顧客満足度）です。これと合うのは、(A) enhance（高める）です。",translation:"Merrywood Supermarketは、顧客満足度を高めるために昨年ポイントシステムを導入した。"},
  {id:159,q:"Visitors to the factory are asked to borrow ——– glasses from the reception desk and wear them at all times.",options:["protects","protective","protect","protectively"],answer:1,type:"品詞問題",explanation:"空所の前後を見ます。空所の前が動詞borrow、後ろがglasses（眼鏡）です。名詞glassesを修飾する形容詞の(B) protective（保護用の）が適切です。",translation:"工場内を見学する際は、受付で保護用の眼鏡を借り、常にその眼鏡をかけてください。"},
  {id:160,q:"Enzo Botanical Garden is ——– walking distance of the South Hillwood subway station on the East-West Line.",options:["next to","through","within","from"],answer:2,type:"語彙問題",explanation:"空所の後ろにwalking distance ofがあります。これと一緒に使われるのは(C) within（～以内）です。",translation:"Enzo Botanical Gardenは地下鉄東西線のSouth Hillwood駅から歩いていけるところにあります。"},
  {id:161,q:"Ryofu Transport focuses ——– on meeting deadlines while keeping transportation costs low.",options:["heavier","heavily","heavy","heaviness"],answer:1,type:"品詞または比較問題",explanation:"空所の前後を見ます。空所の前が動詞focuses、後ろが前置詞on。動詞focusesを修飾する副詞の(B) heavily（大いに）が適切です。ここでのfocusは自動詞で、focus on（～に重点を置く）としてよく使われます・",translation:"Ryofu Transportは輸送のコストを抑えながら納期を守ることを非常に重視している。"},
  {id:162,q:"Ms. Smith has owned and operated ——– recycle store for more than five years.",options:["she","hers","her","herself"],answer:2,type:"代名詞問題",explanation:"空所の前後を見ます。空所の前が動詞operated（営業してきた）、後ろが名詞句recycle store（リサイクルショップ）。したがって名詞句を修飾する所有格の(C) her（彼女の）が適切です。",translation:"Smithさんは、彼女のリサイクルショップを経営して5年以上になる。"},
  {id:163,q:"When cleaning the dishwasher, please follow the ——– in the instruction manual that came with the machine.",options:["committee","urgency","storage","procedure"],answer:3,type:"語彙問題",explanation:"空所の前が動詞と冠詞のfollow the ～（～に従う）、後ろが前置詞句in the instruction manual（取扱説明書の中）。前後をつなぐのに適切なのは、(D) procedure（手順）です",translation:"食器洗浄機を清掃する際は、本体に添付されている取扱説明書の手順に従ってください。"},
  {id:164,q:"With this software application, users can ——– process and edit digital images and photos.",options:["easy","ease","easily","easier"],answer:2,type:"品詞または比較問題",explanation:"空所の前後を見ます。空所の前が助動詞can、後ろがandでつなげた２つの動詞process and editがあります。したがって、空所には動詞process and editを修飾する副詞の(C) easily（容易に）が適切です。",translation:"このソフトウェアアプリケーションがあれば、ユーザーは容易にデジタル画像や写真の加工および編集を行うことができる。"},
  {id:165,q:"——– members of the press authorized by the management office are allowed to take pictures in the building.",options:["Because","Only","Due to","Until"],answer:1,type:"全文読み問題",explanation:"空所の後ろの形を見ます。空所以降は、主語members of the press authorized by the management office と動詞are allowed で文が完結しています。authorized（許可された）は過去形ではなくmembers of the pressを後ろから修飾する過去分詞です。したがって、接続詞、前置詞ではなく副詞の(B) Only（ただ～だけ）が適切です。",translation:"管理事務所で許可を受けた報道関係者のみ建物内で写真を撮影することができる。"},
  {id:166,q:"If that machine ——– down, we would be able to ship the order by the end of this week.",options:["does not break","will not have broken","will not break","did not break"],answer:3,type:"時制に関する動詞問題",explanation:"we以下の主節の助動詞、動詞がwould beとなっています。したがって、仮定法過去と考えられ、if節の中は過去形になります。過去形の選択肢は (D) did not break のみで、これを選びます。",translation:"もしその機械が故障していなければ、注文品を今週末までに出荷することができるだろう。"},
  {id:167,q:"Employees at Wabon Construction responded ——– to the new salary structure and leave policy.",options:["favorably","favorable","favor","favoring"],answer:0,type:"品詞問題",explanation:"空所の前後を見ます。空所の前が動詞responded、後ろが前置詞to。動詞respondedを修飾する副詞の(A) favorably（好意的に）が適切です。ここでのrespondは自動詞で、respond to（～に反応する）としてよく使われます・",translation:"Wabon Constructionの社員は新しい給与体系と休暇制度に好意的に反応した。"},
  {id:168,q:"——– the weather was nice last Saturday, there were fewer visitors to the outdoor concert than anticipated.",options:["Initially","Despite","Due to","Even though"],answer:3,type:"部分読み問題",explanation:"空所の後ろの形を見ます。the weather wasで主語+動詞の形、カンマ以降はthere is/are構文で、動詞wasと意味上の主語fewer visitorsがあります。したがって、この問題文は上の１のパターンで接続詞が入ることがわかります。選択肢の中で接続詞は(D) Even though（～であるけれども）のみでこれを選びます。",translation:"先週の土曜日は天気が良かったけれども、屋外コンサートへの来場者数は予測より少なかった。"},
  {id:169,q:"In an effort to increase its market share in the pharmaceutical industry, Hudson Chemicals announced that it will ——– with Browns Pharmaceutical.",options:["acquire","generate","merge","compile"],answer:2,type:"語彙問題",explanation:"空所の前が助動詞will、後ろが前置詞with。選択肢の中で直後にwithをとれるのは(C) merge（合併する）のみです。他の選択肢はすべて他動詞で目的語を必要とします。(C) mergeは自動詞、他動詞ともにあり、merge with～（～と合併する）でよく使われます。",translation:"製薬業界でマーケットのシェアを上げるために、Hudson ChemicalsはBrowns pharmaceuticalと合併することを発表した。"},
  {id:170,q:"When ——– a lease agreement, you should consult with your supervisor first and obtain approval before doing so.",options:["revise","revising","revised","revises"],answer:1,type:"動詞問題",explanation:"when以降を見ていきます。whenは接続詞で、通常は主語+動詞が後ろにきますが、主語に相当するものがありません。主語がない場合に考えられるのが省略です。次のような時に省略が可能です。",translation:"賃貸契約書を修正する際は、最初に上司に相談し、承認を得てから行ってください。"},
  {id:171,q:"Approval for small business loans from Grape Street Bank has been ——– faster than it used to be.",options:["very","much","such","so"],answer:1,type:"語彙問題",explanation:"空所の前後を見ます。空所の前がbe動詞の過去分詞been、後ろがfastの比較級のfaster。比較級の前における副詞は選択肢のなかで(B) muchのみでこれを選びます。",translation:"Grape Street Bankの小企業向け融資の承認は以前よりかなり速くなった。"},
  {id:172,q:"Ms. Gupta plans to meet with a ——– from the South Bayside Inn at the International Tourism Conference next month.",options:["representation","representative","represent","representatively"],answer:1,type:"品詞問題",explanation:"空所の前後を見ます。空所の前が冠詞a、後ろが前置詞from。したがって空所には名詞が入ることがわかります。選択肢の中で名詞は(A) representation（表すこと、代表を務めること）と(B) representative（担当者、代表者）です。",translation:"Guptaさんは、来月の国際観光カンファレンスでSouth Bayside Innの担当者と面談をする予定である。"},
  {id:173,q:"To ——– a parking permit, employees need to submit a designated application to Ms. Reston by the end of the month.",options:["intend","boost","remind","obtain"],answer:3,type:"語彙問題",explanation:"空所の後の目的語a parking permit（駐車許可証）なので、これと合う選択肢は(D) obtain（入手する）です。",translation:"駐車許可証を入手するために、従業員は指定の申請書を今月末までにRestonさんに提出しなければならない。"},
  {id:174,q:"——–, Ms. Lawrence was unable to catch her scheduled flight due to a lengthy meeting at the headquarters.",options:["Thoroughly","Traditionally","Unfortunately","Promptly"],answer:2,type:"語彙問題",explanation:"Ms. Lawrence以降の主節の意味が、「Lawrenceさんは本社での会議が長引いたため、予定の飛行機に乗ることができなかった」なので、これと合う(C) Unfortunately（残念ながら）が適切です。",translation:"残念ながら、Lawrenceさんは本社での会議が長引いたため、予定の飛行機に乗ることができなかった。"},
  {id:175,q:"The parking lot is ——– monitored by security cameras 24 hours a day to prevent theft and accidents.",options:["continuing","continuous","continuously","continue"],answer:2,type:"品詞問題",explanation:"空所の前後を見ます。空所の前がbe動詞is、後ろが動詞の過去分詞monitored（監視された）。動詞の過去分詞monitoredを修飾する副詞の(C) continuously（継続的に）が適切です。",translation:"この駐車場は、盗難や事故防止のために、24時間、継続的にセキュリティカメラで監視されています。"},
  {id:176,q:"If you would like to ——– your reservation, please visit Travel First Group’s reservation site.",options:["distribute","confirm","contribute","host"],answer:1,type:"語彙問題",explanation:"空所の後の目的語your reservation （あなたの予約）なので、これと合う選択肢は(B) confirm（確認する）です。",translation:"予約の確認をご希望の場合、Travel First Groupの予約確認サイトを訪れてください。"},
  {id:177,q:"This intensive 5-day course on enhancing productivity will surely help you ——– the efficiency of your daily operations.",options:["improving","improve","improved","improves"],answer:1,type:"動詞問題",explanation:"空所の前がhelp you、後ろがthe efficiency（効率性）。helpは以下のような使い方があります。",translation:"生産性向上に関する5日間の集中コースは、日常の業務の効率化にきっと役にたつでしょう。"},
  {id:178,q:"——– the training period at the headquarters is over, new employees will be assigned to their place of work.",options:["Consequently","Once","Afterward","Among"],answer:1,type:"部分読み問題",explanation:"空所の後ろの形を見ます。the training period at the headquarters isで主語+動詞の形で、カンマ以降もnew employees will be assignedで主語+動詞の形になっています。この形は上の１に該当し、空所には接続詞が入ることがわかります。選択肢の中で接続詞は(B) Once（いったん～したら）だけなので(B)を選びます。",translation:"本社での研修期間が過ぎたら、新入社員は勤務地に配属される。"},
  {id:179,q:"Somerville Furniture has been in business for over 20 years and has ——– increased sales each year.",options:["consistent","consistency","consistencies","consistently"],answer:3,type:"品詞問題",explanation:"空所の前後を見ます。空所の前が現在完了の助動詞has、後ろが動詞の過去分詞increased 。したがって空所には動詞の過去分詞increasedを修飾する副詞の(D) consistently（常に、着実に）が適切です。",translation:"Somerville Furnitureは創業から20年以上経っているが、毎年着実に売り上げを伸ばしている。"},
  {id:180,q:"Daily tours of the chocolate factory ——– at 9:00 a.m. in the waiting area next to the reception desk at the main gate.",options:["commence","commences","to commence","commencing"],answer:0,type:"動詞問題",explanation:"問題文の動詞ですが、空所以外のところにありません。したがって、空所には述語動詞が入ります。述語動詞になれるのは(A) commence（「始まる」の原形または現在形）、(B) commences（commenceの三人称単数現在形）の２つです。to不定詞の(C) to commenceや-ing形の(D) commencingは単独では述語動詞になれません。",translation:"毎日のチョコレート工場の見学は、正門の受付横の待機エリアで午前9時に始まります。"},
  {id:181,q:"Mr. Shu and Ms. Sanon are colleagues at Arson Group ——– graduated from the same university in Australia.",options:["which","where","what","who"],answer:3,type:"関係代名詞問題",explanation:"空所の前後を見ます。空所の前がcolleagues at Arson Group （Arson Group での同僚）、後ろが動詞の過去形graduated（卒業した）。先行詞がcolleaguesで主格の関係代名詞(D) whoが適切です。直前のArson Groupがgraduatedするのはおかしいので、(A) whichは入りません。",translation:"ShuさんとSantonさんは、オーストラリアの同じ大学を卒業したArson Groupの同僚です。"},
  {id:182,q:"Winston Grocery Store has ——– locations in the city and plans to add two new stores next year.",options:["multiplying","multiple","multiply","multiplied"],answer:1,type:"品詞問題",explanation:"空所の前後を見ます。空所の前が動詞has、後ろが名詞locations（場所、店舗）。名詞locationsを修飾できる選択肢が、動詞の現在分詞（ing形）の(A) multiplying（増殖している）、形容詞(B) multiple（複数の、多数の）、動詞の過去分詞（ed形）の(D) multiplied（乗じられた）の３つがあります。",translation:"Winston Grocery Storeは市内に複数の店舗を持っていて、来年は新規に2店舗を増やす予定である。"},
  {id:183,q:"The CEO of Stolzburg Printing Company announced at a press conference yesterday that he ——– next spring.",options:["retired","had retired","has retired","will retire"],answer:3,type:"時制に関する動詞問題",explanation:"空所の前がthat節のthat、後ろがnext spring（来春）。主節の動詞はannouncedで過去形ですが、that節は、next spring（来年の春）があるので未来のことになります。したがって、未来形の(D) will retireを選びます。",translation:"Stolzburg Printing CompanyのCEOは、来年の春に引退することを昨日の記者会見で発表しました。"},
