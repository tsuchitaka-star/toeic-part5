  {id:396,q:"——– with health and safety regulations is a top priority for our company to ensure the wellbeing of our employees and customers.",options:["comply","complies","compliant","compliance"],answer:3,type:"品詞問題",explanation:"空所の後ろを見ます。後ろが前置詞句with health and safety regulations、続いて動詞is。このisが文全体の動詞だと考えられます。したがって、空所には主語となる名詞が入ることがわかり、名詞(D) compliance（順守）が適切です。",translation:"健康と安全に関する規制の遵守は、従業員とお客様の幸福を確保するために、当社にとって最重要課題です。"},
  {id:397,q:"The new image processing software has been designed to be ——– with all operating systems.",options:["steady","compatible","spacious","skillful"],answer:1,type:"語彙問題",explanation:"主語はThe new image processing software（新しい画像処理ソフト）、空所の後ろがwith all operating systems（すべてのオペレーティングシステムと）です。空所に入れて合うのは、(B) compatible（互換性のある）です。",translation:"新しい画像処理ソフトは、すべてのオペレーティングシステムに互換性があるように設計されています。"},
  {id:398,q:"In order to create a more sustainable office, we need to reduce our ——– on paper and plastic.",options:["dependence","connection","sufficiency","diversity"],answer:0,type:"語彙問題",explanation:"空所の前が動詞reduceと所有格our、後ろがon paper and plastic 。「紙やプラスチックへの依存を減らす」とすると意味が通ります。したがって(A) dependence（依存）を選びます。",translation:"より持続可能なオフィスを実現するためには、紙やプラスチックへの依存を減らす必要があります。"},
  {id:399,q:"The manager reminded the staff to turn off all lights before ——– the office.",options:["left","leaving","to leave","have left"],answer:1,type:"動詞問題",explanation:"文全体の主語はThe manager 、動詞はremindedと考えられます。空所の前のbeforeは接続詞または前置詞として空所以降を前の文とつなげていると思われます。",translation:"マネージャーは、オフィスを出る前にすべての電気を消すようにスタッフに注意を促しました。"},
  {id:400,q:"——– with social media platforms and online marketing strategies is essential for this digital marketing role.",options:["Variety","Familiarity","Inventory","Similarity"],answer:1,type:"語彙問題",explanation:"空所の後ろがwith social media platforms and online marketing strategies （ソーシャルメディアプラットフォームやオンラインマーケティング戦略に）、その後にbe動詞is、形容詞essential（欠くことのできない、必須の）が続きます。",translation:"ソーシャルメディアプラットフォームやオンラインマーケティング戦略に精通していることが、このデジタルマーケティングの役割には欠かせません。"},
  {id:401,q:"There is a significant difference in opinion ——– the management and the employees regarding the new policy.",options:["among","beyond","between","against"],answer:2,type:"語彙問題",explanation:"空所の後ろがthe management and the employees（経営陣と従業員）でA and Bの形です。空所の前がa significant difference in opinion（意見に大きな違い）です。したがって、空所には(C) between（〈二つ〉の間に[の，で]）を選びます。",translation:"新方針について、経営陣と従業員との間で意見に大きな違いがある。"},
  {id:402,q:"Yamagishi International Foundation offers scholarships to those ——– demonstrate academic excellence and financial need.",options:["when","whose","what","who"],answer:3,type:"関係詞・疑問詞",explanation:"空所の前は代名詞those（人々）、空所の後ろが動詞demonstrate（示す）。空所の前後をつなぐことができるのは人を先行詞としてとる主格の関係代名詞(D) whoです。",translation:"Yamagishi International Foundationは、学業成績が優秀で、経済的な必要性がある人に奨学金を支給しています。"},
  {id:403,q:"——–, we will need to invest in new technology to stay competitive in the market.",options:["Eventually","Already","Thoroughly","Previously"],answer:0,type:"語彙問題",explanation:"空所の後ろはwe will need to invest in new technology（新しい技術への投資も必要になるだろう）です。これに合うのは、(A) Eventually（最終的に、いずれ）です。",translation:"いずれは、市場での競争力を維持するために、新しい技術への投資も必要になってきます。"},
  {id:404,q:"We need to make some changes to our pricing strategy to enhance ——–.",options:["profitable","profitability","profited","profitably"],answer:1,type:"品詞問題",explanation:"空所の前を見ます。空所の前が動詞enhance（高める）です。enhanceは他動詞なので目的語が必要です。目的語になれるのは名詞のみなので、(B) profitability（収益性）を選びます。",translation:"収益性を高めるためには、価格戦略をいくつか変更する必要があります。"},
  {id:405,q:"The most ——– feature of the new product is its advanced artificial intelligence capabilities.",options:["impression","impressively","impressive","impresses"],answer:2,type:"品詞問題",explanation:"空所の前後を見ます。空所の前が最上級The most、後ろが名詞のfeature（特徴）。したがって空所には名詞featureを修飾する形容詞の(C) impressive（印象的な）が適切です。",translation:"今回の新製品の最も印象的な特徴は、高度な人工知能機能を搭載していることです。"},
  {id:406,q:"To place an order, ——– fill out the online form and submit it to our sales team.",options:["simply","lately","largely","occasionally"],answer:0,type:"語彙問題",explanation:"空所の後を見ます。空所の後ろがfill out the online form fill out the online form （オンラインフォームに記入して弊社営業担当まで送信する）です。この部分を修飾する適切な副詞は(A) simply（ただ～のみ）です。",translation:"ご注文は、オンラインフォームにご記入の上、弊社営業担当まで送信していただくだけです。"},
  {id:407,q:"Camion Tech strives to improve ——– aspect of their business, from customer service to product quality.",options:["many","a few","every","both"],answer:2,type:"数量形容詞問題",explanation:"空所の後ろがaspect of their business（ビジネスの側面）。aspectは可算名詞、不可算名詞がありますが、「側面」という意味の場合は可算名詞です。したがってこの問題文中のaspectは可算名詞の単数形です。",translation:"Camion Techは、顧客サービスから製品品質まで、ビジネスのあらゆる側面を改善するよう努力しています。"},
  {id:408,q:"Mr. Jonathon has been working for the company ——– more than five years and has become an integral part of the team.",options:["on","for","by","at"],answer:1,type:"語彙問題",explanation:"空所の前がhas been working for the companyで現在完了進行形、後ろがmore than five years です。したがって空所には「（期間）の間」を意味する(B) forが適切です。",translation:"Jonathon さんは、当社で5年以上働いており、チームの一員として欠かせない存在になっています。"},
  {id:409,q:"The price of our products will ——– according to the quantity and shipping destination.",options:["various","variety","vary","variously"],answer:2,type:"品詞問題",explanation:"空所の前後を見ます。空所の前が助動詞will、後ろが前置詞according to。空所以降に動詞がないので空所には動詞の原形が入ることがわかります。したがって動詞(C) vary（変わる、変化する、異なる）を選びます。",translation:"当社製品の価格は、数量や配送先によって異なります。"},
  {id:410,q:"Ms. Kwon not only has the necessary qualifications ——– demonstrates strong leadership skills.",options:["and","but","so","or"],answer:1,type:"語彙問題",explanation:"問題文の前半にnot onlyがあります。not only … but (also) ～の定型表現から空所には(B) butが適切です。",translation:"Kwon さんは、必要な資質を備えているだけでなく、強いリーダーシップを発揮しています。"},
  {id:411,q:"Ms. Braun ——– recognized the importance of building strong relationships with her students and their families.",options:["she","hers","her","herself"],answer:3,type:"代名詞問題",explanation:"空所の前は主語Ms. Braun、空所の後ろは動詞のrecognizedでその後に目的語が続きます。主語と動詞の間に入ることができる代名詞は、主語を強調する再帰代名詞の(D) herselfのみです。「Braunさん自身が～」のように強調されます。",translation:"Braun さん自身、生徒やその家族と強い関係を築くことの重要性を認識していました。"},
  {id:412,q:"A few architects ——– several design options for the new corporate headquarters.",options:["proposal","proposals","proposing","proposed"],answer:3,type:"品詞問題",explanation:"空所の前後を見ます。空所の前がA few architects（数人の建築家）、後ろがseveral design options（いくつかのデザインの選択肢）で名詞句が並んでいます。それ以降に動詞がないので空所には動詞が必要になります。",translation:"数人の建築家が、新本社のデザイン案をいくつか提案した。"},
  {id:413,q:"The environmental improvement ——– is expected to generate positive publicity and brand recognition.",options:["participation","ability","skill","project"],answer:3,type:"語彙問題",explanation:"空所の前が、The environmental improvement（環境改善）で、これに合う選択肢は(D) project（プロジェクト）です。",translation:"環境改善プロジェクトは、前向きな広報活動やブランド認知を生むことが期待されます。"},
  {id:414,q:"Cowden Express Corporation values innovation and encourages employees to express their ideas more ——–.",options:["create","creative","creatively","creation"],answer:2,type:"品詞問題",explanation:"空所の直前がmoreでその前が動詞と目的語のexpress their ideas（自分の考えを表現する）です。比較級moreに続くのは形容詞の(B) creative（創造的な）または副詞の(C) creatively（創造的に）のどちらかです。",translation:"Cowden Express Corporationは、革新を重視し、社員がより創造的に自分の考えを表現することを奨励しています。"},
  {id:415,q:"The survey revealed valuable insights ——– customer satisfaction and preferences.",options:["regarding","during","following","despite"],answer:0,type:"語彙問題",explanation:"空所の前がvaluable insights（貴重な洞察）、後ろがcustomer satisfaction and preferences（お客様の満足度や嗜好）です。前後をつなぐ適切な前置詞は(A) regarding（～に関する）です。",translation:"今回の調査は、お客様の満足度や嗜好に関する貴重な洞察を明らかにするものでした。"},
  {id:416,q:"——– the Matsumoto Art Museum has launched a new website, we can easily access information about the exhibits and events.",options:["Recently","Afterward","Throughout","Now that"],answer:3,type:"部分読み問題",explanation:"空所の後ろの形を見ます。the Matsumoto Art Museum has launchedで主語+動詞の形で、カンマ以降もwe can easily accessで主語+動詞の形になっています。この形は上の１に該当し、空所には接続詞が入ることがわかります。選択肢の中で接続詞は(D) Now that（今や～だから）だけなので(D)を選びます。",translation:"Matsumoto Art Museumのホームページが開設され、展示やイベントなどの情報に簡単にアクセスできるようになりました。"},
  {id:417,q:"The scheduled maintenance work ——– due to unfavorable weather conditions.",options:["is postponing","will have postponed","has been postponed","postpones"],answer:2,type:"動詞問題",explanation:"選択肢はすべて述語動詞になれるものなので、空所の前が主語と考えられます。主語のThe scheduled maintenance work（予定されていたメンテナンス作業）は「延期される」という受動態が適切です。",translation:"予定されていたメンテナンス作業は、天候不順のため延期となりました。"},
  {id:418,q:"During performance evaluations, Ms. Patel ——– provides constructive feedback and offers solutions for improvement.",options:["typically","previously","incrementally","affordably"],answer:0,type:"語彙問題",explanation:"空所の後の動詞と目的語を見ます。provides constructive feedback and offers solutions（建設的なフィードバックを提供し、解決策を提示する）と合うのは(A) typically（通常）です。",translation:"業績評価の時には、Patelさんは通常、建設的なフィードバックを提供し、改善のための解決策を提示します。"},
  {id:419,q:"Mills Hotel offers a complimentary breakfast ——– room service for dining convenience.",options:["such as","as well as","that","including"],answer:1,type:"部分読み問題",explanation:"空所の前は動詞offers、その目的語のa complimentary breakfast（無料の朝食）、後ろはroom service（ルームサービス）です。「無料の朝食」と「ルームサービス」は並列関係でともに動詞offersの目的語と考えるのが適切です。",translation:"Mills Hotelでは、お食事に便利なルームサービスだけでなく、無料の朝食も提供しています。"},
  {id:420,q:"Okada Engineering is planning its ——– into Southeast Asian markets to reach a wider customer base.",options:["expand","expands","expanded","expansion"],answer:3,type:"品詞問題",explanation:"空所の前後を見ます。空所の前が所有格代名詞のits、後ろが前置詞into。したがって空所にはitsが修飾する名詞(D) expansion（拡大、展開）が適切です。",translation:"Okada Engineeringは、幅広い顧客層にアプローチするため、東南アジア市場への展開を計画しています。"},
  {id:421,q:"Ms. Kim’s ——– computer skills have enabled her to design cutting-edge educational software.",options:["advance","advanced","advances","advancing"],answer:1,type:"品詞問題",explanation:"空所の前後を見ます。空所の前が所有格Ms. Kim’s（Kimさんの）、後ろが名詞句computer skills（コンピュータースキル）。【所有格】+【形容詞】+【名詞（句）】なので形容詞の(B) advanced（高度な）、または(D) advancing（前進する、進行中の）が候補になります。",translation:"Kimさんの高度なコンピュータースキルにより、最先端の教育用ソフトウェアの設計が可能になりました。"},
  {id:422,q:"Maple Grove Park recently announced plans to expand with an even ——– camping area.",options:["large","largely","larger","largest"],answer:2,type:"品詞または比較問題",explanation:"空所の前後を見ます。空所の前が冠詞anに続いてeven、後ろが名詞句camping area（キャンプ場）。空所には後ろの名詞句を修飾する形容詞が考えられ、候補として(A) large、比較級の(C) larger、最上級の(D) largestがあります。",translation:"Maple Grove 公園は、最近、さらに大きなキャンプ場を備えた拡張計画を発表しました。"},
  {id:423,q:"The employees working at the Riverwalk Plaza Hotel pride ——– on providing exceptional amenities and service.",options:["oneself","themselves","ourselves","itself"],answer:1,type:"代名詞問題",explanation:"問題文の主語はThe employees（従業員）です。空所はpride（誇る）の目的語になります。再帰代名詞は主語自身が目的語になる場合に使われます。",translation:"Riverwalk Plaza Hotelで働く従業員は、優れたアメニティとサービスを提供することを誇りにしています。"},
  {id:424,q:"After several weeks of revisions, the final version of the proposal ——– by the board of directors of Bit One Solutions.",options:["approved","was approved","will be approving","has approved"],answer:1,type:"能動態・受動態・時制に関する動詞問題",explanation:"空所の前が主語のthe final version of the proposal（最終版の提案書）、後がby the board of directors （取締役会によって）。最終版の提案書が取締役会によって「承認された」という受動態の関係が適切なので、唯一の受動態の動詞(B) was approvedを選びます。",translation:"数週間の修正を経て、最終版の提案書がBit One Solutionsの取締役会で承認されました。"},
  {id:425,q:"The latest medical research is ——– displayed in the lobby of Oakwood General Hospital.",options:["prominent","prominence","prominently","prominences"],answer:2,type:"品詞問題",explanation:"空所の前後を見ます。空所の前がbe動詞is、後ろが動詞の過去分詞形displayed。したがって、空所には動詞の過去分詞形displayedを修飾する副詞の(C) prominently（目立つように）が適切です。",translation:"Oakwood総合病院のロビーには、最新の医療研究が目立つように展示されています。"},
  {id:426,q:"Best Care Cleaners ——– offers discounts for repeat customers and large orders.",options:["generalize","generalized","general","generally"],answer:3,type:"品詞問題",explanation:"空所の前後を見ます。空所の前が主語Best Care Cleaners、後ろが動詞offers。空所には動詞offersを修飾する副詞の(D) generally（通常）が適切です。",translation:"Best Care Cleanersは、通常、リピーターや大量注文に対して割引を行います。"},
  {id:427,q:"Atlas Construction Services made some last-minute changes to the contract just ——– the deadline.",options:["before","except for","afterward","while"],answer:0,type:"語彙問題",explanation:"文頭から見ていくとAtlas Construction Services madeは主語+動詞です。空所の前がjust、空所の後ろのthe deadline（締め切り）は名詞句で、この形は上の４のパターンです。したがって空所には前置詞が入ることがわかり(A) before（～の前に）または(B) except for（～を除けば）が候補になります。",translation:"Atlas Construction Servicesは、締め切り直前に契約を土壇場で変更した。"},
  {id:428,q:"Apex Strategy Partners invested in intensive ——– for its employees in order to improve productivity and efficiency.",options:["train","trained","training","trainee"],answer:2,type:"品詞問題",explanation:"空所の前後を見ます。空所の前が形容詞intensive（集中的な）、後ろが前置詞for。したがって、空所には形容詞intensiveが修飾する名詞が入ることがわかります。",translation:"Apex Strategy Partnersは、生産性と効率性を向上させるために、従業員に対する集中的な研修に投資しています。"},
  {id:429,q:"Ms. Yamamoto ——– designing experiments with reliable results difficult, but continued to innovate and improve their methods.",options:["performed","conducted","found","sought"],answer:2,type:"語彙問題",explanation:"空所の後ろのbutの手前まで見ていきます。designing experiments with reliable resultsが目的語、 形容詞difficultが補語と考えられます。したがってbutの前までが【主語】+【動詞】+【目的語】+【補語】の第5文型になります。",translation:"Yamamotoさんは、信頼できる結果をもたらす実験の設計が難しいと感じながらも、その方法を革新し、改善し続けました。"},
  {id:430,q:"Research reports indicate that small businesses tend to struggle in their first few years ——– limited resources.",options:["because","due to","unless","whether"],answer:1,type:"部分読み問題",explanation:"文全体の主語と動詞はResearch reports indicate ～（調査報告は～を示す）です。これに続くthat節の中の構造は、small businesses tendで主語+動詞、空所の後がlimited resources（限られた資源）で名詞句です。",translation:"調査報告によると、中小企業は限られた資源のために最初の数年間は苦戦する傾向があるそうです。"},
  {id:431,q:"Our salon offers a variety of beauty services, so make an ——– today and let our skilled stylists help you look your best.",options:["instance","option","appointment","agreement"],answer:2,type:"語彙問題",explanation:"文頭からsoまでのOur salon offers a variety of beauty services（当サロンでは、様々な美容サービスを提供しております）、その後にso make an … todayと続くので、(C) appointment（予約）が適切です。",translation:"当サロンでは、様々な美容サービスを提供しておりますので、今日ご予約いただき、熟練したスタイリストがお客様のベストな状態をお手伝いさせていただきます。"},
  {id:432,q:"As the weather in this region is highly ——–, planning outdoor events rarely poses any challenges.",options:["predictable","predictably","prediction","predict"],answer:0,type:"品詞問題",explanation:"空所の前後を見ます。空所の前がbe動詞isに副詞highly（非常に）、後ろがカンマです。したがって空所には副詞highlyが修飾する形容詞(A) predictableが適切です。",translation:"この地域は天候が非常に予測しやすいので、屋外イベントの企画に苦労することはほとんどありません。"},
  {id:433,q:"Please ——– Secure Horizons Insurance Group for their auto insurance needs.",options:["share","consider","modify","found"],answer:1,type:"語彙問題",explanation:"空所以降の意味は「自動車保険のニーズについては、Secure Horizons Insurance Groupを～」なので、(B) consider（検討する）が適切です。",translation:"自動車保険については、Secure Horizons Insurance Groupをご検討ください。"},
  {id:434,q:"Dan Madsen will be able to complete the assignment on time ——– he receives clear instructions and guidance.",options:["because of","in case of","as long as","promptly"],answer:2,type:"部分読み問題",explanation:"空所の前はDan Madsen will beで主語+動詞の形です。空所の後ろもhe receivesで主語+動詞の形です。これは、上の２のパターンで空所には接続詞が入ることがわかります。選択肢の中で接続詞は、(C) as long as（～である限りは）のみです。したがって、(C) as long as（～である限りは）を選びます。",translation:"Dan Madsenは、明確な指示と指導を受ければ、期限内に課題を完了させることができるだろう。"},
  {id:435,q:"——– students must submit their course selection forms by the specified deadline to secure their places.",options:["Every","Each","All","Another"],answer:2,type:"数量形容詞問題",explanation:"空所の後ろが可算名詞の複数形のstudents（学生）。可算名詞の複数形の前における選択肢は、(C) All（すべての）のみでこれを選びます。",translation:"すべての学生は、場所を確保するために、指定された期限までにコース選択フォームを提出する必要があります。"},
  {id:436,q:"The government ——– that businesses adhere to minimum wage regulations helps protect workers from unfair compensation.",options:["require","requires","required","requirement"],answer:3,type:"品詞・動詞問題",explanation:"空所の前後を見ます。空所の前がThe government、後ろにthat節が続きます。ここで主語をThe government。後ろにthat節があるので、動詞の三人称単数現在形の(B) requires（求める）を選びたくなりますが、これは正解ではありません。",translation:"政府が企業に最低賃金規制の遵守を求めることで、労働者を不当な報酬から守ることができます。"},
  {id:437,q:"The movie theater offers various ——–, including popcorn and soft drinks.",options:["amenities","seats","tickets","refreshments"],answer:3,type:"語彙問題",explanation:"空所の後ろに具体例として、including popcorn and soft drinks（ポップコーンやソフトドリンクを含む）とあるので、(D) refreshments（軽食・飲み物）が適切です。",translation:"映画館では、ポップコーンやソフトドリンクなど、さまざまな軽食を用意しています。"},
  {id:438,q:"You will receive a confirmation email ——– five business days of registering for the event.",options:["from","since","within","for"],answer:2,type:"語彙問題",explanation:"空所の後ろがfive business days of registering for the eventです。",translation:"イベント参加登録後、5営業日以内に確認メールが届きます。"},
  {id:439,q:"——– of Harrison Systems hosted a workshop on the company’s latest software advancements and applications.",options:["represent","represents","representations","representatives"],answer:3,type:"品詞問題",explanation:"動詞はhosted（開催した）、目的語はa workshop（研修会）です。したがって、空所には主語になる名詞が入り、研修会を開催できる名詞は人に関する名詞なので(D) representatives（担当者、代表者）が適切です。",translation:"Harrison Systemsの担当者が、同社の最新のソフトウェアの進歩やアプリケーションに関する研修会を開催しました。"},
  {id:440,q:"Our delivery drivers are trained to drive ——–, ensuring the safe and timely arrival of packages.",options:["greatly","cautiously","diversely","vaguely"],answer:1,type:"語彙問題",explanation:"空所の前が動詞drive（運転する）です。これと合うのは(B) cautiously（慎重に、用心深く）です。",translation:"配送ドライバーは慎重な運転ができるよう訓練されており、安全かつタイムリーに荷物を届けることができるようになっています。"},
  {id:441,q:"Our company’s revenue will be boosted by ——– a new branch in the downtown area.",options:["open","opens","opened","opening"],answer:3,type:"動詞問題",explanation:"空所の前が前置詞by、後ろがa new branch （新しい支店）という名詞句。前置詞byの後は名詞または名詞句になります。この条件を満たし、かつ後ろのa new branchを目的語として取れるのは動名詞の(D) openingです。",translation:"繁華街に新店舗を開設することで、当社の収益が向上するでしょう。"},
  {id:442,q:"The upcoming industry conference is ——– to provide valuable networking and partnership opportunities.",options:["likely","durable","transparent","rapid"],answer:0,type:"語彙問題",explanation:"空所の前がbe動詞is、後ろがto provideで不定詞。選択肢の中でbe ～ to doの形をとる代表的なものは、(A) likely（～しそうである）です。",translation:"今度の業界会議は、貴重なネットワーキングとパートナーシップの機会を提供することになりそうです。"},
  {id:443,q:"Jade Bamboo Garden’s ——– menu highlights seasonal ingredients and their commitment to sustainability.",options:["suggest","suggesting","suggested","suggests"],answer:2,type:"動詞問題",explanation:"空所の前が名詞の所有格のJade Bamboo Garden’s、後ろが名詞menu（メニュー）でその後に動詞highlights（強調する）が続きます。したがって、空所には名詞menuを修飾する形容詞の働きのある現在分詞の(B) suggestingまたは過去分詞の(C) suggestedが候補になります。",translation:"Jade Bamboo Gardenの提案するメニューは、季節の食材と持続可能性への取り組みを強調しています。"},
  {id:444,q:"Iberian Kitchen asks that reservations ——– in advance for large groups to ensure proper seating arrangements.",options:["are made","make","be made","will be making"],answer:2,type:"能動態・受動態・時制に関する動詞問題",explanation:"asks that節に気づくかどうかがカギになります。",translation:"Iberian Kitchenでは、お席を確保するため、大人数でのご利用の場合は事前にご予約をお願いしています。"},
  {id:445,q:"Mr. Pedersen ——– the promotion if his performance had met the company’s expectations.",options:["received","could receive","will be received","would have received"],answer:3,type:"能動態・受動態・時制に関する動詞問題",explanation:"if節の時制がhad metで過去完了なので仮定法過去完了の文と考えられます。選択肢の中で仮定法過去完了は(D) would have receivedのみでこれを選びます。",translation:"Pedersenさんは、彼の業績が会社の期待に応えていれば、昇進できただろう。"},
  {id:446,q:"The growing ——– for electric vehicles has led to increased investments in battery technology.",options:["demand","productivity","negotiation","asset"],answer:0,type:"語彙問題",explanation:"空所の前がgrowing（増え続ける）、後ろが前置詞for（～に対する）。この間に入る名詞は(A) demand（需要）です。",translation:"電気自動車への高まる需要により、電池技術への投資が増加しています。"},
  {id:447,q:"As the project manager, Ms. Christensen was ——– with ensuring the timely completion of the construction project.",options:["forecasted","relied","diversified","credited"],answer:3,type:"語彙問題",explanation:"空所の前が主語Ms. Christensenにbe動詞 wasが続きます。後ろが前置詞withとensuring the timely completion of the construction project（建設プロジェクトをタイムリーに完了することを確実にする）です。",translation:"プロジェクトマネージャーとして、クリステンセンは建設プロジェクトをタイムリーに完了させたと評価された。"},
  {id:448,q:"People appreciate grocery stores ——– prices remain consistently competitive in the market.",options:["that","which","what","whose"],answer:3,type:"関係代名詞問題",explanation:"空所の前が名詞句grocery stores（食料品店）、後ろが名詞prices（価格）に動詞remain（～のままである）が続きます。先行詞がgrocery stores、名詞pricesを修飾する所有格の関係代名詞(D) whoseが適切です。",translation:"市場において一貫して競争力のある価格を維持している食料品店は、人々から高く評価されています。"},
  {id:449,q:"Solar Driven Industries launched a recycling ——– to reduce waste and improve sustainability.",options:["initiation","initiate","initiator","initiative"],answer:3,type:"品詞問題",explanation:"空所の前後を見ます。空所の前が動詞launched（開始した）、冠詞a、名詞recycling（リサイクル）。後ろがto reduceで不定詞が続きます。したがって空所には名詞が入ると考えられますが選択肢にすべて名詞になれます。",translation:"Solar Driven Industriesは、廃棄物を減らし、持続可能性を向上させるために、リサイクルの新たな取り組みを開始しました。"},
  {id:450,q:"The educational resources provided by our online platform are more accessible than ——– of traditional textbooks.",options:["these","whichever","that","those"],answer:3,type:"代名詞・関係詞問題",explanation:"are more accessible thanがあるので、比較文になります。比較の対象となるものは、The educational resources provided by our online platform（当社のオンラインプラットフォームが提供する教育リソース）とthan以下になります。",translation:"当社のオンラインプラットフォームが提供する教育資源は、従来の教科書よりも利用しやすいものとなっています。"},
  {id:451,q:"The ——– presentation highlighted upcoming industry trends and challenges.",options:["information","inform","informative","informatively"],answer:2,type:"品詞問題",explanation:"空所の前後を見ます。空所の前が冠詞the、後ろが名詞presentation（プレゼンテーション）。したがって、空所には名詞presentationを修飾する形容詞の(C) informative（有益な、情報が豊富な）が適切です。",translation:"その情報が豊富なプレゼンテーションは、今後の業界のトレンドと課題を強調していた。"},
  {id:452,q:"Harrod Consulting Group ——– that their strategic approach increases overall profitability.",options:["competes","claims","performs","manages"],answer:1,type:"語彙問題",explanation:"空所の後ろのthat以下は主語their strategic approach、動詞 increases のthat節です。選択肢の中でthat節を伴う動詞は(B) claims（主張する）のみで、これが適切です。他の選択肢はthat節を直後に取ることができません。",translation:"Harrod Consulting Groupは、その戦略的アプローチによって全体の収益性が向上すると主張しています。"},
  {id:453,q:"By ——– analyzing market trends, Olidge Transit stays ahead of the competition.",options:["precise","preciseness","precision","precisely"],answer:3,type:"品詞問題",explanation:"空所の前後を見ます。空所の前が前置詞by、後ろが動名詞analyzing （分析すること）とその目的語のmarket trends（市場動向）が続きます。「市場動向を分析すること」という意味になり、ここでの動名詞は動詞的な意味で使われています。",translation:"市場動向を正確に分析することで、Olidge Transitは競合他社に先んじているのです。"},
  {id:454,q:"Fairway Medical Clinic provides ——–— healthcare services to the community.",options:["comprehensive","comprehensively","comprehension","comprehend"],answer:0,type:"品詞問題",explanation:"空所の前後を見ます。空所の前が動詞provides、後ろが名詞句healthcare services（医療サービス）。したがって、空所には名詞句healthcare servicesを修飾する形容詞の(A) comprehensive（総合的な）が適切です。",translation:"Fairway Medical Clinicは、地域の皆様に総合的な医療サービスを提供しています。"},
  {id:455,q:"Select ——– that interests you the most from these three online courses.",options:["others","the other","ones","one"],answer:3,type:"代名詞問題",explanation:"空所の後ろが関係代名詞thatと動詞interests（興味を持たせる）が続きます。空所は先行詞にあたり、動詞interestに三人称単数現在のsがついているので、空所は単数になります。したがって複数の(A) othersと(C) onesは除外されます。",translation:"この3つのオンラインコースから、最も興味のあるものを1つ選んでください。"},
  {id:456,q:"——– it seemed impossible, Ms. Carson eventually found the solution to the complex problem.",options:["Despite","Initially","Although","Previously"],answer:2,type:"部分読み問題",explanation:"空所の後ろの形を見ます。it seemed で主語+動詞の形です。カンマ以降はMs. Carson eventually foundで同じく主語+動詞の形です。これは、上の１のパターンで空所には接続詞が入ることがわかります。選択肢の中で接続詞は、(C) Although（～だけれども）のみでこれを選びます。",translation:"不可能に思えたが、カーソンさんは最終的に複雑な問題の解決法を見出した。"},
  {id:457,q:"Finding a suitable location for the event ——– difficult due to budget constraints.",options:["considered","proved","included","obtained"],answer:1,type:"語彙問題",explanation:"空所の前が主語Finding a suitable location for the event（イベントに適した場所を探すこと）、空所の後ろが形容詞のdifficult（難しい）、そのあとにdue toと続きます。",translation:"予算の制約から、イベントに適した場所を探すのは困難であることが判明した。"},
  {id:458,q:"Instructions for assembling furniture such as bookcases ——– on our website.",options:["found","is found","will be finding","can be found"],answer:3,type:"能動態・受動態・時制に関する動詞問題",explanation:"まず、文の主語を確認しましょう。主語はInstructions （説明書）です。空所は動詞にあたり、主語と空所の動詞は、「説明書は～に見つけることができる」という受動態の関係が適切です。",translation:"本棚などの家具の組み立て説明書は、当社ホームページでご覧いただけます。"},
  {id:459,q:"Dr. Smith has been a trusted and respected physician in the community ——– more than two decades.",options:["by","for","on","at"],answer:1,type:"語彙問題",explanation:"空所の後ろがmore than two decades（20年以上）という期間の名詞句になります。したがって期間を表す前置詞の(B) forが適切です。",translation:"Dr. Smithは、20年以上にわたって地域の信頼と尊敬を集める医師です。"},
  {id:460,q:"By cutting unnecessary expenses and streamlining operations, GERI Technologies enhanced its ——– within two years.",options:["profitable","profitability","profited","profitably"],answer:1,type:"品詞問題",explanation:"空所の前後を見ます。空所の前が所所有格代名詞its、後ろが前置詞within。したがって、空所には名詞が入り、(B) profitability（収益性）が適切です。",translation:"無駄な経費を削減し、業務を効率化することで、GERI Technologiesは2年以内で収益性を向上させました。"},
  {id:461,q:"The business proposal outlines several innovative marketing strategies to ——– brand awareness.",options:["increase","complete","replace","expect"],answer:0,type:"語彙問題",explanation:"空所の後がbrand awareness （ブランド認知度）です。これと合う動詞は(A) increase（増やす、向上させる）が適切でこれを選びます。",translation:"事業提案では、ブランドの認知度を向上させるためのいくつかの革新的なマーケティング戦略をまとめています。"},
  {id:462,q:"The human resources department is responsible for ensuring that all employees are ——– with company policies.",options:["familiar","familiarize","familiarity","familiarly"],answer:0,type:"品詞問題",explanation:"空所の前後を見ます。空所の前がbe動詞are、後ろが前置詞with。be familiar with（～に精通している）から形容詞の(A) familiar（よく知っている、精通している）を選びます。",translation:"人事部は、全従業員に会社の方針を周知徹底させる役割を担っています。"},
  {id:463,q:"Ms. Stanton ——– on the annual budget report since early this morning.",options:["has been working","had worked","will been working","works"],answer:0,type:"時制に関する動詞問題",explanation:"文の後半のsince early this morning（今朝早くから）があり、これと合う動詞は現在完了進行形の(A) has been workingです。これは、過去のある時点から現在まで続いている進行中の行為を表します。",translation:"Stantonさんは、今朝早くから年次予算報告書の作成に取り掛かっています。"},
  {id:464,q:"The project manager decided to ——– the deadline for the submission of the final report.",options:["extend","extending","extension","extensive"],answer:0,type:"品詞問題",explanation:"空所の前後を見ます。空所の前が動詞decided（決めた）にto、後ろが名詞句のthe deadline （締め切り）が続きます。したがって空所には動詞の原形の(A) extend（延長する）が適切です。",translation:"プロジェクトマネージャーは、最終報告書の提出期限を延長することを決定した。"},
  {id:465,q:"——– the technical difficulties experienced during the presentation, Mr. Novak was able to secure the contract.",options:["Despite","Because of","In the event that","Although"],answer:0,type:"プレゼン中に技術的な問題が発生した",explanation:"空所の後ろの形を見ます。カンマまでのthe technical difficulties experienced during the presentationは名詞句で動詞がはいっていません。空所の後ろはMr. Novak wasで主語+動詞の形です。したがって、この問題文は上の3のパターンで前置詞が入ることがわかります。選択肢の中で前置詞は(A) Despite（～にもかかわらず）と(B) Because of（～の理由で）の２つあるので、文全体の意味を取る必要があります。",translation:"プレゼン中に技術的な問題が発生しましたが、Novakさんは契約を確保することができました。"},
  {id:466,q:"Project Skyward requires a high level of ——– between team members to ensure all tasks are completed efficiently.",options:["collaboration","medication","presentation","installation"],answer:0,type:"語彙問題",explanation:"空所の前がa high level of （高いレベルの）、後ろがbetween team members（チームメンバー間で）なので(A) collaboration（協力）が適切です。",translation:"Project Skywardは、すべてのタスクを効率的に完了させるために、チームメンバー間で高いレベルの協力を必要とします。"},
  {id:467,q:"The customer support team at the Daimler Office Supplies ——– to all customer complaints within 48 hours.",options:["addresses","responds","deals","resolves"],answer:1,type:"語彙問題",explanation:"空所の直後に前置詞toがあります。直後にtoと一緒に使われるのは(B) responds（respond toで「～に対応・対処する」）で、これを選びます。",translation:"Daimler Office Suppliesのカスタマーサポートチームは、すべてのお客様の苦情に48時間以内に対応しています。"},
  {id:468,q:"Keller Manufacturing encourages its employees to participate in community service events to promote ——– responsibility.",options:["social","society","socialize","socially"],answer:0,type:"品詞問題",explanation:"空所の前後を見ます。空所の前が動詞promote（推進する）、後ろが名詞のresponsibility（責任）。したがって空所には名詞responsibilityを修飾する形容詞の(A) social（社会の、社会的）が適切です。",translation:"Keller Manufacturingは、社会的責任を推進するため、従業員にコミュニティサービスイベントへの参加を勧めています。"},
  {id:469,q:"The financial report will be completed and submitted to the board ——– the end of this month.",options:["by","on","with","as"],answer:0,type:"語彙問題",explanation:"空所の後ろにthe end of this month （今月末）があり、これと合うのは(A) by（～までに）です。by the end of this monthで「今月末までに」という意味になります。",translation:"財務報告書は今月末までに完成し、取締役会に提出される予定です。"},
  {id:470,q:"Mr. Katzian ——– a revised training program for new employees last quarter.",options:["was implemented","implements","will implement","implemented"],answer:3,type:"能動態・受動態・時制に関する動詞問題",explanation:"文末のlast quarter（前四半期）から、過去時制であることがわかります。したがって、過去形の動詞が必要になります。",translation:"Katzianさんは、前四半期に新入社員向けの改訂された研修プログラムを実施しました。"},
  {id:471,q:"The human resources team implemented inclusive policies, ——– a positive work environment for all employees.",options:["will make","makes","had made","making"],answer:3,type:"動詞問題",explanation:"問題文の動詞はimplementedです。接続詞などを使わない限りひとつの文に対して述語動詞はひとつになります。このルールから(A) will make、(B) makes、(C) had madeは前に接続詞などがないので不適切です。したがって、現在分詞形の(D) makingが適切です。",translation:"人事チームが包括的な政策を実施し、すべての従業員にとって肯定的な職場環境を作り出した。"},
  {id:472,q:"——– at our serviced apartments has improved after introducing an efficient online booking system.",options:["Occupations","Occupy","Occupied","Occupancy"],answer:3,type:"品詞・動詞問題",explanation:"問題文の動詞はhas improved（向上した）です。空所には主語になる名詞が必要で(A) Occupations（職業）または(D) Occupancy（占有率、稼働率）に絞り込まれます。動詞がhas improvedの三人称単数現在形なので、複数の名詞は不適切です。したがって(D) Occupancy（占有率、稼働率）を選びます。",translation:"効率的なオンライン予約システムの導入後、サービスアパートメントの稼働率が向上しました。"},
  {id:473,q:"——– small businesses have benefited from our comprehensive consulting services.",options:["Every","Many","Much","Each"],answer:1,type:"数量形容詞問題",explanation:"空所の後ろの名詞句が可算名詞で複数のsmall businesses （中小企業）。可算名詞の複数形の前におけるのは、(B) Many（多くの）のみでこれを選びます。",translation:"多くの中小企業が、当社の総合的なコンサルティングサービスの恩恵を受けています。"},
  {id:474,q:"Burwell Solutions has a ——– reputation for providing top-quality products and services.",options:["distinguished","creative","occasional","tolerant"],answer:0,type:"語彙問題",explanation:"空所の後がreputation（評判）です。これと合うのは(A) distinguished（優れた）です。",translation:"Burwell Solutionsは、最高品質の製品とサービスを提供することで、優れた評判を得ています。"},
  {id:475,q:"Mr. Yamaguchi would have allocated additional resources to gather more accurate data ——– he known the market research was incomplete,",options:["if","unless","throughout","had"],answer:3,type:"語彙問題",explanation:"まず、動詞の主語と動詞を確認していきます。空所の前の主語はMr. Yamaguchi 、動詞はwould have allocated です。空所の後の主語はhe ですが、動詞known は過去分詞で主語の直後に来るのはおかしいと考え、仮定法過去完了のifを省略した倒置形に気づけば、(D) hadが適切であることがわかります。",translation:"Yamaguchiさんは、市場調査が不完全であることを知っていれば、より正確なデータを収集するために、さらなる資源を割り当てていたことでしょう。"},
  {id:476,q:"Our customer service department ——– receives positive feedback from our clients.",options:["consists","consistent","consistently","consisted"],answer:2,type:"品詞問題",explanation:"空所の前後を見ます。空所の前が主語の名詞句Our customer service department（当社のカスタマーサービス部門）、後ろが動詞receives（受ける）。したがって空所には動詞receives（受ける）を修飾する副詞の(C) consistently（常に、一貫して）が適切です。",translation:"当社のカスタマーサービス部門は、常にお客様から好評を得ています。"},
  {id:477,q:"Our investment decisions are based on ——– research and in-depth financial analysis.",options:["congested","prior","affordable","proficient"],answer:1,type:"語彙問題",explanation:"空所の前が前置詞on、後がresearch（調査、研究）です。これと合うのは(B) prior（事前の）です。",translation:"私たちの投資判断は、事前の調査と詳細な財務分析に基づいています。"},
  {id:478,q:"——– employee satisfaction is important, we must also consider our financial responsibilities.",options:["While","Because","Initially","Despite"],answer:0,type:"全文読み問題",explanation:"空所の後ろの形を見ます。employee satisfaction isで主語+動詞の形で、カンマ以降もwe must also considerで主語+動詞の形になっています。この形は上の１に該当し、空所には接続詞が入ることがわかります。選択肢の中で接続詞は(A) While（～の間、～だが）と(B) Because（～なので）があります。",translation:"従業員の満足度が重要であるが、私たちは財政的な責任も考慮しなければなりません。"},
  {id:479,q:"Ms. Nigel resolved issues quickly, ——– her clients with a lasting impression of exceptional service.",options:["has left","leaving","leaves","was left"],answer:1,type:"動詞問題",explanation:"問題文の動詞はresolvedです。接続詞などを使わない限りひとつの文に対して述語動詞はひとつになります。このルールから(A) has left、(C) leaves、(D) was leftは前に接続詞などがないので不適切です。したがって、現在分詞形の(B) leaving（leave：何らかの結果や影響を残す）が適切です。",translation:"Nigelさんは問題を迅速に解決し、顧客に並外れたサービスの持続的な印象を残しました。"},
  {id:480,q:"——– who is interested in participating in the company’s volunteer program should sign up by next week.",options:["Those","Others","Anyone","Anything"],answer:2,type:"代名詞問題",explanation:"空所の後が関係代名詞who、be動詞isがあります。したがって空所には、単数形でかつ、人に関する先行詞がはいることがわかります。この条件を満たすのは(C) Anyone（だれでも）のみでこれを選びます。",translation:"会社のボランティアプログラムに参加に興味がある人は誰でも、来週までに申し込んでください。"},
  {id:481,q:"By offering exclusive discounts, we can attract more ——– and boost overall sales performance.",options:["buy","buyer","buys","buyers"],answer:3,type:"品詞または動詞問題",explanation:"空所の前が、動詞attract引き付ける）とmoreです。後ろが接続詞andに動詞boost（上昇させる）が続きます。したがって、空所には動詞attractの目的語になれる名詞が入ると考えられます。",translation:"限定の割引を提供することで、より多くの購入者を引きつけ、全体の販売成績を上げることができます。"},
  {id:482,q:"——– a month ago, Stellar Printing Services introduced a customer loyalty program that has already shown positive results.",options:["Partly","Nearly","Formerly","Recently"],answer:1,type:"語彙問題",explanation:"空所の後がa month agoです。これと合うのは(B) Nearly（ほぼ）です。",translation:"Stellar Printing Servicesは、ほぼ1カ月前に、すでに良好な結果をもたらしている顧客ロイヤリティプログラムを導入しました。"},
  {id:483,q:"The decision to expand ——– the Asian market has significantly boosted our brand’s global presence.",options:["into","at","about","onto"],answer:0,type:"語彙問題",explanation:"空所の前が動詞expand、後ろがthe Asian market （アジア市場）。「アジア市場に進出する」という意味から(A) intoが適切です。",translation:"アジア市場への進出を決めたことで、私たちのブランドのグローバルな存在感は著しく高まりました。"},
  {id:484,q:"Murphy Software is considering additional acquisitions ——– the success of its recent strategic partnership.",options:["when","while","moreover","after"],answer:3,type:"部分読み問題",explanation:"空所の前が、Murphy Software is consideringで主語+動詞です。後ろはthe success of its recent strategic partnershipという名詞句なので空所には前置詞が入ることがわかります。選択肢の中で唯一の前置詞の働きがある(D) after（～の後で）を選びます。",translation:"Murphy Softwareは、最近の戦略的パートナーシップの成功後、追加の買収を検討しています。"},
  {id:485,q:"Wilson Pharmaceutical Corporation will work with ——– consultants to strengthen its project management skills.",options:["experience","to experience","experienced","experiences"],answer:2,type:"動詞または品詞問題",explanation:"空所の前が前置詞with、後ろが名詞の複数形のconsultants（コンサルタント）です。したがって空所には名詞consultantsを修飾する形容詞の(C) experienced（経験豊富な）が適切です。",translation:"Wilson Pharmaceutical Corporationは、プロジェクトマネジメント力を強化するため、経験豊富なコンサルタントと協力していきます。"},
  {id:486,q:"The sales team attended a training program ——– focused on developing negotiation skills.",options:["who","whoever","what","that"],answer:3,type:"関係代名詞問題",explanation:"空所の前後を見ます。空所の前がa training program (基調演説者)、後ろが動詞focused。先行詞が人以外で動詞が続くので、(D) thatが適切です。",translation:"営業チームは、交渉力を高めることに焦点を当てた研修に参加しました。"},
  {id:487,q:"Through ——– efforts, Mr. Campbell reduced production costs by resolving critical issues promptly.",options:["he","his","himself","him"],answer:1,type:"代名詞問題",explanation:"空所の前後を見ます。空所の前が前置詞Through （～を通じて）、後ろが名詞のefforts（努力）。名詞effortsの前には所有格の(B) his（彼の）が適切です。",translation:"Campbellさんは、彼の努力を通じて、重要な問題を迅速に解決することで、製造コストを削減しました。"},
  {id:488,q:"Following her success in improving customer satisfaction, Sarah ——– to customer service manager.",options:["promotes","has promoted","was promoted","to promote"],answer:2,type:"能動態・受動態・時制に関する動詞問題",explanation:"空所の前が主語のSarah （Sarahさん）、後ろが前置詞toに名詞句customer service manager（カスタマーサービスマネージャー）が続きます。",translation:"顧客満足度を向上させることに成功して、Sarahさんはカスタマーサービスマネージャーに昇進しました。"},
  {id:489,q:"The productivity of the team increased ——– with the introduction of new software.",options:["durably","considerably","expressively","carefully"],answer:1,type:"語彙問題",explanation:"空所の前が動詞の過去形increased（向上した）。increasedと合う副詞は(B) considerably（かなり）でこれを選びます。",translation:"新しいソフトの導入により、チームの生産性は格段に向上しました。"},
  {id:490,q:"Aki Miura ——– will be presenting the keynote speech at the upcoming conference.",options:["she","hers","her","herself"],answer:3,type:"代名詞問題",explanation:"空所の前後を見ます。空所の前がAki Miura（Aki Miuraさん）、後ろが助動詞will。",translation:"今度の会議では、Aki Miuraさん自身が基調演説を行う予定です。"},
  {id:491,q:"The project deadline is ——– scheduled for October 30th, but may be adjusted if necessary.",options:["formerly","remarkably","tentatively","exactly"],answer:2,type:"語彙問題",explanation:"空所の前が主語The project deadline （プロジェクトの締め切り）とbe動詞is、後ろが動詞の受動態scheduled (予定されている)。ここで一番合いそうなのは、(C) tentatively（暫定的に）です。",translation:"プロジェクトの締め切りは10月30日を暫定的に予定していますが、必要に応じて調整することがあります。"},
  {id:492,q:"Sunset Serenity Inn ——– caters to the needs of both leisure and business travelers.",options:["ease","easy","easing","easily"],answer:3,type:"品詞問題",explanation:"空所の前後を見ます。空所の前が主語Sunset Serenity Inn、後ろが動詞の三人称単数現在形のcaters（cater toで「〔要求など〕に応じる」）。したがって、空所には動詞catersを修飾する副詞の(D) easily（簡単に）が適切です。",translation:"Sunset Serenity Innは、レジャーとビジネスの旅行者のニーズに簡単に応えることができます。"},
  {id:493,q:"Alberto Ovando, ——– of the Green Business Award, demonstrates a strong commitment to sustainable practices.",options:["win","won","winner","winning"],answer:2,type:"品詞問題",explanation:"空所の前後を見ます。空所の前が主語のAlberto Ovando、後ろのカンマまでが前置詞句of the Green Business Award（Green Business Awardの）。カンマの後に動詞demonstrates（示す）があります。",translation:"グリーンビジネス賞の受賞者であるAlberto Ovandoは、持続可能な実践への強いコミットメントを示している。"},
  {id:494,q:"Delgado Manufacturing is implementing new technology solutions ——– streamline processes and increase overall efficiency.",options:["so that","even though","before","in order to"],answer:3,type:"部分読み問題",explanation:"空所の後ろの形を見ます。streamline processes and increase overall efficiency （プロセスを合理化し、全体的な効率を高める）で、動詞の原形+目的語をandでつなげています。",translation:"Delgado Manufacturingは、プロセスを合理化し、全体的な効率を高めるために、新しい技術的解決策を実施しています。"},
  {id:495,q:"To share innovative ideas, invite ——– from successful startups to our next workshop.",options:["representatives","represents","represented","represent"],answer:0,type:"品詞または動詞問題",explanation:"空所の前後を見ます。空所の前が動詞invite（招待する）、後ろが前置詞from。空所には動詞詞inviteの目的語になる名詞が入ると考えらえます。選択肢の中で名詞は(A) representatives（代表者、担当者）でこれを選びます。",translation:"革新的なアイデアを共有するために、成功した新興企業の代表者を次のワークショップに招待してください。"},
  {id:496,q:"Our website traffic increased substantially ——– the last promotional campaign we launched.",options:["below","during","beyond","among"],answer:1,type:"語彙問題",explanation:"空所の後ろがthe last promotional campaign （最後に実施した販促キャンペーン）です。これに合う前置詞は(B) during（～の間に、～の期間中）でこれを選びます。",translation:"最後に実施した販促キャンペーンの期間中に、当社のウェブサイトのアクセス数が大幅に増加しました。"},
  {id:497,q:"Zhang Gardening Supplies will make multiple ——– to resolve the customer’s concerns effectively.",options:["experiences","attempts","objectives","excursions"],answer:1,type:"語彙問題",explanation:"空所の前が動詞makeに形容詞multiple （複数の）が続きます。これに合うのは(B) attempts（試み）です。",translation:"Zhang Gardening Suppliesは、お客様の懸念を効果的に解決するために、複数の試みを行います。"},
  {id:498,q:"Please save your work frequently ——– the computer system experiences unexpected issues.",options:["instead of","in case","without","throughout"],answer:1,type:"部分読み問題",explanation:"空所の前は、動詞がsave（保存する）の命令文です。空所の後ろはthe computer system experiencesで主語+動詞の形です。これは、上の2のパターンで空所には接続詞が入ることがわかります。選択肢の中で接続詞は、(B) in case（万が一［もしもの場合］に備えて）でこれを選びます。",translation:"コンピュータシステムに予期せぬ問題が発生した場合に備えて、頻繁に作品を保存するようにしてください。"},
  {id:499,q:"Xinfan Technologies plans to invest in renewable energy ——– in Southeast Asia than originally anticipated.",options:["more gradual","most gradual","gradually","more gradually"],answer:3,type:"品詞または比較問題",explanation:"空所の後方にthanがあります。したがって、空所には比較級が入ると考えられます。比較級は形容詞の(A) more gradualと副詞の(D) more graduallyがあります。",translation:"Xinfan Technologiesは、東南アジアでは再生可能エネルギーへの投資を当初の予想よりも徐々に進めていく予定です。"},
  {id:500,q:"FCJ Medical Publishing’s expansion plans and resource allocation ——– at the board meeting.",options:["discusses","will be discussed","had discussed","to be discussed"],answer:1,type:"動詞問題",explanation:"問題文の全体を見ると、動詞がないので空所には動詞が入ることがわかります。主語は空所の前のFCJ Medical Publishing’s expansion plans and resource allocation（FCJ Medical Publishingの拡大計画と 資源配分）です。",translation:"FCJ Medical Publishingの拡大計画と 資源配分は、取締役会で議論される予定です。"},
  {id:501,q:"Mr. Dimmick will ——– with sales to develop a comprehensive promotional strategy.",options:["coordinated","coordination","to coordinate","be coordinating"],answer:3,type:"品詞または動詞問題",explanation:"空所の前後を見ます。空所の前が助動詞will、後ろが前置詞withです。したがって空所には動詞の原形が入ることがわかり、選択肢の中で動詞の原形は(D) be coordinating（coordinate：調整する）のみでこれを選びます。",translation:"Dimmickさんは、包括的なプロモーション戦略を展開するため、営業と調整する予定です。"},
  {id:502,q:"Ms. Lang delivered a ——– presentation, showcasing our company’s innovative solutions and future growth prospects.",options:["best","superb","affordable","former"],answer:1,type:"語彙問題",explanation:"空所の後がpresentation（プレゼンテーション）です。これと合うのは(B) superb（素晴らしい）です。",translation:"Langさんは、素晴らしいプレゼンテーションを行い、私たちの会社の革新的なソリューションと将来の成長見通しを紹介しました。"},
  {id:503,q:"Our sales have shown consistent growth ——– the past three years, reflecting strong customer demand.",options:["among","besides","over","under"],answer:2,type:"語彙問題",explanation:"空所の後ろがthe past three years （過去3年）です。これに合うのは(C) over（〔期間〕を通して）です。",translation:"当社の売上高は、過去3年間で着実に成長しており、それは顧客の強い需要を反映しています。"},
  {id:504,q:"By offering the ——– level of support, Zen Consulting Corporation helps their clients overcome challenges and achieve their objectives.",options:["highest","brightest","easiest","clearest"],answer:0,type:"語彙問題",explanation:"空所の前が冠詞the、後がlevel of support （サポートのレベル）です。これと合うのは(A) highest（最高の）です。",translation:"Zen Consulting Corporationは、最高レベルのサポートを提供することで、お客様が課題を克服し、目的を達成することを支援しています。"},
  {id:505,q:"The board of directors is ——– to welcome our new CFO, whose extensive experience will guide our company’s growth.",options:["thrill","thrilling","thrills","thrilled"],answer:3,type:"品詞または動詞問題",explanation:"主語はThe board of directors（取締役会）で、その後にbe動詞isが続きます。空所の後ろは不定詞to welcome（歓迎する）なので、(D) thrilled（興奮した、感動した、感激した）が適切です。",translation:"取締役会は、その豊富な経験で当社の成長を導いてくれる新しいCFOを迎えることを大変嬉しく思います。"},
  {id:506,q:"Under Mr. Zhang’s leadership, ——– team consistently exceeded sales targets.",options:["he","his","himself","him"],answer:1,type:"代名詞問題",explanation:"空所の前後を見ます。空所の前がカンマで後ろが名詞team（チーム） 、その後に副詞consistently （一貫して）が続きます。したがって空所には名詞teamを修飾する所有格の(B) hisが適切です。",translation:"Zhangさんのリーダーシップのもと、チームは一貫して販売目標を上回ってきました。"},
  {id:507,q:"We anticipate that the negotiations with our potential supplier will be finalized within the next ——– days.",options:["little","each","every","few"],answer:3,type:"数量形容詞問題",explanation:"空所の後ろの名詞が可算名詞で複数のdays 。可算名詞の複数形の前におけるのは、(D) few（ほとんどない、a fewで「少しの」）のみでこれを選びます。",translation:"私たちは、潜在的な供給業者との交渉が数日以内にまとまることを予想しています。"},
  {id:508,q:"Merrywood Electronics has agreed to expedite shipments ——– we experience a sudden surge in customer demand.",options:["in case of","in the event that","despite","thereafter"],answer:1,type:"部分読み問題",explanation:"空所の前方の形を見ます。Merrywood Electronics has agreed で主語+動詞の形です。空所の後ろもwe experienceで主語+動詞の形になっています。この形は上の2に該当し、空所には接続詞が入ることがわかります。選択肢の中で接続詞は(B) in the event thatだけなので(B)を選びます。",translation:"Merrywood Electronicsは、お客様の需要が急増した場合、出荷を早めることに同意しています。"},
  {id:509,q:"Our production team is working diligently to meet the deadline for the ——– order.",options:["initialization","initialize","initial","initially"],answer:2,type:"品詞問題",explanation:"空所の前後を見ます。空所の前が冠詞the、後ろが名詞のorder（注文）。したがって空所には名詞orderを修飾する形容詞の(C) initial（最初の）が適切です。",translation:"初回注文の納期を守るため、当社の生産チームは熱心に取り組んでいます。"},
  {id:510,q:"The Thorpe Expansion Project is divided into five phases, each of ——– is designed to achieve specific milestones and goals.",options:["those","these","which","whom"],answer:2,type:"関係詞・代名詞問題",explanation:"文全体の構造を確認するために、動詞をチェックします。動詞はis divided とis designedです。間にandなどの接続詞がないので、代名詞の(A) those、(B) theseは不適切で、関係代名詞の働きのある(C) whichと(D) whomが候補になります。先行詞five phases（５つの段階）が人以外なので関係代名詞(C) whichが適切です。",translation:"Thorpe Expansion Projectは5つの段階に分けられ、それぞれの段階で特定の重要なポイントと目標を達成するように設計されています。"},
  {id:511,q:"You must create a detailed plan and budget before ——– any home renovation.",options:["will begin","begins","must begin","beginning"],answer:3,type:"時制に関する動詞問題",explanation:"before以下の確認です。beforeは接続詞または前置詞として前後をつなぐことができます。接続詞の場合は、通常は主語と動詞が続きます。ところが、beforeの後に主語に当たるものがありません。したがって、主語を必要とする動詞の形の(A) will begin（未来形）、(B) begins（三人称単数現在形）、(C) must begin（助動詞+動詞の原形）は除外されます。この問題ではbeforeは前置詞で、残ったing形の(D) beginningが適切です。",translation:"どんな家の改築を始める前に、詳細な計画と予算を作成しなければなりません。"},
  {id:512,q:"College students should learn how to manage their money ——– to avoid debt.",options:["finance","financially","financial","finances"],answer:1,type:"品詞問題",explanation:"空所の前後を見ます。空所の前がhow to manage their money （お金の管理の仕方）、後ろがto avoid debt （借金を避けるため）です。空所には、動詞manage（管理する）を修飾する副詞の(B) financially（金銭的に、財政的に）が適切です。",translation:"大学生は、借金を避けるためにお金を経済的に管理する方法を学ぶべきです。"},
  {id:513,q:"The Modern Art Exhibition is scheduled to ——– a few weeks, featuring works from local and international artists.",options:["happen","hold","last","start"],answer:2,type:"語彙問題",explanation:"空所の後ろがa few weeks（数週間）です。これと合うのが(C) last（続く）です。",translation:"Modern Art Exhibitionは、数週間続く予定で、地元および国際的なアーティストの作品が展示されます。"},
  {id:514,q:"To encourage participation, Peach Fitness Center will ——– the registration fees during the promotional period.",options:["exceed","waive","commend","recur"],answer:1,type:"語彙問題",explanation:"空所の後ろの目的語the registration fees （登録費用）で、これと合うのが(B) waive（免除する、放棄する）です。",translation:"参加を促すために、ピーチ・フィットネスセンターはプロモーション期間中に登録費用を免除します。"},
  {id:515,q:"Our vacation itinerary includes visits to several ——– cities to experience the culture of Mexico.",options:["different","difference","differently","differs"],answer:0,type:"品詞問題",explanation:"空所の前後を見ます。空所の前が形容詞several（いくつかの）、後ろが名詞のcities （都市）。したがって空所には名詞citiesを修飾する形容詞の(A) different（異なる）が適切です。",translation:"私たちの休暇の旅程は、メキシコの文化を体験するためにいくつかの異なる都市を訪れることを含んでいます。"},
  {id:516,q:"Employees should familiarize ——– with the company’s policies and procedures.",options:["those","them","itself","themselves"],answer:3,type:"代名詞問題",explanation:"空所の前が動詞familiarize、後ろが前置詞with。familiarize oneself with（～をよく理解する）なので、再帰代名詞が入ると考えられます。再帰代名詞は(C) itselfと(D) themselvesがありますが、主語Employees（従業員）に対応するものが適切で(D) themselvesを選びます。",translation:"従業員は、会社の方針と手順に精通すべきです。"},
  {id:517,q:"Miyano City’s tourist center provides a helpful half-day ——– for first-time visitors.",options:["direction","orientation","option","version"],answer:1,type:"語彙問題",explanation:"空所の前がa helpful half-day （役に立つ半日の）で後ろがfor first-time visitors （初めての訪問者のために）とあるので、(B) orientation（オリエンテーション）が適切です。",translation:"Miyano 市の観光センターは、初めての訪問者に半日の役立つオリエンテーションを提供しています。"},
  {id:518,q:"The ——– location of Rockland Systems will be moved next year to accommodate its rapid growth and expanding workforce.",options:["present","remarkable","constant","widespread"],answer:0,type:"語彙問題",explanation:"空所の後ろが名詞のlocation （場所、所在地）、動詞がwill be moved（移転される）です。「現在の所在地が移転される」と考えるのが適切なので、(A) present（現在の）を選びます。",translation:"Rockland Systemsの現在の所在地は、急成長と拡大する従業員数に対応するため、来年移転される予定です。"},
  {id:519,q:"Clifford Street was closed ——– construction, so drivers had to take an alternate route.",options:["because","due to","despite","so that"],answer:1,type:"語彙問題",explanation:"空所の前が、Clifford Street was closed（Clifford Streetは閉鎖された）で主語+動詞、カンマまでの後ろがconstruction （工事）で名詞。したがって空所には前置詞が入ることがわかります。",translation:"Clifford Streetは工事のために閉鎖されたので、運転手は代替ルートを通らなければなりませんでした。"},
  {id:520,q:"By the time we ——– at the concert venue, the opening act had already finished their performance.",options:["will arrive","arrive","arriving","arrived"],answer:3,type:"時制に関する動詞問題",explanation:"By the timeという表現は、ある時点までに何かが起こったことを示しています。カンマ以降の主節の時制が過去完了で、コンサート会場に到着するまでにオープニングアクトが終わってしまったことを示しています。このため、過去形の(D) arrivedが適切です。",translation:"コンサート会場に到着した時には、オープニングアクトはすでに演奏を終えていました。"},
  {id:521,q:"Riverdale Furniture ——– gained popularity thanks to its commitment to excellent customer service.",options:["steady","steadiness","steadier","steadily"],answer:3,type:"品詞問題",explanation:"空所の前後を見ます。空所の前が名詞句で主語のRiverdale Furniture、後ろが動詞の過去形gained（得た）。したがって、空所には動詞gainedを修飾する副詞の(D) steadily（着実に）が適切です。",translation:"Riverdale Furnitureは、優れた顧客サービスへの取り組みのおかげで、着実に人気を高めています。"},
  {id:522,q:"Kaon Systems ——– in developing user-friendly applications for small businesses.",options:["depends","consists","specializes","emphasizes"],answer:2,type:"語彙問題",explanation:"空所の後ろが前置詞inです。直後にinを取る動詞は(C) specializes（specialize inで「～を専門に扱う」）です。",translation:"Kaon Systemsは、中小企業向けのユーザーフレンドリーなアプリケーションの開発に特化しています。"},
  {id:523,q:"The finance manager, Ms. Beckley, recommends that a detailed budget ——– to monitor and control expenditures.",options:["creates","will be created","be created","has created"],answer:2,type:"能動態・受動態・時制に関する動詞問題",explanation:"recommends that節に気づくかどうかがカギになります。",translation:"財務マネージャーのBeckleyさんは、支出を監視・管理するために詳細な予算を作成することを推奨しています。"},
  {id:524,q:"While their focus is on short-term gains, ——– is a long-term, sustainable growth strategy.",options:["we","our","us","ours"],answer:3,type:"代名詞問題",explanation:"To go to work, Ms. Khan needed to rent a car while ——– was being repaired.",translation:"彼らの焦点が短期的な利益にあるのに対し、わたしたちのそれは長期的かつ持続的な成長戦略です。"},
  {id:525,q:"——– an order has been confirmed, you will receive a tracking number via email.",options:["By means of","Once","Following","Concerning"],answer:1,type:"部分読み問題",explanation:"空所の後ろan order has been confirmedで主語+動詞、カンマ以降は、you will receiveで主語+動詞の形です。これは、上の1のパターンで空所には接続詞が入ることがわかります。選択肢の中で接続詞は、(B) Once（いったん～すると）のみです。したがって、(B) Once（いったん～すると）を選びます。",translation:"注文が確認されると、電子メールで追跡番号を受け取ります。"},
  {id:526,q:"Dynamic English Online offers direct access to experienced ——– for personalized feedback.",options:["instruction","instructed","instructive","instructors"],answer:3,type:"品詞問題",explanation:"空所の前後を見ます。空所の前が形容詞experienced（経験豊富な）、後ろが前置詞for。したがって空所には形容詞experienced（経験豊富な）が修飾する名詞が考えられます。選択肢の中で名詞は(A) instruction（指示）と(D) instructors（講師、指導者）ですが、「経験豊富な」のは「講師」が適切なので(D) instructors（講師、指導者）を選びます。",translation:"Dynamic English Onlineでは、経験豊富な講師に直接アクセスし、個人に合わせてフィードバックを受けることができます。"},
  {id:527,q:"Technology has ——– transformed how we communicate, learn, and work every day.",options:["mutually","completely","intentionally","exclusively"],answer:1,type:"語彙問題",explanation:"空所の前後を見ます。空所の前が主語Technologyと現在完了形の助動詞has、後ろが動詞transformed （変える）。主語と動詞に合う副詞は(B) completely（完全に）でこれを選びます。",translation:"技術は、私たちの毎日のコミュニケーション、学習、そして仕事のやり方を完全に変えました。"},
  {id:528,q:"The board of directors meeting ——– in the main conference room on Tuesday.",options:["will be held","holding","had held","to be held"],answer:0,type:"能動態・受動態・時制に関する動詞問題",explanation:"空所の前が主語のThe board of directors meeting （取締役会）で空所の後ろには動詞がありません。したがって空所には述語動詞が必要です。The board of directors meeting （取締役会）は「開催される」という受動態の関係が適切なので、述語動詞の形でかつ受動態の(A) will be heldを選びます。",translation:"取締役会は、火曜日に大会議室で開催される予定です。"},
  {id:529,q:"The management team will determine ——– to streamline processes for better productivity.",options:["if","in case","how","on"],answer:2,type:"部分読み問題",explanation:"空所の前が動詞determine（決める）、後ろが不定詞のto streamline（合理化する）です。前後をつなぐ適切な選択肢は(C) howです。",translation:"経営陣は、生産性を向上させるために、プロセスを合理化する方法を決定します。"},
  {id:530,q:"Rather than outsourcing customer service, we will train our employees to handle inquiries ——–.",options:["enough","accordingly","instead","eventually"],answer:2,type:"語彙問題",explanation:"空所の前の意味は、「顧客サービスを外部に委託するのではなく、社員が問い合わせに対応できるように教育します」です。これに合うのは(C) instead（代わりに）です。",translation:"顧客サービスを外部に委託するのではなく、代わりに社員が問い合わせに対応できるように教育します。"},
  {id:531,q:"In response to the ——– from our investors, we will be hosting a conference call to address concerns.",options:["correspond","corresponds","correspondence","corresponded"],answer:2,type:"品詞または動詞問題",explanation:"空所の前が冠詞the、後ろが前置詞from。したがって空所には名詞が入ることがわかり、選択肢の中で唯一の名詞(C) correspondence（通信、手紙のやりとり）が適切です。",translation:"投資家からの連絡を受け、懸念事項に対処するため、電話会議を開催する予定です。"},
  {id:532,q:"Darwin Legal Group will soon ——– a series of workshops to educate businesses on intellectual property rights.",options:["educate","participate","proceed","launch"],answer:3,type:"語彙問題",explanation:"空所の後が動詞の目的語のa series of workshops（一連の研修会）で、これと合う動詞は(D) launch（開始する）です。",translation:"Darwin Legal Groupは、知的財産権について企業を教育するための一連のワークショップをまもなく開始します。"},
  {id:533,q:"For her remarkable artistic talents, Ms. Ortega ——– the recipient of a prestigious national arts grant.",options:["named","has been naming","was named","will name"],answer:2,type:"能動態・受動態・時制に関する動詞問題",explanation:"空所の前が主語のMs. Ortega （Ortega さん）、後ろがthe recipient of a prestigious national arts grant （名誉ある国立芸術助成金の受賞者）です。この段階で文法的には能動態の「Ortega さん」が「受賞者」を「任命する」と受動態の「Ortega さん」が「受賞者」を「任命される」の２つのパターンがあります。",translation:"Ortegaさんは、その優れた芸術的才能が評価され、名誉ある国立芸術助成金の受賞者に任命されました。"},
  {id:534,q:"The Oakville Grocery Store’s north and south branches achieved revenue increases of 12% and 18%, ——–.",options:["increasingly","extensively","respectively","prominently"],answer:2,type:"語彙問題",explanation:"空所の前が12% and 18%（12％と18％）、主語がThe Oakville Grocery Store’s north and south branches（Oakville Grocery Storeの北店と南店）です。リストされた要素が同じ順序で対応すると考えられ、(C) respectively（それぞれ）を選びます。",translation:"Oakville Grocery Storeの北店と南店は、それぞれ12％、18％の増収を達成しました。"},
  {id:535,q:"Xavier Engineering is committed to developing ——– solutions for sustainable energy production.",options:["innovate","innovative","innovatively","innovation"],answer:1,type:"品詞問題",explanation:"空所の前後を見ます。空所の前が動名詞developing（開発すること）、後ろが名詞solutions（解決法）なので空所には名詞solutionsを修飾する形容詞の(B) innovative（革新的な）が適切です。",translation:"Xavier Engineeringは、持続可能なエネルギー生産のための革新的な解決法の開発に取り組んでいます。"},
  {id:536,q:"——– Ms. Thompson became the team leader, employee morale has noticeably improved.",options:["Due to","Finally","Even so","Since"],answer:3,type:"部分読み問題",explanation:"空所からカンマまでは、Ms. Thompson became で主語+動詞の形です。カンマ以降は空所の後ろはemployee morale has noticeably improved で主語+動詞の形です。これは、上の1のパターンで空所には接続詞が入ることがわかります。選択肢の中で接続詞の働きがあるのは、(D) Since（～以来、～なので）のみです。したがって、(D) Since（～以来、～なので）を選びます。",translation:"Thompsonさんがチームリーダーになってから、社員の士気が顕著に向上しました。"},
  {id:537,q:"During the winter months, the roads in Frost Valley are ——– closed due to heavy snowfall.",options:["frequency","frequent","frequently","frequents"],answer:2,type:"品詞問題",explanation:"空所の前後を見ます。空所の前がbe動詞are、後ろが形容詞closed （閉ざされた）なので空所には形容詞closedを修飾する副詞の(C) frequently（頻繁に）が適切です。",translation:"冬期間は、Frost Valleyの道路は大雪のため、頻繁に閉鎖されます。"},
  {id:538,q:"Our new software processes data ——– than existing solutions, giving us a competitive advantage.",options:["rapid","rapidly","more rapid","more rapidly"],answer:3,type:"品詞または比較問題",explanation:"空所の前後を見ます。空所の前が動詞processes（処理する）と目的語data、後ろthanです。したがって空所には比較級が入ることがわかり、(C) more rapid（より迅速な）と(D) more rapidly（より迅速に）に絞り込めます。",translation:"我々の新しいソフトウェアは、既存のソリューションよりも迅速にデータを処理するため、競争上の優位性があります。"},
  {id:539,q:"New hires should introduce ——– during the orientation session to build relationships with colleagues.",options:["they","them","their","themselves"],answer:3,type:"代名詞問題",explanation:"問題文の主語はNew hires（新入社員）です。空所は動詞introduce（紹介する）の目的語になります。再帰代名詞は主語自身が目的語になる場合に使われるので、再帰代名詞(D) themselves（彼ら・彼女ら自身）を選びます。",translation:"新入社員は同僚との関係を築くために、オリエンテーションで自己紹介をするべきです。"},
  {id:540,q:"Astro Manufacturing Group focuses ——– on developing sustainable products to reduce environmental impact.",options:["relevantly","exclusively","correctly","promptly"],answer:1,type:"語彙問題",explanation:"空所の前が動詞focus（重点的に取り組む）、後ろが前置詞on。focus on ～（～に重点的に取り組む）と合う副詞は(B) exclusively（もっぱら、独占的に）です。",translation:"Astro Manufacturing Groupは、環境への影響を減らすために持続可能な製品の開発に専念しています。"},
  {id:541,q:"We aim to satisfy our employees and stakeholders ——– by focusing on sustainable growth and development.",options:["quite","still","alike","even"],answer:0,type:"語彙問題",explanation:"空所の前がour employees and stakeholders（社員と利害関係者）とあります。選択肢の中でこれにつながるのは(A) alike（副詞：同様に）です。",translation:"持続可能な成長と発展を重視することで、社員と利害関係者が同様に満足することを目指します。"},
  {id:542,q:"To attract more visitors, the ——– industry should focus on promoting cultural heritage sites.",options:["tour","toured","tourist","tourism"],answer:3,type:"品詞問題",explanation:"空所の後ろがindustry should focus on promoting cultural heritage sites（～業界は文化遺産のプロモーションに注力すべきです）なので、名詞industry（業界）と一番合うのは(D) tourism（観光業）です。",translation:"より多くの観光客を呼び込むために、観光業界は文化遺産のプロモーションに注力すべきです。"},
  {id:543,q:"The Whispering Woods Concert ——– because of the heavy rain forecast.",options:["postpones","has been postponed","is postponing","will postpone"],answer:1,type:"動詞問題",explanation:"選択肢はすべて述語動詞になれるものなので、空所の前が主語と考えられます。主語のThe Whispering Woods Concert （Whispering Woodsコンサート）は「延期される」という受動態が適切です。",translation:"Whispering Woodsコンサートは、大雨予報のため延期になりました。"},
  {id:544,q:"Please refer to the guidelines indicated ——– our company website for proper invoice submission.",options:["to","with","on","about"],answer:2,type:"語彙問題",explanation:"空所の前がthe guidelines indicated（記載されたガイドライン）、後ろがour company website（当社ウェブサイト）です。「当社ウェブサイト」に「記載されたガイドライン」と考えるのが適切なので、前置詞(C) onを選びます。",translation:"適切な請求書の提出については、当社ウェブサイトに記載されているガイドラインをご参照ください。"},
  {id:545,q:"Fresh Origins Foods values employee feedback, ——– their seniority or length of service.",options:["nevertheless","regardless of","because","in addition"],answer:1,type:"部分読み問題",explanation:"空所の後ろはtheir seniority or length of service（年功序列や勤続年数）で名詞句です。空所の前がFresh Origins Foods values（Fresh Origins Foodsは～を大切にしている）で主語+動詞の形です。これは、上の４のパターンで空所には前置詞が入ることがわかります。選択肢の中で前置詞は(B) regardless of（～に関係なく）のみでこれを選びます。",translation:"Fresh Origins Foodsは、年功序列や勤続年数に関係なく、社員のフィードバックを大切にしています。"},
  {id:546,q:"The company logo should be ——– displayed on all marketing materials and presentations.",options:["prominence","prominences","prominent","prominently"],answer:3,type:"品詞問題",explanation:"空所の前後を見ます。空所の前がbe動詞の原形のbe、後ろが動詞の過去分詞displayed（表示された）。したがって、空所にはdisplayedを修飾する副詞の(D) prominently （目立つように）が適切です。",translation:"会社のロゴは、すべてのマーケティング資料やプレゼンテーションに目立つように表示する必要があります。"},
  {id:547,q:"The new regulations require us to ——– the terms of our privacy policy to ensure compliance.",options:["deprive","respond","modify","reassure"],answer:2,type:"語彙問題",explanation:"空所の後ろが目的語the terms of our privacy policy （プライバシーポリシーの条項）です。この目的語を合うのは(C) modify（変更する）です。",translation:"新しい規制は、遵守を確保するために、私たちのプライバシーポリシーの条件を変更することが求められています。"},
  {id:548,q:"Ms. Iwata has been ——– to inaugurate the new community center on Saturday.",options:["invited","attended","judged","joined"],answer:0,type:"語彙問題",explanation:"空所の前がMs. Iwata has been（Iwataさんが～された）、後ろがto inaugurate the new community center（新しいコミュニティセンターの開会式を行うために）なので、(A) invited（招待された）が適切です。",translation:"Iwataさんは、土曜日に新しいコミュニティセンターの開会式を行うために招待されました。"},
  {id:549,q:"Ms. Allen has proven herself to be a ——– team member, always meeting deadlines and delivering quality work.",options:["depends","dependably","dependence","dependable"],answer:3,type:"品詞問題",explanation:"空所の前後を見ます。空所の前が冠詞a、後ろが名詞句team member（チームメンバー）。したがって空所には名詞句team memberを修飾する形容詞の(D) dependable（信頼できる）が適切です。",translation:"Allenさんは、常に締め切りを守り、質の高い仕事を提供する信頼できるチームメンバーであることを証明しました。"},
  {id:550,q:"Our software engineers have extensive ——– in developing robust and scalable applications for diverse industries.",options:["expert","experts","expertly","expertise"],answer:3,type:"品詞問題",explanation:"空所の前後を見ます。空所の前が主語Our software engineers（私たちのソフトウェアエンジニア）、動詞haveに形容詞extensiveが続き、後ろが前置詞in。したがって空所には名詞が入ることがわかります。選択肢の中に名詞は３つあり、(A) expert（専門家）、(B) experts（expertの複数形）、(D) expertise（専門知識）です。",translation:"私たちのソフトウェアエンジニアは、多種多様な産業向けに頑丈で拡大可能なアプリケーションを開発するという幅広い専門知識を持っています。"},
  {id:551,q:"Mr. Hollander’s method of employee training is quite different from ——–.",options:["I","my","me","mine"],answer:3,type:"代名詞問題",explanation:"前置詞fromの後なので、目的格の(C) meを選びそうですが、これは適切ではありません。",translation:"Hollanderさんの従業員教育の方法は私の方法とはかなり異なっています。"},
  {id:553,q:"Our curriculum, unlike ——– schools, includes mandatory arts and music education.",options:["each","another","many","much"],answer:2,type:"数量形容詞問題",explanation:"空所の後ろがschools（学校）で可算名詞の複数形。選択肢の中で可算名詞の複数形につくのは(C) many（多くの）のみでこれを選びます。",translation:"私たちのカリキュラムは、多くの学校と違い、芸術と音楽教育が必須です。"},
  {id:554,q:"Some residents were ——– with the decision to increase property taxes.",options:["disappointing","disappointed","disappointment","disappoints"],answer:1,type:"品詞または動詞問題",explanation:"空所の前が、主語Some residents（一部の住民）にbe動詞wereが続き、後ろが前置詞with、the decisionです。",translation:"不動産税の引き上げ決定に対して、一部の住民は失望した。"},
  {id:555,q:"It is extremely important for ——– to accurately verify their sources before publishing.",options:["journalism","journal","journalistic","journalists"],answer:3,type:"品詞問題",explanation:"空所の前後を見ます。空所の前が前置詞for、後ろが不定詞のtoです。空所には名詞が入ることがわかりますが選択肢の中に(A) journalism（ジャーナリズム）、(B) journal（ジャーナル、雑誌）、(D) journalists（ジャーナリスト【複数形】）があります。",translation:"出版する前に情報源を正確に確認することは、ジャーナリストにとって極めて重要です。"},
  {id:556,q:"——– we have completed the product testing, we are ready for the official launch.\"",options:["Finally","Recently","Now that","Throughout"],answer:2,type:"部分読み問題",explanation:"空所の後ろの形を見ます。we have completed で主語+動詞の形で、カンマ以降もwe are で主語+動詞の形になっています。この形は上の１に該当し、空所には接続詞が入ることがわかります。選択肢の中で接続詞は(C) Now that（今や～だから）だけでこれを選びます。",translation:"製品のテストが終わったので、我々は正式な発売の準備ができています。"},
  {id:557,q:"The research center of Ridge Technologies ——– to foster innovation and improve product quality.",options:["is constructing","will be constructed","constructs","will have constructed"],answer:1,type:"動詞問題",explanation:"選択肢はすべて述語動詞になれるものなので、空所の前が主語と考えられます。主語のThe research center of Ridge Technologies （Ridge Technologiesの研究センター）は「建設される」という受動態が適切です。",translation:"Ridge Technologiesの研究センターは、革新と製品品質の向上を促進するために建設される予定です。"},
  {id:558,q:"Confidential business contracts are kept ——– in our office to prevent potential legal issues.",options:["secure","security","securely","secured"],answer:2,type:"品詞問題",explanation:"空所の前後を見ます。空所の前が主語Confidential business contracts（機密のビジネス契約）、受動態の動詞are kept（保管されている）が続きます。空所の後ろは前置詞inなので、inの前で区切れます。",translation:"潜在的な法的問題を防ぐために、機密のビジネス契約は私たちのオフィスで安全に保管されています。"},
  {id:559,q:"The reward points on your credit card are ——– for various merchandise and travel.",options:["durable","redeemable","certified","diligent"],answer:1,type:"語彙問題",explanation:"空所の前が主語The reward points on your credit card（クレジットカードのポイント還元）、その後be動詞are、空所の後ろが前置詞forと various merchandise and travel（さまざまな商品や旅行）です。",translation:"クレジットカードのポイント還元は、さまざまな商品や旅行に引き換えることができます。"},
  {id:560,q:"Lavenderville is known for its ——– streets lined with colorful houses.",options:["picture","pictures","picturesque","picturing"],answer:2,type:"品詞問題",explanation:"空所の前後を見ます。空所の前が代名詞所有格のits、後ろが名詞streets（通り、街並み）。したがって、空所には形容詞が入ると考えられ、streetsと合う(C) picturesque（絵のように美しい）が適切です。",translation:"Lavendervilleはカラフルな家が並ぶ絵のように美しい街並みで知られています。"},
  {id:561,q:"Mr. Kishimoto’s payment was ——– recorded twice, leading to an error in our accounts.",options:["mistaken","mistakes","mistakenly","mistaking"],answer:2,type:"品詞問題",explanation:"空所の前後を見ます。空所の前がbe動詞was、後ろが動詞の過去分詞recorded （記録された）。したがって動詞の過去分詞recordedを修飾する副詞の(C) mistakenly（誤って）が適切です。",translation:"Kishimotoさんの支払いが誤って二重に記録され、それが我々の会計にエラーを引き起こしました。"},
  {id:563,q:"Our production team did not have enough ——– to test the new software before release.",options:["flow","status","selection","time"],answer:3,type:"語彙問題",explanation:"空所を含めたbefore前の意味は、「私たちの生産チームは、新しいソフトウェアをテストするのに十分な——–がなかった」です。空所に入る適切な選択肢は(D) time（時間）でこれを選びます。",translation:"私たちの生産チームは、発売前に新しいソフトウェアをテストするのに十分な時間がなかった。"},
  {id:566,q:"Ms. Doyle and her colleagues ——– encountered such challenging tasks in their previous roles.",options:["hard","harder","hardly","hardness"],answer:2,type:"品詞問題",explanation:"空所の前後を見ます。空所の前が主語のMs. Doyle and her colleagues（Doyleさんと同僚）、後ろが動詞の過去形のencountered（出くわした）。したがって、空所には動詞encounteredを修飾する副詞が入ることがわかります。",translation:"Doyleさんと彼女の同僚は、以前の役割ではこのような難題に出くわしたことはほとんどなかった。"},
  {id:567,q:"Thanks to our experienced staff, we have maintained a superior ——– in project management.",options:["standard","proportion","category","estimate"],answer:0,type:"語彙問題",explanation:"空所の前がhave maintained a superior …（優れた…を維持してきた）、後ろがin project management （プロジェクトマネジメントで）。前後と合うのは(A) standard（水準、基準）でこれを選びます。",translation:"我々は経験豊富なスタッフのおかげで、プロジェクト管理における優れた水準を維持してきました。"},
  {id:568,q:"The ——– lecture on the importance of volunteer work inspired many students to serve their community.",options:["enthusiasm","enthusiastic","enthusiastically","enthusiast"],answer:1,type:"品詞問題",explanation:"空所の前後を見ます。空所の前が冠詞The、後ろが名詞lecture（講義）。したがって、空所には名詞lectureを修飾する形容詞の(B) enthusiastic（熱心な）が適切です。",translation:"ボランティア活動の重要性についての熱心な講義は、多くの学生を地域社会に貢献する気にさせました。"},
  {id:570,q:"——– new employees go through a rigorous training program to understand our business operations.",options:["Every","Each","None","Most"],answer:3,type:"数量形容詞問題",explanation:"空所の後ろが可算名詞の複数形のnew employees（新入社員）。可算名詞の複数の前における選択肢は、(D) Most（ほとんどの）のみでこれを選びます。",translation:"新入社員のほとんどは、私たちのビジネス運営を理解するために、厳格な訓練プログラムを受ける。"},
  {id:571,q:"Reeve Technologies has experienced remarkable growth over an ——– period of time.",options:["expanded","acknowledged","extended","announced"],answer:2,type:"語彙問題",explanation:"空所の前が前置詞overに冠詞an、後ろがperiod of time（期間）です。period of timeと合うのは(C) extended（延長された、長期の）です。",translation:"Reeve Technologiesは驚くべき成長を長期間にわたって経験した。"},
  {id:572,q:"——– those who understand the importance of customer service will succeed in today’s consumer-driven environment.",options:["When","Only","In case","In spite of"],answer:1,type:"語彙問題",explanation:"この問題文の動詞はwill succeedと考えられます。understandはwhoで始まる関係代名詞節の中の動詞で文全体の述語動詞ではありません。したがって、will succeedの前全体が主語になると考えられ、(B) Only（だけ）が適切です。",translation:"顧客サービスの重要性を理解する人だけが、今日の消費者主導の環境で成功します。"},
  {id:573,q:"——– of Stanton Financial Group have access to an extensive range of benefits.",options:["Employment","Employs","Employing","Employees"],answer:3,type:"品詞問題",explanation:"動詞はhaveなので主語は名詞の複数形であることがわかります。主語が空所なので、ここには名詞が入り、かつ複数形の名詞は(D) Employees（従業員）だけなのでこれを選びます。",translation:"Stanton Financial Groupの従業員は、幅広い福利厚生を利用することができます。"},
  {id:574,q:"After a ——– discussion, the board has approved the proposed merger with Passage Panorama Travel.",options:["lengthen","lengthy","length","lengthily"],answer:1,type:"<strong>品詞問題</strong>",explanation:"空所の前後を見ます。空所の前が冠詞a、後ろが名詞discussion（議論）です。空所には名詞discussionを修飾する形容詞が入ると考えられ、(B) lengthy（長時間の）が適切です。",translation:"長時間の議論の後、取締役会は提案されたPassage Panorama Travelとの合併を承認しました。"},
  {id:575,q:"For the protection of our customers, their personal information will always remain ——–.",options:["confidentiality","confidential","confidentially","confidence"],answer:1,type:"<strong>品詞問題</strong>",explanation:"カンマ以降を見ていきます。主語がtheir personal information（彼らの個人情報）でwill always remain（常に～のままである）と続きます。",translation:"お客様を保護するため、お客様の個人情報は常に極秘に扱われます。"},
  {id:576,q:"We attended multiple industry conferences this year, most of ——– offered valuable networking opportunities.",options:["them","what","which","those"],answer:2,type:"関係詞・代名詞問題",explanation:"文全体の構造を確認するために、主語と動詞をチェックします。カンマ前の主語と動詞はWe attended 。空所の後ろが動詞offeredでmost of——–が主語と考えられます 。",translation:"私たちは今年、多くの業界会議に参加し、そのほとんどが貴重なネットワーキングの機会を提供してくれました。"},
  {id:577,q:"All the components of our computer systems are fully ——– at the manufacturing plant.",options:["assembled","realized","established","satisfied"],answer:0,type:"語彙問題",explanation:"空所の前がAll the components of our computer systems are fully（私たちのコンピューターシステムのすべての部品は完全に）です。「部品は組み立てられる」と考えるのが適切です。したがって(A) assembled（組み立てられた）を選びます。",translation:"私たちのコンピューターシステムの全ての部品は、製造工場で完全に組み立てられています。"},
  {id:578,q:"We are developing a sequel to our ——– movie due to high audience demand.",options:["popularly","most popularly","more popularity","most popular"],answer:3,type:"品詞または比較問題",explanation:"空所の前後を見ます。空所の前が所有格our、後ろが名詞movie（映画）。名詞movieを修飾する形容詞が空所に入ると考えられ、唯一の形容詞でかつ最上級の(D) most popular（もっとも人気のある）を選びます。",translation:"観客の高い要望により、私たちの最も人気のある映画の続編を開発しています。"},
  {id:579,q:"We ——– the annual performance review process in the staff meeting tomorrow.",options:["have been discussed","discussed","will be discussing","will have been discussed"],answer:2,type:"能動態・受動態・時制に関する動詞問題",explanation:"空所の前が主語のWeです。空所の後ろの目的語がthe annual performance review process（年次業績評価のプロセス）です。",translation:"明日のスタッフミーティングで我々は年次業績評価のプロセスを議論する予定です"},
  {id:580,q:"The candidate had ——–— the required qualifications nor the necessary work experience for the job.",options:["neither","either","not only","both"],answer:0,type:"相関接続詞問題",explanation:"空所の後ろが A nor Bの形になっています。したがってneither A nor Bと考えられ、(A) neither（どちらもない）を選びます。",translation:"その候補者は、求められる資格も必要な職務経験もどちらも持っていませんでした。"},
  {id:581,q:"To maintain a professional environment, wearing inappropriate or casual attire in our corporate workplace is ——–.",options:["to have prohibited","prohibiting","prohibited","being prohibiting"],answer:2,type:"能動態・受動態・時制に関する動詞問題",explanation:"空所の前が主語のwearing inappropriate or casual attire in our corporate workplace （当社の職場において不適切またはカジュアルな服装をすること）にbe動詞isが続きます。",translation:"職業環境を維持するため、当社の職場において不適切またはカジュアルな服装をすることは禁止されています。"},
  {id:582,q:"The finance department requires all staff to submit travel expense reports to the accounting manager ——–.",options:["prompted","promptness","prompts","promptly"],answer:3,type:"品詞問題",explanation:"to以下の空所の前はsubmit travel expense reports to the accounting manager（旅費報告書を経理マネージャーに提出する）で文として完結しています。したがって、空所には動詞submit（提出する）を修飾する副詞の(D) promptly（速やかに、すぐに）が適切です。",translation:"財務部は、全スタッフに旅費報告書を速やかに経理マネージャーに提出するよう求めている。"},
  {id:583,q:"Mr. Wang, a local artist, will be hosting ——– gallery opening in the cultural center downtown next week.",options:["he","his","himself","him"],answer:1,type:"代名詞問題",explanation:"空所の前後を見ます。空所の前が未来進行形のwill be hosting、後ろが名詞句gallery opening（ギャラリーオープニング）です。名詞句gallery openingを修飾する所有格の(B) his（彼の）が適切です。",translation:"地元のアーティストであるWangさんは、来週商業地区の文化センターでギャラリーのオープニングを開催する。"},
  {id:584,q:"——– a sharp increase in the cost of raw materials, the final price of our product has risen considerably.",options:["Owing to","Despite","Because","So that"],answer:0,type:"全文読み問題",explanation:"空所の後ろからカンマまでは名詞句で主語+動詞の形ではありません。カンマ以降は主語the final price of our product と動詞has risenが続きます。したがって、上の３のパターンになり空所には前置詞が入ることがわかります。前置詞は(A) Owing to（～のために）と(B) Despite（～にもかかわらず）の２つあるので文全体の意味を考える必要があります。",translation:"原材料コストの急上昇のため、当社製品の最終価格は大幅に上昇した。"},
  {id:585,q:"——– the marketing strategies can help reach different target audiences and increase brand awareness.",options:["Diverse","Diversity","Diversify","Diversifying"],answer:2,type:"品詞問題",explanation:"問題文の動詞はcan helpのところと考えられます。reachやincreaseも動詞ですが、help + 【動詞の原形】の中の【動詞の原形】にあたり、問題文全体の動詞ではありません。",translation:"マーケティング戦略を多様化することで、異なるターゲット層にリーチし、ブランド認知度を高めることができます。"},
  {id:586,q:"Employees ——– have worked for Mirage View Inn for over five years receive an additional week of vacation time.",options:["who","whose","which","what"],answer:0,type:"関係代名詞問題",explanation:"空所の前後を見ます。空所の前がEmployees （従業員）、後ろが現在完了のhaveに過去分詞workedが続きます。したがって、空所には先行詞Employeesは人で、後ろのhave workedをつなぐことができるのは主格の関係代名詞(A) whoが適切です。",translation:"Mirage View Innで5年以上働いている従業員は、追加で1週間の休暇時間を受け取ります。"},
  {id:587,q:"Eating a balanced diet and exercising regularly are ——– important for maintaining good health.",options:["formerly","affordably","extremely","respectfully"],answer:2,type:"語彙問題",explanation:"空所の前が、現在時制のbe動詞are、後が形容詞のimportant（重要である）です。現在時制で使われ後ろが形容詞importantと合う副詞は(C) extremely（非常に）でこれを選びます。(A) formerlyは「以前は」という意味でimportantと一緒に使われますが、現在時制と合わないので不適切です。",translation:"バランスの良い食事を摂り、定期的に運動することは、健康を維持するために非常に重要です。"},
  {id:588,q:"Understanding cultural differences can help multinational corporations better ——– consumer preferences in diverse markets.",options:["acquire","convince","influence","persuade"],answer:2,type:"語彙問題",explanation:"空所の後ろが目的語consumer preferences （顧客の好み）です。これに合うのは(C) influence（影響を与える）です。",translation:"文化の違いを理解することは、多国籍企業が多様な市場における消費者の好みに影響を与えるのに役立つ。"},
  {id:589,q:"Mr. Reid wrote his thesis based on an ——– study about the influence of advertising on consumer behavior.",options:["extend","extensively","extent","extensive"],answer:3,type:"品詞問題",explanation:"空所の前後を見ます。空所の前が冠詞an、後ろが名詞study （研究）。したがって空所には形容詞の(D) extensive（広範囲にわたる、詳細な）が適切です。",translation:"Reidさんは、広告が消費者行動に与える影響に関する広範な調査に基づいて論文を書いた。"},
  {id:590,q:"After the conference ended, the attendees went to ——– restaurants to continue their discussions over dinner.",options:["diligent","nearby","short","versatile"],answer:1,type:"語彙問題",explanation:"空所の後ろがrestaurants（レストラン）。これに合う形容詞は(B) nearby（近くの）でこれを選びます。",translation:"会議が終了した後、出席者たちは近くのレストランへ行き、夕食をとりながら議論を続けた。"},
  {id:591,q:"Despite its popularity, ——– is known about the long-term health effects of this new diet trend.",options:["few","nobody","little","several"],answer:2,type:"数量代名詞問題",explanation:"空所の直後がisなので主語にあたる空所は単数になります。選択肢の中で単数扱いは(B) nobody（誰も～ない）と(C) little（ほとんど～ない）の２つです。",translation:"その人気にもかかわらず、この新しいダイエットトレンドの長期的な健康への影響についてはほとんど知られていない。"},
  {id:592,q:"We have observed a decline in customer complaints for five ——– days since we implemented the new support system.",options:["consecutive","adverse","deliberate","enormous"],answer:0,type:"語彙問題",explanation:"空所の前がfive、後ろがdays（日）。これに合うのが、(A) consecutive（連続した）です。",translation:"新しいサポートシステムを導入して以来、5日連続で顧客からの苦情が減少していることが確認された。"},
  {id:593,q:"The infrastructure improvement projects are ——– largely by municipal bonds issued by the city.",options:["fund","funded","funding","funds"],answer:1,type:"動詞または品詞問題",explanation:"空所の前はbe動詞are、後ろが副詞largely（大部分は）に by municipal bonds（地方債によって）です。「大部分は地方債によって資金提供されている」という受動態が適切なので、過去分詞形の(B) fundedを選びます。",translation:"インフラ改善プロジェクトは、大部分は市が発行した地方債によって資金供給されている。"},
  {id:594,q:"Please submit the financial report by noon ——– we can review it before the afternoon meeting.",options:["even so","along with","in case of","so that"],answer:3,type:"部分読み問題",explanation:"空所の前は、Please submit で命令文です。空所以降はwe can review で主語+動詞の形です。これは、上の２のパターンで空所には接続詞が入ることがわかります。選択肢の中で接続詞は(D) so that（～できるように）のみでこれを選びます。",translation:"午後の会議までに確認できるよう、正午までに財務報告書を提出してください。"},
  {id:595,q:"Haswell Air Cargo has been experiencing ——– growth over the past few years thanks to its loyal customer base.",options:["steadies","steadiness","steadily","steady"],answer:3,type:"品詞問題",explanation:"空所の前後を見ます。空所の前が現在完了進行形のhas been experiencing （経験している）、後ろが名詞growth（成長）。したがって名詞growth（成長）を修飾する形容詞の(D) steady（安定した、着実な）が適切です。",translation:"過去数年にわたり、Haswell Air Cargoはその忠実な顧客基盤のおかげで安定した成長を遂げてきている"},
  {id:596,q:"Scott Moore’s ——– movie to date, \"The Last Frontier,\" still influences today’s film industry in numerous ways.",options:["popular","more popular","most popularly","most popular"],answer:3,type:"品詞または比較問題",explanation:"空所の前後を見ます。空所の前がScott Moore’s （Scott Mooreさんの）の所有格、後ろが名詞movie（映画）のto date（今まで、現在まで）です。",translation:"Scott Mooreさんのこれまでの最も人気のある映画『The Last Frontier』は、今もなお、多くの点で今日の映画業界に影響を与えている。"},
  {id:597,q:"Networking and building strong relationships are key activities that ——– small business owner should engage in.",options:["several","all","every","most"],answer:2,type:"数量形容詞問題",explanation:"空所の後ろが名詞句small business owner（中小企業のオーナー）で可算名詞の単数形です。選択肢の中で可算名詞の単数形の前につくのは(C) every（すべての）のみでこれが適切です。",translation:"ネットワーキングと強力な関係の構築は、すべての中小企業経営者が従事するべき重要な活動である。"},
  {id:598,q:"Lofgren Technologies maintains ——– standards for quality assurance to ensure customer satisfaction.",options:["spacious","anxious","accessible","rigorous"],answer:3,type:"語彙問題",explanation:"空所の前が動詞maintains（維持する）、後ろが名詞standards （基準）。「厳格な基準を維持する」とするのが適切なので、(D) rigorous（厳格な）を選びます。",translation:"Lofgren Technologiesは、顧客満足を保証するために、品質保証のための厳格な基準を維持しています。"},
  {id:599,q:"Lorene Industries has ——– launched a new product line that addresses the needs of environmentally conscious consumers.",options:["succeed","successfully","success","successful"],answer:1,type:"品詞問題",explanation:"空所の前後を見ます。空所の前が現在完了の助動詞has、後ろが動詞の過去分詞形のlaunched（売り出した）。したがって、空所には動詞launchedを修飾する副詞の(B) successfully（成功裏に、うまく）が適切です。",translation:"Lorene Industriesは、環境意識の高い消費者のニーズに対応する新しい製品ラインを成功裏に売り出した。"},
  {id:600,q:"Attention to ——– by our logistics team has significantly improved our supply chain efficiency.",options:["organize","organized","organizer","organization"],answer:3,type:"品詞または動詞問題",explanation:"空所の前がAttention to （～への注目）でtoは前置詞で、後ろに前置詞by our logistics team（たちの物流チームによる）があります。したがって、空所には名詞が入ることがわかり、選択肢の中で名詞は(C) organizer（主催者、まとめ役）と(D) organization（組織）になります。",translation:"私たちの物流チームによる組織への注目は、サプライチェーンの効率を大幅に向上させました。"},
  {id:601,q:"The newly released report ——– by the research team carefully to identify potential market trends for the upcoming fiscal year.",options:["analyzing","has analyzed","will be analyzed","analyzes"],answer:2,type:"動詞問題",explanation:"この文の主語はThe newly released report（新しく公開された報告書）であり、空所には動詞が必要なことがわかります。主語と動詞の関係を考えると、「The newly released report（新しく公開された報告書）」が「分析される(be analyzed)」という受動態の関係が適切です。受動態の選択肢は(C) will be analyzedのみでこれを選びます。",translation:"新しく公開された報告書は、来年度の潜在的な市場のトレンドを特定するために、研究チームによって慎重に分析される予定である。"},
  {id:602,q:"GigaCore’s new product is considered to be the most ——– in the market.",options:["innovative","congested","reluctant","fluent"],answer:0,type:"語彙問題",explanation:"「市場で最も～な」という文脈から、GigaCoreの新製品のどのような特性が評価されているかを示す形容詞を選ぶ必要があります。",translation:"GigaCoreの新製品は、市場で最も革新的と見なされています。"},
  {id:603,q:"Dr. Mitchell managed to publish her research paper even though ——– had faced numerous challenges during her experiments.",options:["her","herself","she","hers"],answer:2,type:"代名詞問題",explanation:"空所の前後を考えると、空所の前はeven thoughという接続詞、後ろは動詞のhad faced と目的語numerous challengesが続いています。このため、空所には動詞had facedの主語が必要です。主語になれるのは、(A) her（彼女の）、(B) herself（彼女自身）、(C) she（彼女は）、(D) hers（彼女のもの）の中で、主格の(C) she（彼女は）と所有代名詞の(D) hers（彼女のもの）です。",translation:"Mitchell博士は、彼女の実験中に数多くの課題に直面していたにも関わらず、彼女の研究論文を出版することができました。"},
  {id:604,q:"There will be a reserved seating area for all ——– attending the mayor’s press conference.",options:["journalism","journalistic","journalists","journal"],answer:2,type:"品詞問題",explanation:"空所の前後を見ます。空所の前が形容詞のall、後ろは動詞の現在分詞形attending。したがって、空所には何らかの主語、具体的には市長の記者会見に出席するのかを示す人に関する名詞が必要です。選択肢の中で、「記者会見に出席する人々」を指すのは、(C) journalists（記者たち）です。",translation:"市長の記者会見に出席するすべての記者のための指定席エリアが設けられます。"},
  {id:605,q:"——– enter the contest, participants must complete the online registration form by Friday.",options:["In order to","Despite","If only","Even though"],answer:0,type:"部分読み問題",explanation:"空所の後ろの動詞\"enter\"は原形で、動詞の原形の前におけるのは(A) In order to（～するために）だけです。よって、このフレーズを選択します。",translation:"コンテストに参加するために、参加者は金曜日までにオンライン登録フォームに記入しなければならない。"},
  {id:606,q:"Products ——– outside our official stores may not be eligible for warranty services.",options:["purchase","purchaser","purchased","purchasing"],answer:2,type:"品詞または動詞問題",explanation:"空所の前にはProductsが来ており、後ろにはoutside our official storesが続いています。その後に助動詞と動詞のmay not beが続きます。mayの前が主語と考えられ、Productsとoutside our official storesをつなぐ過去分詞形の(C) purchased（購入された：過去分詞形）が適切です。",translation:"公式の店舗以外で購入された製品は、保証サービスの対象とならない場合があります。"},
  {id:607,q:"My colleagues, who were attending a conference overseas, ——– this morning and shared their insights.",options:["arrive","arrived","arriving","to arrive"],answer:1,type:"動詞問題",explanation:"主語は\"My colleagues\"です。動詞\"shared\"は過去形で、\"this morning\"という過去を指す時間表現があるので、空所の動詞も過去形であることがわかります。したがって、(B) arrived（到着した）が適切です。",translation:"私の同僚たちは、海外の会議に参加していたが、今朝到着し、彼らの洞察を共有した。"},
  {id:608,q:"As the lead designer ——– for product development, Maria plays a crucial role at Tac System Solutions.",options:["responsibility","responsibilities","responsible","responsibly"],answer:2,type:"品詞問題",explanation:"Asは接続詞、前置詞がありますが、カンマまでに選択肢を含めて動詞がないので前置詞as（～として）と考えられます。",translation:"製品開発の責任がある主席設計者として、MariaはTac System Solutionsで重要な役割を果たしています。"},
  {id:609,q:"Mr. Martinez is ——– that his proposal will be approved in the next board meeting.",options:["obvious","tender","confident","accustomed"],answer:2,type:"語彙問題",explanation:"空所の前には\"Mr. Martinez is\"、後ろには\"that his proposal will be approved in the next board meeting（彼の提案が次の取締役会で承認される）\"という節が続きます。「Martinezさんは彼の提案が次の取締役会で承認されることに自信がある」とするのが適切です。したがって(C) confident（自信がある）を選びます。",translation:"Martinezさんは、彼の提案が次の取締役会で承認されることに自信を持っています。"},
  {id:610,q:"We are launching a new training program ——– employee skills need improvement.",options:["consequently","despite","because","therefore"],answer:2,type:"語彙問題",explanation:"空所の前は \"We are launching\" という文があり、空所の後は \"employee skills need improvement\" という主語+動詞の形が続いています。この文の形は上記の2に該当し、空所には接続詞が入ることがわかります。",translation:"従業員のスキルに改善の必要があるため、新しいトレーニングプログラムを開始しています。"},
