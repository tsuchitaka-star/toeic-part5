  {id:1025,q:"Based on the job requirements, the ——– candidate should possess strong problem-solving and analytical skills.",options:["ideal","constant","deep","intensive"],answer:0,type:"語彙問題",explanation:"空所の後ろの名詞candidate（候補者）と合う形容詞は(A) ideal（理想的な）です。",translation:"職務要件に基づき、理想的な候補者は強力な問題解決能力と分析力を持っているべきです。"},
  {id:1026,q:"Mr. Patel finds the innovative design and functionality of the latest smartphones quite ——–.",options:["appealed","appealing","appealingly","appeal"],answer:1,type:"<strong>品詞問題</strong>",explanation:"問題文中の動詞finds（findの三人称単数現在形）は第5文型SVOCの文型をとることがあります。SVOCとは「SはOがCであるとわかる」という文型です。この問題では、主語SがMr. Patel、動詞Vがfinds、目的語Oがthe innovative design and functionality of the latest smartphonesなので、補語Cにあたる形容詞の(B) appealing （魅力的な）を選びます。",translation:"Patelさんは、最新のスマートフォンの革新的なデザインと機能を非常に魅力的だと感じています。"},
  {id:1027,q:"Ms. Kim announced ——– plans to expand the business into new international markets.",options:["she","her","hers","herself"],answer:1,type:"代名詞問題",explanation:"空所の前後を見ます。空所の前が動詞announced（発表した）、空所の後ろが名詞plans（計画）なので、名詞plans（計画）を修飾する所有格(B) her（彼女の）が適切です。",translation:"Kimさんは、ビジネスを新しい国際市場に拡大する計画を発表しました。"},
  {id:1028,q:"The team’s positive response to the new project plan was ——– encouraging for management.",options:["well","freely","near","very"],answer:3,type:"<strong>語彙問題</strong>",explanation:"空所の前後を確認していきましょう。空所の前がwas、後ろが形容詞encouraging（励みになる）です。選択肢の中でencouragingに合う副詞は(D) very（非常に）です。これにより、「チームの前向きな反応は経営陣にとって非常に励みになった」という文が完成します。",translation:"新しいプロジェクト計画に対するチームの前向きな反応は、経営陣にとって非常に励みになりました。"},
  {id:1029,q:"The Sunstone Legacy Museum ——– its operating hours during the summer to accommodate more visitors.",options:["extensions","extending","extends","extendable"],answer:2,type:"品詞または動詞問題",explanation:"問題文の動詞を探すと、動詞（述語動詞）がないことがわかります。したがって空所には動詞が入り、(C) extends（延長する）を選びます。",translation:"Sunstone Legacy Museumは、より多くの訪問者に対応するため、夏季の営業時間を延長します。"},
  {id:1030,q:"Our customer service team resolves issues more efficiently than a ——– call center.",options:["dominant","typical","relevant","potential"],answer:1,type:"語彙問題",explanation:"まず空所の前後を見ます。空所の前がa、空所の後ろがcall center（コールセンター）です。",translation:"当社のカスタマーサービスチームは、典型的なコールセンターよりも効率的に問題を解決します。"},
  {id:1031,q:"Employee feedback was collected ——– the suggestion box located in the cafeteria.",options:["among","onto","inside","toward"],answer:2,type:"<strong>語彙問題</strong>",explanation:"空所の前は受動態のEmployee feedback was collected(従業員のフィードバックは集められました)で、空所の後ろがthe suggestion box（提案箱）です。この文脈から、空所には「提案箱の中に」という場所を表す前置詞が入ると考えられます。 選択肢の中で、(C) inside（~の内部に）が適切です。",translation:"従業員のフィードバックは、カフェテリアにある提案箱の中に集められました。"},
  {id:1032,q:"To expand operations, Aurora Wave Electronics posted job ——– for engineers and project managers.",options:["open","openings","opened","opens"],answer:1,type:"<strong>品詞または動詞問題</strong>",explanation:"空所の前が動詞posted（掲載した）にjob（仕事）が続きます。後ろはfor engineers and project managers（エンジニアとプロジェクトマネージャーのための）があるので、(B) openings(空き)を選び、job openings（求人）とすると意味が通ります。",translation:"事業を拡大するために、Aurora Wave Electronicsはエンジニアとプロジェクトマネージャーの求人情報を掲載しました。"},
  {id:1033,q:"——– the safety inspection is complete, the facility will resume normal operations immediately.",options:["Then","Next","Soon","Once"],answer:3,type:"<strong>接続詞・副詞問題</strong>",explanation:"immediately.",translation:"安全点検が完了したら、施設はすぐに通常業務を再開します。"},
  {id:1034,q:"The warehouse adopted a new inventory process to manage stock levels more ——–.",options:["recently","efficiently","totally","shortly"],answer:1,type:"<strong>語彙問題</strong>",explanation:"空所の前にmanage stock levels（在庫レベルを管理する）があります。これに合う副詞は(B) efficiently（効率的に）です。",translation:"倉庫は、在庫レベルをより効率的に管理するために、新しい在庫プロセスを採用しました。"},
  {id:1035,q:"The user manual for the new coffee maker includes ——– information on cleaning and maintenance procedures.",options:["every","several","each","complete"],answer:3,type:"<strong>数量形容詞または語彙問題</strong>",explanation:"空所の後ろが不可算名詞information（情報）です。選択肢の中で不可算名詞の前にくるのは(D) complete（完全な、徹底的な）のみで、これを選びます。",translation:"新しいコーヒーメーカーのユーザーマニュアルには、清掃とメンテナンス手順に関する完全な情報が含まれています。"},
  {id:1036,q:"Employees are required to ——– their expense reports and supporting documents monthly.",options:["announce","conduct","file","transform"],answer:2,type:"<strong>語彙問題</strong>",explanation:"空所の前は受動態の Employees are required to ～（従業員は～する必要がある）となっており、空所の後ろが their expense reports and supporting documents（費用報告書と関連書類）です。 この文脈から、従業員に求められる行為は「費用報告書と関連書類を提出する」ことだと考えられます。 そのため、選択肢の中で(C) file（提出する）が適切です。",translation:"従業員は、経費報告書と 関連書類を毎月提出する必要があります。"},
  {id:1037,q:"The application ——– that candidates have a valid driver’s license does not apply to this position.",options:["require","requires","required","requirement"],answer:3,type:"品詞または動詞問題",explanation:"この問題文中に動詞はhaveとdoes not applyがありますが、haveはthatの後に主語と動詞、目的語が続くのでthat節の中の動詞と考えられます。",translation:"候補者が有効な運転免許を持っている必要があるという申請の必要条件は、このポジションには適用されません。"},
  {id:1038,q:"The community events hosted by Spice of Life Groceries tend ——– well-attended and impactful.",options:["are","to be","are being","having been"],answer:1,type:"<strong>動詞問題</strong>",explanation:"問題文の動詞はtend（～する傾向がある）です。tendの後ろには通常to不定詞がきます。したがって空所には(B) to beを選びます。後ろのwell-attended and impactful（参加者が多く、影響力がある）とも問題なくつながります。",translation:"Spice of Life Groceriesが主催するコミュニティイベントは、参加者が多く、影響力がある傾向があります。"},
  {id:1039,q:"Ariana Brooks led the regional ——– on tourism, aiming to boost local economies.",options:["committee","proposal","prescription","introduction"],answer:0,type:"語彙問題",explanation:"空所の前はled the regional（地域の～を率いた）で、後ろにはon tourism（観光に関する）と続いています。選択肢(A) committee（委員会）を入れると、「観光に関する地域委員会を率いた（led the regional committee on tourism）となって意味が通ります。したがって、(A) committee（委員会）を選びます。",translation:"Ariana Brooksさんは、地域の観光委員会を率いており、地元経済の活性化を目指しています。"},
  {id:1040,q:"The legal department was ——– informed about the new regulations affecting our operations.",options:["overwhelmingly","promptly","busily","currently"],answer:1,type:"<strong>語彙問題</strong>",explanation:"空所の前はbe動詞のwas、後ろはinformed about（～について知らされた）です。was … informed about（～について知らされた）を修飾する適切な副詞は(B) promptly（すぐに、速やかに）です。",translation:"法務部は、事業に影響を与える新しい規制についてすぐに通知されました。"},
  {id:1041,q:"In the field of sustainable architecture, Kenji Fujimoto is ——– regarded for his eco-friendly designs.",options:["wide","wider","widest","widely"],answer:3,type:"<strong>品詞問題</strong>",explanation:"空所の前に is という be動詞があり、後に regarded（見なされる）という過去分詞が来ていることから、空所には副詞が適切です。選択肢の中で副詞は (D) widely（広く）のみなので、これを選びます。",translation:"持続可能な建築の分野でKenji Fujimoto さんは、環境に優しいデザインで広く知られています。"},
  {id:1042,q:"The workshop’s success depends on having ——– time for hands-on activities.",options:["entire","sufficient","thorough","liberal"],answer:1,type:"<strong>語彙問題</strong>",explanation:"time（時間）という名詞と最も自然に共起する形容詞を選択肢から見つける必要があります。workshop（ワークショップ）の成功はこの時間に左右されることから、この文脈に合った時間です。",translation:"ワークショップの成功は、実践的な活動のための十分な時間を確保できるかどうかにかかっています。"},
  {id:1043,q:"Results from a recent ——– show a significant rise in online shopping among older adults.",options:["collection","supply","survey","cuisine"],answer:2,type:"<strong>語彙問題</strong>",explanation:"空所のある文の意味は「最近の～の結果は、高齢者のオンラインショッピングの著しい増加を示している」です。これに合うのは(C) survey（調査）です。",translation:"最近の調査の結果、高齢者のオンラインショッピングが大幅に増加していることがわかりました。"},
  {id:1044,q:"Mr. Tran conducted the advanced workshop ——–, sharing invaluable expertise.",options:["his","himself","him","he"],answer:1,type:"<strong>代名詞問題</strong>",explanation:"空所の前の Mr. Tran conducted the advanced workshop（Tranさんは上級ワークショップを実施しました）で文として完結しています。したがって、空所には「Tranさん自身がワークショップを実施した」ことを強調する再帰代名詞が適切なので、(B) himself（彼自身で）を選びます。",translation:"Tranさんは、貴重な専門知識を共有しながら、上級ワークショップを自ら実施しました。"},
  {id:1045,q:"Zain Ahmed’s excellent communication abilities and attention to detail make him a great ——– to the project.",options:["opportunity","order","application","asset"],answer:3,type:"<strong>語彙問題</strong>",explanation:"「Zain Ahmedさんの優れたコミュニケーション能力と細部への注意力が彼をプロジェクトにとって素晴らしい～にしている」と述べています。この文脈を考慮すると、プロジェクトにとって価値のある存在や貢献者を指す言葉が適切です。この意味で適切なのは、(D) asset（貴重な人材、資産）です。",translation:"Zain Ahmedさんの優れたコミュニケーション能力と細部への注意力は、彼をプロジェクトにとって大きな財産としています。"},
  {id:1046,q:"The prices of essential commodities have risen ——– over the past few years.",options:["progressive","progress","progressing","progressively"],answer:3,type:"品詞問題",explanation:"空所の前に 主語+動詞のThe prices of essential commodities have risen（必需品の価格は上昇してきた）があり、後に over the past few years（過去数年間で）という期間を表す語句があって文として完結しています。したがって、空所には動詞have risen（上昇してきた）を修飾する副詞が適切です。選択肢の中で副詞は(D) progressively（徐々に）のみなので、これを選びます。",translation:"必需品の価格は過去数年間で徐々に上昇しています。"},
  {id:1047,q:"Through strategic partnerships, we have managed to acquire raw materials ——– less than the market value.",options:["tightly","enough","substantially","only"],answer:2,type:"<strong>語彙問題</strong>",explanation:"空所のある文の意味は「私たちは市場価値よりも～低い価格で原材料を調達することができました」です。これに合うのは(C) substantially（大幅に、かなり）です。",translation:"戦略的パートナーシップを通じて、私たちは市場価値よりも大幅に低い価格で原材料を調達することができました。"},
  {id:1048,q:"Sapphire Sea Foods is considering investing in sustainable fishing practices ——– it impacts short-term profitability.",options:["even if","in spite of","along with","except for"],answer:0,type:"<strong>接続詞・前置詞問題</strong>",explanation:"空所の前が”Sapphire Sea Foods is considering”で主語+動詞、空所の後ろは \"it impacts\" という主語+動詞の形です。この構文は先に示した２のパターンに該当し、空所には接続詞が入ることがわかります。選択肢の中で接続詞は、(A) even if（たとえ～だとしても）のみです。したがって、(A) even if（たとえ～だとしても）を選びます。",translation:"Sapphire Sea Foodsは、短期的な収益性に影響を与えるとしても、持続可能な漁業慣行に投資することを検討しています。"},
  {id:1049,q:"A new wellness ——– to support employees was initiated at Crystal Lake Healthcare.",options:["character","program","definition","question"],answer:1,type:"語彙問題",explanation:"「従業員を支援するための新しいウェルネス～が開始されました」という文から、従業員のウェルネスをサポートする具体的な取り組みや計画であるべきです。",translation:"Crystal Lake Healthcareでは、従業員を支援するための新しいウェルネスプログラムが開始されました。"},
  {id:1050,q:"Sunrise Technology Institute offers a discount on the ——– fee for early applicants.",options:["enrollment","enroll","enrolled","enrolls"],answer:0,type:"<strong>品詞または動詞問題</strong>",explanation:"空所の前に the という冠詞があり、後に fee（料金）という名詞が続きます。この場合、通常形容詞が空所に入りますが、【名詞】+【名詞】で複合名詞になることがあります。",translation:"Sunrise Technology Instituteは、早期申込者に対して入学金の割引を提供しています。"},
  {id:1051,q:"Visitors are required to show identification when ——– the premises for security reasons.",options:["enters","entering","enter","entered"],answer:1,type:"<strong>動詞問題</strong>",explanation:"空所の前が接続詞のwhenで、空所の後ろが名詞句the premises（敷地）で目的語と考えられます。接続詞の後は通常、主語と動詞が続くので、主語がない動詞の形の(A) enters、(C) enter、 (D) enteredは不適切です。現在分詞形の(B) entering（入っている）が残ります。",translation:"訪問者は、セキュリティ上の理由から敷地内に入る際には、身分証明書の提示を求められます。"},
  {id:1052,q:"Before deciding to purchase ——– a new supplier, we thoroughly assess their quality and reliability.",options:["to","along","from","out"],answer:2,type:"<strong>語彙問題</strong>",explanation:"空所の後ろがa new supplier（新しい供給者）です。purchase（購入する）とsupplier（供給者）の関係は、購入するという行為の対象が供給者なので、「purchase from a supplier（供給者から購入する）」という表現が適切です。",translation:"新しい供給者から購入することを決定する前に、私たちは品質と信頼性を徹底的に評価します。"},
  {id:1053,q:"Employees at Jade Mountain Foods ——– receive comprehensive training to provide excellent customer service.",options:["general","generalize","generalized","generally"],answer:3,type:"<strong>品詞問題</strong>",explanation:"空所の前後を見ます。空所の前が名詞句で主語のEmployees at Jade Mountain Foods、後ろが動詞のreceive（受ける）。したがって、空所には動詞receiveを修飾する副詞の(D) generally（一般的に）が適切です。",translation:"Jade Mountain Foodsの従業員は一般的に、優れた顧客サービスを提供するための包括的なトレーニングを受けています。"},
  {id:1054,q:"All necessary documents have been compiled in this folder ——– convenience.",options:["by its","with some","for your","above all"],answer:2,type:"<strong>複合語彙問題</strong>",explanation:"空所の後ろがconvenience（便宜、都合）です。convenienceと結びつく選択肢は(C) for yourです。for your convenience（あなたの便宜のために）という意味になります。",translation:"すべての必要な書類は、あなたの便宜のためにこのフォルダにまとめられています。"},
  {id:1055,q:"The marketing manager, Ms. Wang, is finalizing the ——– of the promotional campaign.",options:["specific","specifically","specifies","specifics"],answer:3,type:"<strong>品詞問題</strong>",explanation:"空所の前がtheで、後ろが前置詞ofです。theとofの間に名詞が入ることがわかります。選択肢の中で名詞は(D) specifics（詳細：通常は複数形のspecificsで「詳細」という意味になります）と(A) specific（特効薬、特殊なもの）があります。",translation:"マーケティングマネージャーのWangさんは、プロモーションキャンペーンの詳細を最終決定しています。"},
  {id:1056,q:"The Pine Hill Arts School is ——– ranked for its exceptional visual arts program.",options:["rapidly","lightly","highly","shortly"],answer:2,type:"<strong>語彙問題</strong>",explanation:"空所の後ろがranked for its exceptional visual arts program（その優れた視覚芸術プログラムで評価されています）です。ranked（評価されている）と共に使われる (C) highly（高く）が適切です。",translation:"Pine Hill Arts Schoolは、その優れた視覚芸術プログラムで高く評価されています。"},
  {id:1057,q:"Scarlett Wilson informed her colleagues that she will be away ——– vacation for the next two weeks.",options:["from","of","on","in"],answer:2,type:"<strong>語彙問題</strong>",explanation:"空所の前がwill be away（不在になる）、後ろがvacation（休暇）です。「休暇で不在になる」とすると意味が通るので、(C) onを選びます。",translation:"Scarlett Wilsonさんは、同僚に次の2週間休暇で不在になると伝えました。"},
  {id:1058,q:"The timely completion of Mr. Ivanov’s ambitious project timeline is ——– due to the supply chain disruptions.",options:["doubt","doubtful","doubtfully","doubting"],answer:1,type:"<strong>品詞問題</strong>",explanation:"空所の前後を見ます。空所の前にはbe動詞is、後ろには前置詞due toとなっています。この形になると、形容詞が空所に入るのが自然です。選択肢の中で形容詞は(B)doubtful（疑わしい）です。",translation:"Ivanovさんの野心的なプロジェクトの予定通りの完了は、サプライチェーンの混乱により疑わしい。"},
  {id:1059,q:"Attendees of the ——– workshop at Xenon Light Studios receive a discount on equipment.",options:["introduce","introduces","introductions","introductory"],answer:3,type:"<strong>品詞問題</strong>",explanation:"空所の前後を見ます。空所の前が冠詞the、後ろが名詞のworkshop（ワークショップ）。したがって空所には名詞workshopを修飾する形容詞の(D) introductory（入門用の、紹介の）が適切です。",translation:"Xenon Light Studiosの入門ワークショップの参加者は、機材の割引を受けられます。"},
  {id:1060,q:"The Bright Horizon Committee offers free counseling services every afternoon, ——– Monday, to support local youth.",options:["than","except","other","some"],answer:1,type:"<strong>複合語彙問題</strong>",explanation:"空所の前がevery afternoon（毎午後）、後ろがMonday（月曜日）です。この前後をつなぐ適切な選択肢は前置詞の(B) except（～を除いて）です。",translation:"Bright Horizon Committeeは、地域の若者を支援するために、月曜日を除く毎午後、無料カウンセリングサービスを提供しています。"},
  {id:1061,q:"Reading legal documents ——– can help ensure that all terms are understood clearly by all parties.",options:["throughout","aloud","meanwhile","significantly"],answer:1,type:"<strong>語彙問題</strong>",explanation:"空所の後に動詞の\"can help\"（役立つことができる）があり、その対象が\"Reading legal documents\"（法的文書を読むこと）であることから、どのように読むかを示す副詞が求められています。選択肢から、(B) aloud（声に出して）が適しています。",translation:"法的文書を声に出して読むことは、すべての条項がすべての関係者によって明確に理解されることを確実にするのに役立ちます。"},
  {id:1062,q:"——– her article was published, Aiko Yamada has been invited to speak at numerous conferences.",options:["During","While","Since","Although"],answer:2,type:"<strong>接続詞・前置詞・副詞問題</strong>",explanation:"空所の後がher article was publishedで主語+動詞の形、カンマ以降がAiko Yamada has been invitedで主語+動詞の形です。これは上の１のパターンで、接続詞が必要です。接続詞は、(B) While（～の間）、(C) Since（～以来、～なので）、(D) Although（～だけれども）の3つありますので、文全体の意味を考える必要があります。",translation:"Aiko Yamadaさんは、記事が発表されて以来、数多くの会議で講演に招待されています。"},
  {id:1063,q:"As the project manager, Yuto Nakajima efficiently ——– the coordination of multiple teams.",options:["handles","reflects","trains","concerns"],answer:0,type:"<strong>語彙問題</strong>",explanation:"空所の前後を見て、「複数のチームの調整を効率的に～する」という文脈がわかります。そのアクションとして適しているのが、(A) handles（handle「処理する、担当する」の三人称単数現在形）です。",translation:"プロジェクトマネージャーとして、Yuto Nakajimaさんは複数のチームの調整を効率的に処理します。"},
  {id:1064,q:"The Riverside Art Fair was ——– well planned that it attracted media attention from across the country.",options:["as","such","so","just"],answer:2,type:"<strong>複合語彙問題</strong>",explanation:"空所の前がbe動詞was、後ろがwell planned（よく計画された）という形容詞句、これにthat it attracted …（～なので、…を魅了した）というthat節が続いています。これは so ～ that構文で、空所には程度を表す副詞の(C) so（とても）が入ります。",translation:"Riverside Art Fairはとてもよく計画されていたため、全国からメディアの注目を集めました。"},
  {id:1065,q:"Crystal Valley Entertainment encourages patrons to provide feedback on their ——– for future events.",options:["prefers","preferring","preferential","preferences"],answer:3,type:"<strong>品詞問題</strong>",explanation:"空所の前後を見ます。空所の前にはtheir（彼らの）という所有代名詞があり、後ろには前置詞forが続いています。この形になると、空所には名詞が入ることがわかります。選択肢の中で名詞は、(D) preferences（好み、選好）でこれを選びます。",translation:"Crystal Valley Entertainmentは、将来のイベントのために顧客に好みについてのフィードバックを提供するよう奨励しています。"},
  {id:1066,q:"Fukuoka’s culinary festival, sponsored by our company, gained positive ——– across the region.",options:["campaign","publicity","association","authorization"],answer:1,type:"<strong>語彙問題</strong>",explanation:"空所の前の動詞gained（獲得した）があり、その目的語がpositive …（肯定的な）になります。空所に入る単語は「肯定的な〇〇」を「獲得した」に合う名詞が必要です。この文脈で適切なのは(B) publicity（宣伝、公表）です。",translation:"当社が後援した福岡の料理フェスティバルは、地域全体で好評を博しました。"},
  {id:1067,q:"All employees at Pyxis Tech Solutions are required to complete their training ——– next Wednesday.",options:["in","of","by","as"],answer:2,type:"<strong>語彙問題</strong>",explanation:"空所の前がcomplete their training（トレーニングを完了する）、後ろがnext Wednesday（次の水曜日）です。この２つをつなぐ適切な前置詞は、(C) by （～までに）です。",translation:"Pyxis Tech Solutionsのすべての従業員は、次の水曜日までにトレーニングを完了する必要があります。"},
  {id:1068,q:"The artisans at Willow Forest Crafts are experts at utilizing ——– to blend tradition with innovation.",options:["expenses","purposes","resources","salaries"],answer:2,type:"<strong>語彙問題</strong>",explanation:"「Willow Forest Craftsの職人たちは、伝統と革新を融合させるために……を活用する専門家です」という文から、職人たちが活用するものが何かを考えます。",translation:"Willow Forest Craftsの職人たちは、伝統と革新を融合させるために資源を活用する専門家です。"},
  {id:1069,q:"In the annual review, ——– pleased stakeholders about Echo River Logistics was the significant revenue growth.",options:["who","that","this","what"],answer:3,type:"代名詞・関係詞問題",explanation:"問題文の動詞はwasでその前が主語でかつ単数と考えられます。pleased stakeholders about Echo Riverの前において主語にできるのは関係代名詞(D) what（～すること）です。",translation:"年次レビューでは、Echo River Logisticsについて利害関係者を喜ばせたことは、大幅な収益の伸びでした。"},
  {id:1070,q:"Lucas Brown’s ——– speech at the conference inspired the audience to take action on the important issue.",options:["persuade","persuasive","persuasively","persuades"],answer:1,type:"<strong>品詞問題</strong>",explanation:"空所の前には所有格 \"Lucas Brown’s\" があり、後ろには名詞 \"speech\" が続いています。この文構造から、形容詞が空所に適切です。よって、形容詞の(B) persuasive（説得力のある）が正解となります。",translation:"Lucas Brownの会議での説得力のあるスピーチは、聴衆に重要な問題に対して行動を起こすよう促しました。"},
  {id:1071,q:"Tickets for the new exhibition at the Twilight Horizon Museum must be purchased ——– two weeks.",options:["among","within","besides","except"],answer:1,type:"<strong>語彙問題</strong>",explanation:"空所の前がmust be purchased（購入しなければならない）、後ろがtwo weeks（2週間）です。これをうまくつなぐ前置詞は(B) within（～以内に）です。",translation:"Twilight Horizon Museumの新しい展示会のチケットは、2週間以内に購入する必要があります。"},
  {id:1072,q:"The tourists will travel ——– to the historic landmark, skipping the optional museum visit due to time constraints.",options:["directions","directing","director","directly"],answer:3,type:"<strong>品詞問題</strong>",explanation:"空所の前には動詞will travel（旅行する）があり、空所の後に前置詞toが続いています。この形になると、空所には動詞will travelを修飾する副詞が適切です。選択肢の中で副詞は(D) directly（直接に）で、これを選びます。",translation:"観光客は時間の制約のため、オプションの美術館訪問をスキップして、史跡に直接行きます。"},
  {id:1073,q:"The downtown branch of our bank was ——– for renovations to enhance customer service facilities.",options:["close","closes","closed","closings"],answer:2,type:"<strong>品詞または動詞問題</strong>",explanation:"The downtown branch of our bank was ——– for renovationsに注目します。ここでは、the downtown branch of our bank（私たちの銀行の市街地支店）とfor renovations（改装のために）をつなぐものが必要です。選択肢の中で適切なのは、動詞の過去形(C) closed（閉鎖された）です。",translation:"私たちの銀行の市街地支店は、顧客サービス施設を強化するための改装のために閉鎖されました。"},
  {id:1074,q:"Membership benefits at Mystic River Playhouse become effective immediately ——– the beginning of the subscription period.",options:["between","after","up","for"],answer:1,type:"語彙問題",explanation:"空所の前に「become effective immediately（すぐに有効になる）」、その後ろに「the beginning of the subscription period（購読機関の開始）」という表現があります。会員特典が有効になるのは、購読期間が始まってからなので、(B) after（～の後）が適切です。",translation:"Mystic River Playhouseの会員特典は、購読期間の開始後すぐに有効になります。"},
  {id:1075,q:"Mr. Singh participated in ——– professional development workshops to enhance his leadership abilities.",options:["indefinite","deliberate","compound","multiple"],answer:3,type:"<strong>語彙問題</strong>",explanation:"professional development workshops（能力開発ワークショップ）という名詞句と最も自然に共起する形容詞を選択肢から見つける必要があります。Mr. Singhが参加したのは、彼のleadership abilities（リーダーシップ能力）を向上させるためのワークショップなので、参加したワークショップの数に関係する形容詞が適切です。",translation:"Singhさんは、リーダーシップ能力を向上させるために、複数の能力開発ワークショップに参加しました。"},
  {id:1076,q:"The loyalty program is ——– to customers who make repeat purchases at our store.",options:["educated","capable","appreciative","accessible"],answer:3,type:"<strong>語彙問題</strong>",explanation:"空所の前後の意味が、「The loyalty program（ロイヤルティプログラム）は、…な「to customers（顧客に）」なので、(D) accessible（利用しやすい、アクセスしやすい）が適切です。",translation:"ロイヤルティプログラムは、当店で繰り返し購入するお客様にご利用いただけます。"},
  {id:1077,q:"For a limited time, Global Eagle Airlines offered ——– inexpensive flights to Europe.",options:["thoroughly","relatively","early","minimally"],answer:1,type:"<strong>語彙問題</strong>",explanation:"空所の前後を見ます。空所の前が動詞offered（提供した）、後ろが形容詞inexpensive（安価な）。形容詞inexpensiveと合う副詞は(B) relatively（比較的）でこれを選びます。",translation:"Global Eagle Airlinesは、期間限定でヨーロッパへの比較的安価なフライトを提供しました。"},
  {id:1078,q:"Applications ——– for the scholarship program will be reviewed by a panel of distinguished academics.",options:["submitted","submit","submits","submitting"],answer:0,type:"<strong>動詞問題</strong>",explanation:"問題文の動詞はwill be reviewed（審査される）ですでにあります。したがって、述語動詞の形の(B) submit（提出する）と(C) submits（submit「提出する」の三人称単数現在形）は間に接続詞などがないので入りません。",translation:"奨学金プログラムに提出された申請書は、著名な学者たちの審査委員会によって審査されます。"},
  {id:1079,q:"Customers are required to ——– the company of any defects in writing within 30 days of purchase.",options:["state","notify","qualify","declare"],answer:1,type:"<strong>語彙問題</strong>",explanation:"空所の後ろに目的語the company（会社）があり、その後にof any defects（欠陥）が続きます。「inform A of B」は「AにBを知らせる」という意味でよく使われる表現であることから、(B) notify（知らせる）が適切そうですが、念のため他の選択肢を確認していきます。",translation:"顧客は購入後30日以内に、書面で会社に欠陥を通知する必要があります。"},
  {id:1080,q:"The ——– decision to expand Gaia Wellness Hospital’s services has led to increased patient satisfaction.",options:["consequence","consequently","consequential","consequences"],answer:2,type:"<strong>品詞問題</strong>",explanation:"空所の前後を見ます。空所の前が冠詞The（その）、後ろが名詞decision（決定）です。したがって名詞decision（決定）を修飾する形容詞の(C) consequential（重大な、結果として生じる）が適切です。",translation:"Gaia Wellness Hospitalのサービスを拡大するという重大な決定により、患者の満足度が向上しました。"},
  {id:1081,q:"To stay competitive, Nexus Event Planning seeks new suppliers to enhance services ——– lower expenses.",options:["and","again","too","still"],answer:0,type:"<strong>複合語彙問題</strong>",explanation:"空所の前後には動詞enhance（向上させる、強化する）とlower（低くする）があり、これらをつなぐ接続詞が必要です。選択肢の中で接続詞は(A) and（～と）のみです。",translation:"競争力を維持するために、Nexus Event Planningはサービスを向上させ、経費を削減するために新しいサプライヤーを探しています。"},
  {id:1082,q:"At the Fukuoka Innovate Summit, Ms. Zhou and her colleague spoke on innovation, and ——– were highly praised.",options:["many","few","one","both"],answer:3,type:"<strong>数量代名詞問題</strong>",explanation:"空所の後ろの動詞がwereなので主語は複数になります。したがって(A) many（多くの）、(B) few （ほとんどない））、または(D) both（両方）に絞り込めます。",translation:"Fukuoka Innovate Summitで、Zhouさんと彼女の同僚はイノベーションについて講演し、両者とも高く評価されました。"},
  {id:1083,q:"Omar Hassan considers continuous learning an ——– part of professional development in our field.",options:["integration","integrally","integrate","integral"],answer:3,type:"<strong>品詞問題</strong>",explanation:"空所の前後を中心に見ていきます。空所の前が不定冠詞an、後ろが名詞part（部分）なので、空所には形容詞が入ることがわかります。選択肢の中で形容詞は、(D) integral（不可欠な、本質的な）のみです。",translation:"Omar Hassanさんは、継続的な学習を私たちの分野における専門能力開発の不可欠な一部と考えています。"},
  {id:1084,q:"After Ms. Schmidt’s sudden resignation, Crystal Peak Engineering quickly promoted an experienced manager to fill the position in her ——–.",options:["permission","purpose","concern","place"],answer:3,type:"語彙問題",explanation:"この文では、Schmidtさんの突然の辞任後に、経験豊富なマネージャーが彼女の「空所」に昇進してそのポジションを埋めたことが述べられています。in her placeとすると「彼女の代わりに」という意味になり、意味が通じます。したがって(D) place（場所、位置）を選びます。",translation:""},
  {id:1085,q:"Davis Urban Design Landscaping gave the homeowner an ——– cost for the garden renovation project.",options:["approximating","approximate","approximately","approximation"],answer:1,type:"<strong>品詞問題</strong>",explanation:"空所の前後を中心に見ていきます。空所の前が冠詞an、後ろが名詞cost（費用）なので、空所には形容詞が入ることがわかります。選択肢の中で形容詞は、(B) approximate（おおよその、概算の）のみです。",translation:"Davis Urban Design Landscapingは、住宅所有者に庭の改修プロジェクトのおおよその費用を提示しました。"},
  {id:1086,q:"As the team leader, Tran Pham is skilled at ——– the workload and priorities.",options:["completing","managing","treating","answering"],answer:1,type:"<strong>語彙問題</strong>",explanation:"空所の後ろが目的語the workload and priorities（作業負荷と優先事項）です。選択肢をざっと見て「作業負荷と優先事項」を(B) manage（管理する）が適切そうですが、念のため他の選択肢を確認していきます。",translation:"チームリーダーとして、Tran Phamさんは作業負荷と優先事項を管理することに長けています。"},
  {id:1087,q:"Incorporating the latest interactive technologies helps the Infinite Discovery Center stand ——– and provide a unique learning experience.",options:["up","by","for","out"],answer:3,type:"語彙問題",explanation:"問題文の意味は「最新のインタラクティブ技術を取り入れることで、Infinite Discovery Centerは～、ユニークな学習体験を提供することができます」となります。ここで(D) outを入れるとstand outで「目立つ、際立つ」という意味のイディオムになり、意味が通ります。したがって、(D) outを選びます。",translation:"最新のインタラクティブ技術を取り入れることで、Infinite Discovery Centerは際立ち、ユニークな学習体験を提供することができます。"},
  {id:1088,q:"At the global conference, Lumina System Solutions presented their innovative approach to ——–.",options:["sustaining","sustainable","sustainability","sustain"],answer:2,type:"<strong>品詞問題</strong>",explanation:"空所の前後を見ます。空所の前が前置詞to、後ろが何もありません。したがって空所には名詞が入ることがわかります。選択肢の中で名詞は、(C) sustainability（持続可能性）のみです。",translation:"グローバルカンファレンスで、Lumina System Solutionsは持続可能性への革新的なアプローチを発表しました。"},
  {id:1089,q:"Despite safety measures, there are still workplace accidents ——– reported in the manufacturing sector.",options:["is","are","were","being"],answer:3,type:"<strong>動詞問題</strong>",explanation:"there are 構文で、動詞（述語動詞）はareです。areと空所の間には接続詞がないので、述語動詞になれる(A) is 、(B) are、(C) wereは不適切です。 workplace accidents（職場の事故）を後ろからbeing reported（報告されている）で修飾する、(D) beingが適切です。",translation:"安全対策にもかかわらず、製造業では依然として職場での事故が報告されています。"},
  {id:1090,q:"The software developed by Vijay Reddy’s team was ——– acclaimed for its user-friendly design.",options:["criticized","criticism","critics","critically"],answer:3,type:"品詞問題",explanation:"空所の前後を見ます。空所の前がbe動詞was、後ろが形容詞または動詞の過去分詞acclaimed（絶賛された）。したがって、空所にはacclaimedを修飾する副詞の (D) critically（批判的に）が適切です。",translation:"Vijay Reddyさんのチームが開発したソフトウェアは、ユーザーフレンドリーなデザインで高く評価されました。"},
  {id:1091,q:"Horizon Edge Technologies has invested heavily in ——– mechanical parts using sustainable materials to reduce environmental impact.",options:["fabrication","fabricating","fabricates","fabricate"],answer:1,type:"<strong>品詞または動詞問題</strong>",explanation:"in以下を見ていきます。inは前置詞なので、inの後ろは名詞句（名詞のカタマリ）になります。空所の後ろが名詞句のmechanical parts using sustainable materials（持続可能な材料を使用した機械部品）です。したがって、空所にはmechanical parts using sustainable materialsを目的語にとれ、かつ前置詞の後ろにおける動名詞の(B) fabricating（製造すること）が適切です。",translation:"Horizon Edge Technologiesは、環境への影響を軽減するために、持続可能な材料を使用した機械部品の製造に多額の投資を行ってきました。"},
  {id:1092,q:"Ms. Khan presented the quarterly financial report to the executive team, ——– the results were below expectations.",options:["despite","or","but","either"],answer:2,type:"<strong>接続詞・前置詞・副詞問題</strong>",explanation:"空所の前後を見ると、空所の前がMs. Khan presented the quarterly financial report to the executive team（Khanさんは四半期財務報告書を経営陣に提出した）、後ろがthe results were below expectations（結果は期待を下回っていました）です。これら二つの文をつなぐので接続詞が適切です。選択肢の中で逆接を表す接続詞の(C) but（しかし）が適切です。",translation:"Khanさんは四半期財務報告書を経営陣に提出しましたが、結果は期待を下回っていました。"},
  {id:1093,q:"Radiant Sun Holdings expressed its intention to ——– Prisma Creative Designs for strategic integration.",options:["acquire","achieve","yield","realize"],answer:0,type:"語彙問題",explanation:"空所の後に動詞の目的語のPrisma Creative Designs（Prisma Creative Designs社）があります。これと合うのは(A) acquire（取得する、買収する）です。",translation:"Radiant Sun Holdingsは、戦略的統合のためにPrisma Creative Designsを買収する意向を表明しました。"},
  {id:1094,q:"The energy-efficient upgrades to the facility ——– for more than 15 percent of the annual operating expenses.",options:["account","accounts","accounting","accountant"],answer:0,type:"<strong>品詞または動詞問題</strong>",explanation:"この問題文中には動詞がありません。そのため、空所には動詞を入れる必要があります。選択肢の中で動詞は、(A) account（占める）と(B) accounts（accountの三人称単数現在形）の2つになります。",translation:"施設へのエネルギー効率の良いアップグレードは、年間運営費の15%以上を占めています。"},
  {id:1096,q:"During the meeting, Ms. Yamazaki asked that the terms of the agreement ——– before proceeding.",options:["had been clarified","clarifies","be clarified","clarify"],answer:2,type:"<strong>能動態・受動態・時制に関する動詞問題</strong>",explanation:"asked that節に気づくかどうかがカギになります。",translation:"会議中に、Yamazakiさんは続行する前に合意の条件を明確にするよう求めました。"},
  {id:1097,q:"Mr. Taylor’s expertise was instrumental in the ——– of the organization’s data management system.",options:["develop","developer","developed","development"],answer:3,type:"<strong>品詞問題</strong>",explanation:"空所の前後を見ます。空所の前が冠詞the、後ろが前置詞ofです。したがって、空所には名詞が入ることがわかります。選択肢の中で名詞は、(B) developer（開発者）と(D) development（開発）の2つがあります。",translation:"Taylorさんの専門知識は、組織のデータ管理システムの開発に役立ちました。"},
  {id:1098,q:"Hana Kim could have traveled abroad for the holidays but explored her local region ——–.",options:["until","besides","instead","with"],answer:2,type:"<strong>接続詞・前置詞・副詞問題</strong>",explanation:"空所の前を見ます。空所の前は、her local regionで文が完結しています。したがって、接続詞や前置詞ではなく副詞の(B) besides （その上、さらに）、または(C) instead（代わりに）が候補になります。",translation:"Hana Kimは休暇のために海外旅行に行けたはずですが、代わりに地元の地域を探検しました。"},
  {id:1099,q:"Sapphire Seafood Diner has expanded its seating to ——– accommodate larger groups and events.",options:["spaciously","comfortably","abundantly","evenly"],answer:1,type:"<strong>語彙問題</strong>",explanation:"空所の後の動詞は\"accommodate\"（収容する）で、その目的語は\"larger groups and events\"（より大きなグループとイベント）です。この文脈から、Sapphire Seafood Dinerがより大きなグループとイベントを「どのように」収容するために座席を拡張したのかを示す副詞が求められます。「快適に収容できるように」とするのが適切なので、(B) comfortably（快適に）を選びます。",translation:"Sapphire Seafood Dinerは、より大きなグループやイベントを快適に収容するために座席を拡張しました。"},
  {id:1100,q:"Since its inception, Maple Brook Appliances has ——– its promise to innovate in the home goods market.",options:["honored","relieved","linked","attracted"],answer:0,type:"語彙問題",explanation:"問題文は「創業以来、Maple Brook Appliancesは家庭用品市場で革新を起こすという約束を——–してきました」と言っています。この文脈では、適切な選択肢は(A) honored（守る、尊重する）です。なぜなら、約束を守るという表現が自然だからです。",translation:"創業以来、Maple Brook Appliancesは家庭用品市場で革新を起こすという約束を守ってきました。"},
  {id:1101,q:"Reggie Sayre was promoted to division ——– after demonstrating exceptional leadership skills.",options:["manageable","manager","managed","manage"],answer:1,type:"品詞または動詞問題",explanation:"空所の前はReggie Sayre was promoted to ～（Reggie Sayreさんは～に昇進しました）なので、to以下に昇進した役職名は入ると考えられます。(B) manager（管理者）を選ぶと、複合名詞のdivision manager（部長）になり、適切であることがわかります。",translation:"Reggie Sayreさんは、非常に優れたリーダーシップスキルを発揮した後に、部長に昇進しました。"},
  {id:1102,q:"——– tuition at Rosewood Business School is higher than average, the return on investment is substantial.",options:["Although","Due to","Despite","Moreover"],answer:0,type:"<strong>接続詞・前置詞・副詞問題</strong>",explanation:"空所の後ろの形を見ます。tuition at Rosewood Business School is …で主語+動詞の形です。カンマ以降がthe return on investment is で主語+動詞の形です。これは、上の１のパターンで空所には接続詞が入ることがわかります。選択肢の中で接続詞は(A) Although（～だけれども）のみで、これを選びます。",translation:"Rosewood Business Schoolの授業料は平均よりも高いが、投資収益率はかなりのものです。"},
  {id:1103,q:"——– tests conducted by Axion Technologies Partners show promising results for the software upgrade.",options:["Undeveloped","Subordinate","Foregone","Preliminary"],answer:3,type:"<strong>語彙問題</strong>",explanation:"空所の後ろがtests（テスト）という名詞で、これに合う形容詞を選ぶ必要があります。「Axion Technologies Partnersによって実施された予備のテストがソフトウェアアップグレードに対して有望な結果を示す」とすると全体の意味が通るので、(D) Preliminary（予備の、初期の）が適切です。",translation:"Axion Technologies Partnersによって実施された予備テストでは、ソフトウェアのアップグレードについて有望な結果が示されています。"},
  {id:1104,q:"The new tax laws will significantly affect how individuals manage ——– investments starting next year.",options:["their","them","themselves","they"],answer:0,type:"<strong>代名詞問題</strong>",explanation:"空所の前後を見ます。空所の前が動詞manage（管理する）、後ろが名詞investments（投資）になります。investmentsを修飾する所有格の(A) their（彼らの）が適切です。",translation:"新しい税法は、個人が来年から投資をどのように管理するか、大きく影響します。"},
  {id:1105,q:"GlobalTechVentures is cutting unnecessary expenditures while ——– investing in growth opportunities.",options:["especially","similarly","hourly","simultaneously"],answer:3,type:"<strong>語彙問題</strong>",explanation:"空所の前がGlobalTech Ventures is cutting unnecessary expenditures（GlobalTech Venturesは不要な支出を削減している）、空所の後ろがinvesting in growth opportunities（成長の機会に投資している）。while（～する一方で）でつなげて「GlobalTech Venturesは成長の機会に投資している一方で、同時に不要な支出を削減する」とすると意味が通るので、(D) simultaneously（同時に）を選びます。",translation:"GlobalTech Venturesは成長の機会に投資している一方で、同時に不要な支出を削減しています。"},
  {id:1106,q:"The board showed their ——– in the management team by approving the expansion plan.",options:["confident","confidence","confidently","confidential"],answer:1,type:"<strong>品詞問題</strong>",explanation:"空所の前後を見ます。空所の前が代名詞の所有格their、後ろが前置詞in。したがって空所には名詞の (B)confidence（信頼）が適切です。",translation:"取締役会は、拡張計画を承認することで、経営陣への信頼を示しました。"},
  {id:1107,q:"Ms. Floros is currently training the front desk team on a new approach to managing ——–.",options:["reserve","reserves","reserving","reservations"],answer:3,type:"<strong>品詞問題</strong>",explanation:"空所の前後を見ます。空所の前が動名詞managing（管理すること）、後ろが何もありません。したがって空所には動名詞managingの目的語となる名詞の(D) reservations（予約）が適切です。",translation:"Florosさんは現在、フロントデスクチームに予約を管理するための新しい方法についてトレーニングを行っています。"},
  {id:1108,q:"——– expanding into new markets, Ned Collier will analyze the potential risks and benefits.",options:["Among","Before","Except","Inside"],answer:1,type:"<strong>語彙問題</strong>",explanation:"空所の後ろがexpanding into new markets（新しい市場に進出すること）、カンマ以降がNed Collier will analyze the potential risks and benefits（Ned Collierさんは潜在的なリスクと利益を分析するでしょう）です。「新しい市場に進出する前に」Ned Collierが「潜在的なリスクと利益を分析する」と考えるのが適切なので、前置詞(B) Beforeを選びます。",translation:"新しい市場に拡大する前に、Ned Collierさんは潜在的なリスクと利益を分析するでしょう。"},
  {id:1109,q:"When applying for the art competition, remember to follow the specific format guidelines for ——– of the categories.",options:["whose","other","each","whichever"],answer:2,type:"<strong>複合語彙問題</strong>",explanation:"categories.",translation:"アートコンペティションに応募する際は、各カテゴリーの特定のフォーマットガイドラインに従うことを忘れないでください。"},
  {id:1110,q:"Every Monday, our team meets to ——– our objectives and ensure we are on track for success.",options:["reject","review","confer","control"],answer:1,type:"語彙問題",explanation:"この問題文では、「毎週月曜日にチームが集まって何かをする」という状況が描かれています。後半の「and ensure we are on track for success」（成功への軌道に乗っていることを確認する）から、集まる目的は、「目標を見直す」とすると意味が通ります。したがって、(B) review（見直す、再評価する）が適切です。",translation:"毎週月曜日、私たちのチームは目標を見直し、成功への道を歩んでいることを確認するために集まります。"},
  {id:1111,q:"At the annual shareholders’ meeting, Chiyo Mori mentioned ——– to triple research and development spending.",options:["planned","plans","planners","was planning"],answer:1,type:"<strong>品詞または動詞問題</strong>",explanation:"空所の前後を見ます。空所の前が動詞mentioned（述べた）の過去形、後ろが不定詞句to triple research and development spending（研究開発費を3倍にすること）です。したがって空所には動詞mentionedの目的語となる名詞が入ることがわかり、選択肢の中で名詞は (B) plans（計画［複数形］）と (C) planners（計画者［複数形］） があります。",translation:"年次株主総会で、Chiyo Moriさんは研究開発費を3倍にする計画について述べました。"},
  {id:1112,q:"To ——– several new positions, QuickRoute Cargo Systems is hosting a job fair downtown this weekend.",options:["hire","fill","set","give"],answer:1,type:"<strong>語彙問題</strong>",explanation:"空所以降の意味は「いくつかの新しいポジションを～するために、QuickRoute Cargo Systemsはこの週末に繁華街で就職説明会を開催しています」なので、(B) fill（埋める、満たす）が適切です。",translation:"いくつかの新しいポジションを埋めるために、QuickRoute Cargo Systemsはこの週末に繁華街で就職説明会を開催しています。"},
  {id:1113,q:"——– hospitals have adopted electronic health records to improve the efficiency of patient care.",options:["Most of","Almost","Most","The most"],answer:2,type:"<strong>数量形容詞・代名詞または比較問題</strong>",explanation:"空所の後ろが可算名詞の複数形のhospitals（病院）。可算名詞の複数形の前における選択肢は、(C) Most（ほとんどの）のみとなります。",translation:"ほとんどの病院は、患者のケアの効率を向上させるために電子健康記録を採用しています。"},
  {id:1114,q:"To succeed in this industry, Ms. Zhao advises young professionals to be ——– in voicing their unique ideas.",options:["harmless","honored","expected","fearless"],answer:3,type:"<strong>語彙問題</strong>",explanation:"意味的に「この業界で成功するために、Zhaoさんは若い専門家たちに対して、自分のユニークなアイデアを恐れずに発言することを勧めている」とすると意味が通るので、(D) fearless（恐れを知らない）を選びます。",translation:"この業界で成功するために、Zhaoさんは若い専門家たちに対して、自分のユニークなアイデアを恐れずに発言することを勧めています。"},
  {id:1115,q:"In the performance review last month, Ms. Kimura ——– the factors influencing the quarter’s financial outcomes.",options:["describes","described","to describe","describing"],answer:1,type:"<strong>動詞問題</strong>",explanation:"問題文中に動詞（述語動詞）がないので、空所には述語動詞が入ります。選択肢の中で述語動詞となるのは、(A) describes（説明する）と (B) described（説明した）のみです。",translation:"先月の業績評価で、Kimura氏は四半期の財務結果に影響を与える要因を説明しました。"},
  {id:1116,q:"To be granted access to the secure area, visitors must ——– a confidentiality agreement upon arrival.",options:["make","find","see","sign"],answer:3,type:"<strong>語彙問題</strong>",explanation:"空所の後ろがa confidentiality agreement（秘密保持契約）です。「保安区域への入場を許可されるためには（To be granted access to the secure area）」、「訪問者（visitors）」は「秘密保持契約（a confidentiality agreement）」に「署名する」が適切です。したがって、(D) sign（署名する）を選びます。",translation:"保安区域への入場を許可されるためには、訪問者は到着時に秘密保持契約に署名する必要があります。"},
  {id:1117,q:"Avalon Innovative Motorworks’ Centuria electric vehicle can travel ——– on a single charge than any of its competitors.",options:["long","back","again","farther"],answer:3,type:"複合語彙問題",explanation:"空所の後方に than があることから、空所には比較級が入ることが分かります。選択肢の中で比較級は (D) farther のみです。farther は far (遠く) の比較級であり、「より遠くへ」という意味になります。空所の直前に動詞 travel (走行する)と合わせて「より遠くへ走行する」になり適切であることがわかります。したがって、 (D) farther （より遠くへ）を選びます。",translation:"Avalon Innovative Motorworks の Centuria 電気自動車は、競合他社よりも 1 回の充電でより遠くまで走行できます。"},
  {id:1118,q:"Investors showed strong interest in Mr. Reyes’s ——– to increase production capacity by 20%.",options:["supply","plan","trade","total"],answer:1,type:"語彙問題",explanation:"空所の前が、Mr. Reyes’s（Reyesさんの）、後ろがto increase production capacity by 20%（生産能力を20％向上させること）で、これに合う選択肢は(B) plan（計画）です。",translation:"投資家たちは、Reyes氏の生産能力を20％向上させるという計画に強い関心を示しました。"},
  {id:1119,q:"The workload for the project was distributed ——– among all participants to ensure fairness.",options:["even","evenly","evened","evenness"],answer:1,type:"<strong>品詞問題</strong>",explanation:"空所の前後を見ます。空所の前がbe動詞のwasと動詞の過去分詞形distributed（分配された）、後ろが前置詞amongです。したがって、空所には動詞の過去分詞形distributedを修飾する副詞の(B) evenly（均等に）が適切です。",translation:"プロジェクトの作業量は、公平性を確保するために、すべての参加者に均等に分配されました。"},
  {id:1120,q:"The Paragon Sculpture Museum celebrates the ——– of its major donors with a special recognition event each year.",options:["account","itinerary","privilege","generosity"],answer:3,type:"語彙問題",explanation:"空所の前にあるcelebrates（称える）と、後ろにあるof its major donors（主要な寄付者の）に着目すると、(D) generosity（寛大さ）が適切です。「主要な寄付者の寛大さを称える」という意味になります。",translation:"Paragon Sculpture Museumは、毎年、特別な表彰イベントで主要な寄付者の寛大さを称えています。"},
  {id:1121,q:"Employees are ——– given the option to work from home two days a week.",options:["typify","typified","typical","typically"],answer:3,type:"<strong>品詞問題</strong>",explanation:"空所の前後を見ます。空所の前がbe動詞are、後ろが動詞の過去分詞形given。したがって、空所には動詞の過去分詞形givenを修飾する副詞の(D) typically（通常は、典型的に）が適切です。",translation:"従業員は通常は週2日、自宅で勤務するオプションが与えられます。"},
  {id:1122,q:"As part of her role, Ms. Louw will ——– negotiations with key suppliers.",options:["meet","act","carry out","turn in"],answer:2,type:"<strong>語彙問題</strong>",explanation:"空所の後ろが目的語negotiations with key suppliers（主要サプライヤーとの交渉）です。この目的語を合うのは(C) carry out（実行する）です。",translation:"彼女の役割の一環として、Louwさんは主要サプライヤーとの交渉を実行します。"},
  {id:1123,q:"The storm caused significant damage to the warehouse, ——– our supply chain temporarily disrupted.",options:["will leave","leaves","have left","leaving"],answer:3,type:"<strong>動詞問題</strong>",explanation:"問題文の動詞はcausedです。接続詞などを使わない限りひとつの文に対して述語動詞はひとつになります。このルールから(A) will leave、(B) leaves、(C) have leftは前に接続詞などがないので不適切です。したがって、現在分詞形の(D)leavingが適切です。",translation:"嵐が倉庫に大きな被害をもたらし、サプライチェーンが一時的に混乱した。"},
  {id:1124,q:"A partnership with leading universities will help Citadel Quantum Designs ——– positive publicity through innovation.",options:["generate","confess","enter","transport"],answer:0,type:"<strong>語彙問題</strong>",explanation:"空所の後ろの目的語positive publicity（肯定的な評判）で、これと合うのが(A) generate（生み出す）です。",translation:"主要な大学とのパートナーシップは、Citadel Quantum Designsがイノベーションを通じて肯定的な評判を生み出すのに役立ちます。"},
  {id:1125,q:"Reimbursements for travel expenses will be processed only ——– proper receipts are submitted.",options:["yet","that","also","if"],answer:3,type:"<strong>接続詞・副詞問題</strong>",explanation:"空所の後ろ方の形を見ます。proper receipts are submittedで主語+動詞の形になっています。この形は上の２に該当し、空所には接続詞が入ることがわかります。選択肢の中で接続詞は(A) yet （接続詞：けれども 副詞：まだ）、(B) that（～すること） (D) if（もし～ならば）の３つありますので、文全体の意味を考えましょう。",translation:"適切な領収書が提出された場合にのみ、旅費の払い戻しが処理されます。"},
  {id:1126,q:"Our customer satisfaction has increased since we started employing more ——– plumbers for residential services.",options:["comfortable","experienced","completed","sudden"],answer:1,type:"<strong>語彙問題</strong>",explanation:"空所の後がplumbers（配管工）です。これと合うのは(B) experienced（経験豊富な）です。",translation:"住宅サービスのために、より経験豊富な配管工を雇い始めて以来、顧客満足度が向上しました。"},
  {id:1127,q:"New employees must ——– undergo orientation to fully understand our company culture and expectations.",options:["define","definitely","definite","definitive"],answer:1,type:"<strong>品詞問題</strong>",explanation:"空所の前後を見ます。空所の前が助動詞must、後ろが動詞undergo（受ける）。したがって、空所には動詞undergoを修飾する副詞の(B) definitely（絶対に）が適切です。",translation:"新入社員は、当社の企業文化と期待を十分に理解するために、必ずオリエンテーションを受ける必要があります。"},
  {id:1128,q:"The features offered by our software are more advanced than ——– of any other on the market.",options:["those","whose","what","which"],answer:0,type:"代名詞・関係詞問題",explanation:"are more advanced than があるので、比較文になります。比較の対象となるものは、The features offered by our software（私たちのソフトウェアが提供する機能）と than 以下になります。",translation:"私たちのソフトウェアが提供する機能は、市場の他のどのソフトウェアの機能よりも進んでいます。"},
  {id:1129,q:"Mr. Ulman would like to discuss ——– recent findings in the next department meeting.",options:["you","your","yourself","yours"],answer:1,type:"<strong>代名詞問題</strong>",explanation:"空所の前後を見ます。空所の前が動詞discuss（議論する）、後ろが名詞句のrecent findings（最近の発見、調査結果）。名詞句recent findingsの前には所有格の(B) your（あなたの）が適切です。",translation:"Ulmanさんは、次の部門会議であなたの最近の調査結果について話し合いたいと考えています。"},
  {id:1130,q:"Ms. Singh instructed the maintenance team to prioritize the conveyor belt that will ——– a repair.",options:["notify","decide","insist","require"],answer:3,type:"語彙問題",explanation:"空所の前がthe conveyer belt（コンベアベルト）に関係代名詞thatと助動詞willが続き、空所の後がa repair （修理）です。「修理が必要なコンベアベルト」とするのが適切なので、(D) require（必要とする）を選びます。",translation:""},
  {id:1131,q:"Customers ——– orders from our new location will receive a free sample of our latest product.",options:["are picking up","picked up","pick up","picking up"],answer:3,type:"<strong>動詞問題</strong>",explanation:"問題文の動詞（述語動詞）はwill receive （受け取る）と考えられます。したがって、述語動詞（本動詞）の形の(A) are picking up や(C) pick upはandなどの接続詞が手前にないので不適切です。残りの過去分詞形の(B) picked up、現在分詞形の(D) picking upが候補になります。",translation:"新しい店舗から注文を受け取るお客様は、最新の製品の無料サンプルを受け取ります。"},
  {id:1132,q:"After a thorough safety inspection, our factory was ——– permission to resume operations.",options:["exchanged","responded","performed","granted"],answer:3,type:"<strong>語彙問題</strong>",explanation:"空所の前は主語のour factoryにbe動詞wasが続き、後ろは名詞permission（許可）。主語のour factoryとpermissionをつなぐ適切な動詞は、(D) granted（grant「与える、許可する」の過去分詞形）です。",translation:"徹底的な安全検査の後、私たちの工場は操業を再開する許可を与えられました。"},
  {id:1133,q:"Ms. Garner’s strategic changes in the marketing department have shown beneficial ——– in terms of increased brand visibility.",options:["replies","effects","charges","senses"],answer:1,type:"<strong>語彙問題</strong>",explanation:"空所の前がhave shown beneficial （有益な…を示した）、後ろの動詞部分がin terms of increased brand visibility（ブランド認知度の向上という点で）。(B) effects（影響、効果）を選択すると、「ブランド認知度の向上という点で有益な効果を示した」となり自然な表現になります。したがって(B) effects（影響、効果）が適切です。",translation:"マーケティング部門におけるGarnerさんの戦略的変更は、ブランド認知度の向上という点で有益な効果を示しています。"},
  {id:1134,q:"Make sure to send the invitation emails ——– to confirm attendees for the seminar.",options:["quick","quicker","quickest","quickly"],answer:3,type:"<strong>品詞または比較問題</strong>",explanation:"空所の前後を見ます。空所の前が動詞send（送る）とその目的語のthe invitation emails（招待メール）、後ろが不定詞to confirm ～（～を確認するため）です。したがって空所には動詞sendを修飾する副詞の(D) quickly（すぐに）が適切です。",translation:"セミナーの参加者を確認するために、招待メールをすぐに送信してください。"},
  {id:1135,q:"Visitors to the facility will be ——– to wear identification badges at all times.",options:["recognized","given","required","grown"],answer:2,type:"<strong>語彙問題</strong>",explanation:"主語は、Visitors to the facility（施設への訪問者）です。動詞の部分がwill beで「～される」なので、「施設への訪問者（Visitors to the facility）」は 「識別バッジを着用すること（to wear identification badges）」を「（求められる（ will be required））とすると意味が通ります。したがって(C) required（求められた）が適切です。",translation:"施設への訪問者は、常に識別バッジを着用する必要があります。"},
  {id:1136,q:"Our survey shows that ——– using Harmon Avenue prefer public transit over personal vehicles.",options:["commuting","commute","to commute","commuters"],answer:3,type:"<strong>品詞または動詞問題</strong>",explanation:"空所の前はthat節のthat、that節内の動詞がprefer（好む）で現在形です。したがって、空所には動詞preferの主語となる名詞が入ると考えられます。",translation:"私たちの調査によると、ハーモンアベニューを利用する通勤者は、自家用車よりも公共交通機関を好むことがわかっています。"},
  {id:1137,q:"At East Haldon Bank, every candidate ——– applies for the manager position must have prior banking experience.",options:["whoever","when","who","wherever"],answer:2,type:"<strong>関係代名詞または接続詞問題</strong>",explanation:"空所の前後を見ます。空所の前が every candidate (すべての候補者)、後ろが動詞 applies for（～に応募する） 。文全体の動詞がmust haveの箇所です。したがって、先行詞が人で動詞が続くので、主格の関係代名詞(C) who が適切です。",translation:"East Haldon Bankでは、マネージャー職に応募するすべての候補者は、事前の銀行業務経験が必要です。"},
  {id:1138,q:"The latest model of the Flash GTZ is equipped ——– state-of-the-art navigation systems for enhanced driving.",options:["at","to","with","of"],answer:2,type:"<strong>語彙問題</strong>",explanation:"空所の前がis equipped （装備されている）、後ろがstate-of-the-art navigation systems（最新のナビゲーションシステム）。equip ～ with …（～に…を装備する）のequipが受動態になった文と考えられます。",translation:"Flash GTZの最新モデルには、より快適な運転のために最新のナビゲーションシステムが装備されています。"},
  {id:1139,q:"——– the customer feedback has been analyzed, changes will be made to improve user satisfaction.",options:["So that","Now that","In order that","Regarding"],answer:1,type:"接続詞・前置詞問題",explanation:"空所の後ろの形を見ます。the customer feedback has been analyzedで主語+動詞の形です。カンマ以降はchanges will be madeで主語+名詞の形です。これは、上の1のパターンで空所には接続詞が入ることがわかります。選択肢の中で接続詞は、(A) So that（～できるように）、(B) Now that（今や～なので）、(C) In order that（～が…するために）の3つです。",translation:"今や顧客からのフィードバックが分析されたので、ユーザーの満足度を向上させるために変更が行われます。"},
  {id:1140,q:"Nexus Contemporary Art Museum is ——– to host a series of workshops that explore modern artistic techniques.",options:["exciting","excited","excite","excitement"],answer:1,type:"<strong>品詞または動詞問題</strong>",explanation:"主語はNexus Contemporary Art Museumで、その後にbe動詞isが続きます。空所の後ろは不定詞to host（主催する）。be excited to do（～することに興奮する）の形から、(B) excited（形容詞：興奮した、ワクワクするいる）が適切です。",translation:"Nexus現代美術館は、現代の芸術技法を探求する一連のワークショップを開催できることに興奮しています。"},
  {id:1142,q:"Sarah Yoshida took the ——– in the customer service department and significantly improved response times.",options:["leader","lead","leading","leads"],answer:1,type:"<strong>品詞または動詞問題</strong>",explanation:"空所の前が、動詞took（取った）の過去形に冠詞theが続き、後ろが前置詞in the customer service department（顧客サービス部において）という前置詞句です。したがって、空所には名詞が入ると考えられます。",translation:"Sarah Yoshidaさんは顧客サービス部門で先導的な役割を担い、応答時間を大幅に改善しました。"},
  {id:1143,q:"To effectively manage our social media accounts, ——– with content scheduling tools is necessary.",options:["interest","instruction","familiarity","variety"],answer:2,type:"<strong>語彙問題</strong>",explanation:"空所以降を「コンテンツスケジューリングツールに精通していることが必要です」とすると意味が通るので、(C) familiarity（精通、習熟）が適切です。",translation:"ソーシャルメディアアカウントを効果的に管理するには、コンテンツスケジューリングツールに精通していることが必要です。"},
  {id:1144,q:"Customers appreciate the ——– locations of our service centers, which reduce their travel time.",options:["tolerant","uncertain","convenient","careful"],answer:2,type:"<strong>語彙問題</strong>",explanation:"空所の前が動詞appreciate（感謝する）に冠詞theが続き、後ろがlocations（場所）です。「便利な場所に感謝する」が自然な表現なので(C) convenient（便利な）を選びます。",translation:"お客様は、当社のサービスセンターの便利な場所に感謝しており、これにより、移動時間が短縮されます。"},
  {id:1145,q:"Dynamo Futuristic Motors is a ——– employer known for its commitment to employee development.",options:["respect","respects","respected","respectability"],answer:2,type:"品詞または動詞問題",explanation:"空所の前後を見ます。空所の前が冠詞a、後ろが名詞のemployer（雇用主）。したがって空所には名詞employerを修飾する形容詞の(C) respected（尊敬されている）が適切です。",translation:"Dynam Futuristic Motorsは、従業員の能力開発への取り組みで知られた尊敬されている雇用主です。"},
  {id:1146,q:"——– severe weather conditions, our logistics team managed to deliver all shipments on time.",options:["Unlike","Even though","Despite","Still"],answer:2,type:"<strong>接続詞・前置詞・副詞問題</strong>",explanation:"空所の後ろが severe weather conditions（悪天候）で名詞句、カンマ以降がour logistics team managedで主語+動詞です。これは上の３のパターンで空所には前置詞が入ることがわかります。選択肢の中で前置詞は (A) Unlike（～とは違って）と (C) Despite（～にもかかわらず）の2つがあります。複数の前置詞候補がある場合、文の意味を取る必要があります。",translation:"悪天候にもかかわらず、私たちの物流チームはすべての貨物を時間通りに配達することができました。"},
  {id:1147,q:"Lumina Design Studios won an award for the most ——– design in the annual industry competition.",options:["creatively","created","creative","create"],answer:2,type:"品詞問題",explanation:"空所の前後を見ます。空所の前が最上級the most（最も～な）、後ろが名詞design（デザイン）。したがって、空所には名詞designを修飾する形容詞の(C) creative（創造的な）が適切です。",translation:"Lumina Design Studiosは、毎年恒例の業界コンペティションで最も創造的なデザイン賞を受賞しました。"},
  {id:1148,q:"Mr. Pavlovich advised that TKEN Manufacturing should invest in ——– new technology or staff training.",options:["as","neither","both","either"],answer:3,type:"相関接続詞問題",explanation:"空所の後ろがnew technology or staff training と A or Bの形になっています。したがってeither A or Bと考えられ、(D) eitherが適切です。",translation:"Pavlovichさんは、TKEN Manufacturingは新しい技術かスタッフのトレーニングのどちらかに投資する必要があると助言しました。"},
  {id:1149,q:"The documentary directed by Saul Ortega was ——– rated for its insightful exploration of social issues.",options:["very","surely","highly","ever"],answer:2,type:"<strong>語彙問題</strong>",explanation:"選択肢がすべて副詞なので「語彙問題」と考えられます。空所の後にヒントがあります。",translation:"Saul Ortegaさんが監督したドキュメンタリーは、社会問題への洞察力に富んだ探求により高く評価されました。"},
  {id:1150,q:"The Garnet Grill provides a ——– range of catering services for events, from weddings to corporate gatherings.",options:["satisfied","dividing","hopeful","broad"],answer:3,type:"<strong>語彙問題</strong>",explanation:"空所の前がa、後ろがrange（範囲）。「幅広い範囲」とするのが適切なので、(D) broad（幅広い）を選びます。",translation:"Garnet Grillは、結婚式から企業の集まりまで、イベントのための幅広いケータリングサービスを提供しています。"},
  {id:1151,q:"During the project phase, Mr. Cornyn requires ——– updates to ensure everything runs smoothly.",options:["eligible","evident","frequent","singular"],answer:2,type:"<strong>語彙問題</strong>",explanation:"空所の前が動詞requires（要求する、必要とする）、後ろが名詞updates（更新）。「頻繁な更新（frequent updates）」を「要求する（requires）」とすると意味が通るので、(C) frequent（頻繁な）を選びます。",translation:"プロジェクト段階において、すべてが円滑に進むように、Cornynさんは頻繁な更新を要求します。"},
  {id:1152,q:"Tierra Bistro has ——–— increased its staff to handle the high volume of holiday reservations.",options:["easily","enormously","arbitrarily","temporarily"],answer:3,type:"<strong>語彙問題</strong>",explanation:"問題文の意味は「Tierra Bistroは、休日の予約の多さに対応するため、スタッフを～増員しました」です。この文脈で適切なのは、(D) temporarily（一時的に）です。",translation:"Tierra Bistroは、ホリデーシーズンの予約の多さに対応するため、スタッフを一時的に増員しました。"},
  {id:1153,q:"The new marketing campaign has been ——– successful in attracting a younger generation.",options:["amazing","amazingly","amazement","amaze"],answer:1,type:"<strong>品詞問題</strong>",explanation:"空所の前後を見ます。空所の前がbe動詞been、後ろが形容詞successful（成功した）。したがって形容詞successfulを修飾する副詞の(B) amazingly（驚くほど）が適切です。",translation:"新しいマーケティングキャンペーンは、若い世代を引き付けることに驚くほど成功しています。"},
  {id:1154,q:"All equipment should be turned off and stored securely before ——– the facility each night.",options:["leave","leaving","to leave","have left"],answer:1,type:"<strong>動詞問題</strong>",explanation:"空所の前の before は接続詞または前置詞として空所以降を前の文とつなげていると考えられます。",translation:"すべての機器は、毎晩施設を出る前に電源を切り、安全に保管する必要があります。"},
  {id:1155,q:"NanoPulse Precision Constructor requires a skilled ——– to oversee their new automated assembly line.",options:["manual","component","device","technician"],answer:3,type:"<strong>語彙問題</strong>",explanation:"空所の前がskilled（熟練した）、後ろがto oversee their new automated assembly line（新しい自動組立ラインを監督するために）なので、(D)technician（技術者）が適切です。",translation:"NanoPulse Precision Constructorは、新しい自動組立ラインを監督するために、熟練した技術者を必要としています。"},
  {id:1156,q:"With his dual degrees in engineering and business, Dr. Asif is ——– qualified to manage our technical department.",options:["earnestly","uniquely","effortlessly","approximately"],answer:1,type:"<strong>語彙問題</strong>",explanation:"選択肢がすべて-lyで終わる副詞なので「語彙問題」と考えられます。空所の後ろにヒントがあります。",translation:"工学と経営学の二重学位を持つAsif博士は、当社の技術部門を管理する上で他に類を見ない適任者である。"},
  {id:1157,q:"When designing public spaces, consider how structures might obstruct the view of ——– and adjust accordingly.",options:["those","ones","any","others"],answer:3,type:"<strong>代名詞問題</strong>",explanation:"「公共スペースを設計するときは、構造物が他人の視界をどのように妨げるかを考慮し、それに応じて調整してください」とすると意味が通ります。したがって、(D) others（他人、他のもの）を選びます。",translation:"公共スペースを設計するときは、構造物が他人の視界をどのように妨げるかを考慮し、それに応じて調整してください。"},
  {id:1158,q:"Armando Lucca was invited as a ——– guest speaker at the international business conference.",options:["delicate","periodic","distinguished","accurate"],answer:2,type:"<strong>語彙問題</strong>",explanation:"空所の前がwas invited（招待された）に冠詞aが続き、後ろが名詞句guest speaker（ゲストスピーカー）。これに一番合うのが (C) distinguished（著名な）です。",translation:"Armando Luccaさんは、国際ビジネス会議に著名なゲストスピーカーとして招待されました。"},
  {id:1159,q:"Marta Padilla received an award for ——– recent contributions to community healthcare improvements.",options:["she","her","hers","herself"],answer:1,type:"<strong>代名詞問題</strong>",explanation:"空所の前後を見ます。空所の前が前置詞for、後ろが名詞句のrecent contributions （最近の貢献）。名詞句recent contributionsの前には所有格の(B) her（彼女の）が適切です。",translation:"Marta Padillaさんは、地域医療の改善への最近の貢献に対して賞を受賞しました。"},
  {id:1160,q:"Somchai Financial Group will finalize all loan approvals ——– 3 business days of application submission.",options:["about","within","since","into"],answer:1,type:"<strong>語彙問題</strong>",explanation:"空所の前がfinalize all loan approvals（すべての貸付承認を完了する）、後ろが3 business days of application submission（申請提出後3営業日）。「申請提出から3営業日以内にすべての貸付承認を完了する」とすると意味が通るので、(B) within（～以内に）が適切です。",translation:"Somchai Financial Groupは、申請提出から3営業日以内にすべての貸付承認を完了します。"},
  {id:1161,q:"Due to high demand, Okpara Retail Group ——– the sale through the end of the month.",options:["extend","was extended","extending","has extended"],answer:3,type:"<strong>能動態・受動態・時制に関する動詞問題</strong>",explanation:"問題文全体を見ると動詞がありません。したがって、空所には動詞が必要です。空所の前が主語 Okpara Retail Group、空所の直後は目的語 the sale（セール）で、空所には能動態の動詞が入ると考えられます。",translation:"高い需要のため、Okpara Retail Groupはセールの期間を月末まで延長した。"},
  {id:1162,q:"——– fifty employees have successfully completed the advanced training program and received their certifications.",options:["While","Unless","Over","Upward"],answer:2,type:"<a><strong>接続詞・前置詞・副詞問題</strong></a>",explanation:"空所の後ろの形を見ます。空所以降は、主語fifty employees と動詞have completed … and receivedで文が完結しています。空所の直後の数詞fifty（50）はemployees を修飾する形容詞として働きます。したがって、数詞fiftyを修飾する副詞の (C) Over（〜を超えて） が適切です。",translation:"50人以上の社員が上級研修プログラムを修了し、資格を取得した。"},
  {id:1163,q:"——– by Madoka Takada’s innovative approach, the board increased funding for her research project.",options:["Impressing","Impressive","Impressed","Impression"],answer:2,type:"<strong>品詞または動詞問題</strong>",explanation:"カンマ以降がthe board increased で主語+動詞があります。空所の後に前置詞byがあるので、過去分詞(C) Impressed（動詞impress「感銘を与える」の過去分詞形）で始まる分詞構文が考えられます。分詞構文と仮定して、問題文の意味を確認していきましょう。",translation:"Madoka Takadaさんの革新的なアプローチに感銘を受け、理事会は彼女の研究プロジェクトへの資金を増やした。"},
  {id:1164,q:"Bright Sky Café features a range of ——– priced desserts that are perfect for any sweet tooth.",options:["strongly","repeatedly","reasonably","internally"],answer:2,type:"<strong>語彙問題</strong>",explanation:"空所の前が前置詞of、後ろにpriced desserts（価格のついたデザート）があるので、価格に関連する形容詞を選ぶ必要があります。",translation:"Bright Sky Caféは、どんな甘党にもぴったりの、手頃な価格のデザートを幅広く取り揃えています。"},
  {id:1165,q:"Employees must ensure that their work email accounts are not used for ——– use.",options:["full","wealthy","personal","empty"],answer:2,type:"<strong>語彙問題</strong>",explanation:"空所の後がuse（使用）です。これと合いそうなのは (C) personal（個人的な）です。念のためもう少し確認する箇所を広げていきましょう。",translation:"従業員は、会社のEメールアカウントを個人的な利用に使わないようにしなければなりません。"},
  {id:1166,q:"TransBulk Logistics handles raw materials and finished goods in ——– facilities to improve safety.",options:["separating","separate","separation","separately"],answer:1,type:"<strong>品詞または動詞問題</strong>",explanation:"空所の前は前置詞in、後ろに名詞のfacilities（施設）があります。これは空所で形容詞が求められていることを示しています。",translation:"TransBulk Logisticsは、安全性を向上させるために、原材料と完成品を別々の施設で取り扱っています。"},
  {id:1167,q:"Velox Delivery Enterprises offers a discount to ——– who subscribes to their annual service plan.",options:["another","everything","anyone","either"],answer:2,type:"<strong>代名詞問題</strong>",explanation:"空所の前が前置詞to、空所の後ろに関係代名詞whoと動詞subscribes（定期購読する、加入する）があります。whoは「人」を先行詞とするので、空所には「人」を表す代名詞が入ります。",translation:"Velox Delivery Enterprisesは、年間サービスプランに加入するすべての人に割引を提供しています。"},
  {id:1168,q:"——– the product arrives, our team will begin the quality inspection process.",options:["all the same","by comparison","as soon as","in addition to"],answer:2,type:"<strong>接続詞・前置詞・副詞問題</strong>",explanation:"空所の後ろはthe product arrivesで主語+動詞、カンマ以降は、our team will beginで主語+動詞の形です。これは、上の１のパターンに該当し、空所には接続詞が入ることがわかります。選択肢の中で接続詞は、(C) as soon as（～するとすぐに）のみです。したがって、(C) as soon as（～するとすぐに）を選びます。",translation:"製品が到着するとすぐに、私たちのチームは品質検査プロセスを開始します。"},
  {id:1169,q:"Employee training sessions have been ——– until the completion of the new training facility.",options:["gone through","broken down","taken on","held back"],answer:3,type:"<strong>語彙問題</strong>",explanation:"文全体の意味は、「従業員研修は、新しい研修施設の完成まで～されている」です。そのアクションとして適しているのが、(D) held back（hold back「控える」の過去分詞形）です。",translation:"従業員研修は、新しい研修施設の完成まで保留されています。"},
  {id:1170,q:"Each interview is scheduled to take ——– 30 minutes this afternoon.",options:["approximate","approximately","approximation","approximating"],answer:1,type:"<strong>品詞問題</strong>",explanation:"空所の前後を中心に見ていきます。空所の前は動詞 take（かかる）、後ろは数字30 に名詞minutesが続きます。空所の直後の数字30は名詞minutes を修飾する形容詞として働きます。したがって、30を修飾する副詞の(B) approximately（おおよそ）が適切です。",translation:"今日の午後の各面接は、約30分を予定しています。"},
  {id:1171,q:"To manage workload effectively, our project managers are ——– using automated task schedulers.",options:["occasion","occasions","occasionally","occasional"],answer:2,type:"<strong>品詞問題</strong>",explanation:"空所の前後を見ます。空所の前がbe動詞are、後ろが動詞の現在分詞形using（使用している）。したがって、空所には動詞の現在分詞形usingを修飾する副詞の(C) occasionally（時々、時折）が適切です。",translation:"作業負荷を効果的に管理するために、私たちのプロジェクトマネージャーは時折、自動タスクスケジューラを使用しています。"},
  {id:1172,q:"The email campaign reached thousands of ——– customers, but the click-through rate was disappointing.",options:["certain","conclusive","descriptive","potential"],answer:3,type:"<strong>語彙問題</strong>",explanation:"カンマまでの意味が、「「Eメールキャンペーンは数千人の～の顧客に届いた」で「潜在的な顧客」とすると意味が通るので、(D) potential（潜在的な）が適切です。",translation:"Eメールキャンペーンは数千人の潜在顧客にリーチしましたが、クリックスルー率は期待外れでした。"},
  {id:1173,q:"To be ——– for the internship, applicants must submit their portfolios to Barner Corporation by May.",options:["applied","found","worked","considered"],answer:3,type:"<strong>語彙問題</strong>",explanation:"問題文の意味は「インターンシップに～されるためには、応募者は5月までにBarner Corporationに作品集を提出する必要があります」なので、(D) considered（考慮される： consider「考慮する」の過去分詞形）が適切です。",translation:"インターンシップに考慮されるためには、応募者は5月までにBarner Corporationに作品集を提出する必要があります。"},
  {id:1174,q:"Iversen Architects Ltd. has successfully secured multiple new ——– for urban redevelopment projects this year.",options:["contract","contracts","contracted","contracting"],answer:1,type:"<strong>品詞問題</strong>",explanation:"空所の前後を見ます。空所の前が形容詞multiple（複数の）と new（新しい）、後ろが前置詞 for。したがって空所には名詞が入ることがわかります。ここで形容詞multiple（複数の）の後は複数形の名詞が適切なので、 (B) contracts（contract「契約」の複数形） を選びます。",translation:"Iversen Architects Ltd. は今年、都市再開発プロジェクトのために複数の新しい契約を無事に獲得しました。"},
  {id:1175,q:"Our monthly report shows a decrease in ——– about late deliveries, thanks to improved logistics.",options:["compensations","repairs","referrals","complaints"],answer:3,type:"<strong>語彙問題</strong>",explanation:"空所の前が、a decrease in ～（～の減少）、空所の後ろが about late deliveries（配送の遅れについて）と続いています。「配送の遅れについて減少した」のは、(D) complaints（complaint「苦情」の複数形）が適切です。",translation:"物流の改善のおかげで、毎月のレポートでは、配送の遅れに関する苦情が減少していることが示されています。"},
  {id:1176,q:"——– a number of customer feedback sessions, Bao Wang has decided to upgrade its return policies.",options:["Beside","Following","Against","Toward"],answer:1,type:"<strong>語彙問題</strong>",explanation:"空所の後ろが a number of customer feedback sessions（多くの顧客フィードバックセッション）という名詞句になります。文脈から、これらのセッションの結果としてBao Wangさんが返品ポリシーを改善することを決定したと解釈できるので、(B) Following（～に続いて）が適切です。",translation:"多くの顧客フィードバックセッションに続いて、Bao Wangさんは返品ポリシーを改善することを決定しました。"},
  {id:1177,q:"Our transition to digital platforms has been a huge ——–, enhancing our operational efficiency significantly.",options:["successful","succeeding","succeeds","success"],answer:3,type:"<strong>品詞問題</strong>",explanation:"空所の前後を見ます。空所の前が冠詞 aに形容詞huge（巨大な、大規模な）、後ろがカンマに動詞の現在分詞の enhancingが続きます。したがって空所には名詞の (D) success（成功） が適切です。",translation:"デジタルプラットフォームへの移行は大成功を収め、業務効率を大幅に向上させました。"},
  {id:1178,q:"Jacqueline Turner, the CEO of SynerTech Corp., encouraged the board to ——– open to alternative strategies for market expansion.",options:["secure","enlarge","transform","remain"],answer:3,type:"<strong>語彙問題</strong>",explanation:"空所の直後に形容詞 open、その後に前置詞toがあります。これは、空所に第2文型を取る動詞が入ることを示唆しています。",translation:"SynerTech Corp.のCEOであるJacqueline Turnerさんは、取締役会に対して、市場拡大のための代替戦略にオープンなままでいることを奨励しました。"},
  {id:1179,q:"Mr. Dixon is negotiating a lease ——– a new office space in the downtown area.",options:["of","by","like","for"],answer:3,type:"<strong>語彙問題</strong>",explanation:"空所の後ろが名詞句 a new office space（新しいオフィススペース）です。negotiate a lease は「賃貸借契約を交渉する」という意味の決まった表現で、その後に契約の対象となるものを for を用いて表します。したがって、空所には(D) for（～のために）を選びます。",translation:"Dixonさんは、繁華街にある新しいオフィススペースの賃貸借契約を交渉しています。"},
  {id:1180,q:"Stellar Automotive Innovators ——– significant restructuring to improve efficiency for the last two years.",options:["is undergoing","has undergone","undergo","to undergo"],answer:1,type:"<strong>時制に関する動詞問題</strong>",explanation:"時制を決める語句は for the last two years（過去2年間）です。これは、過去のある時点から現在まで継続している動作や状態を表す現在完了形が適切であることを示しています。選択肢の中で現在完了形は (B) has undergone のみでこれを選びます。",translation:"Stellar Automotive Innovatorsは、過去2年間、効率を改善するために大幅な組織再編を行ってきました。"},
  {id:1181,q:"Since the last quarter, ——– in our rental properties has risen by 15% due to the improved economy.",options:["Occupations","Occupancy","Occupants","Occupied"],answer:1,type:"<strong>品詞問題</strong>",explanation:"空所の前がカンマ、空所の後が前置詞句 in our rental properties、これに動詞 has risenが続きます。したがって、空所には主語となる名詞が入り、かつ動詞の形がhas risenなので、主語は三人称単数になります。以上から (B) Occupancy（入居率） が適切です。",translation:"前四半期以降、経済の改善により、賃貸物件の入居率が15％上昇しました。"},
  {id:1182,q:"Although the rebranding was a risky move, customer feedback and market share have improved ——– since its implementation.",options:["decreasingly","hardly","approximately","considerably"],answer:3,type:"<strong>語彙問題</strong>",explanation:"空所の直前に have improved (改善された) があります。選択肢の中で have improved と合い、かつ文脈に沿って意味が通るのは (D) considerably（かなり）のみです。",translation:"リブランディングはリスクの高い行動でしたが、実施以来、顧客からのフィードバックと市場シェアは大幅に改善されました。"},
  {id:1183,q:"The workshop hosted by Ms. Kang was ——– in improving team communication and productivity.",options:["helper","help","helpful","helpfully"],answer:2,type:"<strong>品詞問題</strong>",explanation:"空所の前後を見ます。空所の前がbe動詞 was、後ろが前置詞 in。be動詞に続く補語となる形容詞の(C) helpful（役に立つ）が適切です。",translation:"Kangさんが主催したワークショップは、チームのコミュニケーションと生産性の向上に役立ちました。"},
  {id:1184,q:"The new conference center is just a five-minute walk ——– the Grand Harper Inn.",options:["all around","up until","far ahead","away from"],answer:3,type:"複合語彙問題",explanation:"空所の前が、a five-minute walk（徒歩で5分）、後ろが the Grand Harper Innです。「Grand Harper Innから徒歩で5分」とすると意味が通るので、(D) away from（〜から離れて）が適切です。",translation:"新しい会議センターは、グランドハーパーインから徒歩わずか5分です。"},
  {id:1185,q:"User feedback ——– that Cryptosphere Digital Solutions has a high satisfaction rate because of its customer support excellence.",options:["showing","are shown","have shown","shows"],answer:3,type:"<strong>能動態・受動態・時制に関する動詞問題</strong>",explanation:"空所の後ろがthat節、空所の前のUser feedback（ユーザーからのフィードバック）が主語で、空所にはthat節をとる動詞（述語動詞）がはいると考えられます。User feedbackは三人称単数扱いなので、(D) shows（示す）が適切です。",translation:"ユーザーからのフィードバックは、Cryptosphere Digital Solutionsが顧客サポートの卓越性により高い満足度を誇っていることを示しています。"},
  {id:1186,q:"Our company aims ——– increasing productivity and enhancing employee skills through our new training program.",options:["behind","from","at","in"],answer:2,type:"<strong>語彙問題</strong>",explanation:"空所の前の動詞 aim は、aim atで「～を目指す、～を目的とする」という意味を持ちます。(C) at を入れるとthroughまでの意味は「私たちの会社は、生産性の向上と従業員のスキルの向上を目指している」となって意味が通ります。したがって(C) atを選びます。",translation:"私たちの会社は、新しい研修プログラムを通じて、生産性の向上と従業員のスキルの向上を目指しています。"},
  {id:1187,q:"Customers can expect their refund to be processed ——– 72 hours of returning their purchase.",options:["above","when","even","within"],answer:3,type:"<strong>接続詞・前置詞・副詞問題</strong>",explanation:"空所の後ろは 72 hours of returning their purchase で名詞句なので、これは上の４のパターンになり、空所には前置詞が入ることがわかります。選択肢の中で前置詞は (A) above（～より上に）と (D) within（～以内に）の2つあります。",translation:"顧客は、購入品の返品から72時間以内に払い戻しが処理されることを期待できます。"},
  {id:1188,q:"All reports must be submitted in a ——– manner to maintain compliance with company policies.",options:["time","timed","timing","timely"],answer:3,type:"<strong>品詞問題</strong>",explanation:"空所の前後を中心に見ていきます。空所の前が冠詞a、後ろが名詞manner（方法）なので、空所には形容詞が入ることがわかります。選択肢の中の形容詞(D) timely（タイムリーな、適時の）を選ぶと、in a timely manner（適切なタイミングで）という定型表現になります。したがって、(D) timely（タイムリーな、適時の）を選びます。",translation:"すべてのレポートは、会社のポリシーに準拠するために、適切なタイミングで提出する必要があります。"},
  {id:1189,q:"Culler Solutions innovates its offerings regularly to maintain enough customers ——– in business.",options:["staying","to stay","stayed","stay"],answer:1,type:"<strong>動詞問題</strong>",explanation:"空所の前がenough と名詞customersが続き、後ろがin businessです。enough + 名詞 + to do の形は、「～するのに十分な（名詞）」という意味を表すので、不定詞の(B) to stayが適切です。",translation:"Culler Solutionsは、事業を継続するのに十分な顧客を維持するために、定期的に提供するサービスを革新しています。"},
  {id:1190,q:"During the intense negotiations, the team was advised to sit ——– and observe the discussions carefully.",options:["possibly","extremely","abruptly","quietly"],answer:3,type:"<strong>語彙問題</strong>",explanation:"空所の前の動詞はsit（座る）、空所の後ろにand observe the discussions carefully（そして議論を注意深く観察する）が続いています。この文脈から、議論を静かに観察することが求められていると考えられます。したがって、適切な副詞は(D) quietly（静かに）です。",translation:"激しい交渉の間、チームは静かに座って議論を注意深く観察するようにアドバイスされました。"},
  {id:1191,q:"The job positions in engineering and marketing are ——– attractive in terms of salary and career growth opportunities.",options:["equals","equality","equally","equal"],answer:2,type:"<strong>品詞または動詞問題</strong>",explanation:"空所の前後を見ます。空所の前がbe動詞are、後ろが形容詞attractive（魅力的な）です。したがって空所には形容詞attractiveを修飾する副詞(C) equally（同様に）が適切です。",translation:"エンジニアリングとマーケティングの求人は、給与とキャリアアップの機会という点で、どちらも同様に魅力的です。"},
  {id:1192,q:"Technological innovation is driving change and competitiveness in ——– industries.",options:["none","much","many","anything"],answer:2,type:"数量形容詞・代名詞問題",explanation:"空所の前は前置詞in、空所の後ろの名詞 industries（産業） は可算名詞の複数形です。可算名詞の複数形を修飾できる数量形容詞は (C) many のみです。",translation:"技術革新は、多くの産業において変化と競争力を推進しています。"},
  {id:1193,q:"The annual health fair will be held at Oasis Holistic Clinic, ——– is located on Main Street.",options:["where","which","so","as"],answer:1,type:"<strong>関係詞問題</strong>",explanation:"空所の前に名詞 Oasis Holistic Clinic があり、後ろに動詞 is located が続いています。 この構造から、空所には名詞 Oasis Holistic Clinic を先行詞とする主格の関係代名詞が必要です。したがって(B) whichを選びます。",translation:"年1回の健康フェアは、Main StreetにあるOasis Holistic Clinicで開催されます。"},
  {id:1194,q:"Celeste Biopharma Solutions ensures product quality only ——– rigorous testing and quality control measures.",options:["once","while","beside","through"],answer:3,type:"<strong>接続詞・前置詞・副詞問題</strong>",explanation:"空所の前は、Celeste Biopharma Solutions ensuresで主語+空所、後ろの rigorous testing and quality control measures は名詞句です。 これは、上の４のパターンに当てはまり、空所には前置詞が入ることがわかります。選択肢の中で前置詞は (C) beside と (D) through の2つあります。",translation:"Celeste Biopharma Solutionsは、厳格なテストと品質管理対策を通じてのみ製品の品質を保証します。"},
  {id:1195,q:"Our latest product line ——– better than last year’s, showing a significant increase in sales.",options:["perform","performing","performs","performance"],answer:2,type:"<strong>品詞または動詞問題</strong>",explanation:"空所の前に名詞句 Our latest product line があり、後ろに副詞 better が続いていてカンマまでに動詞（述語動詞）がありません。したがって空所には述語動詞が必要です。",translation:"私たちの最新の製品ラインは昨年のものよりも良い業績を上げており、売上高が大幅に増加しています。"},
  {id:1196,q:"In a ——– to improve employee wellness, Synaptic Business Consulting has introduced flexible working hours.",options:["push","debate","raise","probe"],answer:0,type:"<strong>語彙問題</strong>",explanation:"空所の後ろは to improve employee wellness（従業員の健康を改善するための）なので、空所には「努力、取り組み」などを表す名詞が適切です。したがって 、(A) push（推進）を選びます。",translation:"Synaptic Business Consultingは、従業員の健康改善を 推進するため 、フレックスタイム制を導入しました。"},
  {id:1197,q:"Mr. Nishiyama hosted a lunch to show his ——– for the team’s dedication under tight deadlines.",options:["appreciating","appreciate","appreciation","appreciated"],answer:2,type:"<strong>品詞または動詞問題</strong>",explanation:"空所の前に所有格his（彼の）があり、後ろは前置詞 for が続いています。この構造から、空所には名詞が必要です。したがって名詞の (C) appreciation を選びます。",translation:"Nishiyamaさんは、厳しい締め切りの中でのチームの献身に対する感謝の気持ちを示すために、昼食会を主催しました。"},
  {id:1198,q:"Our next project involves developing a retail space ——– the downtown metro station to increase foot traffic.",options:["throughout","down","next to","onto"],answer:2,type:"<strong>語彙問題</strong>",explanation:"空所の前が、a retail space（小売りスペース）、空所の後ろは the downtown metro station（繁華街の地下鉄駅）なので、空所には前後をつなげる前置詞が入ると考えられます。選択肢の中で適切なのは (C) next to（～の隣に）です。",translation:"私たちの次のプロジェクトは、歩行者の交通量を増やすために、繁華街の地下鉄駅の隣に小売スペースを開発することを含んでいます。"},
  {id:1199,q:"Success will be more likely if the committee attempts ——– the current policies to reflect changing market conditions.",options:["modifies","modified","has modified","to modify"],answer:3,type:"<strong>動詞問題</strong>",explanation:"空所の前の動詞attempts（試みる）はto不定詞を目的語にとります。したがって空所にはto不定詞が入ることがわかります。選択肢の中でto不定詞は、(D) to modify（修正する）でこれを選びます。",translation:"委員会が変化する市場環境を反映するために現行の方針を修正しようとすれば、成功の可能性が高くなります。"},
  {id:1200,q:"Employees at Synaptic Innovations Group can ——– to participate in a comprehensive professional development program.",options:["expectantly","expected","expectant","expect"],answer:3,type:"<strong>品詞または動詞問題</strong>",explanation:"空所の前が助動詞 can 、空所の後ろがto participateなので、空所には動詞の原形が入ることがわかります。選択肢の中で動詞の原形は (D) expect （期待する）のみでこれを選びます。",translation:"Synaptic Innovations Groupの従業員は、包括的な専門能力開発プログラムに参加することを期待できます。"},
  {id:1201,q:"Please send us your flight details so we can track your ——– accurately.",options:["arrive","arrives","arrival","arrived"],answer:2,type:"品詞または動詞問題",explanation:"空所の前に 代名詞所有格のyour（あなたの）があり、後ろに副詞 accurately（正確に） が続いています。この構造から、空所には名詞が必要です。",translation:"正確に到着を追跡できるように、フライトの詳細を送ってください。"},
  {id:1202,q:"The management team at KGRM Enterprises considers customer demand and price ——– before product updates.",options:["have compared","comparisons","compare","compares"],answer:1,type:"<strong>品詞または動詞問題</strong>",explanation:"問題文中の動詞（述語動詞）はconsiders（検討する、考慮する）と考えられます。したがって、空所とconsidersの間にandなどの接続詞がないので。述語動詞の形の(A) have compared、(C) compare 、(D) comparesは不適切です。残りは (B) comparisons （名詞comparison「比較」の複数形）のみです。",translation:"KGRM Enterprisesの経営陣は、製品のアップデート前に顧客の需要と価格の比較を検討します。"},
  {id:1203,q:"The Annual Excellence Awards honored employees ——– dedication and hard work exceeded their job requirements.",options:["who","whose","their","they"],answer:1,type:"<strong>代名詞または関係代名詞問題</strong>",explanation:"空所の前が名詞employees（従業員）、空所の後ろは名詞 dedication and hard work（ 献身と勤勉さ）と動詞 exceeded が続いています。この構造から、空所にはemployees（従業員）を先行詞とする所有格の関係代名詞が適切です。選択肢の中で所有格の関係代名詞は (B) whose でこれを選びます。",translation:"Annual Excellence Awardsでは、その献身と勤勉さが職務要件を超えた従業員を表彰しました。"},
  {id:1204,q:"Ms. Kim is ——– the leading experts in her field, frequently cited in academic journals.",options:["about","from","among","as"],answer:2,type:"<strong>語彙問題</strong>",explanation:"空所の後ろは the leading experts in her field（彼女の分野における主要な専門家たち）なので、空所には集団の中に含まれることを表す前置詞が適切です。したがって、 (C) among（～の間で、～の中で）を選びます。",translation:"Kimさんは、彼女の分野における主要な専門家の一人であり、学術雑誌で頻繁に引用されています。"},
  {id:1205,q:"The ——– item on the workshop schedule is a demonstration of the new software update.",options:["high","busy","broad","next"],answer:3,type:"<strong>語彙問題</strong>",explanation:"選択肢がすべて形容詞なので「語彙問題」であることがわかります。空所の形容詞が修飾する名詞句がヒントになります。",translation:"ワークショップのスケジュール上の次の項目は、新しいソフトウェアアップデートのデモです。"},
  {id:1206,q:"Please follow the ——– on the package to assemble the furniture correctly and safely.",options:["applications","systems","policies","directions"],answer:3,type:"<strong>語彙問題</strong>",explanation:"空所の前がPlease follow the（～に従ってください）、空所の後ろは on the package to assemble the furniture correctly and safely（パッケージに記載されている家具を正しく安全に組み立てるための～）なので、(D) directions（指示）が適切です。",translation:"家具を正しく安全に組み立てるために、パッケージの指示に従ってください。"},
  {id:1207,q:"The venue was ——– decorated with flowers and lights, creating a magical atmosphere for the wedding.",options:["beauty","beautiful","beautifully","beautify"],answer:2,type:"<strong>品詞問題</strong>",explanation:"空所の前がbe動詞was、後ろは過去分詞 decorated（decorate「飾る」の過去分詞形） です。したがって、空所には decorated を修飾する副詞が空所に入ることがわかります。選択肢の中で副詞は (C) beautifully（美しく）でこれを選びます。",translation:"会場は花と光で美しく飾られ、結婚式のための魔法のような雰囲気を作り出していました。"},
  {id:1208,q:"Research shows that the teaching method is ——– in enhancing students’ understanding of complex subjects.",options:["permissive","effective","collective","objective"],answer:1,type:"<strong>語彙問題</strong>",explanation:"空所の前は主語the teaching method （その教授法）にbe動詞isが続き、空所の後ろは in enhancing students’ understanding of complex subjects （複雑な教科の生徒の理解を深めるのに）なので、空所には「効果的な」という意味の形容詞が適切です。したがって、 (B) effective（効果的な）を選びます。",translation:"研究によれば、その教授法は複雑な教科の生徒の理解を深めるのに効果的だと示されています。"},
  {id:1209,q:"In response to feedback, the conference will place more ——– on interactive sessions this year.",options:["emphasize","emphasis","emphatic","emphatically"],answer:1,type:"<strong>品詞問題</strong>",explanation:"空所の前後を中心に見ていきます。空所の前が 動詞place（置く）に形容詞more（一層）が続き、後ろが 前置詞onなので、空所には名詞が入ることがわかります。選択肢の中で名詞は、(B) emphasis（重点）でこれを選びます。",translation:"フィードバックを受けて、今年の会議では対話型セッションに一層重点が置かれます。"},
  {id:1210,q:"Garston Architects Ltd. needs to determine whether to focus on commercial ——– residential design next.",options:["or","and","if","either"],answer:0,type:"<strong>語彙問題</strong>",explanation:"空所の前がwhether to fucus on にcommercialが続き、後ろに residential design があります。whether A or B（AかBか）の形から(A) or（または）を選びます。",translation:"Garston Architects Ltd.は、次に商業デザインと住宅デザインのどちらに焦点を当てるかを決定する必要があります。"},
  {id:1211,q:"Teresa Park has been nominated for the industry excellence award for the third ——– year.",options:["entire","thorough","consecutive","repetitive"],answer:2,type:"<strong>語彙問題</strong>",explanation:"空所の前はthe third、後ろは yearです。「3年連続」とするのが適切なので、(C) consecutive（連続した）を選びます。",translation:"Teresa Parkさんは、業界優秀賞に3年連続でノミネートされています。"},
  {id:1212,q:"New safety regulations and a shift in building materials ——– unexpected challenges for the Ellison-Grant Architect Group.",options:["have posed","is posing","does pose","will have been posed"],answer:0,type:"能動態・受動態・時制に関する動詞問題",explanation:"空所の前のNew safety regulations and a shift in building materials（新しい安全規制と建築材料の変化）は複数形の主語、空所の後のunexpected challenges（予期せぬ課題）は目的語と考えられます。",translation:"新しい安全規制と建築材料の変化は、Ellison-Grant Architect Groupにとって予期せぬ課題をもたらしました。"},
  {id:1213,q:"Before making a decision, the board undertook an ——– evaluation of all potential risks.",options:["exhaust","exhausts","exhaustive","exhaustively"],answer:2,type:"<strong>品詞問題</strong>",explanation:"空所の前後を中心に見ていきます。空所の前が冠詞 an、後ろが名詞 evaluation（評価）なので、空所には形容詞が入ることがわかります。したがって、形容詞の(C) exhaustive（徹底的な）が適切です。",translation:"決定を下す前に、取締役会は潜在的なリスクすべての徹底的な評価を行いました。"},
  {id:1214,q:"Ms. Anderson distributed a ——– of the performance review guidelines to each employee during the meeting.",options:["number","message","copy","figure"],answer:2,type:"<strong>語彙問題</strong>",explanation:"空所の前は動詞distributed（配布した）に冠詞aが続き、後ろは of the performance review guidelines（業績評価ガイドラインの～）なので、空所には「コピー、写し」を表す名詞の (C) copy（コピー、部）が適切です。",translation:"Andersonさんは、会議中に業績評価ガイドラインのコピーを各従業員に配布しました。"},
  {id:1215,q:"For Velvet Vogue Corporation’s new product launch, ——– has prepared an extensive marketing campaign.",options:["it","what","there","who"],answer:0,type:"<strong>代名詞または関係代名詞問題</strong>",explanation:"空所の後ろはhas prepared（準備してきた）という動詞があるので、空所には主語が必要です。選択肢の中で適切なのは 代名詞の(A) it（それは）です。この it は Velvet Vogue Corporationを指します。",translation:"Velvet Vogue Corporationは、新製品の発売に向けて、広範囲にわたるマーケティングキャンペーンを準備した。"},
  {id:1216,q:"Oceanview Science College implemented a successful online learning platform ——– initial technical difficulties.",options:["eventually","despite","unless","whenever"],answer:1,type:"<strong>接続詞・前置詞・副詞問題</strong>",explanation:"空所の前は、Oceanview Science College implementedで主語+動詞、空所の後ろは initial technical difficulties（当初の技術的な問題）で名詞句なので、空所には前置詞が入ることがわかります。これは、上野４のパターンに該当し、空所には前置詞が入ることがわかります。",translation:"Oceanview Science Collegeは、当初の技術的な問題にもかかわらず、成功したオンライン学習プラットフォームを導入しました。"},
  {id:1217,q:"Before launching LifeSync, Lumina Enterprises will conduct ——– market research to ensure it meets consumer needs.",options:["invested","extensive","dependent","impressed"],answer:1,type:"<strong>語彙問題</strong>",explanation:"空所の後ろに名詞 market research（市場調査）があるので、市場調査の内容に関する形容詞を選ぶ必要があります。選択肢の中で市場調査の内容に関連するのは (B) extensive（広範囲にわたる）でこれを選びます。",translation:"Lumina Enterprisesは、LifeSyncを発売する前に、消費者のニーズを満たしていることを確認するために、広範な市場調査を実施する予定です。"},
  {id:1218,q:"The warranty for SmartVision HDTV ——– over three years, covering all manufacturing defects.",options:["allows","protects","insists","extends"],answer:3,type:"<strong>語彙問題</strong>",explanation:"空所の前は主語のThe warranty for SmartVision HDTV （SmartVision HDTVの保証）、空所の後ろは over three years（3年以上）、covering all manufacturing defects（製造上の欠陥をすべてカバーする）と続いています。この文脈に合うのは (D) extends（及ぶ）です。",translation:"SmartVision HDTVの保証は3年以上で、すべての製造上の欠陥をカバーしています。"},
  {id:1219,q:"All residents ——– to attend the town hall meeting to discuss the upcoming community projects.",options:["are invited","have been inviting","had invited","will be inviting"],answer:0,type:"能動態・受動態・時制に関する動詞問題",explanation:"空所の主語は All residents（すべての住民）なので、空所には複数形の名詞と相性の良い動詞、そしてto不定詞を目的語にとれる動詞が必要です。選択肢の中で適切なのは (A) are invited（招待されている）です。",translation:"すべての住民は、今度の地域プロジェクトについて話し合うために、タウンホールミーティングに参加するように招待されています。"},
  {id:1220,q:"Greenville Preparatory Institute decided to schedule ——– for the gymnasium roof after the last storm damage.",options:["actions","processes","developments","repairs"],answer:3,type:"語彙問題",explanation:"空所の前は動詞schedule（予定する）、後ろは for the gymnasium roof after the last storm damage（前回の暴風雨の被害後の体育館の屋根のための～）なので、空所には「修理」を表す名詞が適切です。したがって、 (D) repairs（修理）を選びます。",translation:"Greenville Preparatory Instituteは、前回の暴風雨の被害後、体育館の屋根の修理を予定することにしました。"},
  {id:1221,q:"Our stock levels remained stable while our logistics team ——– adjusted the supply chain to meet increased demand.",options:["prompting","promptly","prompts","prompted"],answer:1,type:"<strong>品詞または動詞問題</strong>",explanation:"空所の前が主語our logistics team（私たちの物流チーム）、空所の後ろは動詞 adjusted（調整した）です。したがって空所には動詞adjusted（調整した）を修飾する副詞が必要です。したがって副詞(B) promptly（迅速に）が適切です。",translation:"需要の増加に応じて物流チームが迅速にサプライチェーンを調整している間、私たちの在庫は安定していました。"},
  {id:1222,q:"Mr. Lee has been praised for ——– innovative approach to solving logistical challenges.",options:["him","himself","his","he"],answer:2,type:"<strong>代名詞問題</strong>",explanation:"空所の前は前置詞for、後ろは innovative approach（革新的なアプローチ）という名詞句なので、空所には名詞句を修飾する所有格の (C) his（彼の）が適切です。",translation:"Leeさんは、物流の課題を解決する革新的なアプローチで賞賛されています。"},
  {id:1223,q:"The election coverage provided by WXO Radio was ——– comprehensive, featuring interviews with all major candidates.",options:["easily","commonly","separately","notably"],answer:3,type:"<strong>語彙問題</strong>",explanation:"空所の前は主語のThe election coverage provided by WXO Radio（WXOラジオが提供する選挙報道）にbe動詞wasが続き、後ろは形容詞 comprehensive（包括的な）です。",translation:"WXOラジオが提供する選挙報道は、特に包括的で、すべての主要候補者へのインタビューを特集していました。"},
