  {id:822,q:"The ongoing urban development that ——– the school will increase our property’s future value.",options:["surrounds","is surrounded","surrounding","surrounded by"],answer:0,type:"動詞問題",explanation:"空所の前のthatは関係代名詞で、空所の後に名詞句the schoolがあるので、空所には動詞（述語動詞）が必要です。また、関係代名詞thatの先行詞はThe ongoing urban development（都市開発）、空所の後の目的語the school（学校）をつなぐためには、能動態の動詞が必要です。選択肢の中で、能動態かつ述語動詞になれるのは (A) surrounds（囲む、取り囲む）です。",translation:"学校を取り囲む進行中の都市開発は、私たちの土地の将来的な価値を高めるでしょう。"},
  {id:823,q:"——– initial estimates, the project completion is ahead of schedule and under the budget.",options:["Except for","Contrary to","Even though","In place of"],answer:1,type:"語彙問題",explanation:"空所の後にinitial estimatesという名詞句が続いており、前置詞が入ることがわかります。選択肢の中で前置詞は、(A) Except for（～を除いて）、(B) Contrary to（～に反して）、(D) In place of（～の代わりに）の3つあるので文全体の意味を取る必要があります。",translation:"初期の見積もりに反して、プロジェクトの完成は予定よりも早く、予算内で進行しています。"},
  {id:824,q:"The installation of ——– security systems is a priority for our new office.",options:["confused","cautious","approximate","appropriate"],answer:3,type:"<strong>語彙問題</strong>",explanation:"空所の後ろが、security systems（セキュリティシステム）です。これと合う形容詞を確認していきましょう。",translation:"適切なセキュリティシステムの設置は、新しいオフィスにとって優先事項です。"},
  {id:825,q:"Each chapter of the training manual is detailed but does not ——– twenty pages.",options:["exceeding","excess","excessive","exceed"],answer:3,type:"品詞または動詞問題",explanation:"空所の前にdoes notがあり、その後にtwenty pages（20ページ）という名詞句が続いています。したがって空所には動詞の原形が入ります。選択肢の中で動詞の原形は(D) exceed（～を超える）でこれを選びます。",translation:"トレーニングマニュアルの各章は詳細に書かれていますが、20ページを超えることはありません。"},
  {id:826,q:"For more information on our new products, please ——– our website or retail outlets.",options:["come","go","visit","take"],answer:2,type:"語彙問題",explanation:"空所の後はour website or retail outlets（私たちのウェブサイトまたは小売店）です。この目的語と合う動詞は(C) visit（訪問する）です。",translation:"新製品についての詳しい情報は、当社のウェブサイトか小売店を訪れてください。"},
  {id:827,q:"Yuki Takahashi and Pierre Lefevre will analyze the data to determine ——– campaign was the most effective.",options:["any","none","each","which"],answer:3,type:"<strong>代名詞問題</strong>",explanation:"問題文の動詞はwill analyze（分析する）と後半のbe動詞の過去形のwasが候補になります。代名詞(A) any、(B) none、(C) eachを空所の位置に入れると、接続詞がない状態で文の中に２つの動詞が存在することになるのでこの３つの代名詞は除外されます。残りの(D) whichを空所に入れて検討します。",translation:"Yuki TakahashiさんとPierre Lefevreさんは、どのキャンペーンが最も効果的であったかを決定するためにデータを分析します。"},
  {id:828,q:"Discovery Dream Travel offers a ——– variety of packages for international and local destinations.",options:["widen","width","wide","widely"],answer:2,type:"品詞問題",explanation:"空所の前後に注目すると、前に冠詞aと後に名詞variety（種類、多様）があるので、空所には形容詞が入るのが適切です。したがって、形容詞の(C) wide（広い、広範囲の）を選びます。",translation:"Discovery Dream Travelは、海外および現地の目的地に合わせた様々なパッケージを提供しています。"},
  {id:829,q:"The legal team ensures all our products comply with the latest government ——– and standards.",options:["regulations","perceptions","limitations","distributions"],answer:0,type:"語彙問題",explanation:"空所の前が、comply with the latest government（最新の政府の…に準拠している）で、空所の後に and standards（基準と） という表現があることに注目します。この部分は政府の何かと基準に準拠しているという文脈です。このため、(A) regulations（規制）が適切です。",translation:"法務チームは、すべての製品が最新の政府の規制や基準に準拠していることを保証します。"},
  {id:830,q:"Customers are ——– about the new features that make our latest app user-friendly and efficient.",options:["exciting","to excite","excites","excited"],answer:3,type:"品詞または動詞問題",explanation:"Customers are ——– about the new featuresに注目します。ここでは、customers（顧客）とabout new features（新機能について）をつなぐものが必要です。選択肢の中で適切なのは、形容詞の(D) excited（興奮した）です。",translation:"当社の最新アプリをユーザーフレンドリーで効率的にする新機能に、お客様は興奮しています。"},
  {id:831,q:"——– we have a larger office space, accommodating the entire team is no longer a challenge.",options:["Instead","In order that","Meanwhile","Now that"],answer:3,type:"<strong>接続詞・副詞問題</strong>",explanation:"空所の後にwe haveという主語+動詞の構造があり、カンマの後がaccommodating the entire team isで主語+動詞の形になっています。したがって上の１のパターンで空所には接続詞が入ります。選択肢の中で接続詞は(B) In order that（〜するために）と (D) Now that（～なので、～だから）があるので文全体の意味を考えます。",translation:"より広いオフィススペースがあるので、チーム全体を収容することはもはや難しいことではありません。"},
  {id:832,q:"Ionix Technologies is known for its ——– approaches to solving complex technological challenges efficiently.",options:["creative","creating","creatively","creativity"],answer:0,type:"品詞問題",explanation:"空所の前には代名詞itsがあり、後に名詞approaches（方法）があるので、空所には名詞approaches（方法）を修飾する形容詞が適切です。したがって、形容詞(A) creative（創造的な）を選びます。",translation:"Ionix Technologiesは、複雑な技術的課題を効率的に解決する創造的なアプローチで知られています。"},
  {id:833,q:"Storing ——– information securely is a top priority to comply with data protection requirements.",options:["vague","passive","sensitive","demonstrative"],answer:2,type:"<strong>語彙問題</strong>",explanation:"空所の前がStoring（保管する）、空所の後にinformation（情報）、それとsecurely（安全に）という副詞が続いています。その後にbe動詞isと補語a top priority（最優先事項）があります。",translation:"機密情報を安全に保管することは、データ保護要件を順守するための最優先事項である。"},
  {id:834,q:"We ——– representatives from Galactic Device Corporation last Friday to explore joint marketing initiatives.",options:["will meet","met","meet","meeting"],answer:1,type:"時制に関する動詞問題",explanation:"last Friday（先週の金曜日）が問題文に含まれているので、これは過去の出来事を説明しています。そのため、過去形の動詞が求められます。選択肢の中で過去形は (B) met （会った）のみなので、これを選びます。",translation:"私たちは、共同マーケティングの取り組みを探求するために、先週の金曜日にGalactic Device Corporationの代表者と会いました。"},
  {id:835,q:"The license application was ——– approved and requires an additional inspection to be finalized.",options:["conditions","conditional","conditioned","conditionally"],answer:3,type:"品詞問題",explanation:"問題文を確認すると、空所の前がbe動詞was、空所の後ろが動詞の過去分詞approved（承認された）なので、空所にはapproved（承認された）を修飾する副詞が入ります。したがって副詞の (D) conditionally（条件付きで）が適切です。",translation:"ライセンス申請は条件付きで承認され、最終的に完了するには追加検査が必要です。"},
  {id:836,q:"During the interview, Ms. Ivanova ——– her interest in the company’s international expansion plans.",options:["expressed","pointed","arranged","studied"],answer:0,type:"<strong>語彙問題</strong>",explanation:"空所の後ろにher interest in the company’s international expansion plans（会社の国際的な拡大計画に対する関心）があります。Ivanovaさんが「会社の国際的な拡大計画に対する関心を示した」とすると意味が通ります。したがって(A) expressed（示した）が適切です。",translation:"インタビュー中、Ivanovaさんは、会社の国際的な拡大計画に関心を示した。"},
  {id:837,q:"——– a thorough review, Ms. Ortiz proposed adjustments to our business strategy for increased profitability.",options:["After","Now","Soon","Next"],answer:0,type:"<strong>接続詞・前置詞・副詞問題</strong>",explanation:"空所の後ろがa thorough review（徹底的な再検討）で名詞句となっています。カンマ以降に主語と動詞のMs. Ortiz proposed（Ortizさんが提案した）があります。これは上の３のパターンで空所には前置詞が入ることがわかります。選択肢の中で前置詞は (A) After（～の後に）のみでこの選択肢を選びます。",translation:"徹底的な再検討の後、Ortizさんは収益性を高めるための事業戦略の調整を提案しました。"},
  {id:838,q:"——– of our manufacturing equipment need to participate in safety drills every quarter.",options:["Operators","Operation","Operating","Operate"],answer:0,type:"品詞問題",explanation:"問題文の動詞は現在形needで、三人称単数現在形ではないことがわかります。したがって、主語にあたる空所には複数の名詞が入ることがわかります。選択肢の中で複数の名詞は(A) Operators（オペレーター、操作者）のみでこれを選びます。",translation:"製造設備のオペレーターは、四半期ごとに安全訓練に参加する必要がある。"},
  {id:839,q:"Memberships to our service platform are renewed ——– to provide continuous access to features.",options:["rather","annually","quite","highly"],answer:1,type:"<strong>語彙問題</strong>",explanation:"空所の前がMemberships to our service platform are renewed（当社のサービスプラットフォームへの会員登録は更新されます）です。これと合うのは(B) annually（毎年）です。",translation:"当社のサービスプラットフォームへの会員登録は、継続的に機能をご利用いただけるよう、毎年更新されます。"},
  {id:840,q:"Special discounts are available ——– weekend to celebrate Green Valley Restaurant’s anniversary month.",options:["every","from","enough","since"],answer:0,type:"<strong>複合語彙問題</strong>",explanation:"空所の前がSpecial discounts are available（特別割引が利用できる）、後ろに名詞のweekend（週末）が続いており、その後がto celebrate Green Valley Restaurant’s anniversary month（Green Valley Restaurantの記念月間を祝うため）があります。",translation:"Green Valley Restaurantの記念月間を祝うため、毎週末、特別割引が利用できる。"},
  {id:841,q:"Mr. Bianchi will examine the reports ——– to ensure all data is accurate.",options:["he","him","his","himself"],answer:3,type:"<strong>代名詞問題</strong>",explanation:"空所の前がMr. Bianchi will examine the reports（Bianchiさんは報告書を調べます）で文として完結しています。したがって、空所には「Bianchiさん自身がレポートを調べる」ことを強調する再帰代名詞が適切なので、(D) himself（彼自身で）を選びます。",translation:"Bianchiさんは、すべてのデータが正確であることを確認するために、報告書を自ら調べます。"},
  {id:842,q:"We pride ourselves on maintaining high ——– in customer service and product quality.",options:["accounts","committees","standards","themes"],answer:2,type:"<strong>語彙問題</strong>",explanation:"空所の前がmaintaining high …（高い…を維持すること）です。これに合う名詞は(C) standards（基準、水準）です。一般的なコロケーションhigh standardsにも合致します。",translation:"私たちは、顧客サービスと製品品質において高い基準を維持することに誇りを持っています。"},
  {id:843,q:"Nexa System Consulting and Pinnacle Soft Labs are ——– resources to jointly tackle the emerging market demands.",options:["combining","combined","combines","combine"],answer:0,type:"時制に関する動詞問題",explanation:"Nexa System Consulting and Pinnacle Soft Labsが主語、空所の前がbe動詞are、その後にresources（資源）という名詞があります。resources（資源）を目的語として、主語の「2つの企業が資源を組み合わせている」という現在進行形が適切です。",translation:"Nexa System ConsultingとPinnacle Soft Labsは、新興市場の需要に共同で取り組むために資源を組み合わせている。"},
  {id:844,q:"Our logistics team handles the transportation of fragile items with ——– to avoid damage.",options:["contact","care","amount","level"],answer:1,type:"<strong>語彙問題</strong>",explanation:"空所の後のto avoid damage（ダメージを避けるため）にthe transportation of fragile items（壊れやすい商品の輸送）をどのように対処するかについて述べています。空所には輸送時に壊れやすい商品をどのように扱うかを示す名詞が必要です。これに適しているのは(B) care（注意）です。",translation:"当社の物流チームは、ダメージを避けるために壊れやすい商品の輸送に注意を払って対処しています。"},
  {id:845,q:"The candidate had ——– the experience nor the skills required for the complex project management role.",options:["both","but","either","neither"],answer:3,type:"相関接続詞問題",explanation:"空所の後ろにnorがあります。neither &#8230; nor &#8230;の形から (D) neither（どちらもない）が適切です。",translation:"その候補者は、複雑なプロジェクト管理の役割に必要な経験もスキルも持っていませんでした。"},
  {id:846,q:"Celestial City Mall has been refurbished and ——– accommodates more stores, including top international brands.",options:["then","hence","now","next"],answer:2,type:"<strong>語彙問題</strong>",explanation:"空所の前が、Celestial City Mall has been refurbished and（Celestial City Mallが改装された。そして）、続いてaccommodates more stores, including top international brands（国際的な一流ブランドを含むより多くの店舗が入っている）です。前後をつなぐ適切な副詞は (C) now（現在では）です。",translation:"Celestial City Malは改装され、現在では国際的な一流ブランドを含むより多くの店舗が入っている。"},
  {id:847,q:"Our discounted meal plans were ——– aimed at college students looking for affordable and healthy options.",options:["specific","specifically","specificity","specifies"],answer:1,type:"品詞問題",explanation:"空所の前後を確認すると、空所の前にwereというbe動詞があり、後にaimed（対象とした、向けられた）という動詞の過去分詞があることから、空所にはaimedを修飾する副詞が適切です。選択肢の中で副詞は(B) specifically（特に、明確に）のみでこれを選びます。",translation:"私たちの割引食事プランは、手頃な価格で健康的なオプションを探している大学生を特に対象としていた。"},
  {id:848,q:"The Stellar Pathway Project made significant progress ——– the initial funding and resource constraints.",options:["throughout","despite","aside","aboard"],answer:1,type:"<strong>複合語彙問題</strong>",explanation:"空所の前はThe Stellar Pathway Project made significant progress（Stellar Pathway Projectは大きな進展を遂げた）、後ろはthe initial funding and resource constraints（初期の資金と資源の制約）です。空所の前後をつなぐ適切な選択肢は前置詞の(B) despite（～にもかかわらず）です。",translation:"初期の資金と資源の制約にもかかわらず、Stellar Pathway Projectは大幅な進歩を遂げました。"},
  {id:849,q:"We anticipate that revenue generated from our new service will be ——– to market demand.",options:["proportionally","proportional","proportioning","proportions"],answer:1,type:"品詞問題",explanation:"空所の前にwill beがあり、後ろには前置詞toがあります。これらと組み合わせて意味が通るのが形容詞(B) proportional（比例した）です。",translation:"私たちは、新サービスから得られる収益は市場の需要に比例すると予想している。"},
  {id:850,q:"Zephyr Technology Group strives to ——– a supportive environment for employee growth and learning.",options:["subscribe","estimate","establish","participate"],answer:2,type:"<strong>語彙問題</strong>",explanation:"空所の後ろが動詞の目的語のa supportive environment（支援する環境）で、これと合う動詞は(C) establish（確立する）です。",translation:"Zephyr Technology Groupは、社員の成長と学習を支援する環境の確立に努めています。"},
  {id:851,q:"The contract ——– the supplier and the retailer outlined mutual obligations and expectations clearly.",options:["upon","up","onto","between"],answer:3,type:"語彙問題",explanation:"空所の前がThe contract（契約）、後がthe supplier and the retailer（納入業者と小売業者）です。between A and Bから、(D) between（～の間に）が適切です。",translation:"供給業者と小売業者との間の契約では、相互の義務と期待を明確に述べています。"},
  {id:852,q:"Alpha Stream Technologies ensures data security, ——– you can trust us with your sensitive information.",options:["because of","then","so","or"],answer:2,type:"<strong>接続詞・前置詞・副詞問題</strong>",explanation:"空所の前方の形を見ます。Alpha Stream Technologies ensuresで主語+動詞の形です。空所の後ろも you can trust で主語+動詞の形になっています。これにより空所には接続詞が入ると考えられます。接続詞は(C) soだから、それゆえ）と(D) or（または、それとも）の2つあるので文全体の意味を考える必要があります。",translation:"Alpha Stream Technologiesはデータの安全性を保証いたしますので、機密情報を信頼してお任せいただけます。"},
  {id:853,q:"The sprinkler systems at our facilities turn on ——– when the fire alarm activates.",options:["automatic","automatically","automated","automate"],answer:1,type:"<strong>品詞問題</strong>",explanation:"空所の前がThe sprinkler systems at our facilities turn on（私たちの施設のスプリンクラーシステムは、作動します）で、文として完結しています。文として完結しているときは副詞が第一候補です。",translation:"私たちの施設のスプリンクラーシステムは、火災報知器が始動すると自動的に作動します。"},
  {id:854,q:"Pioneer Precision Instruments ——– and released an innovative device last year.",options:["manufacturing","manufactured","is manufacturing","was manufactured"],answer:1,type:"<strong>能動態・受動態・時制に関する動詞問題</strong>",explanation:"空所の後に and released （そして、発売した）があり、最後にlast year（去年）があることから、空所には過去形の動詞が必要です。",translation:"Pioneer Precision Instrumentsは昨年革新的な装置を製造し、発売した。"},
  {id:855,q:"The ——– objective of this intensive workshop is to improve communication skills within our multicultural team.",options:["precise","inclement","separate","primary"],answer:3,type:"<strong>語彙問題</strong>",explanation:"空所の後にあるobjective（目的、目標）がこの空所を修飾しています。目的として述べられているのは「この集中研修会の目的は、多文化チーム内でのコミュニケーションスキルを向上させることである」という内容です。これを適切に表す形容詞は(D) primary（主要な）です。primaryは「主要な」という意味で、ここでは「この研修会の主要な目的」を指しています。",translation:"この集中研修会の主要な目的は、多文化チーム内でのコミュニケーションスキルを向上させることです。"},
  {id:856,q:"Mr. Silva’s ——– in building a diverse team has improved our company’s innovation capability.",options:["succeed","successful","successfully","success"],answer:3,type:"品詞問題",explanation:"空所の前には所有格のMr. Silva’s、後には前置詞inがあることがわかります。このパターンでは名詞が空所に入ります。選択肢の中で名詞は(D) success（成功）だけなので、これを選びます。",translation:"Silvaさんが多様なチーム作りに成功したことで、私たちの会社のイノベーション能力が向上した。"},
  {id:857,q:"AMDD Logistics ensures all products are shipped in ——– packaging to guarantee safe and intact delivery.",options:["expired","savory","protective","absolute"],answer:2,type:"語彙問題",explanation:"空所の前が前置詞in、後ろには名詞のpackaging（包装）、その後にto guarantee safe and intact delivery（安全かつ無傷で配送されることを保証するため）があるので、(C) protective（保護するための）が適切です。",translation:"AMDD Logisticsは、安全で無傷な配送を保証するため、すべての製品が保護梱包で出荷されることを保証します。"},
  {id:858,q:"For the upcoming conference, Ana Castillo and Marta Reyes are the keynote speakers for innovation and technology, ——–.",options:["instead","respectively","likewise","even"],answer:1,type:"<strong>語彙問題</strong>",explanation:"この文では、Ana CastilloさんとMarta Reyesさんがそれぞれイノベーションとテクノロジーの基調講演を行うと言っています。選択肢の中でそれぞれのアイテムや人物に対応するものとして正確に使える表現は(B) respectively（それぞれ）です。",translation:"今度の会議で、Ana CastilloさんとMarta Reyesさんがそれぞれイノベーションとテクノロジーの基調講演を行います。"},
  {id:859,q:"At our company, staff members are ——– to participate in professional development workshops regularly.",options:["encouraging","encourages","encouraged","encourage"],answer:2,type:"<strong>動詞問題</strong>",explanation:"空所の前後のstaff members are ——– to participate in ～という構造に注目すると、スタッフメンバーが～に参加するよう「奨励されている」または「促されている」という受動態の関係が適切です。したがって、過去分詞の(C) encouraged（奨励された、促された）を選びます。",translation:"当社では、スタッフが定期的に専門的能力の開発ワークショップに参加することを推奨されている。"},
  {id:860,q:"Employees are required to complete a security check ——– in order to gain access to the building.",options:["sensitively","extremely","immediately","figuratively"],answer:2,type:"語彙問題",explanation:"空所の前のcomplete a security check（セキュリティチェックを終える）があります。これに合う副詞は(C) immediately（すぐに、直ちに）です。",translation:"従業員は、ビルに入るために直ちにセキュリティチェックを終える必要がある。"},
  {id:861,q:"Ms. Petrova is assessing the feedback and will announce the ——– decision on Monday.",options:["final","finalize","finally","finals"],answer:0,type:"品詞問題",explanation:"空所の前が冠詞the、空所の直後に名詞decision（決定）があり、この名詞を修飾する形容詞が適切です。選択肢から形容詞を探すと、(A) final（最終の）があり、これを選びます。",translation:"Petrovaさんはフィードバックを評価しており、月曜日に最終的な決定を発表します。"},
  {id:862,q:"SilverLine Fashion House offers a ——– of contemporary and classic designs made with high-quality materials.",options:["plan","team","blend","shade"],answer:2,type:"語彙問題",explanation:"空所の前後の文脈から、「SilverLine Fashion Houseは高品質な素材を使い、現代的デザインと古典的デザインの——–を提供している。」という意味が取れます。この文脈に適しているのは(C) blend（混合、ブレンド）で、これを選びます。",translation:"SilverLine Fashion Houseは、高品質な素材で作られた現代的デザインと古典的デザインの融合したものを提供している。"},
  {id:863,q:"Mr. Rocca attributes ——– success to a mix of innovation, perseverance, and strategic thinking.",options:["he","his","him","himself"],answer:1,type:"代名詞問題",explanation:"空所の前後を確認すると、前には動詞attributes（帰する）、後には名詞success（成功）があります。空所には名詞success（成功）を修飾する所有格の代名詞が適切であることがわかります。選択肢の中で所有格の代名詞は(B) his（彼の）でこれを選びます。※名詞句his success（彼の成功）は動詞attributes（帰する）の目的語です。",translation:"Roccaさんは、自身の成功を革新性、忍耐力、および戦略的思考の組み合わせによるものだとしている。"},
  {id:864,q:"Antonio Perez will ——– get the promotion due to his contributions to the project’s success.",options:["probability","probable","probably","probabilities"],answer:2,type:"品詞問題",explanation:"空所の前後を見ます。空所の前が助動詞willで、後ろが動詞getです。空所には助動詞と動詞の間にくる副詞が適切です。選択肢の中で副詞は(C) probably（おそらく）のみですので、これを選びます。",translation:"Antonio Perezさんはプロジェクトの成功に貢献したため、おそらく昇進するでしょう。"},
  {id:865,q:"All quotes from Vibrant Valleys Landscaping ——– a breakdown of material costs.",options:["prepare","release","assemble","include"],answer:3,type:"語彙問題",explanation:"主語はAll quotes（全ての見積もり）、空所の後ろにはa breakdown of material costs（材料費の内訳）という目的語があります。主語とこの目的語との関係から、空所には(D) include（含む）が適切です。",translation:"Vibrant Valleys Landscapingからのすべての見積もりには材料費の内訳が含まれています。"},
  {id:866,q:"Employees can improve skills by participating in hands-on workshops ——– completing online tutorials.",options:["but","except","or","so"],answer:2,type:"<strong>接続詞・前置詞問題</strong>",explanation:"空所の前のparticipating in hands-on workshops（実践的ワークショップへ参加すること）と後ろのcompleting online tutorials（オンラインの個別指導を完了すること）の２つのオプションが並列関係になっています。したがって、(C) or（または、あるいは、）が適切です。",translation:"従業員は、実践的ワークショップに参加するか、オンラインの個別指導を完了することによって、スキルを向上させることができます。"},
  {id:867,q:"The maintenance team is scheduled to clean the air filters ——– to ensure optimal air quality.",options:["extremely","regularly","deeply","highly"],answer:1,type:"語彙問題",explanation:"空所の前の動詞と目的語であるclean the air filters（エアフィルターを清掃する）に合う副詞は(B) regularly（定期的に）です。",translation:"メンテナンスチームは、最適な空気品質を確保するために、定期的にエアフィルターを清掃する予定です。"},
  {id:868,q:"Mr. Watanabe is available to respond to all questions ——– our updated privacy policy and terms.",options:["versus","despite","rather","concerning"],answer:3,type:"<strong>複合語彙問題</strong>",explanation:"空所の前がall questions（すべての質問）、空所の後ろにはour updated privacy policy and terms（私たちの更新された個人情報保護方針と規約）が続いています。これらをつなぐ適切な選択肢は、前置詞(D) concerning（～に関して）です。",translation:"Watanabeさんは、更新された個人情報保護方針と規約に関する全ての質問に回答することができます。"},
  {id:869,q:"The demand for our new product during the pre-order phase was the highest ——–.",options:["totally","ever","hardly","soon"],answer:1,type:"語彙問題",explanation:"この文は、最上級を使って新製品の事前注文段階での需要が最も高かったことを述べています。この状況にマッチする副詞は、(B) ever （これまでで）です。",translation:"新製品の事前注文段階での需要は、これまでで最も高かった。"},
  {id:870,q:"For a deeper understanding of our services, we offer an ——– course to potential clients.",options:["introducing","introduced","introductions","introductory"],answer:3,type:"<strong>品詞または動詞問題</strong>",explanation:"この文の空所の前にはanという冠詞があり、後ろにはcourse（コース）という名詞があるため、空所には形容詞が必要です。名詞course（コース）を修飾する適切な形容詞は(D) introductory（入門の、初級の）です。",translation:"私たちのサービスをより深くご理解いただくために、見込みのあるお客様に入門コースを提供しています。"},
  {id:871,q:"If problems persist in accessing ——– data, consider reaching out to customer support.",options:["you","yours","yourself","your"],answer:3,type:"<strong>代名詞問題</strong>",explanation:"空所の前が動名詞accessing（アクセスすること）、空所の後にdata（データ）という名詞があります。この名詞を修飾するために、代名詞の所有格が適切です。選択肢の中で所有格は(D) your（あなたの）でこれを選びます。",translation:"データへのアクセスする際に問題が続く場合は、カスタマーサポートへの連絡を検討してください。"},
  {id:872,q:"Fabled Pages Bookstore is organizing a sale featuring a special selection of ——– next weekend.",options:["publication","published","publish","publications"],answer:3,type:"品詞問題",explanation:"a special selection of（選りすぐりの、特選の）というフレーズがあり、直後にnext weekend（来週末）が続きます。空所には「選りすぐりの」に続く名詞が来る必要があります。",translation:"Fabled Pages Bookstoreは、来週末に選りすぐりの出版物を呼び物にしたセールを企画している。"},
  {id:873,q:"Our warranty covers repairs ——–— the damage is not caused by misuse or neglect.",options:["in order that","such as","in case of","as long as"],answer:3,type:"<strong>接続詞・前置詞問題</strong>",explanation:"空所の前がOur warranty coversで主語+動詞、空所の後ろがthe damage is not caused という主語+動詞の形をとっています。このことから、空所には接続詞が必要であることがわかります。接続詞の候補を選択肢から探すと、(A) in order that（～するために） と (D) as long as（～である限り） の２つがあるので文全体の意味を考える必要があります。",translation:"当社の保証は、損傷が誤用や不注意によるものでない限り、修理の対象となります。"},
  {id:874,q:"Ms. Lombardi is confident that the new policy will ——– all existing issues.",options:["check in","look out","clear up","take off"],answer:2,type:"<strong>語彙問題</strong>",explanation:"空所の句動詞の主語はthe new policy（新しい方針）、空所の後ろの目的語はall existing issues（すべての既存の問題）です。これと合う句動詞は(C) clear up（解決する）です。",translation:"Lombardiさんは、新しい方針が既存のすべての問題を解決してくれると確信しています。"},
  {id:875,q:"Managers should be ——– to employee concerns to maintain a positive workplace.",options:["response","respond","responsive","responder"],answer:2,type:"品詞問題",explanation:"空所の前後を見ます。空所の前にはbe動詞、後ろには前置詞toとなっています。この形になると、形容詞が空所に入るのが自然です。選択肢の中で形容詞は(C) responsive（応答する、反応する）です。",translation:"管理職は、前向きな職場を維持するために、従業員の懸念に応えるべきである。"},
  {id:876,q:"Engaging in community development projects helped ——– the public’s positive perception of our corporate image.",options:["restored","restore","restoring","is restored"],answer:1,type:"動詞問題",explanation:"問題文の動詞（述語動詞）は空所の前のhelped（役立った、助けた）と考えられます。空所の後にthe public’s positive perception（大衆の肯定的な認識）があります。",translation:"コミュニティ開発プロジェクトに携わることが、私たちの企業イメージに対する大衆の肯定的な認識を回復するのに役立った。"},
  {id:877,q:"Mr. Wei’s ——– consist of stocks and bonds that are selected based on rigorous financial analysis.",options:["hold","holder","holding","holdings"],answer:3,type:"品詞問題",explanation:"空所の前が所有格Mr. Wei’s（Weiさんの）、空所の後には句動詞consist of（構成されている）があります。空所には所有格Mr. Wei’s（Weiさんの）が修飾する名詞が入ることがわかります。さらに空所の後の動詞consistは三人称単数現在形ではないので、空所に入る名詞は複数形になります。",translation:"Weiさんの保有資産は、厳格な財務分析に基づいて選ばれた株式と債券で構成されています。"},
  {id:878,q:"Ms. Patel ——– on developing new software features for our app three years ago.",options:["works","worked","working","will work"],answer:1,type:"<strong>時制に関する動詞問題</strong>",explanation:"three years ago（3年前）という過去を示すフレーズがあるため、過去の時制の動詞が必要です。そのため、過去時制の動詞(B) worked（[worked on]で「取り組んだ」）が適切です。",translation:"Patelさんは3年前、私たちのアプリの新しいソフトウェア機能の開発に取り組んだ。"},
  {id:879,q:"Ms. Maeda’s negotiation ——– will be essential in the upcoming deal with international partners.",options:["approximations","findings","realities","skills"],answer:3,type:"語彙問題",explanation:"空所の前がnegotiation（交渉）、後ろに助動詞willがあります。negotiation（交渉）と適切にマッチする名詞は(D) skillsです。negotiation skillsは一般に「交渉スキル」としてよく用いられるフレーズです。",translation:"Maedaさんの交渉スキルは、国際的なパートナーとのこれからの取引に欠かせないだろう。"},
  {id:880,q:"Alpha Wave Electronics has seen substantial growth thanks to the ——– of its products globally.",options:["altitude","proliferation","vantage","culmination"],answer:1,type:"語彙問題",explanation:"growthまでの意味は「Alpha Wave Electronicsは著しい成長を遂げた」です。thanks to以降は「その製品が世界中で～のおかげで」という意味になります。製品が世界中で「拡散、急増」したことが成長の理由であるとするのが自然なので、(B) proliferation（拡散、急増）が適切です。",translation:"Alpha Wave Electronicsは、その製品の世界的な普及のおかげで、著しい成長を遂げた。"},
  {id:881,q:"Clients can request ——– with product customization to meet specific requirements.",options:["assist","assistant","assisted","assistance"],answer:3,type:"<strong>品詞問題</strong>",explanation:"空所の前後を見ます。空所の前には他動詞のrequest（依頼する）、後ろには前置詞withとproduct customization（製品のカスタマイズ）が続きます。これにより、空所にはrequest（依頼する）の目的語となる名詞が入ります。",translation:"顧客は、特定の要件を満たすために製品のカスタマイズに関する支援を依頼することができます。"},
  {id:882,q:"——– of the residents support the new community garden initiative launched by the council.",options:["Most","Other","Else","Another"],answer:0,type:"<strong>数量代名詞問題</strong>",explanation:"空所の後にof the residents（住民の）という表現があります。その後にsupport（支援する）という動詞が続きます。support（支援する）は三人称単数現在形ではないので、主語は複数形になることがわかります。",translation:"住民のほとんどが、議会が開始した新しいコミュニティガーデンの新しい取り組みを支持しています。"},
  {id:883,q:"Crystal Cove Eatery is hosting a live music event every night ——– the end of fall.",options:["under","against","along","before"],answer:3,type:"<strong>語彙問題</strong>",explanation:"空所の後ろにthe end of fall（秋の終わり）というフレーズがあります。この前に適切な前置詞は(D) before（～の前に、～まで）です。",translation:"Crystal Cove Eateryは、秋の終わりまで毎晩ライブ音楽イベントを開催しています。"},
  {id:884,q:"Our new retail design will feature display units that help store items ——–.",options:["compact","compactly","compacting","compacted"],answer:1,type:"<strong>品詞問題</strong>",explanation:"空所の前が関係代名詞thatにhelp store items（商品を保管するのを助ける）があり、help+動詞の原形store+目的語itemsの形でthat以下は完結しています。したがって空所には、動詞の原形storeを修飾する副詞の(B) compactly（ぎっしりと、コンパクトに）が適切です。",translation:"新しい小売店のデザインは、商品をコンパクトに収納できる展示ユニットを特徴としています。"},
  {id:885,q:"We urge all participants to ——– the event guidelines to ensure a successful conference.",options:["take","follow","lead","carry"],answer:1,type:"<strong>語彙問題</strong>",explanation:"空所の後に the event guidelines（イベントのガイドライン）というフレーズがあり、これに合う選択肢は(B) follow（従う）です。",translation:"会議を成功させるため、参加者の皆様にはイベントガイドラインに従うようお願いいたします。"},
  {id:886,q:"All staff must report to the office at 8 am unless ——– instructed due to weather conditions.",options:["either","neither","none","otherwise"],answer:3,type:"<strong>複合語彙問題</strong>",explanation:"空所の前が接続詞unless（もし～ないなら）、後ろが動詞の過去分詞instructed（指示された）です。この間に入る適切な選択肢は副詞の(D) otherwise（他の方法で、別の方法で）です。",translation:"天候の状況により他に指示がない限り、全スタッフは午前8時にオフィスに出勤しなければなりません。"},
  {id:887,q:"The vegetarian options on our menu are ——– for guests with dietary restrictions.",options:["suitably","to suit","suitable","suit"],answer:2,type:"<strong>品詞問題</strong>",explanation:"空所の前後を確認します。空所の前にはbe動詞のareがあり、後には前置詞forがあります。これらの文脈から空所には形容詞が適切であると判断できます。選択肢の中で形容詞は(C) suitable（適切な）のみです。",translation:"当店メニューのベジタリアン向けオプションは、食事制限のあるお客様に適しています。"},
  {id:888,q:"Users should report immediately to the help desk if the error message ——–.",options:["to persist","was persisting","persists","persistence"],answer:2,type:"<strong>品詞または動詞問題</strong>",explanation:"ifの節の中に空所があり、主語がthe error message（エラーメッセージ）、空所には動詞（述語動詞）が入ると考えられます。選択肢の中で動詞（述語動詞）の形は、(B) was persisting（persist「続く、持続する」の過去進行形）と(C) persists（persist「続く、持続する」の三人称単数現在形）です。",translation:"エラーメッセージが続く場合、ユーザーはすぐにヘルプデスクに報告すべきです。"},
  {id:889,q:"Ali Reza will represent our company ——– the annual industry tour next month.",options:["during","among","aboard","between"],answer:0,type:"<strong>語彙問題</strong>",explanation:"空所の後にthe annual industry tour next month（来月の毎年恒例の業界ツアー）というイベントを示すフレーズが続いています。このフレーズと合う前置詞は(A) during（～の間に）です。",translation:"Ali Rezaさんは来月、毎年恒例の業界ツアーで当社を代表します。"},
  {id:890,q:"The Solaris Sculpture Museum is closed ——– for the installation of a new exhibition opening next week.",options:["temporarily","cautiously","annually","formerly"],answer:0,type:"<strong>語彙問題</strong>",explanation:"空所の前にis closed（閉まっている）というフレーズがあり、後にfor the installation of a new exhibition opening next week（来週オープンする新しい展示の設置のため）という説明が続いています。したがって、(A) temporarily（一時的に）が適切です。",translation:"Solaris Sculpture Museumは、来週オープンする新しい展示の設置のため、一時的に閉鎖されています。"},
  {id:891,q:"The project team consists ——– engineers, designers, and managers who work collaboratively to meet deadlines.",options:["with","of","in","about"],answer:1,type:"<strong>語彙問題</strong>",explanation:"空所の前が動詞consists（成る）です。consistは通常ofと共に使用されます。",translation:"プロジェクトチームは、期限を守るために協力して働くエンジニア、デザイナー、マネージャーから構成されている。"},
  {id:892,q:"The ——– use of gym equipment not only damages the machines but also poses a risk to users.",options:["concise","equivalent","submissive","improper"],answer:3,type:"語彙問題",explanation:"butの前までが、「ジムの機器の…な使用がマシンを故障させる」となっています。この文脈では、機器の「不適切な使用」が問題を引き起こすという意味合いが合致するため、(D) improper（不適切な）が適切です。",translation:"ジムの機器の不適切な使用は、マシンを故障させるだけでなく、利用者にも危険をもたらす。"},
  {id:893,q:"Oasis Oil & Gas ——– a new policy to ensure the safety of the environment and communities.",options:["subscribed","relocated","interviewed","instituted"],answer:3,type:"<strong>語彙問題</strong>",explanation:"空所の後ろが目的語のa new policy（新しい方針）で、これに合うのが(D) instituted（制定した）です。",translation:"Oasis Oil & Gasは、環境とコミュニティの安全を確保するために新しい方針を導入しました。"},
  {id:894,q:"Special discounts are available ——– to long-term clients as a part of our loyalty program.",options:["exclusively","productively","relatively","financially"],answer:0,type:"<strong>語彙問題</strong>",explanation:"空所の前がavailable（利用できる）、空所の後ろにto long-term clients（長年のお客様に）というフレーズが続いています。この文脈から、(A) exclusively（独占的に）を入れると「長年のお客様のみ利用できる」という意味になり、自然なフレーズになります。したがって、(A) exclusively（独占的に、排他的に）を選びます。",translation:"ロイヤリティプログラムの一環として、長年のお客様は特別割引をご利用いただけます。"},
  {id:895,q:"Stellar Space Realty is launching a housing project ——– is affordable and close to downtown.",options:["where","what","that","this"],answer:2,type:"<strong>関係詞・代名詞問題</strong>",explanation:"空所の前にa housing project（住宅プロジェクト）という名詞句があり、後にis affordable and close to downtown（手頃な価格でダウンタウンに近い）という説明がbe動詞+形容詞の形で続いています。これは、主格の関係代名詞を使用して、先行詞a housing project（住宅プロジェクト）に関する説明を加える構造です。",translation:"Stellar Space Realtyは、手頃な価格でダウンタウンに近い住宅プロジェクトを立ち上げています。"},
  {id:896,q:"In our tech department, a beeping ——– indicates a server issue requiring immediate attention.",options:["sounding","sounds","sound","sounded"],answer:2,type:"品詞問題",explanation:"空所の前には冠詞aと形容詞beepingがあり、後ろには動詞indicatesがあることから、空所には名詞が必要です。名詞は、(A) sounding（鳴らすこと）、複数形の(B) sounds（sound「音」の複数形）、単数形の(C) sound（音、声）の３つがありますが、「a beeping sound（ビープ音）がindicates a server issue（サーバーの問題を示している）」とするのが適切なので、単数形の(C) sound（音）を選びます。",translation:"私たちの技術部では、ビープ音は、早急な対応が必要なサーバーの問題を示しています。"},
  {id:897,q:"To check in at Crystal Cliffs Resorts, please provide your ——– number upon arrival.",options:["distribution","margin","confirmation","permit"],answer:2,type:"<strong>語彙問題</strong>",explanation:"空所の後ろにはnumber（番号）があり、Crystal Cliffs Resortsでのチェックイン（To check in at Crystal Cliffs Resorts）に関連する番号を求めています。(C) confirmation （確認）を入れると、confirmation number（確認番号）となって文脈に合うのでこれを選びます。",translation:"Crystal Cliffs Resortsにチェックインするには、到着時に確認番号をお知らせください。"},
  {id:898,q:"Silver Stream Restaurant is closing later ——– usual to accommodate a private event tonight.",options:["below","after","above","than"],answer:3,type:"<strong>接続詞・前置詞・副詞問題</strong>",explanation:"空所の前にあるlaterという比較級の形容詞と空所の後にあるusualという形容詞に注目します。比較級と共に使われる (D) thanが適切です。",translation:"Silver Stream Restaurantは今夜のプライベートイベントに対応するため、通常よりも遅く閉店します。"},
  {id:899,q:"Given the weather forecast, the event coordinators need to plan ——– to avoid disruptions.",options:["accordingly","assuredly","conversely","subsequently"],answer:0,type:"<strong>語彙問題</strong>",explanation:"Given the weather forecastという前置詞句から、気象予報に基づいてイベントコーディネーターが計画を立てる必要があることがわかります。この文脈に合った副詞は(A) accordingly（それに応じて）です。",translation:"気象予報を考えると、イベントコーディネーターは混乱を避けるためにそれに応じて計画を立てる必要があります。"},
  {id:900,q:"Poor communication within the team ——– affects productivity and may impact project completion timelines.",options:["adversely","adversity","adversary","adverse"],answer:0,type:"<strong>品詞問題</strong>",explanation:"空所の前が主語のPoor communication within the team（チーム内のコミュニケーションの不足）、空所の後ろが動詞affects（影響を与える）です。空所には動詞を修飾する副詞が適していると判断できるので、(A) adversely（副詞：逆に、不利に）が適切です。",translation:"チーム内のコミュニケーションの不足は生産性に悪影響を与え、プロジェクトの完了スケジュールに影響を与える可能性があります。"},
  {id:901,q:"Many tourists have been ——– with Apex Heritage Museum’s layout, which takes them on a historical journey.",options:["satisfaction","satisfactory","satisfy","satisfied"],answer:3,type:"品詞問題",explanation:"空所の前後を中心に確認していきます。空所の前に主語Many tourists（多くの観光客）とhave been、後ろが前置詞withにApex Heritage Museum ‘s layout（Apex Heritage Museumのレイアウト）が続きます。",translation:"多くの観光客がApex Heritage Museumのレイアウトに満足し、彼らを歴史の旅へと誘ってくれる。"},
  {id:902,q:"Emily Walker would not ——– with these unforeseen obstacles if the research team had reported their findings earlier.",options:["having confronted","have confronted","have been confronted","had been confronted"],answer:2,type:"能動態・受動態・時制に関する動詞問題",explanation:"if節の時制がthe research team had reported で過去完了、主節がEmily Walker would～となっているので仮定法過去完了と考えられます。",translation:"Emily Walkerさんは、もし研究チームがもっと早く調査結果を報告していれば、このような予期せぬ障害に直面することはなかっただろう。"},
  {id:903,q:"Mr. Jensen will visit the construction site ——– the safety inspection is complete.",options:["overall","due to","once","soon"],answer:2,type:"<strong>接続詞・前置詞・副詞問題</strong>",explanation:"空所の前が、Mr. Jensen will visitで主語+動詞、空所の後ろがthe safety inspection isで主語+動詞です。この形は上の２のパターンに該当し、空所には接続詞が入ることがわかります。選択肢の中で接続詞は(C) once（いったん～したら）だけなので(C)を選びます。",translation:"Jensenさんは、安全検査が完了したら建設現場を視察する予定だ。"},
  {id:904,q:"Aeris Insurance ——– updated their homeowner’s policy terms to include flood damage.",options:["recently","closely","lightly","moderately"],answer:0,type:"語彙問題",explanation:"空所の前が主語のAeris Insurance、空所の後ろが動詞updated（更新した）と目的語their homeowner’s policy terms（住宅所有者保険の条項）です。",translation:"Aeris Insuranceは最近、洪水被害を含めるために住宅所有者保険契約の条項を更新した。"},
  {id:905,q:"After the audit, Gabriel Martin issued a ——– report summarizing the findings and recommendations.",options:["constant","momentary","brief","free"],answer:2,type:"語彙問題",explanation:"空所の前が、主語Gabriel Martin、動詞issued（発行した）、後ろがreport（報告書）にsummarizing the findings and recommendations（調査結果と推奨事項を要約する）が続きます。",translation:"監査後、Gabriel Martinさんは調査結果と推奨事項をまとめた簡潔な報告書を出した。"},
  {id:906,q:"To increase market share, Argentum Electronics will ——– place items at eye level.",options:["strategic","strategically","strategy","strategize"],answer:1,type:"品詞問題",explanation:"空所の前後を見ます。空所の前が助動詞will、後ろが動詞の原形のplace（置く、配置する）です。したがって、空所には動詞place（置く、配置する）を修飾する副詞の(B) strategically（戦略的に）が適切です。",translation:"市場占有率を増やすために、Argentum Electronicsは戦略的に商品を目線の高さに配置します。"},
  {id:907,q:"Summit Healthcare worked ——– with nutritionists to create diet plans for patients with diabetes.",options:["hardly","relatively","closely","nearly"],answer:2,type:"語彙問題",explanation:"空所の前後を確認していきましょう。空所の前が主語Summit Healthcareに動詞worked（働いた）が続き、後ろはwith nutritionists（栄養士と）です",translation:"Summit Healthcareは糖尿病患者のための食事計画を作成するために栄養士と密接に協力した。"},
  {id:908,q:"The CEO of Alabaster Cosmetics emphasized the importance of ——– promoting their products to capture a younger audience.",options:["created","create","creative","creatively"],answer:3,type:"品詞問題",explanation:"空所の前後を見ます。空所の前が前置詞of、後ろが動名詞のpromoting（宣伝すること）。したがって、空所には動名詞promoting（宣伝すること）を修飾する副詞の(D) creatively（副詞：創造的に）が適切です。",translation:"Alabaster CosmeticsのCEOは、若年層を取り込むために自社製品を創造的に宣伝することの重要性を強調しました。"},
  {id:909,q:"A new photography series is being ——– by Crimson Arts for a special community showcase.",options:["considered","supposed","reflected","assumed"],answer:0,type:"語彙問題",explanation:"この文脈では、Crimson Artsが特別なコミュニティ展示のために何かをしている様子が述べられています。受動態の現在進行形の文「is being + 過去分詞」の構造が使われているため、空所には過去分詞が必要です。意味的には、「検討されている」が自然な文脈であるため、(A) considered（検討された）が適しています。",translation:"Crimson Artsによって新しい写真シリーズが特別なコミュニティの展示のために検討されている。"},
  {id:910,q:"Diamond Cliff Resort’s guidebook includes ——– overviews on cultural events and festivals.",options:["help","helpfully","helpful","helps"],answer:2,type:"品詞問題",explanation:"空所の前後を見ます。空所の前が動詞includes（含む）、後ろが名詞overviews（概要）です。したがって、空所には名詞overviews（概要）を修飾する形容詞の(C) helpful（役立つ、有益な）が適切です。",translation:"Diamond Cliff Resortのガイドブックには文化イベントや祭りに関する役立つ概要が含まれています。"},
  {id:911,q:"Grace Kim was the keynote speaker at the industry conference ——– the month of January.",options:["when","while","during","once"],answer:2,type:"<strong>接続詞・前置詞問題",explanation:"空所の後ろの形を見ます。the month of January で動詞がない名詞句です。空所の前はGrace Kim was で主語+動詞の形です。これは、上の４のパターンで空所には前置詞が入ることがわかります。選択肢の中で前置詞は、(C) during（～の間）のみでこれを選びます。",translation:"Grace Kimさんは1月の間、業界会議で基調講演者でした。"},
  {id:912,q:"The premium credit card account includes travel benefits, such as ——– to airport lounges worldwide.",options:["contact","access","retreat","response"],answer:1,type:"語彙問題",explanation:"空所の前がtravel benefits, such as（～のような旅行特典）、空所の後ろがto airport lounges worldwide（世界各地の空港ラウンジへの）です。(B) access（利用、アクセス）を入れると「世界各地の空港ラウンジの利用などの旅行特典」となり自然な表現になります。したがって、(B) access（利用、アクセス）を選びます。",translation:"プレミアムクレジットカードのアカウントには、世界各地の空港ラウンジの利用などの旅行特典が含まれています。"},
  {id:913,q:"Please bring your order ——– to the store to collect your reserved items.",options:["confirming","confirmed","confirmation","confirm"],answer:2,type:"品詞問題",explanation:"空所の前が、動詞bring（持ってくる）にyour order（あなたの注文）が続き、空所の後はto the store（店舗へ）です。",translation:"予約した商品を受け取るために、注文確認書を店舗に持参してください。"},
  {id:914,q:"To keep up with the digital age, Infinity Library Center must ——– itself as a multifunctional space.",options:["reinvest","relocate","reuse","reinvent"],answer:3,type:"語彙問題",explanation:"１．選択肢を確認して問題のタイプを見分ける。 選択肢がすべて動詞なので「語彙問題」と考えられます。この問題では全体の意味を考えながら進めましょう。",translation:"デジタル時代に遅れをとらないために、Infinity Library Centerは多機能スペースとして自己改革しなければならない。"},
  {id:915,q:"Ms. Adebowale requested a full ——– of the soil composition before starting the construction.",options:["analytic","analyze","analysis","analyst"],answer:2,type:"品詞問題",explanation:"空所の前が冠詞aと形容詞full（完全な）、後ろが前置詞ofなので空所には名詞が入ることがわかります。選択肢の中で名詞は、(C) analysis（分析）、(D) analyst（分析者）の２つあります。",translation:"Adebowaleさんは建設を始める前に土壌組成の完全な分析を要求しました。"},
  {id:916,q:"The Atrium Theater has postponed their renovation plans ——– escalating costs of construction materials.",options:["when","out of","because","due to"],answer:3,type:"<strong>接続詞・前置詞問題</strong>",explanation:"空所の後ろの形を見ます。escalating costs of construction materials （建設資材のコスト高騰）で名詞句です。空所の前がカンマ以降はThe Atrium Theater has postponed で主語+動詞の形になっています。この形は上の４のパターンに該当し、空所には前置詞が入ることがわかります。",translation:"The Atrium Theaterは、建設資材のコスト高騰のため、改装計画を延期しました。"},
  {id:917,q:"Ms. Hernandez received an award for her innovative approach to ——– wastewater.",options:["disturbing","constructing","recurring","filtering"],answer:3,type:"語彙問題",explanation:"空所の後ろがwastewater（廃水）で、これと合う選択肢は(D) filtering（ろ過すること）です。",translation:"Hernandezさんは、廃水をろ過する革新的なアプローチで賞を受賞した。"},
  {id:918,q:"Hiroshi Nakamura’s expertise allows him to adapt ——– to the fluctuating demands of digital marketing.",options:["ready","readies","readily","readiness"],answer:2,type:"品詞問題",explanation:"空所の前が動詞adapt（適応する、順応する）、後ろがto the fluctuating demands（変動する需要）です。ここでのadaptは自動詞で、adapt to（～に適応する、～に順応する）と考えられます。したがって、空所には動詞adaptを修飾する副詞の(C) readily（すぐに、容易に）が適切です。",translation:"Hiroshi Nakamuraさんの専門知識は、デジタルマーケティングの変動する需要に即座に対応することができます。"},
  {id:919,q:"Serenade Central Cafe hosts an array of live music performances ——– the week.",options:["around","toward","after","throughout"],answer:3,type:"語彙問題",explanation:"空所の後ろがthe week（1週間）という時間を示す名詞で、空所の前が「Serenade Central Caféが数々のライブ音楽のパフォーマンスを開催している」ことが述べられています。ここで適切な前置詞は (D) throughout（～を通して）です。これは、週の各日にわたってイベントがあることを示しています。",translation:"Serenade Central Cafeでは、1週間を通して数々のライブ音楽パフォーマンスを開催しています。"},
  {id:920,q:"We will not be able to process your application ——– all required documents are submitted by the deadline.",options:["no more","mostly","at least","unless"],answer:3,type:"<strong>語彙問題</strong>",explanation:"空所の後ろがall required documents are submittedで主語+動詞、空所の前がWe will not be able to processで主語+動詞です。これは、上の２のパターンに該当し、空所には接続詞が入ることがわかります。選択肢の中で接続詞は(D) unless（～でない限り）のみでこれを選びます。",translation:"期限までにすべての必要書類が提出されない限り、申請を処理することはできません。"},
  {id:921,q:"Royal Gardens Hotel provides an itemized bill detailing the costs ——– the room service.",options:["at","as","by","of"],answer:3,type:"語彙問題",explanation:"空所の前は the costs（費用）、後は the room service（ルームサービス）。「ルームサービスの費用」と考えるのが自然なのでこれに合う前置詞は (D) of です。",translation:"Royal Gardens Hotelでは、ルームサービスのコストを詳細に記した項目別の請求書を提供しています。"},
  {id:922,q:"Lexicon Legal Partners will offer ——– services in intellectual property law starting next quarter.",options:["brightened","distributed","translated","expanded"],answer:3,type:"語彙問題",explanation:"この文では「Lexicon Legal Partnersが次の四半期から知的財産法に関するサービスを提供する」ことが言及されています。この文脈に合う形容詞は(D) expanded（拡大された、拡張された）です。これは、サービスの範囲や内容が拡大されることを意味し、文脈に適しています。",translation:"Lexicon Legal Partnersは、次の四半期から知的財産法に関する拡大したサービスを提供します。"},
  {id:923,q:"We have to reschedule the workshop ——– Ms. Wang will be on a business trip that week.",options:["regarding","despite","because","sooner"],answer:2,type:"<strong>接続詞・前置詞・副詞問題</strong>",explanation:"空所の前がWe have to rescheduleで主語+動詞、後ろが接Ms. Wang will beで主語+動詞の主語+動詞の形です。これは、上の2のパターンで空所には接続詞が入ることがわかります。選択肢の中で接続詞は、(C) because",translation:"その週はWangさんが出張のため、ワークショップのスケジュールを変更しなければなりません。"},
  {id:924,q:"Falcon Agriculture introduced their organic pesticide alternative to the market several years ——–.",options:["lastly","instead","formerly","ago"],answer:3,type:"語彙問題",explanation:"空所の前がseveral yearsなので、(D) ago（前に）にほぼ絞り込めますが、その前を確認しましょう。several yearsの前が「Falcon Agricultureが市場にオーガニックの農薬代替品を導入した」ことが言及されていて文として完結しています。空所に(D) ago（前に）を入れてseveral years ago（数年前に）とすると、前後がうまくつながりますのでこれを選びます。",translation:"Falcon Agricultureは数年前に市場にオーガニックの農薬代替品を導入しました。"},
  {id:925,q:"To maintain transparency, Ms. Singh ——– reported the budget revisions to the council.",options:["promptness","promptly","prompt","more prompt"],answer:1,type:"品詞問題",explanation:"空所の前後を見ます。空所の前が主語のMs. Singh、後ろが動詞のreported（報告した）です。したがって、空所には動詞reportedを修飾する副詞の(B) promptly（速やかに、迅速に）が適切です。",translation:"透明性を維持するために、Singhさんは速やかに予算修正を議会に報告しました。"},
  {id:926,q:"Willow Publishing offers ——– consultations to aspiring writers seeking to publish their first book.",options:["separated","individual","isolating","alone"],answer:1,type:"語彙問題",explanation:"空所の前後を見ます。空所の前が主語と動詞のWillow Publishing offers ～（Willow Publishingは～を提供する）、空所の後ろがconsultations to aspiring writers（意欲的な作家に相談）です。この文脈から、意欲的な作家に対して提供される相談に関する形容詞が必要です。ここでは、個々の作家に合わせた個別の相談を意味する(B) individual（個々の、個別の）が適切です。",translation:"Willow Publishingは、初めて本を出版しようとする意欲的な作家たちに個別の相談を提供しています。"},
  {id:927,q:"Meridian Energy Corp. prefers ——– professionals who have a proven track record in the energy sector.",options:["recruit","to recruit","to be recruited","recruits"],answer:1,type:"動詞問題",explanation:"空所の前が動詞のprefers（好む、好ましいと思う）で、後ろが名詞のprofessionals（専門家）です。prefersの後にはto不定詞を用いる形が一般的です。さらにprofessionals（専門家）との関係は「専門家を採用する」という能動態が適切です。よって、(B) to recruit（採用すること）を選びます。",translation:"Meridian Energy Corp.は、エネルギー部門で実績のある専門家を採用することを好んでいます。"},
  {id:928,q:"Technological advancements have enabled a significant ——– in production time.",options:["placement","admission","election","reduction"],answer:3,type:"語彙問題",explanation:"空所の前がa significant （大幅な）で後ろがin production time （生産時間において）となっています。この文脈で適切な名詞は(D) reduction（削減、減少、縮小）です。",translation:"技術の進歩は、生産時間の大幅な短縮を可能にした。"},
  {id:929,q:"Dr. Schmidt emphasized that both a balanced diet ——– regular exercise contribute to a healthy lifestyle.",options:["or","and","also","to"],answer:1,type:"<strong>接続詞・前置詞・副詞問題</strong>",explanation:"空所の前がboth a balanced diet （バランスの取れた食事と）で後ろがregular exercise （定期的な運動）でその後に動詞contribute（貢献する、寄与する）が続きます。したがって、both A and B（AもBも両方～）の形から接続詞の (B) and（そして）が適切です。",translation:"Schmidt博士は、バランスの取れた食事と定期的な運動の両方が、健康的なライフスタイルに寄与すると強調しました。"},
  {id:930,q:"The promotional code you received is ——– only for online transactions and cannot be used in-store.",options:["valid","validation","validating","validate"],answer:0,type:"品詞問題",explanation:"空所の前が主語The promotional code you received（受け取ったプロモーションコード） 、そしてbe動詞isが続きます。空所の後ろがonly for online transactions（オンライン取引のみ）なので、前後をつなぐ適切な選択肢は形容詞の(A) valid（有効な）です。",translation:"受け取ったプロモーションコードは、オンライン取引のみ有効であり、店舗では使用できません。"},
  {id:931,q:"Since Aditya Gupta joined the team, there has been a noticeable improvement in the quality of ——–.",options:["message","statement","declaration","communication"],answer:3,type:"<strong>語彙問題</strong>",explanation:"空所の前がthe quality of （～の質）で、これを含めて「チームにAditya Guptaさんが加入して何かの質の向上があった」ことが示されています。チームの文脈で最も一般的で関連性が高いのは(D) communication（コミュニケーション）です。",translation:"Aditya Guptaさんがチームに加わってから、コミュニケーションの質に顕著な改善がありました。"},
  {id:932,q:"Elise Fischer found the lecture on molecular biology fascinating ——– she was a literature major.",options:["so that","ss soon as","rather than","although"],answer:3,type:"<strong>語彙問題</strong>",explanation:"空所の前がElise Fischer found the lecture on molecular biology fascinating（Elise Fischerさんは分子生物学の講義を魅力的だと感じた）で、後ろがshe was a literature major（彼女は文学専攻だった）。ここで示されているのは、「文学専攻だけれども、分子生物学の講義に興味を持った」という対比の関係です。そのため、(D) although（～だけれども）が適切です。",translation:"Elise Fischerは文学専攻であったけれども、分子生物学に関する講義が魅力的だと感じました。"},
  {id:933,q:"The team agreed that ——– above the initial budget would require special approval.",options:["every","another","anything","itself"],answer:2,type:"<strong>代名詞問題</strong>",explanation:"空所の前がthat節のthat、後ろがabove the initial budget（初期予算を超える）です。そのあとのwould以降はwould require special approval（特別な承認が必要でしょう）です。「初期予算を超えるどんなものでも（anything）特別な承認が必要になる」とすると自然な文になります。したがって適切な選択肢は(C) anything（何でも、どんなものでも）です。",translation:"チームは、初期予算を超えるどんなものでも特別な承認が必要だと合意しました。"},
  {id:934,q:"Maple Education Systems is developing a new curriculum whose ——– input comes from experts worldwide.",options:["collect","collective","collectively","collection"],answer:1,type:"品詞問題",explanation:"空所の前が関係代名詞の所有格whose、後ろが名詞input（意見、入力）と動詞comesが続きます。したがって、空所には名詞input（意見、入力）を修飾する形容詞の (B) collective（集合的な）が適切です。",translation:"Maple Education Systemsは、世界中の専門家の意見を集約した新しいカリキュラムを開発している。"},
  {id:935,q:"Please thoroughly read the manual ——– using the new coffee machine in the break room.",options:["except","within","before","against"],answer:2,type:"<strong>語彙問題</strong>",explanation:"空所の前がread the manual（マニュアルを読む）、後ろがusing the new coffee machine（新しいコーヒーマシンを使うこと）です。この文脈では、「新しいコーヒーマシンを使う前にマニュアルを読む」が自然です。したがって、(C) before（～する前に）が適切です。",translation:"休憩室の新しいコーヒーマシンを使用する前に、マニュアルをしっかりとお読みください。"},
  {id:936,q:"The project required more resources than ——– had estimated, leading to an increased budget.",options:["we","our","us","ourselves"],answer:0,type:"代名詞問題",explanation:"空所の前が接続詞than（～より）、後ろが動詞had estimated（見積もった）です。空所には動詞had estimated（見積もった）の主語になる代名詞が入るので主格の(A) weが適切です。",translation:"プロジェクトには、私たちが見積もっていたよりも多くのリソースが必要となり、予算が増加しました。"},
  {id:937,q:"Customers were excited when Cobalt Industrial ——– models with customizable options.",options:["caused","introduced","acted","attended"],answer:1,type:"語彙問題",explanation:"空所の後ろが目的語models with customizable options（カスタマイズ可能なオプションを備えたモデル）です。(B) introduced（発表する、導入する）を空所に入れて「カスタマイズ可能なオプション付きのモデルを発表した」とするのが適切です。したがって、(B) introduced（発表する、導入する）を選びます。",translation:"Cobalt Industrialがカスタマイズ可能なオプションを備えたモデルを発表したとき、顧客たちは興奮しました。"},
  {id:938,q:"Willow Women’s Hospital has designed its maternity ward to be a ——– environment for childbirth.",options:["suit","suitable","suitably","suits"],answer:1,type:"品詞問題",explanation:"空所の前が冠詞a、後ろが名詞environment（環境）です。したがって、空所には名詞environment（環境）を修飾する形容詞の(B) suitable（適切な）が適切です。",translation:"Willow Women’s Hospitalは、産科病棟を出産に適した環境に設計している。"},
  {id:939,q:"——– the prototype is successful, Luminous Textiles will start mass production next quarter.",options:["In case of","After all","Subsequent to","Provided that"],answer:3,type:"<strong>接続詞・前置詞・副詞問題</strong>",explanation:"空所の後ろがthe prototype is で主語+動詞、カンマ以降がLuminous Textiles will startで主語+動詞です。これは、上の１のパターンで空所には接続詞が入ることがわかります。選択肢の中で接続詞は、(D) Provided that（もし～ならば、～という条件で)のみです。したがって、(D) Provided that（もし～ならば、～という条件で）を選びます。",translation:"プロトタイプが成功すれば、Luminous Textilesは来四半期から大量生産を開始します。"},
  {id:940,q:"Li Huang referenced older architectural designs ——– a comparison purpose with contemporary building styles.",options:["by","off","for","at"],answer:2,type:"語彙問題",explanation:"空所の前が、Li Huang referenced older architectural design（Li Huangさんは古い建築デザインを参照した）、空所の後ろがa comparison purpose with contemporary building styles（現代の建築スタイルと比較する目的）となっています。前後をつなぐ適切な選択肢は(C) for（～のために）です。",translation:"Li Huangは、現代の建築様式と比較する目的で古い建築デザインを参照しました。"},
  {id:941,q:"While several countries are boosting their healthcare spending, a few have conversely reduced ——–.",options:["them","theirs","their","they"],answer:1,type:"代名詞問題",explanation:"この問題は、動詞reduced（削減した）だけを見て、目的格の(A) themを選ぶと間違えるので注意が必要です。所有代名詞(B) theirsも目的語になる可能性がありますので文頭から確認していきましょう。",translation:"いくつかの国が医療支出を増やしている一方で、逆に医療支出を削減している国が小数ながらあります。"},
  {id:942,q:"The number of new sign-ups for the gym membership exceeded our January ——– by over 200 members.",options:["estimator","estimate","estimated","estimating"],answer:1,type:"品詞または動詞問題",explanation:"空所の前がexceeded our January （私たちの1月の～を超えた）で、後ろがby over 200 members（200人以上）です。私たちの1月の「何か」で、この「何か」が200人以上を超えたという意味合いになります。適切な選択肢は名詞の(B) estimate（見積もり、推定）です。",translation:"ジム会員への新規登録者数は、1月の予想を200人以上超えました。"},
  {id:943,q:"This week, Sebastian Harris will devise a ——– for tackling the emerging market challenges.",options:["request","gesture","strategy","prediction"],answer:2,type:"語彙問題",explanation:"空所の前の動詞devise（考案する）と、後ろのfor tackling the emerging market challenges（新興市場の課題に対処するために）という文脈から、(C) strategy（戦略）が適切です。strategyは問題解決や目標達成のための計画や方法を指すため、この文脈に合致します。",translation:""},
  {id:944,q:"Guests who wish to check out late from Hotel Celestine must ——– a request form at the front desk.",options:["complete","inquire","reply","apply"],answer:0,type:"<strong>語彙問題</strong>",explanation:"空所の後ろがa request form（リクエストフォーム）です。「リクエストフォームに記入する」とするのが自然なので、(A) complete（記入する、完了する）が適切です。",translation:"Hotel Celestineで遅くチェックアウトすることを希望されるお客様は、フロントデスクでリクエストフォームを記入しなければなりません。"},
  {id:945,q:"——– volunteers at the Golden Gate Sports Academy events gains free admission to workshops and clinics.",options:["Anyone","Whose","Whoever","Nobody"],answer:2,type:"<strong>代名詞・関係詞問題</strong>",explanation:"この問題文の中に動詞はvolunteers （ボランティアをする）とgains（得る）がありますが、述語動詞はgainsでgainsの前全体が主語になると考えられます。",translation:"Golden Gate Sports Academyのイベントでボランティアをする人は誰でも、ワークショップやクリニックへの入場料が無料になります。"},
  {id:946,q:"Streamlining the production process has ——– improved our delivery times.",options:["measurement","measure","measurable","measurably"],answer:3,type:"品詞問題",explanation:"空所の前がhasで、後ろが動詞improved（改善した）です。したがって空所には動詞improved（改善した）を修飾する副詞の(D) measurably（明らかに、目に見える形で）が適切です。",translation:"生産工程の合理化により、私たちの納期が明らかに改善されました。"},
  {id:947,q:"The sculptures on display are ——– of the cultural heritage of the region.",options:["current","creative","intermediate","representative"],answer:3,type:"語彙問題",explanation:"空所の前の主語がThe sculptures on display（展示されている彫刻）、空所の後ろがof the cultural heritage of the region（地域の文化遺産の）です。この文脈で適切な形容詞は(D) representative（代表的な、象徴的な）です。representativeは「何かを代表するもの」という意味で、ここでは地域の文化遺産を象徴する彫刻というニュアンスになります。",translation:"展示されている彫刻は、その地域の文化遺産を代表しています。"},
  {id:948,q:"——– her contributions to the project, Ruby Khan also volunteered for community service.",options:["Although","Besides","Whether","Until"],answer:1,type:"<strong>接続詞・前置詞・副詞問題</strong>",explanation:"空所の後がher contributions to the project（プロジェクトに対する彼女の貢献） で名詞句、Ruby Khan also volunteeredは主語+名詞です。したがって、上の３のパターンに該当し、空所には前置詞が入ることがわかります。選択肢の中で前置詞は、(B) Besides（〜に加えて）と(D) Until（～まで）があるので、文全体の意味を考える必要があります。",translation:"Ruby Khanさんはプロジェクトへの貢献に加えて、社会奉仕活動のボランティアもしました。"},
  {id:949,q:"Experts at Spectrum Pharmaceuticals are ——– consumer needs to guide their research investments.",options:["expecting","depending","visiting","analyzing"],answer:3,type:"語彙問題",explanation:"空所の後の名詞句consumer needs（消費者のニーズ）と、その後のto guide their research investments（研究投資を導くために）という文脈から、(D) analyzing（分析する）が適切です。analyzeは情報やデータを詳細に調べて理解することを意味し、この文脈に合います。",translation:"Spectrum Pharmaceuticalsの専門家は、研究投資を導くために消費者のニーズを分析しています。"},
  {id:951,q:"The museum’s guide ——– states that photography is not allowed in the special exhibitions area.",options:["clear","clearly","clearer","cleared"],answer:1,type:"品詞問題",explanation:"空所の前が主語のThe museum’s guide（博物館のガイド）、後ろが動詞states（述べる）です。したがって空所には、動詞states（述べる）を修飾する副詞の(B) clearly（明確に）が適切です。",translation:"博物館のガイドには、特別展示エリアでの写真撮影が許可されていないと明確に書かれています。"},
  {id:952,q:"Shutter Journey Workshop, which focuses on creative techniques, is designed for amateurs ——– professional photographers.",options:["but","either","as well as","additionally"],answer:2,type:"<strong>接続詞・前置詞・副詞問題</strong>",explanation:"空所の前後を見ると、空所の前がamateurs（アマチュア）、後ろがprofessional photographers（プロの写真家）です。これら二つのグループを並列して表現する(C) as well as（～だけでなく、～もまた）が適切です。",translation:"Shutter Journey Workshopは、クリエイティブな技法に焦点を当て、アマチュアだけでなくプロの写真家向けにも設計されています。"},
  {id:953,q:"Penelope Cooper is an ——– musician known for her innovative compositions in jazz music.",options:["efficient","arranged","unqualified","accomplished"],answer:3,type:"語彙問題",explanation:"この文は、Penelope Cooperがジャズ音楽において革新的な作曲で知られているミュージシャンであることを述べています。彼女の才能や成果を表す形容詞は(D) accomplished（熟練した、達成した）です。",translation:"Penelope Cooperさんは、ジャズ音楽における革新的な作曲で知られている熟練したミュージシャンです。"},
  {id:954,q:"According to the timetable, the bus ——– fifteen minutes after every hour during weekdays.",options:["depart","was departed","are departing","departs"],answer:3,type:"動詞問題",explanation:"空所の前がthe bus（バス）で、これが主語になります。空所の後がfifteen minutes after every hour during weekdays（平日の毎時15分後）です。この文脈から、定期的な動作や状態を表す現在形が適切です。したがって、(D) departs（出発する、三人称単数現在形）が適切です。",translation:"時刻表によると、バスは平日の毎時15分後に出発します。"},
  {id:955,q:"Blue Ribbon Stationery is hosting a reception ——– new clients next Thursday evening.",options:["except","for","off","into"],answer:1,type:"語彙問題",explanation:"空所の前がhosting a reception（レセプション[歓迎会]を開催する）、後ろがnew clients（新規顧客）です。「新規顧客のためのレセプションを開催する」とするのが自然なので、(B) for（～のために）が適切です。",translation:"Blue Ribbon Stationeryは、来週の木曜日の夕方に新規顧客のためのレセプションを開催します。"},
  {id:956,q:"We encourage our team members to ——– state any concerns during the feedback sessions.",options:["favorably","wholly","openly","laboriously"],answer:2,type:"副詞問題",explanation:"この文の主な内容は、フィードバックセッション中にチームメンバーに懸念事項を述べることを奨励しているということです。この文脈で適切な副詞は(C) openly（公然と、率直に）です。openlyは、何かを隠さずに、正直に表現する様子を示します。",translation:"私たちは、フィードバックセッション中にチームメンバーが懸念事項を率直に述べることを奨励しています。"},
  {id:957,q:"The festival had a lot of interesting events, but ——– have left a lasting impression like the fireworks show.",options:["many","few","each","any"],answer:1,type:"<strong>数量代名詞問題</strong>",explanation:"空所の前は、「フェスティバルには多くの興味深いイベントがあったが」です。 空所の後を「花火ショーのように印象深いものはほとんどない」とすると前後がうまくつながります。したがって代名詞は(B) few（少数の、ほとんどない）です。",translation:"その祭りにはたくさんの興味深いイベントがありましたが、花火大会のように長く印象に残るものはわずかです。"},
  {id:958,q:"We require a writing ——– to apply for our annual writing competition by next Monday.",options:["style","procedure","approach","sample"],answer:3,type:"語彙問題",explanation:"文の主要な内容は、作文コンテストに応募するために何かが必要であるということです。この文脈で適切なのは(D) sample（サンプル、見本）です。writing sampleは「文章のサンプル」として、応募者の書く能力を示すためのものです。",translation:"私たちの毎年恒例の作文コンテストに応募するためには、来週月曜日までに、文章のサンプルが必要です。"},
  {id:959,q:"Northern Lights Music School has seen a steady increase in enrollment ——– the past decade.",options:["throughout","along","toward","beside"],answer:0,type:"語彙問題",explanation:"空所の後がthe past decade（過去10年）であり、これに合う前置詞は(A) throughout（～を通じて）です。",translation:"Northern Lights Music Schoolは、過去10年間にわたり、入学者数が着実に増加しています。"},
  {id:960,q:"With Scarlett Wilson’s negotiation skills, Astral Marketing Inc. was able to secure ——– contracts doubling their quarterly earnings.",options:["arbitrary","spacious","lucrative","absent"],answer:2,type:"語彙問題",explanation:"空所の前が動詞secure（確保する）、後ろが名詞contracts（契約）とこのcontractsを後ろから修飾するdoubling their quarterly earnings（四半期の収益を倍増させる）です。しがたって、(C) lucrative（利益の上がる、有利な）が適切です。",translation:"Scarlett Wilsonさんの交渉スキルにより、Astral Marketing Inc.は四半期の収益を倍増させる有利な契約を確保することができました。"},
  {id:961,q:"Amethyst Fashions reviewed its policies to ensure ——– with the updated import regulations.",options:["compliantly","compliance","compliant","comply"],answer:1,type:"品詞問題",explanation:"空所の前が他動詞のensure（確かにする、保証する ※ensureは他動詞のみ）、後ろが前置詞withです。空所には他動詞ensure（確かにする、保証する）の目的語となる名詞が入るので、(B) compliance（遵守、コンプライアンス）が適切です。",translation:"Amethyst Fashionsは、更新された輸入規制を確実に遵守するために方針を見直した。"},
  {id:962,q:"While ——– the past mistakes, Hugo Lopez promised to focus on future solutions.",options:["acknowledge","to acknowledge","has acknowledged","acknowledging"],answer:3,type:"動詞問題",explanation:"空所の前が接続詞のwhileです。接続詞の後は通常、主語と動詞が続くので、主語がない動詞の形の(A) acknowledge（認める）や(C) has acknowledged（現在完了形）は不適切です。また、不定詞形の(B) to acknowledgeについても主語と述語動詞がないので不適切です。現在分詞形の(D) acknowledging（認めている）が残ります。",translation:"過去の間違いを認めつつ、Hugo Lopezさんは将来の解決策に焦点を当てることを約束しました。"},
  {id:963,q:"The recipe was shared ——– a list of alternative ingredients for those with dietary restrictions.",options:["whereas","along with","even if","consequently"],answer:1,type:"接続詞・前置詞・副詞問題",explanation:"空所の前がThe recipe was sharedで主語+動詞、空所の後のa list of alternative ingredients for those with dietary restrictionsは名詞句です。これは上の４のパターンに該当し、空所には前置詞が入ることがわかります。選択肢の中で前置詞は(B) along with（～と共に）のみでこれを選びます。",translation:"レシピは、食事制限のある人のための代替食材のリストと共に共有された。"},
  {id:964,q:"When the shipment arrived late, the supplier immediately ——– and offered a generous discount as compensation.",options:["asserted","behaved","apologized","resumed"],answer:2,type:"語彙問題",explanation:"この文脈では、出荷が遅れた際、供給者が即座に行動し、補償として寛大な割引を提供したことが述べられています。出荷が遅れたことに対して、供給者がどのような行動をとったかを示す必要があります。この状況では、(C) apologized（謝った）が適切です。",translation:"配送が遅れて到着したとき、供給業者はすぐに謝罪し、補償として寛大な割引を提供しました。"},
  {id:965,q:"Please confirm your seat assignment ——– you board your reserved express train.",options:["until","around","at","before"],answer:3,type:"全文読み問題",explanation:"空所の前がPlease confirmで命令文、空所の後ろがyou boardで主語+動詞です。命令文は主語Youが省略されていると考えると、この文は上の２のパターンに該当します。したがって、空所には接続詞が入ることがわかります。選択肢の中で接続詞は(A) until（～まで）と(D) before（～前に）の２つあるので、文全体の意味を取る必要があります。",translation:"ご予約の急行列車に乗る前に、座席指定をご確認ください。"},
  {id:966,q:"Mason Miller received the award for his ——– contribution to the field of renewable energy.",options:["interested","outstanding","accepting","ready"],answer:1,type:"語彙問題",explanation:"空所の後ろがcontribution（貢献）です。これと合う選択肢は(B) outstanding（傑出した、卓越した）です。",translation:"Mason Millerさんは、再生可能エネルギー分野への顕著な貢献に対して賞を受け取りました。"},
  {id:967,q:"At the luncheon, Mr. Rodriguez spoke briefly after receiving ——– award for leadership.",options:["our","ours","us","we"],answer:0,type:"代名詞問題",explanation:"空所の前後を見ます。空所の前が動名詞receiving（受け取ること）、後ろが名詞のaward（賞）。名詞award（賞）を修飾する所有格の(A) our（私たちの）が適切です。",translation:"昼食会で、Rodriguezさんはリーダーシップに対する私たちの賞を受け取った後、簡潔に話しました。"},
  {id:968,q:"Electra Power employees attending seminars will be ——– for registration fees and materials.",options:["restored","reimbursed","recovered","reassigned"],answer:1,type:"語彙問題",explanation:"この文では、Electra Powerの従業員がセミナーに参加する際、登録料と資料に関して何らかの処理が行われることが述べられています。この状況では、(B) reimbursed（返金される、払い戻される）が適切です。",translation:"Electra Powerの従業員がセミナーに参加した際は、登録料と資料の費用が払い戻されます。"},
  {id:969,q:"Mr. Novak introduced an affordable ——– to the expensive catering service previously used for events.",options:["alternating","alternated","alternatively","alternative"],answer:3,type:"品詞問題",explanation:"空所の前が冠詞anと形容詞affordable（手頃な）、後ろが前置詞toです。したがって、空所には形容詞affordableが修飾する名詞が入り、(D) alternative（代替、代わりのもの）が適切です。",translation:"Novakさんは、これまでイベントで使われていた高価なケータリングサービスに代わる、手頃な価格の代替案を紹介した。"},
  {id:970,q:"The Limelight Auditorium ——– to collaborate with local schools for annual talent shows and performances.",options:["to plan","planning","having planned","plans"],answer:3,type:"動詞問題",explanation:"問題文に述語動詞がないため、空所には述語動詞を補う必要があります。選択肢の中で、述語動詞になれるのは(D) plans（計画する）のみでこれを選びます。念のため主語と動詞の関係を確認すると、主語がThe Limelight Auditorium（単数形）、動詞が三人称単数現在形の(D) plans（計画する）で主語と動詞の形が一致します。",translation:"Limelight Auditoriumは、毎年タレントショーや公演のために地元の学校と協力する計画を立てています。"},
  {id:971,q:"Riverside Medical Center’s nurses are trained to handle a ——– area of acute conditions.",options:["broadly","broadness","broaden","broad"],answer:3,type:"品詞問題",explanation:"空所の前が冠詞a、後ろが名詞area（範囲）なので、空所には名詞area（範囲）を修飾する形容詞の(D) broad",translation:"Riverside Medical Centerの看護師は、広範な急性疾患に対処できるように訓練されています。"},
  {id:972,q:"——– Lavender Eatery, online reservations for Valentine’s Day will open next Monday.",options:["As opposed to","In addition to","According to","Prior to"],answer:2,type:"語彙問題",explanation:"カンマ以降は「バレンタインデーのオンライン予約が次の月曜日に開始される」という内容です。 「Lavender Eatery によると」とするとうまくつながりますので、(C) According to（～によると）が適切です。",translation:"Lavender Eateryによると、バレンタインデーのオンライン予約が次の月曜日に開始されます。"},
  {id:973,q:"Despite ——– staff shortages, Pine Tree Surgical Hospital consistently delivers exceptional patient care.",options:["has experienced","having experienced","will experience","have been experiencing"],answer:1,type:"動詞問題",explanation:"Despiteは前置詞で、後ろに名詞句が続きます。したがって、動詞の形は名詞句を形成できるものでなければなりません。したがってhavingで始まる(B) having experienced（経験してきた）が適切です。残りの３つの選択肢は名詞句を形成しません。",translation:"Pine Tree Surgical Hospitalは、スタッフ不足を経験してきたにもかかわらず、一貫して非常に優れた患者ケアを提供しています。"},
  {id:974,q:"The reputation of Phoenix Entertainment continues to rise ——– in the film industry.",options:["openly","thoughtfully","exactly","steadily"],answer:3,type:"語彙問題",explanation:"空所の前が動詞rise（上昇する）です。これと合う副詞は(D) steadily（着実に）です。",translation:"Phoenix Entertainmentの評判は映画業界で着実に上昇し続けています。"},
  {id:975,q:"The Riverside Institute offers scholarships specifically designed for a ——– individual demonstrating leadership qualities.",options:["motivation","motivated","motivate","motivations"],answer:1,type:"品詞問題",explanation:"選択肢を見ると、似たようなスペルなので「品詞問題」と判断できます。空所の前後を見て判断できるものが多いのが品詞問題です。",translation:"Riverside Instituteは、リーダーシップの資質を示す意欲的な個人のために特別に設計された奨学金を提供しています。"},
  {id:976,q:"To be eligible for the early bird discount, register for the conference ——– 24 hours of the announcement.",options:["unless","among","within","while"],answer:2,type:"<strong>接続詞・前置詞問題</strong>",explanation:"カンマ以降の空所の前がregister（登録してください）で命令文、空所の後ろが24 hours of the announcementで名詞句です。命令文は主語Youが省略されていると考えられるので、この問題文は上の4のパターンで前置詞が入ることがわかります。選択肢の中で前置詞は(B) among（～の間）と(C) within（〜以内に）があります。",translation:"早割を利用するためには、発表から24時間以内に会議への登録してください。"},
  {id:977,q:"To finalize the order, please get ——– from Diamond Printing about the delivery date.",options:["confirmation","construction","intermission","substance"],answer:0,type:"語彙問題",explanation:"この文脈では、注文を最終決定するために「確認」が必要とすると自然な文になります。よって、(A) confirmation（確認）が適切です。",translation:"注文を確定するために、配送日についてDiamond Printingから確認を取ってください。"},
  {id:978,q:"In response to climate change, the government’s new policy focuses on promoting the use of ——– energy sources.",options:["accurate","hopeful","renewable","regulatory"],answer:2,type:"語彙問題",explanation:"空所の後ろが、energy sources（エネルギー源）でこれと合う(C) renewable（再生可能な）が候補になります。全体の意味を確認していくと、「気候変動への対応」という文脈と「政府の新政策が推進する」という点から、空所に入る形容詞は「エネルギー源」を説明するものでなければなりません。(C) renewable（再生可能な）は「気候変動への対応」という文脈に適しているのでこれを選びます。",translation:"気候変動への対応として、政府の新しい政策は、再生可能なエネルギー源の使用を推進することに焦点を当てています。"},
  {id:979,q:"Nimbus Manufacturing will showcase its ——– technology at the international trade fair next month.",options:["frequent","warm","unattached","innovative"],answer:3,type:"語彙問題",explanation:"空所の後ろに名詞technology（技術）があります。これと合うのは(D) innovative（革新的な）です。",translation:"Nimbus Manufacturingは来月の国際貿易見本市でその革新的な技術を展示します。"},
  {id:980,q:"The committee suggested an ——– approach to reduce the annual budget by 15% effectively.",options:["economics","economical","economist","economize"],answer:1,type:"品詞問題",explanation:"空所の前が冠詞an、後ろが名詞approach （方法、アプローチ）なので、空所には名詞approach （方法、アプローチ）を修飾する形容詞の(B) economical（経済的な）が適切です。",translation:"委員会は、年間予算を効果的に15%削減する経済的なアプローチを提案しました。"},
  {id:981,q:"Manufacturers must ——– to quality control procedures to guarantee product safety.",options:["attract","adhere","construct","sustain"],answer:1,type:"語彙問題",explanation:"空所の後にto quality control procedures（品質管理の手順に）があり、これと合う動詞は(B) adhere（固守する、従う）です。",translation:"製造業者は製品の安全を保証するために品質管理の手順に従わなければなりません。"},
  {id:982,q:"Our library provides free access to ——– that can help improve your computer skills.",options:["tutor","tutoring","tutored","tutorials"],answer:3,type:"品詞問題",explanation:"空所の前が前置詞to、空所の後ろが関係代名詞thatです。したがって空所には名詞が入ることがわかります。名詞は、(A) tutor（家庭教師、個人指導教員）と(D) tutorials（指導書）があります。(A) tutor（家庭教師、個人指導教員）は可算名詞なので、一語で入れる場合は複数形のtutorsにする必要があり、この空所に入れることはできません。したがって、(D) tutorials（個別指導）を選びます。",translation:"私たちの図書館では、コンピュータースキルを向上させるのに役立つ個別指導を無料で利用できます。"},
  {id:983,q:"——– it was a tough decision, Ms. Alvarez resolved to relocate for the new position.",options:["Although","Otherwise","Despite","Instead"],answer:0,type:"<strong>接続詞・前置詞・副詞問題</strong>",explanation:"空所の後ろの形を見ます。it was で主語+動詞の形です。カンマ以降はMs. Alvarez resolved で同じく主語+動詞の形です。これは、上の１のパターンで空所には接続詞が入ることがわかります。選択肢の中で接続詞は、(A) Although（～だけれども）のみでこれを選びます。",translation:"難しい決断ではありましたが、Alvarezさんは新しいポジションのために移転することを決意しました。"},
  {id:984,q:"At Terra Nova Educational Centre, we pride ——– on our progressive teaching methodologies.",options:["itself","yourselves","oneself","ourselves"],answer:3,type:"代名詞問題",explanation:"問題文の主語はwe（私たち）です。空所はpride（誇る）の目的語になります。再帰代名詞は主語自身が目的語になる場合に使われます。",translation:"Terra Nova Educational Centreでは、私たちは進歩的な教育方法を誇りに思っています。"},
  {id:985,q:"The art preservation ——– of Obsidian Designs contributes to restoring historical landmarks with modern techniques.",options:["compartment","opposition","occurrence","initiative"],answer:3,type:"語彙問題",explanation:"空所の後ろがof Obsidian Designs（Obsidian Designsの）で、その後に続く文が、歴史的建造物を現代の技術で復元することに寄与していると述べています。この文脈で適切な名詞は(D) initiative（取り組み、イニシアティブ）です。",translation:"Obsidian Designsの芸術保護に対する取り組みは、現代の技術を用いて歴史的建造物を復元することに貢献しています。"},
  {id:986,q:"The Phoenix Playhouse, with a seating ——– of 250, is perfect for school and community events.",options:["aptitude","demonstration","capacity","compliance"],answer:2,type:"語彙問題",explanation:"空所の前がa seating（座席）で後ろにof 250が続きます。これに合う選択肢は劇場の収容能力を意味する(C) capacity（収容能力）です。",translation:"250人収容のPhoenix Playhouseは、学校やコミュニティのイベントに最適です。"},
  {id:987,q:"Using Gourmet Grid Kitchenware’s latest appliances can ——– reduce energy consumption in the kitchen.",options:["extremely","significantly","utterly","countlessly"],answer:1,type:"語彙問題",explanation:"空所の後ろ動詞reduce（削減する）です。この動詞に合う適切な副詞は、(B) significantly（著しく）です。significantly reduceはコロケーションでよく使われる表現です。",translation:"Gourmet Grid Kitchenwareの最新の家電を使用すると、キッチンでのエネルギー消費を大幅に削減することができます。"},
  {id:988,q:"The display of fireworks ——– by a symphony orchestra, creating a memorable Fourth of July celebration.",options:["was accompanied","accompanied","to accompany","accompanying"],answer:0,type:"動詞問題",explanation:"空所の前がThe display of fireworks（花火の打ち上げ）、後ろがby a symphony orchestra（交響楽団によって）です。この構造から、空所には受動態の述語動詞が必要です。選択肢の中で受動態の述語動詞は(A) was accompanied（伴奏された）のみでこれを選びます。",translation:"花火の打ち上げは交響楽団の伴奏で行われ、思い出に残る7月4日の祭典となった。"},
  {id:990,q:"Clients have expressed great satisfaction with Ms. MacDonald’s advice ——– investment opportunities.",options:["by means of","with regard to","in place of","in accordance with"],answer:1,type:"語彙問題",explanation:"空所の前には名詞のadvice（アドバイス）と所有格のMs. MacDonald’s（MacDonaldさんの）があり、後ろには名詞のinvestment opportunities（投資機会）が続きます。adviceとinvestment opportunitiesの関係を示す前置詞が必要です。(B) with regard to（～に関して）を入れると「投資機会に関してのMacDonaldさんのアドバイス」という意味になるのでこれを選びます。",translation:"顧客は、投資機会に関してのMacDonaldさんのアドバイスに非常に満足しています。"},
  {id:991,q:"Green Tech Solutions Ltd. received an award for ——– in advanced robotics systems last month.",options:["consideration","implication","innovation","intention"],answer:2,type:"語彙問題",explanation:"空所の前がan award for（～に対しての賞）で、後ろがin advanced robotics systems（高度なロボティクスシステムにおいて）となっています。この文脈で適切な名詞は(C) innovation（革新、イノベーション）です。",translation:""},
  {id:992,q:"All guests at Highland Castle Hotel receive a ——– breakfast with their stay.",options:["compliment","to compliment","complementarily","complimentary"],answer:3,type:"品詞問題",explanation:"空所の前が冠詞a、後ろが名詞breakfast（朝食）なので、空所には名詞breakfast（朝食）を修飾する形容詞の(D) complimentary（無料の）が適切です。",translation:"Highland Castle Hotelにご宿泊のすべてのお客様は、ご朝食を無料でお召し上がりいただけます。"},
  {id:993,q:"The tourists secured ——– belongings before embarking on the thrilling rapid river rafting trip.",options:["they","them","their","themselves"],answer:2,type:"代名詞問題",explanation:"空所の前後を見ます。空所の前が動詞secured（固定した）、後ろが名詞belongings（持ち物）なので名詞belongings（持ち物）を修飾する所有格の(C) their（彼ら・彼女たちの）が適切です。",translation:"観光客はスリル満点の急流下りに出発する前に、自分たちの荷物をしっかりと固定しました。"},
  {id:994,q:"Any changes to the budget must ——– by Ms. Patel before implementation.",options:["approving","be approved","approve","to approve"],answer:1,type:"動詞問題",explanation:"主語はAny changes to the budget（予算のいかなる変更も）に助動詞mustが続きます。主語と動詞の関係は「予算のいかなる変更も承認されなければならない」という受動態の関係が適切です。受動態の「be + 過去分詞形」の形は、(B) be approved（承認される）のみでこれを選びます。受動態なので空所の後のby Ms. Patel（Patelさんによって）ともうまくつながります。",translation:"予算のいかなる変更も、実施前にPatelさんによって承認されなければなりません。"},
  {id:995,q:"Ms. Campbell asked the theater staff to adjust the lighting ——– for the final scene of the play.",options:["slight","slighter","slightly","to slight"],answer:2,type:"品詞問題",explanation:"空所の前が動詞と目的語のadjust the lighting（照明を調整する）、後ろが前置詞forです。空所には動詞adjust（調整する）を修飾する副詞の(C) slightly（わずかに、少し）が適切です。",translation:"Campbellさんは、芝居の最後のシーンで照明を少し調整するよう劇場のスタッフに頼みました。"},
  {id:996,q:"City planners are working on new policies to make public transportation more ——–.",options:["average","repeated","affordable","influenced"],answer:2,type:"語彙問題",explanation:"空所の前は、「都市計画者たちが公共交通機関をもっと～にするための新しい政策に取り組んでいる」という意味です。空所に入る形容詞は公共交通機関の特性を改善するものであるべきです。",translation:"都市計画者たちは、公共交通機関をより手頃な価格にするための新しい政策に取り組んでいます。"},
  {id:997,q:"If we need further help ——– the project on time, we should consider consulting Alicia Torres.",options:["complete","to complete","completed","completes"],answer:1,type:"動詞問題",explanation:"空所の前が、we need further help（私たちはさらなる支援が必要である）で、後にthe project（プロジェクト）があります。この前後をつなげるには、不定詞のto complete the project on time（プロジェクトを時間通りに完了するために）が適切です。ここでの不定詞は目的を表しています。したがって、(B) to completeが適切です。",translation:"プロジェクトを時間通りに完了させるためにさらなる支援が必要な場合、Alicia Torresさんに相談することを検討すべきです。"},
  {id:998,q:"The physicians at Vista General Hospital are ——– featured in this month’s healthcare magazine.",options:["prominent","prominently","prominence","prominences"],answer:1,type:"品詞問題",explanation:"空所の前後を見ます。空所の前がbe動詞are、後ろが動詞の過去分詞形featured（特集された）。したがって、空所には動詞の過去分詞形featured（特集された）を修飾する副詞の(B) prominently（目立つように）が適切です。",translation:"Vista General Hospitalの医師たちは、今月のヘルスケア雑誌で大々的に特集されています。"},
  {id:999,q:"Amelia White ——– to deliver the keynote speech at next month’s technology conference.",options:["expect","expecting","to expect","is expected"],answer:3,type:"動詞問題",explanation:"文の構造を見ると、Amelia Whiteが主語で、空所の後にto deliver the keynote speech（基調講演を行う）という不定詞構文が続いていますが、動詞（述語動詞）がありません。したがって、空所には動詞（述語動詞）が入ります。",translation:"Amelia Whiteさんは、来月の技術会議で基調講演を行う予定です。"},
  {id:1000,q:"Community members speak very ——– of Ms. Anderson’s contributions to local charities.",options:["fonder","fond","fondness","fondly"],answer:3,type:"品詞問題",explanation:"空所の前が動詞speak（話す）に副詞のvery（とても）、後ろが前置詞ofです。したがって、空所には副詞veryに修飾され、かつ動詞speak（話す）を修飾する副詞の(D) fondly（愛情を込めて、温かく）が適切です。",translation:"地域の人々は、Andersonさんの地元の慈善団体への貢献についてとても好意的に話しています。"},
  {id:1001,q:"Mr. Walker was uncertain whether ——– should hire more staff or optimize current resources.",options:["he","his","hm","himself"],answer:0,type:"<strong>代名詞問題</strong>",explanation:"選択肢はすべて代名詞であるため、「代名詞問題」と考えられます。空所の前後の文の構造を見ることが重要です。",translation:""},
  {id:1002,q:"The number of scholarships and financial aid available at the Riverside Institute is ——–.",options:["growing","grown","growth","grow"],answer:0,type:"品詞または動詞問題",explanation:"選択肢を見ると、似たようなスペルとさまざまな動詞の形なので「品詞または動詞問題」と判断できます。空所の前後を見ていきましょう。",translation:""},
  {id:1003,q:"Acquiring a larger office space is not ——– necessary at this stage, considering our successful remote work model.",options:["closely","already","eventually","absolutely"],answer:3,type:"<strong>語彙問題</strong>",explanation:"選択肢がすべて副詞なので「語彙問題」と考えられます。文全体の意味を確認していきましょう。",translation:""},
  {id:1004,q:"The marketing campaign ——– a diverse range of strategies to effectively reach our audience.",options:["contain","is contained","containing","contains"],answer:3,type:"<strong>動詞問題</strong>",explanation:"選択肢を見ると、さまざまな動詞の形が並んでいるので「動詞問題」と判断できます。問題文の中の述語動詞を最初に探しましょう。",translation:""},
  {id:1005,q:"Saffron Catering’s diverse menu options and ——– prices make it the perfect choice for corporate events.",options:["afforded","affordable","afford","affordably"],answer:1,type:"品詞問題",explanation:"選択肢を見ると、似たようなスペルなので「品詞問題」と判断できます。空所の前後を見て判断できるものが多いので前後を確認しましょう。",translation:""},
  {id:1006,q:"The sales team closed a major deal with a new client ——– repeated delays in the negotiation process.",options:["as long as","although","despite","nevertheless"],answer:2,type:"<strong>接続詞・前置詞・副詞問題",explanation:"選択肢を見ると、接続詞、接続詞、前置詞、副詞の「接続詞・前置詞・副詞問題」であることがわかります。接続詞・前置詞・副詞問題では、空所の後ろの形が主語+動詞であれば接続詞、空所の後ろの形が名詞句であれば前置詞が正解になります。",translation:""},
  {id:1007,q:"Our product development process ——– to take several months from concept to launch.",options:["shows","finds","works","tends"],answer:3,type:"<strong>語彙問題</strong>",explanation:"選択肢がすべて動詞なので「語彙問題」と考えられます。この問題では全体の意味を考えながら進めましょう。",translation:""},
  {id:1008,q:"Argentum Electronics recognizes the valuable contributions of employees ——– have demonstrated exceptional performance.",options:["whichever","whose","who","whoever"],answer:2,type:"<strong>関係代名詞問題</strong>",explanation:"空所の前にemployees（従業員）という名詞があり、後にhave demonstrated（～を示した）という動詞の形で続いています。これは、主格の関係代名詞を使用して、先行詞employees（従業員）に関する説明を加える構造です。したがって、主格の関係代名詞(C) whoが適切です。",translation:"Argentum Electronicsは、卓越した業績を示した従業員の貴重な貢献を認めています。"},
  {id:1009,q:"Aria Patel secured her current position through an employment ——– known for its rigorous screening process.",options:["collection","assembly","agency","destination"],answer:2,type:"語彙問題",explanation:"空所の前がemployment（雇用）、後ろがknown for its rigorous screening process（厳格な選考プロセスで知られている）です。この文脈で適切なのは、雇用に関連する組織やサービスを指す(C) agency（代理店、機関）です。",translation:"Aria Patelは、厳しい選考プロセスで知られる職業紹介所を通じて現在の職に就きました。"},
  {id:1010,q:"The finance team carefully reviewed the financial statements ——– presenting the quarterly earnings report to the board of directors.",options:["due to","on top of","except for","prior to"],answer:3,type:"語彙問題",explanation:"空所の後ろがpresenting the quarterly earnings report to the board of directors（取締役会に四半期収益報告書を提出する）という動作です。空所の前はThe finance team carefully reviewed the financial statements（財務チームは財務諸表を注意深く見直した）という動作です。「財務諸表を注意深く見直した」という動作は「取締役会に四半期収益報告書を提出する」よりも前に完了する動作です。したがって、2つの動作の前後関係を示す前置詞(D) prior to（～の前に）が適切です。",translation:"財務チームは、取締役会に四半期収益報告書を提出する前に、財務諸表を注意深く見直しました。"},
  {id:1011,q:"Shuttle buses to the airport ——– promptly every hour, starting from 5 AM.",options:["is departing","is departed","departs","depart"],answer:3,type:"<strong>動詞問題</strong>",explanation:"空所の前がShuttle buses to the airport（空港へのシャトルバス）で、これが主語になります。空所の後がpromptly every hour, starting from 5 AM（午前5時から1時間おきに）です。この文脈から、定期的な動作や状態を表す現在形が適切です。主語が複数形なので、動詞は複数形になります。(D) depart（出発する、動詞原形）が適切です。",translation:"空港へのシャトルバスは午前5時から1時間おきに定刻通り出発します。"},
  {id:1012,q:"Quan Zhou emphasizes that in negotiations, clear communication and mutual respect are ——– important.",options:["equal","equality","equally","equalize"],answer:2,type:"品詞問題",explanation:"空所の前がbe動詞are、後ろが形容詞important（重要な）です。したがって、空所には形容詞important（重要な）を修飾する副詞の(C) equally（等しく）が適切です。",translation:"Quan Zhouさんは、交渉においては明確なコミュニケーションと相互尊重が等しく重要であると強調しています。"},
  {id:1013,q:"After careful consideration, Mr. Chhetri ——– the partnership with the renowned tech firm.",options:["authorized","invested","commented","replaced"],answer:0,type:"<strong>語彙問題</strong>",explanation:"文脈から、Chhetriさんが有名なテクノロジー企業とのパートナーシップに関して何か行動を起こしたことが述べられています。選択肢の中で、パートナーシップに関連する行動として適切なのは、(A) authorized（承認した）です。",translation:"慎重に検討した後で、Chhetriさんは有名なテクノロジー企業とのパートナーシップを承認しました。"},
  {id:1014,q:"Two employees were selected to represent the company at the industry conference, and ——– will present on the latest trends.",options:["any","both","some","either"],answer:1,type:"<strong>数量代名詞または語彙問題</strong>",explanation:"空所の前は、「2人の従業員が業界会議で会社を代表するように選ばれた」です。空所の後を「2人とも最新のトレンドについて発表する」とすると前後がうまくつながります。したがって(B) both（両方）が適切です。",translation:"2人の従業員が業界会議で会社を代表するように選ばれ、2人とも最新のトレンドについて発表する予定です。"},
  {id:1015,q:"Liang Xu took the initiative to mentor the junior developers in the team ——–.",options:["his","him","himself","his own"],answer:2,type:"<strong>代名詞問題</strong>",explanation:"空所の前方に動詞mentor（指導する）、目的語the junior developers in the team（チーム内の後輩開発者）があります。空所の後ろは何もありません。目的語が既にあり、文が完結しています。空所の代名詞は主語を強調して「Liang Xuさん自ら指導する」のような意味になる再帰代名詞の(C) himself（彼自身）が適切です。",translation:"Liang Xuさんは率先してチーム内の後輩開発者を自ら指導しました。"},
  {id:1016,q:"Necessary repairs and upgrades were promptly initiated at the warehouse ——– the inspector’s report highlighted areas of concern.",options:["consequently","besides","after","until"],answer:2,type:"<strong>接続詞・前置詞・副詞問題</strong>",explanation:"空所の後ろの形を見ます。the inspector’s report highlighted areas of concern （検査官の報告書は懸念事項を強調しました）で主語+動詞の形になっています。空所の前はNecessary repairs and upgrades were promptly initiated at the warehouse で主語+動詞の形になっています。この形は上の２のパターンに該当し、空所には接続詞が入ることがわかります。",translation:"検査官の報告書が懸念事項を強調した後に、必要な修理とアップグレードが倉庫で速やかに開始されました。"},
  {id:1017,q:"To manage workflow, the production line is adjusted based on ——– received by the week.",options:["order","ordering","ordered","orders"],answer:3,type:"品詞または動詞問題",explanation:"空所の前が前置詞onで、後ろが過去分詞received（受け取った）です。前置詞onの後ろは名詞句がくるので、選択肢の中では名詞の単数形の(A) order（注文）か複数形の(D) orders（注文）が候補です。order（注文）は可算名詞なので、1語を入れる場合は、複数形が適切です。したがって、複数形の(D)orders（注文）を選びます。（※単数の場合 、an orderまたはthe orderとなり、2語になる。）",translation:"ワークフローを管理するために、生産ラインは週ごとに受け取った注文に基づいて調整されます。"},
  {id:1018,q:"First-time buyers on our website ——– for a discount by entering a welcome code.",options:["qualify","award","experience","certify"],answer:0,type:"<strong>語彙問題</strong>",explanation:"文脈から、初めてウェブサイトで買い物をする人がウェルカムコードを入力することで何かができることが述べられています。選択肢の中で、コード入力によって得られるメリットとして適切なのは、(A) qualify（資格を得る）です。",translation:"当社のウェブサイトで初めて購入される方は、ウェルカムコードを入力することで割引を受けることができます。"},
  {id:1019,q:"At Umbra Shadow Security, employee certifications are regularly updated to meet new ——–.",options:["regulate","regulated","regulatory","regulations"],answer:3,type:"品詞問題",explanation:"空所の前が形容詞new（新しい）なので、空所には名詞が入ります。選択肢の中では名詞は(D) regulations（規制）のみです。",translation:"Umbra Shadow Securityでは、従業員の資格は新しい規制に対応するために定期的に更新されます。"},
  {id:1020,q:"The assistant manager will have the authority to make necessary decisions ——– your absence.",options:["during","onto","against","about"],answer:0,type:"<strong>語彙問題</strong>",explanation:"空所の前がThe assistant manager will have the authority to make necessary decisions（アシスタントマネージャーは必要な決定を下す権限を持つでしょう）、空所の後ろがyour absence（あなたの不在）です。この前後をつなぐ適切な前置詞は(A)during（～の間に）です。",translation:"アシスタントマネージャーは、あなたの不在の間、必要な決定を下す権限を持ちます。"},
  {id:1021,q:"Efficient management of materials and ——– contributed significantly to the project’s success.",options:["to supply","supplied","supplier","supplies"],answer:3,type:"品詞または動詞問題",explanation:"空所の直前は \"materials and\" となっています。 \"materials\" は名詞なので、空所に入るのも名詞であることがわかります。選択肢の中で名詞は (C) supplier と (D) supplies の2つです。",translation:"材料と供給品の効率的な管理は、プロジェクトの成功に大きく貢献しました。"},
  {id:1022,q:"The expansion into new markets accounted for a 25 percent ——– in revenue for Falcon Crest Systems.",options:["progress","gain","advantage","benefit"],answer:1,type:"<strong>語彙問題</strong>",explanation:"空所の前がa 25 percent（25%の）、空所の後ろがin revenue（収入において）です。(B) gain（増加、利益）を入れると「売上高の25%の増加」となり自然な表現になります。したがって、(B) gain（増加、利益）を選びます。",translation:"新市場への拡大が、Falcon Crest Systemの収益に25%の増加をもたらしました。"},
  {id:1023,q:"Employees undergoing technical ——– are often given opportunities to work on advanced projects.",options:["trainee","trains","trained","training"],answer:3,type:"<strong>品詞問題</strong>",explanation:"空所の前が形容詞technical（技術的な）なので空所には名詞が入ることが分かります。したがって名詞の(A) trainee（研修生）、 (B) trains（「列車」の複数形）、(D) training（研修、訓練）が候補となります。",translation:"技術研修を受けている従業員は、しばしば高度なプロジェクトに取り組む機会を与えられます。"},
  {id:1024,q:"Please submit your application materials ——– Mar 10 to be considered for the position.",options:["before","despite","inside","when"],answer:0,type:"<strong>接続詞・前置詞・副詞問題</strong>",explanation:"空所の後ろの形を見ます。Mar 10 以下は動詞がない名詞句です。空所の前はsubmit your application materials で命令文の形です。これは、上の４のパターンで空所には前置詞が入ることがわかります。選択肢の中で前置詞は、(A) before（～の前に）、(B) despite（～にもかかわらず）、(C) inside（～の中に）です。",translation:"その職位に検討されるためには、3月10日よりも前に応募書類を提出してください。"},
